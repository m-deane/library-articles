eed to quantify investor risk aversion directly. Closed-form solutions exist for narrow cases (Heston via Fourier inversion, SABR via Hagan expansion); more often, the pricing PDE must be solved numerically by finite-difference methods or the expectation evaluated by Monte Carlo.`), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement(P, null, `Black-Scholes' constant-vol assumption was theoretically elegant but empirically indefensible once listed option markets matured and the smile became visible. Local-volatility models, pioneered by Dupire and Derman-Kani, addressed the static calibration problem by making \u03C3 a function of spot and time, exactly matching the observed vanilla surface. They did not, however, reproduce the dynamics of the surface as spot moved - an issue that mattered enormously for exotic pricing and forward-starting payoffs. Stochastic-volatility models resolved that by treating vol as a genuinely random variable with its own mean-reverting or SABR-type dynamics, and this family has been the industry default ever since - augmented now by jump components and, most recently, by rough-volatility formulations using fractional Brownian motion.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles and Axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "No-arbitrage principle:"), " there should be no opportunities to make risk-free profits by exploiting price discrepancies. This is fundamental to derivative pricing and ensures that option prices are consistent with the underlying asset price and other market parameters."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Market completeness:"), " any contingent claim can be replicated by a portfolio of traded assets. This assumption is crucial for deriving unique option prices and is closely related to the no-arbitrage principle.")), /* @__PURE__ */ React.createElement(H4, null, "Key Terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Realized Volatility:"), " a measure of historical price variability, calculated from observed price data. It quantifies the magnitude of past price fluctuations over a specific period."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Implied Volatility:"), " the market's expectation of future volatility, derived from option prices. It represents the forward-looking view of volatility embedded in option prices."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Volatility Risk Premium (VRP):"), " the difference between implied volatility and the expected realized volatility. It represents the compensation investors demand for bearing volatility risk.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(H4, null, "Stochastic Volatility Models"), /* @__PURE__ */ React.createElement(P, null, `Heston treats variance as a mean-reverting square-root (CIR) process correlated with the underlying - the correlation parameter directly generates the skew, while the vol-of-vol parameter fattens the tails of the implied distribution. SABR, more common in rates and widely used in commodities, parameterizes forward dynamics with a stochastic \u03B2-elasticity and stochastic correlation, admitting a Hagan asymptotic formula that makes calibration to listed smiles almost a fitting exercise.`), /* @__PURE__ */ React.createElement(H4, null, "Local Volatility Models"), /* @__PURE__ */ React.createElement(P, null, `Local-vol makes \u03C3 a deterministic function \u03C3(S,t) of spot and time, calibrated so that the full listed vanilla surface prices exactly. The strength is static fit; the weakness is dynamic behaviour - local-vol surfaces tend to "drift the wrong way" as spot moves, under-hedging skew risk in practice.`), /* @__PURE__ */ React.createElement(H4, null, "Comparative Analysis"), /* @__PURE__ */ React.createElement(P, null, `Stochastic-vol models are more realistic, capture the smile/skew, and produce defensible dynamics under spot moves, at the cost of heavier implementation and numerical calibration. Local-vol models are simpler to calibrate and faster to run, but their dynamic behaviour often misrepresents the future evolution of volatility. Hybrid stochastic-local-vol (SLV) models attempt to have it both ways.`), /* @__PURE__ */ React.createElement(H4, null, "Workflow Processes"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Model Selection:"), " choose an appropriate volatility model based on the characteristics of the underlying and the desired level of complexity."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Calibration:"), " fit model parameters to market observables - typically a grid of implied volatilities across strike and tenor."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Pricing and Hedging:"), " use the calibrated model to price and hedge options and other derivatives, and monitor hedge P&L as a sanity check on model behaviour.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths and Limitations"), /* @__PURE__ */ React.createElement("ul",
