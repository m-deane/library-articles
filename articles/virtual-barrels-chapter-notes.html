 codebase; disciplined documentation and continuous testing pay for themselves in the first market regime change.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `Hedge funds deploy these strategies in search of alpha, typically layering a cointegration trade between oil futures and XOP on top of other market-neutral bets. Commodity trading advisors (CTAs) embed macro fair-value models in systematic programmes, expressing views on oil via deviations from modelled fair value. Energy companies run them in reverse, hedging production when the market trades meaningfully above their internal fair value. Sector-by-sector, exploration-and-production firms hedge output volumes, refiners optimise inventory and crack spreads, and airlines and transport operators manage fuel-cost exposure \u2014 all drawing on the same statistical machinery.`), /* @__PURE__ */ React.createElement(P, null, `Integration with existing infrastructure is mostly a matter of plumbing: broker APIs for execution, enterprise risk systems for exposure monitoring, data vendors for pricing. Case studies from public research include AQR Capital Management, which has published extensively on statistical arbitrage across asset classes including commodities, and Two Sigma Investments, known for deep use of statistical modelling and machine learning in its strategies. The standard evaluation metrics are the Sharpe ratio (risk-adjusted return as excess return over return standard deviation), maximum drawdown (worst peak-to-trough equity decline), and win rate (share of trades that finish profitable).`), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(P, null, `Two pseudocode sketches capture the core. The cointegration trader loops through history, estimates the hedging ratio on the previous window, computes the current spread, and opens positions when the spread exceeds its window mean by more than a threshold in standard deviations:`), /* @__PURE__ */ React.createElement(Code, null, `function cointegration_trading(oil_prices, xop_prices, lookback_period):
  for i from lookback_period to length(oil_prices) - 1:
    window_oil = oil_prices[i - lookback_period : i]

    spread = oil_prices[i] - hedging_ratio * xop_prices[i]
    mean_spread = calculate_mean(spreads[i - lookback_period : i])

    if spread > mean_spread + threshold * std_spread:
      sell_oil(); buy_xop()

sset models miss entirely. Tail-risk modelling remains an open problem; extreme-value theory and copula methods are leading contenders for capturing the joint-tail behaviour that standard models lose. Alternative approaches beyond statistical frameworks include agent-based modelling, which simulates individual participants to study emergent market dynamics, and classical econometric methods such as vector autoregression (VAR) for analysing the interaction of oil prices with macro variables.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `Chapter 5 delivers three linked toolkits \u2014 cross-asset arbitrage, macro fair-value modelling, and volatility surface analysis \u2014 grounded in a shared statistical discipline. Cointegration provides the theoretical spine; rolling regressions provide the implementation machinery; look-ahead bias, overfitting, and tail risk define the hazards. The standardised-ETF, customised-basket, and hedging-ratio-incorporation methodologies offer ascending complexity for cross-asset work, while macro models translate the same thinking into currency, equity, and inflation-linked factor space. Algorithmic patterns cluster around the rolling window, system architectures around event-driven modularity, and evaluation around Sharpe, drawdown, and win rate. Hedge funds, CTAs, producers, refiners, and transport operators all find use cases; AQR and Two Sigma serve as public reference points. At the frontier sit machine learning, HFT microstructure, news sentiment, non-linear and multivariate volatility models, and agent-based and econometric alternatives. The through-line is uncompromising: establish the relationship, validate it out-of-sample, trade the deviation, manage the tails, and keep iterating as markets and regulations evolve.`)), /* @__PURE__ */ React.createElement(Sec, { n: "6", title: "Chapter 6: Advanced Volatility Trading in Oil Markets: From Risk Premium Harvesting to Relative Value Strategies" }, /* @__PURE__ */ React.createElement(P, null, `Bouchouev opens Chapter 6 by tracing a two-decade arc in oil volatility trading \u2014 from the era when simply selling options and delta-hedging them harvested a structural volatility risk premium (VRP), to the present regime where that outright premium has all but disappeared and the edge lives in the relative pricing of one strike against another. The story is, at root, a story about who supplies volatility and who demands it: in the early 2000s, risk-averse end users paid insistently for protection, and insurers capturing that fear earned a wide gap between implied and realized vol. As the market matured, as the structural futures risk premium evaporated, and above all as US shale producers industrialised the sale of upside optionality through three-way collars, the supply of volatility overwhelmed demand, compressing the aggregate VRP toward zero.`), /* @__PURE__ */ React.createElement(P, null, `The chapter therefore pivots from "sell vol, hedge delta" to the richer geometry of the volatility surface \u2014 the joint relationship between implied volatility, strike, and expiry. Relative value strategies (ratio call spreads, calendar spreads, risk reversals) trade the shape of the surface rather than its level, exploiting the producer-hedging footprint that distorts specific regions of the smile. This pivot demands a more sophisticated modelling apparatus: the lognormal Black-Scholes world is supplemented or replaced by the Bachelier (normal) model and by stochastic/local volatility models; the dangerous heuristics of "sticky strike" and "sticky moneyness" must be understood as convenient lies; and gamma, vega, and path dependency must be managed with more care than a single-Greek view allows. Bouchouev weaves theory (no-arbitrage, dynamic replication), practice (hedging frequency, model risk, transaction costs), and market microstructure (producer flows, liquidity) into one picture, arguing that consistent profitability today requires continuous model refinement, disciplined risk management, and an ethical awareness of one's own market impact.`), /* @__PURE__ */ React.createElement(Ch6Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Fig. 6.1 \u2014 Stylised long-run trajectory of WTI implied and realized volatility and the residual VRP. The gap between IV and RV \u2014 once wide and persistent \u2014 compresses as shale-producer three-way collars industrialise the supply of upside optionality; 2020 prints a rare inversion as realised vol overshoots.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Volatility Risk Premium (VRP)" }, `The VRP represents the difference between the implied volatility (market's expectation of future price fluctuations) embedded in option prices and the subsequently realized volatility (actual price fluctuations). This difference arises due to the risk aversion of market participants, who are willing to pay a premium for protection against adverse price movements. This premium, reflected in higher implied volatility, often exceeds the actual realized volatility, creating an opportunity for profit by selling overpriced options and hedging the associated risks. The VRP is not static; it varies across markets, asset classes, and time periods. In the oil market, VRP has historically been significant, but its magnitude has fluctuated, influenced by factors such as market crises, changes in producer hedging behavior, and the evolution of trading strategies.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Implied Volatility (IV)" }, `Implied volatility is the market's forward-looking estimate of an asset's price volatility, derived from option prices. It's a crucial input in option pricing models like Black-Scholes and serves as a key indicator of market sentiment. Higher implied volatility signifies greater expected price fluctuations and leads to higher option premiums. IV is not directly observable but is backed out from market prices of options using option pricing models. It's important to distinguish between implied volatility and historical volatility, which measures past price fluctuations.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Realized Volatility (RV)" }, `Realized volatility measures the actual historical price fluctuations of an asset over a specific period. It's calculated from historical price data and serves as a benchmark against which implied volatility is compared. The difference between implied and realized volatility is the core of VRP trading. Accurate measurement of realized volatility is crucial for assessing the profitability of VRP strategies. Different methodologies exist for calculating realized volatility, each with its own strengths and weaknesses.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Delta Hedging" }, `Delta hedging is a dynamic trading strategy used to neutralize the price risk of an option position. The delta of an option measures the sensitivity of its price to changes in the underlying asset's price. By taking an offsetting position in the underlying asset proportional to the option's delta, traders aim to minimize the impact of price fluctuations on their portfolio. Delta hedging requires frequent adjustments as the delta changes with market conditions and time. The frequency of hedging and the choice of volatility input for calculating delta significantly impact the performance of hedging strategies.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Gamma" }, `Gamma measures the rate of change of delta with respect to changes in the underlying asset's price. It represents the convexity of the option price. A large gamma implies that delta is highly sensitive to price changes, requiring more frequent rebalancing of the hedge. Short gamma positions (selling options) necessitate selling the underlying when prices fall and buying when prices rise, contributing to market volatility. Managing gamma is crucial for limiting the impact of large price movements on a portfolio.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Vega" }, `Vega measures the sensitivity of an option's price to changes in implied volatility. It's a crucial metric for volatility traders, as it quantifies the impact of changes in volatility expectations on their positions. A long vega position benefits from increasing implied volatility, while a short vega position benefits from decreasing implied volatility. Understanding and managing vega is essential for successful volatility trading.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Moneyness" }, `Moneyness describes the relationship between an option's strike price and the current market price of the underlying asset. Options are categorized as in-the-money (ITM), at-the-money (ATM), or out-of-the-money (OTM). Moneyness significantly influences the option's delta, gamma, and vega, and thus its sensitivity to changes in the underlying asset's price and implied volatility.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Time to Maturity" }, `Time to maturity is the remaining time until an option expires. It's a crucial factor affecting option prices. Longer-dated options have higher premiums due to the greater uncertainty about future price movements. Time decay (theta) is the rate at which an option's value decreases as time to maturity approaches zero.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Volatility Smile/Skew" }, `The volatility smile/skew is a graphical representation of the relationship between implied volatility and option strike price. It depicts how implied volatility varies across different moneyness levels. The shape of the smile/skew provides insights into the market's pricing of different levels of risk and expectations about future price movements.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Volatility Term Structure" }, `The volatility term structure depicts the relationship between implied volatility and time to maturity. It shows how implied volatility varies across different option expiration dates. The term structure can reflect market views on the persistence of volatility and expectations about future events.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Dynamic Replication" }, `Dynamic replication is a theoretical concept that underpins option pricing and hedging. It posits that an option's payoff can be replicated by dynamically trading the underlying asset. This forms the basis of delta hedging. The Black-Scholes model relies on the assumption of perfect dynamic replication.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "No-Arbitrage Principle" }, `The no-arbitrage principle states that there should be no opportunities to make risk-free profits in the market. This principle is a fundamental assumption in option pricing models and serves as a basis for deriving theoretical option prices.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The economic engine of early-2000s oil vol trading was straightforward: option premiums were priced off an implied volatility that persistently overstated the subsequent realised path, and a disciplined seller \u2014 armed with delta hedging \u2014 could monetise the gap. That arbitrage was never risk-free. It demanded continuous rebalancing, tight management of gamma (which for a short-option book bleeds P&L in trending markets by forcing sells on dips and buys on rallies), and a firm grip on vega (which punishes the seller whenever implied volatility re-prices higher before the position unwinds). But in aggregate, across thousands of option cycles, the VRP was large and reliable enough that a simple sell-and-hedge programme generated the alpha that defined an era.`), /* @__PURE__ */ React.createElement(P, null, `Two structural forces corroded that edge. First, the futures risk premium \u2014 the tendency of oil futures to embed a positive expected return for the long \u2014 evaporated as passive index money, producer hedging, and arbitrage programmes converged on flatter forward curves. Second, and more decisively, US shale producers turned themselves into the market's dominant supplier of volatility. Their capital discipline and bank covenants required locking in revenue, and they did so through costless collars and, increasingly, three-way collars that sell an additional low-strike put to cheapen protection or generate cash. Every one of those collars pushes a short-call into the market and re-introduces short-put tail exposure for the producer; collectively they saturate the vol supply curve. The aggregate VRP compresses, the smile distorts in specific regions (the upper wing cheapens, the downside wing steepens), and the edge migrates from level to shape.`), /* @__PURE__ */ React.createElement(P, null, `That migration reshapes the trader's toolkit. Relative value strategies \u2014 ratio call spreads that lean against the cheapened upper wing, calendar spreads that monetise the producer-concentrated expiries, risk reversals that isolate the skew \u2014 replace outright vega bets. The volatility surface now must be modelled as an object with its own dynamics: stochastic vol models let the level wander; local vol models let each strike/expiry point move deterministically with spot; neither is perfect, and both must be stress-tested against the sticky-strike and sticky-moneyness heuristics that practitioners lean on but which fail precisely in the regimes that matter. Bouchouev is emphatic that these heuristics are convenient lies \u2014 workable when the spot drifts, dangerous when it jumps.`), /* @__PURE__ */ React.createElement(P, null, `Beneath all of this sits the theoretical scaffolding: dynamic replication (Black-Scholes' justification for hedging), the no-arbitrage principle (the constraint that keeps the smile internally consistent), and the choice between lognormal and normal price dynamics. The Bachelier model, long treated as a footnote in equity training, becomes essential in oil because crude prices mean-revert and can (briefly, infamously in April 2020) go negative \u2014 a regime the lognormal Black-Scholes engine cannot represent. The broader lesson is that every simplifying assumption \u2014 continuous hedging, frictionless markets, constant volatility, lognormality \u2014 is a knob on the P&L that the quantitative trader must monitor explicitly. Consistent profitability in this market is not a static recipe; it is a continuous refinement of models against the evolving microstructure of producer hedging, dealer positioning, and macro regime.`), /* @__PURE__ */ React.createElement(Ch6Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `Fig. 6.2 \u2014 The producer-hedge footprint that re-shapes the oil volatility surface. The costless collar caps upside and floors downside at zero net premium. The three-way collar adds a short low-strike put to monetise or cheapen the structure, but re-exposes the producer (and, by reflection, floods the market) with downside tail gamma.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Theoretical foundations"), /* @__PURE__ */ React.createElement(P, null, `VRP trading descends directly from option pricing theory. The Black-Scholes framework assumes geometric Brownian motion for the underlying, implying lognormal terminal prices and a log-return distribution with finite moments. Oil returns, empirically, violate this cleanly: skewness, excess kurtosis, and occasional regime jumps mean the lognormal fit is a useful approximation rather than a law. The Bachelier model, which assumes arithmetic (normal) dynamics, is often the better fit when prices sit near long-run means and can go negative \u2014 a theoretical footnote until 20 April 2020 made it operational. Dynamic replication, the intellectual core of Black-Scholes, rests on continuous costless hedging; in practice, discrete rebalancing, bid/ask spreads, and slippage erode the arbitrage, and the no-arbitrage principle itself admits temporary violations that sophisticated traders translate into edge.`), /* @__PURE__ */ React.createElement(H4, null, "Historical development and precedent approaches"), /* @__PURE__ */ React.createElement(P, null, `Early volatility trading focused on the level of VRP \u2014 sell ATM straddles, hedge delta, collect premium. That approach delivered robust returns through the 2000s when implied consistently printed above realised. As competition compressed the premium, and as the structural futures risk premium faded and shale-era producer hedging flipped the supply/demand balance of volatility, returns to the pure-level trade collapsed. The industry response was to move up the complexity curve: relative value volatility strategies exploit differentials in VRP across strikes and maturities, which required the simultaneous development of better surface models, better computational infrastructure, and more granular market-microstructure intuition. This shift mirrors the broader quant-finance trajectory from simple arbitrage to multi-factor relative value.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental principles and axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of No Arbitrage:"), " no risk-free profit opportunities should exist; this is the scaffolding of option pricing models and the source of internal-consistency constraints (calendar arbitrage, butterfly arbitrage) on the volatility surface."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Supply and Demand:"), " the balance of buyers and sellers of optionality shapes the surface \u2014 producer hedging on one side, refiners/airlines on the other, dealers and vol funds in between."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Risk Aversion:"), " risk-averse end users pay above fair value for downside protection, and that premium is the raw material of VRP; shifts in risk appetite therefore directly move both the level and the skew of implied volatility.")), /* @__PURE__ */ React.createElement(H4, null, "Key terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Costless Collar:"), " simultaneous purchase of a put and sale of a call whose premiums offset \u2014 zero net cost, downside protection in exchange for capped upside; strike selection sets the producer's risk profile."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Three-Way Collar:"), " long put + short call + short lower-strike put; generates cash or cheapens protection versus a costless collar, at the cost of re-introducing tail downside risk \u2014 the defining shale-producer structure behind modern oil vol supply."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Ratio Call Spread:"), " sell a larger quantity of OTM calls against a smaller long ATM-call position; ratios sized for volatility neutrality or premium neutrality, targeting cheapened upper-wing skew."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Calendar Spread:"), " short a near-dated ATM option against a long longer-dated ATM option of the same strike; profits from differential time decay and from the producer-hedge concentration in specific monthly expiries."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Sticky Moneyness:"), " heuristic in which implied vol stays constant for a given K/F ratio as spot moves; simple, internally inconsistent, and a common source of hedging error."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Sticky Strike:"), " heuristic in which implied vol stays constant for a given absolute strike as spot moves; a marginal improvement on sticky moneyness but still an ad-hoc rule rather than an arbitrage-free dynamic."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Implied Normal Volatility (INV):"), " the volatility parameter derived from the Bachelier model; more natural than implied Black vol for oil, especially at low or negative prices, and the quoting convention for certain spread and rates products."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bachelier Model:"), " option pricing under arithmetic Brownian motion (normal dynamics); admits negative prices, fits mean-reverting commodities better in some regimes, and complements rather than replaces Black-Scholes.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(H4, null, "Delta hedging in practice"), /* @__PURE__ */ React.createElement(P, null, `Delta hedging translates the theoretical promise of replication into a concrete rebalancing schedule. The trader computes the option delta, takes an offsetting position in the underlying (or a near-month future), and rebalances as delta drifts with spot and time. Rebalancing frequency is the central trade-off: too frequent, and transaction costs and bid/ask crossings erode the vol edge; too infrequent, and gamma risk (the quadratic P&L response to spot moves between rebalances) becomes the dominant source of variance. The volatility input used to compute delta matters too \u2014 hedging at implied vol versus a realised-vol forecast produces materially different trajectories, and the choice is itself a subtle bet on the VRP.`), /* @__PURE__ */ React.createElement(H4, null, "Volatility modelling frameworks"), /* @__PURE__ */ React.createElement(P, null, `Modelling the surface is a layered exercise. Black-Scholes anchors the baseline quotation convention. Stochastic volatility models (e.g., Heston, SABR) let volatility evolve as its own random process, capturing the vol-of-vol and the term-structure dynamics that flat-vol models miss. Local volatility models (Dupire) treat implied vol as a deterministic function of spot and time, pinning the surface exactly to today's market but often producing unrealistic forward smile dynamics. Mixed local-stochastic (LSV) models split the difference. The right choice is task-dependent: market-making needs arbitrage-free fit; relative-value trading needs plausible smile dynamics; stress testing needs well-behaved tails.`), /* @__PURE__ */ React.createElement(H4, null, "Comparative analysis of methodological approaches"), /* @__PURE__ */ React.createElement(P, null, `Different hedging rules and vol models materially change outcomes. Delta computed under implied vol, realised-vol forecast, or local-vol all differ; back-tests that assume "the right" vol ex post typically flatter strategies that would have struggled live. Likewise, a stochastic-vol pricer and a local-vol pricer may agree on today's prices but disagree sharply on the path of hedge ratios. A disciplined trader runs strategies through multiple frameworks and treats the spread between their P&Ls as a direct measurement of model risk.`), /* @__PURE__ */ React.createElement(H4, null, "Workflow and implementation"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Market Analysis:"), " assess VRP level, surface shape, and producer-hedge footprint."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Strategy Selection:"), " choose among straddles, strangles, ratio spreads, calendar spreads, or risk reversals."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Option Pricing and Hedging:"), " price under the selected vol model; compute deltas, gammas, vegas, and thetas."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Trade Execution:"), " execute and establish the initial delta hedge."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Dynamic Hedging:"), " rebalance as deltas drift, balancing transaction cost against gamma risk."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Risk Management:"), " cap vega, gamma, and scenario P&L; monitor tail exposures."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Performance Evaluation:"), " decompose P&L into carry, gamma, vega, skew, and residual model-error buckets.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths, limitations, and boundary conditions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Delta hedging:"), " mitigates outright price risk and isolates the vol bet; limited by transaction costs and by the continuous-hedging fiction; fails in illiquidity and limit-move regimes."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Volatility modelling:"), " provides pricing and hedging infrastructure; suffers model risk (the wrong model is confident but wrong); boundaries include vol-regime shifts, data scarcity in deep wings, and thin longer-dated strikes.")), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(H4, null, "Core algorithms"), /* @__PURE__ */ React.createElement(P, null, `Two algorithms sit at the heart of a volatility desk. The delta-hedging algorithm re-prices option deltas on a schedule (event-driven or fixed-interval), nets them against the current underlying position, and issues orders sized by the residual \u2014 with transaction-cost thresholds that suppress trivial rebalances. The volatility-calculation algorithm maintains both realised-vol estimates (standard deviation of log returns, Parkinson high-low estimator, Garman-Klass, and others) and implied-vol inversions (Black or Bachelier root-finding from mid-market option prices), feeding both into pricing and signal generation. Both algorithms are linear in their respective inputs (O(N) in hedging cycles or data points) with constant space, and both live inside an event-driven, modular architecture so that new data feeds, new pricers, or new hedging rules can be swapped without disturbing the rest of the system.`), /* @__PURE__ */ React.createElement(H4, null, "Data flow, architecture, and edge cases"), /* @__PURE__ */ React.createElement(P, null, `Market-data feeds supply ticks to the vol-calculation module; its outputs feed the pricer and the delta-hedger; the hedger emits orders to the execution module; the risk module monitors Greek exposures in parallel. Edge cases \u2014 exchange halts, limit moves, late prints, stale marks, and liquidity holes \u2014 are handled with explicit exception paths that degrade gracefully: throttle rebalancing, widen quoting, and escalate to a human trader rather than fire bad orders into a broken market.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Running the stack is resource-intensive. Real-time feeds, nightly surface calibration, Monte Carlo pricers for path-dependent books, and backtests across decades of intraday data all demand serious compute and storage. Scalability rests on parallelisable pricing grids, distributed calibration jobs, and careful cache/storage design that minimises I/O latency. Three pitfalls recur: model risk (the wrong model, confidently calibrated, produces mispriced books), over-hedging (transaction costs compound until they swamp the premium captured), and liquidity constraints (the hedge the model asks for cannot be executed at the size and spread assumed). Testing via historical backtests and Monte Carlo simulated markets is necessary but not sufficient; technical debt accumulates quickly in quant stacks and demands continuous refactoring, code review, and discipline about configuration-as-code to remain maintainable at scale.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `Hedge funds apply the full relative-value toolkit to generate alpha \u2014 trading skew, term structure, and dispersion across oil products, running delta-neutral vega books against surface distortions. Energy producers employ costless and three-way collars to lock in revenue under covenant-driven mandates; refiners use crack-spread options and calendar structures to hedge margin; airlines and shipping firms use outright calls and collars to cap fuel costs. Financial institutions use the same apparatus to manage exposure in their physical and derivative books. Two illustrative cases recur in the chapter: a hedge fund that ran relative-value vol in oil and generated substantial returns through a period of elevated market stress; and an energy producer whose collar programme meaningfully cushioned the P&L impact of a subsequent price decline.`), /* @__PURE__ */ React.createElement(H4, null, "Evaluation metrics"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Sharpe Ratio:"), " risk-adjusted return; the industry-standard comparator for vol strategies."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Sortino Ratio:"), " downside-risk-adjusted return; better suited to strategies with asymmetric P&L profiles like short-vol books."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Maximum Drawdown:"), " largest peak-to-trough decline; the practical constraint that short-vol strategies, with their tail-risk pattern, must respect.")), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(P, null, `The implementation reduces to two compact routines sitting inside the broader architecture. The delta-hedge routine fetches current option deltas, multiplies by position sizes to compute the required underlying exposure, compares against the current hedge position, and emits buy or sell orders for the residual. The realised-vol routine computes log returns from a price series and returns their (annualised) standard deviation; variations swap in the Parkinson or Garman-Klass estimators for higher efficiency when intraday highs and lows are available.`), /* @__PURE__ */ React.createElement(Code, null, `function delta_hedge(option, underlying_price, delta):
  hedge_ratio = option.delta * option.quantity
  current_hedge = get_current_hedge_position()

  returns = calculate_log_returns(price_series)
  return standard_deviation(returns)`), /* @__PURE__ */ React.createElement(P, null, `Key signatures: delta_hedge(option, underlying_price, delta) takes an Option object, the current underlying price, and the option delta, and returns nothing (its effect is the order it emits). calculate_realized_volatility(price_series) takes a PriceSeries object of historical marks and returns an annualised realised-vol estimate. The Option object carries strike, expiry, and type; the PriceSeries object carries the historical marks. The algorithmic patterns are simple: for delta hedging, compute ratio \u2192 read current hedge \u2192 compute adjustment \u2192 trade residual; for realised vol, compute log returns \u2192 compute their standard deviation. Performance comes from vectorising the return and standard-deviation calculations (NumPy/pandas idioms), optimising cache-friendly data layouts, and batching I/O; robustness comes from comprehensive error handling around market-data gaps and execution failures, structured logging to trace every hedging decision, and well-defined integration points with market-data providers, execution venues, and enterprise risk systems.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `Two frontiers dominate current research. The first applies machine learning to volatility modelling \u2014 neural surface parameterisations, realised-vol forecasting with sequence models, and reinforcement-learning hedging policies that can, in principle, internalise transaction costs and discrete-hedging effects that analytic models handle only approximately. The second studies market microstructure directly \u2014 how order-book dynamics, large-ticket producer hedge trades, and dealer gamma positioning cause local, predictable distortions of the surface that relative-value books can monetise. The basic VRP concept extends naturally to multi-asset vol (Brent\u2013WTI, crude\u2013product spreads, crude\u2013gas), to exotic structures (variance swaps, cliquets, Asian options), and to cross-market dispersion trades. Open problems remain: better tail-aware vol models, optimal hedging under realistic frictions, and a quantitative theory of microstructure-driven skew. Competing approaches \u2014 variance swaps for pure-vol exposure, volatility ETFs for retail access \u2014 offer alternative risk-return profiles and can substitute for or complement an options-based book.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `Chapter 6 tells a coherent story: oil volatility trading has migrated from level to shape. The structural VRP that powered the sell-and-hedge era has been compressed by producer hedging and market maturation, and the modern edge lives in the relative pricing of strikes and maturities on a volatility surface distorted by the industrial footprint of three-way collars. Making money in this world requires more than a signal \u2014 it requires accurate surface modelling, disciplined delta and gamma management, honest accounting for transaction costs and discrete hedging, and a healthy skepticism toward convenient heuristics like sticky strike and sticky moneyness.`), /* @__PURE__ */ React.createElement(P, null, `Above all, the chapter is a lesson in adaptation. Market dynamics evolve; producer hedging programmes evolve; models must evolve to match. Traders who stand still get picked off; traders who continuously refine their models, stress-test their assumptions, and respect the limits of their frameworks build durable edge. And because volatility strategies touch end users whose own P&L turns on oil prices, the chapter closes with an ethical reminder: trade within the rules, avoid manipulation, and remember that the market's stability is a shared good. The combination of rigour, humility, and ethical discipline is what separates a durable volatility business from a spectacular blow-up.`)), /* @__PURE__ */ React.createElement(Sec, { n: "7", title: "Chapter 7: Advanced Oil Volatility Modeling and Option Pricing: From Black-Scholes to Quadratic Normal and Beyond" }, /* @__PURE__ */ React.createElement(P, null, `Option pricing for equities began with a clean assumption: asset returns are lognormal, volatility is constant, and the volatility plotted against strike should be a flat line. Oil markets have never cooperated. Plot the at-the-money implied volatility (ATM INV) of a WTI option against the underlying futures price and the relationship is not the proportional straight line a constant implied basis volatility (IBV) would predict; it is a pronounced parabola that steepens when futures fall and flattens when they rise. Plot implied vol across strikes for a single maturity and the "smile" is not flat but a skewed curve whose wings bend upward faster than any Gaussian can justify. Those two empirical shapes \u2014 the parabolic INV-vs-F relation and the fat-tailed smile \u2014 are the central facts this chapter exists to explain, and they drive the entire evolution of oil option pricing from Black-Scholes through Bachelier, local volatility, stochastic volatility, and finally to the Quadratic Normal (QN) model that Bouchouev treats as the practical working tool of the oil derivatives desk.`), /* @__PURE__ */ React.createElement(P, null, `The drivers are structural, not statistical artefacts. Financialization brings leveraged money whose margin calls amplify moves at low prices; shale supply elasticity adds a new volatility mechanism on the supply side; storage constraints turn supply-demand imbalances into price spikes when tanks fill or empty; and geopolitical supply disruptions inject upside tail risk that producers, reluctant to commit capital to long-cycle projects, cannot easily damp. A model that ignores any of these cannot reproduce the smile. The chapter's throughline is the distinction \u2014 which Bouchouev insists on \u2014 between a model (a description of the underlying's dynamics from which prices and Greeks follow consistently) and a heuristic (a pattern noticed in outputs). Black-Scholes and Bachelier are models; a rule like "IV rises after a price drop" is a heuristic. Robust oil risk management requires the former.`), /* @__PURE__ */ React.createElement(Ch7Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `The arc of oil option pricing. Each model in the chain was developed to remedy a specific failure of the previous one; QN ends the sequence by delivering a closed-form, trader-calibratable model that captures skew and kurtosis through three market observables \u2014 the ATM straddle, costless collar, and OTM strangle.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "At-the-Money (ATM) Implied Volatility (INV) and Futures Prices" }, `ATM INV, derived from observed option prices, quantifies market expectations of future price fluctuations for options where the strike price equals the current futures price. Its relationship with futures prices reveals underlying price distribution assumptions. Initially, a linear relationship suggests lognormal behavior, with INV and option prices moving proportionally to futures prices, assuming constant Implied Basis Volatility (IBV). However, market observations reveal a more complex, parabolic relationship, particularly at lower prices and during market stress, indicating deviations from lognormality. This deviation is crucial for understanding market dynamics and building more accurate pricing models. For instance, a linear relationship might hold during stable market conditions, but a sharp drop in futures prices could lead to a disproportionately larger increase in INV, reflecting increased fear and uncertainty. This non-linearity necessitates models that can capture these complex relationships.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Market Dynamics and Volatility Drivers" }, `The curvature in the ATM INV vs. futures price relationship stems from multiple factors. Increased financialization introduces speculative pressures, impacting volatility, especially at lower prices, as leveraged positions become more vulnerable to margin calls. Shale oil growth adds supply-side volatility, influencing price dynamics due to its responsiveness to price changes. Storage constraints exacerbate price swings when supply outstrips demand, creating bottlenecks and amplifying price movements. Supply disruptions from geopolitical events or natural disasters increase volatility at higher prices due to limited spare capacity and producer reluctance for long-term investments. These factors interact in complex ways, creating a dynamic and challenging environment for oil price forecasting and risk management.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Volatility Smile and Skew" }, `The volatility smile, representing implied volatility across different strike prices for a given maturity, provides a richer view of market expectations than just ATM volatility. Its shape reflects the market's assessment of probabilities for different price movements. A skew, where out-of-the-money (OTM) put volatilities are higher than OTM call volatilities, suggests the market anticipates larger downside moves than upside moves. This asymmetry is crucial for understanding market sentiment and pricing tail risks. For example, a steep volatility skew might indicate heightened fear of a price crash, leading to higher prices for put options that protect against downside risk.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "IBV and INV Relationship and its Limitations" }, `IBV and INV are linked by the approximation INV \u2248 IBV * (Dollar Moneyness / Logarithmic Moneyness) for OTM options, where Dollar Moneyness is (K/F) and Logarithmic Moneyness is ln(K/F), with K being the strike price and F the futures price. This approximation, highly accurate with errors typically below 0.1% in Black volatilities, simplifies calculations. However, it fails for negative strike prices, where the Black model is inapplicable, making INV the primary volatility benchmark. This highlights the limitations of relying solely on approximations and the need for robust models that handle various market scenarios.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Black and Bachelier Model Comparison" }, `The Black model, assuming lognormal price distribution, and the Bachelier model, assuming normal distribution, offer different perspectives on option pricing. Plotting implied volatility against moneyness (K/F) reveals the "smile." A flat smile would indicate perfect model adherence, but observed curved smiles highlight model limitations. The Black model struggles with negative prices and often misprices deep OTM options, while the Bachelier model, though simpler, can be more accurate for short-term options or assets with limited downside risk.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Black and Bachelier Smile Characteristics" }, `The Black smile is typically asymmetric and skewed, reflecting the lognormal distribution's skewness, implying higher probabilities for large downside moves and lower probabilities for modest upside moves. The Bachelier smile is more symmetric and often parabolic, aligning with the intuition of equal probability for up or down price movements of the same dollar amount. These differences in smile shapes are crucial for understanding the underlying distributional assumptions and their implications for option pricing and hedging.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Delta Interpretation in Normal vs. Lognormal Models" }, `Normal deltas (Bachelier) are more intuitive than lognormal deltas (Black). ATM call and put deltas are +50% and -50% respectively in the Bachelier model, reflecting equal probabilities of price movements. This contrasts with skewed deltas in lognormal models, which can lead to counterintuitive hedging implications. For example, a deep OTM call option in the Black model might have a very small delta, implying minimal price sensitivity, while the corresponding Bachelier delta would be higher, reflecting the possibility of a large price jump.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Fat Tails and Model Limitations" }, `Both Black and Bachelier models struggle to capture "fat tails" \u2013 the higher-than-predicted frequency of large price swings \u2013 evident in the curved wings of volatility smiles. Higher implied volatilities are needed for deep OTM options to match market prices. The upside tail reflects supply disruption risks, while the downside tail reflects negative producer gamma and macroeconomic risks amplified by storage constraints. This inadequacy necessitates models that explicitly account for tail risks.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Model vs. Heuristic" }, `The text distinguishes between a model, which describes the underlying asset's dynamics, and a heuristic, which observes output patterns without understanding the pricing engine. A model allows for consistent derivation of option prices and Greeks, while a heuristic, though potentially useful for short-term predictions, lacks the theoretical foundation for robust risk management. For example, a heuristic might observe that volatility tends to increase after a large price drop, but it cannot explain why or predict the magnitude of the increase.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Generalized Diffusions and Local Volatility" }, `Modeling local volatility as a function of the futures price, \u03C3(F), offers a more sophisticated approach. This involves solving the diffusion equation, which is analytically challenging except for specific cases. Numerical methods are often required, but traders often prefer analytical approximations for transparency and easier Greek calculations. Local volatility models can capture the volatility smile and provide more accurate pricing than constant volatility models.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Perturbation Methods and the Quadratic Normal (QN) Model" }, `The perturbation method provides analytical approximations by starting with a simpler base solution (e.g., Bachelier with constant volatility) and adding a perturbation function to account for deviations. The QN model, motivated by observed parabolic normal smiles, uses a quadratic perturbation function, \u03B5(F) = a + b(F-F0) + c(F-F0)^2, adjusting for variance, skewness, and kurtosis relative to the base distribution. This allows for a closed-form solution and intuitive interpretation of parameters.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "QN Formula, Interpretation, and Advantages" }, `The QN model's closed-form solution involves Bachelier vega and correction terms based on quadratic parameters linked to market observables: ATM straddle, costless collar, and OTM strangle. This offers flexibility in capturing skewness and kurtosis, transparency in parameter interpretation, analytical tractability for Greek calculations, and proven accuracy in modeling oil option prices. It provides a practical and robust alternative to more complex numerical methods.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Extensions of Perturbation Method" }, `The perturbation method can be extended to higher-order polynomials for greater accuracy or applied to the Black model. However, the lognormal case is less robust due to the Black model's inherent limitations. These extensions offer a trade-off between accuracy and complexity, requiring careful consideration of the specific application.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Volatility Term Structure and Exotic Options" }, `OTC options often depend on multiple futures contracts with different maturities, requiring consideration of forward local volatility dynamics. The implied volatility for these options represents an average local volatility over the option's life. Exotic options like Average Price Options (APOs), which depend on the average price over a period, and swaptions, which are options on swaps, require more sophisticated models to capture their path-dependent nature.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The chapter's argument unfolds as a sequence of model failures and responses. Black-Scholes, which prices a European call as <code>C = S N(d1) - K e^{-rT} N(d2)</code> under geometric Brownian motion, delivers a closed-form solution and an entire calculus of Greeks \u2014 but only if the underlying is strictly positive and its volatility constant. Oil satisfies neither: WTI printed negative in April 2020, and its ATM INV moves with F in a distinctly non-proportional way. Bachelier's arithmetic Brownian motion, <code>dF = \u03C3 dW</code>, repairs the negative-price defect and produces deltas that are genuinely symmetric (+50%/-50% ATM), but it still assumes a single flat \u03C3 and so cannot produce any smile at all.`), /* @__PURE__ */ React.createElement(P, null, `Dupire's local volatility answers the smile question by allowing \u03C3 to be a deterministic function of state and time, <code>\u03C3loc(F,t)</code>, and \u2014 via <code>\u03C3loc^2 = 2 (\u2202C/\u2202T) / (K^2 \u2202\xB2C/\u2202K\xB2)</code> \u2014 fits any arbitrage-free European option surface exactly. The cost is paid elsewhere: calibration is unstable against noisy quotes, forward smile dynamics are unrealistic, and extracting analytic Greeks becomes painful. Stochastic volatility models such as SABR replace the deterministic \u03C3(F,t) with a second SDE <code>d\u03B1 = \u03BD \u03B1 dZ</code> correlated to the price process, producing richer tail dynamics at the price of heavier computation and calibration cost.`), /* @__PURE__ */ React.createElement(P, null, `Bouchouev's working answer \u2014 the Quadratic Normal model \u2014 takes the perturbation route. Start from Bachelier as a tractable base and add a quadratic correction <code>\u03B5(F) = a + b(F - F0) + c(F - F0)^2</code> that absorbs variance, skew and kurtosis. Because the base is Bachelier, the closed-form structure survives: the QN price is Bachelier vega multiplied by correction terms whose parameters a, b, c tie one-for-one to three observables traders already quote \u2014 the ATM straddle (level), the costless collar (skew), and the OTM strangle (kurtosis). That market-level interpretability is what has made QN the oil desk's default for skewed, fat-tailed flat-price and OTC books.`), /* @__PURE__ */ React.createElement(P, null, `The book extends from vanillas to term-structure-sensitive products. Any over-the-counter contract whose payoff references more than one futures maturity \u2014 APOs averaging the settlement across a calendar month, swaptions where the underlying is a swap, calendar spread options \u2014 requires forward-local-volatility dynamics, and the implied vol quoted on them is effectively a time-average of the local vol surface along the option's life. QN and its perturbation extensions generalise cleanly here; higher-order polynomial perturbations can sharpen accuracy, though Bouchouev warns that in the lognormal (Black) base the same machinery is less robust.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Theoretical foundations"), /* @__PURE__ */ React.createElement(P, null, `Two axioms underpin every model in the chapter: arbitrage-free pricing \u2014 two portfolios with identical payoffs must carry the same price \u2014 and risk-neutral valuation, under which the price of a derivative equals the discounted expected payoff computed under the risk-neutral measure. These bypass individual risk preferences and let us focus entirely on the dynamics of the underlying. Black-Scholes applies them to geometric Brownian motion and gets a closed-form European price; Bachelier applies them to arithmetic Brownian motion and gets a normal-distribution analogue. Both are valid instantiations; each trades realism for tractability in different ways.`), /* @__PURE__ */ React.createElement(P, null, `The QN model builds on Bachelier's framework by grafting a quadratic perturbation onto the base normal density. Formally this is perturbation theory: one approximates the solution of a hard problem by starting from a solvable neighbour and adding a correction series, here truncated at second order. The quadratic form is not arbitrary \u2014 it is the lowest order that can independently absorb variance (the a term), skewness (b), and kurtosis (c), which are exactly the three stylised facts an oil smile needs to fit.`), /* @__PURE__ */ React.createElement(H4, null, "Historical arc of oil option pricing"), /* @__PURE__ */ React.createElement(P, null, `Oil desks priced options on Black-Scholes well into the 2000s despite visible smile. As shale production, financial participation and storage-driven spikes deepened the smile, the industry migrated through stochastic volatility and jump-diffusion additions \u2014 each step buying realism at the cost of computation and calibration stability. Local volatility (Dupire) then became the surface-fit workhorse, but its sensitivity to noisy quotes and unrealistic forward dynamics limited exotic pricing. The perturbation approach, of which QN is the flagship, emerged as the pragmatic synthesis: analytic enough for real-time risk, expressive enough for the oil smile.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental principles"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "No-arbitrage principle:"), " there should be no opportunity to make a risk-free profit by simultaneously buying and selling assets; this ensures prices are consistent with market dynamics."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Risk-neutral valuation:"), " price derivatives by assuming investors are indifferent to risk and discounting the expected payoff at the risk-free rate, eliminating the need to model individual risk preferences."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Market efficiency:"), " market prices reflect all available information and cannot be consistently outperformed using public information; this underpins model calibration by making quoted prices a reliable estimate of fair value.")), /* @__PURE__ */ React.createElement(H4, null, "Key terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Implied Volatility (INV):"), " the volatility of the underlying implied by a market option price under an assumed pricing model (usually Black-Scholes); not directly observable but backed out from quotes. It is the market's expectation of future vol over the option's life."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Implied Basis Volatility (IBV):"), " implied volatility expressed as a percentage of the futures price; a scale-independent measure obtained by dividing INV by F, enabling comparison across assets and regimes."), /* @__PURE__ createElement(H4, null, "The perturbation method in practice"), /* @__PURE__ */ React.createElement(P, null, `The perturbation method is the engine behind QN. Start with a base solution \u2014 Bachelier at a single \u03C3A \u2014 and Taylor-expand the unknown correction around it. The perturbation <code>\u03B5(F)</code> is chosen to capture the specific stylised facts one wants \u2014 here, skewness and kurtosis of the oil price distribution. Because the base model is closed-form, the correction terms remain closed-form, and the resulting QN price is Bachelier vega times a polynomial correction. This analytical tractability is the method's virtue over pure numerical PDE/Monte Carlo approaches: in-production pricing and Greeks stay transparent.`), /* @__PURE__ */ React.createElement(H4, null, "The QN framework"), /* @__PURE__ */ React.createElement(P, null, `QN's three parameters (a, b, c) and the base vol \u03C3A are not fitted abstractly. They map directly to three liquid market instruments: the ATM straddle pins the level (\u03C3A and a), the costless collar pins the skew (b), and the OTM strangle pins the kurtosis (c). A trader calibrates by matching these three prices and a base vol, producing a surface that is internally consistent and whose Greeks are defined analytically. When the user wants higher accuracy, the perturbation order can be raised; the lognormal (Black) counterpart of the same construction exists but is less robust.`), /* @__PURE__ */ React.createElement(H4, null, "Comparative analysis"), /* @__PURE__ */ React.createElement(P, null, `Black-Scholes suits short-dated ATM pricing in benign regimes. Bachelier suits short-dated options or regimes admitting negative prices, and offers intuitive deltas. Local vol fits a given surface precisely but extrapolates poorly. Stochastic vol (e.g. SABR) captures forward smile dynamics but at computational cost. QN wins in the oil context because it captures the skew and fat tails that matter most while preserving closed-form speed and trader-level interpretability. The choice depends on the trade-off between accuracy and complexity a given desk faces.`), /* @__PURE__ */ React.createElement(H4, null, "QN workflow"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Gather market data:"), " liquidly traded vanilla option prices across strikes and maturities \u2014 enough coverage to pin the smile."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Calibrate parameters:"), " estimate ", /* @__PURE__ */ React.createElement("code", null, "a, b, c, \u03C3A"), " by numerical optimisation (least squares or MLE) against quoted prices."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Price target options:"), " apply the QN formula to the desired vanilla or exotic strike / maturity."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Compute Greeks:"), " delta, gamma, vega, theta, rho \u2014 analytically from the QN form."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Hedge and manage risk:"), " use the Greeks to construct delta-neutral or vega-neutral portfolios against the residual exposure.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths, limits, boundaries"), /* @__PURE__ */ React.createElement(P, null, `QN's strengths \u2014 skewness/kurtosis capture, analytical tractability, link to observables \u2014 come with caveats. The quadratic approximation can undershoot extreme tail events; the assumption that the smile is parabolic may fail in stressed regimes; accuracy tracks calibration quality and data availability. Boundary conditions include the requirement that the underlying cannot be negative (distinct from Bachelier's permissiveness, but reflecting how QN is used in practice) and a smooth, continuous smile without sharp discontinuities.`), /* @__PURE__ */ React.createElement(Ch7Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `The smile in context. A flat constant-sigma model cannot produce the upward-curving wings oil options display every day. The upside wing prices supply-disruption tail risk against limited spare capacity; the downside wing prices producer gamma hedging and storage-amplified crash risk. QN's parabolic perturbation is specifically designed to reproduce this shape analytically.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(H4, null, "Algorithms"), /* @__PURE__ */ React.createElement(P, null, `Two algorithms carry most of the numerical weight. <strong>Bootstrapping local volatility</strong> extracts the <code>\u03C3loc(F,t)</code> surface from the term structure of implied vols by walking from the shortest maturity outward, at each step inverting the recursive relationship between implied variance over <code>[0, T_{n+1}]</code> and the local variance in the new interval <code>[T_n, T_{n+1}]</code>. <strong>QN calibration</strong> minimises (typically a sum-of-squared-errors) objective between model and market prices over <code>(a, b, c, \u03C3A)</code> via gradient descent, Levenberg-Marquardt, or MLE, iterating until the fit tolerance is met.`), /* @__PURE__ */ React.createElement(H4, null, "Complexity"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bootstrapping local vol:"), " time ", /* @__PURE__ */ React.createElement("code", null, "O(N*M)"), " and space ", /* @__PURE__ */ React.createElement("code", null, "O(N*M)") utation over strike/maturity grids, caching of calibrated parameters per curve snapshot, and parallel processing for independent simulations or optimisations. Profiling reveals where attention pays back most.`), /* @__PURE__ */ React.createElement(H4, null, "Common pitfalls"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Overfitting:"), " too-flexible models fit training quotes and fail out-of-sample; counter with simpler functional forms, regularisation, or cross-validation."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Calibration instability:"), " noisy quotes and flat objective regions push optimisers around; counter with robust algorithms, regularisation, or smoothed market data."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Numerical error accumulation:"), " repeated floating-point ops drift; counter with higher precision where needed, careful ordering of operations, and tolerance checks.")), /* @__PURE__ */ React.createElement(H4, null, "Testing, validation, and technical debt"), /* @__PURE__ */ React.createElement(P, null, `Unit tests cover individual modules, integration tests the full pipeline, performance tests scalability. Validation compares model prices and Greeks against market quotes and independent valuations; backtesting assesses hedging P&L versus realised markets. Technical debt accrues when simplifications (e.g., keeping a legacy Black-Scholes path) persist past their usefulness; regular model-governance review keeps the stack honest.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(H4, null, "Use cases"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F. xponent below 0.5, capturing a stylised fact standard SV models miss. <strong>Machine learning for option pricing</strong> applies neural networks and kernel methods to calibration, pricing, and hedging, often trained on model-generated samples and then validated against market quotes. <strong>Multi-factor models</strong> enrich the state space with correlated factors \u2014 rates, commodities, FX \u2014 for products whose payoff spans those dimensions. <strong>Jump-diffusion</strong> adds discontinuous jumps to capture sudden shocks (geopolitical, macro surprises). <strong>L\xE9vy processes</strong> generalise Brownian motion to admit jumps and non-Gaussian increments.`), /* @__PURE__ */ React.createElement(P, null, `Open problems remain \u2014 accurately modelling extreme events, stably calibrating high-dimensional models, and bridging the gap between risk-neutral and physical-measure dynamics. Alternative approaches such as stochastic volatility (treating \u03C3 itself as a random process to capture its time-variation) compete with or complement the perturbation family depending on the product and the market regime.`), /* @__PURE__ */ React.createElement(H3, null, "Summary"), /* @__PURE__ */ React.createElement(P, null, `The chapter's through-line is that oil option pricing demands a model that captures both the non-linear INV-vs-F relationship and the fat-tailed smile \u2014 phenomena driven by financialization, shale elasticity, storage constraints, and geopolitical supply risk. Black-Scholes cannot; Bachelier helps with negative prices and symmetric deltas but not with the smile; local volatility fits any given surface but calibrates unstably; stochastic volatility captures dynamics at computational cost. The Quadratic Normal model ends the chain: by perturbing Bachelier with <code>\u03B5(F) = a + b(F - F0) + c(F - F0)^2</code>, it retains closed-form tractability while absorbing skew and kurtosis, and it ties its parameters directly to three instruments a trader already quotes \u2014 the ATM straddle, costless collar, and OTM strangle. QN is not the theoretical frontier, but it is the practical tool Bouchouev trusts for pricing and hedging real oil option books, and its perturbation machinery extends naturally to the term-structure-sensitive exotics (APOs, swaptions, calendar spreads) that dominate OTC flow.`)), /* @__PURE__ */ React.createElement(Sec, { n: "8", title: "Chapter 8: Advanced Volatility Modeling and Spread Option Pricing in Energy Markets" }, /* @__PURE__ */ React.createElement(P, null, `Constant-volatility models collapse the moment a trader tries to price anything path-dependent or anything that straddles two delivery months. Black-Scholes gives a single number; the oil options market quotes a surface whose shape changes from session to session. Chapter 8 sits at that gap. It begins with the mechanics of prising a time-varying, strike-varying volatility structure out of observed option premia, then shows how that structure feeds the most important instrument class in commodities: the spread option.`), /* @__PURE__ */ React.createElement(P, null, `The method of extraction is volatility bootstrapping. Because an implied volatility <code>v(K,T)</code> is a cumulative average from today to maturity, successive maturities contain information about forward volatility, bucket by bucket. The shortest-dated option's implied vol is taken as the local volatility for that first window; every subsequent local vol is the residual variance once earlier buckets are stripped out. The Dupire equation generalises the same idea across strikes, linking the full local volatility surface <code>\u03C3(S,t)</code> to an infinity of market-observed call prices via a partial differential equation that must be solved numerically and regularised against its ill-posed inverse.`), /* @__PURE__ */ React.createElement(P, null, `A related object, the market-implied probability distribution, falls out almost for free. The second derivative of a call price with respect to strike \u2014 approximated in practice with butterfly spreads \u2014 yields a risk-neutral density that compresses the market's view of the underlying at maturity into a single curve. Sharp local maxima, fat tails, and bimodality that would be invisible in a single implied vol number all become legible.`), /* @__PURE__ */ React.createElement(P, null, `The chapter then pivots to spread options \u2014 calendar spreads, crack spreads, locational spreads \u2014 where correlation-based two-dimensional lognormal models strain against reality. For calendar spread options (CSOs) in particular, the Bachelier model's arithmetic Brownian motion <code>dS = \u03C3 dW</code> is the more honest choice: it admits negative spreads, has a closed-form solution, and sidesteps the unstable correlation inputs that wreck lognormal approaches. The Quadratic Normal extension adds a sticky-smile capability for spreads that periodically dislocate. The practical message throughout is that model choice in energy is driven by what the spread can actually do \u2014 including go negative \u2014 not by theoretical tidiness.`), /* @__PURE__ */ React.createElement(Ch8Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Volatility bootstrapping decomposes cumulative implied variance into time-bucketed local vols. The Dupire equation extends the same idea across strikes. Below the dashed line: the spread-option model spectrum, from the Bachelier baseline to stochastic-volatility extensions.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Volatility Bootstrapping" }, `Volatility bootstrapping is a recursive algorithm used to derive the local volatility term structure from market-observed implied volatilities. It starts with the shortest-maturity option, assuming its implied volatility equals the local volatility for that period. The algorithm then recursively calculates local volatilities for subsequent periods using implied volatilities of longer-maturity options and previously calculated local volatilities. This process effectively decomposes the cumulative measure of implied volatility into its time-dependent components. The significance of bootstrapping lies in its ability to create a local volatility surface consistent with market prices, enabling more accurate pricing of complex derivatives. However, the basic bootstrapping algorithm assumes time-homogeneous volatility, which can be a significant limitation in real markets.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Local Volatility" }, `Local volatility, denoted as <code>\u03C3(S,t)</code>, represents the instantaneous volatility of the underlying asset at a specific price S and time t. Unlike implied volatility, which is an average volatility over the option's life, local volatility captures the dynamic nature of volatility. It is a crucial input for pricing path-dependent options and for understanding the evolution of the underlying asset's price distribution. The local volatility surface, a graphical representation of local volatility across different asset prices and times, provides valuable insights into market expectations of future volatility. Constructing and calibrating this surface is a complex task, often requiring sophisticated numerical techniques.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Implied Volatility" }, `Implied volatility, denoted as <code>v(K,T)</code>, is the market's expectation of average volatility over the option's life until maturity T, for a given strike price K. It is derived from option prices observed in the market. Implied volatility is a key input for many option pricing models, including the Black-Scholes model. The implied volatility surface, a plot of implied volatility across different strikes and maturities, often exhibits a "smile" or "skew," reflecting market sentiment and expectations about future price movements. Understanding the shape and dynamics of the implied volatility surface is crucial for option trading and risk management.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Market-Implied Probability Distribution" }, `This distribution represents the market's view on the future distribution of the underlying asset's price, derived from option prices across different strikes. It is a risk-neutral probability distribution, not a real-world probability distribution. The distribution can be approximated by taking the second derivative of the call option price with respect to the strike price. In practice, this is often done using butterfly spreads. The market-implied probability distribution provides valuable insights into market expectations of future price movements and can be used to identify potential arbitrage opportunities.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Spread Options" }, `These options derive their value from the difference (spread) between two underlying assets. Examples include calendar spreads (different delivery months of the same commodity), crack spreads (crude oil versus refined products), and locational spreads (same commodity in different locations). Pricing spread options requires modeling the joint distribution of the two underlying assets, considering their individual volatilities and correlation. The complexity of these models increases when dealing with non-normal distributions and stochastic volatility.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Calendar Spread Options (CSOs)" }, `A specific type of spread option where the underlying assets are futures contracts with different expiration dates. CSOs are widely used in commodity markets to manage price risk associated with storage and delivery timing. They allow traders to profit from or hedge against changes in the price difference between two futures contracts. Pricing CSOs accurately requires careful consideration of the volatility term structure and the correlation between the two futures contracts.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Volatility Term Structure" }, `This describes the relationship between implied volatility and time to maturity. In many markets, the volatility term structure is upward sloping, meaning longer-dated options have higher implied volatilities. However, in commodity markets, the term structure can be flatter or even downward sloping due to factors like seasonality and storage costs. Understanding the volatility term structure is crucial for pricing CSOs and other derivatives.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Correlation" }, `This statistical measure quantifies the degree to which two asset prices move together. High correlation implies that the assets tend to move in the same direction, while low correlation suggests independent price movements. Correlation is a crucial input in spread option pricing models, but its estimation can be challenging, especially in energy markets where correlations can be unstable.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bachelier Model" }, `This option pricing model assumes that the underlying asset (or spread) follows an arithmetic Brownian motion with constant dollar volatility. It is often preferred for pricing spread options, especially when the spread can be negative, as the Bachelier model allows for negative prices. The model provides a closed-form solution for option prices, making it computationally efficient.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Dupire Equation" }, `This equation establishes a direct link between option prices across all strikes and maturities and the local volatility function. It is a partial differential equation that can be solved numerically to obtain the local volatility surface. The Dupire equ
