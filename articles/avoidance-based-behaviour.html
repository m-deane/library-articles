yle: { maxWidth: 780, margin: "0 auto", padding: "64px 32px 80px" } }, /* @__PURE__ */ React.createElement(DropCap, { letter: "O", rest: "n a cold February morning in 1947, Orval Hobart Mowrer sat in his office at Yale University and wrote the paper that would define how psychology understood avoidance for the next half century. Mowrer was a learning theorist, and the problem he was working on was a paradox that had vexed the field since Pavlov: why do animals \u2014 and people \u2014 keep avoiding things that no longer threaten them? The dog that learned to jump a hurdle to escape electric shock kept jumping long after the electricity was turned off. The soldier who flinched at a car backfire in 1952 had last heard gunfire in 1945. The logic of conditioning predicted extinction. The data showed persistence." }), /* @__PURE__ */ React.createElement(Para, null, "Mowrer's solution was two-factor theory: a proposal that avoidance behaviour is not one thing but two, held together by a relay mechanism operating below the level of conscious awareness. The first factor is classical conditioning \u2014 the neutral stimulus (a sound, a place, a smell) becomes associated with genuine threat, acquiring the capacity to trigger fear. The second factor is operant conditioning \u2014 the avoidance action is learned and maintained because it works: the feared stimulus disappears, the fear subsides, and the relief itself becomes the reinforcing reward. The circuit is elegant, self-sealing, and deeply conservative. Each successful avoidance confirms that the threat would have been real. The test never comes."), /* @__PURE__ */ React.createElement(Para, null, "Mowrer's framework, published in ", /* @__PURE__ */ React.createElement("em", null, "Journal of Experimental Psychology"), ", remains the theoretical skeleton beneath virtually every contemporary clinical model of anxiety. The vocabulary has changed \u2014 negative reinforcement, safety behaviours, experiential avoidance, behavioural inhibition \u2014 but the fundamental mechanism has not. Avoidance persists because it works. It works in the short term. And in the short term of the nervous system, whose timescale for threat evaluation is measured in milliseconds, the short term is the only term that counts."), /* @__PURE__ */ React.createElement(PullQuote, null, '"Avoidance is adaptive given it prevents threat. It becomes maladaptive when it persists in the absence of threat, or generalises to innocuous situations." \u2014 Collabra: Psychology (2023)'), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "The animal from which this mechanism evolved did not have language. It had a body, a threat-detection system, and the need to survive long enough to reproduce. When a predator appeared, the system produced fear; when the animal moved away, the fear subsided; the movement-away was remembered. This is avoidance in its original, adaptive form \u2014 rapid, automatic, and functionally essential. The gazelle that hesitates is the gazelle that is eaten. The capacity to learn threat associations from a single encounter, and to generalise them efficiently to similar stimuli, is a survival advantage of the first order. It is only in the human animal, with its capacity to represent threats symbolically and to anticipate dangers that exist nowhere but in the mind, that this system begins to exceed its design specifications."), /* @__PURE__ */ React.createElement(Para, null, `Human beings can avoid situations they have never encountered, by imagining that those situations will be threatening. They can avoid memories by keeping themselves too busy to be still. They can avoid emotional experiences \u2014 grief, shame, longing, anger \u2014 by drinking, working, scrolling, or dissociating. They can avoid the thought of a thought by substituting a different thought. The distinguished psychologist Steven Hayes, professor at the University of Nevada Reno and developer of Acceptance and Commitment Therapy, has called this capacity "experiential avoidance" \u2014 the attempt to alter the form, frequency, or situational sensitivity of private events (thoughts, feelings, physical sensations, memories) even when doing so is harmful. In Hayes's account, experiential avoidance is not a symptom of a disorder but a fundamental psychological process \u2014 a natural generalisation of the verbal problem-solving capacities that make human beings uniquely effective, applied to the interior world where those capacities are not merely ineffective but counterproductive.`), /* @__PURE__ */ React.createElement("div", { style: { margin: "40px 0 0" } }, /* @__PURE__ */ React.createElement(
