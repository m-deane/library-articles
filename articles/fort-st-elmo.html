to the fort. The \xD7 marks the approximate location where a parapet fragment killed Dragut on 18 June.") }, /* @__PURE__ */ React.createElement(PlanSVG, null)), /* @__PURE__ */ React.createElement("p", null, "The cavalier was, in engineering terms, the fort's backbone. A raised rectangular platform set within the star-shaped perimeter, it elevated the fort's heaviest guns above the main parapet line, creating what military engineers call plunging fire \u2014 the ability to shoot down at attackers who had reached the walls, and outward over the main battlements toward approaching ships or siege batteries. The platform was accessed by an interior ramp from the parade ground below. Its parapet was crenellated with embrasures \u2014 rectangular openings through which cannon barrels projected. The vaulted interior beneath the gun platform served as a bombproof magazine and shelter. In a fort that Ottoman military engineers had estimated would fall in three days, the cavalier extended the defence to twenty-eight \u2014 a miscalculation that cost the besiegers approximately eight thousand dead and the life of their most capable commander."), /* @__PURE__ */ React.createElement(Fig, { caption: /* @__PURE__ */ React.createElement(React.Fragment, null, /* @__PURE__ */ React.createElement("strong", null, "The elevation advantage."), " Cross-section showing the cavalier's raised gun platform above the main fort level. The parapet's embrasures allowed plunging fire over the main walls, commanding both harbours. The ramp provided interior access for resupply under cover. The vaulted interior beneath the platform now houses Heritage Malta's immersive heritage experience, following a \u20AC15.5M restoration.") }, /* @__PURE__ */ React.createElement(SectionSVG, null)), /* @__PURE__ */ React.createElement("div", { className: "pq" }, '"If the child cost us so dear, what will the parent cost?"', /* @__PURE__ */ React.createElement("br", null), /* @__PURE__ */ React.createElement("span
