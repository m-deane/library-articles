s.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(H4, null, "Infinite Mixture Models"), /* @__PURE__ */ React.createElement(P, null, `Infinite mixture models, such as Dirichlet Process Mixture Models (DPMMs), allow the number of components to be inferred from the data rather than fixed in advance.`), /* @__PURE__ */ React.createElement(H4, null, "Hierarchical Mixture Models"), /* @__PURE__ */ React.createElement(P, null, `Hierarchical mixture models allow for sharing information across different groups of data, partially pooling component parameters so that related groups inform one another while retaining group-level distinctions.`), /* @__PURE__ */ React.createElement(H4, null, "Non-parametric Bayesian Methods"), /* @__PURE__ */ React.createElement(P, null, `The Dirichlet Process is a fundamental concept in non-parametric Bayesian methods, which provide flexible models for complex data whose structural dimension is itself uncertain.`), /* @__PURE__ */ React.createElement(H4, null, "Open Problems and Research Directions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, "Developing more efficient inference algorithms for mixture models."), /* @__PURE__ */ React.createElement("li", null, "Extending mixture models to handle more complex data types.")), /* @__PURE__ */ React.createElement(H4, null, "Alternative Approaches"), /* @__PURE__ */ React.createElement(P, null, `Variational inference can be used as an alternative to MCMC for faster inference, trading exactness of the posterior for scalability.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `The chapter delivered a comprehensive treatment of mixture models, covering both finite and infinite mixtures. It explored the theoretical foundations, implementation details, and practical applications of these models, with key concepts \u2014 component distributions, mixing weights, the latent variable, and the Dirichlet Process \u2014 discussed in detail.`), /* @__PURE__ */ React.createElement(P, null, `It also examined methodologies and frameworks for implementing mixture models, including the EM algorithm and Bayesian inference. The strengths and limitations of each approach were compared, and practical considerations for implementation were discussed. Real-world applications were traced through customer segmentation, image segmentation, and anomaly detection.`), /* @__PURE__ */ React.createElement(P, null, `Finally, the chapter ventured into advanced topics such as infinite mixture models, hierarchical mixture models, and non-parametric Bayesian methods, and closed by flagging open problems and research directions in mixture modelling. The material equips the reader with a deep understanding of mixture models and their applications, enabling effective use of these powerful tools for analysing complex data. The emphasis on detailed explanations, practical examples, and implementation considerations ensures a thorough grasp of the material and prepares the reader for advanced research and practical applications in various domains.`)), /* @__PURE__ */ React.createElement(Sec, { n: "5", title: "Advanced Interpretability and Extensions of Bayesian Additive Regression Trees (BART)" }, /* @__PURE__ */ React.createElement(P, null, `Bayesian Additive Regression Trees (BART) enter this chapter as a non-linear, non-parametric workhorse for regression and classification, and the chapter's purpose is to pry open their famous opacity. Because BART expresses the unknown regression function as an additive sum of small, individually weak decision trees, predictions cannot be read off a closed-form coefficient. That opacity is the price of flexibility, and the techniques assembled here \u2014 partial dependence, individual conditional expectation, variable-importance ranking and distributional extensions \u2014 are the tools that buy that flexibility back in the form of interpretable structure.`), /* @__PURE__ */ React.createElement(P, null, `The core move behind <strong>Partial Dependence Plots</strong> is to marginalise every predictor except the one under study, producing a curve that reads as the average effect of that predictor on the prediction. The core move behind <strong>Individual Conditional Expectation</strong> plots is exactly the opposite: hold the other predictors at their per-observation values and draw one curve per row. The two plots answer different questions \u2014 "on average, what does this variable do?" versus "does this variable do the same thing everywhere in covariate space?" \u2014 and, read together, they reveal interactions that either alone would hide.`), /* @__PURE__ */ React.createElement(P, null, `The chapter then broadens the frame in two directions. First, it asks which predictors deserve to be in the model at all, using the frequency with which a variable is chosen as a splitting criterion across the tree ensemble as a native, interpretable importance metric. <code>PyMC-BART</code>'s implementation is engineered to be robust to the number of trees, and its <code>plot_variable_importance</code> function couples the split-count ranking to a principled comparison metric: the squared <strong>Pearson correlation</strong> between full-model and reduced-model predictions. Second, the chapter lifts BART out of its traditional role as a mean estimator. <strong>Distributional BART</strong> lets different parameters of the response distribution \u2014 not only the mean, but also variance, dispersion or shape \u2014 be modelled by their own BART ensembles, suitable for overdispersed counts, heteroskedastic regression and heavier-tailed likelihoods.`), /* @__PURE__ */ React.createElement(P, null, `A final axis of choice \u2014 <strong>constant versus linear response at the leaves</strong> \u2014 governs extrapolation behaviour. Constant-leaf BART is conservatively flat outside the training envelope; linear-leaf BART extrapolates along learned slopes. Neither is universally right, and the chapter presents this as a modelling decision to be made consciously, not defaulted. Throughout, the exposition stays anchored to <code>PyMC-BART</code> and the <strong>PGBART</strong> (Particle Gibbs with Ancestor Sampling) sampler, whose <code>batch</code> and <code>num_particles</code> hyperparameters are exposed for tuning. The result is a practical programme: fit, interpret with PDPs and ICE, prune with variable-importance, extend with distributional parameters, and tune the sampler when convergence or runtime demands it.`), /* @__PURE__ */ React.createElement(Ch5Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `A synthetic depiction of the PDP/ICE duality. Grey curves are per-observation ICE lines \u2014 each is the model's predicted response as x varies, with the observation's other predictors held at their observed values. The heavy orange curve is the PDP, i.e. the across-observation average of the ICE lines. Where the grey lines diverge or cross (right-hand region), an interaction is present that the PDP alone smooths away.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Partial Dependence Plots (PDPs)" }, `Partial Dependence Plots (PDPs) provide a visual representation of the marginal effect of a specific predictor variable on the predicted response variable. They achieve this by averaging out the influence of all other predictor variables, effectively isolating the impact of the chosen predictor. This averaging process allows us to understand how the predicted response changes as we systematically vary the values of the predictor of interest, while holding all other variables constant at their typical values. This is crucial for understanding the isolated contribution of a single variable. For instance, in a model predicting house prices, a PDP for square footage would show the general trend of how house prices change with varying square footage, averaging over the effects of other factors like location and number of bedrooms. However, the key limitation of PDPs lies in the assumption of independence between the predictor being analyzed and all other predictors. If strong correlations exist, the PDP can misrepresent the true relationship. For example, if square footage and number of bedrooms are highly correlated, fixing the number of bedrooms at its average while varying square footage might create unrealistic scenarios, leading to an inaccurate depiction of the relationship between square footage and price.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Individual Conditional Expectation (ICE) Plots" }, `Individual Conditional Expectation (ICE) plots address the independence limitation inherent in PDPs. Instead of averaging the partial effects across all observations, ICE plots display the dependence of the predicted response on a specific predictor for each individual observation in the dataset. Each line in an ICE plot represents the predicted response as a function of the predictor of interest, holding all other predictors at their observed values for that specific observation. This individualized approach allows us to see how the effect of the predictor varies across different contexts defined by the other variables. For example, in the house price prediction model, ICE plots for square footage would show separate lines for each house, revealing how the relationship between square footage and price differs depending on the specific characteristics of each house. Diverging or crossing ICE curves indicate interactions between the predictor of interest and other predictors, a nuance that PDPs often obscure. This detailed, observation-level view provides a more nuanced understanding of the predictor's influence.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Variable Selection in BART" }, `Variable selection is a crucial step in building parsimonious and interpretable models. In the context of BART, variable selection aims to identify the most influential predictors driving the response variable. A common and effective heuristic involves tracking the frequency with which each variable is used as a splitting criterion within the ensemble of decision trees that comprise the BART model. Variables used more frequently for splitting are generally considered more important. This method provides a readily interpretable measure of variable importance, reflecting the contribution of each predictor to the overall model structure. PyMC-BART, a popular implementation of BART, offers robust variable importance estimates that are less sensitive to the number of trees in the model, unlike some other implementations. This robustness simplifies the variable selection process and enhances the reliability of the results.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Distributional BART Models" }, `Traditional BART models primarily focus on predicting the mean, or location, of the response variable's distribution. Distributional BART models extend this framework by allowing for the simultaneous modeling of other distributional parameters, such as variance or dispersion. This enhanced flexibility enables a more comprehensive understanding of the response variable's behavior beyond just its central tendency. For example, in modeling count data with overdispersion, a distributional BART model using a Negative Binomial likelihood can capture both the average count and the variability around that average. This allows for a more accurate representation of the data generating process and more robust predictions. The ability to model different distributional parameters provides a richer and more nuanced understanding of the relationship between predictors and the response.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Constant vs. Linear Response in BART" }, `Standard BART models typically employ constant values at the leaf nodes of the constituent decision trees. This implies that predictions outside the range of the training data will remain constant, potentially limiting the model's ability to extrapolate. PyMC-BART offers the flexibility to use linear functions at the leaf nodes, enabling more dynamic predictions beyond the observed data range. This choice between constant and linear responses at the leaf nodes has significant implications for extrapolation. While constant responses provide stability and prevent unrealistic predictions in regions with sparse data, linear responses allow for more flexible modeling of trends and can be beneficial when extrapolation is necessary. The selection of the appropriate response type depends on the specific application and the expected behavior of the response variable outside the observed data range.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Model Interpretability Techniques" }, `Interpretability is a critical aspect of BART models, especially in applications where understanding the relationship between predictors and the response is paramount. Techniques like PDPs and ICE plots provide valuable insights into the model's behavior. PDPs offer a global perspective on the marginal effect of individual predictors, while ICE plots delve into individual-level effects, revealing potential interactions and heterogeneity. These visual tools enhance transparency and facilitate communication of the model's workings to stakeholders. Furthermore, variable selection methods help identify the most influential predictors, simplifying the model and focusing attention on the key drivers of the response.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Pearson Correlation for Model Comparison" }, `When performing variable selection, comparing the performance of reduced models against the full model is essential. PyMC-BART utilizes the squared Pearson correlation coefficient between the predictions of the full model (including all variables) and submodels (with subsets of variables) as a metric for model comparison. This correlation provides a measure of how well the reduced models capture the predictive power of the full model. By identifying the minimal set of variables that maintains a high correlation with the full model, we can achieve a balance between model simplicity and predictive accuracy. This approach helps avoid overfitting and enhances the interpretability of the final model.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Approximations in Variable Importance Plotting" }, `Visualizing variable importance is crucial for understanding the relative influence of different predictors. However, evaluating all possible combinations of variables can be computationally expensive. PyMC-BART's plot_variable_importance function employs efficient approximations to address this challenge. It uses a sequential variable addition approach, adding variables one at a time based on their importance ranking, rather than exploring all possible subsets. Additionally, it approximates submodels by pruning branches corresponding to excluded variables from the full model's trees, instead of refitting the model for each subset. While these approximations introduce some level of simplification, they significantly reduce computational burden and make variable importance analysis more practical.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Transformations and Initialization in Distributional BART" }, `When modeling parameters with constraints, such as positive values for variance or dispersion parameters, appropriate transformations are necessary. For instance, the exponential transformation can be used to ensure positivity. In distributional BART, these transformations are applied to the parameters being modeled, and the inverse transformations are applied to the observed response values during model initialization. This pre-processing step improves the sampler's ability to explore the parameter space effectively and converge to a good solution. Proper initialization is crucial for efficient and reliable model fitting.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "PGBART Sampler Customization" }, `The Particle Gibbs with Ancestor Sampling (PGAS) algorithm, often referred to as PGBART, is a powerful sampling method used in BART models. PyMC-BART allows customization of the PGBART sampler's hyperparameters through the pgbart argument in pm.sample. The batch parameter controls the proportion of trees updated in each iteration, influencing both computational cost and sampling efficiency. Larger batches can lead to faster convergence but may also increase the risk of getting stuck in local optima. The num_particles parameter controls the number of particles used in the particle Gibbs sampler, affecting the accuracy of the BART sampling. More particles generally lead to more accurate sampling but increase computational demands. Tuning these parameters can significantly impact the performance and efficiency of the sampling process.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `BART's power comes from a deceptively simple decomposition: the unknown regression function is written as the sum of many small trees, each of which contributes only a little, and the Bayesian machinery then puts a regularising prior over the tree structures, the leaf values and the error variance. The result is a model that captures complex non-linearities without any need to hand-craft interaction terms, while simultaneously providing honest posterior uncertainty. This chapter takes that foundation as read and concerns itself with what to do once a BART ensemble has been fit \u2014 how to extract structure from the black box, how to trim it to essentials, and how to extend it when the mean is not enough.`), /* @__PURE__ */ React.createElement(P, null, `The interpretability toolkit is built around two complementary plots. A PDP, computed at a single predictor value, averages the model's prediction over the empirical distribution of every other predictor, yielding a single global curve. An ICE plot, by contrast, keeps the other predictors at their observed values for each row, producing an ensemble of curves \u2014 one per observation \u2014 whose shape tells us whether the predictor's effect is homogeneous or varies by context. Roughly parallel ICE curves confirm the PDP's implicit additivity assumption; crossing or diverging curves reveal interactions that a PDP averages away. Because PDPs implicitly assume the predictor under study is independent of the rest, correlated features can produce PDPs that trace trajectories through regions of covariate space where the training data never go.`), /* @__PURE__ */ React.createElement(P, null, `Variable selection in BART exploits the structure of the ensemble itself. Because trees grow by choosing splitting variables, the frequency with which a variable is selected as a splitting criterion across the posterior serves as a native, tree-native importance score. <code>PyMC-BART</code>'s implementation is explicitly designed so that this score is robust to the number of trees \u2014 an important stability property other BART implementations do not always share. The companion ranking device, <code>plot_variable_importance</code>, does not attempt to evaluate every subset. Instead, it adds variables one at a time in decreasing order of importance and measures how well each sequentially expanded submodel's predictions correlate with the full model's, using the squared <strong>Pearson correlation</strong>. The submodels themselves are approximated by pruning branches that split on excluded variables from the full-model trees, which avoids the cost of refitting at every step.`), /* @__PURE__ */ React.createElement(P, null, `The second strand of the chapter is extension rather than interpretation. Distributional BART places a BART ensemble on more than one parameter of the response distribution, a natural move for overdispersed count data (where a Negative Binomial likelihood with separate BART submodels for mean and dispersion is a good fit) and for heteroskedastic regression. Because the non-location parameters often have constrained supports (variance must be positive, for example), the parameters are typically modelled on an unconstrained scale \u2014 <code>exp(.)</code> is the canonical link for positivity \u2014 and the inverse transformation is applied to the data during initialisation so the sampler starts in a sensible region. The final extension axis \u2014 constant versus linear response at the leaves \u2014 is an extrapolation knob: constant leaves flatten outside the training envelope, linear leaves extrapolate along learned slopes. Put together, these pieces let a BART practitioner fit, interpret, prune and extend without ever leaving <code>PyMC-BART</code>.`), /* @__PURE__ */ React.createElement(Ch5Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `A stylised variable-importance trajectory. Bars show per-variable split frequency (the raw importance metric) in descending order. The overlaid line is the squared Pearson correlation between each sequentially-expanded submodel's predictions and the full model's. Practitioners read the "elbow" \u2014 here around x2 or x3 \u2014 as the point where adding further variables buys little additional correlation with the full model.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Theoretical Foundations of BART"), /* @__PURE__ */ React.createElement(P, null, `BART models are based on the principle of additive regression: the predicted response is a sum of individual tree contributions. The model can be written as <code>y = f(x) + \u03B5 = \u03A3_m g(x; Tm, Mm) + \u03B5</code>, where <code>y</code> is the response, <code>x</code> is the vector of predictors, <code>f(x)</code> is the unknown function being estimated, <code>\u03B5</code> is the error, <code>g(x; Tm, Mm)</code> is the contribution of the m-th tree with structure <code>Tm</code> and leaf parameters <code>Mm</code>, and the sum runs over all m trees in the ensemble.`), /* @__PURE__ */ React.createElement(P, null, `The Bayesian framework places prior distributions over the tree structures, the leaf parameters and the error variance. These priors regularise the model, preventing overfitting and supporting uncertainty quantification. The posterior distribution over the model parameters is obtained using Markov Chain Monte Carlo (MCMC) methods.`), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement(P, null, `Before BART, other tree-based methods such as random forests and boosting existed, but they lacked the rigorous uncertainty quantification provided by the Bayesian framework. BART builds upon these methods by incorporating Bayesian principles, yielding a more robust and interpretable model. Earlier Bayesian approaches to tree-based models often struggled with computational complexity, limiting practical applicability. BART addresses this challenge through efficient sampling algorithms and carefully chosen priors.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles and Axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Additivity:"), " The predicted response is a sum of individual tree contributions."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Regularization:"), " Prior distributions over model parameters prevent overfitting."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bayesian Inference:"), " Posterior distributions provide uncertainty quantification.")), /* @__PURE__ */ React.createElement(H4, null, "Key Terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Tree:"), " A hierarchical structure used to partition the predictor space."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Leaf Node:"), " A terminal node in a tree, associated with a predicted value."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Splitting Rule:"), " A condition used to divide data at a node in a tree."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Ensemble:"), " A collection of trees used to make predictions."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Posterior Distribution:"), " The probability distribution of model parameters given the observed data.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(H4, null, "Partial Dependence Plots (PDPs)"), /* @__PURE__ */ React.createElement(P, null, `PDPs are constructed by systematically varying the values of a single predictor variable across its range and calculating the average predicted response at each value, while holding all other predictors constant at their average or typical values. This process generates a curve depicting the marginal relationship between the predictor and the response. In <code>PyMC-BART</code>, PDPs can be generated using the <code>plot_pdp</code> function.`), /* @__PURE__ */ React.createElement(H4, null, "Individual Conditional Expectation (ICE) Plots"), /* @__PURE__ */ React.createElement(P, null, `ICE plots are generated by plotting the predicted response for each individual observation as the predictor of interest varies across its range, while holding all other predictors at their observed values for that specific observation. This produces multiple lines, one per observation, each showing that observation's individual conditional expectation. Centering the ICE curves \u2014 aligning their starting points \u2014 can enhance interpretability by making deviations across the range of the predictor visually comparable. In <code>PyMC-BART</code>, ICE plots can be generated using the <code>plot_ice</code> function.`), /* @__PURE__ */ React.createElement(H4, null, "Comparative Analysis of PDPs and ICE Plots"), /* @__PURE__ */ React.createElement(P, null, `PDPs provide a concise summary of the average effect of a predictor; ICE plots offer a more detailed view of individual-level effects. If ICE curves are largely parallel, the predictor's effect is approximately independent of the other variables. Crossing or diverging ICE curves indicate interactions, which PDPs would obscure. Practitioners typically read the two plots together: the PDP as a global summary, the ICE panel as the heterogeneity diagnostic.`), /* @__PURE__ */ React.createElement(H4, null, "Workflow for Generating PDPs and ICE Plots"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Fit the BART model:"), " Train the BART model on the dataset."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Select the predictor:"), " Choose the predictor variable for analysis."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Generate the plot:"), " Use the ", /* @__PURE__ */ React.createElement("code", null, "plot_pdp"), " or ", /* @__PURE__ */ React.createElement("code", null, "plot_ice"), " function to create the plot."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Interpret the results:"), " Analyse the plot to understand the predictor's effect.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths and Limitations of PDPs"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Strengths:"), " Simple to understand and visualise; provides a global overview of the marginal effect."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Limitations:"), " Assumes independence between predictors; can be misleading if strong correlations exist.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths and Limitations of ICE Plots"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Strengths:"), " Reveals individual-level effects and interactions; addresses the independence assumption of PDPs."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Limitations:"), " Can be visually complex with many observations; requires careful interpretation.")), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(H4, null, "BART Algorithm Description"), /* @__PURE__ */ React.createElement(P, null, `The BART algorithm constructs an ensemble of decision trees, each contributing a small additive component to the overall prediction. The algorithm iteratively builds and modifies the trees using MCMC methods. At each iteration, a tree is randomly selected and a small change is proposed \u2014 growing or pruning a branch, or changing a splitting rule. The proposal is accepted or rejected via a Metropolis-Hastings step that weighs the likelihood of the data under the new tree structure against the prior over tree structures.`), /* @__PURE__ */ React.createElement(H4, null, "Complexity Analysis"), /* @__PURE__ */ React.createElement(P, null, `The time complexity of BART is primarily determined by the number of trees in the ensemble, the number of MCMC iterations, and the size of the dataset. The space complexity is determined by the size of the trees and the number of posterior samples stored.`), /* @__PURE__ */ React.createElement(H4, null, "Data Flow and Processing Patterns"), /* @__PURE__ */ React.createElement(P, null, `The BART algorithm operates on tabular data in which each row represents an observation and each column represents a predictor variable. This data is used to build and modify the decision trees during the MCMC sampling process.`), /* @__PURE__ */ React.createElement(H4, null, "System Architecture"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Loader:"), " Loads the data into memory."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Sampler:"), " Implements the MCMC algorithm to generate posterior samples."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Tree Builder:"), " Constructs and modifies the decision trees."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Predictor:"), " Generates predictions using the ensemble of trees.")), /* @__PURE__ */ React.createElement(H4, null, "Design Patterns"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Iterator:"), " Used to iterate over the trees in the ensemble."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Composite:"), " Represents the ensemble of trees as a collection of individual trees.")), /* @__PURE__ */ React.createElement(H4, null, "Edge Cases and Exception Handling"), /* @__PURE__ */ React.createElement(P, null, `Edge cases arise when dealing with missing data, categorical variables, or extreme values in the predictors. Appropriate handling mechanisms \u2014 imputation, category-aware splitting rules, or dedicated special-value branches \u2014 are necessary to address these cases.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(H4, null, "Resource Requirements and Constraints"), /* @__PURE__ */ React.createElement(P, null, `The computational resources required for BART depend on the size of the dataset, the number of trees, and the number of MCMC iterations. For large datasets, parallel computing or distributed systems may be necessary.`), /* @__PURE__ */ React.createElement(H4, null, "Scalability and Performance Optimization Techniques"), /* @__PURE__ */ React.createElement(P, null, `Scalability can be improved by using parallel computing to distribute the MCMC sampling process across multiple cores or machines. Performance can be optimised by using efficient data structures and algorithms for tree construction and manipulation. In <code>PyMC-BART</code> specifically, the <strong>PGBART</strong> sampler exposes two load-bearing hyperparameters via the <code>pgbart</code> argument of <code>pm.sample</code>: <code>batch</code>, which sets the proportion of trees updated per iteration, and <code>num_particles</code>, which sets the number of particles used by the Particle Gibbs sampler. Larger batches can speed convergence but risk local optima; more particles improve sampling accuracy at higher computational cost.`), /* @__PURE__ */ React.createElement(H4, null, "Common Pitfalls and Solutions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Overfitting:"), " Use appropriate priors and cross-validation to prevent overfitting."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Slow Convergence:"), " Tune the MCMC sampler parameters and use appropriate initialisation strategies.")), /* @__PURE__ */ React.createElement(H4, null, "Testing and Validation Approaches"), /* @__PURE__ */ React.createElement(P, null, `Cross-validation is a common approach for evaluating the performance of BART models. The dataset is divided into multiple folds; the model is trained on a subset of the folds and tested on the held-out fold, with the process repeated for each fold and performance averaged across folds.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Debt and Maintenance Considerations"), /* @__PURE__ */ React.createElement(P, null, `Technical debt can arise from complex code or neglected documentation. Regular code reviews and refactoring help mitigate it.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(H4, null, "Real-World Use Cases"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Predicting customer churn:"), " BART can predict which customers are likely to churn based on past behaviour and demographics."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Forecasting sales:"), " BART can forecast future sales based on historical data and market trends."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Medical diagnosis:"), " BART can diagnose diseases based on patient symptoms and medical history.")), /* @__PURE__ */ React.createElement(H4, null, "Industry-Specific Applications"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Finance:"), " Credit risk assessment, fraud detection."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Healthcare:"), " Disease prediction, personalised medicine."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Marketing:"), " Targeted advertising, customer segmentation.")), /* @__PURE__ */ React.createElement(H4, null, "Integration with Existing Systems and Technologies"), /* @__PURE__ */ React.createElement(P, null, `BART models can be integrated with existing systems through APIs or by exporting the model to a portable format.`), /* @__PURE__ */ React.createElement(H4, null, "Case Studies"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Case Study 1:"), " A study used BART to predict hospital readmission rates based on patient characteristics and previous medical history."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Case Study 2:"), " A study used BART to model the relationship between air pollution and respiratory illness.")), /* @__PURE__ */ React.createElement(H4, null, "Evaluation Metrics and Success Criteria"), /* @__PURE__ */ React.createElement(P, null, `Common evaluation metrics for BART models include mean squared error (<code>MSE</code>), <code>R^2</code>, and the area under the ROC curve (<code>AUC</code>). The choice of metric depends on the specific application and the nature of the response variable.`), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(P, null, `The summaries identify <code>PyMC-BART</code> \u2014 the BART extension for <code>PyMC</code> \u2014 as the canonical programming context for this chapter. A production workflow typically: (1) constructs a <code>pm.Model</code> context; (2) declares a BART component with <code>pmb.BART("mu", X, Y, m=...)</code>, where <code>m</code> is the number of trees; (3) attaches a likelihood linking the BART mean to the observed response; (4) calls <code>pm.sample(..., pgbart={"batch": ..., "num_particles": ...})</code> to run the PGBART sampler; and (5) uses <code>pmb.plot_pdp</code>, <code>pmb.plot_ice</code> and <code>pmb.plot_variable_importance</code> on the posterior to produce the interpretability artefacts discussed above. Distributional variants replace a single BART component with one BART component per distributional parameter, each on an appropriate unconstrained scale.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(H4, null, "Cutting-Edge Research and Developments"), /* @__PURE__ */ React.createElement(P, null, `Recent research has focused on extending BART to handle high-dimensional data, time series data and survival analysis. New sampling algorithms and prior specifications are being developed to improve the efficiency and scalability of BART.`), /* @__PURE__ */ React.createElement(H4, null, "Extensions to Complex Scenarios"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Hierarchical BART:"), " Extends BART to model data with hierarchical structure, such as nested or longitudinal data."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Spatial BART:"), " Incorporates spatial information into the BART model, useful for applications involving geographical data.")), /* @__PURE__ */ React.createElement(H4, null, "Open Problems and Research Directions"), /* @__PURE__ */ React.createElement(P, null, `Open problems include developing more efficient sampling algorithms for large datasets, handling missing data and categorical variables more effectively, and improving the interpretability of BART models.`), /* @__PURE__ */ React.createElement(H4, null, "Alternative Approaches and Competing Techniques"), /* @__PURE__ */ React.createElement(P, null, `Alternative approaches to non-parametric regression include Gaussian processes, neural networks and kernel methods. Each has its own strengths and limitations, and the choice of method depends on the specific application and the characteristics of the data.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `This chapter has provided a comprehensive treatment of advanced techniques for interpreting and extending BART models. Partial Dependence Plots and Individual Conditional Expectation plots emerged as the core interpretability pairing \u2014 PDPs for the global marginal effect of each predictor, ICE plots for observation-level heterogeneity and interactions the PDP would otherwise smooth away. Variable selection, powered by split-frequency importance and compared against the full model via squared Pearson correlation, lets practitioners prune to a parsimonious predictor set without refitting from scratch.`), /* @__PURE__ */ React.createElement(P, null, `The chapter also widened the BART frame itself. Distributional BART models let several parameters of the response distribution \u2014 mean, variance, dispersion \u2014 be driven by their own BART ensembles, and the constant-versus-linear leaf choice became a deliberate lever over extrapolation behaviour. Throughout, the implementation reference was <code>PyMC-BART</code>, with the PGBART sampler's <code>batch</code> and <code>num_particles</code> exposed as the levers a practitioner tunes when convergence or runtime demands it.`), /* @__PURE__ */ React.createElement(P, null, `The synthesis is practical: once these techniques are in hand, BART is no longer a black box. Practitioners can fit, diagnose, prune, extend and tune \u2014 gaining deeper insight into the relationships their data encode while still enjoying the flexibility and uncertainty quantification that made BART attractive in the first place. The chapter closes by flagging ongoing research in high-dimensional, time-series, survival, hierarchical and spatial extensions, and by noting that open problems around large-scale sampling, missing-data handling and interpretability remain fertile ground for further development.`)), /* @__PURE__ */ React.createElement(Sec, { n: "6", title: "Advanced Regression Techniques with Bayesian Additive Regression Trees (BART) and Markov Chain Monte Carlo (MCMC)" }, /* @__PURE__ */ React.createElement(P, null, `Chapter 6 pivots from the parametric comfort of linear and generalised linear models into a genuinely non-parametric corner of the Bayesian universe: an ensemble of shallow decision trees, each tree small and deliberately weak, whose summed predictions form a flexible regression surface. This is the premise of <strong>Bayesian Additive Regression Trees</strong>, or <strong>BART</strong>, and it is one of the few methods that genuinely delivers on the promise of "flexible modelling with honest uncertainty" without demanding that the analyst pre-specify a functional form.`), /* @__PURE__ */ React.createElement(P, null, `The chapter's central claim is that additivity plus regularisation plus Bayesian inference is a remarkably productive combination. Additivity \u2014 the sum-of-trees structure <code>f(x) = \u03A3_i^m g(x; T_i, M_i)</code> \u2014 lets individual trees specialise on narrow features of the response surface, so that non-linearities and interactions emerge from the ensemble rather than being baked into any single component. Regularisation, enforced through carefully chosen priors over tree structure and over leaf-node parameters, prevents any one tree from dominating and keeps the overall fit smooth. The Bayesian layer turns the whole apparatus into a posterior distribution over function shapes, so that predictions come not as point estimates but as credible intervals.`), /* @__PURE__ */ React.createElement(P, null, `Because the posterior over tree structures is combinatorial and analytically intractable, the chapter leans heavily on <strong>Markov Chain Monte Carlo</strong> as the computational engine. It walks through the Metropolis-Hastings \u2192 Hamiltonian Monte Carlo \u2192 NUTS hierarchy, explaining why modern probabilistic programming tools like <strong>PyMC</strong> and its <strong>PyMC-BART</strong> extension default to gradient-based samplers. The companion constructs <code>MutableData</code>, <code>R-hat</code>, and <code>ESS</code> are introduced as practical infrastructure: <code>MutableData</code> lets the model graph be reused across cross-validation folds; R-hat and ESS diagnose whether the chains have actually reached the stationary distribution they are meant to approximate.`), /* @__PURE__ */ React.createElement(P, null, `The second half of the chapter grounds this in applied settings \u2014 bike-rental forecasting, churn prediction, causal-effect estimation \u2014 and offers an honest accounting of the costs: BART is computationally demanding, prior choice matters, and divergences in HMC/NUTS must be handled, not ignored. By the end, the reader has both a mathematical picture of the sum-of-trees model and a practical PyMC-BART workflow ready to deploy.`), /* @__PURE__ */ React.createElement(Ch6Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Sum-of-trees decomposition: individual shallow trees (grey lines, vertically shifted for clarity) each capture a narrow feature of the response surface. Their sum (orange) approximates the true function (dashed white) without any single tree dominating \u2014 the defining behaviour of a regularised BART ensemble.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bayesian Additive Regression Trees (BART)" }, `BART is a powerful non-parametric Bayesian regression model that utilizes an ensemble of decision trees to estimate complex, non-linear relationships between predictor variables and a response variable. Unlike traditional single-tree models, BART combines the predictions of multiple, relatively shallow trees, each contributing a small, regularized component to the overall prediction. This additive structure allows BART to capture intricate interactions and non-linearities while mitigating the risk of overfitting. The Bayesian framework provides a natural mechanism for uncertainty quantification, offering not just point estimates but also credible intervals for predictions and parameter estimates. This is particularly valuable in real-world applications where understanding the uncertainty associated with predictions is crucial for decision-making. Furthermore, BART's non-parametric nature frees it from strong distributional assumptions about the underlying data-generating process, making it robust to various data patterns.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Sum-of-Trees Model" }, `The core of BART lies in its representation of the unknown function relating predictors to the response as a sum of individual tree predictions: <code>f(x) = \u03A3_i^m g(x; T_i, M_i)</code>. Here, <code>g(x; T_i, M_i)</code> represents the prediction of the i-th tree (<code>T_i</code>) with its associated terminal node parameters (<code>M_i</code>), and <code>m</code> is the total number of trees in the ensemble. This additive structure allows each tree to specialize in capturing specific aspects of the relationship, leading to a flexible and expressive model. The individual trees are typically constrained to be relatively shallow, preventing any single tree from dominating the model and promoting a smooth, well-generalized fit. This additive structure also facilitates parallel computation, as the predictions of individual trees can be calculated independently.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Regularization through Priors" }, `BART employs carefully designed prior distributions to regularize the model and prevent overfitting. These priors encourage the individual trees to be relatively shallow and have small contributions to the overall prediction. Common priors include priors on the tree structure, favoring smaller trees with fewer splits, and priors on the leaf node parameters, shrinking them towards zero. This regularization ensures that no single tree dominates the model and promotes a smooth, well-generalized fit. The choice of priors can significantly impact the model's performance, and prior selection often involves domain expertise or empirical tuning based on cross-validation. For example, a prior that strongly favors shallow trees might be appropriate when dealing with noisy data, while a less restrictive prior might be suitable for data with clear non-linear patterns.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bayesian Inference with MCMC" }, `BART relies on Bayesian inference to estimate the posterior distribution of the model parameters, which include the tree structures and leaf node values. Markov Chain Monte Carlo (MCMC) methods are typically employed to sample from this posterior distribution, as direct computation is often intractable. MCMC constructs a Markov chain whose stationary distribution is the target posterior. By simulating this chain, we obtain samples that represent the posterior distribution, allowing us to estimate parameter values and quantify uncertainty. The choice of MCMC algorithm (e.g., Metropolis-Hastings, Hamiltonian Monte Carlo, NUTS) can significantly impact the efficiency of the sampling process.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "MutableData (PyMC)" }, `Within the context of probabilistic programming frameworks like PyMC, <code>MutableData</code> is a crucial construct for efficiently updating data within a model without recompiling the entire model graph. This is particularly important for techniques like cross-validation, where the training data changes with each fold. <code>MutableData</code> allows for in-place modification of the data used by the model, avoiding the computational overhead of rebuilding the model graph for each data subset. This significantly speeds up the cross-validation process, especially for complex models like BART.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Hyperparameter Tuning (m, Priors)" }, `BART involves several hyperparameters that influence its performance. The number of trees (<code>m</code>) controls the model's flexibility. Higher values of <code>m</code> increase flexibility but also computational cost. The choice of priors on the tree structure and leaf node parameters also affects the degree of regularization. K-fold cross-validation or leave-one-out cross-validation (LOO) are commonly used to select appropriate values for these hyperparameters. These techniques involve evaluating the model's performance on held-out data, allowing for objective comparison of different hyperparameter settings.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Markov Chain" }, `A Markov chain is a stochastic process that transitions between states according to a set of probabilities. In the context of MCMC, the states represent the parameter values, and the transition probabilities are defined by the MCMC algorithm. The key property of a Markov chain is that the next state depends only on the current state, not on the history of previous states. This "memorylessness" simplifies the analysis and implementation of MCMC methods.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Stationary Distribution" }, `The stationary distribution of a Markov chain is a probability distribution that remains unchanged as the chain progresses. In MCMC, the goal is to construct a Markov chain whose stationary distribution is the target posterior distribution. Once the chain reaches its stationary distribution, the samples generated from the chain can be considered representative of the posterior.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Convergence Diagnostics (R-hat, ESS)" }, `Assessing the convergence of MCMC chains is crucial for ensuring reliable results. R-hat (potential scale reduction factor) compares the variance within chains to the variance between chains. Values close to 1 indicate convergence. Effective sample size (ESS) measures the number of effectively independent samples, accounting for autocorrelation. Sufficiently high ESS is necessary for reliable estimates.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Metropolis-Hastings Algorithm" }, `The Metropolis-Hastings algorithm is a widely used MCMC method. It involves proposing new parameter values and accepting or rejecting them based on a probabilistic criterion. The acceptance probability is designed to ensure that the Markov chain converges to the target distribution. The efficiency of Metropolis-Hastings depends on the choice of proposal distribution, which determines how the algorithm explores the parameter space.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Hamiltonian Monte Carlo (HMC)" }, `HMC is a more sophisticated MCMC method that utilizes Hamiltonian dynamics to explore the parameter space more efficiently. It simulates the movement of a particle in the parameter space, using gradient information to guide the sampling process. HMC can handle strong correlations between parameters more effectively than Metropolis-Hastings but requires computing gradients of the target distribution.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "No-U-Turn Sampler (NUTS)" }, `NUTS is an extension of HMC that automatically tunes the step size and number of steps in the Hamiltonian simulation. This eliminates the need for manual tuning, making it more user-friendly and often more efficient than standard HMC. NUTS is particularly well-suited for complex, high-dimensional posterior distributions.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `BART sits at a productive crossroads between tree-based machine learning and Bayesian statistics. Classical tree methods like CART and random forests deliver flexibility and interpretability but struggle to quantify uncertainty honestly; classical Bayesian regression offers principled uncertainty but historically leaned on parametric forms or on computationally expensive Gaussian processes. BART's answer is to replace the single deep tree with an ensemble of shallow ones, each regularised by a prior, and to glue the whole construction together through Bayesian inference. The result is a regression model that captures non-linearities and interactions automatically while still producing full posterior distributions over predictions.`), /* @__PURE__ */ React.createElement(P, null, `The mathematical heart of the method \u2014 <code>f(x) = \u03A3_i^m g(x; T_i, M_i)</code> \u2014 encodes a specific design choice. Each term <code>g(x; T_i, M_i)</code> is the prediction of a single tree with structure <code>T_i</code> and leaf-node values <code>M_i</code>, and because the trees are constrained to be shallow, no single term dominates. Flexibility comes from the ensemble, not from any individual piece. The priors on tree structures (favouring shallow, sparsely-split trees) and on leaf-node parameters (shrunk towards zero) function as an explicit regulariser; they are the Bayesian counterpart of early stopping or depth limits in frequentist boosting.`), /* @__PURE__ */ React.createElement(P, null, `Computation is where BART becomes interesting as an engineering problem. The posterior runs over a discrete, combinatorial object \u2014 the set of tree topologies \u2014 so analytic integration is out of the question. MCMC fills the gap. The chapter contrasts the Metropolis-Hastings proposal-and-accept framework with gradient-based alternatives: Hamiltonian Monte Carlo and its adaptive variant NUTS. Gradient information dramatically improves efficiency in high-dimensional, correlated posteriors, which is exactly the regime BART inhabits. Modern PyMC builds default to NUTS precisely because manual tuning of HMC step sizes is fragile.`), /* @__PURE__ */ React.createElement(P, null, `The practical workflow then wraps these ideas: PyMC-BART provides the model class; <code>MutableData</code> lets the same compiled graph serve multiple cross-validation folds; R-hat and ESS diagnostics confirm the chains have mixed; LOO or k-fold cross-validation selects <code>m</code> and prior hyperparameters. The pay-off is a model that has worked in the wild on bike-rental forecasting, churn prediction, and causal treatment-effect estimation \u2014 three settings where point predictions alone would be dangerously thin.`), /* @__PURE__ */ React.createElement(Ch6Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `MCMC chain mixing over iterations. Four chains (grey lines, left axis) start from different initial values and converge toward a common distribution. The R-hat statistic (orange, right axis) drops from above 1.8 toward the conventional threshold of 1.01, signalling that within-chain and between-chain variance have equalised \u2014 the chains have reached the target posterior.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Complete Theoretical Foundations"), /* @__PURE__ */ React.createElement(P, null, `BART is grounded in Bayesian statistics and decision tree learning. The Bayesian framework provides a principled way to incorporate prior knowledge about the model parameters and update this knowledge based on observed data. The posterior distribution represents the updated beliefs about the parameters after observing the data. Decision tree learning provides a flexible and interpretable way to model complex relationships between variables. BART combines these two frameworks by representing the unknown function relating predictors to the response as a sum of individual tree predictions.`), /* @__PURE__ */ React.createElement(P, null, `Mathematically, the BART model can be expressed as <code>f(x) = \u03A3_i^m g(x; T_i, M_i)</code>, where <code>f(x)</code> is the predicted response for a given set of predictor values <code>x</code>, <code>m</code> is the number of trees in the ensemble, and <code>g(x; T_i, M_i)</code> is the prediction of the i-th tree (<code>T_i</code>) with its associated terminal node parameters (<code>M_i</code>). The prior distributions on the tree structures and leaf node parameters play a crucial role in regularizing the model and preventing overfitting. These priors encourage the individual trees to be relatively shallow and have small contributions to the overall prediction.`), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement(P, null, `Before BART, other tree-based methods like CART and Random Forests were popular for regression tasks. However, these methods lacked the ability to provide uncertainty quantification and were prone to overfitting, especially with complex data. BART emerged as a powerful alternative by combining the flexibility of tree-based models with the rigor of Bayesian inference. Earlier Bayesian approaches to regression, such as Gaussian processes, often struggled with scalability and computational complexity, particularly for high-dimensional data. BART's sum-of-trees structure and efficient MCMC sampling algorithms addressed these limitations, making it a practical and effective tool for Bayesian regression.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles and Axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bayesian Inference:"), " The core principle of Bayesian inference is to update prior beliefs about parameters based on observed data, resulting in a posterior distribution that reflects the updated knowledge."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */
