y. The arrival of <strong>Markov Chain Monte Carlo</strong> \u2014 Metropolis-Hastings, later Hamiltonian Monte Carlo \u2014 broke that ceiling, allowing samples from arbitrarily complex posteriors. Probabilistic programming languages such as PyMC sit on top of MCMC and let the analyst declare the model (priors, likelihood, structure) and hand inference to the machine.`), /* @__PURE__ */ React.createElement(P, null, `The chapter closes its opening argument with a pragmatist's point: Bayesian analysis gives a complete picture of uncertainty. Rather than a point estimate plus a standard error, it delivers a distribution over parameters, which propagates naturally through predictions, risk calculations, and hierarchical structures. The remainder of the book will turn these foundations into usable PyMC code, but Chapter 1's task is to make the reader think probabilistically \u2014 to see every unknown as a random variable whose distribution is the object of interest.`), /* @__PURE__ */ React.createElement(Ch1Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Bayes' update visualised: a diffuse prior (blue) is multiplied pointwise by the likelihood of the observed data (amber), then renormalised to give the posterior (green). The posterior is tighter and shifted toward regions the data supports \u2014 the core mechanic of Bayesian inference.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bayesian vs. Frequentist Statistics" }, `Bayesian statistics fundamentally differs from frequentist statistics in its interpretation of probability and its approach to inference. Frequentists view probability as the long-run frequency of an event, while Bayesians interpret probability as a degree of belief about an event. This difference leads to distinct methodologies. Frequentists rely on <code>p</code>-values and confidence intervals, which are based on hypothetical repeated sampling, while Bayesians focus on posterior distributions, which quantify the updated belief about parameters after observing data. This allows Bayesians to incorporate prior knowledge into their analyses, a key advantage when data is limited or when expert knowledge is available. For example, in drug testing, a Bayesian approach can incorporate prior knowledge about the drug's efficacy from previous studies, leading to more informed conclusions.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bayes' Theorem" }, `This theorem is the cornerstone of Bayesian inference. It provides a mathematical framework for updating prior beliefs about a hypothesis given new evidence. The theorem states: <code>P(H|E) = [P(E|H) * P(H)] / P(E)</code>, where <code>H</code> represents the hypothesis, <code>E</code> represents the evidence, <code>P(H|E)</code> is the posterior probability, <code>P(E|H)</code> is the likelihood, <code>P(H)</code> is the prior probability, and <code>P(E)</code> is the evidence's probability. Bayes' theorem quantifies how observing evidence <code>E</code> changes the belief in hypothesis <code>H</code>. For instance, if <code>H</code> is the hypothesis that a patient has a certain disease, and <code>E</code> is a positive test result, Bayes' theorem allows us to calculate the probability of the patient having the disease given the positive test result, taking into account the prior probability of the disease and the test's accuracy.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Prior Distribution" }, `The prior distribution represents the initial beliefs about the parameters of a statistical model before observing any data. The choice of prior can influence the posterior distribution, especially when data is limited. Different types of priors exist, including <strong>informative priors</strong> (incorporating specific prior knowledge), <strong>weakly informative priors</strong> (providing minimal guidance), and <strong>non-informative priors</strong> (attempting to represent ignorance). For example, when estimating the average height of women, an informative prior might be a normal distribution centered around a known average height, while a non-informative prior might be a uniform distribution over a wide range of heights.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Likelihood Function" }, `The likelihood function quantifies the compatibility of the observed data with different parameter values. It represents the probability of observing the data given specific parameter values. The likelihood function plays a crucial role in Bayesian inference, as it connects the data to the model parameters. For example, in a coin-flipping experiment, the likelihood function would be a binomial distribution, where the parameter is the probability of heads, and the data is the number of heads observed in a series of flips.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Posterior Distribution" }, `The posterior distribution represents the updated beliefs about the parameters after observing the data. It is obtained by applying Bayes' theorem, combining the likelihood function and the prior distribution. The posterior distribution summarizes all the information about the parameters, taking into account both prior knowledge and the observed data. For example, after observing the results of the coin-flipping experiment, the posterior distribution would represent the updated belief about the probability of heads, incorporating both the prior belief and the observed number of heads.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Markov Chain Monte Carlo (MCMC)" }, `MCMC methods are computational algorithms used to approximate the posterior distribution when it cannot be calculated analytically. These methods generate a sequence of random samples from the posterior distribution by constructing a Markov chain whose stationary distribution is the target posterior. Common MCMC algorithms include <strong>Metropolis-Hastings</strong> and <strong>Hamiltonian Monte Carlo</strong>. For example, in complex hierarchical models, MCMC is often necessary to obtain samples from the posterior distribution of the model parameters.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Credible Intervals" }, `Credible intervals are Bayesian counterparts to frequentist confidence intervals. They provide a range of values within which the parameter is believed to lie with a certain probability. For example, a 95% credible interval for a parameter means that there is a 95% probability that the true parameter value falls within that interval, based on the posterior distribution. This interpretation is more intuitive than the frequentist interpretation of confidence intervals.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Posterior Predictive Checks" }, `Posterior predictive checks are a crucial step in Bayesian model validation. They involve simulating new data from the fitted model and comparing it to the observed data. This helps assess whether the model adequately captures the features of the observed data. Discrepancies between the simulated and observed data can indicate model misspecification. For example, if a model for stock prices fails to capture the volatility observed in the real data, posterior predictive checks would reveal this inadequacy.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Model Comparison" }, `Bayesian statistics provides various methods for comparing different models. These include <strong>Bayes factors</strong>, which quantify the relative evidence for one model over another, and information criteria like <strong>WAIC</strong> and <strong>LOO-CV</strong>, which estimate out-of-sample predictive accuracy. Model comparison helps choose the model that best explains the data and generalizes well to new data. For example, when comparing a linear model and a non-linear model for a dataset, model comparison techniques can help determine which model provides a better fit and predictive performance.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Probabilistic Programming" }, `Probabilistic programming languages, such as <strong>PyMC</strong>, allow for expressing statistical models as computer programs. These programs define probability distributions and relationships between variables, enabling efficient inference and model exploration. Probabilistic programming simplifies the implementation of complex Bayesian models and facilitates the use of advanced computational methods like MCMC. For example, using PyMC, one can easily define a hierarchical model for analyzing clinical trial data, specify prior distributions for the treatment effects, and perform inference to estimate the posterior distribution of the effects.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Exploratory Data Analysis (EDA)" }, `EDA is an essential step in any data analysis workflow, including Bayesian analysis. It involves visualizing and summarizing data to understand its underlying patterns, identify potential issues, and guide model selection. Techniques like histograms, scatter plots, and box plots are used to gain insights into the data distribution and relationships between variables. For example, before building a Bayesian model for customer churn, EDA might reveal important factors like customer demographics or purchase history that should be included in the model.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `Bayesian analysis is best understood as a disciplined procedure for turning partial information into quantified belief. Its strength is not an allergy to frequentist tools but its ability to <em>combine</em> prior knowledge with observed data in a way that is mathematically coherent and practically informative. When samples are small, when experts have something to say, or when hierarchical structure is unavoidable, frequentist methods often strain; Bayesian methods, grounded in Bayes' theorem, absorb the structure naturally and return distributions rather than single numbers.`), /* @__PURE__ */ React.createElement(P, null, `The mechanical core is Bayes' theorem. A <strong>prior</strong> encodes what we believed before seeing the data. A <strong>likelihood</strong> scores how compatible each candidate parameter value is with the observations. Their product, renormalised by the marginal evidence, is the <strong>posterior</strong>. Because the posterior is itself a distribution, every downstream quantity \u2014 point estimates, credible intervals, predictions for future observations \u2014 is a deterministic transformation of it. Uncertainty flows through the entire pipeline rather than being appended as a footnote.`), /* @__PURE__ */ React.createElement(P, null, `Historically, this programme was known and loved long before it was computable. Bayes (18th century) and Laplace (late 18th / early 19th century) laid out the logic; conjugate priors gave closed-form posteriors for a narrow zoo of models; everything else was intractable. <strong>Markov Chain Monte Carlo</strong>, arriving in force in the late 20th century, replaced analytic integration with draws from a Markov chain engineered to have the posterior as its stationary distribution. That one computational idea is why Bayesian analysis is now a practical data-science technique rather than a philosophical stance.`), /* @__PURE__ */ React.createElement(P, null, `The modern era layers two further developments on top of MCMC. First, <strong>Hamiltonian Monte Carlo</strong> exploits gradients of the log-posterior to propose moves that are far more likely to be accepted in high-dimensional spaces. Second, <strong>probabilistic programming languages</strong> such as PyMC and Stan let the analyst declare the generative model \u2014 priors, likelihood, deterministic relationships \u2014 and delegate the samplers, the diagnostics, and much of the visualisation. Together they make complex hierarchical, missing-data, and latent-variable models accessible without writing custom samplers.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Complete Theoretical Foundations"), /* @__PURE__ */ React.createElement(P, null, `Bayesian statistics is grounded in probability theory and the concept of <strong>subjective probability</strong>. Probability is interpreted as a degree of belief about an event, rather than a long-run frequency, which allows for incorporating prior knowledge and updating beliefs based on observed data. The core principle is Bayes' theorem, which provides a mathematical framework for updating prior beliefs given new evidence; it relates the prior probability of a hypothesis, the likelihood of observing the data given the hypothesis, and the posterior probability of the hypothesis given the data.`), /* @__PURE__ */ React.createElement(P, null, `The mathematical underpinnings of Bayes' theorem involve <strong>conditional probability</strong> and the <strong>law of total probability</strong>. The prior distribution represents the initial beliefs about the parameters of a statistical model; the likelihood function quantifies the compatibility of the observed data with different parameter values; and the posterior distribution, obtained by applying Bayes' theorem, represents the updated beliefs about the parameters after observing the data. The posterior is a complete summary of the information about the parameters, taking both prior knowledge and the observed data into account.`), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement(P, null, `The origins of Bayesian statistics can be traced back to Thomas Bayes' 18th-century essay, which introduced the concept of <em>inverse probability</em>. Pierre-Simon Laplace further developed these ideas and applied them to a range of problems. Widespread adoption was limited by computational challenges until the late 20th century: Bayesian inference was largely restricted to simple models with <strong>conjugate priors</strong>, where the posterior distribution has the same functional form as the prior. The development of Markov Chain Monte Carlo methods revolutionised the field, enabling approximation of posterior distributions for a wide range of models.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles and Axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Probability as Degree of Belief:"), " probability represents a subjective degree of belief about an event, rather than a long-run frequency, which allows for incorporating prior knowledge and updating beliefs based on data."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bayes' Theorem:"), " provides the mathematical framework for updating prior beliefs given new evidence, via ", /* @__PURE__ */ React.createElement("code", null, "P(H|E) = [P(E|H) * P(H)] / P(E)"), "."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Coherence:"), " probabilistic beliefs should be coherent, meaning they should satisfy the axioms of probability theory.")), /* @__PURE__ */ React.createElement(H4, null, "Key Terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @_  accurate, particularly when the true posterior is complex and cannot be well approximated by the chosen variational family. The choice between MCMC and variational inference depends on the specific problem and the trade-off between accuracy and computational cost.`), /* @__PURE__ */ React.createElement(H4, null, "Workflow Processes and Implementation Steps"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Define the Model:"), " specify the prior distributions, likelihood function, and relationships between variables."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Choose an Inference Engine:"), " select an appropriate MCMC algorithm or variational inference method."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Run the Inference:"), " simulate the Markov chain or optimise the variational objective function."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Diagnose Convergence:"), " assess convergence of the MCMC sampler or of the variational optimisation."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Summarise the Posterior:"), " calculate summary statistics (mean, median, credible intervals) and visualise the posterior."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Validate the Model:"), " perform posterior predictive checks to assess model adequacy."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Perform Model Comparison (if applicable):"), " compare models using Bayes factors or information criteria.")), /* @__PURE__ */ React.createE  /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Metropolis-Hastings:"), " time complexity depends on the complexity of the target distribution and the proposal distribution; space complexity is typically proportional to the number of samples generated."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Hamiltonian Monte Carlo:"), " time complexity is generally lower than Metropolis-Hastings, especially for high-dimensional problems; space complexity is similar to Metropolis-Hastings.")), /* @__PURE__ */ React.createElement(H4, null, "Data Flow and System Architecture"), /* @__PURE__ */ React.createElement(P, null, `Bayesian inference is a cyclical process of updating beliefs based on data. The data is used to calculate the likelihood function, which is combined with the prior distribution via Bayes' theorem to obtain the posterior. MCMC methods generate samples from the posterior, which are then used to estimate parameters and make predictions. A typical inference system consists of four components: a <strong>model specification</strong> component (priors, likelihood, relationships between variables), an <strong>inference engine</strong> (MCMC sampler or variational optimiser), a <strong>diagnostics</strong> component that assesses convergence and reliability, and a <strong>visualisation</strong> component that displays the posterior and summary quantities.`), /* @__PURE__ */ React.createElement(H4, null, "Design Patterns and Edge Cases"), /* @__PURE__ */ React.createElement(P, null, `<strong>Modular design</strong> is crucial for building flexible and reusable Bayesian inference systems: separating model specification, inference engine, diagnostics, and visualisation allows for easy modification and extension. Edge cases arise from <em>improper priors</em>, <em>non-identifiable models</em>, or <em>numerical instability</em> in the MCMC sampler; proper exception-handling mechanisms are essential to detect and address these issues.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(H4, null, "Resources and Scalability"), /* @__PURE__ */ React.createElement(P, null, `Bayesian inference can be computationally intensive, especially for complex models with large datasets; resource requirements depend on model complexity, data size, and chosen inference method, and MCMC methods typically require more computational resources than variational inference. Scalability can be achieved through <strong>parallel computing</strong>, <strong>distributed computing</strong>, and <strong>efficient MCMC algorithms</strong>; performance optimisation techniques include using optimised libraries, <strong>vectorisation</strong>, and efficient data structures.`), /* @__PURE__ */ React.createElement(H4, null, "Common Pitfalls and Solutions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Slow Convergence:"), " solution \u2014 use more efficient MCMC algorithms and tune the sampler parameters."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Non-Identifiability:"), " solution \u2014 reparameterise the model and add informative priors.")), /* @__PURE__ */ React.createElement(H4, null, "Testing, Validation and Maintenance"), /* @__PURE__ */ React.createElement(P, null, `<strong>Posterior predictive checks</strong> are the crucial validation technique: simulated data from the fitted model is compared to observed data to assess model adequacy. Technical debt can arise from using complex models that are difficult to understand and maintain; modular design and clear documentation help mitigate this.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(H4, null, "Real-World Use Cases and Industries"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Spam Filtering:"), " Bayesian methods can classify emails as spam or not based on the words they contain."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Medical Diagnosis:"), " Bayesian methods can diagnose diseases based on patient symptoms and test results."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Finance:"), " Bayesian methods are used for portfolio optimisation, risk management, and fraud detection."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Marketing:"), " Bayesian methods are used for customer segmentation, targeted advertising, and churn prediction.")), /* @__PURE__ */ React.createElement(H4, null, "Integration, Case Studies and Evaluation"), /* @__PURE__ */ React.createElement(P, null, `Bayesian models integrate with existing systems through <strong>APIs</strong> or by embedding within larger applications. A representative case study \u2014 Bayesian methods for spam filtering \u2014 would describe the model, the data, the implementation, and the results. Evaluation metrics for Bayesian models include <strong>predictive accuracy</strong>, <strong>calibration</strong>, and <strong>model complexity</strong>.`), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(H4, null, "Approach, Functions and Data Structures"), /* @__PURE__ */ React.createElement(P, null, `<strong>PyMC</strong> is a popular probabilistic programming language in Python, providing a high-level interface for defining and fitting Bayesian models. The key function <code>pm.sample()</code> performs MCMC sampling to approximate the posterior distribution. The central data structure is <code>pm.Model()</code>, an object that represents a Bayesian model and holds its priors, likelihood, and deterministic relationships.`), /* @__PURE__ */ React.createElement(H4, null, "Algorithmic Patterns and Performance"), /* @__PURE__ */ React.createElement(P, null, `The implementation of <strong>Metropolis-Hastings</strong> involves proposing new parameter values and accepting or rejecting them based on an acceptance probability. For performance, <strong>vectorisation</strong> of operations can significantly improve throughput. For error handling and debugging, <strong>trace plots</strong> visualise the MCMC samples and help identify convergence issues. PyMC integrates readily with other Python libraries for data manipulation, visualisation, and analysis, providing natural integration points into a broader data-science stack.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Variational Autoencoders:"), " a cutting-edge research direction that combines variational inference with deep learning."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Hierarchical Models:"), " an extension of basic concepts that allows information to be shared across different groups or levels of data."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Scalability:"), " an open problem and active area of research \u2014 developing more scalable Bayesian inference methods."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Approximate Bayesian Computation (ABC):"), " an alternative approach providing likelihood-free inference.")), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `Chapter 1 lays the foundation of Bayesian statistics by emphasising its core principles, methodologies, and practical applications. The central takeaway is the shift in perspective from frequentist statistics \u2014 where probability is a long-run frequency \u2014 to Bayesian statistics, where probability represents a <em>degree of belief</em>. This reinterpretation makes it possible to incorporate prior knowledge and to update beliefs based on observed data, yielding more informed and nuanced analyses.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Bayes' theorem</strong> is the cornerstone of Bayesian inference, providing a mathematical framework for updating prior beliefs given new evidence. The chapter introduces the essential trio \u2014 prior distributions, likelihood functions, and posterior distributions \u2014 and stresses that the choice of prior is crucial because it reflects prior knowledge and can shape the posterior, especially when data is limited.`), /* @__PURE__ */ React.createElement(P, null, `Computational methods, particularly <strong>Markov Chain Monte Carlo (MCMC)</strong>, are essential for approximating posterior distributions in models where analytical solutions are intractable. The chapter emphasises diagnosing convergence and validating the model through <strong>posterior predictive checks</strong>. Finally, it previews the breadth of real-world application \u2014 spam filtering, medical diagnosis, finance, marketing \u2014 setting up the remainder of the book as a practical guide to deploying these ideas in PyMC on concrete problems.`)), /* @__PURE__ */ React.createElement(Sec, { n: "2", title: "Bayesian Regression Modeling and Model Comparison" }, /* @__PURE__ */ React.createElement(P, null, `Regression is where Bayesian thinking earns its keep. A frequentist line through noisy data returns a single intercept and slope with a confidence interval that most practitioners quietly misinterpret. A Bayesian regression, by contrast, returns a <em>distribution</em> over every parameter \u2014 a joint posterior that propagates cleanly through predictions, residual checks, and decisions made downstream. Chapter 2 of Martin's <em>Bayesian Analysis with Python</em> (third edition) uses this shift of emphasis as a scaffold on which to hang a surprisingly broad agenda: linear regression, regularisation (Ridge, Lasso, the Horseshoe prior), generalised linear models for binary and count data, robust regression via Student's t, hierarchical (multilevel) models, and the full apparatus of model comparison \u2014 WAIC, LOO, Bayes factors, and model averaging.`), /* @__PURE__ */ React.createElement(P, null, `The chapter's organising insight is that every regression decision has a Bayesian analogue which is simultaneously more honest and more work. Choosing an L2 penalty becomes choosing a Gaussian prior on coefficients. Picking a link function becomes encoding how the expected value of the likelihood is constrained. Selecting among competing models becomes computing expected log predictive density on held-out data \u2014 or ratios of marginal likelihoods. Each choice forces the modeller to state assumptions that would otherwise hide in a regulariser's hyperparameter or a canned <code>glm()</code> default.`), /* @__PURE__ */ React.createElement(P, null, `Two tools anchor the practical discussion: <strong>PyMC</strong> as the low-level probabilistic programming language, and <strong>Bambi</strong> as a high-level formula-style wrapper on top of it. ArviZ handles posterior diagnostics and comparison plots. Together they mirror the <code>statsmodels</code> / <code>scikit-learn</code> duality of the frequentist world, but with first-class support for priors, hierarchical structure, and posterior predictive simulation. The chapter is deliberately example-led \u2014 every methodological idea arrives with a small synthetic dataset, a PyMC model block, a trace plot, and a posterior summary \u2014 because Bayesian regression is the kind of subject where the computation <em>is</em> the understanding.`), Ch2Vis1(), /* @__PURE__ */ React.createElement(Cap, null, `Prior, likelihood, and posterior for a one-dimensional regression coefficient. The posterior is narrower than either component and sits between them, weighted toward the likelihood when data are informative.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bayesian Inference" }, `Bayesian inference is a statistical paradigm that quantifies uncertainty about model parameters and predictions using probability distributions. Unlike frequentist methods that focus on point estimates and p-values, Bayesian inference provides a full posterior distribution, representing updated beliefs about the parameters after observing the data. This posterior distribution allows for probabilistic statements about the parameters and facilitates uncertainty quantification in predictions. For example, instead of just estimating the average height of a population, Bayesian inference provides a distribution of plausible heights, allowing us to quantify the probability that the average height falls within a specific range.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Regularization" }, `Overfitting occurs when a model is too complex and captures noise in the training data, leading to poor generalization performance on unseen data. Regularization techniques mitigate overfitting by adding penalties to model complexity, effectively shrinking parameter estimates towards zero. This bias towards simpler models improves predictive accuracy on new data. Common regularization techniques include Ridge regression (L2 penalty), Lasso regression (L1 penalty), and the Horseshoe prior, each offering different shrinkage properties and variable selection capabilities. For instance, Lasso can drive some coefficients to exactly zero, effectively performing variable selection, while Ridge shrinks all coefficients towards zero without eliminating any.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Model Comparison" }, `Selecting the "best" model among competing candidates is crucial for accurate prediction and inference. Model comparison techniques balance model fit (how well the model explains the observed data) and model complexity (the number of parameters or the flexibility of the model). Information criteria (AIC, WAIC, LOO), cross-validation, and Bayes factors are common methods for comparing models, each with its own strengths and limitations. For example, WAIC is a Bayesian information criterion that uses the entire posterior distribution, while LOO approximates leave-one-out cross-validation, providing a robust estimate of out-of-sample predictive accuracy.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Hierarchical Modeling" }, `Hierarchical models, also known as multilevel models, are designed for analyzing nested or grouped data structures. They allow for variations at different levels of the hierarchy, capturing both within-group and between-group variability. For instance, in a study of student performance within schools, a hierarchical model can account for variation between students within the same school and variation between schools. This structure facilitates "borrowing strength" across groups, leading to more stable and reliable estimates, especially for groups with limited data.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Generalized Linear Models (GLMs)" }, `GLMs extend linear models to accommodate different types of outcome variables (e.g., binary, count, continuous) by using appropriate likelihood distributions and link functions. The link function transforms the linear predictor to match the domain of the likelihood distribution's parameter. For example, in logistic regression, the logit link function maps the linear predictor to the log-odds of the outcome, which can then be transformed to a probability using the logistic function. This allows for modeling non-linear relationships between predictors and outcomes.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Robust Regression" }, `Outliers can significantly influence ordinary least squares regression. Robust regression techniques mitigate this influence by using heavy-tailed distributions like the Student's t-distribution. These distributions assign less weight to extreme values, making the model less sensitive to outliers. The degrees of freedom parameter of the Student's t-distribution controls the tail heaviness, allowing for flexible modeling of outlier robustness.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Posterior Predictive Checks (PPCs)" }, `PPCs assess model adequacy by comparing observed data to data simulated from the posterior predictive distribution. This helps evaluate whether the model can generate data similar to the observed data, providing a visual and quantitative assessment of model fit. Discrepancies between observed and simulated data can indicate model misspecification. For example, if the observed data has heavier tails than the simulated data, it suggests that the model's likelihood distribution might not be appropriate.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Information Criteria" }, `Information criteria, such as AIC, WAIC, and LOO, are metrics that balance model fit and complexity to estimate out-of-sample predictive accuracy. WAIC is a Bayesian information criterion that uses the entire posterior distribution, while LOO approximates leave-one-out cross-validation. These criteria provide a single number for comparing models, with lower values indicating better predictive performance.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bayes Factors" }, `Bayes factors quantify the relative evidence for two competing models by computing the ratio of their marginal likelihoods. They provide a principled way to compare models based on Bayesian evidence, with larger Bayes factors indicating stronger support for one model over another. However, Bayes factors can be sensitive to prior specifications and computationally challenging to compute accurately.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Model Averaging" }, `Instead of selecting a single "best" model, model averaging combines predictions from multiple models, weighted by their relative performance (e.g., using weights derived from Bayes factors or information criteria). This approach acknowledges uncertainty in model selection and can lead to more robust predictions.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Probabilistic Programming" }, `Probabilistic programming languages (PPLs), such as PyMC, provide a framework for expressing statistical models as computer programs. This allows for flexible model specification, automatic inference using MCMC methods, and seamless integration with other tools for posterior analysis and visualization.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The chapter is organised as a progression from the familiar to the specialised. It opens with Bayesian linear regression as an anchor: the same additive-Gaussian model beginners meet in a first statistics class, but reformulated so every parameter carries a prior and every prediction carries a posterior predictive interval. Martin uses this setting to make two points that reverberate through the rest of the chapter. First, prior specification is a modelling decision that deserves the same care as choosing a likelihood \u2014 weakly informative priors keep inference stable without overwhelming the data. Second, MCMC is not a black box; trace plots, R-hat values, and effective sample sizes are as diagnostic of a fit as a residual plot is in OLS.`), /* @__PURE__ */ React.createElement(P, null, `From the linear baseline the narrative branches into three directions. One branch covers <strong>regularisation</strong>: Ridge and Lasso are shown to be equivalent to Gaussian and Laplace priors on the coefficients respectively, and the Horseshoe prior is introduced as a more sophisticated sparsity-inducing device that shrinks small coefficients aggressively while leaving genuine signals almost unshrunk. A second branch covers <strong>likelihood choice</strong>: Student's t for robust regression, Bernoulli-with-logit for logistic regression, Poisson and Negative Binomial for counts. A third branch covers <strong>structure</strong>: hierarchical models for grouped data, where group-level intercepts and slopes inherit from a higher-level hyper-prior, yielding the partial pooling behaviour that makes Bayesian multilevel models so distinctive.`), /* @__PURE__ */ React.createElement(P, null, `Model comparison is then treated as a first-class activity rather than an afterthought. The chapter distinguishes between information criteria (WAIC and LOO, both estimating expected log predictive density), cross-validation (of which LOO is a Pareto-smoothed approximation), and Bayes factors (ratios of marginal likelihoods sensitive to prior volume). Model averaging via stacking or pseudo-BMA is presented as the pragmatic conclusion: when several models are plausible, weight their predictions by predictive performance rather than pretending one is correct.`), /* @__PURE__ */ React.createElement(P, null, `The theoretical spine is Bayes' theorem, <code>P(theta|y) proportional to P(y|theta) * P(theta)</code>, operationalised via MCMC \u2014 historically Metropolis-Hastings and Gibbs, but in modern PyMC the default is the No-U-Turn Sampler, a self-tuning Hamiltonian Monte Carlo variant. Practically, every example in the chapter follows the same loop: write the model, sample, diagnose, posterior-predictive-check, compare. This loop is the unifying contribution \u2014 a workflow rather than a recipe.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Theoretical Foundations"), /* @__PURE__ */ React.createElement(P, null, `Bayesian regression models are built upon the foundation of Bayes' theorem, which provides a framework for updating prior beliefs about model parameters with observed data. The theorem states <code>P(theta|y) = [P(y|theta) * P(theta)] / P(y)</code>, where <code>P(theta|y)</code> is the posterior distribution of the model parameters theta given the observed data y, <code>P(y|theta)</code> is the likelihood function representing the probability of observing the data y given the parameters theta, <code>P(theta)</code> is the prior distribution representing prior beliefs about the parameters theta, and <code>P(y)</code> is the marginal likelihood, which acts as a normalizing constant. The likelihood function quantifies how well different parameter values explain the observed data. The prior distribution encapsulates prior knowledge or assumptions about the parameters. The posterior distribution combines the information from the likelihood and the prior, providing a comprehensive representation of uncertainty about the parameters after observing the data. In the context of linear regression, the likelihood function is typically assumed to be a normal distribution, reflecting the assumption that the errors are normally distributed. The prior distribution for the regression coefficients can be chosen based on prior knowledge or assumptions about the relationship between the predictors and the outcome; common choices include normal distributions, Laplace distributions, and Horseshoe priors.`), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement(P, null, `Before the widespread adoption of Bayesian methods, frequentist approaches dominated statistical modeling. Frequentist methods focus on point estimates and p-values, providing a different perspective on statistical inference. However, frequentist methods can be challenging to interpret in the context of uncertainty quantification and can be less flexible than Bayesian methods in handling complex model structures. The development of MCMC methods in the late 20th century revolutionized Bayesian computation, making it feasible to fit complex models and obtain accurate approximations of posterior distributions. MCMC algorithms, such as the Metropolis-Hastings algorithm and the Gibbs sampler, generate a sequence of samples that converge to the target posterior distribution. These samples allow us to approximate the posterior distribution and calculate various quantities of interest, such as the mean, credible intervals, and quantiles.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles and Axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bayes' Theorem:"), " The cornerstone of Bayesian inference, providing the framework for updating prior beliefs with data."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Probability Axioms:"), " The fundamental rules governing probability calculations, ensuring that probabilities are non-negative, sum to one, and satisfy other essential properties."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Exchangeability:"), " The assumption that the order of observations within a group does not matter, which is often invoked in hierarchical modeling.")), /* @__PURE__ */ React.createElement(H4, null, "Key Terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Posterior Distribution:"), " The probability distribution of the model parameters after observing the data. It represents updated beliefs about the parameters, combining prior information with the likelihood of the data. The posterior distribution is the central object of interest in Bayesian inference. It provides a complete picture of the uncertainty about the parameters, allowing for probabilistic statements and interval estimations."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Prior Distribution:"), " The probability distribution representing initial beliefs about the model parameters before observing any data. The prior distribution can be informative, reflecting strong prior knowledge, or non-informative, representing a lack of strong prior beliefs. The choice of prior can influence the posterior distribution, especially when data is limited."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Likelihood Function:"), " The probability of observing the data given specific values of the model parameters. The likelihood function quantifies how well different parameter values explain the observed data. It plays a crucial role in Bayesian inference, connecting the data to the model parameters."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Marginal Likelihood:"), " The probability of observing the data, averaged over all possible values of the model parameters. The marginal likelihood acts as a normalizing constant in Bayes' theorem, ensuring that the posterior distribution is a proper probability distribution. It is also used in Bayes factors for model comparison."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Hyperparameter:"), " A parameter of a prior distribution. Hyperparameters control the shape and scale of the prior distribution, influencing the amount of regularization or shrinkage in the model. In hierarchical models, hyperparameters govern the distribution of group-level parameters."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Hyperprior:"), " A prior distribution placed on a hyperparameter. Hyperpriors allow for learning about the hyperparameters from the data, adding another level of flexibility to the model."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Credible Interval (HDI):"), " A range of values that contains a specified percentage of the posterior probability mass. The HDI provides a measure of uncertainty about the parameter estimates. A 95% HDI, for example, contains the values that have the highest posterior density and account for 95% of the total probability mass."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Region of Practical Equivalence (ROPE):"), " A pre-defined range of parameter values considered practically insignificant for the research question. The ROPE is used to assess the practical significance of the estimated effects. If the HDI falls entirely within the ROPE, it suggests that the estimated effect is practically insignificant."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Effective Number of Parameters (p_loo, p_waic):"), " Metrics that estimate the effective number of parameters used by the model, considering the influence of the prior and the data. These metrics are used in information criteria for model comparison. A higher effective number of parameters indicates a more complex model.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(H4, null, "Bayesian Linear Regression"), /* @__PURE__ */ React.createElement(P, null, `Bayesian linear regression extends classical linear regression by treating the model parameters as random variables and quantifying uncertainty using probability distributions. The model is typically specified as <code>y = alpha + beta*x + epsilon</code>, where y is the outcome variable, x is the predictor variable, alpha is the intercept, beta is the slope, and epsilon is the error term, typically assumed to be normally distributed with mean zero and standard deviation sigma. Priors are placed on the parameters alpha, beta, and sigma. The posterior distribution of the parameters is then obtained using Bayes' theorem and MCMC sampling.`), /* @__PURE__ */ React.createElement(H4, null, "Generalized Linear Models (GLMs)"), /* @__PURE__ */ React.createElement(P, null, `GLMs extend linear models to accommodate different types of outcome variables by using appropriate likelihood distributions and link functions. The general structure of a GLM is <code>g(E(y)) = alpha + beta*x</code>, where <code>g()</code> is the link function and <code>E(y)</code> is the expected value of the outcome variable. Examples of GLMs include <strong>Logistic Regression</strong>, used for binary outcomes with the logit link function; <strong>Poisson Regression</strong>, used for count data with the log link function; and <strong>Negative Binomial Regression</strong>, used for overdispersed count data with the log link function.`), /* @__PURE__ */ React.createElement(H4, null, "Robust Regression"), /* @__PURE__ */ React.createElement(P, null, `Robust regression techniques, such as using the Student's t-distribution as the likelihood, mitigate the influence of outliers. The Student's t-distribution has heavier tails than the normal distribution, assigning less weight to extreme values. The degrees of freedom parameter controls tail heaviness, and as it grows the distribution approaches a Gaussian \u2014 giving a continuous dial between robust and standard behaviour.`), /* @__PURE__ */ React.createElement(H4, null, "Hierarchical Linear Regression"), /* @__PURE__ */ React.createElement(P, null, `Hierarchical linear regression models are used for analyzing nested or grouped data structures. They allow for variations at different levels of the hierarchy, capturing both within-group and between-group variability. The model can be specified as <code>y_ij = alpha_j + beta_j * x_ij + epsilon_ij</code> with <code>alpha_j = alpha + u_j</code> and <code>beta_j = beta + v_j</code>, where <code>y_ij</code> is the outcome for observation i in group j, <code>x_ij</code> is the predictor for observation i in group j, <code>alpha_j</code> and <code>beta_j</code> are the group-specific intercept and slope, alpha and beta are the overall intercept and slope, and <code>u_j</code> and <code>v_j</code> are the group-specific deviations from the overall intercept and slope. Priors are placed on the overall parameters alpha and beta, as well as on the variances of the group-specific deviations.`), /* @__PURE__ */ React.createElement(H4, null, "Comparative Analysis of Methodological Approaches"), /* @__PURE__ */ React.createElement(P, null, `The choice of regression method depends on the specific research question and the characteristics of the data. Linear regression is appropriate when the outcome variable is continuous and the relationship with the predictors is linear. GLMs are used when the outcome variable is not continuous or the relationship is non-linear. Robust regression is used when outliers are present. Hierarchical linear regression is used when the data has a nested or grouped structure.`), /* @__PURE__ */ React.createElement(H4, null, "Workflow Processes and Implementation Steps"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Preparation:"), " Clean and pre-process the data, including handling missing values and transforming variables as needed."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Model Specification:"), " Define the model using PyMC or Bambi, specifying the likelihood function, prior distributions, and any hierarchical structure."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "MCMC Sampling:"), " Perform MCMC sampling to obtain samples from the posterior distribution."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Posterior Analysis:"), " Analyze the posterior distribution using visualizations and summary statistics."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Model Comparison:"), " Compare different models using information criteria, cross-validation, or Bayes factors."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Prediction:"), " Generate predictions on new data using the fitted model.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths, Limitations, and Boundary Conditions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bayesian Linear Regression:"), " Flexible and can incorporate prior knowledge. Assumes linearity and normality of errors."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "GLMs:"), " Can handle different data types. Requires careful choice of link function and likelihood distribution."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Robust Regression:"), " Less sensitive to outliers. Can be computationally more demanding."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Hierarchical Linear Regression:"), " Accounts for nested data structures. Can be complex to specify and interpret.")), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(H4, null, "Detailed Algorithm Descriptions and Properties"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Metropolis-Hastings Algorithm:"), " A general-purpose MCMC algorithm that can sample from any probability distribution. It involves proposing new parameter values and accepting or rejecting them based on an acceptance probability."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Gibbs Sampler:"), " An MCMC algorithm that samples from the conditional distribution of each parameter given the other parameters. It is particularly efficient when the conditional distributions are easy to sample from."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "No-U-Turn Sampler (NUTS):"), " An efficient MCMC algorithm that automatically tunes the step size and adapts to the geometry of the posterior distribution. It is often the default sampler in PyMC.")), /* @__PURE__ */ React.createElement(H4, null, "Complexity Analysis (Time and Space)"), /* @__PURE__ */ React.createElement(P, null, `The computational complexity of MCMC methods depends on the specific algorithm and the complexity of the model. In general, MCMC methods can be computationally intensive, especially for complex models with many parameters. Modern Hamiltonian approaches like NUTS scale substantially better than random-walk Metropolis in high dimensions, because they exploit gradient information to take longer, informed steps \u2014 but each iteration requires gradient evaluations of the full log-posterior, which ties cost to dataset size.`), /* @__PURE__ */ React.createElement(H4, null, "Data Flow and Processing Patterns"), /* @__PURE__ */ React.createElement(P, null, `The data flow in Bayesian regression involves loading the data, specifying the model, performing MCMC sampling, analyzing the posterior distribution, and generating predictions. The output of <code>pm.sample()</code> is an ArviZ <code>InferenceData</code> object, which structures draws into chains, draws, and posterior/posterior-predictive/observed-data groups \u2014 a standardised container that every downstream diagnostic and plot function in the ecosystem expects.`), Ch2Vis2(), /* @__PURE__ */ React.createElement(Cap, null, `Model comparison plot in the style of ArviZ: expected log predictive density (elpd_loo) with standard errors across five candidate regressions. Higher is better; the hierarchical model leads but the robust-t alternative is within one standard error.`), /* @__PURE__ */ React.createElement(H4, null, "System Architecture with Component Interactions"), /* @__PURE__ */ React.createElement(P, null, `PyMC and Bambi provide the framework for specifying and fitting Bayesian models. ArviZ is used for posterior analysis and visualization. Other libraries, such as NumPy and Pandas, are used for data manipulation. Bambi sits above PyMC and compiles formulas like <code>y ~ x1 + x2 + (1|group)</code> into PyMC model objects, which are then sampled and handed to ArviZ for diagnostics \u2014 a layered architecture that lets users move between convenience and expressiveness without changing tools.`), /* @__PURE__ */ React.createElement(H4, null, "Design Patterns and Architectural Considerations"), /* @__PURE__ */ React.createElement(P, null, `Modular design and code reusability are important considerations when implementing Bayesian regression models. Separating data loading, model construction, sampling, and diagnostics into distinct functions pays off when iterating \u2014 the same model-building function can be reused across priors or likelihoods, and the same diagnostic pipeline can be reused across models.`), /* @__PURE__ */ React.createElement(H4, null, "Edge Cases and Exception Handling"), /* @__PURE__ */ React.createElement(P, null, `Handling missing data, outliers, and other data irregularities is crucial for robust model fitting. PyMC supports partial observations via <code>observed</code> masks, outliers are handled through heavier-tailed likelihoods rather than ad hoc removal, and pathological posteriors announce themselves through divergences and R-hat values rather than silently producing wrong answers.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(H4, null, "Resource Requirements and Constraints"), /* @__PURE__ */ React.createElement(P, null, `MCMC methods can be computationally intensive, requiring sufficient computational resources, especially for complex models or large datasets. Memory grows with dataset size (the gradient evaluation pass) and with the number of draws retained (chains x draws x parameters, all stored as float64 by default).`), /* @__PURE__ */ React.createElement(H4, null, "Scalability and Performance Optimization Techniques"), /* @__PURE__ */ React.createElement(P, null, `Various techniques can be used to optimize the performance of MCMC sampling, such as using efficient samplers like NUTS, parallelizing computations across chains, and using vectorized operations rather than Python loops inside model construction. For genuinely large datasets, variational inference or mini-batched ADVI becomes a pragmatic alternative to full-data HMC.`), /* @__PURE__ */ React.createElement(H4, null, "Common Pitfalls and Solutions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Divergences in MCMC sampling:"), " Indicate problems with the sampler exploring the posterior distribution. Solutions include increasing the ", /* @__PURE__ */ React.createElement("code", null, "target_accept"), " parameter in ", /* @__PURE__ */ React.createElement("code", null, "pm.sample()"), " or reparametrizing the model (e.g. non-centred parameterisation in hierarchical models)."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Slow mixing:"), " Indicates that the sampler is not exploring the posterior distribution efficiently. Solutions include using more informative priors or changing the sampling algorithm.")), /* @__PURE__ */ React.createElement(H4, null, "Testing and Validation Approaches"), /* @__PURE__ */ React.createElement(P, null, `Posterior predictive checks and cross-validation are essential for assessing model fit and validating the model's predictive accuracy. A disciplined workflow runs PPCs before trusting any posterior, uses <code>az.compare()</code> across candidate models, and reserves a held-out set when the dataset is large enough to spare one.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Debt and Maintenance Considerations"), /* @__PURE__ */ React.createElement(P, null, `Well-documented and modular code is essential for maintaining and updating Bayesian regression models. Pinning PyMC and ArviZ versions matters \u2014 minor releases occasionally change sampler defaults, prior naming conventions, or diagnostic thresholds in ways that shift reproducibility.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(H4, null, "Real-World Use Cases with Implementation Scenarios"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Predicting customer churn:"), " A logistic regression model can be used to predict the probability of a customer churning based on their demographics, purchase history, and other relevant factors."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Modeling disease risk:"), " A logistic regression model can be used to predict the probability of developing a disease based on genetic factors, lifestyle choices, and environmental exposures."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Estimating the effect of a marketing campaign:"), " A linear regression model can be used to estimate the effect of a marketing campaign on sales, controlling for other factors such as seasonality and economic conditions.")), /* @__PURE__ */ React.createElement(H4, null, "Industry-Specific Applications and Adaptations"), /* @__PURE__ */ React.createElement(P, null, `Bayesian regression methods are used in various industries, including finance (credit scoring, risk models with tail sensitivity), healthcare (hierarchical trial analysis, disease-risk prediction), marketing (churn, attribution, uplift modelling), and environmental science (spatial regressions with non-Gaussian likelihoods). Each adaptation typically amounts to a different likelihood choice, a different hierarchical structure, or a different prior family \u2014 the inference machinery is unchanged.`), /* @__PURE__ */ React.createElement(H4, null, "Integration with Existing Systems and Technologies"), /* @__PURE__ */ React.createElement(P, null, `Bayesian regression models can be integrated with existing data pipelines and analytical tools. In practice this means consuming Pandas DataFrames, emitting posterior draws into parquet or netCDF for downstream consumers, and wrapping a fitted <code>InferenceData</code> in a small prediction service that turns new inputs into posterior predictive draws.`), /* @__PURE__ */ React.createElement(H4, null, "Case Studies or Examples from Research or Industry"), /* @__PURE__ */ React.createElement(P, null, `Numerous case studies and examples demonstrate the successful application of Bayesian regression methods in various domains. The chapter leans on small, tractable examples that encode archetypes the reader will meet later \u2014 a linear fit to a handful of points, a logistic fit to a binary-outcome dataset, a hierarchical fit to grouped measurements \u2014 preferring comprehensibility over dataset size.`), /* @__PURE__ */ React.createElement(H4, null, "Evaluation Metrics and Success Criteria"), /* @__PURE__ */ React.createElement(P, null, `The choice of evaluation metrics depends on the specific application. Common metrics include accuracy, precision, recall, F1-score, and AUC for classification outcomes; RMSE and log-likelihood for continuous outcomes; and elpd_loo or elpd_waic for comparing candidate Bayesian models. Posterior predictive checks supplement these with a qualitative assessment that catches misspecifications the scalar metrics miss.`), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(H4, null, "Detailed Implementation Approaches with Pseudocode Explanations"), /* @__PURE__ */ React.createElement(P, null, `The implementation of Bayesian regression models involves using PPLs like PyMC or high-level libraries like Bambi. A typical PyMC block declares priors with <code>pm.Normal</code>, constructs a linear predictor, declares a likelihood with <code>observed=y</code>, and calls <code>pm.sample()</code> within a <code>with pm.Model() as model:</code> context manager.`), /* @__PURE__ */ React.createElement(Code, { language: "python" }, `import pymc as pm
import numpy as np

with pm.Model() as linear_model:
    alpha = pm.Normal("alpha", mu=0, sigma=10)
    beta = pm.Normal("beta", mu=0, sigma=1)
    sigma = pm.HalfNormal("sigma", sigma=1)
    mu = alpha + beta * x
    y_obs = pm.Normal("y_obs", mu=mu, sigma=sigma, observed=y)
    idata = pm.sample(2000, tune=1000, target_accept=0.95)`), /* @__PURE__ */ React.createElement(H4, null, "Key Functions, Their Purposes, Parameters, and Return Values"), /* @__PURE__ */ React.createElement(P, null, `PyMC and Bambi provide various functions for defining models, performing MCMC sampling, and analyzing posterior distributions. Core entry points include <code>pm.Model</code> (the context manager), distribution constructors (<code>pm.Normal</code>, <code>pm.HalfNormal</code>, <code>pm.StudentT</code>, <code>pm.Bernoulli</code>, <code>pm.Poisson</code>, <code>pm.NegativeBinomial</code>), the <code>pm.sample()</code> driver (returning <code>InferenceData</code>), <code>pm.sample_posterior_predictive()</code> for PPCs, and <code>bmb.Model()</code> in Bambi for formula-based specification.`), /* @__PURE__ */ React.createElement(H4, null, "Complete Data Structures and Object Models Used"), /* @__PURE__ */ React.createElement(P, null, `<code>InferenceData</code> objects are used to store the results of Bayesian inference. An <code>InferenceData</code> aggregates xarray Datasets for <code>posterior</code>, <code>posterior_predictive</code>, <code>log_likelihood</code>, <code>observed_data</code>, and <code>sample_stats</code> \u2014 each indexed by chain and draw, which makes diagnostics like R-hat a one-line call.`), /* @__PURE__ */ React.createElement(H4, null, "Algorithmic Patterns with Step-by-Step Explanations"), /* @__PURE__ */ React.createElement(P, null, `MCMC algorithms involve iteratively proposing new parameter values and accepting or rejecting them based on an acceptance probability. In Hamiltonian variants the proposal is a leapfrog integration of a Hamiltonian system defined by the log-posterior and an auxiliary momentum; NUTS chooses the integration length adaptively, terminating when a no-u-turn criterion detects that further integration would retrace steps.`), /* @__PURE__ */ React.createElement(H4, null, "Performance Considerations and Optimization Strategies"), /* @__PURE__ */ React.createElement(P, null, `Vectorised operations and efficient samplers can improve the performance of MCMC sampling. Writing likelihoods in terms of PyMC tensor operations rather than Python loops lets the JAX or Aesara backend fuse operations, and setting <code>cores</code> equal to the number of chains runs them in parallel.`), /* @__PURE__ */ React.createElement(H4, null, "Error Handling and Debugging Techniques"), /* @__PURE__ */ React.createElement(P, null, `Monitoring convergence diagnostics and performing posterior predictive checks are essential for debugging Bayesian models. R-hat values near 1.0, effective sample sizes in the thousands, absence of divergences, and PPCs that overlap the observed data are the combination that together signals a trustworthy fit; any one failing is a signal to reparameterise, reprior, or rethink the likelihood.`), /* @__PURE__ */ React.createElement(H4, null, "Integration Points with Other Systems or Libraries"), /* @__PURE__ */ React.createElement(P, null, `PyMC and Bambi can be integrated with other libraries for data manipulation, visualization, and reporting. Typical companions include NumPy and Pandas for preprocessing, ArviZ for diagnostics and plotting, xarray for posterior array manipulation, and matplotlib or Plotly for custom visualisations beyond ArviZ's defaults.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(H4, null, "Cutting-Edge Research or Developments"), /* @__PURE__ */ React.createElement(P, null, `Recent research focuses on developing more efficient MCMC algorithms (pathfinder, normalising-flow proposals), scalable inference methods for large datasets (amortised variational inference, stochastic gradient HMC), and new prior distributions for specific applications (regularised horseshoe, R2-D2 priors, spike-and-slab variants). The theme is pushing Bayesian inference into settings \u2014 large data, deep models \u2014 historically dominated by point-estimate methods.`), /* @__PURE__ */ React.createElement(H4, null, "Extensions of the Basic Concepts to More Complex Scenarios"), /* @__PURE__ */ React.createElement(P, null, `Hierarchical models, non-parametric regression, and time series analysis are extensions of basic Bayesian regression. Gaussian processes generalise linear regression to arbitrary covariance structures; state-space models extend the framework to sequential data; and Bayesian neural networks place priors over deep network weights to recover uncertainty-aware predictions.`), /* @__PURE__ */ React.createElement(H4, null, "Open Problems and Research Directions"), /* @__PURE__ */ React.createElement(P, null, `Developing robust methods for prior selection, handling missing data, and model validation remain open research problems. Automated prior calibration, principled handling of informative missingness, and cross-validation schemes for dependent data (time series, spatial) are areas of active investigation.`), /* @__PURE__ */ React.createElement(H4, null, "Alternative Approaches and Competing Techniques"), /* @__PURE__ */ React.createElement(P, null, `Frequentist regression methods, machine learning algorithms, and deep learning models are alternative approaches to regression analysis. Penalised likelihood (glmnet-style Ridge and Lasso), gradient-boosted trees, and neural networks typically win on raw predictive accuracy at scale; Bayesian methods win when calibrated uncertainty, prior information, or small-data stability matters more than a point-estimate benchmark.`), /* @__PURE__ */ React.createElement(H3, null, "Summary"), /* @__PURE__ */ React.createElement(P, null, `This chapter provided a comprehensive overview of Bayesian regression modeling, covering various techniques for handling different data types, addressing overfitting, and comparing models. It explored the theoretical foundations, practical implementation using PyMC and Bambi, and delved into advanced topics like hierarchical modeling and model averaging. Key takeaways include the importance of prior selection, the use of regularization techniques to prevent overfitting, the various methods for model comparison, and the flexibility of Bayesian methods in handling different data types and model structures.`), /* @__PURE__ */ React.createElement(P, null, `Bayesian regression offers several advantages over frequentist methods, including the ability to quantify uncertainty, incorporate prior knowledge, and handle complex model structures. The use of posterior distributions provides a complete picture of uncertainty about the model parameters, enabling probabilistic statements and interval estimations. Regularization techniques, such as Ridge, Lasso, and Horseshoe priors, help prevent overfitting and improve generalization performance. Model comparison techniques, including information criteria, cross-validation, and Bayes factors, guide the selection of the "best" model among competing candidates.`), /* @__PURE__ */ React.createElement(P, null, `The practical implementation of Bayesian regression involves using probabilistic programming languages like PyMC or high-level libraries like Bambi. These tools simplify model specification, automate inference using MCMC methods, and facilitate posterior analysis and visualization. The choice of specific techniques and tools depends on the research question, the characteristics of the data, and the computational resources available. Bayesian regression is a powerful and versatile tool for analyzing data and making informed decisions in a wide range of applications \u2014 its ability to quantify uncertainty, incorporate prior knowledge, and handle complex model structures makes it a valuable asset for researchers and practitioners across disciplines.`)), /* @__PURE__ */ React.createElement(Sec, { n: "3", title: "Bayesian Modeling with Bambi: Regression, Splines, and Distributional Models" }, /* @__PURE__ */ React.createElement(P, null, `Chapter 3 lifts Bayesian regression from the abstract machinery of Chapter 2 into a working, formula-driven toolkit by introducing <strong>Bambi</strong> \u2014 a high-level Python library that sits atop <strong>PyMC</strong> and exposes the same R-style formula syntax familiar to users of <code>lme4</code> or <code>brms</code>. The chapter's arc is deliberate: it opens with the simplest possible linear regression, then layers on complexity in controlled increments, introducing <strong>multiple regression</strong>, <strong>polynomial regression</strong>, <strong>spline regression</strong>, <strong>distributional models</strong>, <strong>categorical predictors</strong>, and finally <strong>interactions</strong>. Each step is motivated by a limitation of the previous model and illustrated with Bambi's concise API.`), /* @__PURE__ */ React.createElement(P, null, `The central conceptual shift from frequentist regression is that every parameter \u2014 intercepts, slopes, variance components, even the standard deviation of the response \u2014 is treated as a random variable with a <em>prior distribution</em>. Bayes' theorem combines this prior with the <em>likelihood</em> of the observed data to produce a <em>posterior distribution</em> that represents updated beliefs. Bambi automates the tedious parts of this workflow: it parses formulas, assigns weakly informative default priors, dispatches the underlying PyMC model to the <strong>NUTS</strong> sampler, and returns an <code>InferenceData</code> object compatible with <strong>ArviZ</strong> for downstream diagnostics, posterior summaries, and model comparison.`), /* @__PURE__ */ React.createElement(P, null, `Three themes run throughout the chapter. First, <strong>flexibility without ceremony</strong>: the same one-line formula interface extends from <code>y ~ x</code> to spline regression <code>y ~ bs(x, df=6)</code> to distributional models with separate linear predictors for mean and dispersion. Second, <strong>uncertainty as first-class output</strong>: every plot \u2014 of fitted means, polynomial curves, spline fits, or interaction surfaces \u2014 renders credible bands rather than single lines, and the <strong>posterior predictive distribution</strong> is the default way to communicate predictions. Third, <strong>interpretability through visualisation</strong>: <code>model.graph()</code> exposes the DAG, <code>model.plot_priors()</code> shows what was assumed before seeing data, and <code>bmb.interpret.plot_predictions</code> produces conditional adjusted predictions that make even complex models legible.`), /* @__PURE__ */ React.createElement(P, null, `By the chapter's end the reader has seen how Bambi handles non-normal response variables through the <strong>generalised linear model</strong> (GLM) machinery \u2014 passing <code>family="negativebinomial"</code> or <code>family="bernoulli"</code> selects the appropriate likelihood and link function \u2014 and how categorical variables are automatically encoded into dummy contrasts, setting the stage for the hierarchical models of later chapters. The chapter is less a theory dump than a guided tour of what becomes possible when a probabilistic programming backend is wrapped in an ergonomic front end.`), /* @__PURE__ */ React.createElement(Ch3Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Conditional adjusted predictions from a Bambi regression: the inner shaded band represents uncertainty in the posterior mean (credible interval for <code>E[y|x]</code>), while the outer band is the posterior predictive distribution (PPD), which additionally accounts for observational noise. The PPD is always wider because it convolves parameter uncertainty with the sampling distribution of the response.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bayesian Inference" }, `Bayesian inference is a
