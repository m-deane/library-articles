t.createElement(P, null, `Royal expenditure on the new harbour appears in the <em>Accounts of the Lord High Treasurer of Scotland</em> (the Treasurer's Accounts), the principal manuscript record of crown spending in the period. Volume II of the printed edition (ed. Thomas Dickson, 1900) records payments from 1504 onward for shipwrights, oak timber from Fife and the Borders, ironwork from Stirling, and pitch and cordage. The royal feu charter formalising Newhaven's status \u2014 granting lands and certain privileges to the burgh of Edinburgh in connection with the harbour \u2014 is conventionally dated to 1505 and is preserved in the Edinburgh charter records. The town's relationship to the harbour was contested almost from the beginning: in 1510 the burgh of Leith disputed the privileges granted to Newhaven, in a long-running quarrel that was not finally settled for centuries.`), /* @__PURE__ */ React.createElement(P, null, `The harbour itself, in its first form, was a wet dock \u2014 a basin enclosed by a stone pier, capable of holding water at a useable level through the tidal cycle. Its precise dimensions and configuration are not recoverable from the surviving documents. Later harbour works overwrote it. The most that can be said is that the 1504 dock occupied roughly the position of the present inner basin and that the original masonry, where it survives, is buried within later structures.`), /* @__PURE__ */ React.createElement(Callout, { title: "Why Newhaven, not Leith?", type: "info" }, "The standard explanation \u2014 deep water, defensibility, royal proximity \u2014 is given in essentially every secondary account from ", /* @__PURE__ */ React.createElement("em", null, "The Old Statistical Account of Scotland"), " (Sinclair, 1791-99) onward. It is plausible but worth noting that the documentary basis is largely inferential: the king's reasoning is reconstructed from his pattern of expenditure rather than from any surviving statement of intent. Macdougall (1989) lays out the case carefully.")), /* @__PURE__ */ React.createElement(Sec, { n: "3", title: "The Great Michael (1511)" }, /* @__PURE__ */ React.createElement(P, null, `Newhaven's place in Scottish historical memory rests, more than anything else, on a single ship. The <em>Great Michael</em> was laid down at the Newhaven shipyard in 1507 and launched on 12 October 1511. By contemporary report \u2014 much repeated, with varying accuracy, ever since \u2014 she was the largest warship in Europe at her launching, displacing the previous claimant, England's <em>Mary Rose</em> of 1511, and herself displaced only by the English <em>Henri Gr\xE2ce \xE0 Dieu</em> of 1514. Her construction is associated with three names: the Bartons \u2014 Robert and Andrew, brothers of an established Leith merchant-pirate family \u2014 and Sir Andrew Wood of Largo, the Forth's senior naval commander, whose role was operational rather than design.`), /* @__PURE__ */ React.createElement(P, null, `The dimensions of the <em>Great Michael</em> are contested in the literature. The single most-repeated figure derives from John Knox's <em>History of the Reformation in Scotland</em>, written in the 1550s-60s and first printed in full by David Buchanan in 1644 \u2014 that the ship was 240 feet long and that her construction "wasted all the woods of Fife". Knox is a primary source in the limited sense that he was alive in living memory of the launch, but he wrote half a century later and was not a naval specialist. Modern naval historians have treated his figures with caution. Norman Macdougall, in <em>James IV</em> (1989), presents the conventional summary: a hull length of about 240 feet (73 metres), a beam of 36 feet (11 metres), a tonnage somewhere around 1,000 tons burthen, an armament of 24 to 27 cannon plus smaller pieces, and a crew of some 300 sailors and 1,000 soldiers and gunners. N.A.M. Rodger, in <em>The Safeguard of the Sea</em> (1997), is more sceptical, suggesting the surviving evidence does not allow firm dimensions and that some of the standard figures are likely to be inflated.`), /* @__PURE__ */ React.createElement(GreatMichaelComparison, null), /* @__PURE__ */ React.createElement(Cap, null, "Figure 3. Comparative tonnage. The Great Michael's figures are best-attested by Knox (writing 50 years after the launch); Rodger and other modern naval historians treat several of these numbers as contested. Bars marked with ? carry a contested-figure flag."), /* @__PURE__ */ React.createElement(P, null, `What is not in serious dispute is that the ship was unusually large for her time and that her construction taxed the kingdom's resources to an unusual degree. Knox's claim about the woods of Fife may be a literary flourish, but the Treasurer's Accounts show payments for timber from a wide range of sources, including imports from the Baltic, which suggests that domestic supply was indeed strained. The ship's career was brief and inglorious: she sailed against the English in 1513, took no significant part in any action, and after the Scottish disaster at the Battle of Flodden in September 1513 \u2014 in which James IV himself was killed \u2014 the new regency government had little use for an expensive prestige vessel. She was sold to the French king Louis XII in 1514 for 40,000 livres and quietly disappeared from the records, probably broken up at Brest within a few years. Her name survived; her timbers did not.`), /* @__PURE__ */ React.createElement(PQ, null, '"She wasted all the woods of Fife, except Falkland Wood, by-and-besides the timber that came out of Norway."', /* @__PURE__ */ React.createElement("div", { style: { fontFamily: F.sans, fontStyle: "normal", fontSize: 13, color: C.muted, marginTop: 12 } }, "\u2014 John Knox, ", /* @__PURE__ */ React.createElement("em", null, "History of the Reformation in Scotland"), " (composed 1550s-60s, first full printing 1644).")), /* @__PURE__ */ React.createElement(SB, { title: "Who built her?" }, /* @__PURE__ */ React.createElement(P, null, `The shipwright is conventionally given as Jacques Terrell \u2014 a French master shipwright in royal service \u2014 assisted by a Scottish team led by Sir Andrew Wood. The Bartons (Robert, Andrew, and a third brother John) were the merchant-naval contractors. Andrew Barton would be killed in 1511 in a separate engagement off the Downs, on the south English coast, by Edward Howard's squadron \u2014 an action sometimes described as the proximate cause of the Anglo-Scottish drift toward war that culminated at Flodden. The Newhaven shipyard itself does not appear to have produced any other vessel of comparable size; after the Great Michael's sale to France, royal shipbuilding shifted elsewhere or ceased.`))), /* @__PURE__ */ React.createElement(

      src: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Newhaven_Harbour%2C_Edinburgh.jpg/1280px-Newhaven_Harbour%2C_Edinburgh.jpg",

      caption: "The inner basin at Newhaven, looking east toward the lighthouse. The fishing fleet that worked from this harbour disappeared in the second half of the twentieth century; the masts now belong to leisure craft.",

  ), /* @__PURE__ */ React.createElement(Sec, { n: "4", title: "Fishing village, sixteenth\u2013eighteenth centuries" }, /* @__PURE__ */ React.createElement(P, null, `After the brief royal-shipyard period, Newhaven settled into a fishing village. In 1556 the harbour and its lands were granted by Mary of Guise, the regent for the young Mary Queen of Scots, to Sir Robert Drummond of Carnock, master of works to the crown \u2014 a gift recorded in the <em>Register of the Privy Seal of Scotland</em>. The grant transferred operational control from the burgh of Edinburgh to a private hand, and although Edinburgh continued to claim certain rights, the Drummonds and their successors held the principal interest for some decades. The village was, in administrative terms, peculiar: it lay within the parish of North Leith but was not formally part of the burgh of Leith, nor part of the burgh of Edinburgh, nor a burgh in its own right. This anomalous status would persist into the nineteenth century and is part of why Newhaven's population developed a strong sense of separateness.`), /* @__PURE__ */ React.createElement(P, null, `The fishery was diversified. Mussels and oysters were dredged from the Forth's beds \u2014 which were extensive into the late nineteenth century, before pollution and overfishing collapsed them; herring was caught in the seasonal runs that swept down the east coast in summer; white fish (haddock, cod, ling, whiting) were taken on long-line gear in the deeper waters offshore. The village's most distinctive activity was the carrying of live fish to Edinburgh \u2014 particularly to the Old Fishmarket Close in the Old Town \u2014 by women from Newhaven, who walked the two and a half miles up the slope each morning with their creels on their backs. This was the genesis of the figure who would become one of the most-photographed working women of the nineteenth century: the Newhaven fishwife.`), /* @__PURE__ */ React.createElement(P, null, `The <em>Old Statistical Account of Scotland</em>, edited by Sir John Sinclair from parish-minister returns gathered between 1791 and 1799, gives the most detailed late-eighteenth-century snapshot of the village. The minister of North Leith reported on Newhaven's distinct dialect (a Scots that preserved older forms longer than surrounding areas), distinct dress (the striped petticoat already noted as characteristic), and distinct trades (oyster-dredging in particular). The follow-up <em>New Statistical Account</em> of 1845, written half a century later, repeats and updates many of the same observations. Both volumes are accessible online via the University of Edinburgh's <a href="https://stataccscot.edina.ac.uk/static/statacc/dist/home">Statistical Accounts of Scotland</a> portal.`), /* @__PURE__ */ React.createElement(Callout, { title: "A village apart", type: "info" }, "Several nineteenth- and twentieth-century writers \u2014 including Tom Mackenzie, whose ", /* @__PURE__ */ React.createElement("em", null, "Newhaven and the Newhaven Fishermen"), " (1934) is one of the few full-length local histories \u2014 emphasised that Newhaveners married overwhelmingly within the village. The community's relative endogamy, the persistence of distinctive surnames (Carnegie, Hall, Liston, Wilson, Logan, Ramsay), and the shared fishing rights underpinned a sense of corporate identity that survived well into the twentieth century. How distinct the dialect actually was is harder to verify; the claim has been repeated since Sinclair, but rigorous dialectological study post-dates the period of greatest difference.")), /* @__PURE__ */ React.createElement(

      caption: "A Newhaven fishwife photographed by David Octavius Hill and Robert Adamson, c.1845. The striped petticoat, the creel, and the distinctive cuffed sleeves were already iconic by the time the calotype was made; the photograph helped fix the image in nineteenth-century imagination.",
      credit: "Hill & Adamson, c.1843\u201347 \u2014 National Galleries of Scotland (public domain via Wikimedia Commons)",

  ), /* @__PURE__ */ React.createElement(Sec, { n: "5", title: "The fishwives" }, /* @__PURE__ */ React.createElement(P, null, `Newhaven's most famous export was not herring but a figure: the Newhaven fishwife, in her striped petticoats and shawl, with a heavy wicker creel of fish on her back, calling her wares through the streets of Edinburgh. The image enters the cultural record from at least the late eighteenth century \u2014 Sir Walter Scott refers to it in passing \u2014 and is fixed by the early nineteenth in poetry, painting, and, decisively, photography.`), /* @__PURE__ */ React.createElement(P, null, `Lady Carolina Nairne's song "Caller Herrin'" \u2014 written in the 1820s, set to music attributed to Niel Gow's son Nathaniel \u2014 is the locus classicus. The song's chorus ("Wha'll buy my caller herrin'? / They're bonny fish and halesome farin'") sentimentalises the fishwife's cry into a parlour ballad, and helped to fix the figure in middle-class Scottish imagination. The Edinburgh genre painter Walter Geikie (1795-1837) made a number of sketches and watercolours of Newhaven fishwives in the 1820s and 1830s, which survive in the National Galleries of Scotland. They are the earliest visual records of any precision.`), /* @__PURE__ */ React.createElement(P, null, `The most consequential representation, however, came from photography. In 1843 the Edinburgh painter David Octavius Hill (1802-1870) and the chemist Robert Adamson (1821-1848) opened a calotype studio at Rock House on Calton Hill. Their original purpose was to produce reference portraits for Hill's enormous painting commemorating the Disruption of the Church of Scotland \u2014 the schism of May 1843 in which 474 ministers walked out of the General Assembly to form the Free Church. But Hill and Adamson rapidly extended their work to other subjects, and from 1843 onward they made a substantial series of calotypes of Newhaven fishwives, fishermen, and harbour scenes. The series ran until Adamson's early death in 1848.`), /* @__PURE__ */ React.createElement(P, null, `These are among the earliest photographs of working-class women anywhere in the world. The portraits are technically remarkable \u2014 calotypes have a soft, painterly quality that contrasted with the sharp daguerreotypes more common in the period \u2014 and ethnographically significant: they fix, with documentary precision, the dress, the equipment, the postures, and the faces of a working community at the moment before steam, the railway, and Victorian industry began to transform it. The National Galleries of Scotland holds the principal collection and has digitised much of it; many images are also available via Wikimedia Commons under public-domain release. The most-reproduced image \u2014 sometimes referred to as <em>Newhaven Fishwives</em> or by individual sitters' names where these are recorded \u2014 shows three women with creels, in three-quarter view, against a plain backdrop. Their names, where preserved, include Mrs Hall, Mrs Carnegie, and Mrs Logan.`), /* @__PURE__ */ React.createElement(SB, { title: "On the fishwife's etymology \u2014 a caution" }, /* @__PURE__ */ React.createElement(P, null, `A persistent folk-history claim holds that the cry "caller herrin'!" is derived from Gaelic <em>caillich</em> ("old woman"). This is not supported by linguistic evidence. The Scots adjective <em>caller</em> means "fresh" \u2014 applied to fish, water, or air \u2014 and is recorded in this sense from the sixteenth century. It derives from Middle English <em>calwer</em> ("cool"), itself of obscure ultimate origin, and is unrelated to the Gaelic word. The error has appeared in several twentieth-century guidebook accounts and should be treated with scepticism. The <em>Dictionary of the Scots Language</em> (DSL) gives the standard etymology.`))), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { n: "6", title: "The harbour" }, /* @__PURE__ */ React.createElement(P, null, `The harbour as a structure has been rebuilt three times. The original 1504 wet dock \u2014 its precise plan unknown \u2014 was a relatively simple stone-walled basin sufficient for the warship-building period and, later, for the fishing fleet. By the early nineteenth century it was inadequate, both in size and in condition. The civil engineer John Rennie the Elder (1761-1821), whose works on Scottish harbours include Leith, Aberdeen, and the chain pier at Trinity (just west of Newhaven), was commissioned to remodel the Newhaven harbour. The Rennie works were carried out in 1815 and produced something close to the configuration visible today: an inner basin enclosed by a substantial outer pier, with a separate west pier and a narrow harbour mouth.`), /* @__PURE__ */ React.createElement(P, null, `Further extensions followed in the second half of the century. The most substantial works took place between 1864 and 1879, when an outer pier and breakwater were added to provide more sheltered anchorage and to accommodate the steam-powered fishing vessels that were beginning to displace the older sailing craft. The harbour lighthouse on the pier-head, in its present form, dates from the late nineteenth century and replaced an earlier light. Stevenson family engineering records \u2014 the Stevensons being the dominant Scottish lighthouse and harbour-engineering dynasty of the period \u2014 touch on Newhaven repeatedly, although the principal Stevenson commissions in the firth were elsewhere (notably Bell Rock, Inchkeith, and the chain piers).`), /* @__PURE__ */ React.createElement(P, null, `Just west of Newhaven, at Trinity, stood for most of the nineteenth century a remarkable structure: the <em>Trinity Chain Pier</em>, a suspension pier opened in 1821 to designs by Captain Samuel Brown RN, the engineer responsible for several early suspension bridges in Britain. The chain pier was approximately 500 feet long, projecting into deep water on iron suspension chains, and was used by a regular ferry service carrying passengers across the Forth to Fife. It was a technological curiosity and a popular attraction, rendered in numerous prints and watercolours of the period. A succession of storms damaged the structure repeatedly, and on 17 October 1898 it was destroyed by an exceptional north-westerly gale. It was never rebuilt. The site is now the Trinity foreshore, with an informal memorial. The pier's loss closes one chapter of the Forth's nineteenth-century engineering optimism.`)), /* @__PURE__ */ React.createElement(HistoricalMap, null), /* @__PURE__ */ React.createElement(Cap, null, "Figure 2. A schematic map of the Newhaven foreshore. Starbank Road, the dashed amber line, runs from Granton in the west to the harbour in the east. Crosses mark lost structures \u2014 the chain pier and the original parish church most prominent among them. The harbour basin, in two stages of expansion, sits at the centre."), /* @__PURE__ */ React.createElement(

      caption: "Looking north across the Firth of Forth from the slope above Newhaven. The pale line on the horizon is the coast of Fife; the deeper water inshore \u2014 never as deep as Leith's roadstead but free of its shoaling \u2014 was the original reason James IV chose the site.",

  ), /* @__PURE__ */ React.createElement(Sec, { n: "7", title: "Starbank Road and Victorian Newhaven" }, /* @__PURE__ */ React.createElement(P, null, `Starbank Road as a defined street is essentially a Victorian creation. Before the mid-nineteenth century, the slope above the village foreshore was largely unbuilt \u2014 fields, scattered cottages, the older Anchorfield settlement, and the grounds of Starbank House and a few other early-nineteenth-century gentlemen's villas. From the 1860s onward, the slope was systematically developed as a Victorian middle-class enclave, with rows of stone-fronted villas and tenements arranged along a road that climbed gently from the western edge of the village toward Trinity and Wardie. The road's name comes from Starbank House (which itself takes its name from "the bank with a view of stars" \u2014 i.e. an unobstructed seaward outlook).`), /* @__PURE__ */ React.createElement(P, null, `Starbank House itself \u2014 the principal early house on the slope \u2014 is given various dates in the secondary literature. The Buildings of Scotland: <em>Edinburgh</em> volume (Pevsner / John Gifford et al., 1984) places it as early-nineteenth-century, with conventional citation of c.1815. HES Canmore lists the house with a Category B listing and notes its early-nineteenth-century date but is cautious about a precise year, and the structure has been altered. Some sources offer 1820 or even slightly earlier; <strong>the precise year is contested</strong> and the secondary literature is not consistent. What is well-established is that the house pre-dates the Victorian development of the slope and that it gave its name to the road, the park, and the inn.`), /* @__PURE__ */ React.createElement(P, null, `<em>Starbank Park</em> is the most public element of this Victorian landscape. The grounds were gifted to the City of Edinburgh by the Edinburgh advocate James Cleghorn in 1887, on condition that they be opened to the public. The park was laid out and formally opened to the public in 1894. The walled upper terrace, with its formal beds and views across the Forth to Fife, is the principal feature; the lower lawn descends toward Starbank Road. The park is now a designation of national importance for its preserved Victorian-era plan and is maintained by the City of Edinburgh Council with input from the Friends of Starbank Park, a community body that has been active since the 2010s.`), /* @__PURE__ */ React.createElement(P, null, `<em>The Starbank Inn</em>, on Laverockbank Road at the corner with Starbank Road, has functioned as a hostelry on the same site for the better part of two centuries. The present building is mid- to late-nineteenth-century, although the licence is older. The inn's seaward aspect \u2014 wide windows looking north over the Forth \u2014 has made it a fixed point in the social life of the area; in the late twentieth century it became known particularly as a real-ale and seafood pub, and it remains in that role.`), /* @__PURE__ */ React.createElement(P, null, `The Victorian housing along Starbank Road and the streets that climb the slope (Laverockbank, East and West Trinity Roads, Trinity Crescent) is mostly stone-fronted, two- and three-storey, with bay windows on the seaward elevation and small front gardens. Several individual buildings carry HES listings; the area as a whole is within the Trinity Conservation Area, designated in 1976. RCAHMS / HES Canmore records under the umbrella of "Newhaven Burgh Survey" preserve building-by-building photographs and notes from successive surveys.`), /* @__PURE__ */ React.createElement(SB, { title: "A note on dates" }, /* @__PURE__ */ React.createElement(P, null, `Where the present article gives a c.1815 date for Starbank House, the figure should be read with the secondary-literature caveat above: the house is early-nineteenth-century but a precise founding year is not well-established. Where this article gives 1887 for the Cleghorn gift and 1894 for the public opening of Starbank Park, both figures derive from Edinburgh Council parks records and are considered well-attested. The Trinity Conservation Area's 1976 date is from Edinburgh Council's published designation register.`))), /* @__PURE__ */ React.createElement(Sec, { n: "8", title: "Religious life" }, /* @__PURE__ */ React.createElement(P, null, `Newhaven's nineteenth-century religious life mirrors the broader fault-lines of Scottish Presbyterianism. The earliest meaningful provision was a mission station of the Church of Scotland, established in 1837 in response to the village's anomalous parish position: technically part of North Leith parish, but isolated from it. A purpose-built chapel \u2014 the <em>Newhaven Old Parish Church</em> \u2014 was completed in 1838 and stood on Main Street near the harbour. It was a plain, classical building in the Reform Presbyterian tradition; HES Canmore preserves photographs of it.`), /* @__PURE__ */ React.createElement(P, null, `The Disruption of May 1843, in which Thomas Chalmers led 474 ministers and a substantial body of laity out of the General Assembly to form the Free Church of Scotland, immediately produced a parallel structure. The <em>Newhaven Free Church</em> was established within months of the Disruption and built shortly afterwards. The Free Church drew heavily on the village's fishing population \u2014 Free Church preaching and the dignity it accorded to working communities had particular purchase here \u2014 and the church remained a strong institutional presence for the rest of the century. Its building survives, in altered form. Following the 1929 union of the Free Church (or rather, the United Free Church) with the Church of Scotland, the building changed denominational hands, has had several twentieth-century uses, and is now in residential / community-conversion use; HES Canmore records track these changes.`), /* @__PURE__ */ React.createElement(P, null, `A small Episcopalian community \u2014 <em>St James's Episcopal Church</em>, on Main Street \u2014 supplemented the Presbyterian provision from the mid-nineteenth century. Its congregation was always small. The Mission to Seamen (now the Mission to Seafarers) operated a station near the harbour for much of the late nineteenth and twentieth centuries, providing temporal and spiritual care to sailors of any denomination passing through; the building has since been converted to other uses but the inscription survives on the lintel.`), /* @__PURE__ */ React.createElement(P, null, `The most significant loss is the <em>Old Parish Church of 1838</em>. By the mid-twentieth century the building had fallen into structural disrepair and the surrounding houses were under slum-clearance pressure. The church was demolished in 1966. Its bell, sundial, and some architectural fragments were preserved; a memorial garden marks the site. The demolition is, for many in the village's memory, the symbolic moment when the older Newhaven was lost.`)), /* @__PURE__ */ React.createElement(
    Photograph,

      src: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Newhaven_lighthouse%2C_Edinburgh.jpg/1280px-Newhaven_lighthouse%2C_Edinburgh.jpg",

      caption: "The harbour-pier lighthouse at Newhaven, in its late-nineteenth-century form. The structure replaced an earlier light and is the most easily identifiable element of the village from across the Forth.",

  ), /* @__PURE__ */ React.createElement(Sec, { n: "9", title: "Decline of the fishing fleet" }, /* @__PURE__ */ React.createElement(P, null, `The Newhaven fishing fleet reached its peak in the second half of the nineteenth century, when the Forth and the wider east-coast fishery were among the most productive in Europe. The herring fishery was the dominant activity; white-fish long-lining and the older mussel-and-oyster work continued alongside. Steam drifters began to displace sailing luggers from the 1880s onward. The fleet was substantial: contemporary photographs from the 1890s and 1900s show the harbour packed with masts, with shore-side curing yards, smokehouses, and net-mending sheds occupying every available square yard.`), /* @__PURE__ */ React.createElement(P, null, `The First World War broke this. Fishing vessels were requisitioned for naval auxiliary duty (minesweeping in particular) and many were lost. Crews entered naval service. The post-1918 fleet returned diminished, and the inter-war years saw structural decline: the herring market collapsed in the late 1920s and early 1930s with the loss of the Russian and Baltic markets after 1917 and the Depression after 1929. By 1939 the village's fleet was a fraction of its 1900 size. The Second World War repeated the requisition pattern and reduced it further.`), /* @__PURE__ */ React.createElement(P, null, `The post-1945 transition was steady and decisive. Diesel replaced steam, vessels grew larger and were moored in larger ports (Eyemouth, Pittenweem, Peterhead). The Newhaven harbour, never deep enough for the largest modern boats, became progressively a part-time fishing base and increasingly a leisure marina. The <em>Newhaven Fish Market</em> on Pier Place \u2014 the building that had handled the daily landing and auction of the Forth's catch since the 1890s \u2014 closed; the building itself, a plain late-Victorian shed, was retained and given new uses (see \xA711). The last commercial fishing boats registered at Newhaven operated into the 1990s; the precise year of the final commercial landing is given variously in different secondary sources and should be treated as uncertain. By 2000 the fleet was effectively gone.`), /* @__PURE__ */ React.createElement(Callout, { title: "On the last boat", type: "info" }, "Several local-history accounts identify the last Newhaven-registered commercial fishing boat as a small inshore vessel that ceased landings in the late 1990s; precise year and vessel name vary between sources. HES Canmore does not record the closure as a single event. The matter is subject to the kind of memory-testing where local recollection differs from documentary record.")), /* @__PURE__ */ React.createElement(Sec, { n: "10", title: "The twentieth century \u2014 the long quiet" }, /* @__PURE__ */ React.createElement(P, null, `Newhaven's twentieth century was, until very recently, a long withdrawal from prominence. The fishing-village period ended; the Victorian middle-class period had its character partly preserved on the slope above and partly eroded along the foreshore. The village proper \u2014 the cluster of small fishermen's houses on the lanes between Main Street and the harbour \u2014 came under sustained pressure from Edinburgh's slum-clearance programmes from the 1930s onward, accelerating in the 1950s and 1960s. Whole streets of small stone cottages were demolished; the population scattered to housing schemes elsewhere in north Edinburgh (Pilton, Muirhouse). The 1966 demolition of the Old Parish Church was emblematic of this period.`), /* @__PURE__ */ React.createElement(P, null, `The new housing built to replace what had been demolished was, by the standards of the 1960s and 1970s, relatively cautious. Several blocks of low-rise council and housing-association flats were inserted along the foreshore, of medium density and of unremarkable architectural quality. They preserved the line of the streets and avoided the large-scale tower blocks that disfigured other parts of north Edinburgh. By the 1980s, with the full architectural-conservation movement under way, the surviving older buildings \u2014 particularly along Main Street and the upper lanes \u2014 were progressively listed under HES (then Historic Scotland) statutory protection. The Trinity Conservation Area was extended.`), /* @__PURE__ */ React.createElement(P, null, `Starbank Road itself changed comparatively little in this period. The Victorian villas and tenements remained occupied; the road's character \u2014 quiet, residential, with a strong seaward outlook \u2014 was undisturbed. The Starbank Inn continued to trade. The buses ran along Lower Granton Road and Pier Place. There was, for a long stretch from roughly 1960 to roughly 2000, no large new development on the seafront and no significant change in the social composition of the area.`)), /* @__PURE__ */ React.createElement(Sec, { n: "11", title: "Contemporary Newhaven" }, /* @__PURE__ */ React.createElement(P, null, `The picture from roughly 2000 onward is one of gradual and then rapid change. The most visible new presence is the residential development at the western end of the foreshore \u2014 a series of mid-rise apartment blocks built from the early 2000s onward on the cleared waterfront between Newhaven and Granton, marketed as "Western Harbour" and similar branding. These developments have brought a substantial new resident population to what had been a largely industrial / vacant frontage; the architectural quality is mixed, and the larger blocks have been the subject of recurring debate about scale, sea-views, and the displacement of older communities.`), /* @__PURE__ */ React.createElement(P, null, `The <em>Newhaven Heritage Museum</em>, opened in 1994 in the converted late-Victorian fish market on Pier Place, was for fifteen years the principal site of public memory of the fishing-village period. It held tools, photographs (including reproductions of Hill & Adamson images), oral-history recordings, and a substantial collection of fishwives' costume and creels. It closed in 2009 as part of a wider rationalisation of small museums by the City of Edinburgh Council under post-financial-crisis budget pressure. <strong>Its collection is in store; the building has since been put to other uses; as of 2026, the museum has not reopened</strong> and there is no announced plan to do so.`), /* @__PURE__ */ React.createElement(P, null, `The harbour itself is now a yacht and small-boat marina, with continuing informal mooring of small inshore craft. The fishermen's mission building has been adapted to other uses; the precise reuse has changed several times. Loch Fyne Restaurants operated a seafood restaurant in the converted fish-market building for some years before closing; the building is now in different hospitality use.`), /* @__PURE__ */ React.createElement(P, null, `The most consequential single change of the present generation, however, is the arrival of the trams. The Edinburgh Trams system opened in May 2014 with a line running from York Place in the New Town to Edinburgh Airport. From the outset, an extension northward and east to Newhaven was envisaged, but it was deferred amid cost and political difficulties. Construction of the extension finally began in 2019 and continued through the COVID-19 period, with substantial disruption to Leith Walk and the surrounding streets. The <em>Trams to Newhaven</em> extension opened to passengers on 7 June 2023, with a new tram terminus at the western end of Newhaven (the stop is called "Newhaven"). For the first time since the closure of the older Edinburgh tram system in 1956, the village has a fixed-rail link to the city centre.`), /* @__PURE__ */ React.createElement(

    {
      src: "https://images.unsplash.com/photo-1565967511849-76a60a516170?w=1600&q=80",
      alt: "Modern tram in Edinburgh",

  ), /* @__PURE__ */ React.createElement(Callout, { title: "Gentrification", type: "warn" }, "The combination of the Western Harbour development, the trams, and the broader Edinburgh property market has produced a now-familiar gentrification pattern. House prices on the slope above Starbank Road have risen substantially since 2010; the social composition of the area is shifting; long-standing residents have raised concerns about displacement. Local consultation processes \u2014 including for the trams' construction phase and for individual planning applications \u2014 have been documented by Edinburgh Council and by the Newhaven and Trinity Community Council. The pattern is well-recognised but not unique to Newhaven.")), /* @__PURE__ */ React.createElement(Sec, { n: "12", title: "Walking Starbank Road today" }, /* @__PURE__ */ React.createElement(P, null, `Begin at the western end of Starbank Park, where the road meets Lower Granton Road and turns east. The park gates are stone, the railings nineteenth-century, and the upper terrace gives the best single seaward view in the district: the whole sweep of the Forth, with Inchkeith island in the middle distance and the Fife coast a pale line beyond. James Cleghorn's gift of 1887, formally opened to the public in 1894, has worn well; the friends' group keeps the formal beds in good order.`), /* @__PURE__ */ React.createElement(P, null, `Walk east. The road descends gently. On the left, the Forth; on the right, a sequence of stone-fronted Victorian villas, most with bay windows and small front gardens. Several carry HES listings. About a third of the way along, on the right, sits Starbank House itself \u2014 a plain, dignified early-nineteenth-century building, set back from the road behind a low wall. The house has been altered. Beyond it, the residential rhythm continues; the houses are mostly two-storey, mostly mid- to late-nineteenth-century, and the street wall is largely unbroken.`), /* @__PURE__ */ React.createElement(P, null, `The Starbank Inn appears on the right, at the corner with Laverockbank Road. The wide windows and the gable form are mid- to late-nineteenth-century. A pub here, in some form, has been a fixed point for the better part of two centuries. Continue east. The road bends slightly with the foreshore. The slope above is the Trinity Conservation Area; the houses become smaller and more closely packed as the road approaches the older village footprint. On the left, occasional glimpses down to the foreshore: the line of stones that marks the original shore before the harbour was extended outward.`), /* @__PURE__ */ React.createElement(P, null, `The Newhaven Free Church, in altered form, comes up on the left or right depending on precisely where the walker steps; the village's lanes intersect the road at angles that make the older orientation hard to read. Beyond, the road becomes Pier Place, and the harbour itself opens out: the lighthouse on the pier-head, the inner basin with its leisure craft, the converted fish-market building, the place where the Old Parish Church stood until 1966. The Newhaven tram terminus is just a short walk west and south of here, on Lindsay Road.`), /* @__PURE__ */ React.createElement(P, null, `What the walk reveals \u2014 to the reader who has the periods in mind \u2014 is that almost nothing of the 1504 royal-shipyard period is visible above ground; that the fishing-village fabric is a partial survival, listed where it remains; that the Victorian slope is the most coherent single layer; that the late-twentieth-century housing has been absorbed; and that the 2023 trams are a real and visible new layer. The road is short \u2014 about half a mile \u2014 and the periods overlap on the same hundred metres. Five centuries, mostly in stone, mostly with the Forth as one boundary and the slope of Trinity as the other.`), /* @__PURE__ */ React.createElement(SB, { title: "Composite-character note" }, /* @__PURE__ */ React.createElement(P, null, `This article does <em>not</em> include a Tier-2 composite walking character. The walk above is given in a generic register; no individual is invented or quoted. Any reader who has spoken with long-standing Newhaven residents \u2014 for instance through the Newhaven Heritage Project's oral-history recordings, when accessible, or via the active community council \u2014 can supplement this with first-hand testimony.`))), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { n: "13", title: "Source Integrity Note" }, /* @__PURE__ */ React.createElement(P, null, `This article is a historical reference rather than a fieldwork account. Its claims, where specific, can be traced to the following categories of source.`), /* @__PURE__ */ React.createElement(SB, { title: "Primary archival sources" }, /* @__PURE__ */ React.createElement(P, null, `<strong>National Records of Scotland (NRS)</strong>: royal feu charters relating to Newhaven from 1505; <em>Register of the Privy Seal of Scotland</em> for the 1556 Drummond grant; the <em>Accounts of the Lord High Treasurer of Scotland</em> (Treasurer's Accounts), particularly Volume II for 1504 onward (printed edition: ed. Thomas Dickson, 1900). NRS catalogues are searchable at <a href="https://catalogue.nrscotland.gov.uk/">catalogue.nrscotland.gov.uk</a>.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 12 } }, `<strong>Historic Environment Scotland (HES) \u2014 Canmore</strong>: harbour at Canmore ID 52204; chapel of St James and St Mary at Canmore ID 52217; further records under the Newhaven Burgh Survey. The catalogue is at <a href="https://canmore.org.uk/">canmore.org.uk</a>.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 12 } }, `<strong>Statistical Accounts</strong>: Sinclair (ed.), <em>Old Statistical Account of Scotland</em>, 1791-99, parish of North Leith volume; <em>New Statistical Account</em>, 1845, same parish. Both via <a href="https://stataccscot.edina.ac.uk/static/statacc/dist/home">stataccscot.edina.ac.uk</a>.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 12 } }, `<strong>National Galleries of Scotland</strong>: the Hill & Adamson calotype collection, 1843-48, including the Newhaven series. Catalogue: <a href="https://www.nationalgalleries.org/art-and-artists/features/hill-and-adamson">nationalgalleries.org / hill-and-adamson</a>.`)), /* @__PURE__ */ React.createElement(SB, { title: "Secondary scholarship" }, /* @__PURE__ */ React.createElement(P, null, `Macdougall, Norman (1989). <em>James IV</em>. East Linton: Tuckwell Press. The standard modern study of the reign and the principal recent treatment of the royal-shipyard period.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 8 } }, `Rodger, N.A.M. (1997). <em>The Safeguard of the Sea: A Naval History of Britain, 660-1649</em>. London: HarperCollins. Sceptical treatment of the Great Michael's dimensions.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 8 } }, `Knox, John (composed 1550s-60s; first full printing ed. David Buchanan, 1644). <em>History of the Reformation in Scotland</em>. Source of the most-quoted contemporary description of the Great Michael; partisan and not a naval specialist.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 8 } }, `Lavery, Brian (1994). <em>Maritime Scotland</em>. London: Batsford / Historic Scotland. Brief comparative discussion of early Scottish naval shipbuilding.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 8 } }, `Gifford, John, McWilliam, Colin & Walker, David (1984). <em>The Buildings of Scotland: Edinburgh</em>. Harmondsworth: Penguin. Standard architectural reference.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 8 } }, `Mackenzie, Tom (1934). <em>Newhaven and the Newhaven Fishermen</em>. Edinburgh: privately printed. Local history of variable reliability but useful for early-twentieth-century memory.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 8 } }, `<em>Dictionary of the Scots Language</em> (DSL), online: <a href="https://dsl.ac.uk/">dsl.ac.uk</a>. Etymology of <em>caller</em>.`)), /* @__PURE__ */ React.createElement(SB, { title: "Online and journalistic sources" }, /* @__PURE__ */ React.createElement(P, null, `Edinburgh Council parks records (Starbank Park, Cleghorn gift); <em>Edinburgh News</em> archive (<a href="https://www.edinburghnews.scotsman.com/">edinburghnews.scotsman.com</a>) for twentieth-century coverage of the museum, slum clearance, and trams; Wikimedia Commons (Newhaven categories) for image attributions; Edinburgh Trams official site and Council reports for the 2023 extension; Friends of Starbank Park (community body).`)), /* @__PURE__ */ React.createElement(SB, { title: "Items requiring verification or flagged as contested" }, /* @__PURE__ */ React.createElement(P, null, `<strong>Great Michael dimensions</strong>: the 240-foot length, 36-foot beam, 1,000-ton burthen, and 27 cannon are the conventional figures (Knox, Macdougall) but are not universally accepted; Rodger and others treat them with caution. The figure used in this article is described as the best-attested but contested set, and Figure 3 marks contested values explicitly.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 8 } }, `<strong>Starbank House date</strong>: c.1815 / early-nineteenth-century; the precise year is not securely established and HES Canmore does not give one. The date appears in multiple secondary sources but with variation.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 8 } }, `<strong>Last commercial fishing boat from Newhaven</strong>: late 1990s, but precise year and vessel are subject to competing memory.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 8 } }, `<strong>"Caller herrin'" etymology</strong>: this article rejects the popular Gaelic-derivation claim in favour of the standard Scots etymology recorded in DSL.`), /* @__PURE__ */ React.createElement(P, { style: { marginTop: 8 } }, `<strong>Pre-1500 settlement at Anchorfield / Pow Burn</strong>: described from local-history sources but with limited documentary anchoring before the sixteenth century.`)), /* @__PURE__ */ React.createElement(SB, { title: "Tier-2 composites" }, /* @__PURE__ */ React.createElement(P, null, `<em>None used.</em> The \xA712 walking sequence is given without an invented or composite character. No invented quotes, no invented researchers, no Tier-3 fabricated material has been introduced. Where the agent has reasoned beyond cited material \u2014 for instance in synthesising the long arc of decline, or in the reading of the periods overlapping along Starbank Road \u2014 these are interpretive observations, not factual claims, and the surrounding language is hedged accordingly.`)), /* @__PURE__ */ React.createElement(SB, { title: "Acknowledged limits of this account" }, /* @__PURE__ */ React.createElement(P, null, `A serious treatment of Newhaven would benefit from access to the Newhaven Heritage Project's oral-history recordings; from the Edinburgh City Archives' uncatalogued harbour-engineering correspondence (Stevenson and successors); from the Newhaven Free Fishermen's Society records, where extant; and from systematic dialectological survey of the village's surviving older residents. None of these has been consulted directly here. The article is a synthesis from published primary and secondary sources and from the standard online catalogues; field verification of building dates, listings, and current uses would refine and in places correct the account.`)))), /* @__PURE__ */ React.createElement("div", { style: { background: C.navy, color: "rgba(255,255,255,0.55)", padding: "30px 24px", textAlign: "center", fontFamily: F.sans, fontSize: 12 } }, /* @__PURE__ */ React.createElement("div", { style: { fontFamily: F.head, fontSize: 14, fontWeight: 700, color: "#E2B068", letterSpacing: "0.
