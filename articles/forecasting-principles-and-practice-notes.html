/* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Vector autoregressive (VAR) models" }, `Vector autoregressive (VAR) models extend univariate autoregressive models to handle multiple time series that influence each other simultaneously, treating all variables symmetrically as endogenous. A VAR(p) model for K variables has K equations, each containing a constant plus p lags of all K variables, with <code>K + p*K^2</code> total coefficients (<code>1 + p*K</code> per equation). Model selection uses the BIC (preferred over AIC which tends to select too many lags) via <code>VARselect()</code>, and serial correlation in residuals is tested using multivariate portmanteau tests. VARs are particularly useful for forecasting collections of related variables, testing Granger causality, and impulse response analysis. The US consumption-income example demonstrates fitting a VAR(3) that passes the serial correlation test and produces reasonable forecasts.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Neural network autoregression (NNAR)" }, `Neural network autoregression (NNAR) models use lagged values of the time series as inputs to a feed-forward neural network with one hidden layer, denoted <code>NNAR(p,k)</code> for non-seasonal and <code>NNAR(p,P,k)_m</code> for seasonal data, where p is the number of lagged inputs, P is the number of seasonal lags, and k is the number of hidden neurons. The sigmoid activation function <code>s(z) = 1/(1+e^{-z})</code> introduces nonlinearity, and a decay parameter (typically 0.1) prevents overfitting by restricting weight magnitudes. The <code>nnetar()</code> function automatically selects p (from optimal linear AR), sets P=1 for seasonal data, and defaults <code>k=(p+P+1)/2</code> hidden neurons. Unlike ARIMA, NNAR models can capture asymmetric cycles and other nonlinear patterns, but prediction intervals require simulation-based bootstrap methods (<code>PI=TRUE</code>) because no analytical formulas exist.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bootstrapping and bagging" }, `Bootstrapping and bagging provide methods for improving both prediction intervals and point forecast accuracy. Time series bootstrapping generates synthetic series similar to the original by STL-decomposing the Box-Cox-transformed data, applying blocked bootstrap to the remainder component (preserving autocorrelation structure), and recomposing. Prediction intervals from bootstrapped series account for parameter uncertainty and model uncertainty (not just error uncertainty), producing wider and more realistic intervals than standard methods. Bagging (bootstrap aggregating) improves point forecast accuracy by fitting ETS models to multiple bootstrapped versions of the series and averaging the resulting forecasts, implemented through <code>baggedETS()</code>, which on average outperforms direct <code>ets()</code> application.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "NNAR reference" }, `<code>NNAR(p,P,k)_m</code>: p lagged inputs, P seasonal lags, k hidden neurons with sigmoid activation. <code>nnetar()</code> for fitting, <code>PI=TRUE</code> for simulation-based prediction intervals.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "TBATS reference" }, `TBATS: Trigonometric seasonality (Fourier), Box-Cox, ARMA errors, Trend, Seasonal. Allows time-varying seasonality. <code>tbats()</code> for automated fitting.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bagging reference" }, `Bagging: <code>bld.mbb.bootstrap()</code> generates bootstrap series, <code>baggedETS()</code> averages forecasts from 100 bootstrapped ETS models. Improves point forecast accuracy on average.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 11 reaches past the ETS/ARIMA core into complex seasonality (<code>mstl()</code>, dynamic harmonic regression, TBATS), multivariate dynamics (VAR with BIC-based selection via <code>VARselect()</code>), nonlinear autoregression (NNAR via <code>nnetar()</code> with bootstrapped PIs), and ensembling (blocked-bootstrap prediction intervals plus <code>baggedETS()</code> point-forecast improvement). The key tradeoffs: TBATS allows evolving seasonality but rejects covariates and is slow; dynamic harmonic regression accepts covariates but fixes the seasonal pattern; NNAR captures nonlinearity at the cost of analytical intervals.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 12: Some Practical Forecasting Issues"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Weekly, daily, and sub-daily data" }, `Weekly, daily, and sub-daily data each present distinct forecasting challenges. Weekly data is difficult because the seasonal period (52.18 weeks per year) is both large and non-integer, with three recommended approaches: STL decomposition with a non-seasonal method applied to the seasonally adjusted data (<code>stlf()</code>), dynamic harmonic regression with Fourier terms and ARIMA errors (selecting K up to 25 by minimizing AICc), and TBATS models. Daily and sub-daily data face the additional challenge of multiple seasonal periods (daily, weekly, and annual), requiring the multi-seasonal methods from Chapter 11. Moving holiday effects (Easter, Chinese New Year) require dummy variables in a dynamic regression framework since STL, ETS, and TBATS do not support covariates. The STL or TBATS approach is preferred when seasonality changes over time, while dynamic harmonic regression is preferred when covariates are available.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Count data and Croston's method" }, `Count data and intermittent demand require specialized approaches when counts are small enough that the continuous sample space assumption breaks down. Croston's method handles intermittent demand by separately forecasting the non-zero demand sizes (<code>q_i</code>) and the inter-arrival times (<code>a_i</code>) between non-zero demands using simple exponential smoothing with the same smoothing parameter alpha (default 0.1), then computing the forecast as the ratio <code>hat{y}_{T+h|T} = hat{q}/hat{a}</code>. The <code>croston()</code> function implements this method, and while it does not correspond to any formal statistical model (so prediction intervals cannot be computed analytically), it is widely used in inventory management. For count data with sufficiently large minimum values (100+), standard continuous methods work adequately.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Constrained forecasts (positive, interval [a,b])" }, `Ensuring forecasts stay within specified limits uses transformations to constrain the forecast range. Positive forecasts are guaranteed by working on the log scale (<code>lambda=0</code> in Box-Cox), while constraining forecasts to an interval <code>[a,b]</code> uses the scaled logit transformation <code>y = log((x-a)/(b-x))</code>, with the inverse <code>x = (b-a)*e^y/(1+e^y) + a</code> applied to back-transform forecasts and prediction intervals. The <code>biasadj=TRUE</code> argument produces mean forecasts (rather than median) when using transformations. These transformations preserve prediction interval coverage probabilities because quantiles are preserved under monotonically increasing transformations, though the resulting forecast distributions may become highly skewed.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Forecast combination" }, `Forecast combination, averaging forecasts from multiple methods, is one of the simplest and most reliable ways to improve forecast accuracy. The seminal Bates and Granger (1969) paper established that combining forecasts often outperforms any individual method, and subsequent research has consistently confirmed this finding. While weighted averages and more sophisticated combination approaches exist, simple averaging has proven remarkably difficult to beat. The Australian eating-out expenditure example demonstrates that a simple average of ETS, ARIMA, STL-ETS, NNAR, and TBATS forecasts achieves an RMSE of 0.072 on the test set, substantially outperforming the best individual method (TBATS at 0.094). The combination approach is almost always close to or better than the best component method, providing a robust hedge against the risk of selecting a poorly performing individual model.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Prediction intervals for aggregates" }, `Prediction intervals for aggregates of multiple forecast periods (e.g., forecasting total annual demand from monthly forecasts) cannot simply be obtained by summing the individual prediction intervals because forecast errors are correlated across periods. The correct approach uses simulation: fit the model, simulate many future sample paths, sum each path over the desired aggregation period, and compute quantiles of the summed values. The <code>simulate()</code> function applied to fitted ets or arima objects generates the sample paths, and the resulting aggregate prediction intervals properly account for the correlation structure.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Backcasting, missing values, outliers" }, `Backcasting (forecasting backwards in time) can fill in historical data before the start of a time series by reversing the series, fitting a model, forecasting forward (which corresponds to backward in the original time frame), and then reversing the results. Dealing with missing values uses <code>na.interp()</code> for linear interpolation (non-seasonal) or STL-based interpolation (seasonal data), while outlier detection and replacement uses <code>tsoutliers()</code> to identify outliers and <code>tsclean()</code> to handle both missing values and outliers automatically. These data cleaning steps are important because many forecasting methods (particularly <code>ets()</code>, <code>stlf()</code>, and <code>tbats()</code>) do not natively handle missing values, and outliers can distort model estimation and forecast accuracy.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Short vs long series, fair test-set evaluation" }, `Practical considerations for time series length address both extremes: very short series (where the AICc naturally selects simple models with few parameters, and the magic number of 30 observations for ARIMA has no theoretical justification) and very long series (where the assumption that the data generating process is constant breaks down, and it may be better to use only the most recent observations). For forecasting on training and test sets, multi-step fitted values on training data can be obtained using <code>fitted(model, h=12)</code>, and one-step forecasts on test data use <code>Arima(test, model=trained_model)</code> which applies the trained model without re-estimation, providing fair out-of-sample evaluation at a consistent forecast horizon.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Croston's method reference" }, `Croston's method: Separate SES on demand sizes <code>q_i</code> and inter-arrival times <code>a_i</code>, forecast = <code>hat{q}/hat{a}</code>. Default alpha=0.1. No analytical prediction intervals.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Forecast combination reference" }, `Forecast combination: Simple average of multiple methods consistently competitive with or better than the best individual method. Combination RMSE=0.072 vs best individual TBATS RMSE=0.094 in the eating-out example.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Constrained forecasts reference" }, `Constrained forecasts: Positive via <code>lambda=0</code> (log). Interval <code>[a,b]</code> via scaled logit <code>y = log((x-a)/(b-x))</code>. Back-transform with <code>x = (b-a)*e^y/(1+e^y) + a</code>. <code>biasadj=TRUE</code> for mean forecasts.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 12 wraps up with applied pragmatics. Non-integer weekly seasonality is handled via <code>stlf()</code>, dynamic harmonic regression with K up to 25, or TBATS; multi-seasonal sub-daily data uses the Chapter 11 toolkit with moving-holiday dummies when covariates are needed. Intermittent demand uses Croston. Constrained forecasts use log (positivity) or scaled logit (interval <code>[a,b]</code>) with <code>biasadj=TRUE</code>. Aggregate prediction intervals require simulation because period errors correlate. Missing values and outliers are handled via <code>na.interp()</code>, <code>tsoutliers()</code>, and <code>tsclean()</code>. And most importantly: a simple average of diverse models is the most robust accuracy-improvement lever in the book.`), /* @__PURE__ */ React.createElement(H3, null, "Summary"), /* @__PURE__ */ React.createElement(P, null, `<em>Forecasting: Principles and Practice</em> traces a coherent arc from probabilistic philosophy through visualization, benchmarks, and transformations, into two foundational model families \u2014 ETS and ARIMA \u2014 then out into dynamic regression, hierarchical reconciliation, and advanced nonlinear and multivariate methods. The notation system (<code>y_t</code>, <code>hat{y}</code>, <code>y_{T+h|T}</code>, the backshift B, the summing matrix <code>S</code>) and the evaluation apparatus (MASE, Ljung-Box, <code>tsCV()</code>, AICc) recur as connective tissue across every chapter.`), /* @__PURE__ */ React.createElement(P, null, `The book's unifying epistemology is that forecasts are distributions, not numbers; that residuals-should-look-like-white-noise is the non-negotiable criterion for a well-specified model; that AICc is the principled model-selection tool within a class but out-of-sample evaluation via <code>tsCV()</code> is the only way to compare across classes; and \u2014 perhaps most practically \u2014 that simple averaging of diverse forecasting methods consistently outperforms the best individual method. Together, this makes <em>FPP2</em> the reference applied text for practitioners who must build forecasts that are rigorous, reproducible, and robust to model misspecification.`))));
