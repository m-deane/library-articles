most critical and most frequently underestimated step, requiring careful negotiation between forecasters and decision-makers about the appropriate level of granularity, the relevant forecast horizon, and the frequency of forecast updates. Determining what to forecast involves understanding whether aggregate or disaggregate forecasts are needed, what temporal resolution is appropriate, and what accuracy level is required.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Forecasts as probability distributions" }, `From a statistical perspective, each future observation is treated as a random variable with an associated probability distribution, and a forecast represents some summary statistic of that distribution such as the mean or median. The full forecast distribution provides the complete picture of forecast uncertainty, but in practice this is typically communicated through prediction intervals, most commonly at the 80% and 95% confidence levels. The standard notation uses <code>y_t</code> for the observation at time t, <code>hat{y}</code> for the forecast, and <code>y_{T+h|T}</code> for the h-step-ahead forecast made at time T, with T representing the most recent observation available. Understanding that forecasts are probability distributions rather than single numbers is fundamental to properly communicating and using forecast information.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Short, medium, and long-term forecasts" }, `Short-term, medium-term, and long-term forecasts serve fundamentally different organizational purposes and typically require different methodological approaches. Short-term forecasts (days to weeks) drive operational decisions like scheduling, inventory management, and staffing, and demand high accuracy at granular levels. Medium-term forecasts (months to a year) inform tactical planning around resource allocation, budgeting, and procurement, while long-term forecasts (years) guide strategic decisions about capacity expansion, market entry, and capital investment. The methods appropriate for each horizon differ substantially, with quantitative methods dominating short-term forecasting and qualitative methods playing an increasingly important role as the horizon extends.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Qualitative vs quantitative forecasting" }, `Qualitative forecasting methods become necessary when historical data is unavailable, when entering entirely new markets, or when facing unprecedented structural changes that render historical patterns irrelevant. Quantitative methods, by contrast, require two conditions: numerical historical data is available, and it is reasonable to assume that some aspects of past patterns will continue into the future. The assumption of pattern persistence is both the greatest strength and the greatest vulnerability of quantitative forecasting, as it enables powerful statistical methods but leaves them blind to structural breaks. The most robust forecasting systems typically combine both qualitative and quantitative inputs, leveraging the pattern recognition capabilities of statistical methods while incorporating domain knowledge about anticipated changes.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "R and fpp2 computational environment" }, `The book uses R throughout with the <code>fpp2</code> package (which loads <code>forecast</code> v8.3 and <code>ggplot2</code>), establishing a computational environment where every theoretical concept is immediately implementable and every method is accompanied by working code examples. The focus is exclusively on time series forecasting rather than cross-sectional prediction, and the second edition published in April 2018 reflects the state of the art in applied forecasting methodology.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Regular intervals and probabilistic framing" }, `Time series observations are assumed to be collected at regular intervals, and the mathematical framework treats forecasts as summaries of probability distributions over future random variables, with prediction intervals providing practical communication of forecast uncertainty at standard confidence levels of 80% and 95%.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 1 establishes intellectual and practical foundations, tracing forecasting's evolution and articulating the probabilistic framing that governs everything that follows. Key determinants of forecastability (understanding, data, self-fulfilment) and the forecasting-goals-planning distinction are clarified. A taxonomy of explanatory, pure time series, and mixed models is introduced alongside the five-step workflow. The notation <code>y_t</code>, <code>hat{y}</code>, and <code>y_{T+h|T}</code> is used consistently for the remainder of the book, and the computational stance (R + fpp2) is set.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 2: Time Series Graphics"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "ts objects and frequency specification" }, `The <code>ts</code> object in R serves as the fundamental data structure for time series analysis, with the frequency parameter encoding the seasonal period of the data: annual data uses <code>frequency=1</code>, quarterly uses <code>frequency=4</code>, monthly uses <code>frequency=12</code>, and weekly data approximately <code>frequency=52</code>. The <code>msts</code> class extends this to handle multiple seasonality patterns, which is essential for sub-daily data where multiple seasonal cycles operate simultaneously. For example, daily data may exhibit both weekly seasonality (<code>frequency=7</code>) and annual seasonality (<code>frequency=365.25</code>), while hourly electricity demand data may show daily, weekly, and annual patterns simultaneously. Understanding the correct frequency specification is critical because it determines how seasonal methods decompose and forecast the data.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Time plots and three fundamental patterns" }, `Time plots produced with <code>autoplot()</code> provide the essential first look at any time series, enabling visual identification of the three fundamental time series patterns: trend, seasonality, and cyclic behavior. Trend represents the long-term increase or decrease in the data and may be linear, polynomial, or more complex in form, while seasonal patterns recur at fixed, known frequencies tied to calendar periods. Cyclic patterns are distinguished from seasonality by having variable and typically longer periods, usually spanning two or more years, and are driven by economic or other non-calendar factors. The interplay between these three patterns determines which forecasting methods are appropriate and what transformations may be needed.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Seasonal plots and subseries plots" }, `Seasonal plots created with <code>ggseasonplot()</code> overlay data from different years (or seasonal periods) on a single plot, making it easy to identify whether seasonal patterns are consistent or evolving, while seasonal subseries plots from <code>ggsubseriesplot()</code> create mini time plots for each season with horizontal lines showing seasonal means. These complementary visualizations reveal different aspects of seasonality that a standard time plot might obscure. Seasonal plots support polar coordinate representations for compact visualization of cyclical seasonal patterns, and the combination of these plot types enables practitioners to assess whether seasonal patterns are stable enough for methods that assume constant seasonality or whether methods allowing evolving seasonality are required.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Scatterplots, correlation, and Anscombe's quartet" }, `Scatterplots and scatterplot matrices reveal relationships between multiple time series, with the correlation coefficient <code>r</code> quantifying the strength and direction of linear relationships on a scale from -1 to 1. Anscombe's quartet serves as a critical cautionary example, demonstrating four datasets that all share the same correlation coefficient of <code>r=0.82</code> yet exhibit fundamentally different relationship structures, proving that correlation alone is insufficient for understanding relationships. The <code>GGally::ggpairs()</code> function generates comprehensive scatterplot matrices showing all pairwise relationships simultaneously, providing an efficient way to explore relationships among multiple time series.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Lag plots and autocorrelation function (ACF)" }, `Lag plots produced by <code>gglagplot()</code> display the time series plotted against lagged versions of itself (<code>y_t</code> versus <code>y_{t-k}</code> for various values of k), providing direct visual evidence of autocorrelation at different lags. The autocorrelation function (ACF) formalizes this concept, measuring the linear relationship between lagged values using the formula <code>r_k = sum((y_t - ybar)(y_{t-k} - ybar)) / sum((y_t - ybar)^2)</code>, where <code>r_k</code> is the autocorrelation at lag k. Trend in the data manifests as a slow decrease in the ACF as the lag increases, while seasonality produces a scalloped pattern with peaks at the seasonal lag and its multiples, and these ACF signatures serve as diagnostic tools for identifying the underlying data generating process.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "White noise and significance bounds" }, `White noise represents the baseline case of a time series with no autocorrelation, no trend, and no seasonality, where each observation is independently and identically distributed. For a white noise series of length T, approximately 95% of the ACF spikes should fall within the bounds of plus or minus <code>2/sqrt(T)</code>, providing a formal test for whether observed autocorrelations are statistically significant. If all ACF spikes fall within these bounds, the series can be treated as white noise and simple benchmark methods should suffice for forecasting. This concept of white noise forms the foundation for residual diagnostics in all subsequent chapters, as a well-specified model should produce residuals that resemble white noise.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Visual analysis as ongoing component" }, `The visual approach to time series analysis emphasized in this chapter is not merely preliminary to formal modeling but constitutes an essential and ongoing component of the forecasting process. Experienced practitioners often identify data quality issues, structural breaks, and appropriate model classes through visual inspection before any formal analysis begins. The <code>ggplot2</code>-based visualization tools integrated into the fpp2 ecosystem enable rapid and informative exploration of time series data, supporting iterative model development through continuous visual assessment of data characteristics and model adequacy.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "ts frequency parameter reference" }, `The ts object frequency parameter determines how seasonal methods operate: <code>frequency=1</code> for annual, <code>frequency=4</code> for quarterly, <code>frequency=12</code> for monthly, and <code>frequency=52</code> for weekly data, with the <code>msts</code> class available for multiple seasonal frequencies.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "ACF formula and white noise test" }, `The ACF formula <code>r_k = sum((y_t - ybar)(y_{t-k} - ybar)) / sum((y_t - ybar)^2)</code> measures the linear association between a time series and its lagged values, with 95% significance bounds at plus or minus <code>2/sqrt(T)</code> providing the white noise test criterion.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 2 establishes the visual toolkit \u2014 <code>autoplot()</code>, <code>ggseasonplot()</code>, <code>ggsubseriesplot()</code>, <code>gglagplot()</code>, <code>ggAcf()</code> \u2014 and crisp definitions for trend, seasonality, and cyclic behaviour. The ACF is introduced as the primary quantitative diagnostic; its characteristic signatures (slow decay for trend, scalloping for seasonality, all spikes inside <code>\xB12/sqrt(T)</code> for white noise) recur as reference patterns throughout the book. Anscombe's quartet warns against relying on correlation in isolation.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 3: The Forecaster's Toolbox"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Four simple benchmark methods" }, `Four simple benchmark forecasting methods establish performance baselines against which all more sophisticated methods should be judged. The average method (<code>meanf()</code>) forecasts all future values as the mean of all historical observations. The naive method (<code>naive()</code> or <code>rwf()</code>) uses the last observation as the forecast for all future periods. The seasonal naive method (<code>snaive()</code>) forecasts each future period using the last observed value from the same season. The drift method (<code>rwf(drift=TRUE)</code>) extends the naive method by adding the average historical change, effectively drawing a line from the first to the last observation and extrapolating forward. These benchmarks are deceptively powerful, and any proposed forecasting model must demonstrably outperform the appropriate benchmark to justify its additional complexity.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Transformations and Box-Cox" }, `Transformations and adjustments are applied to data before modeling to handle specific data characteristics. Calendar adjustments (<code>monthdays()</code> function) account for varying month lengths, population adjustments convert totals to per-capita figures, and inflation adjustments using price indexes like the CPI make monetary values comparable across time. Mathematical transformations including logarithms, power transformations, and the Box-Cox family (<code>w_t = log(y_t)</code> when <code>lambda=0</code>, otherwise <code>(y_t^lambda - 1)/lambda</code>) stabilize variance when the variability of the series changes with the level. The <code>BoxCox.lambda()</code> function automatically selects the optimal lambda, and the critical bias adjustment concept (<code>biasadj=TRUE</code>) ensures that back-transformed forecasts represent means rather than medians of the forecast distribution.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Residual diagnostics and four properties" }, `Residual diagnostics form the cornerstone of model validation, with residuals defined as <code>e_t = y_t - hat{y}_t</code> representing one-step forecast errors on the training data. Four desirable properties of residuals are evaluated: they should be uncorrelated (essential), have zero mean (essential), exhibit constant variance (useful for prediction intervals), and follow a normal distribution (useful for prediction intervals). The <code>checkresiduals()</code> function provides a comprehensive diagnostic combining a time plot of residuals, an ACF plot, a histogram, and the Ljung-Box test, enabling rapid assessment of whether a model has adequately captured the data generating process.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Portmanteau tests (Box-Pierce, Ljung-Box)" }, `Portmanteau tests formalize the assessment of residual autocorrelation by testing whether the first several autocorrelations are collectively different from zero. The Box-Pierce test statistic <code>Q = T * sum(r_k^2)</code> and the preferred Ljung-Box statistic <code>Q* = T(T+2) * sum((T-k)^{-1} * r_k^2)</code> both follow chi-squared distributions with <code>(h-K)</code> degrees of freedom, where h is the number of lags tested and K is the number of model parameters estimated. The standard recommendation is <code>h=10</code> for non-seasonal data and <code>h=2m</code> for seasonal data with period m. A significant test result (small p-value) indicates that the residuals exhibit autocorrelation not captured by the model, suggesting model misspecification.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Forecast accuracy evaluation (MAE, RMSE, MAPE, MASE)" }, `Forecast accuracy evaluation requires separating data into training and test sets, with the test set typically comprising about 20% of the sample. Scale-dependent error measures include MAE (mean absolute error) and RMSE (root mean squared error), which are useful for comparing methods on the same dataset but cannot be used across different scales. Percentage errors including MAPE (mean absolute percentage error) are scale-free but problematic when values are near zero. The scaled error approach, yielding the MASE (mean absolute scaled error), divides the forecast error by the in-sample one-step naive forecast error, providing a meaningful benchmark where MASE less than 1 indicates the method outperforms the naive approach. The sMAPE measure is explicitly not recommended due to instability near zero values.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Prediction intervals for benchmark methods" }, `Prediction intervals quantify forecast uncertainty and take the general form <code>hat{y} plus or minus c * sigma_h</code>, where c depends on the coverage probability (1.96 for 95%, 1.28 for 80%) and <code>sigma_h</code> is the forecast standard deviation at horizon h. The one-step forecast standard deviation <code>sigma_1</code> is estimated from the residual standard deviation, while multi-step <code>sigma_h</code> increases with the forecast horizon according to method-specific formulas: <code>sigma * sqrt(1 + 1/T)</code> for the mean method, <code>sigma * sqrt(h)</code> for the naive method, <code>sigma * sqrt(k+1)</code> for seasonal naive where <code>k = floor((h-1)/m)</code>, and <code>sigma * sqrt(h(1 + h/T))</code> for the drift method. Bootstrapped prediction intervals provide a non-parametric alternative by resampling residuals to simulate future paths.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Time series cross-validation (tsCV)" }, `Time series cross-validation (<code>tsCV()</code> function) provides a more sophisticated evaluation framework than simple train/test splitting by using rolling origin evaluation, where the training set is progressively expanded one observation at a time and forecasts are computed at each step. This approach generates a full set of forecast errors for each horizon h, providing a more robust assessment of forecast accuracy than a single train/test split. The cross-validation approach is particularly valuable for short time series where a single test set may not provide reliable accuracy estimates, and it naturally handles the fact that forecast accuracy often varies with the position in the time series.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Fitted values as one-step forecasts" }, `The concept of fitted values as one-step forecasts on the training data, defined as <code>hat{y}_{t|t-1}</code>, is distinguished from genuine multi-step forecasts on a test set. Good in-sample fit does not guarantee good out-of-sample forecast performance, as models can overfit training data by capturing noise rather than signal. This distinction between fitting and forecasting is reinforced throughout the book and motivates the use of information criteria and cross-validation for model selection.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Box-Cox transformation reference" }, `Box-Cox transformation: <code>w_t = log(y_t)</code> if <code>lambda=0</code>; <code>(y_t^lambda - 1)/lambda</code> otherwise. Back-transformed forecasts yield medians; use <code>biasadj=TRUE</code> for means.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Ljung-Box test reference" }, `Ljung-Box test: <code>Q* = T(T+2) * sum from k=1 to h of ((T-k)^{-1} * r_k^2)</code>, distributed <code>chi-squared(h-K)</code>. Use <code>h=10</code> for non-seasonal, <code>h=2m</code> for seasonal data.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "MASE formula reference" }, `<code>MASE = mean(|q_j|)</code> where <code>q_j = e_j / (1/(T-1) * sum|y_t - y_{t-1}|)</code> for non-seasonal, with seasonal naive denominator for seasonal data. MASE less than 1 means better than naive.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 3 assembles the methodological toolkit used throughout the rest of the book: the four benchmarks (average, naive, seasonal naive, drift) that define the bar every sophisticated model must clear; the Box-Cox family for variance stabilisation with the crucial <code>biasadj=TRUE</code> mean correction; residual diagnostics via <code>checkresiduals()</code> paired with the Ljung-Box portmanteau test; the scale-free MASE as the recommended accuracy measure; method-specific prediction interval formulas; and <code>tsCV()</code> rolling-origin cross-validation as the gold-standard accuracy evaluator.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 4: Judgmental Forecasts"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "When judgmental forecasting is needed and its biases" }, `Judgmental forecasting becomes necessary when quantitative data is unavailable, when facing entirely new situations without historical precedent, or when major structural changes render historical patterns irrelevant, but it is subject to systematic biases that must be understood and mitigated. Key cognitive limitations include inconsistency (the same person may produce different forecasts given the same information at different times), anchoring (over-reliance on the first piece of information encountered), availability bias (overweighting recent or vivid events), and optimism bias (systematically overestimating favorable outcomes). The fundamental principles for effective judgmental forecasting include clear task definition, a systematic and documented approach, explicit evaluation criteria, and the important organizational principle of separating forecasters from the users of forecasts to prevent political contamination of the process.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "The Delphi method" }, `The Delphi method represents the gold standard for structured expert judgment, assembling a panel of 5-20 anonymous experts who provide iterative forecasts with controlled feedback until a reasonable consensus emerges. The process follows a specific protocol: assemble a diverse panel, set clear forecasting tasks, collect initial forecasts, provide statistical summaries of the group's responses as feedback, iterate (usually 2-3 rounds are sufficient), and aggregate the final forecasts. Anonymity is the critical design feature that prevents political pressure, dominant personalities, and groupthink from biasing the outcome, while the iterative feedback mechanism enables experts to revise their judgments in light of the group's collective wisdom. A variation called estimate-talk-estimate relaxes the anonymity requirement while preserving the iterative structure.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Forecasting by analogy" }, `Forecasting by analogy involves comparing the current forecasting situation to similar historical cases and using the outcomes of those analogous situations as the basis for forecasts. The structured analogy approach assembles a panel of experts who independently identify analogous situations, rate their similarity to the current case, provide forecasts based on each analogy, and produce a final weighted aggregate where more similar analogies receive higher weights. This approach is particularly useful for new product forecasting, technology adoption, and other situations where the specific data series has no history but similar situations have occurred in other contexts. The key requirement is that experts must genuinely understand both the current situation and the proposed analogies.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Scenario and new-product forecasting" }, `Scenario forecasting generates forecasts by constructing plausible future scenarios (typically best case, most likely case, and worst case) and developing forecasts conditional on each scenario, providing decision-makers with a range of possible outcomes rather than a single point forecast. New product forecasting employs multiple approaches including sales force composites (aggregating estimates from salespeople closest to customers), executive opinion (leveraging senior management insight), and customer intention surveys (directly asking potential customers about purchase plans). Each approach has specific strengths and weaknesses, and combining multiple approaches generally improves accuracy relative to any single method.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Judgmental adjustments to statistical forecasts" }, `Judgmental adjustments to statistical forecasts should be made sparingly and only when the forecaster has significant new information not captured in the historical data, such as knowledge of upcoming policy changes, competitor actions, or unusual events. Research consistently shows that large adjustments tend to be more effective than small ones, while small positive adjustments (which reflect systematic optimism bias) actually hurt forecast accuracy. The Australian Pharmaceutical Benefits Scheme example illustrates how structured approaches to judgmental adjustment for new drug listings can be effective, while unstructured adjustments for policy impacts tend to degrade accuracy.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Delphi method reference" }, `Delphi method: 5-20 anonymous experts, 2-3 iterative rounds with statistical feedback, facilitator-managed process. Anonymity prevents groupthink and political pressure; diversity of expertise improves collective judgment.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Judgmental adjustments reference" }, `Judgmental adjustments: Large adjustments more effective than small; small positive adjustments (optimism) degrade accuracy. Apply only with significant new information not captured in the data.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 4 gives judgment its due as a legitimate forecasting mode when data is absent or structural breaks invalidate history, while cataloguing the cognitive biases (anchoring, availability, optimism, inconsistency) that must be mitigated through structure. Delphi (anonymous, iterative, statistically fed back) is positioned as the gold standard; structured analogy, scenario forecasting, and new-product methods (sales force composites, executive opinion, customer intention surveys) round out the toolkit. The actionable rule for judgmental adjustments: large and information-based, not small and optimistic.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 5: Time Series Regression Models"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Multiple linear regression for time series" }, `The multiple linear regression model for time series takes the form <code>y_t = beta_0 + beta_1*x_{1,t} + ... + beta_k*x_{k,t} + epsilon_t</code>, where the assumptions require a linear relationship between the response and each predictor, errors with zero mean, errors uncorrelated with each other and unrelated to the predictors, and optionally, normally distributed errors with constant variance <code>sigma^2</code>. The <code>tslm()</code> function fits time series regression models using least squares estimation, minimizing the sum of squared residuals to obtain coefficient estimates. R-squared measures the proportion of variation explained (0 to 1), while the standard error of regression <code>sigma_hat = sqrt(1/(T-k-1) * sum(e_t^2))</code> quantifies the typical size of the residuals and drives prediction interval calculations.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Regression diagnostics in time series" }, `Evaluating regression model adequacy in the time series context requires additional diagnostics beyond standard regression checks, with particular attention to residual autocorrelation which violates the uncorrelated errors assumption. The ACF plot of residuals reveals temporal patterns, while the Breusch-Godfrey (Lagrange Multiplier) test provides a formal test for serial correlation specifically designed for regression models. Residual plots against predictors check for nonlinear relationships that should be modeled, residual plots against fitted values check for heteroscedasticity, and the histogram of residuals assesses normality. Spurious regression represents a critical pitfall where two non-stationary time series appear strongly related (high R-squared with highly autocorrelated residuals) when in fact no genuine relationship exists.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Useful predictors (trend, seasonality, interventions)" }, `A rich vocabulary of useful predictors extends the regression framework for time series. Trend is modeled by including t as a predictor via <code>tslm(y ~ trend)</code>, while seasonal effects use dummy variables automatically created by <code>tslm(y ~ season)</code>, requiring k-1 dummies for k seasonal categories. Intervention variables capture one-time events as either spike variables (single period effect) or step variables (permanent shift), trading day adjustments via <code>bizdays()</code> account for the number of business days in each period, and distributed lags model delayed effects such as advertising expenditure impacting sales over multiple subsequent periods. Easter effects are captured with a moving holiday dummy via the <code>easter()</code> function.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Fourier terms for seasonality" }, `Fourier terms provide an elegant alternative to seasonal dummies that is particularly advantageous for data with long seasonal periods. The approach models seasonality using pairs of sine and cosine terms: <code>sin(2*pi*k*t/m)</code> and <code>cos(2*pi*k*t/m)</code> for <code>k=1,2,...,K</code> pairs, where m is the seasonal period. The <code>fourier()</code> function generates these terms, and K controls the smoothness of the seasonal pattern: small K produces smooth seasonality while <code>K=m/2</code> reproduces the full flexibility of seasonal dummy variables. For weekly data with approximately 52 seasonal periods, Fourier terms are far more parsimonious than 51 dummy variables, and the value of K can be selected using information criteria such as AICc.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Predictor selection via information criteria" }, `Predictor selection uses information criteria rather than p-values or individual scatterplots, which can be misleading in the presence of correlated predictors. Adjusted R-squared (<code>R-bar^2 = 1 - (1-R^2)(T-1)/(T-k-1)</code>) penalizes for the number of predictors, while <code>AIC = T*log(SSE/T) + 2(k+2)</code> and its small-sample correction <code>AICc = AIC + 2(k+2)(k+3)/(T-k-3)</code> provide theoretically grounded model selection criteria. The <code>BIC = T*log(SSE/T) + (k+2)*log(T)</code> penalizes model complexity more heavily than AIC, tending to select simpler models. Best subset regression evaluates all possible combinations of predictors, while stepwise regression (forward or backward) provides a computationally tractable alternative for large predictor sets.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Ex-ante, ex-post, and scenario forecasts" }, `Forecasting with regression models distinguishes between ex-ante forecasts (using only information available at forecast time, requiring predictor forecasts), ex-post forecasts (using actual predictor values, which are not genuine forecasts but useful for model evaluation), and scenario-based forecasts (assuming specific future predictor scenarios). Building genuinely predictive models often requires using lagged predictors: <code>y_{t+h} = f(x_{1,t}, ..., x_{k,t}) + epsilon_{t+h}</code>, where the predictors at time t are used to forecast the response h steps ahead, eliminating the need to forecast the predictors themselves. Prediction intervals for regression forecasts widen when the predictor values are far from their historical means.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Nonlinear regression extensions" }, `Nonlinear regression extensions handle curved relationships while maintaining the linear regression estimation framework. The log-log model <code>log(y) = beta_0 + beta_1*log(x) + epsilon</code> interprets <code>beta_1</code> as an elasticity, piecewise linear regression allows different slopes in different regions using knot points with the <code>(x-c)+</code> notation, and regression splines (linear and cubic) provide smooth nonlinear fits. Natural cubic smoothing splines constrained to be linear at the ends are available via <code>splinef()</code>, and the important practical advice is to avoid quadratic or higher-order polynomial trends for forecasting because they produce unreliable extrapolations.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Correlation, causation, multicollinearity, spurious regression" }, `Correlation does not imply causation, and multicollinearity (highly correlated predictors providing redundant information) makes individual coefficient estimates unreliable and difficult to interpret, though it does not necessarily degrade forecast accuracy as long as the predictor correlations remain stable in the forecast period. Spurious regression is a particularly insidious problem in time series regression where two non-stationary series can appear strongly related purely because they share common trending behavior, and the combination of high R-squared with highly autocorrelated residuals should be treated as a warning sign rather than evidence of a genuine relationship.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "AICc, BIC formulas" }, `<code>AICc = AIC + 2(k+2)(k+3)/(T-k-3)</code>, where <code>AIC = T*log(SSE/T) + 2(k+2)</code>. <code>BIC = T*log(SSE/T) + (k+2)*log(T)</code>. Minimize AICc for model selection.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Fourier terms reference" }, `Fourier terms: <code>sin(2*pi*k*t/m)</code> and <code>cos(2*pi*k*t/m)</code> for <code>k=1,...,K</code> pairs. <code>K=m/2</code> equivalent to seasonal dummies. Select K by minimizing AICc.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 5 develops time series regression through <code>tslm()</code>, extending OLS to cope with temporal autocorrelation (checked via Breusch-Godfrey and residual ACF). The predictor vocabulary is rich: trend, seasonal dummies, intervention spikes/steps, bizdays, Easter, distributed lags, and Fourier terms (the preferred parsimonious seasonality device for long periods). Model selection uses AICc rather than p-values. Ex-ante vs ex-post vs scenario forecasts are distinguished; lagged predictors enable genuine prediction. The spurious regression warning and the pragmatic multicollinearity-for-forecasting view close the chapter.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 6: Time Series Decomposition"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Additive and multiplicative decomposition" }, `Time series decomposition separates data into three components: trend-cycle (<code>T_t</code>), seasonal (<code>S_t</code>), and remainder (<code>R_t</code>), with two fundamental formulations. The additive decomposition <code>y_t = S_t + T_t + R_t</code> is appropriate when the seasonal variation is roughly constant regardless of the level of the series, while the multiplicative decomposition <code>y_t = S_t * T_t * R_t</code> is appropriate when seasonal variation changes proportionally with the level. A log transformation converts multiplicative decomposition to additive (since <code>log(S_t * T_t * R_t) = log(S_t) + log(T_t) + log(R_t)</code>), providing a practical approach when multiplicative seasonality is present. Seasonally adjusted data is obtained by removing the seasonal component: <code>y_t - S_t</code> for additive or <code>y_t / S_t</code> for multiplicative decomposition.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Moving averages and 2xm-MA" }, `Moving averages form the foundation for trend estimation in classical decomposition, with an m-MA averaging m consecutive values centered at each time point (requiring m to be odd). For even seasonal periods, the 2xm-MA (a moving average of moving averages) is used, producing a weighted average of order <code>m+1</code> with weights <code>1/(2m)</code> at the ends and <code>1/m</code> in the middle. Larger order moving averages produce smoother trend estimates, and the choice of m should match the seasonal period to effectively eliminate seasonality from the trend estimate. The general principle is to use 2xm-MA for even m seasonal periods and simple m-MA for odd m seasonal periods.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Classical decomposition and its limitations" }, `Classical decomposition follows a four-step procedure: estimate the trend-cycle using 2xm-MA (or m-MA for odd m), detrend the data by subtracting (additive) or dividing by (multiplicative) the trend, compute the seasonal component by averaging the detrended values for each season, and obtain the remainder as what is left after removing trend and seasonal components. Despite its historical importance and pedagogical clarity, classical decomposition has significant limitations: no trend estimates are available for the first and last few observations, it tends to over-smooth rapid changes in the trend, it assumes the seasonal pattern is constant over time, and it is not robust to outliers which can distort all three components.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "X11 and SEATS decomposition" }, `The X11 decomposition method, developed by the US Census Bureau and Statistics Canada, addresses many limitations of classical decomposition by handling trading day variation, holiday effects, and outliers, while providing trend-cycle estimates for all observations including endpoints. The SEATS (Seasonal Extraction in ARIMA Time Series) method developed by the Bank of Spain uses a model-based approach applicable to quarterly and monthly data. Both methods are implemented through the seasonal package in R, with <code>seas(x11="")</code> for X11 and <code>seas()</code> for SEATS, and they represent the standard methods used by government statistical agencies worldwide for producing seasonally adjusted official statistics.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "STL decomposition" }, `STL (Seasonal and Trend decomposition using Loess) provides the most flexible decomposition approach, handling any type of seasonality (not just monthly or quarterly), allowing the seasonal component to change over time at a rate controlled by the user, and offering robustness to outliers through iterative re-weighting. The two key parameters are <code>t.window</code> (controlling trend smoothness) and <code>s.window</code> (controlling seasonal smoothness, which must be odd), where larger values produce smoother components. Setting <code>s.window="periodic"</code> forces constant seasonality equivalent to classical decomposition, while smaller values allow the seasonal pattern to evolve. The <code>mstl()</code> function provides automated STL decomposition, and the main limitation is that STL only supports additive decomposition (use log transform for multiplicative).`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Trend and seasonal strength measures" }, `Quantitative measures of decomposition component strength provide objective assessment of how dominant trend and seasonal patterns are in the data. Trend strength is measured as <code>F_T = max(0, 1 - Var(R_t)/Var(T_t + R_t))</code> and seasonal strength as <code>F_S = max(0, 1 - Var(R_t)/Var(S_t + R_t))</code>, both ranging from 0 to 1, where values close to 1 indicate strong trend or seasonal patterns respectively. These measures enable systematic comparison of decomposition characteristics across multiple time series, which is valuable when managing large collections of series with different properties.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Forecasting with decomposition (stlf)" }, `Forecasting with decomposition works by forecasting the seasonal and seasonally adjusted components separately, then recombining them. The <code>stlf()</code> function automates this process, applying STL decomposition, forecasting the seasonally adjusted series using ETS (by default), forecasting the seasonal component using seasonal naive, and then reseasonalizing the combined forecast. This approach allows the use of non-seasonal forecasting methods for the main series dynamics while preserving the seasonal pattern, and it is particularly useful when the seasonal pattern is well-defined but the underlying trend-cycle behavior is complex.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Decomposition formulas reference" }, `Additive: <code>y_t = S_t + T_t + R_t</code>. Multiplicative: <code>y_t = S_t * T_t * R_t</code>. Log transform converts multiplicative to additive.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "STL parameters reference" }, `STL parameters: <code>t.window</code> (trend smoothness), <code>s.window</code> (seasonal smoothness, must be odd). <code>s.window="periodic"</code> forces constant seasonality. Only handles additive decomposition.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Strength measures reference" }, `Strength measures: <code>F_T = max(0, 1 - Var(R_t)/Var(T_t + R_t))</code>, <code>F_S = max(0, 1 - Var(R_t)/Var(S_t + R_t))</code>.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 6 treats decomposition both as analytical lens and forecasting component. Additive vs multiplicative is chosen based on whether seasonal amplitude is constant or level-proportional; <code>log</code> transforms the latter into the former. Classical decomposition via m-MA or 2xm-MA is explained then superseded by X11 (government agency standard), SEATS (model-based), and especially STL via <code>mstl()</code> \u2014 the recommended general-purpose method, flexible in both <code>t.window</code> and <code>s.window</code> but additive-only. The <code>F_T</code> and <code>F_S</code> strength measures enable bulk characterisation of series collections. <code>stlf()</code> operationalises decomposition-based forecasting.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 7: Exponential Smoothing"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Simple exponential smoothing (SES)" }, `Simple exponential smoothing (SES) produces forecasts as weighted averages of all past observations, with weights declining exponentially from the most recent observation backward. The weighted average form <code>hat{y}_{T+1|T} = alpha*y_T + alpha(1-alpha)*y_{T-1} + alpha(1-alpha)^2*y_{T-2} + ...</code> shows how the smoothing parameter alpha (between 0 and 1) controls the rate of weight decay: values close to 1 give heavy weight to recent observations (responsive to changes), while values close to 0 give more weight to distant observations (smoother forecasts). The component form consists of a forecast equation <code>hat{y}_{t+h|t} = l_t</code> (all forecasts equal the last estimated level) and a level equation <code>l_t = alpha*y_t + (1-alpha)*l_{t-1}</code>. SES produces flat forecasts and is suitable only for data without trend or seasonal components.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "SES parameter estimation" }, `The smoothing parameters and initial states (alpha and <code>l_0</code> for SES) are estimated by minimizing the sum of squared one-step forecast errors (SSE), which is a nonlinear optimization problem solved numerically. This approach parallels the least squares estimation used in regression but requires iterative optimization rather than closed-form solutions. The <code>ses()</code> function implements this estimation and returns forecasts along with prediction intervals. For the oil production example, the fitted model yielded <code>alpha=0.83</code>, indicating the series responds strongly to recent observations with rapid level adjustments. Prediction intervals from SES can be quite wide, reflecting the fundamental uncertainty in series without exploitable trend or seasonal patterns.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Holt's linear trend and damped trend" }, `Holt's linear trend method extends SES to handle data with a trend by adding a trend component with its own smoothing equation. The three equations are: forecast equation <code>hat{y}_{t+h|t} = l_t + h*b_t</code>, level equation <code>l_t = alpha*y_t + (1-alpha)*(l_{t-1} + b_{t-1})</code>, and trend equation <code>b_t = beta**(l_t - l_{t-1}) + (1-beta*)*b_{t-1}</code>, where <code>beta*</code> is the trend smoothing parameter. The forecasts are linear functions of the horizon h, which means they increase or decrease indefinitely into the future. Gardner and McKenzie's damped trend method addresses this unrealistic behavior by introducing a damping parameter phi (between 0.8 and 0.98) that causes the trend to flatten over time, with forecasts converging to <code>l_T + phi*b_T/(1-phi)</code> as h approaches infinity. Damped trend methods have proven empirically to be among the most consistently accurate individual forecasting methods.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Holt-Winters seasonal methods" }, `Holt-Winters' seasonal method extends Holt's method to capture seasonality through three smoothing equations for level, trend, and seasonal components, with corresponding parameters alpha, <code>beta*</code>, and gamma. The additive variant uses <code>hat{y}_{t+h|t} = l_t + h*b_t + s_{t+h-m(k+1)}</code> where seasonal components sum to approximately zero within each year, while the multiplicative variant uses <code>hat{y}_{t+h|t} = (l_t + h*b_t)*s_{t+h-m(k+1)}</code> where seasonal components sum to approximately m. The additive method is appropriate when seasonal variation is constant in absolute terms, while the multiplicative method handles seasonal variation proportional to the level. The parameter gamma controls how quickly the seasonal pattern evolves, with small values preserving historical seasonal patterns and large values allowing rapid adaptation.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Nine-method taxonomy (T,S)" }, `The taxonomy of exponential smoothing methods consists of nine methods classified by trend component (None, Additive, Additive damped) and seasonal component (None, Additive, Multiplicative), yielding the <code>(T,S)</code> notation. SES is <code>(N,N)</code>, Holt's linear is <code>(A,N)</code>, damped trend is <code>(A_d,N)</code>, additive Holt-Winters is <code>(A,A)</code>, multiplicative Holt-Winters is <code>(A,M)</code>, and damped multiplicative Holt-Winters is <code>(A_d,M)</code>. Each method has a corresponding recursive formula consisting of a forecast equation and smoothing equations for each component. The smoothing parameters satisfy <code>0 &lt;= alpha, beta*, gamma*, phi &lt;= 1</code>, with the convention <code>beta = alpha*beta*</code> and <code>gamma = (1-alpha)*gamma*</code> providing alternative parameterizations that simplify the admissibility constraints.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Innovations state space and ETS notation" }, `Innovations state space models provide the statistical foundation for exponential smoothing, comprising a measurement equation (relating observations to states) and state equations (governing state evolution over time). For each of the nine methods, two models exist: one with additive errors and one with multiplicative errors, labeled using the <code>ETS(Error, Trend, Seasonal)</code> notation. For example, <code>ETS(A,N,N)</code> is SES with additive errors where <code>y_t = l_{t-1} + epsilon_t</code> and <code>l_t = l_{t-1} + alpha*epsilon_t</code>, while <code>ETS(M,N,N)</code> uses multiplicative errors where <code>y_t = l_{t-1}*(1+epsilon_t)</code>. The point forecasts from additive and multiplicative error models are identical given the same parameters, but the prediction intervals differ because the error distributions differ.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Model selection via ets()" }, `Model selection for ETS uses information criteria (AIC, AICc, BIC) to choose both the model structure and parameters, with the <code>ets()</code> function automating this process by searching across all valid combinations and selecting the model with the smallest AICc. The estimation uses maximum likelihood rather than minimum SSE (which gives different results for multiplicative error models), and the three problematic combinations <code>ETS(A,N,M)</code>, <code>ETS(A,A,M)</code>, and <code>ETS(A,A_d,M)</code> are normally excluded due to numerical instabilities. Multiplicative error models require strictly positive data. The <code>ets()</code> function returns smoothing parameters, initial states, and the selected model structure, and forecasts are obtained through the <code>forecast()</code> function applied to the fitted ets object.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "ETS prediction intervals" }, `ETS prediction intervals are computed using analytical formulas for additive models (with specific variance expressions for each model type involving alpha, beta, gamma, phi, <code>sigma^2</code>, h, m, and k) and simulation for multiplicative models where no closed-form solutions exist. Point forecasts from ETS models equal the medians of forecast distributions, which coincide with means for purely additive models but differ for models with multiplicative components. The <code>forecast()</code> function handles all these computations automatically, with options for simulation-based and bootstrapped prediction intervals when analytical formulas are unavailable.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "SES reference" }, `SES: <code>hat{y}_{t+h|t} = l_t</code>, <code>l_t = alpha*y_t + (1-alpha)*l_{t-1}</code>. Flat forecasts. alpha close to 1 gives weight to recent observations.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Holt and damped reference" }, `Holt: <code>hat{y}_{t+h|t} = l_t + h*b_t</code>. Damped: <code>hat{y}_{t+h|t} = l_t + (phi + phi^2 + ... + phi^h)*b_t</code>, converges to <code>l_T + phi*b_T/(1-phi)</code>.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "ETS taxonomy reference" }, `ETS taxonomy: 18 models (9 methods x 2 error types). <code>ets()</code> selects by AICc. <code>ETS(A,N,M)</code>, <code>ETS(A,A,M)</code>, <code>ETS(A_d,M)</code> excluded for numerical stability.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 7 builds from SES through Holt's linear trend to Holt-Winters' additive and multiplicative seasonal methods, culminating in the 9-method (T,S) taxonomy and its 18-model innovations-state-space ETS extension (Error \xD7 Trend \xD7 Seasonal). Damped trend (<code>phi</code> between 0.8 and 0.98) is flagged as one of the most consistently accurate individual methods empirically. The <code>ets()</code> function automates maximum-likelihood estimation and AICc-based selection across the valid subset; prediction intervals are analytical for additive-error models and simulation-based for multiplicative-error ones.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 8: ARIMA Models"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Stationarity and differencing" }, `Stationarity is the fundamental requirement for ARIMA modeling, meaning that the statistical properties of the time series do not depend on the time at which the series is observed. A stationary series has no predictable patterns in the long-term, with roughly constant mean and variance over time. Non-stationary data must be transformed to stationarity through differencing, where the first difference <code>y'_t = y_t - y_{t-1}</code> removes linear trend, and second differencing can remove quadratic trend. Seasonal differencing <code>y'_t = y_t - y_{t-m}</code> removes seasonal patterns with period m. The random walk model <code>y_t = y_{t-1} + epsilon_t</code> is the simplest non-stationary model, and its differenced form is white noise, illustrating the fundamental connection between differencing and stationarity.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Backshift operator and unit root tests" }, `The backshift operator notation B provides compact mathematical representation of ARIMA models, where <code>By_t = y_{t-1}</code>, <code>B^2*y_t = y_{t-2}</code>, and the differencing operator is <code>(1-B)</code>. First differencing is written as <code>(1-B)*y_t = y'_t</code>, seasonal differencing as <code>(1-B^m)*y_t</code>, and the combination <code>(1-B)(1-B^m)*y_t</code> represents both first and seasonal differencing applied simultaneously. This notation enables the compact expression of complex ARIMA models and makes their algebraic manipulation tractable. Unit root tests, particularly the KPSS test implemented through <code>ndiffs()</code> for regular differencing and <code>nsdiffs()</code> for seasonal differencing, provide formal statistical procedures for determining the required order of differencing.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Autoregressive (AR) models and PACF" }, `Autoregressive (AR) models express the current value as a linear combination of past values: an AR(p) model is <code>y_t = c + phi_1*y_{t-1} + phi_2*y_{t-2} + ... + phi_p*y_{t-p} + epsilon_t</code>. The parameters must satisfy stationarity constraints (the roots of the characteristic polynomial must lie outside the unit circle). The partial autocorrelation function (PACF) is the key diagnostic for AR models, showing the correlation at lag k after removing the effects of all shorter lags. For a pure AR(p) model, the PACF has significant spikes at lags 1 through p and is zero beyond lag p, while the ACF shows exponential decay.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Moving average (MA) models and invertibility" }, `Moving average (MA) models express the current value as a linear combination of current and past errors: an MA(q) model is <code>y_t = c + epsilon_t + theta_1*epsilon_{t-1} + ... + theta_q*epsilon_{t-q}</code>. For MA models, the ACF has significant spikes at lags 1 through q and is zero beyond lag q, while the PACF shows exponential decay, making the ACF and PACF patterns for AR and MA models mirror images of each other. Invertibility constraints (roots of the characteristic polynomial outside the unit circle) ensure unique parameter estimates. Any stationary AR(p) model can be written as an infinite-order MA model, establishing a deep theoretical connection between the two model classes.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Full non-seasonal ARIMA(p,d,q)" }, `The full non-seasonal ARIMA(p,d,q) model combines autoregressive terms (p), differencing (d), and moving average terms (q), written as <code>(1-phi_1*B-...-phi_p*B^p)*(1-B)^d*y_t = c + (1+theta_1*B+...+theta_q*B^q)*epsilon_t</code>. The constant c relates to the mean of the differenced series: when d=0, it equals <code>mu*(1-phi_1-...-phi_p)</code> where mu is the series mean; when d=1, it represents a drift term inducing linear trend; when <code>d&gt;=2</code>, no constant is included because it would induce a dangerous polynomial trend. The <code>auto.arima()</code> function implements the Hyndman-Khandakar algorithm for automatic ARIMA model selection, using a stepwise search through model orders to minimize AICc, with options for <code>approximation=FALSE</code> and <code>stepwise=FALSE</code> for more exhaustive search.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Seasonal ARIMA(p,d,q)(P,D,Q)_m" }, `Seasonal ARIMA models extend the framework to <code>ARIMA(p,d,q)(P,D,Q)_m</code> notation, where uppercase letters denote seasonal AR, differencing, and MA terms operating at multiples of the seasonal period m. For example, <code>ARIMA(1,1,1)(1,1,1)_4</code> for quarterly data is written as <code>(1-phi_1*B)*(1-Phi_1*B^4)*(1-B)*(1-B^4)*y_t = (1+theta_1*B)*(1+Theta_1*B^4)*epsilon_t</code>, where the seasonal and non-seasonal parts are simply multiplied together. The seasonal ACF and PACF patterns appear at seasonal lags (m, 2m, 3m, ...) and are used to identify seasonal AR and MA orders. The complete model selection process involves determining D (seasonal differences) via <code>nsdiffs()</code>, d (regular differences) via <code>ndiffs()</code>, and then selecting p, q, P, Q by minimizing AICc.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Seven-step ARIMA modelling procedure" }, `The ARIMA modeling procedure follows seven systematic steps: (1) plot the data and identify unusual observations, (2) transform if necessary to stabilize variance, (3) difference until stationary, (4) examine ACF/PACF to identify candidate models, (5) fit candidate models and use AICc to select the best, (6) check residuals for white noise using ACF plots and portmanteau tests, and (7) compute forecasts. Point forecasts are generated by expanding the ARIMA equation, replacing future observations with their forecasts and future errors with zero. Prediction intervals for the first step ahead are simply <code>hat{y}_{T+1|T} plus or minus 1.96*sigma</code> regardless of model orders, while multi-step intervals depend on the MA representation of the model and generally grow with the forecast horizon.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "ARIMA vs ETS relationship" }, `ARIMA and ETS models have a complex relationship: all linear exponential smoothing models are special cases of ARIMA models, but nonlinear ETS models have no ARIMA counterparts, and many ARIMA models have no ETS counterparts. The key equivalences include <code>ETS(A,N,N)</code> corresponding to <code>ARIMA(0,1,1)</code>, <code>ETS(A,A,N)</code> to <code>ARIMA(0,2,2)</code>, and <code>ETS(A,A_d,N)</code> to <code>ARIMA(1,1,2)</code>, with restricted parameters. AICc cannot be used to compare between ETS and ARIMA model classes because the likelihoods are computed differently, but test set evaluation or time series cross-validation can validly compare the two. The practical advice is to fit both classes and select based on out-of-sample accuracy, using <code>tsCV()</code> for time series cross-validation when the series is short enough.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "ARIMA(p,d,q) reference" }, `<code>ARIMA(p,d,q)</code>: <code>(1-phi_1*B-...-phi_p*B^p)*(1-B)^d*y_t = c + (1+theta_1*B+...+theta_q*B^q)*epsilon_t</code>. Stationarity requires AR roots outside unit circle; invertibility requires MA roots outside unit circle.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Seasonal ARIMA reference" }, `Seasonal <code>ARIMA(p,d,q)(P,D,Q)_m</code>: seasonal and non-seasonal parts multiply. <code>nsdiffs()</code> for D, <code>ndiffs()</code> for d, AICc for p,q,P,Q.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "auto.arima reference" }, `<code>auto.arima()</code>: Hyndman-Khandakar algorithm, stepwise AICc minimization. <code>approximation=FALSE</code>, <code>stepwise=FALSE</code> for exhaustive search. <code>Arima()</code> for manual specification.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 8 develops ARIMA methodically from stationarity (tested via KPSS through <code>ndiffs()</code> and <code>nsdiffs()</code>) through the backshift operator, AR and MA identification via PACF and ACF signatures, and full seasonal <code>ARIMA(p,d,q)(P,D,Q)_m</code>. The seven-step workflow (plot, transform, difference, identify, fit, diagnose, forecast) is operationalised through <code>auto.arima()</code> and the Hyndman-Khandakar stepwise search. Prediction intervals grow with horizon; the chapter closes with the ETS-ARIMA equivalence map and the caution that AICc cannot compare across classes \u2014 only <code>tsCV()</code> can.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 9: Dynamic Regression Models"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Regression with ARIMA errors" }, `Dynamic regression models combine the explanatory power of regression with the time series dynamics of ARIMA, allowing the error term from a regression model to follow an ARIMA process rather than being white noise. The general form is <code>y_t = beta_0 + beta_1*x_{1,t} + ... + beta_k*x_{k,t} + eta_t</code>, where <code>eta_t</code> follows an ARIMA model such as <code>(1-phi_1*B)*(1-B)*eta_t = (1+theta_1*B)*epsilon_t</code> for ARIMA(1,1,1) errors, and <code>epsilon_t</code> is white noise. This framework captures both the systematic relationship between the response and predictors and the autocorrelated dynamics not explained by the predictors. The two error terms, <code>eta_t</code> (regression errors) and <code>epsilon_t</code> (ARIMA errors), serve different roles: only the ARIMA errors should resemble white noise when the model is properly specified.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Estimation requires minimising ARIMA errors" }, `Estimation of dynamic regression models requires minimizing the sum of squared <code>epsilon_t</code> values (ARIMA errors) rather than <code>eta_t</code> values (regression errors), because ignoring autocorrelation in the errors leads to inefficient coefficient estimates, invalid statistical tests with p-values that are typically too small (creating spurious significance), and misleading AICc values. An important requirement is that all variables in the model must be stationary, so non-stationary predictors and response variables should be differenced before estimation. When differencing is applied, the constant term disappears and the model becomes a "model in differences" rather than a "model in levels," and regression with ARIMA errors is equivalent to regression in differences with ARMA errors.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "R implementation via auto.arima(xreg=...)" }, `The R implementation uses <code>auto.arima()</code> with the <code>xreg</code> argument to specify predictor variables, automatically selecting the best ARIMA model for the errors while the user specifies which predictors to include. The <code>Arima()</code> function provides manual control over the ARIMA error order via the <code>order</code> argument, with <code>xreg</code> specifying predictors. The <code>include.drift=TRUE</code> argument adds a constant (drift) to differenced models, and the AICc from the fitted model can be used to compare different predictor subsets. Forecasting requires future values of the predictor variables, which must be provided through the <code>xreg</code> argument of the <code>forecast()</code> function. The critical limitation is that prediction intervals do not account for uncertainty in the predictor forecasts and should be interpreted as conditional on the assumed future predictor values.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Deterministic vs stochastic trends" }, `Deterministic trends are modeled by including time as a predictor with ARMA errors (<code>y_t = beta_0 + beta_1*t + eta_t</code> where <code>eta_t</code> is ARMA), while stochastic trends arise from ARIMA errors with <code>d&gt;=1</code> (<code>y_t = beta_0 + beta_1*t + eta_t</code> where <code>eta_t</code> is ARIMA with d=1), equivalent to <code>y_t = y_{t-1} + beta_1 + eta'_t</code>. Although both produce similar point forecasts, their prediction intervals differ dramatically: stochastic trend models produce much wider prediction intervals because errors are non-stationary and accumulate over time. Stochastic trends are generally safer for forecasting, especially at longer horizons, because they allow for the possibility that the trend rate may change, while deterministic trends assume the exact same growth rate continues indefinitely.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Dynamic harmonic regression" }, `Dynamic harmonic regression combines Fourier terms for capturing seasonality with ARIMA errors for capturing short-term dynamics, providing a powerful approach for data with long seasonal periods (weekly data with m approximately 52, daily data with m=365, or sub-daily data with multiple seasonal periods). The approach uses <code>fourier()</code> to generate sine/cosine terms and <code>auto.arima()</code> with <code>seasonal=FALSE</code> to fit the ARIMA error structure. The number of Fourier terms K controls the complexity of the seasonal pattern (small K gives smooth seasonality, large K gives more wiggly patterns) and is selected by minimizing AICc. The key advantage is handling any length seasonality without the parameter explosion that afflicts seasonal ARIMA models for long seasonal periods, while the main disadvantage is that the seasonal pattern is assumed fixed over time.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Lagged predictors" }, `Lagged predictors allow the model to capture delayed effects, where the impact of a predictor is distributed across multiple future periods. The model <code>y_t = beta_0 + gamma_0*x_t + gamma_1*x_{t-1} + ... + gamma_k*x_{t-k} + eta_t</code> with ARIMA errors allows the AICc to select both the optimal number of lags k and the ARIMA error structure. The TV advertising and insurance quotations example demonstrates how advertising expenditure affects quotations not just in the current month but also in subsequent months, with the optimal lag structure determined by comparing AICc values across models with different numbers of lagged predictors.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Dynamic regression reference" }, `Dynamic regression: <code>y_t = beta_0 + beta_1*x_{1,t} + ... + beta_k*x_{k,t} + eta_t</code>, where <code>eta_t</code> follows ARIMA. Minimize sum of <code>epsilon_t^2</code>, not <code>eta_t^2</code>. All variables must be stationary.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Dynamic harmonic regression reference" }, `Dynamic harmonic regression: Fourier terms for seasonality with ARIMA errors for dynamics. Select K Fourier pairs by minimizing AICc. <code>auto.arima(y, xreg=fourier(y, K=K), seasonal=FALSE)</code>.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 9 fuses regression and ARIMA: predictors drive the mean, an ARIMA process models the residual dynamics. Crucially, estimation minimises the ARIMA innovations <code>epsilon_t</code>, not the regression residuals <code>eta_t</code>, and every variable must be stationary. The chapter contrasts deterministic and stochastic trends (similar point forecasts, dramatically different interval widths \u2014 stochastic is safer at long horizons), introduces dynamic harmonic regression (Fourier + ARIMA, the preferred approach for long-period seasonality), and demonstrates lagged predictors with AICc-based lag selection.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 10: Forecasting Hierarchical or Grouped Time Series"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Hierarchical time series and summing matrix S" }, `Hierarchical time series arise when data can be naturally disaggregated through nested categories (e.g., total sales decomposed into product lines, which decompose into individual products), represented mathematically using the summing matrix <code>S</code> that maps bottom-level series to all aggregation levels via <code>y_t = S*b_t</code>. For a hierarchy with n total series and m bottom-level series, S is an n-by-m matrix where each row specifies how bottom-level series are summed to produce each aggregate series. The fundamental challenge is producing coherent forecasts that respect the aggregation structure, meaning that forecasts at lower levels sum correctly to forecasts at higher levels. The <code>hts()</code> function in R creates hierarchical time series objects and manages the aggregation structure.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Grouped time series" }, `Grouped time series involve more general aggregation structures where the disaggregating factors are both nested and crossed, so the data can be aggregated along multiple paths simultaneously. For example, Australian prison population data can be disaggregated by state, by legal status, and by gender, with all possible combinations forming the bottom level. The <code>gts()</code> function creates grouped time series objects, and the aggregation structure is still represented by the summing matrix S, but with additional rows capturing the crossed grouping factors. The mathematical framework is identical to the hierarchical case, with the summing matrix encoding all aggregation constraints.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Bottom-up, top-down, middle-out approaches" }, `The bottom-up approach generates forecasts for all bottom-level series independently and then sums them up through the hierarchy using the summing matrix, expressed as <code>tilde{y}_h = S*hat{b}_h</code> where <code>hat{b}_h</code> contains the bottom-level forecasts. This approach preserves all information at the most disaggregated level but may suffer from noisy bottom-level data that is difficult to forecast accurately. The top-down approach generates forecasts only for the total series and disaggregates downward using historical proportions, with two main variants: average historical proportions (<code>method="tdgsa"</code>) and proportions of historical averages (<code>method="tdgsf"</code>), plus forecast proportions (<code>method="tdfp"</code>) that use forecasted rather than historical proportions for disaggregation. The middle-out approach (<code>method="mo"</code>) combines bottom-up aggregation above a chosen level with top-down disaggregation below it.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Unified reconciliation framework" }, `All hierarchical and grouped forecasting approaches can be expressed using the unified mapping matrix notation <code>tilde{y}_h = S*P*hat{y}_h</code>, where P is a matrix that maps base forecasts (independently generated for all series) into bottom-level forecasts, and S then aggregates these up through the hierarchy. This reconciliation framework, expressed as <code>tilde{y}_h = R*hat{y}_h</code> where <code>R = S*P</code>, provides a general mechanism for converting incoherent base forecasts into coherent reconciled forecasts. Bottom-up, top-down, and middle-out approaches each correspond to specific P matrices, but none of these traditional approaches uses all available information or produces optimal results.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Optimal reconciliation (MinT)" }, `The optimal reconciliation approach (MinT estimator) finds the P matrix that minimizes the total forecast error variance across all series subject to the unbiasedness constraint <code>SPS = S</code>. The solution is <code>P = (S'*W_h^{-1}*S)^{-1}*S'*W_h^{-1}</code>, yielding reconciled forecasts <code>tilde{y}_h = S*(S'*W_h^{-1}*S)^{-1}*S'*W_h^{-1}*hat{y}_h</code>, where <code>W_h</code> is the variance-covariance matrix of the h-step-ahead base forecast errors. Four practical approximations for <code>W_h</code> include: OLS (<code>W_h = k_h*I</code>, <code>weights="ols"</code>), WLS with variance scaling (using residual variances, <code>weights="wls"</code>), structural scaling (using the number of contributing bottom-level series, <code>weights="nseries"</code>), and the full MinT approach with either sample covariance (<code>covariance="sam"</code>) or shrinkage estimator (<code>covariance="shr"</code>). The MinT approach is superior because it uses information from all levels of the hierarchy.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Australian prison example" }, `The Australian prison population example demonstrates that optimal reconciliation produces more accurate forecasts than bottom-up, particularly at the top level (Total MAPE of 3.08 vs 5.32, MASE of 1.06 vs 1.84), while maintaining competitive accuracy at disaggregated levels. This improvement occurs because the reconciliation approach leverages information from all levels of the hierarchy, capturing features that may only be visible at certain aggregation levels. Notably, no top-down method can produce unbiased coherent forecasts, making bottom-up and optimal reconciliation the preferred approaches when unbiasedness is important.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Summing matrix reference" }, `Summing matrix: <code>y_t = S*b_t</code>, where S is n-by-m mapping bottom-level to all levels. Coherent forecasts: <code>tilde{y}_h = S*P*hat{y}_h</code>.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "MinT weight options reference" }, `MinT: <code>P = (S'*W_h^{-1}*S)^{-1}*S'*W_h^{-1}</code>. OLS: <code>W_h=k_h*I</code>. WLS: diagonal of residual covariance. Structural: diagonal of <code>S*1</code>. Full MinT: sample or shrinkage covariance.`), /* @__PURE__ */ React.createElement(H4, null, "Technical Overview"), /* @__PURE__ */ React.createElement(P, null, `Chapter 10 solves the coherence problem for hierarchical (nested) and grouped (nested and crossed) time series. The summing matrix <code>S</code> encodes the aggregation structure; any coherent forecast can be written <code>tilde{y}_h = S*P*hat{y}_h</code>. Bottom-up, top-down (three variants), and middle-out are suboptimal special cases of this framework. The MinT estimator solves for the unbiasedness-constrained P that minimises total forecast error variance, with four <code>W_h</code> approximations (OLS, WLS, structural, full MinT with sample or shrinkage covariance). Optimal reconciliation materially beats bottom-up in the Australian prison example.`), /* @__PURE__ */ React.createElement(H3, null, "Chapter 11: Advanced Forecasting Methods"), /* @__PURE__ */ React.createElement(H4, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Complex seasonality with msts" }, `Complex seasonality with multiple seasonal periods (such as daily data exhibiting both weekly and annual patterns, or sub-daily data with daily, weekly, and annual cycles) requires specialized methods beyond standard seasonal ARIMA or ETS models. The <code>msts</code> class handles multiple seasonal frequencies, and three approaches are available: multi-seasonal STL decomposition via <code>mstl()</code> which returns separate seasonal components for each frequency, dynamic harmonic regression with Fourier terms for each seasonal period combined with ARMA errors, and TBATS models. The call center volume example demonstrates data with daily seasonality (frequency 169 for 5-minute intervals) and weekly seasonality (frequency 845), where the <code>mstl()</code> decomposition reveals that the daily pattern dominates while weekly variation is relatively weak.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Dynamic harmonic regression for complex seasonality" }, `Dynamic harmonic regression for complex seasonality uses Fourier terms for each seasonal period (e.g., <code>sin(2*pi*k*t/169)</code> and <code>cos(2*pi*k*t/169)</code> for daily, plus <code>sin(2*pi*k*t/845)</code> and <code>cos(2*pi*k*t/845)</code> for weekly), with the number of terms for each frequency selected by AICc minimization. The ARMA error structure captures remaining short-term dynamics. This approach allows any length seasonality, can include covariates, and produces smooth seasonal patterns controlled by K, but assumes fixed seasonality. The electricity demand example extends this to include temperature as a covariate with a piecewise linear relationship (heating below 18 degrees, cooling above), demonstrating the flexibility of combining Fourier seasonality, ARIMA dynamics, and regression predictors in a single model.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "TBATS models" }, `TBATS (Trigonometric seasonality, Box-Cox transformation, ARMA errors, Trend and Seasonal components) models combine Fourier terms for seasonality with exponential smoothing state space models in an automated framework that allows the seasonal pattern to change slowly over time. Unlike dynamic harmonic regression where seasonality is fixed, TBATS models allow seasonal evolution, but they can be slow to estimate with long series and tend to produce overly wide prediction intervals. TBATS models do not accommodate covariates, making dynamic harmonic regression preferable when predictor variables are available. The <code>tbats()</code> function provides fully automated model fitting including selection of Box-Cox parameter, ARMA orders, and the number of Fourier terms.`),
