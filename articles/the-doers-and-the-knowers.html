tants, engineers, solicitors. At the apex, the thinkers \u2014 academics, researchers, analysts \u2014 whose mastery of theory conferred the highest economic and social prestige. The entire apparatus of higher education was built to move people upward through this hierarchy. Go to university. Learn to think rather than to make. Join the knowledge economy. For a generation, this advice worked. Now it is breaking."), /* @__PURE__ */ React.createElement("p", { style: { fontFamily: FONTS.body, fontSize: 17, lineHeight: 1.78, color: COLORS.black, marginBottom: 24 } }, "The thesis of this briefing is that generative AI is inverting the hierarchy. By commoditising both theoretical and applied knowledge \u2014 making the output of learning available to anyone with a browser and a subscription \u2014 it is shifting the economic premium from knowing to doing. The person who can identify an opportunity, mobilise resources, take a risk, and ship something is becoming more valuable than the person who can explain, in exquisite detail, why the opportunity exists. The entrepreneur is displacing the expert. The trades worker is outlasting the analyst. And the university, which spent decades selling knowledge as the primary economic asset, is discovering that its most important product may have been something it never thought to charge for: the disposition to act."), /* @__PURE__ */ React.createElement(HierarchySVG, null), /* @__PURE__ */ React.createElement("p", { style: { fontFamily: FONTS.body, fontSize: 17, lineHeight: 1.78, color: COLORS.black, marginBottom: 24 } }, "Consider the evidence. The World Economic Forum reported in 2025 that AI proficiency commands a wage premium of 23 percent \u2014 nearly three times the 8 percent premium attached to a bachelor's degree in isolation. PwC's 2025 Global AI Jobs Barometer found that employer demand for formal degrees is declining across all occupations, and most rapidly in those exposed to AI. Harvard economists Lawrence Katz and Clau d build X" and then builds it \u2014 however imperfectly \u2014 captures more value than the person who can explain why X would work in theory. This is not a temporary artefact of early adoption. It is an economic logic that strengthens as the tools improve. The cheaper the draft, the more valuable the decision to start one.'), /* @__PURE__ */ React.createElement("p", { style: { fontFamily: FONTS.body, fontSize: 17, lineHeight: 1.78, color: COLORS.black, marginBottom: 24 } }, "This logic has implications that extend beyond the labour market into the structure of education itself. If knowledge can be accessed on demand, the purpose of learning shifts from accumulation to application. You do not need to spend four years mastering corporate law if an AI can surface the relevant precedents in seconds; the premium shifts to the person who can use that legal knowledge to read a counterparty, spot a risk, and close a deal. You do not need three years of accounting training to perform reconciliations; the premium shifts to the person who can interpret the AI's output, challenge its assumptions, and advise a client on strategy. Learning does not disappear in this model. But it becomes instrumental rather than terminal \u2014 you learn in order to do, not in order to know. The distinction matters enormously, because it means that the most economically rational form of education may no longer be the one that goes deepest, but the one that arrives fastest at the point of action."), /* @__PURE__ */ React.createElement("p", { style: { fontFamily: FONTS.body, fontSize: 17, lineHeight: 1.78, color: COLORS.black, marginBottom: 24 } }, "This favours a particular kind of person. The post-knowledge economy rewards those who are proactive, risk-tolerant, comfortable with ambiguity, and biased toward action over deliberation \u2014 qualities that correlate more with temperament than with credentials. A solo founder in 2026, as multiple analyses have noted, can do the work of a five-person team from 2019, using AI for copywriting, customer support, market research, accounting, and code. The GEM report found that 60 percent of individuals globally expressed interest in starting their own business in 2024, compared with pre-pandemic levels \u2014 and 67 percent more entrepreneurs launched post-layoff in 2024 than in the prior year. The tightening of the knowledge-work labour market is not merely displacing workers. It is manufacturing entrepreneurs."), /* @__PURE__ */ React.createElement("p", { style: { fontFamily: FONTS.body, fontSize: 17, lineHeight: 1.78, color: COLORS.black, marginBottom: 24 } }, "But this picture, if taken at face value, risks a dangerous conclusion. If the argument is that doing matters more than knowing, and that deep academic mastery is economically overpriced, then the logical endpoint is a new anti-intellectualism \u2014 a society that stops producing deep thinkers because the market no longer rewards them. This would be a catastrophe of the first order. Climate modelling cannot be reduced to a prompt. Constitutional adjudication requires centuries of accumulated jurisprudence and the human capacity to reason from it. Pandemic preparedness depends on virologists whose expertise takes a decade to acquire. Fundamental physics, the kind that produces GPS and MRI machines and the semiconductors inside every AI chip, emerges from precisely the kind of sustained, curiosity-driven investigation that has no immediate commercial application. The market's repricing of knowledge is an economic signal, not a civilisational verdict. Confusing the two is the surest way to build a society that can deploy AI but no longer understands it."), /* @__PURE__ */ React.createElement(SB, { title: "What gets commoditised next?" }, 'If the current wave is commoditising knowledge, the next wave may commoditise judgement. AI agents are already capable of multi-step reasoning, workflow management, and decision-making across complex task sequences. Fiverr reported an 18,347 percent surge in demand for AI-agent specialists in six months \u2014 a signal that autonomous systems capable of coordination, not just generation, are arriving fast. If judgement and coordination follow knowledge into the commoditised zone, then even the "human edge" described in social-skills research may have a shelf life. What remains after that is speculative, but the candidates are telling: taste, conviction, the willingness to be wrong in public, the ability to inspire others to follow you into uncertainty. These are less cognitive capacities than dispositional ones \u2014 qualities of character, not of intellect. Whether an education system designed around intellect can cultivate them is the question that no institution has yet answered.'), /* @__PURE__ */ React.createElement("p", { style: { fontFamily: FONTS.body, fontSize: 17, lineHeight: 1.78, color: COLORS.black, marginBottom: 24 } }, "The uncomfortable reality is that the economy is demanding a kind of person that most institutions were not built to produce. Universities were designed to cultivate knowledge and certify its acquisition. Corporations were designed to deploy that knowledge within defined hierarchies. Both assumed that the primary asset a worker brought to market was what they knew. The post-knowledge economy does not abolish knowledge \u2014 AI could not function without the vast corpus of human learning on which it was trained \u2014 but it does demote knowledge from a scarce, high-value asset to an abundant, low-cost commodity. What remains scarce is everything else: initiative, risk tolerance, the willingness to act on imperfect information, the capacity to sell an idea to someone who does not yet know they need it. These are the qualities of the entrepreneur, the tradesperson-proprietor, the creative director who can work with AI rather than be replaced by it. They are, not coincidentally, the qualities that no examination has ever measured and no degree has ever certified."), /* @__PURE__ */ React.createElement("div", { style: { borderTop: `2px solid ${COLORS.economistRed}`, marginTop: 44, paddingTop: 28 } }, /* @__PURE__ */ React.createElement("p", { style: { fontFamily: FONTS.body, fontSize: 17, lineHeight: 1.78, color: COLORS.black, marginBottom: 24 } }, "The societies that thrive through this inversion will be the ones that learn to value doing as highly as knowing \u2014 and that redesign their institutions accordingly. This means vocational and trades education funded at the same level as universities, not as a consolation prize. It means entrepreneurship embedded in curricula from secondary school, not as an elective but as a core discipline. It means corporate training that develops initiative and judgement, not just technical proficiency. And it means maintaining \u2014 stubbornly, expensively, and against the market's short-term signals \u2014 the deep-knowledge infrastructure on which civilisation depends: the research universities, the basic-science laboratories, the scholars whose work has no immediate commercial value but without which there would be no AI to commoditise anything. The balance between doing and knowing is the hard part. Societies that sacrifice one for the other will regret it. The PhD and the plumber are not enemies. They are, in the emerging economy, co-dependents \u2014 each essential, each newly visible, each in need of institutions that recognise their worth. That recognition is overdue. It may also, at last, be arriving."))), /* @__PURE__ */ React.createElement("div", { style: { maxWidth: 680, margin: "0 auto", padding: "0 24px 48px" } }, /* @__PURE__ */ React.createElement("div", { style: { background: COLORS.cream, padding: "32px 28px", borderRadius: 2, border: `1px solid ${COLORS.borderLight}` } }, /* @__PURE__ */ React.createElement("div", { style: { fontFamily: FONTS.sans, fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: COLORS.navy, marginBot
