ce is measured by Sharpe ratio \u2014 risk-adjusted return \u2014 and maximum drawdown \u2014 the largest peak-to-trough decline \u2014 each of which falls out naturally from the return time series the pipeline already produces. Case study one: a hedge fund identifies a latent factor via PCA that predicts short-term reversals in the consumer-discretionary sector, builds a portfolio weighted by loading on that factor, and realizes a Sharpe of 1.4 over the subsequent two years. Case study two: an investment bank deploys a Dash dashboard showing implied-volatility surfaces across the S&P 500 options complex, giving sales traders a view of skew changes within seconds of quote updates.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `Beyond the linear core, the chapter gestures toward several frontiers. Deep learning applied to financial time series \u2014 LSTMs, transformers, and more recently state-space models \u2014 offers non-linear function approximation at the cost of interpretability and data hunger. Alternative data sources such as satellite imagery, credit-card aggregates, and social media sentiment provide orthogonal signals but introduce their own noise, latency, and licensing constraints. Non-linear extensions of PCA, including Kernel PCA and manifold methods like Isomap and UMAP, preserve relationships that a purely linear projection cannot. Robust regression methods \u2014 Huber, Theil-Sen, RANSAC \u2014 downweight outliers and are particularly relevant for beta estimation during stressed market regimes. The open research frontier includes market-crash prediction, high-frequency microstructure, and alternative-data factor models; support vector machines and random forests remain strong baselines for classification tasks, and ensemble gradient-boosted trees such as XGBoost and LightGBM dominate Kaggle-style return-prediction benchmarks.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `The chapter binds together the visual and the analytical into a single operating discipline. Static plots in Matplotlib and Seaborn support communication and reporting; interactive dashboards in Plotly Dash support exploration and collaboration; PCA and linear regression extract the signal that justifies the plots in the first place. Storage and automation ensure the whole apparatus keeps running without constant human intervention. The meta-lesson is that technique selection is contextual \u2014 the best visualization is the one that answers the question at hand, and the best analytical method is the one whose assumptions match the data-generating process. Readers leaving this chapter should be able to build a pipeline that ingests market data, stores it durably, decomposes it into factors, hedges the resulting exposures, and renders the whole view to a dashboard that refreshes overnight. That is the minimum viable infrastructure of a modern systematic trading research stack.`)), /* @__PURE__ */ React.createElement(Sec, { n: "4", title: "Advanced Algorithmic Trading with Zipline and VectorBT: Building and Backtesting Momentum Strategies" }, /* @__PURE__ */ React.createElement(P, null, `Chapter four pivots from data plumbing into the core intellectual work of quantitative trading: the design, evaluation, and simulation of strategies that claim to predict returns. The chapter's governing idea is that a systematic strategy is only as credible as the statistical apparatus surrounding it. An alpha factor that looks compelling on a cumulative return chart may be indistinguishable from noise once you adjust for market beta, size, value, and tracking error. The remedy is a disciplined pipeline: define the factor, express it as code, backtest it with realistic frictions, decompose its risk, and test whether the result is statistically different from luck.`), /* @__PURE__ */ React.createElement(P, null, `The chapter threads two backtesting frameworks through this pipeline. <strong>Zipline Reloaded</strong> is the event-driven engine \u2014 it simulates the passage of time bar by bar, models fills and slippage, and exposes a Pipeline API that computes factors across an entire asset universe efficiently. <strong>VectorBT</strong> is the vectorised counterpart \u2014 it trades a little realism for enormous speed, enabling parameter sweeps across thousands of configurations in seconds. The author's recommendation is pragmatic: prototype and sweep in VectorBT, validate the survivors in Zipline.`), /* @__PURE__ */ React.createElement(P, null, `Around these frameworks sit a dozen statistical ideas that every quant needs fluent. The <strong>Fama-French three-factor model</strong> separates market beta from size and value exposures. <strong>Marginal Contribution to Active Risk</strong> tells you which factor is driving your tracking error. The <strong>Information Ratio</strong> measures skill per unit of active risk. <strong>Parkinson volatility</strong> recovers information from intraday range that close-to-close estimators discard. <strong>Spearman rank correlation</strong> evaluates whether a factor's ranking actually predicts forward returns. <strong>Statistical significance tests</strong> separate genuine edge from overfit. Together these tools answer the only question that matters: is this strategy real?`), /* @__PURE__ */ React.createElement(P, null, `The practical vehicle is a momentum strategy \u2014 ranking assets by recent performance and rotating into winners \u2014 extended with the <strong>SuperTrend indicator</strong>, a trend-follower built on Average True Range. Momentum is a natural first strategy because the anomaly is well-documented, the mechanics are simple, and the risk decomposition is instructive. A naive momentum portfolio loads heavily on the momentum factor but may also accidentally tilt toward small-caps or high-beta names, and MCAR exposes exactly that.`), /* @__PURE__ */ React.createElement("div", { style: { margin: "24px 0" } }, /* @__PURE__ */ React.createElement(Ch4Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Simulated cumulative return of a monthly-rebalanced momentum portfolio versus the SPY benchmark over twelve months. The cumulative gap is the raw active return; dividing its standard deviation into that gap produces the Information Ratio, the chapter's preferred metric for skill.`)), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { title: "Alpha Factor Development" }, `Alpha factors are quantifiable metrics used to rank securities and predict their future returns. They represent systematic sources of excess return beyond market risk factors. Developing effective alpha factors involves rigorous statistical analysis, domain expertise, and careful consideration of market dynamics. For example, a momentum factor might rank stocks based on their past price performance, assuming that recent winners will continue to outperform. The process often involves identifying potential factors, testing their historical predictive power, and refining them to minimize noise and maximize signal. The success of an algorithmic trading strategy hinges on the effectiveness of its underlying alpha factors.`), /* @__PURE__ */ React.createElement(Callout, { title: "Linear Regression and Hedging" }, `Linear regression is a statistical technique used to model the relationship between variables. In finance, it's often used to estimate a portfolio's exposure to market risk factors (beta). Hedging involves taking offsetting positions to neutralize unwanted risks. For instance, if a portfolio has a beta of 1.5 to the S&P 500, a manager could short 1.5 times the portfolio value in SPY to hedge market risk. This leaves only the alpha, the portfolio's return independent of the market. Accurate beta estimation through linear regression is crucial for effective hedging.`), /* @__PURE__ */ React.createElement(Callout, { title: "Information Ratio (IR)" }, `The IR measures the risk-adjusted return of an investment strategy relative to a benchmark. It's calculated as the active return (portfolio return minus benchmark return) divided by the tracking error (standard deviation of active return). A higher IR indicates better performance, meaning the manager generates more excess return per unit of active risk. For example, an IR of 2.0 suggests the portfolio generated 2% excess return for every 1% of tracking error. The IR is a crucial metric for evaluating the skill of active portfolio managers.`), /* @__PURE__ */ React.createElement(Callout, { title: "Fama-French Three-Factor Model" }, `This asset pricing model extends the Capital Asset Pricing Model (CAPM) by incorporating size and value factors in addition to market risk. The size factor (SMB) captures the excess returns of small-cap stocks over large-cap stocks, while the value factor (HML) captures the excess returns of value stocks over growth stocks. These factors represent systematic risks that are not fully captured by the market risk premium alone. Analyzing a portfolio's exposure to these factors provides a more nuanced understanding of its risk and return characteristics.`), /* @__PURE__ */ React.createElement(Callout, { title: "Marginal Contribution to Active Risk (MCAR)" }, `MCAR quantifies the contribution of each factor to a portfolio's overall active risk. It considers both the factor sensitivities (betas) and the covariance between factors. Understanding MCAR helps identify the main drivers of a portfolio's tracking error and optimize risk allocation. For example, if the size factor contributes significantly to active risk, a manager might adjust the portfolio's size exposure to reduce volatility.`), /* @__PURE__ */ React.createElement(Callout, { title: "Parkinson Volatility Estimator" }, `This volatility estimator utilizes the high and low prices of an asset over a given period, providing a more accurate measure of volatility compared to methods based solely on closing prices. It captures the full range of price movements within the period. The Parkinson volatility is then typically normalized for comparison across different assets and time periods. This normalized volatility can be used as an alpha factor or as an input to other trading signals.`), /* @__PURE__ */ React.createElement(Callout, { title: "Spearman Rank Correlation" }, `This non-parametric statistical measure assesses the monotonic relationship between two variables. In algorithmic trading, it's often used to evaluate the predictive power of an alpha factor. A high Spearman rank correlation between a factor and future returns suggests that the factor has predictive ability. For example, if a momentum factor has a high rank correlation with subsequent one-month returns, it indicates that stocks ranked highly by the factor tend to outperform in the following month.`), /* @__PURE__ */ React.createElement(Callout, { title: "Zipline Reloaded" }, `This open-source backtesting framework provides a robust platform for developing and testing algorithmic trading strategies. It offers tools for data ingestion, pipeline construction, strategy simulation, and performance analysis. Zipline's event-driven architecture allows for realistic modeling of trading logic, including order execution, slippage, and commission costs.`), /* @__PURE__ */ React.createElement(Callout, { title: "Zipline Pipeline API" }, `The Pipeline API is a key feature of Zipline Reloaded, enabling efficient computation and analysis of factors on large datasets. It allows for the creation of custom factors, filtering of assets based on specific criteria, and ranking of assets based on factor values. This functionality is essential for developing and testing factor-based investment strategies.`), /* @__PURE__ */ React.createElement(Callout, { title: "VectorBT" }, `This Python library specializes in vectorized backtesting, leveraging NumPy and Numba for high-performance computations. VectorBT excels in speed and efficiency, making it ideal for rapid prototyping and parameter optimization. It seamlessly integrates with pandas DataFrames, facilitating data manipulation and analysis.`), /* @__PURE__ */ React.createElement(Callout, { title: "SuperTrend Indicator" }, `This trend-following technical indicator uses the Average True Range (ATR) to dynamically adjust upper and lower bands around the price. It generates buy signals when the price crosses above the upper band and sell signals when the price crosses below the lower band. The SuperTrend is often used in conjunction with other indicators and risk management techniques.`), /* @__PURE__ */ React.createElement(Callout, { title: "Statistical Significance Testing" }, `Assessing the statistical significance of backtesting results is crucial for determining if a strategy's performance is likely due to genuine skill or simply random chance. Techniques like the t-test can be used to compare in-sample and out-of-sample performance metrics, such as the Sharpe ratio.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The chapter's architectural thesis is that alpha discovery and alpha validation are separable problems that require different tools. Discovery is combinatorial and cheap \u2014 you try many factor definitions, many lookbacks, many universes, and VectorBT's vectorised engine makes that tractable. Validation is expensive and conservative \u2014 you commit to a small number of candidates and run them through Zipline's event-driven loop, where slippage, commissions, limit orders, and the timing of price information all behave the way they will in live trading. Collapsing these two phases into one tool guarantees either slow discovery or sloppy validation.`), /* @__PURE__ */ React.createElement(P, null, `Risk decomposition sits between discovery and validation. Before you trust a backtest, you have to know <em>why</em> it worked. Linear regression against the Fama-French factors reveals how much of the return is compensation for bearing market, size, or value risk rather than genuine alpha. MCAR then attributes tracking error to those same factors, which is where the practical insight lives: a manager whose momentum portfolio is 60% market beta and 30% small-cap tilt has not built a momentum strategy \u2014 they have built a leveraged small-cap fund wearing momentum branding.`), /* @__PURE__ */ React.createElement(P, null, `The Information Ratio operationalises this. Tracking error is the standard deviation of active return, so IR normalises excess return by the amount of active risk the manager is actually taking. An IR of 0.5 is respectable, 1.0 is rare, and anything above 2.0 sustained over years is Renaissance-level. The chapter's case study of Renaissance Technologies is not decorative \u2014 it anchors the scale against which retail algorithms must be measured, and it motivates the statistical significance tests that close the chapter.`), /* @__PURE__ */ React.createElement(P, null, `Finally, the Parkinson estimator and Spearman rank correlation recur throughout as practical primitives. Parkinson volatility extracts information from the high-low range that close-to-close estimators throw away, making it useful both as a risk measure and as an alpha factor in its own right. Spearman rank correlation is the go-to evaluation tool for factors, because most alpha signals work on ranks rather than magnitudes \u2014 you care whether the top-decile stocks outperform, not whether the raw factor value predicts the raw return in a linear regression.`), /* @__PURE__ */ React.createElement("div", { style: { margin: "24px 0" } }, /* @__PURE__ */ React.createElement(Ch4Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `Illustrative Marginal Contribution to Active Risk decomposition for a momentum portfolio. Market and momentum factors dominate, but the size tilt contributes 18% \u2014 exactly the kind of hidden exposure risk decomposition is designed to expose.`)), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Complete Theoretical Foundations"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Momentum Investing."), " The theoretical basis for momentum investing lies in behavioral finance and market microstructure. Behavioral biases, such as herding and overreaction, can lead to price trends that persist for some time. Market microstructure inefficiencies, such as slow information diffusion, can also contribute to momentum effects. These inefficiencies create opportunities for traders to exploit price trends. Momentum strategies typically involve buying assets that have recently performed well and selling assets that have recently performed poorly."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Factor Models."), " Factor models, such as the Fama-French three-factor model, attempt to explain asset returns based on exposure to systematic risk factors. These models assume that asset returns are driven by a combination of market risk, size risk, value risk, and other factors. By understanding a portfolio's exposure to these factors, investors can better assess its risk and return characteristics. Factor models are widely used in portfolio construction, risk management, and performance attribution.")), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Early Algorithmic Trading."), " Early algorithmic trading systems were often rule-based, relying on simple technical indicators or arbitrage opportunities. These systems were limited by computing power and data availability. As technology advanced, more complex strategies became feasible."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Quantitative Investing."), " The rise of quantitative investing in the late 20th century marked a significant shift towards data-driven investment strategies. Quantitative investors use statistical models and large datasets to identify and exploit market inefficiencies. This approach paved the way for more sophisticated algorithmic trading strategies.")), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles and Axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Market Efficiency."), " The Efficient Market Hypothesis (EMH) states that asset prices fully reflect all available information. However, various market anomalies, such as momentum, suggest that markets may not be perfectly efficient. Algorithmic traders often seek to exploit these inefficiencies."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Risk and Return."), " The fundamental principle of finance is the trade-off between risk and return. Higher potential returns typically come with higher risk. Algorithmic trading strategies aim to maximize risk-adjusted returns by carefully managing risk and identifying opportunities with favorable risk-return profiles.")), /* @__PURE__ */ React.createElement(H4, null, "Key nvironment in which events \u2014 market data updates, signal generation, order placements, fills \u2014 are processed sequentially bar by bar. This ordering matters: it lets the engine model look-ahead bias correctly, apply slippage to fills, charge commissions, and reflect the real sequence in which a live strategy would receive information. The Pipeline API sits on top, allowing factors and filters to be computed efficiently across the entire asset universe at each rebalance point, which is essential for cross-sectional strategies like momentum ranking.`), /* @__PURE__ */ React.createElement(P, null, `VectorBT takes the opposite design stance. It expresses a backtest as a sequence of array operations over NumPy arrays, compiled where necessary with Numba. A strategy that would take minutes per configuration in Zipline can sweep across thousands of parameter combinations in the same time, which makes it the tool of choice for discovery. The trade-off is realism: event ordering, fill logic, and market microstructure effects are approximated rather than simulated, so VectorBT results need to be re-run in Zipline before being taken seriously.`), /* @__PURE__ */ React.createElement(P, null, `The workflow the chapter recommends runs: data acquisition, strategy development, backtesting, performance evaluation, optimisation. In practice the middle three steps form a tight inner loop inside VectorBT, while the outer loop \u2014 committing a survivor to Zipline and evaluating it with IR, drawdown, turnover, and significance tests \u2014 is where the strategy's fate is actually decided.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `A momentum strategy reduces to three operations per rebalance: score, rank, rotate. Scoring typically uses a trailing-return window (six to twelve months is canonical) with the most recent month excluded to avoid short-term reversal. Ranking sorts the universe by score. Rotation buys the top decile and, in a long-short variant, shorts the bottom decile, reweighting to maintain dollar-neutrality. The SuperTrend variant layers a trend filter on top: only hold names whose SuperTrend line is below price, exiting on the opposite cross.`), /* @__PURE__ */ React.createElement(P, null, `Complexity is modest. Ranking is O(n log n) in the number of assets per rebalance, and the ATR-driven SuperTrend is linear in the lookback window. Memory scales with universe size times rebalance frequency. The real design challenge is not performance but correctness: data flow from source to engine has to respect event ordering, missing data must be imputed or excluded deterministically, and trading halts must not produce phantom fills. The Strategy pattern \u2014 encapsulating each rule set as an interchangeable object \u2014 makes A/B comparisons between momentum variants clean.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Backtesting large universes over long histories is memory-hungry: a decade of daily data on the Russell 3000 is gigabytes, and Zipline's Pipeline holds intermediate factor matrices in RAM. Vectorisation and caching of frequently-accessed slices are the first optimisations. The two pitfalls the chapter emphasises are <strong>look-ahead bias</strong>, which creeps in whenever a factor uses data that would not have been known at the trade timestamp, and <strong>overfitting</strong>, which is structurally guaranteed if you optimise on the same data you evaluate on.`), /* @__PURE__ */ React.createElement(P, null, `The defences are in-sample / out-of-sample partitioning and statistical significance testing. A strategy that looks good in-sample and mediocre out-of-sample has been fit to noise; a strategy whose Sharpe ratio is within one standard error of the in-sample bootstrap is not reliably distinguishable from luck. Clean, well-documented code and periodic refactoring matter less than the testing discipline, but they compound over years of strategy maintenance.`), /* @__PURE__ */ React.createElement(Code, { language: "python" }, `from zipline.pipeline import Pipeline

ets you wrap custom indicators so that parameter sweeps compose naturally.`), /* @__PURE__ */ React.createElement(P, null, `The underlying data structure throughout is the pandas DataFrame, which carries prices, volumes, and factor values with a time-indexed, asset-columned layout that both libraries understand. Momentum itself is computed as a trailing return normalised by the standard deviation of returns over the same window \u2014 a z-score of recent performance. Error handling uses try-except blocks around data access and order submission, because production data feeds and broker APIs fail in ways a backtest never will.`), /* @__PURE__ */ React.createElement(Code, { language: "python" }, `import vectorbt as vbt

def supertrend(high, low, close, period=10, mult=3):

    atr = vbt.ATR.run(high, low, close, window=period).atr
    upper = hl2 + mult * atr
    lower = hl2 - mult * atr
    trend = pd.Series(index=close.index, dtype=float)

    for i in range(1, len(close)):

E__ */ React.createElement(P, null, `The meta-lesson is epistemic. A backtest is a hypothesis about the world, not a proof. The statistical significance tests, the in-sample / out-of-sample splits, and the risk decompositions are not optional ceremony; they are the mechanisms by which a quant distinguishes a strategy that will survive live trading from one that will collapse within a quarter. Continuous learning and adaptation matter because every discovered edge is simultaneously being discovered by competitors, eroded by capital inflows, and reshaped by market structure changes. The tools in this chapter are the minimum cost of admission to a game that rewards discipline over cleverness.`)), /* @__PURE__ */ React.createElement(Sec, { n: "5", title: "Advanced Algorithmic Trading with Event-Driven Backtesting, Factor Investing, and Mean Reversion Strategies using Zipline and Alphalens Reloaded" }, /* @__PURE__ */ React.createElement(P, null, `Chapter 5 completes the arc the earlier chapters started: having built data pipelines and prototyped momentum in parallel frameworks, the reader now faces the harder question of whether a factor actually <i>predicts</i> anything, and whether the strategy that trades that factor would have behaved plausibly in a world with order queues, slippage, and discrete rebalance timing. The answer the chapter offers is a specific workflow built around two complementary libraries \u2014 <b>Zipline Reloaded</b> for event-driven simulation and <b>Alphalens Reloaded</b> for factor diagnostics \u2014 and a specific strategy archetype, <b>mean reversion</b>, that showcases why event-driven fidelity matters.`), /* @__PURE__ */ React.createElement(P, null, `The conceptual pivot in this chapter is from <i>vectorised</i> to <i>event-driven</i>. A vectorised backtest computes signals and P&L as array operations over the entire history at once, which is fast and clean but hostile to any logic that depends on the exact sequence of events within a bar \u2014 a stop that fires intra-day, a limit that sits on the book and either fills or doesn't, a rebalance that happens before the market opens using yesterday's close. Event-driven backtesting processes market data chronologically, firing user-defined handlers at specific times and data conditions, and maintaining a persistent <code>context</code> that carries portfolio state forward through the simulation. This matters for mean reversion specifically because the thesis \u2014 prices revert toward their long-run average after overshooting \u2014 is timing-sensitive: enter too late and the reversion is over, exit too late and the next overshoot eats the gain.`), /* @__PURE__ */ React.createElement(P, null, `The chapter's second pivot is from <i>backtest result</i> to <i>factor diagnostic</i>. A strategy's cumulative return curve is a downstream, aggregated signal corrupted by a dozen implementation decisions; an <b>Information Coefficient</b> \u2014 the rank correlation between factor values and forward returns across the cross-section \u2014 is upstream, isolated from turnover and sizing, and answers the question that actually matters: does the factor discriminate winners from losers at the horizon you're trading? <b>Alphalens Reloaded</b> is a dedicated toolkit for this diagnostic layer. It takes a panel of factor values and a panel of forward returns and produces tear sheets covering IC by horizon, quantile-sorted returns, turnover, and sector-neutral variants. Combined with Zipline's Pipeline API \u2014 a declarative way to express cross-sectional computations over thousands of assets \u2014 the pair form a research loop where factor quality is established <i>before</i> any algorithm is written to trade the factor, saving the researcher from writing a full backtest around a signal that was never predictive to begin with.`), /* @__PURE__ */ React.createElement(Ch5Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Illustrative price series around a rolling mean with \xB12\u03C3 bands \u2014 the canonical mean-reversion setup. When the price pierces the lower band at D5\u2013D6 a mean-reversion strategy opens a long position betting on reversion toward the mean; when it pierces the upper band at D12 it opens a short. The z-score distance from the mean governs position size, and the reversion to the mean between bands is where the P&L is realised.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { title: "Event-Driven Backtesting" }, `Event-driven backtesting is a simulation methodology that replicates real-world trading scenarios by processing market data chronologically and triggering specific functions based on predefined events. These events can be time-based, such as market open or close, or data-driven, such as a price crossing a certain threshold. Unlike vectorized backtesting, which processes data in bulk, the event-driven approach allows for a more granular and realistic simulation of order execution, portfolio management, and the impact of slippage and commissions. This is particularly crucial for strategies that rely on precise timing or react dynamically to market fluctuations, such as mean reversion or arbitrage strategies. The event-driven approach also facilitates the incorporation of complex trading logic and order management rules, making it ideal for evaluating sophisticated algorithmic trading strategies. For example, an event-driven backtest can accurately simulate the execution of limit orders, stop-loss orders, and other order types that depend on specific market conditions.`), /* @__PURE__ */ React.createElement(Callout, { title: "Factor Investing" }, `Factor investing is an investment strategy that involves selecting assets based on specific characteristics or "factors" that have historically demonstrated a correlation with higher returns. These factors can represent various aspects of a company's financials, market behavior, or other quantifiable attributes. Common examples include value (low price-to-book ratio), momentum (recent price performance), size (market capitalization), and volatility (price fluctuations). The underlying principle of factor investing is that exposure to these factors can lead to outperformance compared to market benchmarks. Factor investing requires rigorous statistical analysis to identify and validate effective factors, as well as to construct portfolios that optimize exposure to these factors while managing risk. For instance, a factor investor might construct a portfolio that is long on low-volatility stocks and short on high-volatility stocks, anticipating that the low-volatility stocks will outperform over the long term.`), /* @__PURE__ */ React.createElement(Callout, { title: "Mean Reversion" }, `Mean reversion is a financial principle that posits that asset prices and returns tend to revert to their long-term average after periods of deviation. This principle is based on the assumption that markets are subject to periods of irrational exuberance or pessimism, causing prices to move away from their fundamental values. Mean reversion strategies exploit this phenomenon by identifying overbought or oversold assets and betting on their eventual return to the mean. These strategies typically involve buying assets that have fallen significantly below their historical average and selling assets that have risen significantly above their average. However, mean reversion is not always guaranteed, and identifying the appropriate timeframe for reversion is crucial. For example, a mean reversion strategy might buy a stock that has dropped 20% below its 50-day moving average, anticipating that the price will eventually rebound.`), /* @__PURE__ */ React.createElement(Callout, { title: "Pipeline API (Zipline Reloaded)" }, `The Pipeline API in Zipline Reloaded provides a structured and efficient way to define, compute, and access factors, filter assets, and generate trading signals. It uses a declarative approach, where the user specifies the desired computations and filters, and Zipline handles the execution and optimization. This simplifies the development process and improves performance, especially when dealing with large datasets. The Pipeline API allows for the creation of complex trading strategies by combining multiple factors, filters, and custom computations. It also integrates seamlessly with other components of Zipline, such as the event scheduler and order management system. For example, a user can define a pipeline that calculates the 50-day moving average of a stock's price, filters for stocks that are trading below their moving average, and then uses this information to generate buy signals within a trading algorithm.`), /* @__PURE__ */ React.createElement(Callout, { title: "Alphalens Reloaded" }, `Alphalens Reloaded is a Python library specifically designed for analyzing the performance of predictive alpha factors. It provides a comprehensive set of tools for calculating various performance metrics, including information coefficients (IC), factor returns, turnover, and drawdowns. Alphalens Reloaded integrates seamlessly with Zipline Reloaded, allowing for a streamlined workflow from backtesting to factor analysis. It offers visualizations and tear sheets that summarize key performance indicators, facilitating the evaluation and refinement of trading strategies. For example, Alphalens can calculate the IC of a factor to determine its predictive power, analyze the returns of a portfolio constructed based on the factor, and visualize the turnover of the portfolio to assess transaction costs.`), /* @__PURE__ */ React.createElement(Callout, { title: "context Object (Zipline)" }, `The context object in Zipline is a persistent namespace that stores variables and data across function calls and trading sessions within a backtest. It acts as a central repository for information required by the trading algorithm, such as portfolio holdings, cash balance, open orders, and custom indicators. The context object ensures data consistency and accessibility throughout the backtest, allowing the algorithm to access and modify its state as needed. For example, the context object can store the current position size of a stock, the number of shares held, and any other relevant information that the algorithm needs to make trading decisions.`), /* @__PURE__ */ React.createElement(Callout, { title: "data Object (Zipline)" }, `The data object in Zipline provides access to current and historical market data, such as pricing, volume, and fundamental data, within a backtest. This object is used by the trading algorithm to retrieve the necessary information for making trading decisions. The data object can access data for a wide range of assets, including stocks, bonds, and futures, and can retrieve data for different time frequencies, such as daily, minute, or tick data. For example, an algorithm can use the data object to retrieve the current price of a stock, the historical closing prices for the past year, or the volume traded in the last hour.`), /* @__PURE__ */ React.createElement(Callout, { title: "pipeline_output Function (Zipline)" }, `The pipeline_output function in Zipline retrieves the computed results of a named pipeline for the current trading day. This function allows the trading algorithm to access the latest factor values, filter results, and other data generated by the pipeline. The pipeline_output function is typically called within the before_trading_start function of the algorithm, which is executed before the market opens each day. This ensures that the algorithm has access to the most up-to-date information before making any trading decisions. For example, an algorithm can use pipeline_output to retrieve the latest values of a momentum factor for all stocks in the universe.`), /* @__PURE__ */ React.createElement(Callout, { title: "attach_pipeline Function (Zipline)" }, `The attach_pipeline function in Zipline attaches a data pipeline to the trading algorithm, making its output available through the pipeline_output function. This function is typically called within the initialize function of the algorithm, which is executed only once at the beginning of the backtest. Attaching the pipeline ensures that the pipeline is executed and its results are available to the algorithm throughout the backtest. For example, an algorithm can attach a pipeline that calculates various technical indicators, such as moving averages and relative strength index (RSI), to be used later in the trading logic.`), /* @__PURE__ */ React.createElement(Callout, { title: "schedule_function Function (Zipline)" }, `The schedule_function function in Zipline schedules a function to run at specific times or intervals during the backtest. This function allows for automated execution of trading logic, rebalancing operations, and other periodic tasks. The schedule_function can be used to schedule functions to run at various frequencies, such as daily, weekly, monthly, or at specific times of day. For example, an algorithm can schedule a rebalancing function to run at the end of each month to adjust portfolio holdings based on the latest factor values.`), /* @__PURE__ */ React.createElement(Callout, { title: "record Function (Zipline)" }, `The record function in Zipline stores values in the performance output of the backtest, allowing for tracking and analysis of key metrics. This function can be used to record any variable or data point that the user wants to track during the backtest, such as portfolio value, returns, individual asset holdings, or custom indicators. The recorded data is then available for analysis after the backtest is complete. For example, an algorithm can record the daily portfolio value, the number of trades executed, and the value of a specific factor to analyze their relationship over time.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The chapter's architecture is a disciplined loop with four stages: factor construction, factor evaluation, strategy implementation, and performance attribution. Factor construction lives in the Zipline <b>Pipeline API</b> \u2014 a declarative expression layer where the researcher specifies what should be computed over a universe and a horizon without writing the traversal code. A mean-reversion factor might be defined as the negative z-score of the most recent close against a 50-day rolling mean, expressed in a handful of lines and evaluated lazily across thousands of symbols. The Pipeline produces a panel of factor values indexed by (date, asset) which is then handed off to Alphalens.`), /* @__PURE__ */ React.createElement(P, null, `Factor evaluation is where <b>Alphalens Reloaded</b> earns its keep. The library computes the <b>Information Coefficient</b> \u2014 the cross-sectional Spearman correlation between factor rank and forward return at horizons of 1, 5, and 10 days \u2014 and reports its mean, standard deviation, and t-statistic. It further bins assets into quantiles by factor value and computes the spread between top and bottom quantiles, reproducing the decile sort that is the workhorse of empirical asset pricing. Crucially, the analysis runs <i>before</i> any algorithm is written, so a factor with a statistically insignificant IC is killed before it consumes research budget.`), /* @__PURE__ */ React.createElement(P, null, `Strategy implementation in Zipline is a triangle of three handlers: <code>initialize</code> attaches the Pipeline and schedules rebalance events; <code>before_trading_start</code> reads the day's pipeline output into the <code>context</code>; and the scheduled <code>rebalance</code> function consults the factor values and issues <code>order_target_percent</code> calls. Because the engine advances bar-by-bar through historical data, orders are subject to next-bar fills, slippage, and commissions exactly as they would be in live trading. The <code>record</code> function captures any derived series \u2014 z-scores, active position count, factor quantile spreads \u2014 for post-hoc analysis.`), /* @__PURE__ */ React.createElement(P, null, `Performance attribution closes the loop. The backtest produces a time series of returns; running that series through pyfolio or Alphalens' tear sheets decomposes the P&L into factor exposures, quantile contribution, and turnover drag. If the strategy's realised Sharpe diverges from the IC-implied Sharpe, the delta is usually explained by turnover cost or timing mismatch \u2014 both diagnosable, both fixable. The discipline of the loop \u2014 factor quality first, trading logic second, performance attribution third \u2014 is what distinguishes systematic quant research from curve-fitting exercises that produce beautiful backtests and catastrophic live trading.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Complete Theoretical Foundations"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("b", null, "Factor Models:"), " Factor models are statistical models that attempt to explain asset returns based on a set of underlying factors. These models assume that asset returns are driven by both systematic factors, which affect all assets to varying degrees, and idiosyncratic factors, which are specific to individual assets. The most common factor models are linear, meaning that asset returns are assumed to be a linear combination of the factors. The coefficients of the linear combination represent the sensitivity of each asset to the respective factors. For example, the Fama-French three-factor model includes market risk, size, and value as factors. A stock with a high loading on the size factor would be expected to be more sensitive to changes in the size premium. Factor models are used in factor investing to identify and construct portfolios that are exposed to specific factors. They are also used in risk management to understand and quantify the sources of portfolio risk."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("b", null, "Mean Reversion:"), " The theoretical basis for mean reversion lies in the concept of market equilibrium. In an efficient market, asset prices are assumed to reflect all available information and to fluctuate around their fundamental values. Deviations from these fundamental values are considered temporary and are expected to eventually revert back to the mean. This reversion process can be modeled using various statistical techniques, such as autoregressive models or Ornstein-Uhlenbeck processes. These models capture the tendency of asset prices to revert to their long-term average while also allowing for random fluctuations. The speed of reversion is a key parameter in these models, representing how quickly prices are expected to return to the mean. A higher speed of reversion implies that deviations from the mean are corrected more quickly."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("b", null, "Event-Driven Backtesting:"), " Event-driven backtesting is based on the principle of discrete event simulation. In this approach, the backtesting engine processes market data chronologically and triggers specific functions based on predefined events. These events can be time-based, such as market open or close, or data-driven, such as a price crossing a certain threshold. The event-driven architecture allows for a more granular and realistic simulation of trading scenarios, including the impact of slippage, commissions, and order execution delays. It also facilitates the incorporation of complex trading logic and order management rules. For example, an event-driven backtest can accurately simulate the execution of limit orders, stop-loss orders, and other order types that depend on specific market conditions.")), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("b", null, "Pre-Factor Investing:"), " Before the advent of factor investing, active portfolio management was often based on fundamental analysis or technical analysis. Fundamental analysis involves evaluating a company's financial statements and business prospects to determine its intrinsic value. Technical analysis involves analyzing historical price and volume data to identify patterns and predict future price movements. These approaches are often subjective and rely on the skill and judgment of the analyst."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("b", null, "Early Factor Models:"), " The earliest factor models, such as the Capital Asset Pricing Model (CAPM), focused on market risk as the primary driver of asset returns. The CAPM posits that the expected return of an asset is linearly related to its beta, which measures the asset's sensitivity to market movements. Subsequent research identified other factors, such as size and value, that also explain asset returns. The Fama-French three-factor model, which includes market risk, size, and value, became a widely used benchmark for evaluating portfolio performance."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("b", null, "Development of Zipline:"), " Zipline was originally developed by Quantopian as a backtesting platform for its online community of algorithmic traders. It was later open-sourced lio's risk profile."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("b", null, "Beta:"), " Beta measures the systematic risk of an asset or portfolio, representing its sensitivity to market movements. A beta of 1 indicates that the asset or portfolio moves in line with the market, while a beta greater than 1 indicates higher volatility than the market."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("b", null, "Information Coefficient (IC):"), " The IC measures the correlation between predicted and actual returns. It is a measure of a factor's predictive power."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("b", null, "Turnover:"), " Turnover measures the frequency of trading within a portfolio. High turnover can lead to increased transaction costs."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("b", null, "Sharpe Ratio:"), " The Sharpe ratio measures risk-adjusted return, calculated as the excess return divided by the standard deviation of returns.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(P, null, `<b>Zipline Reloaded</b> is an open-source algorithmic trading library that provides a comprehensive framework for backtesting trading strategies. It offers a realistic simulation environment that incorporates market data, order management, portfolio tracking, and performance analysis. Zipline's event-driven architecture allows for precise modeling of trading logic and market interactions, making it suitable for testing complex strategies that rely on specific timing or react to market events. It supports various asset classes, including stocks, futures, and options, and provides access to historical and real-time data. Zipline also integrates with other libraries like Alphalens Reloaded for factor analysis and pyfolio for performance reporting, creating a complete ecosystem for algorithmic trading research and development. Its flexible API allows users to define custom factors, data pipelines, and trading algorithms, enabling a wide range of research and development possibilities.`), /* @__PURE__ */ React.createElement(P, null, `<b>Alphalens Reloaded</b> is a Python library specifically designed for analyzing the performance of predictive alpha factors. It provides a suite of tools for calculating various metrics, including information coefficients, factor returns, and turnover. Alphalens seamlessly integrates with Zipline Reloaded, allowing for a streamlined workflow from backtesting to factor analysis. It offers visualizations and tear sheets that summarize key performance indicators, facilitating the evaluation and refinement of trading strategies. Alphalens helps quantify the predictive power of factors, assess their ability to generate excess returns, and understand the associated trading costs. Its detailed analysis capabilities enable researchers to identify robust and profitable factors for algorithmic trading strategies.`), /* @__PURE__ */ React.createElement(P, null, `The two libraries are complementary, not overlapping. Zipline is the execution engine \u2014 it simulates the exchange, enforces the clock, and produces the trade ledger. Alphalens is the diagnostic microscope \u2014 it reads the factor panel and the forward-return panel and reports whether a factor actually predicts anything. A canonical workflow runs Alphalens first on the raw factor output to kill weak factors before they ever enter an algorithm, then wires the survivors into Zipline for realistic simulation, then feeds the Zipline performance back into pyfolio for attribution. This separation of concerns \u2014 factor discrimination versus strategy simulation versus performance attribution \u2014 is the discipline the chapter argues is essential for developing strategies that survive out-of-sample.`), /* @__PURE__ */ React.createElement(Code, { language: "python" }, `# Zipline: mean-reversion factor and weekly rebalance skeleton
from zipline.api import (
    attach_pipeline, pipeline_output, schedule_function,
    order_target_percent, record, date_rules, time_rules,
)
from zipline.pipeline import Pipeline, CustomFactor
from zipline.pipeline.data import USEquityPricing
import numpy as np

class MeanReversionZScore(CustomFactor):
    inputs = [USEquityPricing.close]
    window_length = 50
    def compute(self, today, assets, out, close):
        mu = close.mean(axis=0)
        sd = close.std(axis=0)
        last = close[-1]
        # Negative z-score so that oversold assets (below mean) rank high
        out[:] = -(last - mu) / np.where(sd == 0, 1.0, sd)

def make_pipeline():
    mr = MeanReversionZScore()
    top = mr.top(50)
    bot = mr.bottom(50)
    return Pipeline(columns={"mr": mr}, screen=top | bot)

def initialize(context):
    attach_pipeline(make_pipeline(), "mean_reversion")
    schedule_function(rebalance, date_rules.week_start(), time_rules.market_open(minutes=30))

def before_trading_start(context, data):
    context.output = pipeline_output("mean_reversion")

def rebalance(context, data):
    out = context.output.dropna()
    ranks = out["mr"].rank(pct=True)
    longs = ranks[ranks > 0.9].index    # most oversold
    shorts = ranks[ranks < 0.1].index   # most overbought
    n = len(longs) + len(shorts)
    if n == 0:
        return
    for a in longs:
        order_target_percent(a, 1.0 / n)
    for a in shorts:
        order_target_percent(a, -1.0 / n)
    for a in context.portfolio.positions:
        if a not in longs and a not in shorts:
            order_target_percent(a, 0)
    record(long_count=len(longs), short_count=len(shorts))`), /* @__PURE__ */ React.createElement(Code, { language: "python" }, `# Alphalens: evaluate the factor *before* trusting the backtest
