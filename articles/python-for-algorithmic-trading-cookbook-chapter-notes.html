PURE__ */ React.createElement(Sec, { n: "1", title: "Acquiring and Analyzing Financial Market Data with Python" }, /* @__PURE__ */ React.createElement(P, null, `Before a single backtest can run, before a single signal can fire, there is the unglamorous but decisive problem of <strong>getting the data right</strong>. Chapter 1 of <em>Python for Algorithmic Trading Cookbook</em> treats data acquisition as a first-class engineering discipline rather than a preamble. It begins with the premise that every downstream claim \u2014 Sharpe ratios, alpha estimates, factor exposures, option Greeks \u2014 is only as defensible as the pipeline that fed it. The chapter therefore establishes a working toolkit: <code>pandas</code> as the substrate, <code>pandas_datareader</code> as the direct conduit to well-known providers, and the <strong>OpenBB Platform</strong> as a unified abstraction layer over dozens of commercial and open APIs.`), /* @__PURE__ */ React.createElement(P, null, `The conceptual arc moves from the mechanics of retrieval to the structures that hold the data and finally to the economics that give it meaning. You learn how to install providers, authenticate with API keys, pull historical equity prices, and resample them against a <code>DatetimeIndex</code>. You then encounter the richer shapes of modern markets \u2014 option chains with multi-level indices across expiry and strike, futures curves stitched from contracts of different maturities, and Fama-French factor files that reframe returns in terms of size, value, and market premia. The chapter deliberately intertwines these topics because they share a common failure mode: mis-aligned indices, stale adjustments, and silent provider changes that corrupt reproducibility.`), /* @__PURE__ */ React.createElement(P, null, `Interwoven with the mechanics is a quieter argument about <em>epistemic discipline</em>. The chapter insists that data quality, timeliness, reproducibility, and transparency are axioms, not afterthoughts. It surfaces the Efficient Market Hypothesis as the null your strategies must beat, and the Fama-French three-factor model as one historically durable way they have. It gestures at Black-Scholes and the Greeks not as formulas to memorise but as sensitivities that give structure to the chaos of option prices. By the end, you should be able to stand up a clean local dataset of equities, options, and factors, reason about its provenance, and prepare it for backtests, predictive models, portfolio optimisation, and risk management \u2014 the four applied threads that the rest of the book will pull on.`), /* @__PURE__ */ React.createElement(Ch1Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Synthetic year-long index of SPY against Fama-French factors (SMB, HML, Rm-Rf) \u2014 illustrating how factor data reframes returns away from a single-market lens.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Data Acquisition" }, `The process of obtaining financial market data from various sources is fundamental to algorithmic trading and quantitative analysis. This involves understanding different data providers, their APIs, data formats (CSV, JSON), and potential data limitations. Data quality, timeliness, and consistency are crucial considerations. For example, using the OpenBB platform provides a streamlined approach to accessing multiple data providers, while <code>pandas_datareader</code> offers direct integration with pandas DataFrames. Choosing the right data acquisition method depends on the specific needs of the trading strategy or analysis. Data cleaning and preprocessing are often necessary steps to handle missing values, outliers, and inconsistencies.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Data Structures (pandas)" }, `Efficient data handling is essential for analyzing large financial datasets. Pandas DataFrames provide a powerful and flexible way to organize and manipulate tabular data. Series, the building blocks of DataFrames, represent single columns of data with associated labels (index). Understanding indexing, slicing, and various DataFrame operations is crucial for data manipulation and analysis. For instance, using a DatetimeIndex allows for time-based slicing and resampling of time series data. MultiIndex enables working with hierarchical data structures, such as option chains with multiple levels of information (e.g., expiration date, strike price).`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "OpenBB Platform" }, `This open-source platform offers a unified interface for accessing a wide range of financial data sources. Its modular architecture allows users to install specific data providers and extensions based on their needs. The platform provides both a command-line interface and a Python SDK, enabling both interactive exploration and programmatic data retrieval. OpenBB simplifies data acquisition by abstracting away the complexities of interacting with different APIs. However, potential challenges include dependency conflicts and the need to manage API keys for various data providers.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "pandas_datareader" }, `This library streamlines the process of downloading financial data directly into pandas DataFrames. It acts as a wrapper for the APIs of various data providers, simplifying data acquisition and integration with the pandas ecosystem. While convenient, <code>pandas_datareader</code> relies on the stability and availability of external data sources. Understanding the limitations and potential data inconsistencies across different providers is crucial. For example, data frequency, historical depth, and data adjustments for corporate actions may vary.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Factor Data and Fama-French Model" }, `Factor investing relies on identifying and exploiting systematic risk factors that drive asset returns. The Fama-French three-factor model extends the Capital Asset Pricing Model (CAPM) by incorporating size and value factors in addition to market risk. These factors (SMB, HML, Rm-Rf) represent the historical tendencies of small-cap and value stocks to outperform their counterparts. Accessing and analyzing factor data using <code>pandas_datareader</code> and the Fama-French Data Library allows for evaluating factor performance and constructing factor-based portfolios.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Options Data and Greeks" }, `Options contracts grant the holder the right, but not the obligation, to buy (call) or sell (put) an underlying asset at a specific price. Analyzing options data involves understanding key metrics like implied volatility, open interest, and the Greeks. The Greeks (Delta, Gamma, Theta, Vega, Rho) quantify the sensitivity of option prices to changes in various factors (underlying price, volatility, time to expiration, etc.). The OpenBB platform provides tools for retrieving option chains, calculating Greeks, and visualizing option data.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Futures Data and Curves" }, `Futures contracts obligate parties to buy or sell an asset at a predetermined price and date. Futures data includes information on contract specifications, trading volume, and open interest. Analyzing futures curves, which plot the prices of futures contracts with different expiration dates, provides insights into market expectations about future price movements. The OpenBB platform facilitates accessing historical and real-time futures data.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "API Interaction and Keys" }, `Many financial data providers offer APIs for programmatic access to their data. API keys serve as unique identifiers for authentication and authorization. Managing API keys securely and understanding API rate limits are essential for reliable data acquisition. The OpenBB platform often handles API key management, simplifying the process for users.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Data Visualization (matplotlib)" }, `Visualizing financial data is crucial for gaining insights and communicating findings. Matplotlib provides a comprehensive library for creating static, interactive, and animated plots in Python. Visualizations can range from simple line charts of price movements to complex visualizations of option surfaces or factor exposures.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Data Cleaning and Preprocessing" }, `Real-world financial data often requires cleaning and preprocessing to handle missing values, outliers, and inconsistencies. Techniques like imputation, outlier removal, and data normalization are essential for ensuring data quality and reliability. Pandas provides various functions for data cleaning and manipulation.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Time Series Analysis" }, `Financial data often comes in the form of time series, representing data points collected over time. Pandas offers specialized functionalities for working with time-indexed data, including resampling, rolling calculations, and time series decomposition. Understanding time series concepts like stationarity and autocorrelation is crucial for accurate analysis.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Algorithmic Trading Applications" }, `The acquired data can be used for various algorithmic trading applications, including backtesting trading strategies, developing predictive models, optimizing portfolios, and managing risk. The quality and reliability of the data directly impact the performance and robustness of these applications.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The chapter's central move is to treat Python as a <em>financial data workbench</em> rather than a collection of scripts. The three anchor libraries \u2014 <code>pandas</code>, <code>pandas_datareader</code>, and OpenBB \u2014 sit at different levels of the stack. Pandas provides the in-memory model: <code>Series</code> and <code>DataFrame</code> structures, labelled axes, and time-aware indices. <code>pandas_datareader</code> sits one layer up as a thin bridge that converts the idiosyncrasies of Yahoo Finance, FRED, IEX, Alpha Vantage and others into uniform DataFrames. OpenBB sits higher still, exposing both a REPL-like CLI and a Python SDK that normalise heterogeneous providers (CBOE, Tradier, Intrinio, TMX, and many more) into a consistent call surface.`), /* @__PURE__ */ React.createElement(P, null, `The author is careful to present these not as alternatives but as <strong>layers for different ergonomics</strong>. <code>pandas_datareader</code> wins when you want a single DataFrame fast and direct \u2014 the classic notebook cell that says "pull SPY from 2015 to today." OpenBB wins when your workflow spans many providers, when you want credentials and caching handled centrally, or when you need non-price data like options chains or fundamentals without learning ten different SDKs.`), /* @__PURE__ */ React.createElement(P, null, `The middle of the chapter pivots from plumbing to <em>substance</em>: the Fama-French factors. Retrieving SMB, HML, and Rm-Rf is a two-line affair, but their theoretical weight is immense \u2014 they reframe every return series as a decomposition into market beta, size premium, and value premium. The chapter then extends this lens to derivatives, showing how option chains and futures curves surface the market's forward expectations, and how Greeks quantify sensitivity to underlying price, volatility, time, and rates.`), /* @__PURE__ */ React.createElement(P, null, `The closing argument is pragmatic: data quality discipline pays compound interest. Missing values, unadjusted splits, provider drift, and API rate limits will each, independently, invalidate results. The chapter builds a habit of defensive engineering \u2014 validating shape, re-indexing to a canonical calendar, imputing with justified methods, and logging provenance \u2014 so that the backtests in later chapters rest on reproducible foundations.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Theoretical Foundations"), /* @__PURE__ */ React.createElement(P, null, `The theoretical underpinnings draw on three strands: financial economics, time series analysis, and derivatives pricing. Financial economics supplies the asset-pricing vocabulary \u2014 market efficiency, risk-return trade-offs, and the notion of systematic factors. Time series analysis supplies the statistical grammar for temporally ordered data: stationarity, autocorrelation, integration, and the resampling machinery that lets minute bars, daily bars, and monthly factors meet on a common axis. Derivatives pricing supplies the mathematical apparatus \u2014 most famously Black-Scholes \u2014 that turns option quotes into structured sensitivities.`), /* @__PURE__ */ React.createElement(P, null, `The Efficient Market Hypothesis sets the bar: if prices already reflect available information, consistent outperformance is hard. Yet the Fama-French three-factor model, grounded in empirical regularities across decades of US equities, shows that systematic tilts (small over large, value over growth, market over cash) have historically earned premia. These facts motivate factor-based construction and evaluation of portfolios. Options pricing models then layer on top, describing how volatility, time, and rates reshape the payoff distribution.`), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement(P, null, `Before open-source Python, quantitative work typically lived inside Excel macros, Bloomberg terminals, MATLAB, or bespoke proprietary systems. Data acquisition meant manual downloads, screen-scraping, or expensive direct feeds. Pandas collapsed the distance between "data on disk" and "data in a model," and <code>pandas_datareader</code> collapsed the distance between a provider URL and a DataFrame. OpenBB extended that democratisation further, giving solo researchers a single surface over a diverse provider landscape. On the modelling side, the progression from CAPM to three-factor to multi-factor, and from Black-Scholes to stochastic-volatility and jump-diffusion, mirrors the same trajectory: better instruments, lower barriers.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles and Axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Quality"), " \u2014 accuracy, completeness, and consistency of data are paramount for reliable analysis."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Timeliness"), " \u2014 up-to-date data is essential for making informed decisions in rapidly changing markets."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Reproducibility"), " \u2014 analysis should be reproducible, allowing others to verify the results and build upon existing work."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Transparency"), " \u2014 the methodologies and assumptions used in the analysis should be clearly documented.")), /* @__PURE__ */ React.createElement(H4, null, "Key Terminology"), /* @__PURE__ */ React.createEl reateElement("strong", null, "Futures Curve"), " \u2014 a graphical representation of the prices of futures contracts with different expiration dates."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Factor"), " \u2014 a quantitative metric used to describe and analyse asset characteristics."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Implied Volatility"), " \u2014 the market's expectation of future price volatility, derived from option prices."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Open Interest"), " \u2014 the total number of outstanding options or futures contracts.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(H4, null, "OpenBB Platform"), /* @__PURE__ */ React.createElement(P, null, `OpenBB provides a unified interface for accessing a very wide set of financial data sources, abstracting away the idiosyncrasies of each provider's API. Its modular architecture lets you install only the extensions you need, and exposes the same data through both a command-line interface and a Python SDK \u2014 the former useful for interactive exploration, the latter for programmatic integration. The OpenBB Hub adds a web UI for managing configurations, API keys, and tutorials. Because it is open source, the community can add providers and functionality; supported sources include Yahoo Finance, CBOE, Tradier, Intrinio, and TMX, among many others, and the platform layers in visualization, analysis, and backtesting tooling on top.`), /* @__PURE__ */ React.createElement(Ch1Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `Schematic futures curve \u2014 prices of contracts at increasing maturities, illustrating the contango-like shape the chapter uses to introduce forward-expectation reading.`), /* @__PURE__ */ React.createElement(H4, null, "pandas_datareader"), /* @__PURE__ */ React.createElement(P, null, `<code>pandas_datareader</code> wraps provider APIs (Yahoo Finance, IEX, Alpha Vantage, FRED, Eurostat, and others) and returns results directly as pandas DataFrames. You pass a source, a ticker, a date range, and optional parameters; the library handles the HTTP call and parsing. It also exposes dedicated helpers for curated datasets such as the Fama-French factor files. The trade-off is fragility: the library depends on the stability of upstream APIs, so users should validate shapes, handle exceptions, and consult provider changelogs when results look off.`), /* @__PURE__ */ React.createElement(H4, null, "Comparative Analysis"), /* @__PURE__ */ React.createElement(P, null, `OpenBB and <code>pandas_datareader</code> represent two philosophies. OpenBB is a <em>platform</em> \u2014 wide coverage, integrated visualisation and backtesting, API-key management, and a growing community of providers. <code>pandas_datareader</code> is a <em>shim</em> \u2014 minimal, direct, and immediately useful inside a notebook. If your work lives entirely inside pandas and you mostly need price and factor series, <code>pandas_datareader</code> is often enough. If you span options, fundamentals, macro, alternative data, and you value a single call surface, OpenBB earns its footprint. Both depend on upstream APIs, so both require defensive coding.`), /* @__PURE__ */ React.createElement(H4, null, "Workflow Processes"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, "Install necessary libraries \u2014 ", /* @__PURE__ */ React.createElement("code", null, "pandas"), ", ", /* @__PURE__ */ React.createElement("code", null, "pandas_datareader"), ", and OpenBB via ", /* @__PURE__ */ React.createElement("code", null, "pip"), " or ", /* @__PURE__ */ React.createElement("code", null, "conda"), "."), /* @__PURE__ */ React.createElement("li", null, "Import the required libraries into your Python script or notebook."), /* @__PURE__ */ React.createElement("li", null, "Specify data parameters \u2014 source, ticker, date range, and other relevant knobs."), /* @__PURE__ */ React.createElement("li", null, "Retrieve data using the appropriate OpenBB or ", /* @__PURE__ */ React.createElement("code", null, "pandas_datareader"), " function."), /* @__PURE__ */ React.createElement("li", null, "Store the retrieved data in a pandas DataFrame."), /* @__PURE__ */ React.createElement("li", null, "Clean and preprocess \u2014 handle missing values, outliers, and inconsistencies."), /* @__PURE__ */ React.createElement("li", null, "Analyse using pandas operations and matplotlib visualisation."), /* @__PURE__ */ React.createElement("li", null, "Implement the downstream trading strategy or research task on top of the cleaned data.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths, Limitations, and Boundary Conditions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "OpenBB"), " \u2014 strengths include a unified interface, a wide range of data sources, modular architecture, and community support. Limitations include potential dependency conflicts and the need to manage API keys. Boundary conditions include data availability from providers and API rate limits."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "pandas_datareader"), " \u2014 strengths include simplified data acquisition and direct integration with pandas. Limitations include reliance on external data sources and potential data inconsistencies. Boundary conditions include data availability from providers and API stability.")), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(H4, null, "Algorithm Descriptions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Retrieval"), " \u2014 algorithms that make HTTP requests, parse responses, and handle errors, often layered with caching to cut API calls and improve latency."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Cleaning"), " \u2014 algorithms that identify and treat missing values, outliers, and inconsistencies via imputation, outlier removal, and normalisation."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Transformation"), " \u2014 algorithms that reshape, merge, and join datasets using pandas operations.")), /* @__PURE__ */ React.createElement(H4, null, "Complexity Analysis"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Retrieval"), " \u2014 time complexity dominated by API response time and payload size; space complexity scales with retrieved volume."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Cleaning"), " \u2014 time complexity scales with dataset size and operation complexity; space complexity scales with the working dataset."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Transformation"), " \u2014 time and space complexity scale with input size and the complexity of the reshape/merge logic.")), /* @__PURE__ */ React.createElement(H4, null, "Data Flow and Processing Patterns"), /* @__PURE__ */ React.createElement(P, null, `Data flows from external sources through APIs into OpenBB or <code>pandas_datareader</code>, is materialised as pandas DataFrames, then passes through cleaning and transformation stages before it reaches analysis, visualisation, and strategy execution. Common processing patterns include cleaning, transformation, aggregation, and time series analysis. The specific stages depend on the data's nature and the study's objective \u2014 the point is that the pipeline is an explicit object with staged responsibilities, not an ad-hoc script.`), /* @__PURE__ */ React.createElement(H4, null, "System Architecture"), /* @__PURE__ */ React.createElement(P, null, `The system architecture connects Python libraries (pandas, <code>pandas_datareader</code>, OpenBB), external data providers, and the user's compute environment. OpenBB acts as an aggregator, mediating between user code and many providers. <code>pandas_datareader</code> connects directly to specific sources. Pandas is the data model at the centre. Caching layers cut redundant API calls; storage layers may use CSV, HDF5, or databases; and the system integrates outward with visualisation, analysis, and backtesting tools.`), /* @__PURE__ */ React.createElement(H4, null, "Design Patterns"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Access Object (DAO)"), " \u2014 abstracts data-access logic to simplify interaction with different data sources."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Factory Pattern"), " \u2014 creates objects of different data providers based on user configuration."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Strategy Pattern"), " \u2014 makes different data cleaning and transformation algorithms interchangeable at call sites.")), /* @__PURE__ */ React.createElement(H4, null, "Edge Cases and Exception Handling"), /* @__PURE__ */ React.createElement(P, null, `Real pipelines contend with network failures, invalid ticker symbols, upstream API errors, schema changes, and silent data inconsistencies. Robust error handling logs errors, retries with backoff where appropriate, and surfaces informative messages so the operator can decide whether to rerun, fall back, or abort. Defensive validation of shape, dtype, and date ranges after retrieval catches many problems before they propagate downstream.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(H4, null, "Resource Requirements and Constraints"), /* @__PURE__ */ React.createElement(P, null, `Resource needs scale with dataset size, analysis complexity, and refresh frequency. Constraints include API rate limits, data availability, and local compute. Memory management matters when handling large DataFrames \u2014 chunking, appropriate dtypes (<code>float32</code>, categoricals), and iterative processing all help. CPU, RAM, and network bandwidth each become bottlenecks in different regimes; the chapter encourages profiling to find out which.`), /* @__PURE__ */ React.createElement(H4, null, "Scalability and Performance Optimization Techniques"), /* @__PURE__ */ React.createElement(P, null, `Scalability can be achieved by using distributed computing frameworks like Dask or Spark to process large datasets in parallel. Performance tactics include caching, vectorised pandas operations, and efficient data structures \u2014 sparse matrices for sparse data, for instance. Profiling and benchmarking find the bottlenecks; caching frequently-accessed series cuts API traffic; vectorisation replaces Python-level loops with C-level bulk ops.`), /* @__PURE__ import pandas_datareader.data as web
from datetime import datetime

def get_data(ticker: str, start: datetime, end: datetime, source: str = "yahoo") -> pd.DataFrame:
    """Retrieve price history for a ticker from a named provider."""
    df = web.DataReader(ticker, source, start, end)
    df.index.name = "date"
    return df

def clean_data(df: pd.DataFrame) -> pd.DataFrame:
    """Drop duplicate timestamps, forward-fill small gaps, sort by index."""
    df = df[~df.index.duplicated(keep="last")].sort_index()
    return df.ffill(limit=2).dropna()

def transform_data(df: pd.DataFrame) -> pd.DataFrame:
    """Add simple returns, log returns, and a 20-day rolling volatility column."""
    out = df.copy()
    out["ret"] = out["Adj Close"].pct_change()
    out["log_ret"] = np.log1p(out["ret"])
    out["vol_20d"] = out["ret"].rolling(20).std()
    return out.dropna()

def analyze_data(df: pd.DataFrame) -> dict:
    """Summary statistics for returns."""
    r = df["ret"]
    return {
        "mean": float(r.mean()),

    }

    plt.tight_layout()

of the book will build on \u2014 backtesting, predictive modelling, portfolio optimisation, and risk management.`), /* @__PURE__ */ React.createElement(P, null, `The chapter's emphasis is not only operational but <em>epistemic</em>: data quality, reproducibility, and transparency are treated as axioms. Robust error handling, careful indexing, and awareness of performance trade-offs are presented as habits of professional practice, not optional polish. Fundamental financial concepts \u2014 market efficiency, factor premia, the Greeks, the shape of futures curves \u2014 are introduced in the service of interpreting the data, never as pure theory.`), /* @__PURE__ */ React.createElement(P, null, `By mastering these techniques, a reader can stand up a clean, reproducible, locally-cached dataset across equities, options, futures, and factors; can align series to a common calendar; can validate and preprocess defensively; and can reason about the provenance and quality of everything downstream. The chapter also points outward to advanced topics \u2014 alternative data, high-frequency trading, multi-factor models, stochastic-volatility pricing, and NLP-driven sentiment \u2014 fostering a deeper engagement with the ever-evolving field of financial data analysis.`)), /* @__PURE__ */ React.createElement(Sec, { n: "2", title: "Advanced Data Analysis and Visualization with pandas and Matplotlib for Financial Markets" }, /* @__PURE__ */ React.createElement(P, null, `Chapter 2 of <em>Python for Algorithmic Trading Cookbook</em> turns the focus from data acquisition to the harder, more consequential problem of <strong>making financial data analytically tractable</strong>. The raw series that arrive from providers \u2014 equity closes, option chains, futures quotes \u2014 are rarely shaped the way a quant actually needs them. They have to be indexed, aligned, resampled, cleaned of gaps, enriched with engineered features, and finally rendered into pictures that a human can reason about. The chapter treats <code>pandas</code> and <code>matplotlib</code> as the two tools through which that transformation happens, and it insists that both be used with a specific kind of discipline rather than as generic scientific-Python utilities.`), /* @__PURE__ */ React.createElement(P, null, `The arc of the chapter begins with the <code>MultiIndex</code>, a structural device that allows a single <code>DataFrame</code> to represent inherently hierarchical market objects \u2014 most famously an option chain carved by expiry, strike, and option type, but equally applicable to cross-sectional panels of instruments through time. From there the chapter works outward: creating new columns to express features, concatenating and pivoting and joining to build analytic datasets, and slicing with <code>.loc</code>, <code>.iloc</code>, and boolean masks so that the <em>shape of the question</em> determines the shape of the selection. These are ordinary pandas operations; the novelty is the way they are applied systematically to financial idioms.`), /* @__PURE__ */ React.createElement(P, null, `The chapter then pivots to the <strong>quantitative primitives</strong> that sit on top of those structures: simple and logarithmic returns, with their different additivity properties; resampling between daily, weekly, and monthly bars via <code>resample</code> and <code>asfreq</code>; missing-data handling via <code>fillna</code> and <code>interpolate</code>; and volatility estimation via rolling standard deviation scaled to annual terms. Each primitive is grounded in its financial meaning \u2014 returns measure performance, resampling aligns horizons, volatility measures risk \u2014 and then demonstrated against real-looking market data. The final movement of the chapter turns those quantities into visual artifacts: pandas' built-in plotting, full matplotlib when precision matters, seaborn for distributions, and plotly for interactive dashboards. By the end, the reader can move from a provider dump to a publication-ready chart without leaving the notebook, and \u2014 more importantly \u2014 can justify every transformation along the way.`), /* @__PURE__ */ React.createElement(Ch2Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `A synthetic price series with its 20-day simple moving average \u2014 the kind of pandas-computed feature the chapter uses to illustrate rolling-window operations on a DatetimeIndex.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "MultiIndex for Hierarchical Data" }, `The pandas <code>MultiIndex</code> is a crucial tool for managing multi-dimensional data, particularly prevalent in financial markets. It allows for hierarchical indexing of DataFrames, enabling efficient organization and retrieval of complex data structures like options chains, where data is categorized by expiration date, strike price, and option type. This structure mirrors the inherent hierarchy of options data, facilitating complex queries and slicing based on multiple criteria. Without a MultiIndex, managing and querying such data would be significantly more complex, requiring cumbersome workarounds and potentially leading to inefficient code. The <code>set_index()</code> method provides a straightforward way to create a MultiIndex from existing columns, transforming a standard <code>RangeIndex</code> into a hierarchical structure. This allows for intuitive data access and manipulation, significantly improving code readability and maintainability when dealing with multi-dimensional financial data.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "DataFrame Manipulation for Feature Engineering" }, `Pandas provides a rich set of tools for manipulating DataFrames, enabling sophisticated feature engineering for financial analysis. Creating new columns based on existing data, such as calculating price differences, boolean indicators, or categorical variables, is fundamental for deriving meaningful insights. Concatenation allows combining data from different sources or time periods, while pivoting enables summarizing data across different categories, similar to Excel pivot tables. Grouping allows for applying aggregate functions to subsets of data, while joining facilitates combining related data from different DataFrames based on common keys. These operations are essential for transforming raw financial data into a format suitable for analysis and modeling.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Data Selection and Indexing for Targeted Analysis" }, `Efficient data retrieval is paramount in financial analysis, and pandas offers powerful indexing techniques. Basic selection methods like <code>head()</code>, <code>tail()</code>, and slicing provide quick access to subsets of data. Label-based indexing with <code>.loc</code> and integer-based indexing with <code>.iloc</code> offer precise control over data selection, accommodating both labeled and positional indexing schemes. Boolean indexing enables filtering data based on complex criteria, allowing for targeted analysis of specific market conditions or events. Mastering these indexing techniques is crucial for efficiently extracting relevant information from large financial datasets.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Return Calculations for Performance Measurement" }, `Calculating returns is fundamental to financial analysis, enabling performance measurement, risk assessment, and portfolio optimization. Simple returns represent the percentage change in price from one period to the next, while compound (log) returns represent the logarithmic change, accounting for compounding effects. While simple returns are additive across assets, making them suitable for short-term portfolio analysis, compound returns are additive over time, making them preferable for multi-period analysis and aligning with the assumption of log-normally distributed asset prices. Understanding the properties and limitations of each return type is crucial for accurate financial modeling.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Resampling and Frequency Conversion" }, `Financial data often comes at different frequencies, requiring resampling techniques for alignment and analysis at different time scales. Upsampling increases the frequency (e.g., daily to hourly), while downsampling decreases it (e.g., daily to monthly). Pandas provides the <code>resample</code> method for aggregating data during downsampling and the <code>asfreq</code> method for selecting data points at the new frequency during upsampling. Choosing the appropriate method depends on the specific analytical need and how missing data should be handled. Understanding the parameters of these methods, such as <code>rule</code>, <code>closed</code>, <code>label</code>, and <code>method</code>, is crucial for correct resampling.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Missing Data Handling for Robust Analysis" }, `Missing data is ubiquitous in financial datasets, and robust handling is essential for accurate analysis. Pandas offers tools like <code>fillna</code> for replacing missing values with specified values or using interpolation techniques, and <code>interpolate</code> for estimating missing values based on surrounding data points. The choice of method depends on the context and the nature of the data. Forward fill (<code>ffill</code>) and backward fill (<code>bfill</code>) are simple methods for propagating existing values, while interpolation techniques like linear, polynomial, or spline interpolation offer more sophisticated approaches for estimating missing values.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Data Visualization for Insight Generation" }, `Data visualization is crucial for understanding patterns and trends in financial data. Pandas integrates with Matplotlib for quick plotting directly from DataFrames, while Matplotlib provides a powerful framework for creating static, interactive, and animated visualizations. Seaborn, built on top of Matplotlib, offers a higher-level interface for creating statistically informative and visually appealing plots. Plotly and Plotly Dash enable interactive visualizations and dashboards, enhancing data exploration and communication.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Volatility Measurement for Risk Assessment" }, `Volatility, a measure of the dispersion of returns, is a key indicator of risk in finance. Standard deviation is the most common measure, quantifying the variability of returns around their mean. Annualized volatility scales the standard deviation to represent the volatility over a year, allowing for comparison across different time horizons. Accurate volatility estimation is crucial for risk management, portfolio construction, and option pricing.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Cumulative Return Calculation for Performance Evaluation" }, `Cumulative return represents the total change in the value of an investment over a specific period. It can be calculated using both simple and compound returns, with the choice depending on the specific application and time horizon. Cumulative return is a fundamental metric for performance reporting and investment analysis.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Advanced pandas Techniques for Enhanced Analysis" }, `Pandas offers advanced techniques like partial string indexing for selecting data from <code>DatetimeIndex</code> objects, the <code>.at</code> accessor for efficient access to single scalar values, <code>.nsmallest()</code> and <code>.nlargest()</code> for retrieving extreme values, and <code>.query()</code> for querying DataFrames using string expressions. h the knowledge and skills necessary to effectively analyse and visualise financial data using pandas and matplotlib; mastery of these techniques is a valuable toolkit for data-driven decision-making in the financial domain.`)), /* @__PURE__ */ React.createElement(Sec, { n: "3", title: "Advanced Financial Data Visualization and Analysis with Python" }, /* @__PURE__ */ React.createElement(P, null, `Chapter three is the visual and analytical pivot of the cookbook. Having established data acquisition and storage foundations, the narrative now turns to the question of how to <em>see</em> the market \u2014 and, more importantly, how to see it with enough resolution to act. The chapter traverses the full visualization spectrum, from the workhorse static charts of Matplotlib and Seaborn through the interactive browser-native dashboards of Plotly Dash, then pivots into the analytical techniques that make those visualizations meaningful: Principal Component Analysis for latent factor discovery, linear regression for beta estimation and hedging, and the storage and automation plumbing that keeps the pipeline running without human intervention.`), /* @__PURE__ */ React.createElement(P, null, `The emphasis is unapologetically practical. Each technique is introduced in the context of a concrete trading or research problem \u2014 yield curve dynamics rendered as animations to reveal regime shifts, implied volatility surfaces rendered as three-dimensional sheets to expose skew and term structure, correlation matrices rendered as heatmaps to surface cross-asset relationships that defy univariate intuition. PCA is not presented as an abstract eigendecomposition exercise but as a tool for identifying which latent drivers actually move a portfolio of stock returns. Linear regression is not a textbook line-fitting demo but the engine that powers beta hedging in production.`), /* @__PURE__ */ React.createElement(P, null, `Underlying this is a quiet argument about tooling philosophy. Matplotlib, Seaborn, and Plotly Dash are not interchangeable \u2014 each occupies a distinct niche defined by the trade-off between customization depth and interaction bandwidth. Static plots compress well and render fast; interactive dashboards enable exploratory analysis but demand web-development competence. The chapter teaches readers to match the tool to the task, and by the end introduces the operational concerns that separate a notebook-bound analyst from a systematic trader: durable storage in PostgreSQL or HDF5, and scheduled automation via cron and Task Scheduler so that alpha research does not depend on someone remembering to click Run.`), /* @__PURE__ */ React.createElement(Cap, null, `Figure 3.1 \u2014 stylised yield curve shapes. Normal (upward sloping) curves reflect expectations of rising rates and expansion; flat curves mark transition regimes; inverted curves have historically preceded U.S. recessions with high reliability.`), /* @__PURE__ */ React.createElement("div", { style: { margin: "24px 0" } }, /* @__PURE__ */ React.createElement(Ch3Vis1, null)), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { title: "Yield Curve Dynamics" }, `The yield curve, a plot of interest rates against bond maturities, is a crucial indicator of market expectations and economic health. Its shape, whether normal (upward sloping), flat, or inverted (downward sloping), reflects investor sentiment about future interest rates and economic growth. A normal curve suggests expectations of rising rates, while an inverted curve often precedes recessions. Analyzing yield curve dynamics involves understanding the interplay of factors like inflation expectations, economic growth forecasts, and central bank policies. Visualizing these changes over time through animations provides valuable insights into market trends and potential turning points.`), /* @__PURE__ */ React.createElement(Callout, { title: "Implied Volatility Surface" }, `The implied volatility surface is a three-dimensional representation of options market sentiment. It depicts how implied volatility, a measure of expected price fluctuations, varies across different strike prices and time to expiration. The surface's shape reveals crucial information about market expectations, including skew (asymmetry across strike prices) and term structure (relationship between volatility and time to expiration). Understanding the implied volatility surface is essential for options traders and risk managers to assess market risks and identify potential trading opportunities.`), /* @__PURE__ */ React.createElement(Callout, { title: "Statistical Relationship Visualization" }, `Visualizing statistical relationships in financial data is crucial for understanding market dynamics and building predictive models. Techniques like box plots, joint plots, correlation matrices, and heatmaps provide powerful tools for exploring data distributions, identifying correlations, and uncovering hidden patterns. These visualizations aid in factor analysis, portfolio construction, and risk management by providing insights into the interplay between different market variables.`), /* @__PURE__ */ React.createElement(Callout, { title: "Interactive Dashboards for PCA" }, `Interactive dashboards empower users to explore complex datasets dynamically. Combining PCA, a dimensionality reduction technique, with interactive visualizations allows users to manipulate parameters and observe the impact on principal components in real-time. This interactive approach facilitates a deeper understanding of the underlying factors driving market movements and enables more effective portfolio management and risk assessment.`), /* @__PURE__ */ React.createElement(Callout, { title: "Principal Component Analysis (PCA)" }, `PCA is a powerful technique for simplifying complex datasets by reducing their dimensionality. It identifies the principal components, which are linear combinations of the original variables that capture the most variance in the data. By projecting the data onto these principal components, we can visualize high-dimensional data in a lower-dimensional space, revealing underlying patterns and relationships. PCA is widely used in finance for risk management, portfolio optimization, and identifying market factors.`), /* @__PURE__ */ React.createElement(Callout, { title: "Linear Regression for Beta Hedging" }, `Linear regression is a fundamental statistical method for modeling the relationship between variables. In finance, it's used to estimate a portfolio's beta, a measure of its systematic risk relative to a benchmark. By regressing portfolio returns against benchmark returns, we can determine the portfolio's sensitivity to market movements. This information is crucial for hedging strategies, which aim to neutralize market risk by taking offsetting positions.`), /* @__PURE__ */ React.createElement(Callout, { title: "Data Storage and Retrieval" }, `Efficient data storage and retrieval are critical for financial analysis. Different methods, including CSV, SQLite, PostgreSQL, and HDF5, offer varying trade-offs between simplicity, performance, and scalability. Choosing the appropriate method depends on the size of the dataset, the complexity of the analysis, and the need for data integrity and concurrency.`), /* @__PURE__ */ React.createElement(Callout, { title: "Automation with Cron Jobs and Task Scheduler" }, `Automating data retrieval and processing tasks is essential for maintaining up-to-date information and streamlining workflows. Cron jobs (Linux/macOS) and Task Scheduler (Windows) provide mechanisms for scheduling scripts to run automatically at specified intervals, ensuring that data is regularly updated and analyses are performed consistently.`), /* @__PURE__ */ React.createElement(Callout, { title: "Alpha Factor Development" }, `Alpha factors are quantitative metrics used to predict asset returns. Developing alpha factors involves identifying variables that exhibit predictive power and combining them into a model. Techniques like PCA and linear regression can be used to extract alpha factors from market data and construct portfolios that aim to outperform the market.`), /* @__PURE__ */ React.createElement(Callout, { title: "Volatility Modeling" }, `Volatility, a measure of price fluctuations, is a crucial concept in finance. Modeling volatility involves understanding its statistical properties and developing models to predict its future behavior. Accurate volatility forecasts are essential for risk management, options pricing, and portfolio optimization.`), /* @__PURE__ */ React.createElement(Callout, { title: "Zipline Backtesting" }, `Zipline is a Python library for backtesting trading algorithms. It provides a framework for simulating trading strategies on historical data and evaluating their performance. Backtesting is a crucial step in the development of any trading strategy to assess its effectiveness and identify potential weaknesses.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The chapter's visualization arc moves from simple to progressively more expressive. Matplotlib provides the low-level substrate \u2014 an imperative, object-oriented API that affords granular control over every tick, line, and annotation, at the cost of verbosity. Seaborn builds on top, offering opinionated defaults and statistical primitives like <code>pairplot</code>, <code>jointplot</code>, and <code>heatmap</code> that collapse several Matplotlib invocations into one declarative call. Plotly Dash occupies a different dimension entirely: rather than producing a static image, it produces a reactive web application in which callbacks bind user interactions to chart updates, making it the natural choice for exploratory dashboards and client-facing research tools.`), /* @__PURE__ */ React.createElement(P, null, `The analytical core of the chapter rests on two pillars. Principal Component Analysis decomposes the covariance structure of a returns matrix into orthogonal factors ranked by explained variance; in equity markets the first principal component typically captures broad market direction, the second often resembles size or sector tilt, and subsequent components surface increasingly idiosyncratic drivers. Linear regression, specifically Ordinary Least Squares, estimates the slope coefficient beta from portfolio returns regressed on benchmark returns, giving the hedge ratio needed to neutralize systematic risk. Both techniques are fundamentally linear algebra \u2014 eigendecomposition and the normal equations respectively \u2014 but their interpretation is thoroughly domain-specific.`), /* @__PURE__ */ React.createElement(P, null, `The storage discussion trades cleanly between simplicity and scale. CSV is the lingua franca but imposes no schema and scales poorly; SQLite embeds a full relational engine in a single file but is limited to single-writer workloads; PostgreSQL offers production-grade concurrency and ACID guarantees at the cost of a server process; HDF5 excels at heterogeneous scientific data and columnar time-series access but requires a library rather than SQL. The right answer depends on dataset size, query patterns, and whether multiple processes need concurrent access.`), /* @__PURE__ */ React.createElement(P, null, `Automation closes the loop. A daily cron job that re-fetches prices, updates the database, regenerates factor exposures, and emails a summary converts a research notebook into an operational system. Task Scheduler provides the Windows equivalent. The common thread is that financial analysis only retains value if it is current \u2014 yesterday's factor model applied to today's market is actively misleading.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Principal Component Analysis \u2014 mathematical basis"), /* @__PURE__ */ React.createElement(P, null, `PCA is grounded in the eigendecomposition of the covariance matrix. Given a centred, standardized data matrix <code>X</code>, the covariance matrix <code>\u03A3 = X^T X / (n-1)</code> admits the decomposition <code>\u03A3 = V \u039B V^T</code>, where <code>V</code> contains the eigenvectors as columns and <code>\u039B</code> is a diagonal matrix of eigenvalues ranked in descending order. The top <code>k</code> eigenvectors define the projection into the <code>k</code>-dimensional principal subspace, and the eigenvalues quantify how much of the total variance each direction captures.`), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, "Standardize the data: subtract the mean and divide by the standard deviation of each variable."), /* @__PURE__ */ React.createElement("li", null, "Calculate the covariance matrix: compute the covariance between all pairs of variables."), /* @__PURE__ */ React.createElement("li", null, "Perform eigen decomposition: find the eigenvectors and eigenvalues of the covariance matrix."), /* @__PURE__ */ React.createElement("li", null, "Select principal components: choose the eigenvectors corresponding to the largest eigenvalues."), /* @__PURE__ */ React.createElement("li", null, "Project the data: transform the original data onto the selected principal components.")), /* @__PURE__ */ React.createElement(H4, null, "Linear Regression \u2014 OLS foundations"), /* @__PURE__ */ React.createElement(P, null, `The linear regression model posits <code>Y = \u03B1 + \u03B2X + \u03B5</code>, where <code>\u03B1</code> is the intercept, <code>\u03B2</code> is the slope (beta in the financial sense), and <code>\u03B5</code> is a zero-mean error term. Ordinary Least Squares chooses <code>\u03B1</code> and <code>\u03B2</code> to minimize the sum of squared residuals, yielding closed-form estimators <code>\u03B2\u0302 = Cov(X, Y) / Var(X)</code> and <code>\u03B1\u0302 = mean(Y) \u2212 \u03B2\u0302 \xB7 mean(X)</code>. The resulting hyperplane is the orthogonal projection of <code>Y</code> onto the column space of the design matrix.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Maximum Variance:"), " PCA aims to capture the maximum variance in the data with the fewest number of principal components."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Orthogonality:"), " the principal components are orthogonal to each other, meaning they are uncorrelated."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Linearity Assumption:"), " linear regression assumes a linear relationship between the dependent and independent variables.")), /* @__PURE__ */ React.createElement(H4, null, "Key Terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Eigenvalue:"), " a scalar value that represents the amount of variance explained by a corresponding eigenvector."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Eigenvector:"), " a vector that represents a principal component."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Covariance Matrix:"), " a matrix that shows the covariance between all pairs of variables in a dataset."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Beta (\u03B2):"), " a measure of a stock's or portfolio's systematic risk relative to a benchmark."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Alpha (\u03B1):"), " the excess return of a portfolio compared to its expected return based on its beta.")), /* @__PURE__ */ React.createElement(H4, null, "Historical Development"), /* @__PURE__ */ React.createElement(P, null, `Before PCA and linear regression became staples of quantitative finance, analysts relied on simpler univariate tools \u2014 correlation coefficients, rolling means, and visual inspection of price series. These worked at low dimension but degraded rapidly as portfolios grew. Pearson introduced PCA in 1901 as "lines and planes of closest fit to systems of points in space"; Hotelling formalized it for psychometrics in the 1930s; its migration into finance came alongside the Capital Asset Pricing Model and Arbitrage Pricing Theory, where latent factor structure moved from curiosity to necessity. Linear regression has a deeper lineage in Gauss and Legendre's least-squares work of the early nineteenth century. The computational revolution of the 1980s and 1990s made both techniques routine on datasets that would have been intractable a generation earlier.`), /* @__PURE__ */ React.createElement(Cap, null, `Figure 3.2 \u2014 PCA explained-variance decomposition of a hypothetical 8-asset return matrix. The first principal component typically absorbs most systematic movement; the elbow between PC3 and PC4 is a common cutoff for factor-model construction.`), /* @__PURE__ */ React.createElement("div", { style: { margin: "24px 0" } }, /* @__PURE__ */ React.createElement(Ch3Vis2, null)), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(P, null, `Matplotlib is the foundational 2D plotting library in the Python scientific stack. Its pyplot interface provides a MATLAB-like imperative API, while its object-oriented Figure and Axes classes support fine-grained composition. Matplotlib renders to every major output format \u2014 PNG, PDF, SVG, interactive backends \u2014 and its animation module drives the yield-curve time-series visualizations described in the chapter. The cost of this flexibility is verbosity: non-trivial plots routinely require a dozen or more method calls.`), /* @__PURE__ */ React.createElement(P, null, `Seaborn sits one abstraction layer higher. Its primitives assume a tidy DataFrame and a statistical objective, and in exchange produce publication-quality output with minimal configuration. <code>sns.heatmap</code> renders correlation matrices; <code>sns.jointplot</code> combines scatter plots with marginal distributions; <code>sns.pairplot</code> explodes a DataFrame into a grid of bivariate relationships. The trade-off is reduced customization granularity \u2014 for anything outside Seaborn's design envelope, you drop back to Matplotlib.`), /* @__PURE__ */ React.createElement(P, null, `Plotly Dash is structurally different. A Dash application is a web server; charts are rendered client-side in the browser via Plotly.js; user inputs trigger callbacks that return updated figures. This reactive architecture makes Dash the natural fit for exploratory dashboards where users drag sliders to re-run PCA with different component counts or toggle between asset universes. The operational cost is real: deploying a Dash app means running a Python process, reasoning about state, and handling concurrent users.`), /* @__PURE__ */ React.createElement(Code, { language: "python" }, `import numpy as np

# Beta of a portfolio against SPY

joined = pd.concat([portfolio, benchmark], axis=1, keys=["port", "spy"]).dropna()
