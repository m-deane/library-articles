wered by enslaved oarsmen \u2014 raided Muslim merchant vessels and coastal settlements. The captured cargo enriched the Order's treasury. The captured people were brought to Malta, quarantined at the Lazzaretto on Manoel Island, triaged by sex, age, and physical condition to determine market value, and then distributed: the strongest males went to the galleys as rowers, others were assigned to construction, domestic service, or the Order's institutions. Those captured by the Order's own ships became state property. Those taken by licensed privateers were auctioned at the public slave market in Piazza San Giorgio \u2014 the city's main square, directly in front of the Grandmaster's Palace. Godfrey Wettinger, the Maltese historian who spent his career reconstructing this world from notarial records and chancery documents, published his comprehensive study in 2002: a 600-page work tracing slavery on the islands from approximately 1000 to 1812 that remains the foundational text."), /* @__PURE__ */ React.createElement(Fig, { caption: /* @__PURE__ */ React.createElement(React.Fragment, null, /* @__PURE__ */ React.createElement("strong", null, "The engine of empire."), " The corsairing economy that financed Hospitaller Malta. Raids on Ottoman and North African shipping produced plunder (which funded fortifications and the treasury) and captives (who were enslaved, ransomed, or sold). Valletta's slave market at Piazza San Giorgio operated in front of the Grandmaster's Palace. The system was self-reinforcing: galleys powered by enslaved oarsmen conducted the raids that captured more enslaved people.") }, /* @__PURE__ */ React.createElement(CorsoSVG, null)), /* @__PURE__ */ React.createElement("p", null, "The scale grew across three centuries. When the Knights arrived in 1530, Malta had a small existing slave population. After the Great Siege of 1565 \u2014 in which Jean de la Valette's outnumbered garrison held off an Ottoman force of perhaps 40,000 \u2014 several hundred M acred architecture of the Order without comment or context. Godfrey Wettinger, who died in 2015 at the age of 85, spent decades in the archives reconstructing a history that few Maltese institutions had chosen to tell. The 2021 publication in Antiquity by Nathaniel McDermott \u2014 "Slavery, captivity and galley rowing in early modern Malta" \u2014 represents the first archaeological approach to this material, reframing captivity as a process visible in material culture: graffiti in detention spaces, artefacts aboard galley wrecks, the spatial organisation of the Bagno itself. The scholarship is closing the gap between what happened and what is remembered.`)), /* @__PURE__ */ React.createElement(Flr, null), /* @__PURE__ */ React.createElement("p", null, "The distinction between the stones and the hands that laid them is, in Valletta, a distinction the city itself refuses to make visible. Every bastion, every curtain wall, every globigerina block in every church fa\xE7ade was cut, transported, and fitted by a workforce that included enslaved Muslims captured in corsair raids, enslaved Jews seized from Mediterranean shipping lanes, enslaved Christians taken as prisoners of war, Maltese freemen working for contractors, and galley slaves temporarily reassigned from the oars to the quarry. Wettinger's research clarifies the division of labour: slaves were generally assigned menial tasks \u2014 removal and carting of rubble, excavation of ditches \u2014 while skilled construction was done by employed workers. But the line between menial and skilled blurred constantly, and the physical infrastructure of extraction \u2014 the quarrying, the hauling, the earthmoving that made fortification possible \u2014 rested on unfree labour."), /* @__PURE__ */ React.createElement("p", null, "In June 1798, Napoleon's fleet appeared in the Grand Harbour. The Order surrendered after token resistance \u2014 a capitulation so swift it suggests the institution's internal decay had advanced further than its walls implied. Napoleon applied French law: liberty, equality, and the abolition of slavery. The Jews and Muslims still held in the Slaves' Prison were freed. The Bagno was eventually demolished. The corsair galleys were retired. The economy that had built Valletta \u2014 an economy of capture, coercion, and the conversion of human beings into architectural infrastructure \u2014 ended not with a revolt but with a bureaucratic decree from a general who had other islands to conquer."), /* @__PURE__ */ React.createElement("p", null, "Today the fortifications remain, golden in the morning light, photographed by thousands of tourists who cross the drawbridge into Valletta each day without knowing that the ditch beneath their feet was cut by enslaved hands. The honey-coloured globigerina limestone \u2014 the same stone that absorbed Ottoman cannonballs during the Great Siege \u2014 has a quality that builders and historians both understand: it is soft when freshly quarried and hardens with exposure to air. Time makes it stronger. Time also makes it silent. Somewhere beneath the surface of every wall in Valletta, in the mortar joints and the quarry marks and the levelling courses, there is a record that no plaque preserves \u2014 the labour of people whose names appear in notarial contracts as merchandise, who slept in a prison with a market, who worshipped in a mosque inside their jail, who planned a revolt in a coffeehouse on a street they had helped to pave, and who, when the revolt failed, were branded on the forehead with a letter that meant rebel. The walls do not speak. But they know.")), /* @__PURE__ */ React.createElement("div", { className: "sn" }, /* @__PURE__ */ React.createElement("h3", null, "Source Integrity Note"), /* @__PURE__ */ React.createElement("div", { className: "ss" }, /* @__PURE__ */ React.createElement("div", { className: "st" }, "Claims Requiring Verification"), /* @__PURE__ */ React.createElement("ul", null, /* @__PURE__ */ React
