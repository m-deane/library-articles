  ), /* @__PURE__ */ React.createElement(DC, null, `There is a moment, just before midnight at Caf\xE9 Lisboa in Mindelo, when the cataverde band stops tuning and the room \u2014 six tables, two waiters, a handful of fishermen who have come up from the Salamansa quay \u2014 falls into the kind of attentive silence that morna requires. The cavaquinho player, a thin man named Tito Paris Jr. who has been performing this same set six nights a week for fourteen years, leans into the microphone and says, in Crioulo, that he is going to play "Sodade" \u2014 the song every Cape Verdean carries inside them, the song Ces\xE1ria \xC9vora made into a global lament forty years ago, the song that translates roughly as the unbearable longing for something you have already lost.`), /* @__PURE__ */ React.createElement(P, null, `"My mother left for Portugal when I was nine," Tito tells me afterwards, when the band has packed up and the bartender is pouring grogue into thimble glasses. He is forty-three, the son of an Angolan father and a Mindelense mother, and he has played in three Lisbon bars and one in Rotterdam before coming home to Mindelo. "I learned to play morna because it is the only music that admits the truth of this place. We are an archipelago of departures."`), /* @__PURE__ */ React.createElement(P, null, `The Cape Verde archipelago \u2014 Cabo Verde in the official Portuguese, Kabu Verdi in Crioulo \u2014 is ten volcanic islands and several rocky islets sitting roughly 570 kilometres off the West African coast at fifteen degrees north of the equator, scattered across an ocean larger than Spain. The country is geologically young (the oldest island, Sal, surfaced about twenty-six million years ago), demographically small (a resident population of around six hundred thousand, with another million Cape Verdeans abroad \u2014 mostly in the United States, Portugal, the Netherlands, and Senegal), and historically the first archipelago in the Atlantic to be permanently settled by Europeans, in 1462, two decades before Columbus crossed.`), /* @__PURE__ */ React.createElement(P, null, `Every island has its own light. On Santiago, the largest, the light is broad and agricultural, falling across cane fields and the lavada-fed terraces of the Serra Malagueta. On S\xE3o Vicente, sixty kilometres of dry water across the channel from Santo Ant\xE3o, the light is harbour-light, refracted through the cranes and warehouses of Mindelo's nineteenth-century coaling station. On Fogo \u2014 the volcanic cone that gave the country its second-most-visited landscape \u2014 the light is filtered through pumice dust and seems perpetually slightly metallic. And on Santo Ant\xE3o, in the deep valleys of Paul and Ribeira Grande, the light arrives late and leaves early; the morning sun does not reach the valley floor until after nine, and the sun has already crossed the western ridge by half past four.`), /* @__PURE__ */ React.createElement(P, null, `Two days after Mindelo, I am in Ch\xE3 das Caldeiras \u2014 the village inside the caldera at the foot of Pico do Fogo, at about 1,700 metres elevation \u2014 drinking white wine from grapes that grow on lava. The vineyard owner is Anselmo Gon\xE7alves Lima, fifty-six, a cooperative member who lost his house, his vines, and his stored wine to the eruption that began on the 23rd of November 2014 and continued until the 8th of February 2015 \u2014 eighty-eight days during which the lava buried the villages of Portela and Bangaeira and forced 994 people to evacuate the caldera. "We came back six months later," he says, pouring me a glass of the 2023 Ch\xE3. "Not because we were stupid. Because the soil here is the best in the country. Where else can you grow a vine in volcanic ash that the Order of Malta wine makers would buy?"`), /* @__PURE__ */ React.createElement(P, null, `The next afternoon, on a different island and a different geology, I follow a footpath down from the rim of the Cova de Paul crater into the upper Ribeira do Paul valley on Santo Ant\xE3o. The path drops two hundred and sixty metres in just over an hour, and the valley floor \u2014 when it finally arrives \u2014 is the kind of green that Europeans imagine the tropics to be and that Cape Verde almost never is: terraced sugarcane, banana palms, mango trees, the smoke of a pot of cachupa stew rising from a stone-built kitchen. I meet Maria de F\xE1tima Gomes, sixty-one, who has farmed her family's three-hectare terrace for thirty-eight years and who supplies sugarcane to the grogue distillery in Lombo Branco. "The valley grows because of the levadas," she tells me, gesturing at a hand-cut stone water channel that runs along the valley wall. "My grandfather built that section. The water comes from the Cova above. Without the rain on the crater, nothing here is green."`), /* @__PURE__ */ React.createElement(P, null, `This is the country that this guide tries to make legible to a photographer who has not yet visited: an archipelago whose visual register depends entirely on which island you stand on, what month you arrive, and whether the harmattan is blowing dust from the Sahara that morning. What follows is two parts: a literary opening you have nearly finished reading, and an operational reference \u2014 ten location entries across five islands, with GPS coordinates, compass bearings, monthly timing, failure conditions, and the local knowledge that does not appear in the tourist guides. Read the first part for the reason; consult the second in the field.`), /* @__PURE__ */ React.createElement("hr", { className: "cv-rule" }), /* @__PURE__ */ React.createElement(Sec, { n: "1", title: "The Archipelago at a Glance" }, /* @__PURE__ */ React.createElement(P, null, `Cabo Verde divides into two groups: the <strong>Barlavento</strong> (windward) islands to the north \u2014 Santo Ant\xE3o, S\xE3o Vicente, S\xE3o Nicolau, Sal, Boa Vista, and the uninhabited Santa Luzia \u2014 and the <strong>Sotavento</strong> (leeward) islands to the south \u2014 Maio, Santiago, Fogo, and Brava. The capital, Praia, sits on Santiago. The major international airports are Praia (RAI) and Sal's Am\xEDlcar Cabral airport (SID). All inter-island travel is by light aircraft (TACV and Bestfly turboprops, mostly ATR-42 and Dornier 228) or by ferry \u2014 the most reliable being the 60-minute S\xE3o Vicente\u2013Santo Ant\xE3o crossing operated by CV Interilhas.`), /* @__PURE__ */ React.createElement(ArchipelagoMap, null), /* @__PURE__ */ React.createElement(Cap, null, `Map: ten primary shooting locations across five islands. Numbered points correspond to the operational entries below.`)), /* @__PURE__ */ React.createElement(Sec, { n: "2", title: "When to Go: A Climate Briefing for Photographers" }, /* @__PURE__ */ React.createElement(P, null, `The single most important thing to understand about Cabo Verde light is that it has two enemies \u2014 Saharan dust in the dry season, and convective cloud and rain in the wet \u2014 and one short, reliable window between them.`), /* @__PURE__ */ React.createElement(P, null, `The <strong>bruma seca</strong>, or "dry mist," is the Crioulo name for the harmattan dust that the northeasterly trade winds carry across the archipelago between roughly November and March, peaking in January and February. Visibility on a strong bruma seca day can drop to three or four kilometres at sea level; the sky turns a pale, milky beige; and the limestone, the basalt, and the ochre slopes of the islands lose contrast and colour. NASA Earth Observatory and several decades of CV-DUST aerosol monitoring at the Cabo Verde Atmospheric Observatory confirm what every Mindelense already knows: there are roughly three months a year when the air is clean enough for landscape photography against haze.`), /* @__PURE__ */ React.createElement(P, null, `The "winter" rainy season runs <strong>July through October</strong>, and is counterintuitive for European visitors expecting tropical seasons to mirror Caribbean ones. The rain falls in short, intense convective bursts \u2014 most days have at least some sun \u2014 but the valleys of Santo Ant\xE3o, the slopes of Fogo, and the higher reaches of Santiago turn briefly, dramatically green. This is the season for valley photography. It is the wrong season for clean-skied volcano shots.`), /* @__PURE__ */ React.createElement(P, null, `The reliable window is <strong>March through June</strong>: the trade winds drop slightly, the dust settles out of the air, the rains have not yet started, and the sun rises and sets within a stable thirty-five-minute band (sunrise 06:30 to 06:55; sunset 18:30 to 18:55). This is when to photograph the volcanic cones, the salt pans, and the ocean horizon. Humpback whale watching off Boa Vista and Sal peaks in March and April; this is also the only window in which the harbour at Mindelo reliably sits flat enough for the long-exposure blue hour shots.`), /* @__PURE__ */ React.createElement(MonthlyClimate, null), /* @__PURE__ */ React.createElement(Callout, { type: "tip", title: "The 15\xB0 latitude rule" }, `At 15\xB0N, civil twilight is short \u2014 the sun rises and sets close to vertical. Plan for roughly 22 minutes of civil twilight before sunrise and after sunset, plus a 25\u201330 minute golden hour window on either side. There is no extended Nordic-style "long evening." If you arrive at a viewpoint at 18:30 in March expecting an hour of soft light, you have already missed half of it.`)), /* @__PURE__ */ React.createElement(Sec, { n: "3", title: "Getting There and Around" }, /* @__PURE__ */ React.createElement(P, null, `As of <strong>1 January 2026</strong>, Cape Verde has ended visa-on-arrival for nationals of 96 countries (including the United Kingdom, the United States, Canada, Australia, and most non-EU European states). EU and Schengen-area citizens remain visa-exempt for stays up to thirty days. <em>All</em> air arrivals \u2014 visa or no visa \u2014 must complete the <strong>EASE</strong> (Electronic Authorization System Entry) pre-registration online at least five days before flying, which also pays the airport security tax (TSA). The form is at ease.gov.cv; processing is up to seventy-two hours; the authorisation is valid for one year.`), /* @__PURE__ */ React.createElement(P, null, `<strong>International entry</strong> is overwhelmingly via Sal (SID) for charter and package flights, and Praia (RAI) for scheduled flights from Lisbon, Boston, Amsterdam, and Dakar. <strong>Inter-island flights</strong> are operated by TACV (the national carrier) and Bestfly, with daily connections between Praia, Sal, S\xE3o Vicente, and Boa Vista, and less frequent service to Fogo, S\xE3o Nicolau, and Maio. Aircraft are small (40\u201370 seats); luggage allowance is generous (23 kg checked) but tripods packed in carry-on may attract attention at security.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Inter-island ferry</strong> service is operated by CV Interilhas. The Barlavento line \u2014 S\xE3o Vicente (Mindelo) \u2194 Santo Ant\xE3o (Porto Novo) \u2014 is the most reliable route in the country: 60 minutes, two return crossings daily, rarely cancelled. The vessel is the M/V Chiquinho. Other ferry routes (Praia\u2013Brava, Praia\u2013Fogo, Sal\u2013Boa Vista) run less frequently and are more weather-dependent. Schedules are published month-by-month on cvinterilhas.cv; book online or at the port office. <strong>Carry physical tickets</strong> \u2014 the boarding system at Mindelo and Porto Novo does not always accept QR codes from older phones.`)), /* @__PURE__ */ React.createElement("hr", { className: "cv-rule" }), /* @__PURE__ */ React.createElement(Sec, { n: "4", title: "The Operational Section: Ten Locations Across Five Islands" }, /* @__PURE__ */ React.createElement(P, null, `What follows is the FotoVue-standard operational reference. Each entry gives GPS coordinates for the primary shooting position, parking, compass bearing, monthly timi . The structure is the people: Anselmo Gon\xE7alves Lima, who walked back into a buried village six months after a volcano had finished with it; Maria de F\xE1tima Gomes, who has farmed the same three hectares of terrace through forty rainy seasons; Tito Paris Jr., who cannot quite forgive the country for sending so many of its people away, and cannot quite leave it himself. They are the reason these landscapes are still landscapes and not just topography. The light, the dust, the volcanic soils \u2014 those are merely the conditions in which their lives unfold.`), /* @__PURE__ */ React.createElement(P, null, `The plane back to Lisbon leaves Praia at 02:40. I take a taxi to RAI at midnight. The driver, a man in his fifties named Jorge, who emigrated to Boston in 1989 and returned in 2018, asks me what I have photographed. I tell him: a volcano, a valley, a salt crater, a market, a morna set. He thinks about this for a moment, then says, in his careful American-tinged English: "You have photographed the country, but you have not yet photographed Cabo Verde. For that, you have to come back. We are an archipelago of departures. The whole point is to return."`)), /* @__PURE__ */ React.createElement(Sec, { n: "6", title: "Source Integrity Note" }, /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Verification, composites, and field-verification flags" }, /* @__PURE__ */ React.createElement(P, null, `<strong>GPS COORDINATES marked [FV]:</strong> all ten primary positions are derived from satellite imagery cross-referenced with published trip reports, OpenStreetMap, and Wikiloc tracks. They are accurate to within roughly 30\u201380 metres but have <em>not</em> been walked with a personal GPS. A field-verifying photographer should expect to refine each by a short walk on arrival.`), /* @__PURE__ */ React.createElement(P, null, `<strong>NAMED LOCAL CHARACTERS \u2014 composite disclosure:</strong> Tito Paris Jr. (cavaquinho player at Caf\xE9 Lisboa), Anselm
