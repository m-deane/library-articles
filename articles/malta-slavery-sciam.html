called the "bony diaries of people's lives" \u2014 repetitive physical labour and recidivist violence leaving identifiable traces on bone \u2014 and applied them to the specific context of the Knights of St John's galley fleet, which required approximately 280 oarsmen per vessel and employed, across the Mediterranean, an estimated 20,000 forced rowers in peacetime alone. Palmer's work, expanded in his 2021 monograph Captives, Colonists and Craftspeople (Berghahn Books), represents the first sustained archaeological approach to modern slavery within a European context \u2014 and its subject is the very city whose golden fortifications are a UNESCO World Heritage Site visited by over two million tourists per year.`), /* @__PURE__ */ React.createElement("p", null, "The Knights Hospitaller ruled Malta from 1530 to 1798. During that period, the corsairing economy \u2014 state-sponsored piracy against Ottoman and North African shipping, conducted under the theological framework of holy war \u2014 generated the labour force, the capital, and the captive population that built and sustained the island's military infrastructure. Godfrey Wettinger's comprehensive archival study, Slavery in the Islands of Malta and Gozo ca. 1000\u20131812 (2002, Publishers Enterprises Group, 600+ pages), reconstructed the demographic arc from notarial contracts, chancery records, and the Order's administrative archives. His methodology relied heavily on attrition-rate analysis: because the Order kept records of dying slaves and their replacements, the replacement rate could be used to back-calculate total throughput \u2014 a demographic technique analogous to mark-recapture methods in population ecology. Wettinger's estimates show the enslaved population growing from approximately 200 at the Knights' arrival in 1530 to a peak of roughly 8,000 by the mid-eighteenth century, making enslaved people a significant fraction of Malta's total population of approximately 100,000."), /* @__PURE__ */ React.createElement(Fig, { caption: /* @__PURE__ */ React.createElement(React.Fragment, null, /* @__PURE__ */ React.createElement("strong", null, "Four evidence streams."), " The convergent methodology Palmer (2021) proposes for studying captivity in the absence of direct physical evidence. Archival records (notarial contracts, Inquisition files), material culture (Ottoman coffee cups excavated at Birgu and Valletta \u2014 Cutajar & Spiteri 2019), graffiti (thousands of ship carvings documented by the Malta Ship Graffiti Project and CMPHP photogrammetry), and bioarchaeological analysis of skeletal remains converge on a single conclusion: captivity shaped every dimension of Hospitaller society.") }, /* @__PURE__ */ React.createElement(EvidenceSVG, null)), /* @__PURE__ */ React.createElement(Side, { title: "Sidebar 1: Galley Biomechanics and Demographic Scale" }, /* @__PURE__ */ React.createElement("p", { style: sp }, `Each Hospitaller galley was approximately 50 metres long, powered by roughly 280 oarsmen seated on three tiers of benches (outboard, middle, inboard) flanking a central gangway called the corsia. Robert Davis's 2007 analysis in the Journal of Medieval and Early Modern Studies estimated that Mediterranean nations collectively employed some 20,000 forced rowers in peacetime \u2014 a figure that rises dramatically during wartime mobilisations. The rowing population was heterogeneous: enslaved Muslims (schiavi), convicted criminals (forzati), debtors, and a small number of voluntary rowers (buonavoglie) who received pay. Wettinger notes that the Order kept separate administrative categories for each class, and that attrition among galley slaves was high \u2014 compressor hoses did not exist in the sixteenth century, but the equivalent was the relentless physical demand of oar-stroke cycles lasting hours, in conditions that Muscat and Agius (2013) describe with the phrase "as strong as a Turk," reflecting the common assessment that Turkish captives were the most valued rowers. The musculoskeletal consequences of this labour \u2014 repetitive strain on shoulders, lower back, and hands \u2014 are precisely the kind of traces that Palmer's bioarchaeological methodology can detect in skeletal remains, though no systematic osteological study of identified galley-rower burials in Malta has yet been published.`)), /* @__PURE__ */ React.createElement(Fig, { caption: /* @__PURE__ */ React.createElement(React.Fragment, null, /* @__PURE__ */ React.createElement("strong", null, "280 oarsmen per vessel."), " Schematic cross-section showing the three-tier rowing arrangement on a Hospitaller galley. The Order maintained three galleys \u2014 the Capitana, San Luigi, and San Nicola \u2014 requiring a minimum of 840 rowers at any given time. Musculoskeletal stress from repetitive oar-stroke cycles leaves identifiable traces on skeletal remains (Martin 2008).") }, /* @__PURE__ */ React.createElement(GalleySVG, null)), /* @__PURE__ */ React.createElement("p", null, `The material culture of captivity is emerging from excavations that were not originally designed to find it. Nathaniel Cutajar and Mevrick Spiteri's 2019 analysis of Ottoman coffee cups recovered from eighteenth-century deposits in Birgu and Valletta \u2014 published in Tesserae, Issue 8 \u2014 provides a ceramic signature of the enslaved population's presence in the urban fabric. Ottoman coffee-drinking culture, brought by captives from the Levant and North Africa, infiltrated Maltese daily life through the Bagno's courtyard market and the coffeehouses of Valletta \u2014 including the coffeehouse on Strada Fontana where, on 6 June 1749, three enslaved conspirators tried to recruit a fourth man to assassinate Grand Master Manuel Pinto da Fonseca. The 2023 Central Mediterranean Penal Heritage Project (CMPHP), using digital photogrammetry to document graffiti in detention spaces across Malta and Sicily, has identified hundreds of ship carvings and gameboards carved by confined individuals \u2014 material that Timmy Gambin and Marcus Kassulke published in Historical Archaeology (2023) as evidence of what they term "maritimity in stone."`), /* @__PURE__ */ React.createElement("div", { className: "pq" }, `"Direct evidence of captives is rare in archaeological contexts. By reconceptualising captivity as a process, rather than as a 'thing,' we can glimpse captivity indirectly through its effects on a range of practices."`, /* @__PURE__ */ React.createElement("br", null), /* @__PURE__ */ React.createElement("span", { style: { fontSize: "12px", fontWeight: 400, fontStyle: "normal", color: C.cap } }, "\u2014 Russell Palmer, Antiquity (2021), citing Ann Stahl (2008)")), /* @__PURE__ */ React.createElement("p", null, "The corsairing economy that generated this captive population was circular and self-reinforcing. Corsair galleys \u2014 powered by enslaved oarsmen \u2014 raided Ottoman and North African shipping. Captured cargo funded the Order's treasury and its fortification programme. Captured people were quarantined at the Lazzaretto on Manoel Island for up to forty days, triaged by sex, age, and physical condition, and distributed: the strongest males went to the galleys, others to construction or domestic service. Those captured by the Order's ships became state property; those taken by licensed privateers were auctioned at the slave market in Piazza San Giorgio, directly in front of the Grandmaster's Palace. By 1635, Wettinger documented up to 600 enslaved individuals working as artisans or labourers in Valletta and Senglea alone. The Slaves' Prison \u2014 the Bagno \u2014 on St Ursula Street housed approximately 900 inmates and contained, within its walls, a mosque, two Christian chapels, a tavern, a barber, a tailor, and a courtyard market specialising in Levantine goods. It was a walled city within a walled city."), /* @__PURE__ */ React.createElement(Fig, { caption: /* @__PURE__ */ React.createElement(React.Fragment, null, /* @__PURE__ */ React.createElement("strong", null, "The demographic arc."), " Estimated slave population from the Knights' arrival to Napoleon's liberation. The 280-rower-per-galley requirement for the Order's three-vessel fleet alone demanded a minimum baseline of 840 at-sea rowers, before accounting for land-based labour. Attrition-rate analysis (Wettinger 2002) provides the primary demographic methodology; archival gaps before 1580 are significant.") }, /* @__PURE__ */ React.createElement(PopSVG, null)), /* @__PURE__ */ React.createElement(Side, { title: "Sidebar 2: The 1749 Revolt \u2014 Forensic Reconstruction" }, /* @__PURE__ */ React.createElement("p", { style: sp }, "The 1749 conspiracy represents the most extensively documented slave revolt attempt in Hospitaller Malta, and its forensic record survives in the trial transcripts of the Gran Corte della Castellania. Mustafa, Pasha of Rhodes \u2014 an Ottoman official captured when Christian slaves seized the Ottoman flagship Lupa in February 1748 \u2014 coordinated a network of approximately 150 conspirators across multiple sites: the Slaves' Prison, the Grandmaster's Palace guard (where the Persian neophyte Antonio de Viguier served), and the three galleys of the Order's fleet, where galley slaves had been supplied with arsenic to poison the knights at sea. The target date \u2014 29 June 1749, the feast of Saints Peter and Paul \u2014 was chosen because Grand Master Pinto would be hosting a banquet, concentrating the leadership in one location. The plan included simultaneous poisonings at the Palace and the auberges, assassination of the Grand Master, seizure of Fort St Elmo's armouries, and a signal to an Ottoman corsair ship offshore. The plot was exposed on 6 June when conspirators assaulted Giacomo Cassar, a guard of Armenian origin, in a coffeehouse on Strada Fontana. Giuseppe Cohen, the shop owner \u2014 a Jewish neophyte \u2014 reported to Pinto. The subsequent repression: 150 arrested, interrogation under torture, 35 executed (hanged, quartered, beheaded), 3 died in custody, 72 condemned to the galleys, 8 branded with R (ribelli) on their foreheads. Mustafa, protected by French diplomacy, was exiled to Rhodes in 1751.")), /* @__PURE__ */ React.createElement(Side, { title: "Sidebar 3: The 2026 Paris Exhibition" }, /* @__PURE__ */ React.createElement("p", { style: sp }, `In March 2026, the Institut du monde arabe in Paris opened "Mediterranean Slavery: 17th\u201318th Centuries," co-curated by Meredith Martin (NYU) and Gillian Weiss \u2014 the first major museum exhibition dedicated to the history and representation of enslaved Muslims in Mediterranean Europe. The exhibition focuses on France, Italy, and Malta, featuring objects including a life drawing of an enslaved Muslim by Charles Le Brun (Louis XIV's chief painter), paintings depicting the 1749 Malta revolt, an album of drawings by Fabroni showing galley slaves at work and at rest, naval weapons, talismans, and letters written by Muslim and Christian captives. A new contemporary artwork by Kevork Mourad, Suspended in Time, addresses the erasure of this history following France's capture of Algiers in 1830. The exhibition's significance lies in its demonstration that Mediterranean galley slavery was not a footnote to the Atlantic slave trade but a parallel, contemporaneous, and in the sixteenth and seventeenth centuries actually larger system \u2014 one whose material and cultural traces are only now being systematically documented through the kind of convergent archaeological methodology Palmer advocates.`)), /* @__PURE__ */ React.createElement(SB, null), /* @__PURE__ */ React.createElement("p", null, "The scientific uncertainty in this field centres on scale. Wettinger acknowledged significant archival gaps before 1580, and the Ottoman archives \u2014 which would contain the other side of the ledger, records of the captives' origins, families, and communities \u2014 are in poor condition for this period. Michel Fontenay's 2001 analysis in Quaderni Storici estimated the Maltese slave market's throughput but noted that Mediterranean slave-trade figures for the sixteenth century remain imprecise, in contrast to the relatively well-documented Atlantic trade. The archaeological evidence is also partial: the Slaves' Prison was demolished in the nineteenth century, and no systematic excavation of its site has been conducted. Palmer's graffiti analysis, the CMPHP's photogrammetric documentation, and the ongoing Malta Ship Graffiti Project are generating new data, but the bioarchaeological programme \u2014 the osteological analysis of identified galley-rower remains that could confirm the musculoskeletal stress hypothesis \u2014 remains a future research agenda, not a completed study."), /* @__PURE__ */ React.createElement("p", null, "What is not uncertain is the structure. The archival, material, and archaeological evidence converges on a single model: a corsairing economy in which the capture, sale, and forced labour of predominantly Muslim and Jewish individuals \u2014 with a notable minority of Christians \u2014 financed the construction and maintenance of the fortifications, powered the galleys that conducted further raids, and sustained a domestic service sector that extended from the Grandmaster's Palace to the countryside. The system operated for 268 years. It left its signature in globigerina limestone, in Ottoman coffee cups buried beneath Valletta's streets, in ship graffiti carved into detention walls by people who had been rowed to their captivity on the same kind of vessel they drew, and in the archival silence of a UNESCO World Heritage Site where no plaque, no memorial, and no interpretive programme acknowledges the labour that built it. The stones of Valletta are soft when quarried and harden with exposure to air. The history they contain is following the opposite trajectory \u2014 soft for centuries, hardening now under the pressure of archaeological inquiry, archival reconstruction, and a Paris exhibition that asks the Mediterranean to look at what its fortified cities were built from, and by whom.")), /* @__PURE__ */ React.createElement("div", { className: "sn" }, /* @__PURE__ */ React.createElement("h3", null, "Source Integrity Note"), /* @__PURE__ */ React.createElement("div", { className: "ss" }, /* @__PURE__ */ React.createElement("div", { className: "st" }, "Claims Requiring Verification"), /* @__PURE__ */ React.createElement("ul", null, /* @__PURE__ */ React.createElement("li", null, "20,000 Mediterranean rowers in peacetime (Davis 2007) \u2014 widely cited; original methodology needs independent demographic review"), /* @__PURE__ */ React.createElement("li", null, "8,000 enslaved in Malta by mid-18th century \u2014 Wettinger's estimate from attrition analysis; no independent census confirmation"), /* @__PURE__ */ React.createElement("li", null, "Bagno capacity (~900) \u2014 from Wettinger (2002) and 1633 plan; no archaeological confirmation (building demolished)"), /* @__PURE__ */ React.createElement("li", null, "Musculoskeletal stress in galley-rower skeletal remains \u2014 methodologically sound (Martin 2008) but no systematic Maltese study published"))), /* @__PURE__ */ React.createElement("div", { className: "ss" }, /* @__PURE__ */ React.createElement("div", { className: "st" }, "Principal Sources"), /* @__PURE__ */ React.createElement("ul", null, /* @__PURE__ */ React.createElement("li", null, "Palmer, R. (2021). Antiquity 95(383):1280\u20131297 \u2014 captivity as archaeological process"), /* @__PURE__ */ React.createElement("li", null, "Palmer, R. (2021). Captives, Colonists and Craftspeople. Berghahn Books."), /* @__PURE__ */ React.createElement("li", null, "Wettinger, G. (2002). Slavery in the Islands of Malta and Gozo ca. 1000\u20131812. Malta: PEG."), /* @__PURE__ */ React.createElement("li", null, "Gambin, T. & Kassulke, M. (2023). Historical Archaeology 57:1162\u20131176 \u2014 ship graffiti"), /* @__PURE__ */ React.c
