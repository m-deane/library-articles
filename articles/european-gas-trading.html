ust \u20AC1.80, had been widening for three days. By the time the trader had booked interruptible capacity on the BBL interconnector and executed a simultaneous buy at NBP and sell at TTF, the window had already begun to close. Within four hours, algorithmic systems at three competing trading houses had noticed the same signal and arbitraged the spread back to its typical range of \u20AC0.40."), /* @__PURE__ */ React.createElement(Para, null, 'This is the world of European gas location spread trading \u2014 a discipline that sits at the intersection of physical infrastructure and financial engineering, where the price of moving a molecule from one virtual trading point to another is determined not by the distance it must travel but by the capacity available to carry it, the regulatory tariffs imposed at each border, and the willingness of hundreds of competing market participants to bet on which direction the differential will move next. It is, in the words of Patrick Heather, the Senior Research Fellow at the Oxford Institute for Energy Studies who has tracked the development of European gas hubs for over a decade, a market that has <em>"rebalanced"</em> after the most turbulent period in its history \u2014 but one whose rebalancing has revealed entirely new patterns of opportunity.'), /* @__PURE__ */ React.createElement(Para, null, "To understand location spreads is to understand the plumbing of Europe itself. The continent's gas network is not a single unified system but a patchwork of national transmission grids, each operated by its own Transmission System Operator, connected at cross-border interconnection points where capacity must be booked, paid for, and scheduled. Every border crossing introduces friction. Every unit of friction creates a price differential. Every persistent differential is, to a trader, a signal \u2014 and the question that now consumes an entire industry of quantitative analysts, portfolio optimisers, and machine learning engineers is whether those signals can be read, predicted, and exploited faster than the market can arbitrage them away."), /* @__PURE__ */ React.createElement(PullQuote, { text: "The TTF is far and away the leading European traded gas hub \u2014 its volumes are now nearly five times greater than all the other hubs reviewed put together." }), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "The architecture of a European gas location spread begins with the entry-exit system \u2014 the regulatory framework that governs how gas moves between market areas. Under EU Regulation 2009/715, subsequently refined through the Capacity Allocation Mechanism network code, anyone wishing to transport gas into or out of a market area must book entry and exit capacities at explicit auctions, paying corresponding tariffs. This system, administered by ENTSOG \u2014 the European Network of Transmission System Operators for Gas, founded in 2009 \u2014 replaced the older point-to-point contract path model with a more flexible arrangement that treats each national grid as a single zone. Gas enters through an entry point, joins the virtual pool, and exits at an exit point. The price of gas at the virtual trading point in each zone reflects the balance of supply and demand within that zone."), /* @__PURE__ */ React.createElement(Para, null, "The spread between any two hubs \u2014 say, the Dutch TTF and the German Trading Hub Europe (THE) \u2014 is therefore a composite of several components: the tariff cost of exiting the Dutch system, the tariff cost of entering the German system, the physical capacity available at the interconnection point, and the supply-demand balance within each zone. When pipeline capacity is abundant and both systems are well supplied, the spread narrows toward the bare transport cost. When capacity is constrained \u2014 because a compressor station is under maintenance, because an unexpected cold snap has increased withdrawals from German storage, because an LNG cargo that was expected at Rotterdam has been diverted to Asia \u2014 the spread widens, sometimes dramatically."), /* @__PURE__ */ React.createElement(ChartTitle, null, "Month-Ahead Basis Spreads: TTF vs. European Hubs, 2022\u20132024"), /* @__PURE__ */ React.createElement(ResponsiveContainer, { width: "100%", height: 300 }, /* @__PURE__ */ React.createElement(LineChart, { data: hubSpreadData, margin: { top: 10, right: 20, left: 0, bottom: 0 } }, /* @__PURE__ */ React.createElement(CartesianGrid, { strokeDasharray: "3 3", stroke: COLORS.borderLight }), /* @__PURE__ */ React.createElement(XAxis, { dataKey: "month", tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray } }), /* @__PURE__ */ React.createElement(YAxis, { tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray }, label: { value: "\u20AC/MWh", angle: -90, position: "insideLeft", style: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.warmGray } } }), /* @__PURE__ */ React.createElement(Tooltip, null), /* @__PURE__ */ React.createElement(Legend, { wrapperStyle: { fontSize: 11, fontFamily: FONTS.sans } }), /* @__PURE__ */ React.createElement(ReferenceLine, { y: 0, stroke: COLORS.warmGray, strokeDasharray: "3 3" }), /* @__PURE__ */ React.createElement(Line, { type: "monotone", dataKey: "TTF_TRF", name: "TTF\u2013TRF (France)", stroke: "#e87d3e", strokeWidth: 2, dot: false }), /* @__PURE__ */ React.createElement(Line, { type: "monotone", dataKey: "TTF_THE", name: "TTF\u2013THE (Germany)", stroke: "#3a9bdc", strokeWidth: 2, dot: false }), /* @__PURE__ */ React.createElement(Line, { type: "monotone", dataKey: "TTF_PSV", name: "TTF\u2013PSV (Italy)", stroke: "#9b59b6", strokeWidth: 2, dot: false }))), /* @__PURE__ */ React.createElement(ChartSource, null, "Source: ICIS, Oxford Institute for Energy Studies (Heather, 2024). Positive values indicate TTF premium over the regional hub."), /* @__PURE__ */ React.createElement(ChartCaption, { label: "Data", text: "The 2022 energy crisis blew European hub spreads to unprecedented levels \u2014 the TTF\u2013PSV spread exceeded \u20AC15/MWh in July 2022, driven by infrastructure constraints. By mid-2023, spreads had largely rebalanced to pre-crisis norms." }), /* @__PURE__ */ React.createElement(Sidebar, { title: "The Five Key Elements", children: `Patrick Heather's methodology for assessing the maturity of European gas hubs evaluates five dimensions: the number of active market participants, the range of traded products (from day-ahead through to multi-year forwards and options), total traded volumes, the churn ratio (traded volume divided by physical consumption \u2014 a measure of financial liquidity above and beyond physical needs), and the bid-offer spread on screen-traded products. By 2024, only one hub \u2014 the Dutch TTF \u2014 scored in the highest category across all five elements. The TTF's churn ratio reached 20.3 times in 2024, meaning that for every unit of gas physically consumed, the equivalent volume changed hands more than twenty times on the trading market. The British NBP, once Europe's dominant hub, has seen its churn decline and now functions as an active regional hub for the British Isles rather than a continental benchmark.` }), /* @__PURE__ */ React.createElement(Para, null, "The turbulence of 2022 demonstrated just how violent these spreads can become. When Russia cut pipeline flows through Nord Stream and the Yamal corridor, the supply shock did not propagate evenly across Europe. Countries with large LNG import capacity \u2014 the Netherlands, France, Belgium \u2014 could substitute seaborne cargoes for lost pipeline volumes, but at a cost: their hubs were flooded with gas that had to be regasified and pushed into the grid, while landlocked countries further east faced physical shortages. The TTF-to-TRF spread (the Netherlands versus France), which had historically hovered near zero or slightly negative, went sharply positive in 2022 as enormous LNG volumes poured into French terminals. The TTF-to-PSV spread (the Netherlands versus Italy) blew out to over \u20AC15 per megawatt hour in the summer of 2022, reflecting the bottleneck of moving gas across the Alps when every pipeline was running at capacity."), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "To navigate this market requires first understanding its geography. Europe now has more than twenty gas trading hubs, though they vary enormously in maturity. The landscape, as mapped by Heather in his annual surveys for the Oxford Institute, resembles a solar system: the TTF is the sun, the NBP a large planet, and everything else orbits at varying distances. The German THE, formed in October 2021 from the merger of the former NCG and GASPOOL zones, has grown rapidly \u2014 EEX Group reported that German THE spot market volumes rose 25 percent in 2025 alone. The French TRF and Italian PSV are classified as <em>active</em> hubs, capable of pricing local supply and demand but lacking the forward curve depth for sophisticated risk management. The Austrian VTP, Spanish PVB, and Belgian ZTP are <em>poor</em> hubs \u2014 functional for balancing but thinly traded. Beyond these lie the <em>nascent</em> hubs: Slovenia, Croatia, Serbia, Moldova, each with a virtual trading point but virtually no speculative or curve trading."), /* @__PURE__ */ React.createElement(ChartTitle, null, "TTF Total Traded Volumes, 2015\u20132024"), /* @__PURE__ */ React.createElement(ResponsiveContainer, { width: "100%", height: 280 }, /* @__PURE__ */ React.createElement(BarChart, { data: ttfVolumesData, margin: { top: 10, right: 20, left: 0, bottom: 0 } }, /* @__PURE__ */ React.createElement(CartesianGrid, { strokeDasharray: "3 3", stroke: COLORS.borderLight }), /* @__PURE__ */ React.createElement(XAxis, { dataKey: "year", tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray } }), /* @__PURE__ */ React.createElement(YAxis, { tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray }, label: { value: "TWh", angle: -90, position: "insideLeft", style: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.warmGray } } }), /* @__PURE__ */ React.createElement(Tooltip, { formatter: (v) => `${v.toLocaleString()} TWh` }), /* @__PURE__ */ React.createElement(Bar, { dataKey: "volume", name: "TTF Traded Volume", fill: COLORS.natgeoYellow, radius: [3, 3, 0, 0] }))), /* @__PURE__ */ React.createElement(ChartSource, null, "Source: OIES (Heather, 2020\u20132025), LEBA, ICE-Endex, PEGAS. Includes OTC and exchange volumes across all products."), /* @__PURE__ */ React.createElement(ChartCaption, { label: "Data", text: "TTF traded volumes have grown near-exponentially since 2014. By 2024, TTF volumes exceeded 66,000 TWh \u2014 nearly five times greater than all other European hubs combined." }), /* @__PURE__ */ React.createElement(Para, null, "The hierarchy matters because it determines where a location spread can be practically traded. A spread between TTF and THE has deep liquidity on both sides: a trader can buy a month-ahead contract at THE on the EEX exchange and sell the equivalent at TTF on ICE-Endex, constructing a clean basis position. A spread between TTF and the Austrian VTP is harder to execute because VTP liquidity is thin \u2014 the bid-offer spread is wider, the available contract months are fewer, and the risk of being unable to exit the position at a fair price is correspondingly greater. A spread between TTF and the Croatian virtual trading point is virtually untradeable in the financial markets, even though a physical price differential exists."), /* @__PURE__ */ React.createElement(Para, null, "This liquidity gradient creates a paradox that lies at the heart of location spread trading: the most liquid spreads \u2014 TTF versus THE, TTF versus NBP \u2014 are also the most efficiently priced, meaning that the opportunities for sustained excess return are smallest. The widest and most persistent mispricings occur at the periphery of the network \u2014 TTF versus PSV, TTF versus PVB, or even within-country spreads at specific physical delivery points \u2014 but these are precisely the markets where execution is most difficult and transaction costs are highest. The skill of the trader is to identify which spreads offer a favourable ratio of expected return to execution risk, and to hold those positions through the noise of daily price movements until the underlying fundamental signal materialises."), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "The practical mechanics of trading a pipeline location spread in Europe involve three distinct layers: the physical layer, the financial layer, and the capacity layer. Miss any one of the three and the trade collapses."), /* @__PURE__ */ React.createElement(Para, null, "In the <em>financial layer</em>, the trader establishes opposing positions at two hubs \u2014 buying at the hub expected to become relatively cheaper and selling at the hub expected to become relatively more expensive. Month-ahead contracts are the most commonly traded instrument for this purpose, as Heather's research confirms, because the month-ahead is the contract most used to price underlying physical gas supply agreements and therefore attracts the deepest liquidity from both physical hedgers and financial speculators. But spreads can also be traded on a day-ahead, weekend, quarter-ahead, or even season-ahead basis, depending on the nature of the signal being exploited."), /* @__PURE__ */ React.createElement(Para, null, "The <em>capacity layer</em> is what makes European gas spread trading fundamentally different from, say, crude oil location spreads. To physically arbitrage a price differential between two hubs, a trader must hold transportation capacity at the relevant interconnection point. Under the EU Capacity Allocation Mechanism, this capacity is auctioned at the cross-border point by the adjoining TSOs \u2014 typically through the PRISMA platform \u2014 in products ranging from annual firm capacity (booked a year in advance) to within-day interruptible capacity (booked hours before the flow). The tariff paid for this capacity is a critical input to the spread trade's economics. Research by \xC7am and Lencz, published in <em>Energy Economics</em>, demonstrated that the EU's multiplier system \u2014 which sets the price of short-term capacity as a multiple of the annual tariff \u2014 was originally designed to incentivise long-term bookings but had the unintended effect of preventing arbitrageurs from exploiting short-term regional price spreads without committing to a full year of capacity."), /* @__PURE__ */ React.createElement(Sidebar, { title: "Intrinsic vs. Extrinsic Value", children: `The gas trading industry distinguishes two forms of optionality value. <em>Intrinsic value</em> is the profit available by optimising an asset (a storage facility, a swing contract, a transportation booking) against the currently observable forward curve \u2014 buying summer and selling winter at today's prices. <em>Extrinsic value</em> is the additional profit available from the <em>optionality</em> to re-optimise as prices change. The industry standard for monetising both is the <em>rolling intrinsic</em> strategy, pioneered and extensively modelled by Timera Energy, a London-based consultancy whose storage optimisation model has been used to support multiple gas storage investments across Europe. Under this strategy, the trader locks in observable forward spreads and then adjusts positions only when doing so is risk-free \u2014 capturing extrinsic value incrementally without exposing the position to downside. Timera's backtesting of a generic 180-day-cycle TTF storage asset showed returns of roughly \u20AC7.50/MWh in storage year 2024, down from crisis peaks but still at least double pre-2020 levels.` }), /* @__PURE__ */ React.createElement(Para, null, "The <em>physical layer</em> closes the loop. A trader who holds capacity and has established a financial spread can choose to physically flow gas across the border, nominating volumes through the TSO's scheduling system. In practice, most location spread traders operate in the financial layer alone \u2014 buying and selling contracts at the two hubs without moving physical gas \u2014 and rely on the <em>physical arbitrageurs</em> (typically large portfolio players like Vitol, Gunvor, Trafigura, or the trading arms of major utilities like RWE, Shell, and TotalEnergies) to enforce the physical convergence that keeps spreads tethered to transport costs. When the financial spread exceeds the cost of physical transport plus capacity, these players flow gas across the border until the arbitrage is closed."), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "If location spreads exploit differences in price across <em>space</em>, the closely related discipline of storage trading exploits differences across <em>time</em>. The two are inseparable in practice, because the same infrastructure \u2014 pipelines, compression stations, and underground caverns \u2014 mediates both. Europe's underground gas storage facilities, with a total working capacity of roughly 1,100 terawatt-hours spread across depleted gas fields, aquifers, and salt caverns from the Netherlands to Ukraine, function as the continent's shock absorber: gas is injected during the warmer months when demand is lower and prices are typically cheaper, then withdrawn during winter when heating demand pushes prices higher."), /* @__PURE__ */ React.createElement(ChartTitle, null, "European Gas Storage Fill Levels (% of Working Volume)"), /* @__PURE__ */ React.createElement(ResponsiveContainer, { width: "100%", height: 280 }, /* @__PURE__ */ React.createElement(LineChart, { data: storageFillData, margin: { top: 10, right: 20, left: 0, bottom: 0 } }, /* @__PURE__ */ React.createElement(CartesianGrid, { strokeDasharray: "3 3", stroke: COLORS.borderLight }), /* @__PURE__ */ React.createElement(XAxis, { dataKey: "month", tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray } }), /* @__PURE__ */ React.createElement(YAxis, { domain: [20, 100], tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray }, label: { value: "%", angle: -90, position: "insideLeft", style: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.warmGray } } }), /* @__PURE__ */ React.createElement(Tooltip, null), /* @__PURE__ */ React.createElement(Legend, { wrapperStyle: { fontSize: 11, fontFamily: FONTS.sans } }), /* @__PURE__ */ React.createElement(ReferenceLine, { y: 90, stroke: "#e74c3c", strokeDasharray: "5 5", label: { value: "EU 90% mandate", position: "right", style: { fontSize: 10, fontFamily: FONTS.sans, fill: "#e74c3c" } } }), /* @__PURE__ */ React.createElement(Line, { type: "monotone", dataKey: "y2022", name: "2022\u201323", stroke: "#8A8278", strokeWidth: 1.5, dot: false }), /* @__PURE__ */ React.createElement(Line, { type: "monotone", dataKey: "y2023", name: "2023\u201324", stroke: "#3a9bdc", strokeWidth: 1.5, dot: false }), /* @__PURE__ */ React.createElement(Line, { type: "monotone", dataKey: "y2024", name: "2024\u201325", stroke: "#e87d3e", strokeWidth: 2, dot: false }), /* @__PURE__ */ React.createElement(Line, { type: "monotone", dataKey: "y2025", name: "2025\u201326", stroke: "#1a1a1a", strokeWidth: 2, dot: false, connectNulls: false }))), /* @__PURE__ */ React.createElement(ChartSource, null, "Source: GIE AGSI+. Mandate line reflects EU Gas Storage Regulation (EU/2022/1032) requiring 90% fill by 1 November."), /* @__PURE__ */ React.createElement(ChartCaption, { label: "Data", text: "The 2025\u201326 cycle began from a weaker starting position, with storage dropping below 30% by late February 2026. The EU's 90% mandate, extended through 2027 though under discussion for reduction to 83%, creates a regulatory floor beneath summer injection demand \u2014 and therefore beneath the summer-winter spread." }), /* @__PURE__ */ React.createElement(Para, null, "The traditional business model of storage \u2014 buy summer, sell winter, pocket the spread minus costs \u2014 has been under pressure since 2024. The summer-winter spread on TTF, which reached \u20AC3.16/MWh in 2023 and was sufficient to incentivise profitable injections across most European facilities, narrowed to an average of just \u20AC1.42/MWh for the 2025 summer-winter period. Industry consensus, as reported by the energy market analysis firm Elenger and independently by the European Gas Hub research platform, is that a spread of at least \u20AC2.50\u20133.00/MWh is needed to cover the full costs of storage operations \u2014 injection, cushion gas financing, working capital, and the opportunity cost of capital tied up in inventory."), /* @__PURE__ */ React.createElement(Para, null, "Yet many operators continued injecting even below breakeven, because their long-term storage agreements treat reservation fees as sunk costs. As Elenger's Q2 2025 market review documented, injection decisions were often made by comparing the spread only against financing costs \u2014 roughly \u20AC1/MWh \u2014 making injections economically viable on a marginal basis even when the absolute spread was too narrow to cover full-cycle costs. The EU's Gas Storage Regulation, which mandates that Member States fill storage to at least 90 percent of capacity by 1 November (a target extended through 2027 and under discussion for reduction to 83 percent), creates a regulatory floor beneath summer injection demand that overrides pure market economics."), /* @__PURE__ */ React.createElement(ChartTitle, null, "Gas Storage Value Capture: Intrinsic vs. Extrinsic (\u20AC/MWh, TTF 180-Day Asset)"), /* @__PURE__ */ React.createElement(ResponsiveContainer, { width: "100%", height: 280 }, /* @__PURE__ */ React.createElement(BarChart, { data: storageValueData, margin: { top: 10, right: 20, left: 0, bottom: 0 } }, /* @__PURE__ */ React.createElement(CartesianGrid, { strokeDasharray: "3 3", stroke: COLORS.borderLight }), /* @__PURE__ */ React.createElement(XAxis, { dataKey: "year", tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray } }), /* @__PURE__ */ React.createElement(YAxis, { tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray }, label: { value: "\u20AC/MWh", angle: -90, position: "insideLeft", style: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.warmGray } } }), /* @__PURE__ */ React.createElement(Tooltip, null), /* @__PURE__ */ React.createElement(Legend, { wrapperStyle: { fontSize: 11, fontFamily: FONTS.sans } }), /* @__PURE__ */ React.createElement(Bar, { dataKey: "intrinsic", name: "Intrinsic Value", stackId: "a", fill: COLORS.natgeoYellow }), /* @__PURE__ */ React.createElement(Bar, { dataKey: "extrinsic", name: "Extrinsic Value", stackId: "a", fill: "#3a9bdc", radius: [3, 3, 0, 0] }))), /* @__PURE__ */ React.createElement(ChartSource, null, "Source: Timera Energy gas storage optimisation model (rolling intrinsic backtest). Storage years run April to March."), /* @__PURE__ */ React.createElement(ChartCaption, { label: "Data", text: "The energy crisis of 2021\u201322 saw total storage value surge tenfold above pre-crisis levels, driven overwhelmingly by extrinsic value \u2014 the ability to re-optimise positions against volatile prompt price spreads. Post-crisis, extrinsic value has eased but remains structurally above pre-2020 norms." }), /* @__PURE__ */ React.createElement(Sidebar, { title: "The Rolling Intrinsic Strategy", children: `The dominant optimisation framework for gas storage and swing contracts in Europe is the <em>rolling intrinsic</em> strategy. The trader begins by hedging the maximum available summer-winter spread on the forward curve \u2014 for a 180-day-cycle facility, this means selling winter contracts and buying summer contracts at observed prices. As time passes and the forward curve evolves, the trader <em>rolls</em> \u2014 adjusting positions only when the adjustment is risk-free, meaning the new spread exceeds the old by more than the transaction cost. Timera Energy's widely used storage model formalises this approach as a simulation: for each day of the storage year, the model evaluates all available forward prices, identifies profitable adjustments to the hedge, and records the cumulative margin. The result is a distinctive asymmetric return distribution: downside is floored at the initial intrinsic hedge, while upside depends on the volatility and de-correlation of forward contract prices \u2014 what Timera calls the <em>under-estimated</em> driver of storage value.` }), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "The structural transformation of European gas supply is the force that has reshaped every spread, every storage position, and every trading signal on the continent. Before 2022, roughly 40 percent of Europe's gas arrived through pipelines from Russia \u2014 via the Yamal corridor through Belarus and Poland, the Nord Stream pipelines under the Baltic Sea, the transit system through Ukraine, and TurkStream through Turkey and the Balkans. By 2024, Russian pipeline flows to the EU had collapsed to roughly 15 billion cubic metres, a fraction of the pre-crisis level. The transit agreement through Ukraine expired on 31 December 2024 and was not renewed. The EU has adopted legislation to phase out remaining Russian pipeline gas imports by September 2027 and LNG imports by January 2027."), /* @__PURE__ */ React.createElement(ChartTitle, null, "EU Gas Import Sources by Corridor (bcm/year)"), /* @__PURE__ */ React.createElement(ResponsiveContainer, { width: "100%", height: 300 }, /* @__PURE__ */ React.createElement(BarChart, { data: pipelineFlowData, margin: { top: 10, right: 20, left: 0, bottom: 0 } }, /* @__PURE__ */ React.createElement(CartesianGrid, { strokeDasharray: "3 3", stroke: COLORS.borderLight }), /* @__PURE__ */ React.createElement(XAxis, { dataKey: "year", tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray } }), /* @__PURE__ */ React.createElement(YAxis, { tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray }, label: { value: "bcm", angle: -90, position: "insideLeft", style: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.warmGray } } }), /* @__PURE__ */ React.createElement(Tooltip, null), /* @__PURE__ */ React.createElement(Legend, { wrapperStyle: { fontSize: 11, fontFamily: FONTS.sans } }), /* @__PURE__ */ React.createElement(Bar, { dataKey: "russia", name: "Russia (pipeline)", stackId: "a", fill: "#c0392b" }), /* @__PURE__ */ React.createElement(Bar, { dataKey: "norway", name: "Norway (North Sea)", stackId: "a", fill: "#2980b9" }), /* @__PURE__ */ React.createElement(Bar, { dataKey: "lng", name: "LNG (global)", stackId: "a", fill: "#27ae60" }), /* @__PURE__ */ React.createElement(Bar, { dataKey: "northAfrica", name: "North Africa", stackId: "a", fill: "#f39c12", radius: [3, 3, 0, 0] }))), /* @__PURE__ */ React.createElement(ChartSource, null, "Source: Bruegel European Natural Gas Imports dataset, ENTSOG Transparency Platform, IEA Gas Trade Flows."), /* @__PURE__ */ React.createElement(ChartCaption, { label: "Data", text: "The collapse of Russian pipeline gas \u2014 from 170 bcm in 2019 to roughly 10 bcm in 2025 \u2014 has been replaced primarily by LNG, fundamentally altering the geography of European gas pricing and the direction of pipeline flows." }), /* @__PURE__ */ React.createElement(Para, null, "The replacement of pipeline gas with LNG has inverted the traditional flow pattern of the European grid. Gas that once entered from the east \u2014 through interconnection points in the Baumgarten hub in Austria, the Mallnow compressor station on the German-Polish border, the Uzhgorod metering station in Ukraine \u2014 now enters primarily from the west and north: through LNG regasification terminals in the Netherlands (GATE at Rotterdam, the new Eemshaven FSRU), Belgium (Zeebrugge), France (Dunkerque, Montoir, Fos-sur-Mer), Spain (six terminals from Barcelona to Huelva), and the rapidly built German FSRUs at Wilhelmshaven, Brunsb\xFCttel, and Lubmin. This means that the <em>direction</em> of spread signals has changed: before 2022, gas typically flowed west-to-east, with TTF priced at a discount to eastern hubs that reflected the transport cost from the source; now gas flows east-from-west, with TTF often priced at a premium to peripheral hubs that can source cheaper LNG locally."), /* @__PURE__ */ React.createElement(Sidebar, { title: "ENTSOG: The Data Backbone", children: `The European Network of Transmission System Operators for Gas, founded in 2009, provides the data infrastructure that underpins all European gas trading. Its Transparency Platform publishes real-time and historical data on physical gas flows, capacity bookings, congestion, and planned maintenance at every cross-border interconnection point across 31 participating countries. The spatial and temporal granularity is remarkable: researchers can track flows at individual pipeline interconnectors rather than aggregated national borders, allowing them to distinguish, for example, between gas flowing through the Czech system via the dedicated Gazelle transit pipeline versus gas entering the national transmission grid. The ENTSOG-GIE System Capacity Map, published jointly with Gas Infrastructure Europe and updated in its latest 2026 edition to include Ukraine and Moldova, has become what GIE Secretary General Lucie Boost described as a tool that <em>"can say more than a thousand words"</em> \u2014 a comprehensive picture of European gas infrastructure serving policymakers, traders, and researchers alike.` }), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "The question of whether machine learning can improve gas price forecasting \u2014 and by extension, trading signals \u2014 has produced a substantial body of academic literature over the past five years, accelerated by both the availability of high-frequency data and the extreme volatility of the 2021\u201322 crisis. The landscape of published research reveals a clear hierarchy of model performance, though with important caveats about the gap between academic backtests and live trading."), /* @__PURE__ */ React.createElement(Para, null, "At the foundation are the classical econometric models: autoregressive integrated moving averages (ARIMA) and vector autoregressive (VAR) specifications, including the Diebold-Yilmaz connectedness framework that has been applied to measure time-varying spillovers between European gas hubs. A 2022 study in <em>Energy Economics</em> by researchers examining four major European markets \u2014 TTF, NBP, NCG, and PSV \u2014 using a time-varying parameters VAR model with stochastic volatility demonstrated that the European gas market had become increasingly integrated, with TTF and the German NCG (now THE) acting as the primary net transmitters of price and volatility shocks. Critically, the study showed that the position of the British NBP had decreased as a shock transmitter while the Italian PSV had gained importance \u2014 a finding that aligned with the physical reality of growing LNG imports through southern European terminals and the commissioning of the Trans-Adriatic Pipeline from Azerbaijan."), /* @__PURE__ */ React.createElement(ChartTitle, null, "Natural Gas Price Forecasting: Model Performance Comparison (MAPE, %)"), /* @__PURE__ */ React.createElement(ResponsiveContainer, { width: "100%", height: 300 }, /* @__PURE__ */ React.createElement(BarChart, { data: mlPerformanceData, layout: "vertical", margin: { top: 10, right: 30, left: 100, bottom: 0 } }, /* @__PURE__ */ React.createElement(CartesianGrid, { strokeDasharray: "3 3", stroke: COLORS.borderLight }), /* @__PURE__ */ React.createElement(XAxis, { type: "number", tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray }, label: { value: "MAPE (%)", position: "insideBottom", style: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.warmGray } } }), /* @__PURE__ */ React.createElement(YAxis, { dataKey: "model", type: "category", tick: { fontSize: 11, fontFamily: FONTS.sans, fill: COLORS.darkGray }, width: 120 }), /* @__PURE__ */ React.createElement(Tooltip, { formatter: (v) => `${v}%` }), /* @__PURE__ */ React.createElement(Bar, { dataKey: "mape", name: "Mean Absolute % Error", fill: "#3a9bdc", radius: [0, 3, 3, 0] }))), /* @__PURE__ */ React.createElement(ChartSource, null, "Source: Composite from published research \u2014 Mouchtaris et al. (Energies, 2021), PMC 7256398 (2020), PMC 12668636 (2025), MDPI Energies 18/19 (2025). Henry Hub benchmarks; European TTF studies show comparable patterns."), /* @__PURE__ */ React.createElement(ChartCaption, { label: "Data", text: "Hybrid deep learning architectures consistently outperform traditional models. The VMD-CNN-BiLSTM-Attention framework achieves MAPE of roughly 3.5% at four-step-ahead horizons \u2014 but all models show degrading accuracy as the prediction horizon extends, reflecting the fundamental unpredictability of supply shocks and geopolitical events." }), /* @__PURE__ */ React.createElement(Para, null, "The machine learning frontier has moved rapidly beyond single models. A 2025 study published in <em>PLOS ONE</em> systematically compared feedforward neural networks, support vector machines, random forests, and LSTM networks on Henry Hub daily prices from 1997 to 2024, finding that LSTM achieved the lowest one-step-ahead mean absolute percentage error at 8.53 percent. But the most impressive results have come from hybrid architectures: CNN-BiLSTM-Attention models that combine convolutional layers (for extracting features from the price series) with bidirectional LSTM layers (for capturing both forward and backward temporal dependencies) and attention mechanisms (for weighting which historical observations matter most for the current prediction). A 2025 study in <em>Energies</em> reported R\xB2 values above 95 percent for one-step-ahead forecasts and above 87 percent at longer horizons."), /* @__PURE__ */ React.createElement(Para, null, "The most sophisticated approaches integrate signal decomposition as a preprocessing step. Ensemble Empirical Mode Decomposition (EEMD) and Variational Mode Decomposition (VMD) break the raw price series into multiple Intrinsic Mode Functions \u2014 each representing a different frequency component of the price signal, from the high-frequency noise of daily fluctuations to the low-frequency trend of seasonal and structural price movements. Each decomposed component is then forecast separately using an optimised machine learning model, and the individual forecasts are aggregated. A VMD-CNN-BiLSTM-Attention model applied to NYMEX natural gas futures daily closing prices achieved a four-step forecast MAPE of 3.5 percent or lower and R\xB2 above 98 percent, substantially outperforming non-decomposition approaches."), /* @__PURE__ */ React.createElement(Sidebar, { title: "Feature Engineering for Gas Spreads", children: `Multivariate gas price models have expanded far beyond simple autoregressive inputs. A 2025 study in <em>Petroleum Science</em> identified 16 variables across five dimensions that materially improve natural gas price prediction: production metrics (US output, rig counts), marketing variables (storage inventories, import/export volumes), commodity cross-correlations (crude oil, coal, electricity prices), political/economic indicators (geopolitical risk indices, exchange rates, interest rates), and temperature data. The feature selection process \u2014 using LASSO regression, grey relation analysis, and random forest importance ranking \u2014 was critical: not all variables improve prediction, and including irrelevant features degrades model performance. For European spread trading specifically, the most important features are typically: storage injection/withdrawal rates (from GIE AGSI+), pipeline flow data (from ENTSOG), LNG arrival schedules, weather forecasts, and the TTF forward curve shape.` }), /* @__PURE__ */ React.createElement(Para, null, "Reinforcement learning represents the newest frontier. A comprehensive 2025 review in <em>Energies</em> documented the growing application of RL frameworks \u2014 including Deep Q-Networks, Proximal Policy Optimization, Deep Deterministic Policy Gradient, and Advantage Actor-Critic methods \u2014 to energy trading and real options problems. A 2023 paper by Giorgi and colleagues proposed an RL algorithm for commodity trading that benchmarked against the analytical optimal solution under linear dynamics and quadratic transaction costs, showing that the RL agent could closely replicate the optimal strategy, then outperform it in non-linear settings more representative of real WTI spot prices. The ART-DRL framework, published in 2025 in the <em>Journal of Risk and Financial Management</em>, introduced an adaptive switching mechanism that dynamically selects among competing DRL agents based on real-time performance \u2014 an approach explicitly designed for the non-stationary, regime-shifting nature of energy commodity markets."), /* @__PURE__ */ React.createElement(Para, null, "The application to <em>spread</em> trading specifically \u2014 rather than outright price forecasting \u2014 remains an active research frontier. The theoretical advantage of RL for spread trading is substantial: the agent can learn a policy that simultaneously considers the state of storage inventories, pipeline capacity utilisation, weather forecasts, forward curve shape, and cross-hub correlations, then outputs a continuous action (the size and direction of the spread position) rather than a discrete classification. The challenge is the reward function: in live trading, the relationship between an action taken today and the reward received when the spread converges (or diverges) days or weeks later creates a credit assignment problem that standard supervised learning cannot handle but that RL is architecturally designed to address."), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "For practitioners managing real portfolios \u2014 utilities with physical gas supply obligations, trading houses with storage capacity, LNG importers with regasification slots \u2014 the question is not whether ML can forecast prices but how optimisation frameworks can translate forecasts into actionable trading decisions under constraints. The gas portfolio optimisation problem is fundamentally a stochastic dynamic program: at each decision point, the trader must choose how much gas to inject, withdraw, flow across a border, buy, sell, or leave in the ground, subject to physical constraints (injection rates, withdrawal rates, pipeline capacity, linepack limits), contractual constraints (take-or-pay obligations, storage mandates), and financial constraints (margin requirements, risk limits, collateral availability)."), /* @__PURE__ */ React.createElement(Para, null, "Timera Energy's approach to this problem \u2014 which has become something of an industry standard in European gas markets \u2014 uses the rolling intrinsic strategy as the base layer, supplemented by stochastic modelling for delta hedging when warranted. Their backtest methodology, applied daily across each storage year, evaluates the full set of available forward prices, identifies all profitable adjustments to the existing hedge position, and records the cumulative margin. The result, as their May 2025 analysis showed, is a combination of forward trading (month-ahead trades to lock in seasonal shape) and within-month trades (to capture value from short-term prompt volatility). Storage value capture in 2024 reached approximately \u20AC7.50/MWh for a generic 180-day-cycle TTF asset \u2014 down 38 percent from 2023 but still at least double pre-crisis levels."), /* @__PURE__ */ React.createElement(Para, null, "The three core strategies form a spectrum. At one extreme, <em>spot optimisation</em> \u2014 dispatching the asset purely against current and expected spot prices with no forward hedging \u2014 produces the widest distribution of returns: high expected value but high risk. At the other extreme, <em>static intrinsic</em> \u2014 locking in the observed summer-winter spread at the start of the storage year and holding to maturity \u2014 produces the narrowest distribution: low risk but no access to extrinsic value. Rolling intrinsic sits in between, and its dominance in European markets reflects the industry's collective judgment that the trade-off between additional return and additional risk favours the middle ground."), /* @__PURE__ */ React.createElement(Para, null, "The emerging opportunity is to use ML models not to replace these frameworks but to enhance them at the margin. A price forecast with a MAPE of 3\u20134 percent, if properly calibrated for confidence intervals, can improve the rolling intrinsic strategy in two ways: first, by identifying moments when the probability-weighted expected gain from adjusting a hedge exceeds the threshold that pure backward-looking rules would set; and second, by providing better estimates of forward price volatility and correlation \u2014 the inputs that drive the calculation of extrinsic value and therefore the reservation price at which storage capacity should be offered to the market."), /* @__PURE__ */ React.createElement(Sidebar, { title: "The Capacity Auction Problem", children: `A lesser-known optimisation challenge in European gas trading is the <em>capacity booking</em> decision. At each cross-border interconnection point, capacity is auctioned by the TSOs in products of varying duration: annual firm capacity (auctioned roughly a year in advance), quarterly, monthly, daily, and within-day. The EU multiplier system prices short-term products at a multiple of the annual tariff \u2014 typically 1.5x for quarterly and up to 3x or more for daily capacity. A trader considering a location spread must decide which capacity product to book. Annual capacity is cheapest per unit but commits capital for a year; daily capacity is most flexible but most expensive per unit and may not be available if the interconnection point is congested. The optimisation \u2014 which tenure of capacity to hold, at which points, and how to integrate that capacity cost into the spread trade's expected profitability \u2014 is itself a stochastic programming problem that is well suited to reinforcement learning, though published applications remain scarce.` }), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "The ultimate goal of European gas market liberalisation \u2014 the Gas Target Model promoted by the European Commission \u2014 is price convergence: a state in which gas prices at all European hubs move in lockstep, with the spread between any two hubs reflecting only the physical cost of transportation. Academics have tested this hypothesis using a range of econometric tools. A study by researchers at the Cambridge Judge Business School, published as an Energy Policy Research Group working paper, applied network theory \u2014 specifically time-varying Granger causality networks \u2014 to measure the density and directionality of causal connections between European gas hub prices. Their finding was nuanced: network density (a proxy for integration) varied substantially over time, reaching its highest observation on 29 January 2018 and its lowest on 10 October 2018, suggesting that integration is not a steady state but a dynamic condition that fluctuates with market stress, infrastructure availability, and seasonal demand patterns."), /* @__PURE__ */ React.createElement(Para, null, "The 2022 crisis provided a dramatic natural experiment. Correlation coefficients between the three large northwestern European LNG importers (TTF, NBP, TRF) and the benchmark TTF had shown near-perfect correlation before April 2022. During the crisis, as Heather documented, the NBP, Belgian hubs, and French TRF diverged sharply from the other five hubs for most of the period from April to September 2022. The divergence was driven by specific physical bottlenecks: infrastructure constraints in getting regasified LNG into national grids and across borders, especially into Germany. Markets began rebalancing from as early as Q4 2022, and since approximately May 2023, the selected hubs have become well correlated again, with price convergence broadly similar to the pre-crisis period. Volatility at the French TRF, however, remained the highest among the continental hubs throughout 2023 and into 2024 \u2014 a persistent anomaly that offers persistent spread trading opportunities for those willing to take the TRF liquidity risk."), /* @__PURE__ */ React.createElement(Para, null, "A 2022 study published in <em>Energy Economics</em>, using the Diebold-Yilmaz connectedness approach with a time-varying parameters VAR model with stochastic volatility, showed that the European natural gas market had become increasingly integrated over the period studied, but also revealed an important structural shift: the Dutch TTF and the German NCG had supplanted the British NBP as the primary net transmitters of price and volatility shocks across the European system. In more recent years, the dominance of these two markets had weakened, while spillovers from the Italian PSV had gained importance \u2014 a shift the researchers attributed to the growing role of LNG supply through southern European terminals and the commissioning of the Trans-Adriatic Pipeline carrying Azerbaijani gas to Italy."), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "The European gas market of 2026 sits at a structural inflection point. The EU has legislated the phase-out of Russian gas imports by 2027. A wave of new global LNG export capacity \u2014 from the US Gulf Coast (Plaquemines, Golden Pass, Rio Grande), Qatar (North Field expansion), and Mozambique \u2014 is beginning to arrive, adding roughly 100 million tonnes per annum to global supply by 2028. European gas demand is declining \u2014 compressed by efficiency gains, electrification, heat pump deployment, and renewables growth \u2014 but not fast enough to eliminate the continent's dependence on imported molecules. Storage, which accounts for roughly a quarter of Europe's winter supply, faces a tension between regulatory mandates (fill to 90 percent by November) and market economics (spreads too narrow to incentivise commercial injection). And the price-setting power of TTF, already the world's most liquid gas hub, continues to grow: traded volumes on the EEX Group alone increased 24 percent year-on-year in 2025, with TTF derivatives rising 25 percent."), /* @__PURE__ */ React.createElement(Para, null, "For spread traders, this environment creates both opportunity and complexity. The location spreads that exist today are the residue of infrastructure that was built for a supply geography that no longer exists \u2014 pipelines designed to carry Russian gas westward now operate in reverse or sit idle, while LNG terminals built as marginal supply sources now carry the baseload. The <em>transitional friction</em> of this reorientation \u2014 a compressor station calibrated for eastward flow that loses efficiency in reverse, a border point where capacity auction rules were written for a world of annual Russian contracts, a storage facility in eastern Germany that cannot fill because there is no longer a direct pipeline connection to Russian supply \u2014 generates the price signals that algorithms are learning to read."), /* @__PURE__ */ React.createElement(Para, null, "The risk, acknowledged by every practitioner in the market, is that the signals are becoming noisier, not cleaner. The extreme volatility of 2022 produced enormous trading profits for those positioned correctly and enormous losses for those who were not \u2014 the total value at risk in European gas trading increased by orders of magnitude. The structural shift from pipeline to LNG supply has introduced a new source of correlation: European gas prices are now linked to Asian LNG prices with a correlation coefficient that Elenger calculated at 0.95 in 2024, meaning that a cold snap in Tokyo or a maintenance shutdown at a Queensland LNG plant can move TTF prices in Amsterdam within hours. The ML models that performed well on historical Henry Hub data \u2014 a deep, liquid, predominantly domestic market with a single pipeline grid \u2014 face a harder problem on TTF, where the price is determined by the intersection of global LNG flows, Norwegian pipeline maintenance schedules, European storage mandates, renewable generation intermittency, and the geopolitical risk premium of a continent that until recently depended on an adversary for 40 percent of its gas supply."), /* @__PURE__ */ React.createElement(Para, null, "The gas molecule does not know it has a price. It flows where pressure gradients push it, indifferent to the billions of euros of financial contracts constructed around its journey from well to burner tip. But the infrastructure through which it travels \u2014 the 200,000 kilometres of high-pressure transmission pipeline, the 160 underground storage facilities, the 40 LNG regasification terminals, the thousands of cross-border interconnection points catalogued on ENTSOG's System Capacity Map \u2014 is not indifferent. It was built by humans, regulated by humans, and priced by humans. The algorithms now learning to trade the spreads embedded in this infrastructure are, in the end, learning to read the signature of human decisions crystallised in steel and concrete: where a pipeline was routed, how a tariff was set, which storage cavern was filled and which was left empty."), /* @__PURE__ */ React.createElement(Para, null, "The question is whether the algorithms will make the market more efficient \u2014 closing spreads faster, allocating gas more rationally, smoothing the seasonal swings that once made winters in Europe a matter of genuine uncertainty \u2014 or whether they will introduce new forms of fragility: flash crashes in thinly traded hubs, herding behaviour among models trained on the same data, or a false confidence in predictions that are only as good as the stable regime from which the training data was drawn. The answer will depend not on the sophistication of the models but on the humility of the people who deploy them \u2014 and on whether the physical infrastructure beneath the algorithms can keep up with the financial demands placed upon it."), /* @__PURE__ */ React.createElement("p", { style: { fontFamily: FONTS.body, fontStyle: "italic", fontSize: "21px", lineHeight: 1.78, color: COLORS.black, marginBottom: "1.3em", marginTop: "28px" } }, "In the control room of a Dutch TSO, a screen shows real-time flows at every interconnection point on the network \u2014 green arrows for gas moving within normal parameters, amber for approaching capacity limits, red for congestion. On a cold February morning in 2026, with European storage below 30 percent and the injection season still six weeks away, nearly every arrow between the Netherlands and Germany is amber. Somewhere in London, in Singapore, in Houston, an algorithm is reading those same data feeds, calculating the probability that amber will turn red, and placing a trade. The molecule continues to flow, unbothered by its own price."), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement("div", { style: { background: COLORS.cream, border: `1px solid ${COLORS.borderLight}`, borderRadius: "3px", padding: "32px", margin: "48px 0" } }, /* @__PURE__ */ React.createElement("div", { style: { fontFamily: FONTS.sans, fontSize: "14px", fontWeight: 700, letterSpacing: "2px", textTransform: "uppercase", color: COLORS.darkGray, marginBottom: "20px" } }, "Reference Summary"), /* @__PURE__ */ React.createElement("div", { style: { fontFamily: FONTS.sans, fontSize: "14px", lineHeight: 1.7, color: COLORS.darkGray } }, /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "12px" } }, /* @__PURE__ */ React.createElement("strong", null, "Classification:"), " Commodity market / Energy trading / Financial derivatives"), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "12px" } }, /* @__PURE__ */ React.createElement("strong", null, "Key statistics:"), " TTF traded volumes: ~66,250 TWh (2024, +25% YoY). TTF churn ratio: 20.3x (2024). EU storage capacity: ~1,100 TWh working volume. Russian pipeline imports: ~10 bcm (2025, down from 170 bcm in 2019). EU LNG imports: ~185 bcm (2025). EEX Group gas volumes: 8,823 TWh (2025, +24% YoY). Summer-winter spread: ~\u20AC1.42/MWh (2025 avg); breakeven ~\u20AC2.50\u20133.00/MWh. LSTM one-step MAPE: 8.53%; hybrid VMD-CNN-BiLSTM: \u22643.5%."), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "12px" } }, /* @__PURE__ */ React.createElement("strong", null, "Key hubs:"), " TTF (Netherlands, mature/global benchmark), NBP (UK, active/regional), THE (Germany, active), TRF (France, active), PSV (Italy, active), VTP (Austria, poor), PVB (Spain, poor), ZTP (Belgium, poor)."), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "12px" } }, /* @__PURE__ */ React.createElement("strong", null, "Key figures:"), " Patrick Heather (OIES, Senior Research Fellow \u2014 decade-long series on European hub development). Timera Energy (London \u2014 storage optimisation model, rolling intrinsic backtesting). ENTSOG/GIE (transparency infrastructure). Piotr Ku\u015B (ENTSOG General Director). Lucie B
