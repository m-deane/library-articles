ing expansive pressures that fracture the stone from within. The conservation challenge is that treatments designed to reduce porosity (such as TEOS-based silicate consolidants) also reduce the stone's natural ability to absorb and release moisture, potentially accelerating rather than retarding decay \u2014 a finding that JoAnn Cassar's research group at the University of Malta has explored extensively.")), /* @__PURE__ */ React.createElement("p", null, "The question that the cavalier poses \u2014 and that materials scientists, military engineers, and conservation specialists have been answering from different angles for five centuries \u2014 is fundamentally one of geometry and time. Pardo understood that ten metres of elevation would translate into additional days of resistance, and designed the cavalier accordingly. Dragut understood that the fort had to fall before the harbours could be secured, and died proving it. Laparelli understood that the high ground of Sciberras Peninsula was the real strategic asset, and built a city to claim it. Roussel's team understood that the same stone which resisted Ottoman cannonballs at 200 m/s is slowly losing its surface to salt crystals at 1.4 mm per century \u2014 a rate that makes the fortifications effectively permanent on any human planning horizon, but not permanent in geological time. The Globigerina Limestone was deposited between 23 and 14 million years ago. It has been quarried for 6,000 years. It has been fortification stone for 500. The cavalier it built was expected to survive three days; it survived twenty-eight. The weathering data suggest it will survive at least another 70,000 years at current recession rates, barring catastrophic salt loading or climate-driven acceleration. The stone has outlasted every army that has attacked it. Whether it will outlast the sea that made it is a question the foraminifera, whose tests compose its matrix, are no longer alive to answer.")), /* @__PURE__ */ React.createElement(
