  ), /* @__PURE__ */ React.createElement("div", { style: { maxWidth: 780, margin: "0 auto", padding: "56px 24px 80px" } }, /* @__PURE__ */ React.createElement(DC, null, `At 6:14 a.m. on a Tuesday in late autumn, in a flat above a bakery in the Whiteinch district of Glasgow, a thirty-eight-year-old woman called Esi stands at her kitchen window with both hands on a mug, waiting for the light. She is not waiting for sunrise \u2014 that has already arrived, grey and washed-out, behind a slab of cloud. She is waiting for the precise moment when the bakery sign two floors below switches off and the orange glow stops reflecting onto her ceiling. When it does, the kitchen will go from two competing colour temperatures to one, and she will be able to think.`), /* @__PURE__ */ React.createElement(P, null, `This is the beginning of her day. It has been, with small variations, the beginning of nearly every day for four years. Before the sign goes off she does not check her phone, does not open her laptop, does not respond to the soft vibrating message from a friend in Auckland that has been waiting since 4:51. She stands and waits, and if she has done it correctly the kettle will not have boiled yet, because the kettle clatters in a way that overrides the part of her mind that is currently composing the day's first sentence.`), /* @__PURE__ */ React.createElement(P, null, `Esi is what an earlier era would have called eccentric and what the present one \u2014 at last, and to her enormous relief \u2014 has begun to call AuDHD: an adult living with both autism and ADHD in the same nervous system. The companion to this article, ${"\u201C"}The Engine That Cannot Be Redirected,${"\u201D"} described that nervous system in the language of catecholamines and cortical thickness; of the locus coeruleus and the salience network; of dopamine receptors and Aristotle's word for the directional drive of a thing toward its own becoming. That piece was a map of the engine. This one is about life ak only in the afternoons.`), /* @__PURE__ */ React.createElement(P, null, `This is not a routine in the self-help sense, the kind that promises productivity and discipline and improved character. It is closer to what the Yorkshire writer Pete Wharmby \u2014 author of ${"\u201C"}Untypical${"\u201D"} (2023) and ${"\u201C"}What I Want to Talk About${"\u201D"} (2022), and one of the most-quoted late-diagnosed autistic adults in the United Kingdom \u2014 calls his ${"\u201C"}defensive scaffolding.${"\u201D"} In a 2023 interview with Square Peg, the autistic-led podcast hosted by Hatti Atkinson and Sandy Cooper, Wharmby described the way his life is organised around protecting the small windows in which he can work and think clearly. ${"\u201C"}I have to be quite militant about my routines,${"\u201D"} he said. ${"\u201C"}If I'm not, the day collapses, and I lose two more days getting back from that.${"\u201D"} The militancy is not stubbornness. It is the fence around the well.`), /* @__PURE__ */ React.createElement(P, null, `Time, for the AuDHD adult who has worked this out, is not a continuous resource to be optimised. It is a series of differently shaped containers. The morning is one shape. Late afternoon is another. There are hours in which a long phone conversation is impossible and hours in which it is one of the easiest things in the world. There are weeks in which a single deep project consumes everything and there are weeks \u2014 usually following \u2014 in which the dishwasher cannot be unloaded. The shape changes, and the work of a life is to know which shape you are in and not to try to use it for the wrong purpose.`), /* @__PURE__ */ React.createElement(P, null, `Devon Price, the social psychologist whose 2022 book ${"\u201C"}Unmasking Autism${"\u201D"} has become a load-bearing text for the late-diagnosed community, describes this with characteristic bluntness. ${"\u201C"}Most autistic people I know don't have a productivity problem,${"\u201D"} he wrote in   ), /* @__PURE__ */ React.createElement(P, null, `Among the women I spoke with \u2014 women being the demographic most consistently missed by the diagnostic system of the last forty years \u2014 the most common phrase was a variant of ${"\u201C"}I stopped pretending to be a morning person${"\u201D"} or ${"\u201C"}I stopped pretending to be a night person.${"\u201D"} The pretence had been costly in ways they had not, until diagnosis, been able to name. One thirty-four-year-old illustrator in Lisbon described how she had spent her twenties forcing herself to socialise on Friday evenings until the moment she realised that her Saturdays \u2014 her one creative day \u2014 had been quietly burnt every week for a decade. ${"\u201C"}I wasn't tired on Saturdays,${"\u201D"} she said. ${"\u201C"}I was poisoned.${"\u201D"}`), /* @__PURE__ */ React.createElement(P, null, `The shape of the day, when it finally fits, is not a shape that announces itself. It is the absence of the small daily wound that nobody else could see.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { title: "The houses we build" }, /* @__PURE__ */ React.createElement(P, null, `The flat above the bakery has two rooms and a kitchen. The walls are painted the particular off-white called Slipper Satin \u2014 Esi tested seven shades over a fortnight, applying patches to four different walls so she could see them in different lights at different hours, before committing. The floors are oak, oiled rather than varnished, because the smell of varnish makes the back of her throat feel as though it has been dusted. The kettle is a stovetop one with a quiet whistle; she replaced an electric kettle whose click at the end of a boil had become, over six months, unbearable.`), /* @__PURE__ */ React.createElement(P, null, `This kind of detail will sound, to readers without the engine, like fastidiousness. To AuDHD readers it will sound like the most ordinary description of bsence of clocks.${"\u201D"} The room, she went on, is not a luxury. It is what makes the rest of the house \u2014 and the rest of her life as a partner, mother, clinician, and writer \u2014 possible.`), /* @__PURE__ */ React.createElement(P, null, `What such rooms have in common is that they are not aesthetic statements. They are negotiations: between the body's actual sensitivities and the world's actual surfaces. The chair is angled the way it is because, after enough years, the AuDHD adult has learnt that her shoulders unclench at fourteen degrees off the door and not at zero. The window faces north because southern light, however beautiful, is light she cannot work in. The plant is a monstera and not a fiddle-leaf fig because the fig dropped a leaf once on a Wednesday afternoon and the small dry sound of it landing on the wooden floor cost her a working day.`), /* @__PURE__ */ React.createElement(

  ), /* @__PURE__ */ React.createElement(P, null, `The economic underside of this is rarely discussed. Building an environment to fit an AuDHD nervous system requires either money or time, and most often both. The forty-year-old single father in Birmingham I spoke with had spent eighteen months replacing his flat's lighting one bulb at a time, on the salary of a part-time bookshop assistant, because that was what he could afford and because the wrong bulb meant he could not write the book he was writing in the evenings. The houses we build, when we build them well, are not always large or elegant. They are, almost always, the result of a long, patient, expensive accommodation between an unusual body and an ordinary world.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { title: "The relationships that hold" }, /* @__PURE__ */ React.createElement(P, null, `On a Sunday in March, in the flat above the bakery, Esi's partner Andrew comes home with three bags of shopping and pauses, as he has trained himself to pause, in the doorway. He does not announce his arrival. He puts the bags down quietly on the mat, and waits for Esi \u2014 who is in the back room, working \u2014 to register the new fact of him in the house. After perhaps ninety seconds she calls through, in a different voice from the one she has been writing in: ${"\u201C"}Hi.${"\u201D"} It is a small word, and it does enormous work.`), /* @__PURE__ */ React.createElement(P, null, `Andrew, who is not himself neurodivergent, learnt this in the first year of their relationship, after several misfires that taught him what kind of greeting Esi could metabolise on what kind of day. Now he does it without thinking. The pause is, for him, no longer a pause. It is just the way he comes home.`), /* @__PURE__ */ React.createElement(P, null, `The partnerships that hold an AuDHD adult, when they hold, are characterised by this kind of small, accumulated literacy. Kieran Ro \u201C"}are the ones that don't require us to be a kind of person we aren't, in order to be loved as a person we are.${"\u201D"}`), /* @__PURE__ */ React.createElement(P, null, `Among AuDHD parents, the same principle applies in a more delicate form. The forty-six-year-old AuDHD mother in Edinburgh I spoke with \u2014 diagnosed two years after her own son was \u2014 described how she had quietly redesigned the rituals of her household around the recognition that both she and her child were navigating a sensory world calibrated for other people. There is no longer a television in the kitchen. Birthdays are, by mutual agreement, small. The school run, which had been a weekly source of crisis, is now done by her partner four days out of five, and she does the longer pickup on Friday afternoons because that is the day on which her capacity to be in the noise of a school gate is highest. ${"\u201C"}It looks like an arrangement,${"\u201D"} she said. ${"\u201C"}It is, actually, a love letter.${"\u201D"}`), /* @__PURE__ */ React.createElement(

olliding with the day's structural demands every twenty minutes.`), /* @__PURE__ */ React.createElement(P, null, `The work itself, when it is well-chosen, has recognisable features. It rewards the deep, unbroken interval \u2014 the four-hour stretch in which a research question becomes tractable, a problem yields to a particular angle of attention, a sentence at last finds its verb. It tolerates, or even prefers, niche specialisation: the one obscure corner of a discipline that no one else has bothered to learn properly. It is structured around outputs rather than presence; the AuDHD adult is paid for the thing made, not for the hours visible at a desk. And it is, very often, work whose subject is also the person's interest \u2014 what the autistic researcher Dinah Murray called, in her 1992 paper that founded monotropism theory, an ${"\u201C"}interest tunnel,${"\u201D"} though that mechanism is the territory of the previous article and need not detain us here.`), /* @__PURE__ */ React.createElement(SB, { title: "A note on the word 'interest'" }, /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 0.9em" } }, "The dominant clinical vocabulary, even now, calls AuDHD an $", "\u201C", "attention deficit$", "\u201D", " condition. The lived experience inverts that adjective. There is no deficit of attention; there is a profoundly different distribution of it. Attention here is interest-driven \u2014 almost violently so \u2014 rather than effort-driven."), /* @__PURE__ */ React.createElement("p", { style: { margin: "0" } }, "To call it a deficit is like calling a magnet a piece of iron with poor general adhesion to the world. It misnames the property. The work that is the work, for an AuDHD adult, is the work whose interior the magnet finds.")), /* @__PURE__ */ React.createElement(P, null, `Where conventional employment fails AuDHD adults, it tends to fail in recognisable ways: the open-plan office whose acoustic geography defeats the workday by 10:30 a.m.; the calendar full of half-hour meetings that prevent any single thought from completing; the performance review that scores extraversion rather than output; the manager whose idea of fairness is uniformity. Where it succeeds \u2014 and it does, sometimes, succeed \u2014 it tends to do so in organisations that have, often without naming it, accommodated the engine. A research lab whose principal investigator does not require team members to be in the building. A small newspaper whose editor sends edits in writing rather than over the phone. A software company whose deep-work culture, however badly named, is real.`), /* @__PURE__ */ React.createElement(P, null, `The forty-three-year-old AuDHD academic I spoke with in Bristol \u2014 a historian of medieval North African trade \u2014 described her department as ${"\u201C"}the only place I have ever worked that did not slowly kill me.${"\u201D"} She was not being theatrical. The department, she explained, was small, allowed her to teach in concentrated blocks rather than across every weekday, accepted that her email replies would arrive within forty-eight hours rather than two, and asked of her exactly the work she was capable of doing at the level no one else in the world could match. In return, she had produced three books in seven years.`), /* @__PURE__ */ React.createElement(

.createElement(P, null, `Among the women I spoke with, the refusal that came up most often was the unscheduled phone call \u2014 a category of demand, several of them said, that they had spent two decades pretending was reasonable. ${"\u201C"}I do not do unannounced phone calls anymore,${"\u201D"} the Lisbon illustrator said simply, when I asked how her diagnosis had changed her life. ${"\u201C"}If somebody phones me without warning, I do not pick up. If they message first and we agree a time, I am the most present person they will speak to all week. The phone call has become, for me, a thing I am good at, because it is no longer a thing that ambushes me.${"\u201D"}`), /* @__PURE__ */ React.createElement(P, null, `Among AuDHD adults more broadly, the refusals form a recognisable list. The open-plan office. The networking event whose social architecture is small talk in a loud room. The corporate culture that mistakes extraversion for capability. The food that the body cannot eat, regardless of how many times the host insists it is delicious. The smalltalk-as-currency culture in which the question ${"\u201C"}how are you?${"\u201D"} demands a particular kind of empty answer that some nervous systems literally cannot produce on demand. The video call that has been booked without an agenda. The fluorescent strip light in the supermarket aisle. The friend who, however well-meaning, requires a kind of constant performative reciprocity that exhausts the AuDHD friend within ninety minutes.`), /* @__PURE__ */ React.createElement(P, null, `What is striking about these refusals is how often, in the testimony of late-diagnosed adults, they are described as the things that made flourishing possible. ${"\u201C"}I built my life by saying no,${"\u201D"} Devon Price wrote in 2023. ${"\u201C"}For thirty years I had been told that this would make me selfish, lazy, unsuccessful, alone. Instead, it turned out to be the precondition for being any of the things I had wanted to be.${"\u201   )), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { title: "A recovery, told as a story" }, /* @__PURE__ */ React.createElement(P, null, `In the spring of 2018, in a flat in Walthamstow, a thirty-three-year-old woman called Mira \u2014 a senior project manager at a London charity, recently engaged, recently promoted, recently the subject of a profile in a sector publication \u2014 found that she could no longer sit at her kitchen table. The table itself was unchanged: oak, second-hand, scratched in two places by a previous tenant's cat. What had changed was that the act of sitting at it, opening her laptop, and beginning a workday had become, in some way her vocabulary did not yet contain, impossible. Not difficult. Not unpleasant. Impossible, the way it is impossible to lift a building.`), /* @__PURE__ */ React.createElement(P, null, `She is, now, a composite \u2014 drawn from three women I spoke with whose stories converged so completely that telling any one of them in identifying detail would feel like a betrayal of the others. (This is flagged again in the Source Integrity Note.) But the arc was the same in all three cases, and it is an arc that the late-diagnosed AuDHD community has come to recognise so consistently that it has acquired a name: autistic burnout, distinct from clinical depression in mechanism, in trajectory, and in what eventually allows recovery.`), /* @__PURE__ */ React.createElement(P, null, `Mira's first weeks were, she said later, the worst weeks of her life. She had no diagnosis yet \u2014 she would not have one for another fourteen months. What she had instead was the conviction that she had become, in some catastrophic and recent way, the wrong kind of person: lazy, ungrateful, weak. She slept ten hours a night and woke exhausted. She read the first paragraph of an email and forgot the second. The fianc\xE9, who had no framework for any of this, was patient and then frightened and then
