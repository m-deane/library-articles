 by one's environment."), /* @__PURE__ */ React.createElement("p", null, /* @__PURE__ */ React.createElement("strong", null, "Relatedness"), " \u2014 the need to feel meaningfully connected to others, to matter to people who matter to oneself. Research consistently shows that relatedness satisfaction moderates the effects of the other two needs: autonomy and competence flourish within relationships characterised by genuine care."), /* @__PURE__ */ React.createElement("p", { style: { marginTop: 10, fontSize: 13, color: C.warmGray } }, "Source: Ryan, R.M. & Deci, E.L. (2017). ", /* @__PURE__ */ React.createElement("em", null, "Self-Determination Theory: Basic Psychological Needs in Motivation, Development, and Wellness"), ". Guilford Press.")), /* @__PURE__ */ React.createElement(Para, null, "The theoretical framework that would eventually provide autonomy-centred practice with its most rigorous foundation was built not in a therapy room but in a set of experiments at the University of Rochester in the late 1970s. Edward Deci, a psychologist interested in what happens to intrinsic motivation when external rewards are introduced, had found something counterintuitive: that rewarding people for activities they already enjoyed could, under certain conditions, ", /* @__PURE__ */ React.createElement("em", null, "reduce"), " their motivation to engage in those activities. The reward shifted the experienced locus of causality \u2014 the reason felt external rather than internal, controlled rather than chosen \u2014 and something in the quality of engagement diminished."), /* @__PURE__ */ React.createElement(Para, null, "Deci and his colleague Richard Ryan spent the following decades building self-determination theory (SDT) into one of the most extensively tested motivational frameworks in all of psychology. Their 2017 synthesis, ", /* @__PURE__ */ React.createElement("em", null, "Self-Determination Theory: Basic Psychological Needs in Motivation, Development, and Wellness"), , interpersonal therapy, or pharmacotherapy with clinical management. This was a comparison study designed to evaluate modalities. What Zuroff's team found, when they analysed what actually predicted outcomes, was not primarily the modality."), /* @__PURE__ */ React.createElement(Para, null, "It was the patient's autonomous motivation at session three."), /* @__PURE__ */ React.createElement(Para, null, "Autonomous motivation, defined in the study as the extent to which patients experienced their participation in treatment as a freely made choice emanating from themselves, predicted the probability of remission and the severity of post-treatment depression scores across all three treatments. It predicted outcomes more strongly than the therapeutic alliance \u2014 the measure that had, for decades, been considered the strongest common-factor predictor in psychotherapy. And patients who perceived their therapists as more autonomy-supportive reported higher autonomous motivation, which in turn predicted better outcomes. The chain from therapist behaviour to patient experience to clinical result could be traced."), /* @__PURE__ */ React.createElement(ZuroffOutcomes, null), /* @__PURE__ */ React.createElement(DiagramCaption, { title: "Remission by Autonomous Motivation (Zuroff et al., 2007)" }, "Approximate remission rates for patients with high versus low autonomous motivation across CBT, interpersonal therapy (IPT), and pharmacotherapy. The gap \u2014 roughly double the remission rate for patients with high autonomous motivation \u2014 was consistent across all three treatment conditions, suggesting autonomous motivation operates as a transdiagnostic, cross-modal factor rather than a technique-specific effect. N = 95 depressed outpatients, McGill University. Source: Zuroff et al. (2007), ", /* @__PURE__ */ React.createElement("em", null, "Psychotherapy Research"), ", 17(2), 137\u2013147."), /* @__PURE__ */ React.createElement(Para, null, `"Autonomous motivation is a new
