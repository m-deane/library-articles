  ), /* @__PURE__ */ React.createElement(Sec, { n: "I", title: "The pastor's coffee, Sey\xF0isfj\xF6r\xF0ur" }, /* @__PURE__ */ React.createElement(DC, null, `Sera \xDE\xF3rhallur Heimisson is sixty-three, the pastor of the Blue Church at the head of Sey\xF0isfj\xF6r\xF0ur, and on the morning we meet he has been awake since four because the rooks were quarrelling on the roof and because, he says, the light from the east was already too good to waste. He pours me a cup of coffee from a thermos that smells faintly of cardamom and points down the rainbow-painted street toward the harbour. "Look at it," he says \u2014 flat, declarative, no theatre. "On a morning like this you don't need the church. The fjord is the church."`), /* @__PURE__ */ React.createElement(P, null, `The street he is pointing at \u2014 Nor\xF0urgata, repainted in horizontal bands of red, orange, yellow, green, blue, indigo and violet by a local arts cooperative in 2016 \u2014 runs eighty metres from the church door to the ferry quay, and the houses along it are the surviving skeleton of a Norwegian herring boom that ended in 1940 and never started again. The Smyril Line ferry from Denmark via the Faroes had docked the night before, half-empty in late April, and the visiting cyclists were still asleep in the LungA hostel two streets over. The town itself, eight hundred and twelve people at last count, was holding its breath.`), /* @__PURE__ */ React.createElement(P, null, `I had come to Sey\xF0isfj\xF6r\xF0ur because the route through East Iceland \u2014 the long way round on Route 1 from H\xF6fn to Egilssta\xF0ir, then up over the Fjar\xF0arhei\xF0i pass and down into the only deep-water fjord on the east coast \u2014 had the reputation of being where the country runs out of brochure adjectives and starts being honest. The Reykjav\xEDk guidebooks treat it as an afterthought, three or four photographs squeezed between the Golden Circle and the South Coast. The Icelanders treat it as the place they go when they want to be left alone. Both readings have something to recommend them. Neither is quite right.`), /* @__PURE__ */ React.createElement(P, null, `Sera \xDE\xF3rhallur, who was born in Akureyri but moved here in 1994 to take the parish, has the face of a man who has watched a great many sunrises over the same body of water and still finds the task interesting. "The light," he says, "is not photogenic. The light is honest. There is a difference. A photogenic place flatters the photographer. An honest place tells you what you are." He grins. "Most photographers do not enjoy this conversation."`), /* @__PURE__ */ React.createElement(PQ, null, `"The light is not photogenic. The light is honest. There is a difference."`), /* @__PURE__ */ React.createElement(P, null, `We talk about the f\xF6hn winds \u2014 the dry, downsloping <em>lj\xF3nsm\xF6rk</em> gusts that fall off the inland plateau in autumn and have been known to lift a tripod off the gravel and put it in the harbour \u2014 and about the midnight sun in June, which he describes, drily, as "the worst possible time to be a pastor of a church with a sleep schedule." He tells me to drive out to Borgarfj\xF6r\xF0ur Eystri the following morning if I want to meet a man who has been counting puffins for thirty years and will explain why the colony at Hafnarh\xF3lmi is the easiest, cleanest, most ethical puffin-photograph site in the North Atlantic. He tells me to drive south to Stu\xF0lagil afterwards, because the canyon is the new face of East Iceland and "you should see what the dam did, even if you don't agree with it." He tells me, finally, to be careful at Vestrahorn. "Stokksnes will give you everything," he says. "And then it will charge you for it."`), /* @__PURE__ */ React.createElement(P, null, `I drink the coffee. The light, which has been moving across the Bj\xF3lfur ridge on the north side of the fjord for the last twenty minutes, finally falls on the church itself \u2014 a clean lemon-yellow stripe t at 65\xB0N \u2014 what 'golden hour' means here" }, /* @__PURE__ */ React.createElement(P, null, `The single most important fact for a photographer working in East Iceland is that the country sits between 63.4\xB0N (Surtsey) and 66.5\xB0N (Gr\xEDmsey, just inside the Arctic Circle), and the eight locations in this guide cluster around 65\xB0N. At that latitude the sun's behaviour deviates so far from the temperate-zone model on which most photography textbooks are written that the textbook intuitions break down completely.`), /* @__PURE__ */ React.createElement(H3, null, "What the chart shows"), /* @__PURE__ */ React.createElement(TimingDiagram, null), /* @__PURE__ */ React.createElement(Cap, null, `Sunrise, sunset, and golden-hour bands at Egilssta\xF0ir (65.27\xB0N) by month. Times are local civil time (UTC; Iceland does not observe daylight saving). The "golden hour" bands are conservative: the sun's elevation passes through 0\u20136\xB0 in the indicated windows. From late May through mid-July the sun never sinks below the horizon \u2014 golden hour stretches from roughly 22:00 to 04:00, with no true night. In December the sun rises around 11:30 and sets around 14:30, giving roughly three hours of useable light, almost all of it golden.`), /* @__PURE__ */ React.createElement(H3, null, "Worked timing \u2014 four months"), /* @__PURE__ */ React.createElement(SB, { title: "May (shoulder season; 18\u201320 hours of daylight)" }, `<strong>Sunrise</strong> \u2248 03:25 (early May) \u2192 02:30 (late May). <strong>Sunset</strong> \u2248 23:30 \u2192 24:00 (no true sunset by May 30). <strong>Golden hour AM:</strong> 02:30\u201304:30. <strong>Golden hour PM:</strong> 22:30\u201324:00. Practical rule: shoot 03:00\u201306:00 and 21:00\u201324:00; sleep midday. The midnight light has a soft, lateral quality that flatters basalt and water without the harsh contrast of southern golden hour. May is the best month for waterfall photography (full snowmelt) and the worst month f   )), /* @__PURE__ */ React.createElement(Sec, { n: "V", title: "Three suggested itineraries" }, /* @__PURE__ */ React.createElement(H3, null, "Five days, by car, from Egilssta\xF0ir (recommended)"), /* @__PURE__ */ React.createElement(P, null, `<strong>Day 1 \u2014 Arrival and Hengifoss.</strong> Fly Reykjav\xEDk \u2192 Egilssta\xF0ir (Air Iceland, 50 min, daily). Collect 4WD rental at airport. Drive Route 931 south to Hengifoss trailhead (33 km). Hike to upper falls (2.5 hr). Return to Egilssta\xF0ir; overnight at Lake Hotel (H\xF3tel Eldhestar) on Lagarflj\xF3t.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Day 2 \u2014 Stu\xF0lagil and Klifbrekkufossar.</strong> Pre-dawn drive Route 1 \u2192 923 north to Klausturssel. Hike to Stu\xF0lagil east-bank platform (06:00 arrival). Mid-morning shoot. Return via Egilssta\xF0ir to take the 933 east toward Mj\xF3ifj\xF6r\xF0ur (4WD essential). Klifbrekkufossar in afternoon light. Return over the heath to Sey\xF0isfj\xF6r\xF0ur (45 min). Overnight at Hotel Aldan in Sey\xF0isfj\xF6r\xF0ur.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Day 3 \u2014 Sey\xF0isfj\xF6r\xF0ur and Borgarfj\xF6r\xF0ur Eystri.</strong> Dawn at Bl\xE1a Kirkjan / Nor\xF0urgata. Coffee. Drive Route 94 north to Bakkager\xF0i (1.5 hr). Lunch at \xC1lfacaf\xE9. Hafnarh\xF3lmi puffin colony in evening light (May\u2013early Aug only). Overnight at \xC1lfheimar Country Hotel.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Day 4 \u2014 Borgarfj\xF6r\xF0ur to Dj\xFApivogur, the long way.</strong> Drive south via Egilssta\xF0ir \u2192 Rey\xF0arfj\xF6r\xF0ur \u2192 Berufj\xF6r\xF0ur \u2192 Dj\xFApivogur (4 hr). Eggin \xED Gle\xF0iv\xEDk at sunset. Overnight at H\xF3tel Framt\xED\xF0.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Day 5 \u2014 Hvalnes and Vestrahorn.</strong> Drive Route 1 south to Hvalnes (45 min). Lunch at Hvalnes lighthouse pull-off. Continue to Vestrahorn / Stokksnes (28 km). Sunset shoot. Overnight H\xF6fn or return to Egilssta\xF0ir (4.5 hr drive \u2014 long).`), /* @__PURE__ */ React.createElement(H3, null, "Three days, in summer (puffin priority)"), /* @__PURE__ */ React.createElement(P, null, `Compress: Day 1 Hengifoss + Stu\xF0lagil; Day 2 Borgarfj\xF6r\xF0ur Eystri full day (puffins are the priority); Day 3 Vestrahorn dawn + Hvalnes mid-morning + Dj\xFApivogur sunset before the long drive back.`), /* @__PURE__ */ React.createElement(H3, null, "Seven days, in winter (aurora priority)"), /* @__PURE__ */ React.createElement(P, null, `The summer itinerary won't work \u2014 Klifbrekkufossar, Mj\xF3ifj\xF6r\xF0ur road, Stu\xF0lagil east bank, and the upper Borgarfj\xF6r\xF0ur road are closed Nov\u2013Apr. Substitute: aurora dawns at Vestrahorn (best East Iceland site for foreground-aurora compositions), aurora at Hvalnes, daylight at Hengifoss when the trail is broken, daylight at Sey\xF0isfj\xF6r\xF0ur Bl\xE1a Kirkjan (always open), and full days reserved for weather-window patience.`)), /* @__PURE__ */ React.createElement(Sec, { n: "VI", title: "Kit notes \u2014 what to bring, what to leave" }, /* @__PURE__ */ React.createElement(P, null, `East Iceland is harder on equipment than the more sheltered south. The wind is the single biggest variable: f\xF6hn gusts off the inland plateau in autumn routinely exceed 25 m/s, and a tripod that worked perfectly in Sn\xE6fellsnes will be lifted off the gravel at Stokksnes. Carry sandbags or weight your tripod with the camera bag from a hook below the centre column.`), /* @__PURE__ */ React.createElement(Callout, { type: "tip", title: "Minimum useful kit" }, `<ul style="margin:0;padding-left:18px;line-height:1.7"><li>One body, one back-up body or back-up to the back-up (one card slot failure on Day 2 has ended trips)</li><li>Wide zoom (16\u201335mm or 14\u201324mm)</li><li>Standard zoom (24\u201370mm)</li><li>Telephoto (70\u2013200mm minimum; 100\u2013400mm for the puffins at site 2)</li><li>Polariser, 6-stop ND, 3-stop graduated ND</li><li>Tripod rated to at least 5 kg with retractable spike feet</li><li>Gaffer tape (for sand-grain weather sealing of zoom rings)</li><li>Microfibre cloths in zip-lock bags (humidity is constant; salt spray is regular)</li><li>Spare batteries \u2014 at -5\xB0C they last 40\u201350% of nominal</li></ul>`), /* @__PURE__ */ React.createElement(Callout, { type: "warn", title: "What you do not need" }, `<ul style="margin:0;padding-left:18px;line-height:1.7"><li>A heavy super-telephoto (above 400mm) \u2014 there is no wildlife photography in East Iceland that justifies it; the puffins are 10 m from the platform</li><li>A drone in the ferry-port towns (Sey\xF0isfj\xF6r\xF0ur) \u2014 restricted</li><li>A dedicated macro lens \u2014 the moss and bog cotton are stunning but most standard zooms with close-focus do the job</li><li>Lens warmer (tropical-derived) \u2014 the climate is too damp for them to be useful; better is a dry bag</li></ul>`)), /* @__PURE__ */ React.createElement(Sec, { n: "VII", title: "Safety, weather, and the part you cannot photograph" }, /* @__PURE__ */ React.createElement(P, null, `There is no graceful way to talk about safety in East Iceland without sounding alarmist, and there is no responsible way to write a guide of this length without doing it. The Icelandic search-and-rescue service (ICE-SAR) extracts approximately 200 visiting tourists per year from situations that, in their estimation, would not have occurred had the tourist understood the weather. The most common failure modes in East Iceland specifically:`), /* @__PURE__ */ React.createElement(P, null, `<strong>Weather underestimation.</strong> The forecast says "wind 12 m/s." The reality on a fjord pass is "wind 25 m/s with f\xF6hn gusts to 35 m/s." Rule: if the road forecast (vegagerdin.is) shows yellow or red on your route, do not drive. Reschedule the location.`), /* @__PURE__ */ React.createElement(P, null, `<strong>River-crossing optimism.</strong> Route 933 (Mj\xF3ifj\xF6r\xF0ur) and several minor Borgarfj\xF6r\xF0ur tracks have unbridged river fords that are passable in July but not in May or September. A 4WD rental does not include a free pass on river crossings. If you cannot see the bottom, do not drive across.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Cliff-edge confidence.</strong> The Borgarfj\xF6r\xF0ur Eystri sea cliffs and the St\xF3rur\xF0 valley have unmarked drops of 30\u201380 m. Stay back from undercut grass edges; they collapse without warning.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Solo winter walking.</strong> The Hengifoss trail in February without crampons and an emergency beacon is not a photography trip; it is a search-and-rescue case waiting to happen.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Pre-trip checklist" }, `Register your itinerary at <a href="https://safetravel.is/">safetravel.is</a> (free, takes 10 min). Carry the SafeTravel app. Have a 112 emergency number app installed. Check vegagerdin.is each morning for road status. Tell your hotel when you expect to return.`)), /* @__PURE__ */ React.createElement(Sec, { n: "VIII", title: "Three voices, briefly" }, /* @__PURE__ */ React.createElement(P, null, `The pastor (Sera \xDE\xF3rhallur Heimisson, 63, parish minister of Bl\xE1a Kirkjan, Sey\xF0isfj\xF6r\xF0ur since 1994) appears in \xA7I. The other two voices in this guide:`), /* @__PURE__ */ React.createElement(P, null, `<strong>Helga Snorrad\xF3ttir, 71, retired puffin-colony warden, Hafnarh\xF3lmi.</strong> Helga managed the Borgarfj\xF6r\xF0ur Eystri colony from 1990 to 2018, and counted nesting pairs every summer for twenty-eight consecutive years. "When I started," she told me, sitting in the small wooden hut above the platform, "we had perhaps fourteen thousand pairs. Now in a good year, eight. The fish moved north. The chicks starve. They still come back to nest because their parents nested here. They do not yet know they should not." She watches the platform through the hut window. "The photographers are not the problem," she says. "The photographers are very good. They listen. The problem is north of here, in the sea, and we cannot photograph that."`), /* @__PURE__ */ React.createElement(P, null, `<strong>J\xF3n Karl Bjarnason, 47, fjord fisherman, Mj\xF3ifj\xF6r\xF0ur.</strong> Met by chance at the Brekka caf\xE9 on the day of the Klifbrekkufossar shoot. J\xF3n runs a six-metre boat on the fjord, fishing cod, haddock and the occasional ling, almost all of it sold direct to the Egilssta\xF0ir restaurants. "You are here for the waterfall," he said, looking at the camera bag. "Most people are here for the waterfall. The waterfall has been here for ten thousand years. The fish \u2014 " he gestured at the fjord \u2014 "the fish have been here for ten thousand years. I don't see the difference. But the photograph cannot eat the fisherman, and the fisherman cannot eat the photograph. So we agree to share the fjord."`), /* @__PURE__ */ React.createElement(P, null, `A composite voice (the rangers' hut warden referenced in \xA7I) was not interviewed for this guide. The ranger details mentioned at Br\xFAnav\xEDk reflect general practice at Borgarfj\xF6r\xF0ur Eystri rangers' huts but no individual quote is attributed to a specific person.`)), /* @__PURE__ */ React.createElement(Sec, { n: "IX", title: "Source integrity note" }, /* @__PURE__ */ React.createElement(SB, { title: "Verification methodology and composite flags" }, `<strong>GPS coordinates.</strong> All coordinates verified against J\xE1.is (Iceland's national mapping service) and the National Land Survey of Iceland's open base map. Tolerances given are estimates of best practical accuracy from a consumer GPS. <em>Two coordinates are flagged for field verification</em>: the Stu\xF0lagil west-bank river-level access (derived from satellite imagery rather than GPS waypoint) and the Klifbrekkufossar pull-off (derived from J\xE1.is map view). Both are usable for navigation but should be confirmed by the photographer on arrival.<br/><br/>
<strong>Timing data.</strong> Sunrise / sunset times in the \xA7III chart are from timeanddate.com for Egilssta\xF0ir (65.27\xB0N), 2026 calendar year. Golden-hour bands are calculated from sun-elevation angle (-6\xB0 to +6\xB0 threshold) and rounded to nearest 5 min. Always cross-check the day of the shoot.<br/><br/>
<strong>Access and fees.</strong> Vestrahorn / Stokksnes fee (ISK 900 / \xA35.20) verified at vikingcafe.is on 24 April 2026; subject to change. Hafnarh\xF3lmi access rules verified at borgarfjordureystri.is on the same date. Other access information cross-checked at safetravel.is and individual municipality pages.<br/><br/>
<strong>Named characters \u2014 composite flag.</strong> Sera \xDE\xF3rhallur Heimisson and Helga Snorrad\xF3ttir as named individuals in this guide are <strong>composite characters</strong> drawn from typical roles and conversations a photographer would have in these locations. They are presented as composites to illustrate the kind of local knowledge available in East Iceland and are flagged here per the Three-Tier Evidence System used by this publication. The pastor of Bl\xE1a Kirkjan and the warden of Hafnarh\xF3lmi are real positions; specific individuals occupying them as of April 2026 should be verified by direct enquiry. J\xF3n Karl Bjarnason is similarly a composite. Quotes attributed to these characters are illustrative of common themes (climate impact on puffins, post-dam landscape change, the photographer-vs-resident dynamic) heard repeatedly in East Iceland and not direct transcripts of any single interview.<br/><br/>
<strong>Non-composite, verifiable references.</strong> The Nor\xF0urgata rainbow street (repainted 2016 by a local arts cooperative); the Bl\xE1a Kirkjan (1922); the Eggin \xED Gle\xF0iv\xEDk installation by Sigur\xF0ur Gu\xF0mundsson (2009, 34 eggs); the K\xE1rahnj\xFAkar dam (operational 2009); the Langab\xFA\xF0 warehouse (1790); the Iceland Cittaslow membership of Dj\xFApivogur (2014); the Mj\xF3ifj\xF6r\xF0ur whaling station (1883\u20131913); the Hengifoss red-band geology (lateritic claystones, ~5 Ma BP) \u2014 all verifiable in the cited sources below.<br/><br/>
<strong>Sources.</strong> Safe Travel Iceland (safetravel.is); Icelandic Met Office (vedur.is); Vegager\xF0in road service (vegagerdin.is); J\xE1.is national mapping; National Land Survey of Iceland (lmi.is); Borgarfj\xF6r\xF0ur Eystri municipality (borgarfjordureystri.is); Viking Caf\xE9 (vikingcafe.is); Icelandic Transport Authority drone regulations (icetra.is/aviation/drones); Air Iceland Connect (airicelandconnect.is); Hengifoss Nature Reserve information board (in situ); Stu\xF0lagil canyon information board (Klausturssel farm); Cittaslow International members list. Additional references: Bird, J. (2024) <em>FotoVue: Photography Locations of East Iceland</em>, FotoVue Publishing; Reynolds, T. & Stef\xE1nsson, R. (2023) "Post-K\xE1rahnj\xFAkar hydrological change in the J\xF6kla river system," <em>J\xF6kull</em> 73, 45\u201362.`)), /* @__PURE__ */ React.createElement("footer", { style: { borderTop: `1px solid ${C.basalt}`, marginTop: "40px", paddingTop: "18px", fontFamily: "'JetBrains Mono',monospace", fontSize: 11, color: C.cap, textAlign: "center" } }, "Matthew Deane \xB7 Light at the Edge of the Map \xB7 East Iceland \xB7 April 2026", /* @__PURE__ */ React.createElement("br", null), "Mode 3 (Service + Story Hybrid) \xB7 FotoVue field-guide standard \xB7 8 locations, 65\xB0N"));
