  ), /* @__PURE__ */ React.createElement(Sec, { title: "13 \xB7 Mount Kilimanjaro's vanishing ice cap" }), /* @__PURE__ */ React.createElement(P, null, `<em>Kilimanjaro</em> in Tanzania is the highest free-standing mountain on Earth (5,895 m). Photographic surveys conducted at its summit since 1912, when the German geographer Klute first mapped its glaciers, document a near-monotonic loss of ice. The 1912 ice cap covered 11.4 km\xB2; by 2011, Thompson et al. (<em>PNAS</em>) measured 1.85 km\xB2 remaining \u2014 roughly an 84 per cent reduction over the 20th century. Models calibrated against ice-core data and accumulation rates project the summit will be ice-free between 2025 and 2040. The retreat is not driven primarily by atmospheric warming (Kilimanjaro&rsquo;s summit air temperature stays well below freezing) but by changes to humidity, sublimation, and incoming radiation \u2014 a more complex story than the popular narrative. Source: Thompson et al., <em>PNAS</em> (2002, 2009); Kaser et al., <em>Int. J. Climatology</em> (2004).`), /* @__PURE__ */ React.createElement(Sec, { title: "14 \xB7 The Atacama, the driest place that has weather stations" }), /* @__PURE__ */ React.createElement(P, null, `The <em>Atacama</em> Desert in northern Chile is the driest non-polar place on Earth. Several stations on the desert&rsquo;s central plateau have recorded annual rainfall averages of less than 1 mm; the long-running Quillagua weather station holds a contender for "driest reliably observed station on Earth." NASA&rsquo;s Mars-analogue site at Yungay has recorded zero significant rainfall in the 400-year span available from indirect proxies. There is liquid water \u2014 fog ("camanchaca"), groundwater fossil aquifers \u2014 but airborne precipitation is essentially absent over centuries. The 2011 and 2015 anomalous rains, attributed to El Ni\xF1o, killed many of the desert&rsquo;s endemic microbial communities, suggesting they are adapted to a drier baseline than the historical record contains. Source: McKay et al., <em>Astrobiology</em> (2003); Houston, <em>J. Hydrology</em> (2006).`), /* @__PURE__ */ React.createElement(Sec, { title: "15 \xB7 Point Nemo \u2014 closer to the ISS than to land" }), /* @__PURE__ */ React.createElement(P, null, `The oceanic pole of inaccessibility \u2014 the point of ocean furthest from any land \u2014 is <em>Point Nemo</em>, at 48.8767\xB0 S, 123.3933\xB0 W in the South Pacific. The location was computed analytically in 1992 by the Croatian survey engineer Hrvoje Lukatela; the nearest landfalls are Ducie Island (Pitcairn group, ~2,688 km NNW), Motu Nui (off Easter Island, ~2,688 km NE), and Maher Island on the Antarctic coast (~2,688 km S). The International Space Station orbits at roughly 408 km altitude; when it passes overhead, its astronauts are closer to a Point Nemo position than any of the three nearest islands. The ocean below is so isolated that several space agencies use it as a "spacecraft cemetery" \u2014 controlled de-orbit burns of decommissioned satellites and the Russian space station <em>Mir</em> were aimed at this water. Source: Lukatela (1992) survey computation; ESA spacecraft re-entry registry.`), /* @__PURE__ */ React.createElement(PointNemoMap, null), /* @__PURE__ */ React.createElement(Cap, null, "Point Nemo on a schematic of the southern Pacific. The ISS\u2019s ground track passes through this region most days; while it does, it is the closest human structure to the surface point."), /* @__PURE__ */ React.createElement(Sec, { title: "16 \xB7 The size of Africa" }), /* @__PURE__ */ React.createElement(P, null, `The continent of <em>Africa</em> covers approximately <strong>30.37 million km\xB2</strong> \u2014 large enough to contain, simultaneously, the contiguous United States (8.08 million km\xB2), China (9.60), India (3.29), most of Western Europe (~5.0), Argentina (2.78) and Japan (0.38) with comparable area to spare. The Mercator projection, used by most online map services for navigation, distorts area by a factor proportional to the secant-squared of latitude \u2014 meaning Greenland (2.17 million km\xB2) appears larger than Africa, when in fact Africa is roughly 14 times the size of Greenland. The Mercator made the British Empire look bigger than it was; it makes Africa look smaller than it is. The Boston Public Schools made headlines in 2017 for switching to the Gall\u2013Peters projection precisely because of the educational consequence. Source: UN Statistics Division area registry; Snyder, <em>Map Projections \u2014 A Working Manual</em> (USGS, 1987).`), /* @__PURE__ */ React.createElement(Sec, { title: "17 \xB7 The Prime Meridian moved" }), /* @__PURE__ */ React.createElement(P, null, `Visitors to the Royal Observatory in Greenwich queue to straddle a brass strip set into the courtyard \u2014 the <em>Airy Transit Circle</em>, the line from which 0\xB0 longitude was officially defined in 1884. But a modern GPS receiver standing on that strip will register a longitude not of 0\xB0 but of approximately 5.31 arc-seconds <em>west</em>: the Airy line lies about 102 metres east of where 0\xB0 actually is. The discrepancy is real and unembarrassing \u2014 the modern reference is the IERS (International Earth Rotation and Reference Systems Service) Reference Meridian, defined in 1984 with respect to the geocentre rather than to the local vertical at Greenwich. The Airy line was defined when the assumption "down" was perpendicular to the local geoid was good enough; once geodesy adopted Earth-centred reference frames, a small but consequential offset opened up. Tourists therefore stand approximately 102 m off zero, which most of them will not regret. Source: Malys et al., <em>J. Geodesy</em> (2015).`), /* @__PURE__ */ React.createElement(Sec, { title: "18 \xB7 The Mississippi \u2014 measured back through the Missouri" }), /* @__PURE__ */ React.createElement(P, null, `The <em>Mississippi River</em> drains 3.2 million km\xB2 \u2014 most of the United States between the Rockies and the Appalachians. Its commonly cited length, 3,766 km, is the distance from the headwaters at Lake Itasca to the Gulf of Mexico. But the longest continuous flow path through its watershed is the <em>Missouri\u2013Mississippi system</em>, which begins in the Centennial Mountains of Montana and runs to the same Gulf \u2014 a distance of roughly 6,275 km, making the combined waterway the fourth-longest river on Earth (after the Nile, Amazon and Yangtze, and slightly ahead of the Yenisei\u2013Angara). Whether the Missouri is "tributary" or "main stem" is a question of conventional bookkeeping; the geographers&rsquo; convention favours the longer of the two flows above any confluence. Source: USGS National Hydrography Dataset; <em>Encyclopedia Britannica</em>, "Mississippi River" (revised 2024).`), /* @__PURE__ */ React.createElement(Sec, { title: "19 \xB7 The Danube touches ten countries" }), /* @__PURE__ */ React.createElement(P, null, `The <em>Danube</em> is, by international consensus, the most multilingual river on Earth. From its sources in the Black Forest (Germany) it flows for 2,860 km through, or along the borders of, ten sovereign states: Germany, Austria, Slovakia, Hungary, Croatia, Serbia, Romania, Bulgaria, Moldova and Ukraine \u2014 emptying into the Black Sea at the Danube Delta, a UNESCO biosphere reserve straddling the Romanian\u2013Ukrainian border. Four national capitals (Vienna, Bratislava, Budapest, Belgrade) sit on its banks. No other river, even the much longer Nile or Amazon, traverses as many independent states. Source: International Commission for the Protection of the Danube River (ICPDR) basin atlas, 2024.`), /* @__PURE__ */ React.createElement(Sec, { title: "20 \xB7 Lesotho and San Marino \u2014 countries inside countries" }), /* @__PURE__ */ React.createElement(P, null, `There are exactly three sovereign states fully enclaved within a single neighbour: <em>Lesotho</em> (surrounded entirely by South Africa), <em>San Marino</em> (entirely surrounded by Italy) and <em>Vatican City</em> (entirely surrounded by Italy, and the smallest UN-recognised state at 0.49 km\xB2, though the Vatican is not a UN member state and observers nuance this in different ways). Lesotho is by far the largest of the three \u2014 30,355 km\xB2, a population of about 2.3 million, and a mountainous topography that gave it the leverage to remain independent from the surrounding apartheid-era South Africa. San Marino, founded by tradition in 301 CE, is a contender for the world&rsquo;s oldest continuous sovereign state. Source: UN Statistics Division member-state registry; CIA <em>World Factbook</em>.`), /* @__PURE__ */ React.createElement(Sec, { title: "21 \xB7 The 49th-parallel border, drawn with a ruler" }), /* @__PURE__ */ React.createElement(P, null, `The <em>United States\u2013Canada border</em> west of the Lake of the Woods follows the 49th parallel of north latitude almost exactly to the Pacific \u2014 a line agreed in the Treaty of 1818 (extended to the Pacific by the Oregon Treaty of 1846). Including the meanders along the Great Lakes, the entire US\u2013Canadian border runs to about 8,891 km, the longest international border in the world between two countries. The 49th-parallel segment alone is approximately 2,030 km of straight-line cartographic abstraction, surveyed and demarcated with a 6-metre cleared right-of-way called the "Slash" that is maintained jointly by the International Boundary Commission. Walking through it, particularly in remote British Columbia and Montana, is one of the more disorienting experiences in physical geography: a perfectly straight gash of cleared trees in unbroken forest, an arrow drawn by treaty. Source: International Boundary Commission, "Joint Report Upon the Survey and Demarcation of the Boundary" (1937, updated annually).`), /* @__PURE__ */ React.createElement(

  ), /* @__PURE__ */ React.createElement(Sec, { title: "22 \xB7 Equatorial Guinea's island capital" }), /* @__PURE__ */ React.createElement(P, null, `<em>Equatorial Guinea</em>, on the West African coast, has the unusual distinction of being a continental state whose capital sits offshore. <em>Malabo</em>, the seat of government, is on the volcanic island of <em>Bioko</em> (formerly Fernando P\xF3), about 32 km from the Cameroonian coast and 240 km north of the country&rsquo;s mainland enclave (R\xEDo Muni). The country has been planning to relocate its capital to a purpose-built city, <em>Ciudad de la Paz</em> (formerly Oyala), in the interior of R\xEDo Muni since 2007 \u2014 partly because of Bioko&rsquo;s vulnerability to volcanic activity (Bioko is geologically part of the Cameroon Volcanic Line) and partly because of the political optics of a continental country governed from an island. Construction has progressed in fits; as of 2025 some ministries have moved, but Malabo remains the principal capital. The arrangement is one of only a handful in the world (Tanzania&rsquo;s Dodoma vs. Dar-es-Salaam, C\xF4te d&rsquo;Ivoire&rsquo;s Yamoussoukro vs. Abidjan) where the political and practical capitals diverge geographically. Source: CIA <em>World Factbook</em>; Government of Equatorial Guinea, "Plan Nacional de Desarrollo Econ\xF3mico y Social Horizonte 2035."`), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "A closing note on what maps owe us" }), /* @__PURE__ */ React.createElement(P, null, `The pleasure of geographic trivia is that it depends on slow, careful, documentary work \u2014 surveys, treaties, cores drilled into glaciers, vegetation indices computed from satellites, parliamentary acts ratifying boundary agreements that nobody reads. Each fact above is the visible tip of a long invisible labour: the boundary commissioners who walked the 49th parallel for fifty years, the Croatian survey engineer who sat d
