(Sec, { n: "15", title: "Competitive Landscape" }, /* @__PURE__ */ React.createElement(LandDiag, null), /* @__PURE__ */ React.createElement(Cap, null, "Glass-box model landscape. EBM (green, centre) leads on accuracy among interpretable models. GAMI-Net, NAM, NODE-GAM are neural GAM variants. XGBoost (red, right) is the black-box accuracy ceiling. CALMs (arXiv 2602.16503, Feb 2026) are the newest competitor."), /* @__PURE__ */ React.createElement(P, null, `<strong>EBM vs. linear/logistic regression:</strong> EBMs are strictly better when non-linear relationships exist (they almost always do). Regression wins only when extreme simplicity is required (coefficient-based interpretation, massive datasets, sub-millisecond training). <strong>EBM vs. XGBoost + SHAP:</strong> comparable accuracy on most tabular datasets, but EBM provides exact global + local explanations by construction. XGBoost may be 1-3% more accurate on interaction-heavy tasks. <strong>EBM vs. GAMI-Net</strong> (neural GAM, Zebin Yang et al.): GAMI-Net uses neural networks for shape functions instead of trees; theoretically more flexible but harder to train and less stable. <strong>EBM vs. NAM</strong> (Neural Additive Models, Google Brain, Agarwal et al. 2021): similar concept with neural networks; less mature, higher computational cost. <strong>EBM vs. NODE-GAM:</strong> differentiable oblivious trees; research-stage. <strong>EBM vs. RuleFit:</strong> rule-based, less accurate, but human-readable rules. <strong>EBM vs. CALMs</strong> (arXiv 2602.16503, Feb 2026): Conditionally Additive Local Models use region-specific shape functions \u2014 multiple univariate effects per feature, each active in different input regions. CALMs claim to balance GAM interpretability with GA\xB2M accuracy.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "When EBM wins vs. alternatives" }, `<strong>EBM wins:</strong> tabular data, under 500 features, need exact global explanations, regulatory compliance, model editing, mixed feature types. <strong>XGBoost wins:</strong> interaction-heavy tasks, 500+ features, training speed priority. <strong>Linear regression wins:</strong> extreme simplicity needed, massive datasets, coefficient interpretation.`)), /* @__PURE__ */ React.createElement(Sec, { n: "16", title: "Production Deployment" }, /* @__PURE__ */ React.createElement(P, null, `EBMs are one of the fastest models at prediction time. Because prediction involves simple lookups (bin the feature value, read the contribution from the lookup table) and a single sum, EBMs execute in microseconds per instance \u2014 often faster than tree ensembles that must traverse hundreds of decision trees. The model's memory footprint is also small: just the lookup tables and intercept.`), /* @__PURE__ */ React.createElement(P, null, `For deployment, EBMs are serialised via pickle or joblib, loaded in a Flask/FastAPI endpoint, and serve predictions with per-instance explanations at no additional cost. Every prediction comes with a free, exact decomposition into feature contributions. No SHAP computation, no TreeSHAP overhead, no explanation latency. The shape function lookup that produces the prediction IS the explanation.`), /* @__PURE__ */ React.createElement(NB, { title: "09_deploy.py", n: 9 }, `import pickle
