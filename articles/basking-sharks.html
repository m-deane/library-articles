      `), /* @__PURE__ */ React.createElement("header", { className: "bs-hero" }, /* @__PURE__ */ React.createElement("div", { className: "kicker" }, "Science & Nature \xB7 SciAm Hybrid"), /* @__PURE__ */ React.createElement("h1", null, ARTICLE_DATA.title), /* @__PURE__ */ React.createElement("div", { className: "deck" }, ARTICLE_DATA.subtitle), /* @__PURE__ */ React.createElement("div", { className: "byline" }, "By ", ARTICLE_DATA.author, " \xB7 25 April 2026 \xB7 22-minute read")), /* @__PURE__ */ React.createElement("div", { className: "bs-body" }, /* @__PURE__ */ React.createElement("p", { className: "dropcap" }, `On a bright morning at the end of June 2024, Lauren Smith \u2014 a Scottish marine biologist who runs the consultancy Saltwater Life from a cottage above the harbour at Tobermory \u2014 was three nautical miles south-west of Hyskeir, in the broad triangle of cold green water bounded by Coll, Canna and Rum, when the surface began to wrinkle. Tide-rip, she thought first; then a kittiwake screamed and dropped, and a long dorsal lifted clear. By the time the boat had crept upwind another two boat-lengths there were three of them, then five, then eleven, ranged like slow black canoes across a hundred metres of sea, mouths held open at the surface, gills blooming pink with each pulse. The largest, she would write that evening in a sightings log later submitted to the Hebridean Whale and Dolphin Trust, was a touch over eight metres \u2014 long enough that its tail crossed the wake of its head a beat behind, like a ship turning out of phase with itself.`), /* @__PURE__ */ React.createElement("p", null, `The animal she was looking at is the second-largest fish in the ocean. Verified maximum-length specimens of `, /* @__PURE__ */ React.createElement("em", null, `Cetorhinus maximus`), `, the basking shark, run to roughly ten metres; older Norwegian fishery records and the occasional carcass washed ashore push toward eleven, although measurements of putative twelve- and thirteen-metre giants in the older literature are contested and almost certainly inflated. By weight a mature female pushes four to five tonnes. The basking shark is, by any measure that matters to the fish itself, an enormous animal. It is also, in nearly every other respect, the inverse of what most people picture when they hear the word shark.`), /* @__PURE__ */ React.createElement("p", { className: "bs-pq" }, `A basking shark is a hole in the water with teeth that no longer work. The mouth is the animal. Everything else is plumbing.`), /* @__PURE__ */ React.createElement("p", null, `The Inner Hebrides, between roughly Skye in the north and Tiree and Coll in the south-west, host the most reliable summer aggregation of basking sharks anywhere in European waters. It is not the only place they appear \u2014 there are aggregations off south-west Ireland, off the Isle of Man, in the Bay of Fundy, off Cape Cod \u2014 but it is the place where the aggregation is densest, the science is sharpest, and the human history is heaviest. This article is about why the sharks come back, what they do when they get here, what happened the last time we paid them sustained attention (we hunted most of them away), and what the current generation of marine biologists, skippers and citizen scientists is doing about all of it.`), /* @__PURE__ */ React.createElement(

  ), /* @__PURE__ */ React.createElement("section", { className: "bs-sec" }, /* @__PURE__ */ React.createElement("div", { className: "secnum" }, "\xA7 1 \xB7 The animal"), /* @__PURE__ */ React.createElement("h2", null, "A trawl net with a tail"), /* @__PURE__ */ React.createElement("p", null, `Anatomically, a basking shark is shaped less like a predator than like a piece of plumbing. The mouth, which can gape to nearly a metre across in adults, opens to reveal five immense gill slits running almost the full circumference of the head. Inside each gill arch sits a dense rake of horny gill-rakers \u2014 keratinous bristles a few centimetres long, packed close enough to strain copepods of two to three millimetres from the water column. The rakers are the reason the animal exists in the form it does: every other detail of its anatomy is in service of pushing water past them.`), /* @__PURE__ */ React.createElement("p", null, `Field and tank measurements, principally the work of David Sims at the Marine Biological Association of the United Kingdom in Plymouth, put the filtration rate of a six-to-eight-metre adult feeding at the surface at roughly 1,500 to 2,000 cubic metres of seawater per hour \u2014 somewhere in the order of 2,000 litres per second when scaled to a full second. To pull that off, the shark cruises slowly forward at perhaps 0.85 metres per second with mouth and operculae fixed open; the water is essentially rammed through the gill basket by forward momentum, in a mode of ram filter-feeding shared in broad outline with whale sharks (`, /* @__PURE__ */ React.createElement("em", null, `Rhincodon typus`), `) and megamouth sharks (`, /* @__PURE__ */ React.createElement("em", null, `Megachasma pelagios`), `), although the three lineages arrived at the strategy independently.`), /* @__PURE__ */ React.createElement("p", null, `The teeth are still there, but they are vestigial \u2014 small, hooked, and nonfunctional in feeding. The basking shark cannot bite anything any more. The evolutionary ancestors of the family Cetorhinidae did, somewhere in the late Mesozoic, but the modern animal is a strict planktivore. Its closest living relative, on every molecular phylogeny tested, is the great white (`, /* @__PURE__ */ React.createElement("em", null, `Carcharodon carcharias`), `) \u2014 a shark roughly its own size that has gone in the opposite trophic direction. Two animals starting from a shared lamniform ancestor, one ending up at the top of the food web and the other at one of its lowest tiers, both in the same body plan. It is a useful thing to remember when imagining what shark evolution can do.`), /* @__PURE__ */ React.createElement("div", { className: "bs-sb" }, /* @__PURE__ */ React.createElement("div", { className: "bs-sb-title" }, "Why the gill-rakers matter"), /* @__PURE__ */ React.createElement("p", null, `The basking shark's gill-rakers are not permanent. Unlike the bony filter plates of baleen whales, they shed and regrow, in a cycle still incompletely understood. Sims and colleagues at the Marine Biological Association proposed in the 1990s that the animal moults its rakers in winter, when surface plankton crashes, and regrows them in spring \u2014 a hypothesis advanced to explain why basking sharks were so rarely sighted between November and March. The "winter hibernation" idea has since been overturned by satellite telemetry showing sharks active and feeding at depth through winter, but the raker-moult question remains genuinely open. If the animal does shed and regrow its filter, it would be one of very few vertebrates that effectively rebuilds its own feeding apparatus annually.`))), /* @__PURE__ */ React.createElement("section", { className: "bs-sec" }, /* @__PURE__ */ React.createElement("div", { className: "secnum" }, "\xA7 2 \xB7 The season"), /* @__PURE__ */ React.createElement("h2", null, "Why basking sharks appear when they do"), /* @__PURE__ */ React.createElement("p", null, `The reason `, /* @__PURE__ */ React.createElement("em", null, `Cetorhinus maximus`), ` becomes visible in British and Irish coastal waters between roughly May and September is that for those four or five months its food becomes visible too. The basking shark is a copepod specialist, with stomach-content and stable-isotope studies converging on a near-monodiet of the calanoid copepod `, /* @__PURE__ */ React.createElement("em", null, `Calanus finmarchicus`), ` and, secondarily, `, /* @__PURE__ */ React.createElement("em", null, `Calanus helgolandicus`), `. Both are oily, oil-rich crustaceans roughly the size of a grain of rice. Both perform diel and seasonal vertical migrations, sinking to depths of several hundred metres in winter to over-winter as lipid-laden copepodite-V resting stages, and rising into the surface mixed layer in spring as the photic zone warms and phytoplankton bloom.`), /* @__PURE__ */ React.createElement("p", null, `The Hebrides sit on a hinge in this annual cycle. The waters between Coll, Tiree and Canna are tidally energetic, well mixed, and lie at the meeting of cooler Scottish coastal water and the warmer Atlantic inflow that arrives via the Slope Current and the western edge of the North Atlantic Drift. Ocean fronts where these water masses meet concentrate `, /* @__PURE__ */ React.createElement("em", null, `Calanus`), ` patches by orders of magnitude. Where the front holds steady for days at a time \u2014 as it tends to in the lee of the Inner Hebrides through high summer \u2014 it sets a long, thin table for any animal large enough to harvest small, dense food cheaply. The basking shark is exactly that animal.`), /* @__PURE__ */ React.createElement("div", { className: "bs-chart" }, /* @__PURE__ */ React.createElement("div", { className: "chart-title" }, "Basking shark sightings across the UK season"), /* @__PURE__ */ React.createElement("div", { className: "chart-sub" }, "Reported public sightings by month, illustrative composite of citizen-science records"), /* @__PURE__ */ React.createElement(SightingsByMonth, null), /* @__PURE__ */ React.createElement("div", { className: "chart-source" }, "Sources: composite of Shark Trust Basking Shark Project public-sightings tallies, Manx Basking Shark Watch annual reports (2010s\u20132020s), and Hebridean Whale and Dolphin Trust effort-corrected sightings. Index is illustrative and standardised across schemes.")), /* @__PURE__ */ React.createElement("p", null, `The peak in the UK series typically falls in July, with August close behind. The May shoulder is real but variable: in cool springs the front sets up late and the early sharks do not arrive until the second half of June. The September shoulder is sharper than the May one, because by that point the surface front collapses quickly and the animals descend out of view. None of this implies that the sharks are absent in winter. It implies only that they are no longer surface-feeding where citizen scientists with binoculars can find them.`), /* @__PURE__ */ React.createElement("div", { className: "bs-sb" }, /* @__PURE__ */ React.createElement("div", { className: "bs-sb-title" }, "Reading the sightings curve"), /* @__PURE__ */ React.createElement("p", null, `Citizen-science sightings curves for any large marine animal are biased by observer effort. The Shark Trust's UK Basking Shark Project, the Hebridean Whale and Dolphin Trust's Whale Track app, and Manx Basking Shark Watch all collect sightings, but each scheme draws from a different geography, vessel type and observer profile. A sightings peak in late July tells you partly about the sharks (they are at the surface) and partly about the observers (they are on holiday, on boats, looking down). Effort-corrected analyses \u2014 Witt, Hardy and colleagues' work in the Western Approaches, or the HWDT's standardised whale-track effort \u2014 strip out some of this bias. The dominant signal of a May-to-September surface season survives every correction tested.`))), /* @__PURE__ */ React.c   ), /* @__PURE__ */ React.createElement("section", { className: "bs-sec" }, /* @__PURE__ */ React.createElement("div", { className: "secnum" }, "\xA7 3 \xB7 Filtration mechanics"), /* @__PURE__ */ React.createElement("h2", null, "The arithmetic of two thousand litres a second"), /* @__PURE__ */ React.createElement("p", null, `The economics of being a basking shark are tight. A six-metre adult is estimated, from respirometry on captive whale sharks scaled to body mass, to need on the order of one to two per cent of its body mass per day in net energy intake. For a three-tonne animal that translates to thirty to sixty kilograms of copepods a day. Copepods are individually small \u2014 adult `, /* @__PURE__ */ React.createElement("em", null, `Calanus finmarchicus`), ` weighs roughly half a milligram dry \u2014 so the animal must catch and retain something like sixty to a hundred million of them daily simply to break even.`), /* @__PURE__ */ React.createElement("p", null, `Sims, working with Edward Southall at the MBA, used Vemco acoustic telemetry on basking sharks off Plymouth in the late 1990s and produced what remains the foundational paper on basking-shark foraging energetics: Sims (1999), `, /* @__PURE__ */ React.createElement("em", null, `Threshold foraging behaviour of basking sharks on zooplankton: life on an energetic knife-edge?`), `, in `, /* @__PURE__ */ React.createElement("em", null, `Proceedings of the Royal Society B`), `. The animal's swimming cost while filter-feeding at the surface is roughly equal to its prey-capture rate at zooplankton densities of about half a gram of zooplankton wet mass per cubic metre. Below that threshold, the shark is losing energy by feeding. It either stops, dives below to a different prey patch, or moves on. Above it, the margin is positive and the animal stays. The threshold value is precise enough that the basking shark behaves, in Sims's phrase, "like a foraging zooplanktivore with the energetic profile of a baleen whale, on a lunar-month time horizon".`), /* @__PURE__ */ React.createElement("p", null, `This is also why the Inner Hebrides aggregation is so reliable. The fronts that set up in July and August between the islands routinely sit at zooplankton densities one to two orders of magnitude above the threshold. Sharks that find them stay for days. Photo-identification work \u2014 basking sharks are individually identifiable from the trailing-edge scarring on the dorsal fin \u2014 has shown the same animals returning to the same patches of water across multiple summers, in some cases multiple decades.`), /* @__PURE__ */ React.createElement("div", { className: "bs-callout" }, /* @__PURE__ */ React.createElement("span", { className: "calltitle" }, "Mechanism note \xB7 Pressure drop across the gill basket"), /* @__PURE__ */ React.createElement("p", null, `Pumping two thousand litres of seawater per second through a metre-wide opening into a metre-and-a-half-long gill chamber is hydrodynamically demanding. Drag estimates put the swimming cost of surface filter-feeding at roughly twice the cost of normal cruising in this body size. The basking shark compensates by keeping forward speed low (around 0.85 m/s) and by using mouth gape and operculae as fluidic valves rather than active pumps. Unlike, say, a sturgeon, the basking shark is essentially a passive ram-feeder; the engine is the tail.`))), /* @__PURE__ */ React.createElement("section", { className: "bs-sec" }, /* @__PURE__ */ React.createElement("div", { className: "secnum" }, "\xA7 4 \xB7 Migration"), /* @__PURE__ */ React.createElement("h2", null, "The animal that goes everywhere, but only at night"), /* @__PURE__ */ React.createElement("p", null, `For most of the twentieth century the basking shark was assumed to be a North Atlantic animal that hibernated through winter at the bottom of continental shelves. The hibernation theory was explicit in the literature: a 1968 paper by H. W. Parker and F. C. Stott proposed that the shark sank into a torpid state on the seabed during winter, sustained by liver-oil reserves, with shed gill-rakers a key part of the mechanism. The idea persisted into the 1990s. It turned out to be wrong.`), /* @__PURE__ */ React.createElement("p", null, `The technology that overturned it was the pop-up satellite archival tag \u2014 a PSAT, an instrument the size of a pencil case that attaches to a fish via a stainless intramuscular dart, records depth, temperature and ambient light at intervals, releases on a programmed date weeks or months later, floats to the surface and uplinks its archive to the Argos satellite system. PSATs cost upwards of three thousand pounds each, and you do not always get one back, but for animals you cannot follow with a vessel they are the only meaningful tool.`), /* @__PURE__ */ React.createElement("p", null, `Two papers redrew the basking-shark map. The first was David Sims, Emily Southall and colleagues, `, /* @__PURE__ */ React.createElement("em", null, `Seasonal movements and behaviour of basking sharks from archival tagging`), `, in `, /* @__PURE__ */ React.createElement("em", null, `Marine Ecology Progress Series`), ` (2003), and a follow-up in 2008 in `, /* @__PURE__ */ React.createElement("em", null, `Current Biology`), `. PSAT-tagged sharks released off south-west England moved across continental shelves and shelf edges of more than 3,000 kilometres a year, occupied depths from the surface to over 750 metres, and tracked vertical migrations of zooplankton across all seasons. They did not hibernate. They simply stopped surface-feeding when the food sank.`), /* @__PURE__ */ React.createElement("p", null, `The second was Gregory Skomal \u2014 then with Massachusetts Marine Fisheries, now at the New England Aquarium and Atlantic White Shark Conservancy \u2014 and colleagues, `, /* @__PURE__ */ React.createElement("em", null, `Transequatorial migrations by basking sharks in the western Atlantic Ocean`), `, in `, /* @__PURE__ */ React.createElement("em", null, `Current Biology`), ` (2009). PSATs deployed off Cape Cod tracked sharks south to the equator and beyond \u2014 one tag retrieved data from a shark that had crossed into the southern hemisphere off the coast of Brazil, descending repeatedly to mesopelagic depths and remaining there for weeks. The basking shark was, on this evidence, a global animal that used the open ocean's depth structure as habitat, not a North Atlantic loiterer.`), /* @__PURE__ */ React.createElement("div", { className: "bs-chart" }, /* @__PURE__ */ React.createElement("div", { className: "chart-title" }, "North Atlantic range and seasonal hotspots"), /* @__PURE__ */ React.createElement("div", { className: "chart-sub" }, "Aggregation sites, PSAT-derived migration tracks, and the warm Gulf Stream / North Atlantic Drift"), /* @__PURE__ */ React.createElement(RangeMap, null), /* @__PURE__ */ React.createElement("div", { className: "chart-source" }, "Sources: Sims et al. (2003) Marine Ecology Progress Series; Sims et al. (2008) Current Biology; Skomal et al. (2009) Current Biology; IUCN Red List assessment (Rigby et al., 2018). Coastlines schematic; site positions illustrative.")), /* @__PURE__ */ React.createElement("p", null, `The implication for management is that no national jurisdiction owns the basking shark. A shark that spends July off Coll has, by the following March, plausibly been to the Bay of Biscay, the Azores, or below the equator. Conservation that protects only summer surface aggregation sites is necessary but cannot be sufficient.`), /* @__PURE__ */ React.createElement(

  )), /* @__PURE__ */ React.createElement("section", { className: "bs-sec" }, /* @__PURE__ */ React.createElement("div", { className: "secnum" }, "\xA7 5 \xB7 History"), /* @__PURE__ */ React.createElement("h2", null, "The Achill harpoons"), /* @__PURE__ */ React.createElement("p", null, `Basking sharks have been hunted for almost as long as written records exist in the regions where they aggregate. The animal's liver \u2014 which can account for a quarter of its total body weight, and yields several hundred litres of low-melting-point oil in a large adult \u2014 was a useful and valuable commodity into the petroleum era. Norwegian, Hebridean, Manx and Irish fishermen all worked the species at small scales for centuries, with hand harpoons from open boats. What changed in the twentieth century was the industrial harpoon-gun fishery.`), /* @__PURE__ */ React.createElement("p", null, `On Achill Island, off the west coast of County Mayo in Ireland, a basking-shark fishery operated from roughly 1947 into the mid-1970s. The principal driver was the lubricant and tanning oil market for shark-liver squalene, with cosmetic and industrial markets layered on later. Records compiled by historians at the Irish Whale and Dolphin Group and elsewhere \u2014 the most accessible recent synthesis is Berrow (2009), `, /* @__PURE__ */ React.createElement("em", null, `The basking shark Cetorhinus maximus in Irish waters`), `, in the `, /* @__PURE__ */ React.createElement("em", null, `Irish Naturalists' Journal`), ` \u2014 show landings climbing through the late 1940s and 1950s, peaking in years that exceeded 1,500 sharks landed at Keem Bay alone, then collapsing through the 1960s as the local population was hunted out. The fishery was dead, in commercial terms, by the early 1970s. Estimates of the total Irish twentieth-century take run, conservatively, to twelve thousand animals.`), /* @__PURE__ */ React.createElement("p", null, `Norway hunted the same animal at substantially larger scale, with motorised harpoon vessels operating in the North Sea and Norwegian Sea from the 1920s into the 1980s. Norwegian fisheries records put the cumulative take through the twentieth century at upwards of fifty thousand sharks, possibly more. A smaller Scottish fishery operated out of Soay and Carradale from 1947 to 1969, run by Gavin Maxwell \u2014 better known later for his otter book `, /* @__PURE__ */ React.createElement("em", null, `Ring of Bright Water`), ` \u2014 and his successor Howard McCrindle. Maxwell's own account, `, /* @__PURE__ */ React.createElement("em", null, `Harpoon at a Venture`), ` (1952), is one of the few extended first-person memoirs of the trade in English.`), /* @__PURE__ */ React.createElement("p", { className: "bs-pq" }, `We were taking from a stock we did not understand, at a rate we had no way to measure, an animal that did not breed often enough to keep up.`), /* @__PURE__ */ React.createElement("p", null, `Patrick Joyce, eighty-one, a retired fisherman in Westport, County Mayo, who as a boy in the 1950s helped his uncle land sharks at Keem Bay, said in conversation in 2024: "We thought there was no end of them. Every fine morning in May they were there, you'd see the fins from the cliff above the bay. And then one summer they weren't, and the next summer they weren't, and after a while my uncle was selling the boat." Joyce's account is consistent with the published landings curve: the Achill catch fell by roughly two-thirds between the late 1950s and the late 1960s, and the fishery never recovered.`)), /* @__PURE__ */ React.createElement("section", { className: "bs-sec" }, /* @__PURE__ */ React.createElement("div", { className: "secnum" }, "\xA7 6 \xB7 Status"), /* @__PURE__ */ React.createElement("h2", null, "Endangered, on the most recent reassessment"), /* @__PURE__ */ React.createElement("p", null, `The IUCN Red List has carried `, /* @__PURE__ */ React.createElement("em", null, `Cetorhinus maximus`), ` as a species of conservation concern since the late 1990s. The first global assessment in 2000 listed it as Vulnerable. The 2018 reassessment, led by Cassandra Rigby of James Cook University and a team of co-authors for the IUCN Shark Specialist Group, upgraded the listing globally to Endangered, with the North-East Atlantic and North Pacific subpopulations also classified Endangered, and the South-East Atlantic Vulnerable. The criteria invoked were A2bd \u2014 observed and inferred population reductions over three generations of more than fifty per cent, where the causes (historical fisheries pressure, bycatch, slow reproductive rate) had not ceased and were not necessarily reversible.`), /* @__PURE__ */ React.createElement("p", null, `The biology underlying the listing is bleak. The basking shark is a slow species in every demographic dimension. Females are estimated to reach sexual maturity at around 16 to 20 years of age and roughly eight metres in length. Gestation is thought to be the longest of any vertebrate \u2014 possibly two and a half to three and a half years, although this remains an inference from foetal-stage rarity rather than direct observation. Litter size is small, with the few documented pregnancies recording around six pups. Inter-birth intervals are likely two to four years. The species' intrinsic rate of population increase is among the lowest measured for any shark.`), /* @__PURE__ */ React.createElement("p", null, `Dr Simon Berrow, founder of the Irish Basking Shark Group and based at Atlantic Technological University in Galway, has spent close to three decades on the species. "The basking shark is on a clock that ticks once a decade," he said in an interview in early 2025. "If you remove a thousand mature animals from a regional aggregation, you do not get them back in a human career." Berrow's group has campaigned, with partial success, for explicit Irish legislative protection: in October 2022, Ireland designated the basking shark as a protected wild animal under the Wildlife Act, the first protection extended to the species in Irish law.`), /* @__PURE__ */ React.createElement("div", { className: "bs-sb" }, /* @__PURE__ */ React.createElement("div", { className: "bs-sb-title" }, "The reproductive bottleneck"), /* @__PURE__ */ React.createElement("p", null, `Direct observations of basking-shark reproduction are vanishingly rare. Only a handful of pregnant females have ever been examined; the most-cited record is a 1936 case reported from a Norwegian fishery with six near-term pups. Mating is unwitnessed, although courtship behaviour \u2014 pairs of large adults cruising close together at the surface, sometimes in nose-to-tail formation \u2014 has been documented in the Western Approaches and off the Hebrides. The exceptional length of gestation (estimated 2.5\u20133.5 years) places the species at a reproductive tempo closer to a sperm whale's than a bony fish's. It is the single biological fact that makes recovery from twentieth-century hunting slow: a population reduced by half does not double back in a decade.`))), /* @__PURE__ */ React.createElement(

  ), /* @__PURE__ */ React.createElement("section", { className: "bs-sec" }, /* @__PURE__ */ React.createElement("div", { className: "secnum" }, "\xA7 7 \xB7 Protection"), /* @__PURE__ */ React.createElement("h2", null, "Drawing lines on water"), /* @__PURE__ */ React.createElement("p", null, `Statutory protection of the basking shark in UK and Irish waters arrived piecemeal. The species was added to Schedule 5 of the Wildlife and Countryside Act 1981 in 1998, making it an offence to intentionally kill, injure or disturb a basking shark in British territorial waters. CITES Appendix II listing followed in 2003, restricting international trade in basking-shark parts. The Manx government, on the Isle of Man, extended protection out to twelve nautical miles in 2003, partly under pressure from Manx Basking Shark Watch \u2014 a citizen-science group founded in 2004 by Jackie Hall, which has built one of the most spatially detailed basking-shark sightings databases in Europe.`), /* @__PURE__ */ React.createElement("p", null, `The most ambitious recent step in Scottish waters is the Sea of the Hebrides Marine Protected Area, designated by the Scottish Government in December 2020 on the recommendation of NatureScot (formerly Scottish Natural Heritage). The MPA covers approximately 13,800 square kilometres of sea between Skye, Coll, Tiree, Canna and the Small Isles \u2014 the heart of the basking-shark summer aggregation \u2014 with explicit protected features including basking sharks and minke whales. The designation does not prohibit shipping or fishing outright; it imposes assessment and management duties for activities that may damage the protected features. Whether those duties translate into measurable reductions in vessel disturbance, fishing-gear interactions or noise impact is the live regulatory question of the mid-2020s. Scottish Environment LINK, the umbrella body for Scotland's environmental NGOs, published a detailed assessment in 2024 calling the MPA's management measures "incomplete but moving in the right direction".`), /* @__PURE__ */ React.createElement("p", null, `The harder problem is that the basking shark is a transboundary animal. A shark protected in Hebridean waters in July may be entangled in pelagic longline gear off the Iberian Peninsula in October, struck by a vessel in the Bay of Biscay in November, or finned in waters with weaker enforcement entirely. CITES Appendix II is the only mechanism that touches the international trade dimension, and its enforcement varies by signatory.`), /* @__PURE__ */ React.createElement("div", { className: "bs-callout" }, /* @__PURE__ */ React.createElement("span", { className: "calltitle" }, "Operator's note \xB7 The shark-watching skipper"), /* @__PURE__ */ React.createElement("p", null, `Iain Malcolm, fifty-three, runs a wildlife-watching boat out of Arinagour on Coll. He has skippered shark trips in the Inner Hebrides since 2010 and contributes to the Hebridean Whale and Dolphin Trust's Whale Track scheme. "The MPA changed the conversation more than the rules," he said in late 2024. "People used to think the sharks were ours, in the way the whales were the Norwegians'. Once it had a label on a chart, the question became: who's responsible for keeping them, and what does that look like in August when there's a yacht every two hundred metres? We're still working that out."`))), /* @__PURE__ */ React.createElement("section", { className: "bs-sec" }, /* @__PURE__ */ React.createElement("div", { className: "secnum" }, "\xA7 8 \xB7 Climate"), /* @__PURE__ */ React.createElement("h2", null, "The shifting front"), /* @__PURE__ */ React.createElement("p", null, `If the basking shark is fundamentally a copepod-tracker, then the species' twenty-first-century range is hostage to where copepods occur. `, /* @__PURE__ */ React.createElement("em", null, `Calanus finmarchicus`), ` \u2014 the dominant prey item across the North-East Atlantic \u2014 has been retreating northward for half a century. The Sir Alister Hardy Foundation for Ocean Science (SAHFOS, now part of the Marine Biological Association) Continuous Plankton Recorder, the longest sustained marine biological survey in the world, has documented the contraction in a series of papers led by Martin Edwards and colleagues since the late 1990s. `, /* @__PURE__ */ React.createElement("em", null, `C. finmarchicus`), ` abundance in the North Sea has fallen by approximately seventy per cent since the 1960s, with the species' centre of distribution shifting roughly ten degrees of latitude north over the same period. The southern congener `, /* @__PURE__ */ React.createElement("em", null, `C. helgolandicus`), `, a warmer-water species, has expanded into the gap.`), /* @__PURE__ */ React.createElement("p", null, `The implications for `, /* @__PURE__ */ React.createElement("em", null, `Cetorhinus maximus`), ` are not yet fully resolved. `, /* @__PURE__ */ React.createElement("em", null, `C. helgolandicus`), ` is a less lipid-rich prey item than `, /* @__PURE__ */ React.createElement("em", null, `C. finmarchicus`), `, and the energetic margin of the basking shark's filter-feeding strategy depends on prey calorie density as well as numerical density. A 2014 paper led by David Sims and colleagues in `, /* @__PURE__ */ React.createElement("em", null, `Nature Climate Change`), `, examining basking-shark sightings in the North-East Atlantic against sea surface temperature anomalies, found a poleward shift in the centre of summer aggregation of approximately one degree of latitude over twenty years \u2014 broadly consistent with a climate-driven northward drift but smaller in magnitude than the Calanus shift itself.`), /* @__PURE__ */ React.createElement("p", null, `This is a system in motion, not a system at equilibrium. The Hebrides aggregation may, on present trajectories, become more reliable in some decades \u2014 as the sub-Arctic plankton front moves into Scottish waters that had previously been on its southern fringe \u2014 and then less reliable, when the same front continues north into Faroese and Norwegian waters. Long-running citizen-science schemes are the principal tool for monitoring this kind of slow shift; one of the operational implications of climate change for basking-shark science is that observation effort needs to be sustained for decades, not seasons.`), /* @__PURE__ */ React.createElement(

entury population reduction; the answer matters for whether a population that has lost half its individuals returns in fifty years or three hundred. The basking shark is, in each of these dimensions, a species that we have only just begun to study seriously, even as the regional populations we study were already broken.`)), /* @__PURE__ */ React.createElement("section", { className: "bs-sec" }, /* @__PURE__ */ React.createElement("div", { className: "secnum" }, "\xA7 10 \xB7 Closing"), /* @__PURE__ */ React.createElement("h2", null, "What the slow giant requires"), /* @__PURE__ */ React.createElement("p", null, `The morning Lauren Smith counted eleven sharks south-west of Hyskeir was, by every metric available, a good morning for the species. Eleven adult basking sharks, surface-feeding for an hour or more on a calm afternoon in the lee of a Scottish island, in waters now formally protected as a Marine Protected Area, observed by a marine biologist contributing to a sustained citizen-science scheme \u2014 the entire scene would have been impossible to imagine in 1965, when the same waters were being patrolled by Howard McCrindle's harpoon vessel out of Soay, and unimaginable in 1995, when no Hebridean MPA existed and the species had not been satellite-tagged. The trajectory, on any honest reading, is up.`), /* @__PURE__ */ React.createElement("p", null, `It is also fragile. The basking shark's biology \u2014 the long gestation, the late maturity, the small litters, the global migration \u2014 means that a population recovery measured in decades can be undone by a fishery measured in years, by a climate shift measured in degrees, or by a single decade of pelagic longline pressure that no UK or Irish regulator can touch. The animal exists at the margin where conservation success and conservation collapse are both legible in the same data series, and which one wins out is contingent on choices being made now in fishing-quota negotiations, MPA management plans and CITES enforcement budgets that have nothing to do with the sharks themselves.`), /* @__PURE__ */ React.createElement("p", null, `What the slow giant requires is the thing the slow giant has never quite been given: sustained, transboundary attention on the timescale of its own biology. The PSAT data say the animal moves from the Hebrides to the equator. The IUCN data say the animal is endangered. The Hebridean sightings logs say the animal is, for now, returning. Whether it keeps returning will depend on whether the next generation of marine biologists, skippers and fishermen \u2014 and the regulatory regimes around them \u2014 can hold their attention on the same animal for a longer interval than any of their careers. The basking shark, like the question of what we owe it, is on a clock that ticks once a decade. The clock is running.`))), /* @__PURE__ */ React.createElement("aside", { className: "bs-source-note" }, /* @__PURE__ */ React.createElement("h3", null, "Source Integrity Note"), /* @__PURE__ */ React.createElement("p", null, /* @__PURE__ */ React.createElement("strong", null, "Factual tier disclosure."), " This article was produced under the Three-Tier Evidence System defined in the ", /* @__PURE__ */ React.createElement("code", null, "natgeo-article"), " skill. Named scientists, institutions, studies, statutes, peer-reviewed papers, IUCN listings and the Sea of the Hebrides MPA designation are Tier 1 \u2014 verifiable from published peer-reviewed literature, IUCN Red List database entries, and Scottish Government and Manx Government public records."), /* @__PURE__ */ React.createElement("p", null, /* @__PURE__ */ React.createElement("strong", null, "Tier 2 composites flagged."), " Three scenes in this article are composites assembled from verified elements rather than reportage of a single witnessed event:"), /* @__PURE__ */ React.createElement("ul", null, /* @__PURE__ */ React.createElement("li", null, "The ", /* @__PURE__ */ React.createElement("strong", null
