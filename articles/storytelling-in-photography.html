  )), /* @__PURE__ */ React.createElement("div", { style: { maxWidth: 760, margin: "0 auto", padding: "60px 24px 80px" } }, /* @__PURE__ */ React.createElement(DC, null, `A photograph is not a sentence. It has no tense \u2014 only an implied past where the shutter fell \u2014 and no syntax beyond what the eye is pulled to first, second and third. And yet for nearly a century photographers have been borrowing the vocabulary of narrative as if these limits were features rather than constraints. They have spoken of acts and turning points, of chapters and codas, of beats and pacing. The borrowing is not merely metaphorical. The best photographic stories \u2014 Henri Cartier-Bresson&apos;s street fragments, W. Eugene Smith&apos;s long-form Life essays, Sebasti\xE3o Salgado&apos;s Genesis, Nan Goldin&apos;s Ballad \u2014 work on us through structures that any novelist or screenwriter would recognise. This article is a reference for those structures: the architecture, the lexicon, and the small craft decisions that turn a stack of images into something with a beginning, a middle and an end.`), /* @__PURE__ */ React.createElement(P, null, `The argument running underneath is simple. A picture by itself is a noun: a thing held still. A picture in sequence \u2014 paired, captioned, paced against another picture \u2014 becomes a verb. It begins to do something. The decisive moment, the photo essay, the layered frame, the carousel and the zine are all instruments for converting nouns into verbs. Each has its own conventions and its own canonical practitioners. This is a tour through them.`), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "1 \xB7 The three-act arc, photographically" }), /* @__PURE__ */ React.createElement(P, null, `Aristotle&apos;s observation in the <em>Poetics</em> that a story has a beginning, a middle and an end is so familiar it sounds banal until one tries to make a photo essay without one. The three-act structure \u2014 establishing, complication, resolution \u2014 entered photography most explicitly in the long-form picture stories that <em>Life</em> magazine pioneered in the late 1930s and refined through the 1940s and 1950s. The picture editor Wilson Hicks, who shaped <em>Life</em>&apos;s essay form for two decades, codified the working practice in his 1952 book <em>Words and Pictures: An Introduction to Photojournalism</em>. The book is, in retrospect, the first proper textbook of photographic narrative.`), /* @__PURE__ */ React.createElement(P, null, `The shape is straightforward in description and demanding in practice. Act I establishes \u2014 a place, a person, a problem. The opening frame is conventionally a wide shot: it tells the reader where they are. Act II complicates \u2014 the problem deepens, a counter-force enters, a turning point arrives. The middle is where pacing matters most: too many wide frames in a row and the eye glazes; too many details and the geography is lost. Act III resolves \u2014 not necessarily happily, but conclusively. A closing wide frame, or a quiet detail, sends the reader out of the sequence the way a final cadence sends a listener out of a piece of music.`), /* @__PURE__ */ React.createElement(ThreeActArc, null), /* @__PURE__ */ React.createElement(IC, { func: "Diagram", caption: "The three-act arc, mapped onto a photo essay. Adapted from W. Eugene Smith's 'Country Doctor' (Life, 20 September 1948)." }), /* @__PURE__ */ React.createElement(P, null, `The arc is descriptive, not prescriptive. Plenty of photographic stories work without it \u2014 Daido Moriyama&apos;s <em>Bye Bye Photography</em> (1972) is a deliberate refusal of resolution, and Robert Frank&apos;s <em>The Americans</em> (Les Am\xE9ricains, 1958) is constructed by rhyme rather than plot. But for the working photojournalist on assignment, the arc is the default scaffold for a reason: it is the shape an editor expects, the shape a magazine layout supports, and the later, <em>National Geographic</em>.`), /* @__PURE__ */ React.createElement(SB, { title: "The classic Magnum-pattern essay" }, `A working frame, refined inside the Magnum cooperative across the 1950s and 1960s, holds that a long-form

age forty. Salgado&apos;s solution, executed by L\xE9lia Wanick Salgado in the editing, is the chapter break. Each chapter is given its own internal arc, its own opening wide, its own climactic frame, its own coda. The reader is permitted to come up for air between chapters before being submerged again. The technique is borrowed directly from the long novel \u2014 and it works for the same reason it works there.`), /* @__PURE__ */ React.createElement(PQ, null, '"I want to photograph the world as it was before mankind started to colonise it."', /* @__PURE__ */ React.createElement("div", { style: { fontFamily: F.sans, fontStyle: "normal", fontSize: 14, color: C.muted, marginTop: 12 } }, "\u2014 Sebasti\xE3o Salgado, on ", /* @__PURE__ */ React.createElement("em", null, "Genesis"), ', in his TED talk "The silent drama of photography," March 2013')), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "5 \xB7 Story in a single frame \u2014 Alex Webb" }), /* @__PURE__ */ React.createElement(P, null, `Most of what has been said so far concerns story across a sequence. The opposite proposition \u2014 that an entire story can be told in one frame \u2014 is the principle behind the layered street photograph, and its modern master is the American photographer Alex Webb, a member of Magnum since 1979. Webb&apos;s frames typically contain four or five distinct planes of action \u2014 a foreground figure, a middle-ground gesture, a reflection in a window, a distant silhouette \u2014 each of which would, alone, be a perfectly competent photograph. The story is in their coexistence.`), /* @__PURE__ */ React.createElement(P, null, `Webb has worked principally in colour, in countries where strong sunlight produces hard shadows that he uses architecturally \u2014 Haiti, Mexico, Cuba, Florida, Istanbul. His books, including <em>Hot Light / Half-Made Worlds: Photographs from the Tropics</em> (1986), <em>Crossings</em> (2003) and <em>Istanbul urnalism. There is no protagonist, no plot, no climax in any conventional sense. Instead, frames accumulate by association: a fish on ice next to a pale sky next to a child&apos;s hand next to a bowl of broth. The reader builds the story themselves.`), /* @__PURE__ */ React.createElement(P, null, `Kawauchi&apos;s work won the 2002 Kimura Ihei Award, Japan&apos;s most prestigious photography prize for emerging photographers, and was instrumental in introducing a non-Western model of photo-book sequencing to international audiences. Her later books \u2014 <em>Illuminance</em> (2011, Aperture), which gathered fifteen years of work, and <em>Halo</em> (2017) \u2014 extended the same approach across longer arcs. The structural innovation is the use of <em>ma</em>, the Japanese aesthetic concept of negative space or interval, as a sequencing principle: a quiet frame between two louder frames is doing structural work, not filling space.`), /* @__PURE__ */ React.createElement(P, null, `What the poetic sequence demonstrates, against the magazine-essay tradition, is that storytelling in photography does not require a plot. It requires only that the order of pictures matter \u2014 that swapping two of them would change the experience. By that minimal definition, Kawauchi&apos;s books are as rigorously sequenced as Smith&apos;s "Country Doctor", and her quiet pages of sky and steam are as load-bearing as Smith&apos;s climactic surgery frame.`), /* @__PURE__ */ React.createElement(EssayGrid, null), /* @__PURE__ */ React.createElement(IC, { func: "Diagram", caption: "A nine-image essay grid annotated with wide / medium / detail pacing. The decisive frame falls late, in the lower middle row." }), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "7 \xB7 Intimate long-form \u2014 Nan Goldin's Ballad" }), /* @__PURE__ */ React.createElement(P, null, `Nan Goldin&apos;s <em>The Ballad of Sexual Dependency</em> began as a slideshow projected to live audiences in New York clubs and lofts from 1979 onward, and was first published as a book by Aperture in 1986. It contains around 700 photographs in its slideshow form \u2014 Goldin has continued to revise it across four decades \u2014 and roughly 125 in the book. The pictures are taken inside Goldin&apos;s own life: her friends, her lovers, the queer and post-punk communities she lived among in the Bowery, in Berlin, in Provincetown. There are images of bruised faces, of beds, of bathrooms, of people making love, of people dying. The work is a long-form story told from inside its own subject.`), /* @__PURE__ */ React.createElement(P, null, `Goldin gave the form its conceptual frame in the introduction to the 1986 book: "The diary is my form of control over my life. It allows me to obsessively record every detail." The Ballad is a diary that learned to be edited. Its sequencing \u2014 set, in the slideshow version, to a soundtrack that includes the Velvet Underground, Maria Callas and James Brown \u2014 operates by emotional rhythm rather than by plot: euphoria, intimacy, violence, recovery, loss. The form has been hugely consequential. Most contemporary "personal documentary" practice \u2014 Larry Sultan&apos;s <em>Pictures from Home</em> (1992), LaToya Ruby Frazier&apos;s <em>The Notion of Family</em> (2014), Sally Mann&apos;s <em>Immediate Family</em> (1992) \u2014 works in territory that Goldin&apos;s Ballad opened up.`), /* @__PURE__ */ React.createElement(PQ, null, '"The diary is my form of control over my life. It allows me to obsessively record every detail."', /* @__PURE__ */ React.createElement("div", { style: { fontFamily: F.sans, fontStyle: "normal", fontSize: 14, color: C.muted, marginTop: 12 } }, "\u2014 Nan Goldin, introduction to ", /* @__PURE__ */ React.createElement("em", null, "The Ballad of Sexual Dependency"), ", Aperture, 1986")), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "8 \xB7
