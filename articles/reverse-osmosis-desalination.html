  } }, "Reverse osmosis was supposed to solve humanity's water crisis. It has come closer than any technology in history \u2014 and in doing so, has created crises of its own."), /* @__PURE__ */ React.createElement("div", { style: { fontFamily: "'Source Sans 3',sans-serif", fontSize: 11, color: "rgba(255,255,255,0.45)", letterSpacing: 1, textAlign: "right" } }, "A seawater reverse osmosis facility \u2014 50,000 tonnes of pressurised membrane, 55 bar of applied force, and a question that has no clean answer."))), /* @__PURE__ */ React.createElement("div", { style: { maxWidth: 740, margin: "0 auto", padding: "64px 24px 80px" } }, /* @__PURE__ */ React.createElement(DC, null, "n the third floor of a building on Yale University's science hill, inside a laboratory that smells of polymer solvents and calibration fluid, a researcher holds a membrane up to fluorescent light. It is roughly the size of a coffee filter \u2014 off-white, almost translucent, thinner than a human hair. Through it, at pressures exceeding 55 bar, passes some of the most expensive water on Earth. At those pressures, a standard automobile tyre would explode. Here, in this unremarkable disc of cross-linked polyamide, the physics of global water security plays out at the molecular level."), /* @__PURE__ */ React.createElement(Para, null, "The lab belongs to Menachem Elimelech, the Sterling Professor of Chemical and Environmental Engineering at Yale \u2014 one of the most cited water scientists alive, and a man who has spent four decades trying to understand something that most engineers assumed they had already understood. In April 2023, his group published a paper in ", /* @__PURE__ */ React.createElement("em", null, "Science Advances"), " that upended the field's central assumption: the solution-diffusion model, which had described how water moves through reverse osmosis membranes since the 1960s, is, Elimelech's simulations show, fundamentally wrong. Water does not dissolve into the membrane and diffuse down a concentration gradient. It travels in clusters, driven by pressure changes through a network of nanometre-scale pores. The implications are profound. Fifty years of membrane engineering, Elimelech argues, were optimised around a faulty model. Some of the most promising research dead ends of the past two decades may not have been dead ends at all \u2014 they were simply designed for the wrong physics."), /* @__PURE__ */ React.createElement(Para, null, "This is not a story only about chemistry. It is a story about what happens when a technology that works \u2014 that genuinely works, that has turned seawater into drinking water for hundreds of millions of people across the world's most water-stressed geographies \u2014 begins to reveal the limits that no amount of engineering elegance can resolve. Reverse osmosis desalination has reduced the cost of producing freshwater from the sea by a factor of five in forty years. It has allowed Israel to produce more water than it needs in a country that once faced existential drought. It has kept the taps running in Chennai during a 2019 crisis that made international headlines when the city's reservoirs ran dry. It powers the ambitions of NEOM, Saudi Arabia's $500-billion city-in-the-desert, which plans to run a 500,000-cubic-metre-per-day desalination plant entirely on renewable energy. And it produces, as an inescapable byproduct, approximately 142 million cubic metres of hypersaline brine every single day \u2014 enough to fill 57,000 Olympic swimming pools \u2014 which is pumped back into the oceans that supplied it, with consequences that marine scientists are only beginning to measure."), /* @__PURE__ */ React.createElement(PullQuote, null, '"Some of the assumptions in the old theory simply do not make sense. We have been designing membranes for fifty years without understanding what is actually happening inside them."'), /* @__PURE__ */ React.createElement(

      label: "Establishing",
      caption: "A seawater reverse osmosis facility showing the pressure vessel arrays \u2014 the white cylinders stacked in racks \u2014 each containing seven or eight spiral-wound membrane modules. Commercial SWRO systems operate at 55\u201383 bar, roughly 800 times atmospheric pressure. The mathematics of scarcity made physical."

  ), /* @__PURE__ */ React.createElement(SectionLabel, null, "I. The Physics of Pressure"), /* @__PURE__ */ React.createElement(Para, null, "To understand what Elimelech overturned, you need to understand what reverse osmosis is reversing. Osmosis \u2014 ordinary osmosis, the kind that moves water across the membranes of every living cell \u2014 is driven by concentration gradients. A dilute solution on one side of a semipermeable membrane, a concentrated solution on the other: water moves, spontaneously, toward the concentration, driven by the thermodynamic imperative to equalise. This is why plant roots draw moisture from soil, why red blood cells swell and burst in pure water. Nature runs on osmosis."), /* @__PURE__ */ React.createElement(Para, null, "Reverse osmosis runs against it. Apply sufficient pressure to the concentrated side \u2014 to seawater, at roughly 27 bar of osmotic pressure for typical ocean salinity \u2014 and you force the process into reverse. Water molecules squeeze through the membrane. Salt ions, too large and electrostatically repelled, stay behind. The result is freshwater on one side, increasingly concentrated brine on the other. The process was first demonstrated at practical scale in 1965, when a UCLA research team led by Sidney Loeb and Srinivasa Sourirajan produced the first viable cellulose acetate membrane and ran the world's first reverse osmosis desalination plant in Coalinga, California \u2014 a facility that produced just 5,000 gallons per day. Today's plants produce 500,000 cubic metres."), /* @__PURE__ */ React.createElement(Para, null, "The standard explanation for how water moves through the membrane \u2014 the solution-diffusion model \u2014 assumed that water molecules dissolved into the dense polymer matrix, separated from each other, and diffused individually along a concentration gradient through the material. For fifty years, this model was taught in textbooks and used to design membranes. Elimelech's group, using molecular dynamics simulations validated by direct experiment, found that the membrane is not as dense as the model assumes. There are pores \u2014 nanometre-scale, but pores. Water moves through them in clusters, propelled by pressure differentials within the membrane itself. The distinction matters because it changes what an engineer should optimise. If the old model was correct, making a membrane thinner would always increase flux. The new model predicts a more nuanced relationship, and suggests that certain material architectures long dismissed as impractical may, in fact, be exactly what the field needs."), /* @__PURE__ */ React.createElement(EnergyChart, null), /* @__PURE__ */ React.createElement(Cap, { label: "Data", text: "The energy cost of seawater reverse osmosis has fallen more than tenfold since the 1970s, driven by better membranes, high-efficiency pumps, and pressure-exchanger energy recovery devices that now return up to 95% of rejected brine energy. The thermodynamic minimum \u2014 1.1 kWh/m\xB3 \u2014 represents a floor that physics, not engineering, imposes." }), /* @__PURE__ */ React.createElement(SB, { title: "How a Spiral-Wound Membrane Module Works" }, /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 12px" } }, "The workhorse of commercial desalination is not a flat sheet but a spiral. Two membrane envelopes are wound around a central permeate collection tube, separated by a mesh spacer that creates the feed channel. Seawater enters one end under pressure, sweeping across the membrane surface in cross-flow \u2014 the velocity prevents salt from accumulating on the surface (a phenomenon called concentration polarisation). Water that passes through the membrane spirals inward toward the collection tube. The rejected brine exits the other end, still under pressure."), /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 12px" } }, "A standard commercial module is eight inches in diameter and forty inches long, housing roughly 37 square metres of membrane area. Industrial pressure vessels stack seven or eight such elements end-to-end. A large desalination plant may contain tens of thousands of pressure vessels arranged in parallel arrays \u2014 the white-cylinders-on-racks that define the aesthetic of every modern facility."), /* @__PURE__ */ React.createElement("p", { style: { margin: 0 } }, "Israel's Sorek plant, built by IDE Technologies, innovated by using sixteen-inch-diameter elements \u2014 twice the standard size \u2014 arranged vertically rather than horizontally. The larger format reduces the number of pressure vessels required, cutting capital costs significantly. Sorek 2, commissioned in 2024, achieved a production price of $0.41 per cubic metre \u2014 the lowest ever recorded for seawater desalination.")), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(SectionLabel, null, "II. The Infrastructure of Necessity"), /* @__PURE__ */ React.createElement(Para, null, "Stand at the fence of the Ras Al Khair desalination complex on Saudi Arabia's eastern Gulf coast and the scale of the enterprise becomes briefly incomprehensible. The facility \u2014 located on a stretch of coast 75 kilometres northwest of Jubail \u2014 occupies an area larger than the island of Manhattan's Financial District. Its hybrid architecture combines thermal multi-stage flash distillation and reverse osmosis in parallel, producing nearly 3 million cubic metres of water per day. It also generates 2,400 megawatts of electricity. Together, the facility and its twin at Shuaiba supply the freshwater needs of Riyadh, a capital city of seven million people located 400 kilometres inland from any coastline, in one of the driest places on the planet."), /* @__PURE__ */ React.createElement(Para, null, "Saudi Arabia accounts for more than 25 percent of global desalinated water capacity, operating 30 to 32 plants across 17 coastal locations. The kingdom draws roughly 70 percent of its municipal water supply from these facilities \u2014 a figure that would have seemed a dystopian fantasy in 1970 and is now simply how the country works. The MENA region as a whole, according to a 2024 study published in ", /* @__PURE__ */ React.createElement("em", null, "Nature"), ", accounts for 41.8 percent of global operational desalination capacity, with approximately 5,000 plants producing 28.96 million cubic metres of water per day. Governments across the region are contracted to nearly double this capacity between 2024 and 2028. The $53.4 billion the region invested in desalination infrastructure between 2006 and 2024 \u2014 47.5 percent of total global spending \u2014 is projected to reach $100 billion by 2030."), /* @__PURE__ */ React.createElement(CapacityChart, null), /* @__PURE__ */ React.createElement(Cap, { label: "Data", text: "MENA's dominance of global desalination capacity reflects a simple geographic reality: the region contains five of the world's most water-stressed nations, sits atop the world's largest fossil fuel reserves, and borders an ocean too salty, too warm, and too enclosed to recover easily from what we pump back into it." }), /* @__PURE__ */ React.createElement(Para, null, "The economics driving this expansion have shifted with remarkable speed. In 2000, producing a cubic metre of desalinated seawater cost approximately $2.10. By 2020, the figure had fallen to around $0.55. Projects in Saudi Arabia and the UAE in recent years have achieved prices below $0.50 per cubic metre. The drivers are well understood: better membranes with higher salt rejection and water flux, energy recovery devices (pressure exchangers) that recapture up to 95 percent of the kinetic energy in the rejected brine stream, and the replacement of energy-hungry thermal distillation with membrane-based reverse osmosis, which the International Desalination Association reports now accounts for over 90 percent of new desalination capacity contracted between 2020 and 2024. Modern seawater RO consumes between 2.5 and 4 kilowatt-hours per cubic metre. Thermal distillation consumes 5 to 12."), /* @__PURE__ */ React.createElement(

      caption: "The Ras Al Khair complex on Saudi Arabia's eastern Gulf coast \u2014 one of the largest co-generation facilities in the world, producing nearly 3 million cubic metres of water and 2,400 megawatts of electricity per day. Its existence is the answer to a political question as much as a technical one: where does a landlocked capital city of seven million get its water?"

  ), /* @__PURE__ */ React.createElement(SectionLabel, null, "III. A City on the Edge of Dry"), /* @__PURE__ */ React.createElement(Para, null, "On 19 June 2019, the four reservoirs that supply Chennai \u2014 India's sixth-largest city, home to eleven million people on the Bay of Bengal \u2014 reached what water engineers call Day Zero. Not low. Not depleted. Zero. The taps across the city ran dry simultaneously. Chennai became the first major city of the 21st century to experience total municipal water failure, and the crisis played out with a particular cruelty: tanker trucks queued for hours at the few functioning groundwater sources; hotels and restaurants closed; IT companies \u2014 Chennai is a major technology hub \u2014 bussed their employees to facilities in other states. Water prices in the informal tanker market rose by a factor of four in a week."), /* @__PURE__ */ React.createElement(Para, null, "Chennai has no perennial river. It is entirely dependent on its four reservoirs, recharged by the northeast monsoon, and on an overexploited coastal aquifer. In 1998, when India's worst drought in 900 years triggered a national reckoning with water security, the Tamil Nadu government began planning desalination as a permanent hedge against monsoon failure. The first plant \u2014 the 100-million-litre-per-day Minjur facility, north of the city \u2014 came online in 2010. The Nemmeli plant followed. Together they provided a critical buffer during the 2019 crisis, but the crisis still happened. By 2024, when the Chennai Metropolitan Water Supply and Sewerage Board operated three plants with a combined capacity of 48 million gallons per day, those plants provided the city's only reliable supply during a severe heatwave that left the major reservoirs at 56.2 percent capacity."), /* @__PURE__ */ React.createElement(

      caption: "Chennai, June 2019: queues for tanker water during the city's total municipal supply failure. The crisis drove political pressure for rapid desalination expansion \u2014 the city has since tripled its plant capacity and is under construction on a fourth facility, the 400-million-litre-per-day Perur plant. But engineers and economists debate whether desalination alone can solve what is also a problem of governance and pipe leakage."
    }
  ), /* @__PURE__ */ React.createElement(Para, null, "The World Bank and environmental economists have argued, with some justification, that desalination is not Chennai's most cost-effective option \u2014 that fixing the city's leaky distribution network, aggressive rainwater harvesting, and tariff reform would deliver more water per rupee spent. This argument is correct on its own terms, and it misses the political reality. In a city where monsoon failure is now routine and aquifer depletion irreversible, desalination offers something the other interventions do not: supply that is independent of the sky. The Perur plant, with 400 million litres per day of capacity designed to serve Chennai for fifty years, is currently under construction. When it opens, it will be one of the largest desalination facilities in South Asia."), /* @__PURE__ */ React.createElement(SB, { title: "The Thermodynamics of Salt Removal" }, /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 12px" } }, "Removing salt from seawater has a thermodynamic cost that cannot be engineered away. The minimum energy required \u2014 set by the laws of thermodynamics, not by the limitations of current technology \u2014 is approximately 1.06 to 1.1 kilowatt-hours per cubic metre of freshwater produced. This is the energy needed simply to separate salt from water at typical seawater concentrations, in an ideal system with perfect recovery and zero losses."), /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 12px" } }, "Current best-in-class SWRO systems achieve roughly 2.5 kWh/m\xB3 \u2014 about 2.3 times the theoretical minimum. The gap between actual and theoretical performance is not primarily a membrane problem. The major losses occur in the system: the energy needed to pressurise the feed, the concentration polarisation effect at the membrane surface, and the irreversibility of brine discharge. Even perfect membranes would not close the gap entirely."), /* @__PURE__ */ React.createElement("p", { style: { margin: 0 } }, "This matters because it sets a ceiling on expectations for next-generation membranes. Aquaporin-based and graphene oxide membranes offer significantly higher water flux per unit area \u2014 but as Elimelech and colleagues have shown in multiple papers, higher-permeability membranes do not automatically translate to lower energy consumption in seawater RO systems, because the energy cost is dominated by thermodynamics, not by membrane resistance.")), /* @__PURE__ */ React.createElement(PullQuote, null, '"The four reservoirs that supply Chennai reached zero simultaneously. Not low. Zero. And the taps across a city of eleven million people ran dry."'), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(SectionLabel, null, "IV. The Brine Equation"), /* @__PURE__ */ React.createElement(Para, null, "For every cubic metre of drinking water a seawater reverse osmosis plant produces, approximately 1.5 cubic metres of brine concentrate is discharged. This is not a design flaw. It is a thermodynamic necessity. Seawater enters the plant at roughly 35 grams of dissolved salt per litre \u2014 standard ocean salinity. The membrane rejects the salt. At typical commercial recovery rates of 40 to 50 percent \u2014 meaning roughly 45 litres of freshwater extracted from every 100 litres of seawater fed into the system \u2014 the remaining 55 litres leaves the plant at a salinity of roughly 65 to 70 grams per litre. This hypersaline stream, containing not just sodium chloride but the concentrated residues of every antiscalant, coagulant, and anti-fouling chemical used in the pretreatment process, is pumped through marine outfall pipes into the receiving ocean."), /* @__PURE__ */ React.createElement(Para, null, "A 2019 study by Manzoor Qadir, assistant director of the United Nations University Institute for Water, Environment and Health, calculated that global brine production was approximately 142 million cubic metres per day \u2014 roughly 50 percent greater than the desalination industry's own previous estimates. In the Persian Gulf, where the world's densest concentration of desalination facilities discharges into an enclosed, shallow, slow-circulating sea, the consequences have become measurable at scale. The Gulf is now approximately 25 percent saltier than typical seawater, with hotspots near major discharge points running at double or triple normal salinity. It is simultaneously a receptacle for brine from desalination and for concentrated produced water from the oil and gas industry. The synergistic effect on marine ecosystems is not well understood, but it is not benign."), /* @__PURE__ */ React.createElement(BrineChart, null), /* @__PURE__ */ React.createElement(Cap, { label: "Data", text: "The brine shadow of global desalination: for every million cubic metres of freshwater produced, 1.5 million cubic metres of hypersaline concentrate enters the ocean. As capacity expands toward projected 2030 levels, the discharge will approach 200 million cubic metres per day \u2014 greater than the combined daily flow of the Congo and Mississippi rivers." }), /* @__PURE__ */ React.createElement(Para, null, "A 2024 review published in ", /* @__PURE__ */ React.createElement("em", null, "Environmental Science and Technology"), " by researchers including Edo Bar-Zeev and Gilad Antler at Ben-Gurion University of the Negev found that hypersaline brine from seawater reverse osmosis facilities is characterised by salinity up to 102 percent higher than ambient seawater. This dense stream sinks, creeping across the seabed and spreading, according to modelling data cited in the study, up to several tens of kilometres from the discharge point. The effects on benthic communities \u2014 the organisms living in and on the sediment \u2014 range from morphological deformations to changes in community composition and impaired nutrient fluxes from sediment to the water column. Seagrasses, polychaetes, corals: the toll is measurable, even if the full magnitude is contested."), /* @__PURE__ */ React.createElement(Para, null, "In the Mediterranean and the Red Sea \u2014 both semi-enclosed, both warming faster than the global ocean average, both hosting multiple large desalination facilities \u2014 salinity is increasing at rates that scientists are beginning to track with systematic monitoring programs. The Red Sea, already the saltiest major body of water in the world, receives brine discharge from Saudi facilities along its eastern coast and Egyptian facilities along its western one. The Israeli and Jordanian joint facility originally planned for the Gulf of Aqaba would have added more. The proposal was eventually shelved, partly for diplomatic reasons and partly because of growing concern about what additional discharge into an already-stressed system would do."), /* @__PURE__ */ React.createElement(

  ), /* @__PURE__ */ React.createElement(SB, { title: "Brine as Resource \u2014 The Zero Liquid Discharge Ambition" }, /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 12px" } }, "NEOM, Saudi Arabia's $500 billion giga-project on the Red Sea coast, has proposed what the desalination industry calls zero liquid discharge: a plant design in which brine is not discharged into the ocean but further processed to extract commercially valuable minerals and metals. The dense brine from the 500,000-cubic-metre-per-day reverse osmosis facility planned for OXAGON \u2014 NEOM's manufacturing city \u2014 would feed downstream industries producing industrial salt, bromine, boron, potassium, gypsum, and magnesium. Rare metals extraction is also under study."), /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 12px" } }, "The concept is not new \u2014 brine valorisation has been an active research area for two decades \u2014 but NEOM represents the first attempt to implement it at industrial scale, with 100% renewable energy powering the entire system. The project is a partnership between ENOWA (NEOM's water subsidiary), Japan's ITOCHU, and Veolia of France."), /* @__PURE__ */ React.createElement("p", { style: { margin: 0 } }, "Elimelech's group at Yale has developed high-pressure reverse osmosis (HPRO) and low-salt-rejection reverse osmosis (LSRRO) technologies specifically designed for brine concentration and management \u2014 pushing brine toward the ultra-high salinity required for mineral extraction. Both approaches remain in active development, with commercial-scale deployment dependent on the economics of the downstream mineral markets.")), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(SectionLabel, null, "V. The Membrane Frontier"), /* @__PURE__ */ React.createElement(Para, null, "In Kongens Lyngby, Denmark \u2014 a suburb of Copenhagen where the streets are quiet and the laboratories are not \u2014 a company called Aquaporin A/S has spent the better part of two decades asking what happens if you stop making membranes from polymer chemistry and start making them from biology. Aquaporins are proteins. They are found in the membranes of virtually every living cell, where they function as exquisitely engineered water channels \u2014 pores just wide enough to allow the passage of a single water molecule at a time, with near-perfect selectivity and near-zero energy loss. Red blood cells, which must absorb and release water rapidly as they traverse capillaries, are studded with aquaporin-1. The kidney tubules that reabsorb the roughly 180 litres of fluid filtered by the glomerulus each day use aquaporin-2. In 2003, Peter Agre of Johns Hopkins University was awarded the Nobel Prize in Chemistry for their discovery."), /* @__PURE__ */ React.createElement(Para, null, "The idea that you could incorporate these proteins into an industrial membrane \u2014 and thereby replicate the speed and selectivity that evolution refined over 400 million years \u2014 is both compelling and, as Aquaporin A/S has learned through years of difficult commercialisation, technically formidable. The company's Aquaporin Inside technology embeds aquaporin proteins into a thin-film composite membrane for forward osmosis applications. The first commercially available aquaporin-based hollow-fibre membranes were launched by the company and have been shipped to research partners worldwide. The company's 2024 annual report, however, recorded a 32 percent decline in revenue, citing unexpected changes in demand and project delays \u2014 a frank acknowledgement that the gap between laboratory promise and industrial deployment is measured not in months but in years."), /* @__PURE__ */ React.createElement(

  ), /* @__PURE__ */ React.createElement(Para, null, "The broader landscape of next-generation membrane research spans graphene oxide nanochannels, carbon nanotube-based pores, covalent organic framework membranes, and a range of bioinspired polymer architectures. A 2024 roadmap on membrane desalination technology published in a major journal noted that existing SWRO systems operate at 3 to 5 kWh/m\xB3, still far from the theoretical minimum of 1.1 kWh/m\xB3, and acknowledged that while aquaporin, graphene, and carbon nanotube membranes have demonstrated permeability improvements over conventional polyamide membranes in laboratory settings, the obstacles to industrial implementation remain formidable: insufficient pore density, defect-prone fabrication, limited long-term stability, and \u2014 critically \u2014 the point Elimelech has made repeatedly \u2014 that high permeability alone does not dramatically reduce energy consumption in seawater RO because the thermodynamic cost of salt removal is system-wide, not membrane-specific."), /* @__PURE__ */ React.createElement(Para, null, "In April 2024, Elimelech's lab published results in ", /* @__PURE__ */ React.createElement("em", null, "Science"), ", in collaboration with Nanjing University of Science and Technology, reporting a new durable and cost-efficient filtering membrane that could increase the number of people receiving clean, safe water \u2014 a chlorine-resistant polyester architecture that maintains performance under the chemical conditions of actual plant operation, not just laboratory purified water. The distinction matters enormously: industrial membranes degrade in the presence of chlorine, which is widely used in pretreatment to control biofouling. A membrane that survives chlorine exposure at operational concentrations can be cleaned more aggressively and last longer in the field. The economics of the plant depend as much on membrane lifetime as on membrane flux."), /* @__PURE__ */ React.createElement(CostChart, null), /* @__PURE__ */ React.createElement(Cap, { label: "Data", text: "The cost trajectory of seawater reverse osmosis desalination since 2000, driven by membrane innovation, energy recovery devices, and scale. Sorek 2 (Israel, 2024) set a new benchmark at $0.41/m\xB3. The line will not continue downward indefinitely \u2014 thermodynamics, brine management, and intake infrastructure impose costs that better membranes cannot eliminate." }), /* @__PURE__ */ React.createElement(SB, { title: "The Sorek Model \u2014 Israel's Water Revolution" }, /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 12px" } }, "Israel's desalination story is the most studied in the world, and for good reason: the country moved from existential water crisis to water surplus in under two decades, through a combination of political will, engineering innovation, and aggressive policy. The 1998 drought \u2014 the worst in 900 years for the eastern Mediterranean \u2014 triggered a government decision to build desalination plants regardless of cost. By 2018, the majority of Israel's municipal drinking water came from desalinated sources. The country now produces roughly 20 percent more water than it needs."), /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 12px" } }, "The Sorek plant, built by IDE Technologies on the Mediterranean coast 15 kilometres south of Tel Aviv, drew seawater from an intake 1.85 kilometres offshore at extremely slow velocity (0.15 metres per second) to minimise marine life entrainment. Its innovation was structural: sixteen-inch-diameter pressure vessels arranged vertically \u2014 double the standard diameter \u2014 packing more membrane area per unit of floor space and reducing capital costs substantially. The plant supplies water for roughly one-fifth of Israel's population. Sorek 2, commissioned in 2024, produces 200 million cubic metres per year at $0.41/m\xB3."), /* @__PURE__ */ React.createElement("p", { style: { margin: 0 } }, "The Israeli model is not directly transferable. Israel's relatively small geographic area, high institutional capacity, and specific coastal geology enabled a rollout that most nations cannot replicate at speed. But the engineering principles \u2014 large-format elements, low-velocity intake, energy recovery, vertical vessel architecture \u2014 are being adopted globally.")), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(SectionLabel, null, "VI. The Sun and the Sea"), /* @__PURE__ */ React.createElement(Para, null, "On the Red Sea coast of northwestern Saudi Arabia, at a latitude where the annual direct normal irradiance exceeds 2,800 kilowatt-hours per square metre \u2014 one of the most solar-intensive sites on the planet \u2014 a city that does not yet exist is designing its water supply. NEOM, the $500-billion development backed by the Saudi sovereign wealth fund, has announced a 500,000-cubic-metre-per-day reverse osmosis desalination plant for its manufacturing district, OXAGON, to be powered by 100 percent renewable energy. The project, a partnership between ENOWA (NEOM's water and energy subsidiary), ITOCHU of Japan, and France's Veolia, is conceived not merely as a water plant but as the first node in a circular resource system: brine output feeding mineral extraction industries, renewable surplus feeding green hydrogen production, freshwater feeding a city planned for complete sustainability."), /* @__PURE__ */ React.createElement(Para, null, "This is not fantasy \u2014 the renewable energy economics are real. A study by King Abdullah University of Science and Technology (KAUST), published in ", /* @__PURE__ */ React.createElement("em", null, "Nature Communications"), " in 2022, modelled the co-optimisation of renewable energy and desalination systems for NEOM and found that co-optimised water-power systems achieve significant cost savings over independently planned approaches, with the benefits increasing as the share of non-dispatchable renewables (solar and wind) rises. The physics favour the pairing: solar power peaks in the middle of the day, desalination can absorb variable electricity without the storage challenges that make large-scale solar-plus-industry difficult in other sectors, and the Red Sea and northwestern Saudi Arabia have both exceptional solar resource and ample seawater. NEOM's wind speeds reach 11 metres per second on the coast \u2014 excellent for wind power."), /* @__PURE__ */ React.createElement(
