  ), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "6 \xB7 Course Lock geometry, in detail" }), /* @__PURE__ */ React.createElement(P, null, "Course Lock is the mode that benefits most from being thought about geometrically. Figure A shows the situation: the drone moves along a constant compass bearing \u2014 one of the simplest possible trajectories in three-dimensional space, a line \u2014 while the gimbal yaws independently to hold a chosen subject in frame. The two motions are decoupled; the body's heading does not influence the camera's heading."), /* @__PURE__ */ React.createElement(HyperlapseGeometry, null), /* @__PURE__ */ React.createElement(P, null, "The yaw angle \u03C8 at frame n is the angle between the aircraft's heading vector and the line from aircraft to subject. Because the heading is fixed and the subject is fixed, \u03C8 is purely a function of the aircraft's current position along its bearing. As the aircraft flies past the subject's perpendicular, \u03C8 accelerates \u2014 the gimbal must yaw faster to keep the subject centred. This is why Course Lock hyperlapses tend to look most graceful when the bearing is chosen so that the subject sits roughly 30 to 60 degrees off the bearing, and the flight terminates before the aircraft passes its perpendicular. Once the aircraft is past the perpendicular, \u03C8 exceeds 90 degrees and the gimbal is forced to reach back behind the airframe \u2014 workable but visually awkward."), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "7 \xB7 Waypoints 3.0 \u2014 the planning workflow" }), /* @__PURE__ */ React.createElement(P, null, "Waypoints 3.0 was reintroduced to the Mavic 3 series in firmware updates during 2023 and matured through 2024\u201325. The DJI Fly 1.10 release in early 2024 standardised the workflow now used in the field: a flight plan is a sequence of waypoints, each defined by latitude, longitude, altitude (relative to home point or above sea level), gimbal pitch, gimbal yaw, and an optional point-of-interest lock. Speed and curve smoothing are set per-segment. Plans can be saved to the controller, uploaded between aircraft and re-run."), /* @__PURE__ */ React.createElement(Code, null, '# anatomy of a Waypoints 3.0 flight plan (informal schema)\n\nplan = {\n  "name": "sunset-cathedral-orbit",\n  "home":   { "lat": 51.5132, "lon": -0.0982, "alt_m": 0   },\n  "flight_speed_mps": 4.0,\n  "hyperlapse": {\n    "interval_s":  3,\n    "output_fps": 30,\n    "shot_count": 300,    # -> flight 15 min, clip 10 s\n    "raw":         True\n  },\n  "waypoints": [\n    { "lat": 51.5135, "lon": -0.0989, "alt_m":  60, "gimbal_pitch": -10, "poi_lock": "P1" },\n    { "lat": 51.5140, "lon": -0.0994, "alt_m":  80, "gimbal_pitch": -15, "poi_lock": "P1" },\n    { "lat": 51.5145, "lon": -0.0999, "alt_m": 100, "gimbal_pitch": -20, "poi_lock": "P1" },\n    { "lat": 51.5150, "lon": -0.1004, "alt_m": 120, "gimbal_pitch": -25, "poi_lock": "P1" }\n  ],\n  "poi": [\n    { "id": "P1", "lat": 51.5142, "lon": -0.0975, "alt_m": 30 }\n  ]\n}'), /* @__PURE__ */ React.createElement(P, null, "The principal advantage over the older mission-planning approaches is repeatability. A plan scouted at noon \u2014 when the light is forgiving and the airspace is cooperative \u2014 can be executed at sunset, identically, frame for frame. This matters because the hyperlapse-killing variables (light, wind, crowds) are exactly the variables that change with time of day. Reconnaissance becomes an investment that compounds: the third execution of a plan is materially better than the first."), /* @__PURE__ */ React.createElement(Callout, { title: "Altitude and speed constraints", type: "info" }, "DJI Fly clamps Waypoint flights to a maximum 50 m/s ground speed and 500 m altitude above home point (jurisdiction-permitting; in the UK and EU the regulatory ceiling is 120 m). Climbs and descents are smoothed by default with a curvature parameter; setting the curvature to zero produces sharp corners that are punishing on the gimbal and visible in the captured frames."), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "8 \xB7 Failure modes" }), /* @__PURE__ */ React.createElement(P, null, "Most hyperlapse failures are not subtle. They fall into a small number of categories and, with experience, are recognisable in the first ten frames of the captured sequence."), /* @__PURE__ */ React.createElement(H3, null, "GPS drift \u2014 the dominant failure mode"), /* @__PURE__ */ React.createElement(P, null, "The Mavic 3 Pro holds position via dual GPS/GLONASS triangulation. In open sky with 14+ satellites visible, station-keeping is good to roughly half a metre. In urban canyons where satellite visibility drops to 8\u201310, the aircraft can drift by 1\u20132 metres between captures. At 24mm equivalent focal length and 100 metres' altitude this is invisible; at 166mm telephoto and 50 metres' altitude it is destructive. The remedy is not technical: it is to wait. A fresh launch with the aircraft sitting on the ground for thirty seconds before takeoff to lock additional satellites is the single most effective preventative measure. Pilots who launch as soon as the aircraft says 'GPS Ready' produce hyperlapses that drift; pilots who wait for 'GPS: Strong' on at least 12 satellites do not."), /* @__PURE__ */ React.createElement(H3, null, "Crosswind above 8 m/s"), /* @__PURE__ */ React.createElement(P, null, "DJI rates the Mavic 3 Pro for wind resistance up to 12 m/s. This is the value at which the airframe can still maintain station; it is not the value at which a hyperlapse looks clean. Above approximately 8 m/s of crosswind, the gimbal is constantly correcting at the limits of its stroke, and the captured frames show a low-frequency oscillation that no EIS pass will fully remove. Check the wind aloft, not at ground level \u2014 wind speed at 100 m altitude is typically 1.5 to 2 times the surface reading."), /* @__PURE__ */ React.createElement(H3, null, "Battery dropping below 20% mid-mission"), /* @__PURE__ */ React.createElement(P, null, "DJI's smart battery system aborts a Waypoint or Course Lock mission and initiates Return-To-Home automatically when battery reaches the calculated minimum to return safely. For a long hyperlapse, this can occur mid-flight, leaving you with a partial sequence. A single 5000 mAh Mavic 3 Pro Intelligent Flight Battery delivers approximately 43 minutes of nominal flight, but a typical mission with hover, RTH reserve and wind correction loses 8\u201310 minutes. Plan for 30 minutes of usable hyperlapse time per battery, not 43."), /* @__PURE__ */ React.createElement(H3, null, "Moving crowds breaking subject lock"), /* @__PURE__ */ React.createElement(P, null, "In Circle and Waypoint modes with subject tracking, a dense moving crowd between drone and subject can confuse DJI's APAS visual tracker \u2014 the aircraft loses lock, the gimbal swings to find the subject, and a dozen frames are wasted. The safer choice in crowded scenes is bearing-only mode with manually pre-set gimbal angles, accepting that the subject will drift in frame and correcting in post."), /* @__PURE__ */ React.createElement(H3, null, "VLOS regulatory breach"), /* @__PURE__ */ React.createElement(P, null, "This is the failure mode that does not show up in the footage but does show up on the operator's record. A long hyperlapse at high altitude \u2014 particularly Course Lock along a city avenue or Waypoint into a mountain valley \u2014 can carry the aircraft beyond 500 metres horizontally, at which point most regulators consider the operator to be Beyond Visual Line of Sight (BVLOS) without authorisation. Discussed in detail in the regulation section below."), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "9 \xB7 Post-processing \u2014 where the in-drone pipeline ends" }), /* @__PURE__ */ React.createElement(P, null, "DJI Fly assembles a hyperlapse to an MP4 at the chosen output frame rate, with EIS already applied. For social-media work this is often the end of the pipeline. For anything broadcast, archival, or commercial, post-processing begins where the in-drone pipeline ends."), /* @__PURE__ */ React.createElement(H3, null, "Frame stabilisation and de-jitter"), /* @__PURE__ */ React.createElement(P, null, "Adobe Premiere's Warp Stabilizer remains the most common second-stage stabiliser. It re-tracks the assembled MP4, smooths residual low-frequency drift, and crops the frame margin to absorb the warp. The trade-off is a 5\u201310% effective resolution loss to the warp margin. DaVinci Resolve's Stabilization (paired with the Steady Zoom mode) is a competitor and often produces cleaner results on translation-heavy footage. For sequences shot raw, LRTimelapse remains the gold-standard tool for managing the per-frame exposure ramping that any sunset or sunrise hyperlapse requires."), /* @__PURE__ */ React.createElement(H3, null, "Frame interpolation for clip stretching"), /* @__PURE__ */ React.createElement(P, null, "At 30 fps and 400 frames the longest possible native clip is 13.3 seconds. To extend, frame interpolation is the standard tool. Topaz Video AI's Apollo and Chronos models, and Resolve's built-in Super Scale, both perform AI-based optical-flow interpolation that can credibly double the output frame rate (60, 120 fps) without visible motion artefacts on continuously-moving subjects. They do not work well on hyperlapses with discrete subject changes between frames \u2014 flicker on lit windows, for example, will become smeared rather than crisp."), /* @__PURE__ */ React.createElement(H3, null, "Colour grading from raw"), /* @__PURE__ */ React.createElement(P, null, "If you shot 12-bit DNG raw frames, you have material that exceeds the in-drone JPEG by roughly 4 stops of latitude. The standard pipeline is to  "United States \u2014 FAA Part 107"), /* @__PURE__ */ React.createElement(P, null, "In the US, any commercial drone use \u2014 including any hyperlapse that will be monetised, used in a paid video, or otherwise yields commercial benefit \u2014 requires Part 107 certification. Recreational use is governed by the FAA's recreational rules and the TRUST online test. Part 107 imposes a 400 ft (122 m) altitude limit, daylight-only without a waiver, VLOS, and operation only in airspace classes for which clearance has been obtained (LAANC for class B, C, D and surface-area E)."), /* @__PURE__ */ React.createElement(Callout, { title: "Remote ID \u2014 required everywhere", type: "warn" }, "Since 2023 in the US (FAA Remote ID rule) and 2024 in the EU/UK (with mandatory operator-ID transponders for non-C0 aircraft), the Mavic 3 Pro broadcasts its position, altitude and operator ID to any compliant receiver in range. This is enforceable and increasingly enforced; pilots flying without registration in the relevant database can be identified retrospectively. Verify your registration is current before each flight."), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "11 \xB7 Real-world archetypes" }), /* @__PURE__ */ React.createElement(H3, null, "The urban cityscape reveal"), /* @__PURE__ */ React.createElement(P, null, "Course Lock along a fixed bearing across a skyline, with a single landmark held by gimbal yaw. 200 frames at 2 s interval = 6 minutes 40 seconds aloft, 6.7 seconds of finished clip at 30 fps. ND16 in late afternoon, ND8 at golden hour. Hasselblad at f/5.6, 1/40, ISO 100. The classic shot."), /* @__PURE__ */ React.createElement(H3, null, "The mountain-to-valley cable-car descent"), /* @__PURE__ */ React.createElement(P, null, "Waypoint with three points: high above the upper station, mid-altitude tracking the cable, low at the valley station. 250 frames at 3 s interval = 12 minutes 30 seconds aloft. Hasselblad or 70m   ), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "12 \xB7 Closing" }), /* @__PURE__ */ React.createElement(P, null, "The drone hyperlapse is, for a brief moment in the history of aerial photography, both technically tractable and culturally fresh. The Mavic 3 Pro \u2014 three sensors, one variable iris, four modes, a 400-frame ceiling and a body of mathematics that fits on the back of a card \u2014 is the machine on which the moment is being recorded. It is unlikely to be the machine that records its end: the C2-class lighter-than-900 g aircraft in DJI's pipeline, the Air 4 series and the rumoured Mavic 4 Pro, will subsume some of these capabilities and re-shuffle the regulatory categories. What will not change is the underlying problem: that ten minutes of patience, eight minutes of station-keeping, and one carefully chosen interval still produce roughly eight seconds of finished clip, and that the discipline of the hyperlapse pilot \u2014 pre-flight checklists, ND choice, satellite count, battery margin \u2014 is what decides whether those eight seconds were worth taking off for at all."), /* @__PURE__ */ React.createElement(PQ, null, "The drone hyperlapse is governed by one formula, three numbers, four modes, and a small library of failure modes that no firmware update has ever fully closed. Discipline at takeoff costs nothing; discipline missed costs the entire flight."), /* @__PURE__ */ React.createElement(BR, null), /* @__PURE__ */ React.createElement(Sec, { title: "Sources & Integrity Note" }), /* @__PURE__ */ React.createElement(P, null, "<b>Primary specifications</b> drawn from DJI's official Mavic 3 Pro product page (dji.com/mavic-3-pro/specs), DJI's Mavic 3 Pro user manual v1.4 (PDF, May 2023), and the DJI Fly 1.10 release notes (December 2023). All sensor sizes, megapixel counts, aperture values, focal-length equivalents, weight (958 g), maximum wind resistance (12 m/s), maximum flight time (43 minutes
