now made operational as a labeling scheme. Meta-labeling, in turn, formalises an older pattern: the practice of overlaying discretionary judgement on a systematic signal to decide bet sizing. The lineage is therefore continuous: each generation of labelling reflects a tighter coupling between the statistical learner and the operational logic of a real trading desk.`), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(P, null, `The fixed-time horizon method is the pedagogical baseline: for every observation at time <em>t<sub>i</sub></em>, compute the return over a fixed future window <em>h</em>, and label +1 / \u22121 / 0 depending on whether the return exceeds +\u03C4, falls below \u2212\u03C4, or remains inside the deadband. Its virtue is simplicity; its vices are the brittleness of a fixed threshold in a heteroscedastic world and the dependence on time bars, whose statistical properties drift with intraday activity patterns. Dynamic thresholds \u2014 setting \u03C4 as a multiple of rolling volatility \u2014 partially rehabilitate the method and are often used as a benchmark.`), /* @__PURE__ */ React.createElement(P, null, `The triple-barrier method replaces a single threshold with a trio: an upper profit-target barrier <em>pt</em>, a lower stop-loss barrier <em>sl</em>, and a vertical time-limit barrier. Both horizontal barriers are set as multiples of an estimate of volatility at entry, typically an exponentially weighted moving standard deviation of returns. The method simulates forward from <em>t<sub>i</sub></em> and records which barrier is hit first; this touched-barrier index becomes the label. Variants exist for the terminal case: if the vertical barrier fires first, one may record the sign of the return, or leave the label at zero to mark the trade as "unresolved."`), /* @__PURE__ */ React.createElement(P, null, `Meta-labeling composes the two by layering a secondary classifier on top of primary signals. The primary model \u2014 which may itself use any labeling scheme, commonly the triple-barrier \u2014 emits side: buy, sell, or hold. For each emitted signal, one computes the meta-label: 1 if the trade would have been profitable (by some definition, often a triple-barrier evaluation), 0 otherwise. The secondary model is then trained on this binary meta-label, using features that include both the original features and derived ones describing the signal itself (e.g., volatility at signal time, recency of previous signals, realised P&L of recent signals).`), /* @__PURE__ */ React.createElement(P, null, `In practice, the three approaches are not mutually exclusive. A sophisticated pipeline will use the triple-barrier for the primary side-prediction task, meta-label the primary model's signals using a second triple-barrier with possibly different <em>ptSl</em> parameters, and feed both outputs to a portfolio-construction stage. This stacking is the dominant pattern in production quant systems.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `Algorithmically, the three methods differ sharply in complexity. The fixed-time horizon algorithm is O(n) in the number of observations and trivially vectorisable: compute a rolling return, compare to \xB1\u03C4, emit a label. The triple-barrier algorithm is path-dependent and therefore requires, in the naive implementation, an inner loop over the candidate trading horizon to detect the first-touch event. Careful use of NumPy's cumulative min/max and searchsorted primitives allows the inner loop to be eliminated in pure Python for many practical cases. Meta-labeling adds the cost of training and applying the primary model, plus the cost of generating the meta-label dataset (which is itself a triple-barrier evaluation against the primary model's signals).`), /* @__PURE__ */ React.createElement(Code, { language: "python" }, `def fixed_time_horizon_labeling(X, prices, h, tau):
    labels = []
    for i in range(len(X)):
        t_i = get_time_index(X[i])
        return_h = (prices[t_i + h] - prices[t_i]) / prices[t_i]
        if return_h > tau:
            labels.append(1)
        elif return_h < -tau:
            labels.append(-1)
        else:
            labels.append(0)
    return labels`), /* @__PURE__ */ React.createElement(P, null, `The reference implementation above captures the fixed-time horizon logic in its most transparent form and is intended for pedagogical clarity, not production use; a vectorised Pandas version that operates on an entire price series at once is one or two lines of code and several orders of magnitude faster. System design considerations emphasise modularity (each labelling method exposed behind a common interface), scalability (use of Dask or joblib for parallel barrier evaluation across independent observation windows), and strict protection against look-ahead \u2014 features must be strictly causal at <em>t<sub>i</sub></em>, and barrier evaluation must use only prices in <em>(t<sub>i</sub>, t<sub>i</sub>+h]</em>.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Three pitfalls dominate implementation practice. The first is data leakage: information from the future leaking into features or labels through careless rolling-window computations. The triple-barrier method is particularly sensitive here \u2014 the label depends on prices after <em>t<sub>i</sub></em>, but any feature at <em>t<sub>i</sub></em> must be strictly causal. The second is class imbalance: triple-barrier labels under tight profit targets and wide stop-losses will produce a heavy \u22121 class; meta-labels under a high-recall primary model will produce mostly zeros. Both demand techniques like class weighting, resampling, or dropping low-information labels (as Lopez de Prado does explicitly for Random Forests, which are sensitive to imbalance).`), /* @__PURE__ */ React.createElement(P, null, `The third is overfitting in the parameter space of the labeller itself. The choice of <em>ptSl</em> multipliers, horizon length, and volatility estimator are hyperparameters of the labelling step, and tuning them on the same data used for model training leaks information. A principled pipeline holds labeller parameters fixed on economic grounds (typical stop-losses and profit targets for the strategy class) or selects them via nested cross-validation. Testing at scale uses combinatorial purged cross-validation (Chapter 12 of the book) to avoid the serial-correlation contamination that ordinary <em>k</em>-fold suffers in financial time series.`), /* @__PURE__ */ React.createElement(Ch3Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `Stylised comparison of classification metrics for a primary-only model versus a two-stage architecture with a meta-label filter. The primary model is tuned for high recall and accepts many false positives; the meta-filter trades some recall for substantially higher precision and overall accuracy, reshaping the F1 profile. Values are illustrative, not drawn from a specific empirical study, and are meant to convey the qualitative shift typical of a well-specified meta-labeling stack.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `Meta-labeling has found its most visible industrial home in quantamental investing, where discretionary portfolio managers emit directional views (side) and a machine-learned meta-model decides bet sizing or signal filtering (size). The architecture preserves the interpretability of the human signal \u2014 a portfolio manager can defend a "buy Intel" view to risk \u2014 while letting the meta-model enforce empirical discipline on which views historically paid. Hedge funds report meaningful Sharpe-ratio improvements from layering meta-labels onto legacy systematic strategies, particularly when the primary system has drifted out of its original regime.`), /* @__PURE__ */ React.createElement(P, null, `Triple-barrier labelling is dominant in intraday equity and crypto strategies, where the notion of "holding for a fixed horizon" is especially unrealistic: positions are routinely knocked out by volatility before any fixed horizon elapses. Fixed-time-horizon labels survive primarily as baselines and in strategies with strong structural priors on holding period \u2014 monthly rebalancing systems, for instance, where the one-month forward return is the economically natural target. Across all three approaches, the evaluation metrics remain the same ensemble of Sharpe ratio, profit factor, maximum drawdown, and \u2014 for meta-labelled systems \u2014 precision on the filter decision.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `Current research extends the basic templates along several axes. Reinforcement learning has been proposed as a way to learn the labelling policy end-to-end: the <em>ptSl</em> parameters become actions in a Markov decision process, and the agent is rewarded by downstream P&L of the resulting trading strategy. Deep learning models for automatic feature extraction \u2014 convolutional or transformer encoders applied to raw tick data \u2014 are being paired with differentiable approximations of the triple-barrier rule, enabling joint optimisation of features and labels. Multi-horizon and multi-asset extensions generalise the single-asset, single-horizon setup to portfolio-level and cross-sectional contexts, with barriers becoming vectors or multi-dimensional hit-surfaces.`), /* @__PURE__ */ React.createElement(P, null, `Open problems include the automatic selection of the optimal labelling method for a given strategy (meta-meta-labelling, in effect), dynamic adaptation of barrier parameters to real-time regime detection, and richer label spaces that encode not just the sign of the outcome but its timing and path characteristics. Alternative approaches worth following include labelling from limit-order-book dynamics \u2014 using queue imbalances and microstructure events to define economically-meaningful labels \u2014 and sentiment-based labels that reflect shifts in news-flow regimes rather than price paths alone.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `Chapter 3's central lesson is that labelling is neither automatic nor neutral: it is a modelling decision that encodes the strategy's risk management, holding horizon, and economic semantics. The fixed-time horizon method is a didactic baseline with pathologies that the triple-barrier method directly addresses, and meta-labelling offers an architectural lever \u2014 decoupling side from size \u2014 that improves both statistical and economic performance. A pipeline that takes labelling seriously will match the scheme to the strategy, monitor the induced label distribution as a first-class diagnostic, and treat the labeller's parameters as objects of the same careful out-of-sample discipline it applies to model hyperparameters.`), /* @__PURE__ */ React.createElement(P, null, `The broader lesson is methodological. Financial ML differs from generic supervised learning in that the response variable is constructed rather than observed; two practitioners applying the same learner to the same features may reach contradictory conclusions because they defined <em>y</em> differently. Recognising this, and choosing labelling schemes that respect path-dependence, volatility heterogeneity, and the operational shape of a trade, is the precondition for every downstream gain \u2014 in features, in models, in backtests. Everything else in the book compounds on this foundation.`)), /* @__PURE__ */ React.createElement(Sec, { n: "4", title: "Sample Weighting for Non-IID Financial Data" }, /* @__PURE__ */ React.createElement(P, null, `Chapter 4 confronts a foundational mismatch between machine learning and finance: most ML algorithms are derived under the assumption that observations are independent and identically distributed, yet financial time series almost never satisfy that contract. Returns cluster, volatility persists, and any labelling scheme that reaches across more than one bar inevitably produces observations that share information with their neighbours. The chapter's argument is that this mismatch is not a nuisance to be hidden behind more data or bigger models \u2014 it is a structural property of the problem that has to be absorbed into how samples are weighted, resampled, and aged out of the training set.`), /* @__PURE__ */ React.createElement(P, null, `The specific source of non-IIDness that L\xF3pez de Prado targets here is the <em>overlap</em> created by path-dependent labelling methods such as the triple-barrier method introduced in Chapter 3. When label <code>i</code> is defined over the interval from event time <code>t_{i,0}</code> to its first-touch time <code>t_{i,1}</code>, and label <code>j</code> spans an interval that intersects that range, the two labels were shaped by common price bars. Treating them as independent observations inflates effective sample size, double-counts information, and lets bagging classifiers behave as if their bootstrap samples were diverse when they are in fact substantially redundant.`), /* @__PURE__ */ React.createElement(P, null, `The chapter's answer is a small family of interlocking tools: <em>concurrent labels</em> as a book-keeping device, <em>average uniqueness</em> as a per-observation scalar quantifying how much new information an event contributes, <em>sequential bootstrapping</em> as a resampling scheme that punishes redundancy, and two sample-weighting schemes \u2014 <em>return attribution</em> and <em>time decay</em> \u2014 that further sharpen the model's attention toward observations that matter. Together they form a weighting pipeline that sits between label generation and model fitting, quietly repairing the IID assumption the downstream learner still wants to make.`), /* @__PURE__ */ React.createElement(P, null, `What makes the chapter distinctive is its insistence that these adjustments are not optional heuristics but prerequisites for valid inference. A random forest fit on overlapping labels without sequential bootstrapping will overstate its out-of-bag accuracy; a boosted tree trained on uniform weights will spend its capacity learning redundant patterns near dense event clusters; a live model that never decays the past will trade on a regime that no longer exists. The methods in this chapter are the hygiene layer that lets the rest of the book's pipeline \u2014 from backtesting to ensembling to cross-validation \u2014 rest on data that behaves, at least at the level of weights, as if it were IID.`), /* @__PURE__ */ React.createElement(Ch4Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Figure 4.1 \u2014 Concurrent labels c(t) and per-bar uniqueness 1/c(t) across a stylised event stream. Where many labels overlap, each bar's contribution to any single label is diluted; isolated events retain full uniqueness and therefore full weight.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Non-IID Data in Finance:</strong> Financial time series data inherently violates the independent and identically distributed (IID) assumption common in many machine learning algorithms. This violation stems from the temporal dependence and serial correlation present in financial data, where past values influence future values. Ignoring this non-IID nature can lead to inaccurate model estimations and unreliable predictions. For instance, a model trained on IID data might underestimate the risk of clustered volatility, leading to inadequate risk management strategies. Addressing this challenge requires specialized techniques like sample weighting, which allows the model to account for the dependencies within the data. This is crucial for building robust models for tasks like forecasting asset returns, managing risk, and optimizing portfolios.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Overlapping Outcomes:</strong> In financial time series, defining labels based on price movements over time intervals often leads to overlapping outcomes. This occurs when the time window used to calculate one label overlaps with the window of a subsequent label. This overlap creates dependencies between the labels, violating the IID assumption. For example, if we define labels based on weekly returns, the return for week 2 will overlap with the return for week 3. This overlap introduces bias and can lead to overfitting. Addressing this requires careful consideration of the labeling method and the use of techniques like sample weighting to mitigate the impact of overlapping outcomes.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Concurrent Labels:</strong> Concurrent labels refer to multiple labels that are active or relevant at the same time point. In the context of financial time series, two labels are considered concurrent at time <em>t</em> if their respective time intervals overlap with the interval [t-1, t]. The number of concurrent labels at a given time provides a measure of the extent of overlap in the dataset. A high number of concurrent labels indicates significant overlap and stronger dependencies between observations. This concept is crucial for understanding the degree of non-IIDness in the data and for designing appropriate weighting schemes to address it.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Average Uniqueness of a Label:</strong> Average uniqueness quantifies the degree to which a label is independent of other labels. It is calculated as the average of the reciprocal of the number of concurrent labels over the label's lifespan. A higher average uniqueness indicates less overlap and greater independence. This metric is essential for determining the appropriate weight to assign to each observation during model training. Labels with higher uniqueness should be given more weight as they represent more distinct information. This concept is directly related to the problem of overlapping outcomes and provides a practical way to address it.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Sequential Bootstrap:</strong> The sequential bootstrap is a resampling technique designed to address the limitations of standard bootstrapping when applied to non-IID data. Unlike standard bootstrapping, which samples with replacement uniformly, the sequential bootstrap dynamically adjusts the sampling probabilities after each draw. The probability of selecting an observation is inversely related to its overlap with previously selected observations, favoring more unique observations. This approach reduces redundancy in the resampled data, making it more representative of the underlying distribution and improving the performance of bagging classifiers like random forests.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Return Attribution:</strong> Return attribution is a method for assigning weights to observations based on the magnitude and uniqueness of their associated returns. The weight of an observation is proportional to the sum of the absolute log returns that are uniquely attributable to it over its lifespan. This approach emphasizes observations with larger and more distinct price movements, giving them more influence during model training. This is particularly relevant in financial applications where large price swings are often of greater interest than small, incremental changes.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Time Decay:</strong> Time decay incorporates the adaptive nature of financial markets by assigning higher weights to more recent observations. This reflects the idea that recent market behavior is more indicative of future performance than distant past behavior. The decay function can be linear or piecewise linear, controlled by a user-defined parameter. Applying decay based on cumulative uniqueness rather than chronological time prevents excessive down-weighting of redundant observations. This concept is crucial for adapting models to evolving market dynamics.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Class Weights:</strong> Class weights address the issue of imbalanced datasets, where one class is significantly more prevalent than others. This is common in financial applications like predicting rare events such as market crashes. Class weights penalize misclassifications of the minority class more heavily, forcing the model to pay more attention to it. This technique improves the model's ability to identify rare but important events. In sklearn, the <code>class_weight='balanced'</code> option automatically adjusts weights to balance class frequencies.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Bagging Classifiers:</strong> Bagging (Bootstrap Aggregating) is an ensemble learning technique that combines predictions from multiple models trained on different subsets of the data. It is particularly effective in reducing variance and improving the robustness of the model. However, standard bagging assumes IID data. When applied to non-IID financial data, modifications like sequential bootstrapping and sample weighting are necessary to ensure its effectiveness.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Triple-Barrier Method:</strong> The triple-barrier method is a labeling technique used in financial applications to define events based on price movements hitting predefined barriers. This method can lead to overlapping outcomes, making sample weighting crucial for accurate model training. The barriers can represent profit targets, stop-loss levels, or time limits.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Information Leakage:</strong> Information leakage occurs when information from the future is inadvertently used during model training, leading to overly optimistic performance estimates. While the calculation of average uniqueness uses future information (events['t1']), it does not constitute information leakage as these values are only used for training and not for forecasting.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The technical core of the chapter is the claim that non-IIDness in financial labels is not merely a statistical subtlety but a first-order distortion of the learning signal. When standard ML algorithms \u2014 developed under the classical IID contract \u2014 are handed labels whose support intervals overlap, they respond by overfitting to whatever pattern happens to be densest in the overlap region. The resulting models pass naive validation, fail out-of-sample, and do so in ways that are hard to diagnose because the pathology lives upstream of the loss function, in the structure of the sample itself.`), /* @__PURE__ */ React.createElement(P, null, `L\xF3pez de Prado's reframing is to treat overlap as a measurable quantity. By indexing each bar with the set of labels whose lifespan touches it, the analyst can compute a concurrency count <code>c(t)</code> and, from it, a per-label average uniqueness. That scalar becomes the pivot for everything that follows: it drives the sample weights passed into the loss, it drives the adaptive probabilities used by the sequential bootstrap, and it drives the cumulative-uniqueness clock that governs time decay. The single construction \u2014 reciprocal concurrency averaged over the label's lifespan \u2014 does most of the chapter's heavy lifting.`), /* @__PURE__ */ React.createElement(P, null, `The sequential bootstrap is the chapter's most technically distinctive contribution. Rather than sampling with uniform replacement and accepting that the resulting bags will be saturated with redundant observations, it draws samples iteratively, recomputing each candidate's uniqueness conditional on what has already been drawn. The result is a bootstrap whose average per-draw uniqueness decays much more slowly than the uniform baseline, which in turn sharpens the diversity of a bagging ensemble's base learners and tightens out-of-bag error estimates.`), /* @__PURE__ */ React.createElement(P, null, `Rounding out the toolkit, return attribution tilts weights toward observations whose price paths were both large and uniquely theirs, while time decay discounts stale information on a clock driven by cumulative uniqueness rather than calendar time. These weights compose multiplicatively and are normalised to sum to <code>n</code>, so they slot cleanly into any learner that accepts a <code>sample_weight</code> argument \u2014 random forests, gradient boosting, and logistic regression alike.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Theoretical foundations"), /* @__PURE__ */ React.createElement(P, null, `The theoretical foundation of this chapter rests on the principles of statistical learning theory and time series analysis. Statistical learning theory provides a framework for understanding how models learn from data and generalize to new, unseen data. Key concepts like bias-variance tradeoff, overfitting, and generalization error are crucial for understanding the challenges of applying ML to non-IID data. Time series analysis provides tools and techniques for analyzing data with temporal dependencies, including concepts like autocorrelation, stationarity, and cointegration. These concepts are essential for understanding the specific challenges posed by financial time series data.`), /* @__PURE__ */ React.createElement(P, null, `The chapter builds upon the understanding that standard ML algorithms, often developed under the IID assumption, may not perform optimally when applied to financial data. The presence of serial correlation and temporal dependencies violates the IID assumption, leading to biased estimates and unreliable predictions. The theoretical justification for sample weighting lies in the need to adjust the learning process to account for these dependencies. By assigning different weights to observations, the model can prioritize more informative and representative data points, leading to improved performance.`), /* @__PURE__ */ React.createElement(P, null, `The theoretical framework also incorporates the concept of sampling distributions and the importance of accurate estimation. The goal of sample weighting is to modify the empirical distribution of the data to better approximate the true underlying distribution. This, in turn, leads to more accurate estimates of model parameters and improved predictive performance. The chapter utilises concepts from probability theory, including conditional probability and expectation, to formally define and calculate average uniqueness and other weighting schemes.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental principles"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Maximum Likelihood:"), " the best estimates of model parameters are those that maximise the likelihood function, which represents the probability of observing the data given the model parameters. Sample weighting modifies the likelihood to account for the non-IID structure of financial labels."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Empirical Risk Minimisation:"), " the goal of learning is to minimise the empirical risk, which is the average loss over the training data. Sample weighting modifies the empirical risk by assigning different weights to different observations, aligning the surrogate objective with the true population risk.")), /* @__PURE__ */ React.createElement(H4, null, "Key terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "IID (Independent and Identically Distributed):"), " a sequence of random variables is IID if each variable has the same probability distribution as the others and all are mutually independent."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Serial correlation:"), " the correlation between a variable and its lagged values; it indicates the degree of temporal dependence in the data."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Stationarity:"), " a time series is stationary if its statistical properties \u2014 mean, variance, autocovariance \u2014 do not change over time."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bootstrap:"), " a resampling technique that involves repeatedly drawing samples with replacement from the original data to approximate sampling distributions."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bagging:"), " an ensemble learning method that combines predictions from multiple models trained on different bootstrap samples, reducing variance through averaging."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Random forest:"), " an ensemble of decision trees trained on different bootstrap samples and random feature subsets, blending bagging with feature decorrelation."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Overfitting:"), " a phenomenon where a model learns the training data too well \u2014 including noise and spurious patterns \u2014 and consequently fails to generalise."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Generalisation error:"), " the gap between a model's performance on the training data and its performance on unseen data drawn from the same population.")), /* @__PURE__ */ React.createElement(H4, null, "Historical development and precedent approaches"), /* @__PURE__ */ React.createElement(P, null, `Historically, dealing with non-IID data in financial applications has involved various approaches, including traditional time series models like ARIMA and GARCH. These models explicitly model the temporal dependencies in the data. However, they often rely on strong assumptions about the underlying data generating process and may not capture complex non-linear relationships.`), /* @__PURE__ */ React.createElement(P, null, `With the rise of machine learning, researchers have explored adapting ML algorithms to handle non-IID data. Early approaches focused on preprocessing techniques like differencing and detrending to remove temporal dependencies. However, these methods can lead to information loss and may not be suitable for all types of financial data. More recent approaches have focused on incorporating the temporal structure directly into the ML model. Recurrent neural networks (RNNs), particularly LSTMs and GRUs, have shown promise in capturing long-term dependencies in time series data, but these models can be computationally expensive and require large amounts of data for training. Sample weighting offers a more flexible and computationally efficient alternative that applies to the full catalogue of modern tabular learners.`), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(P, null, `The chapter's methodology unfolds in two interlocking layers. The first is the <em>weighting</em> layer: each observation receives a scalar that multiplies its contribution to the loss, computed from average uniqueness, return attribution, and time decay. These three factors target different failure modes \u2014 redundancy, informativeness, and regime drift \u2014 and compose multiplicatively into a single <code>sample_weight</code> vector that is normalised to sum to <code>n</code> before being passed to the learner. The second layer is the <em>resampling</em> layer: rather than draw bootstrap indices with uniform probability, the sequential bootstrap draws them iteratively, recomputing the average uniqueness of each candidate conditional on what has already been selected, and using the result as a sampling probability.`), /* @__PURE__ */ React.createElement(P, null, `A comparative reading against standard bootstrapping is instructive. Uniform bootstrap, applied to data whose labels overlap on fifty percent of their lifespan, produces bags with far lower effective sample size than their nominal size suggests; base learners in the resulting bagging ensemble are strongly correlated, and the variance-reduction benefit of bagging evaporates. The sequential bootstrap restores diversity by making each subsequent draw conditional on the overlap accumulated so far \u2014 an observation that has already been heavily sampled becomes proportionally less likely to be sampled again. Paired with uniqueness-based sample weighting, the two techniques correct the problem at both the sampling distribution and the loss function.`), /* @__PURE__ */ React.createElement(P, null, `The workflow implied by these methods is a strict pipeline: preprocess raw financial data into features and event timestamps; generate labels via the triple-barrier method or an equivalent; compute the indicator matrix and per-label average uniqueness; derive sample weights from uniqueness, optionally modulating with return attribution and time decay; train the chosen learner \u2014 typically a bagging or boosting tree ensemble \u2014 passing weights and, where supported, replacing the internal bootstrap with the sequential variant; evaluate with an out-of-sample protocol that also respects the overlap structure, such as purged or embargoed cross-validation.`), /* @__PURE__ */ React.createElement(P, null, `Strengths and limitations track the usual trade-offs. Sample weighting is flexible and cheap \u2014 <code>O(n)</code> in both time and memory \u2014 but demands thoughtful scheme selection and can destabilise learners when weights span many orders of magnitude. Sequential bootstrapping materially improves bagging on non-IID data but costs <code>O(n \xB7 I)</code> per run and offers diminishing returns when overlap is either negligible or so pervasive that no candidate is meaningfully unique.`), /* @__PURE__ */ React.createElement(Ch4Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `Figure 4.2 \u2014 Average uniqueness of each successive draw under standard versus sequential bootstrap on an event stream with ~50% overlap. The sequential scheme preserves diversity across draws; the uniform scheme decays quickly as redundant observations accumulate.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `Two algorithms sit at the operational centre of the chapter. The first constructs the indicator matrix <code>getIndMatrix()</code> that records which price bars influenced each label; from this matrix the average uniqueness of each label is computed by row-averaging the reciprocal of the column sums over the label's lifespan. The second, the sequential bootstrap, initialises a uniform sampling distribution, draws one index, updates the running tally of how often each bar has already been implicated in the sampled set, renormalises the per-label average uniqueness against that tally, and draws the next index with probability proportional to its updated uniqueness. The loop continues until the desired bag size is reached.`), /* @__PURE__ */ React.createElement(Code, { language: "python" }, `import numpy as np
import pandas as pd

def getIndMatrix(barIx, t1):
    # barIx: index of price bars; t1: Series of event start -> first-touch end
    indM = pd.DataFrame(0, index=barIx, columns=range(t1.shape[0]))
    for i, (t0, t1_) in enumerate(t1.iteritems()):
        indM.loc[t0:t1_, i] = 1
    return indM

def getAvgUniqueness(indM):
    c = indM.sum(axis=1)                 # concurrency per bar
    u = indM.div(c, axis=0)              # per-bar contribution to each label
    avgU = u[u > 0].mean()               # average uniqueness per label
    return avgU

def seqBootstrap(indM, sLength=None):
    if sLength is None:
        sLength = indM.shape[1]
    phi = []
    while len(phi) < sLength:
        avgU = pd.Series(index=indM.columns, dtype=float)
        for i in indM.columns:
            indM_ = indM[phi + [i]]
            avgU.loc[i] = getAvgUniqueness(indM_).iloc[-1]
        prob = avgU / avgU.sum()
        phi += [np.random.choice(indM.columns, p=prob.values)]
    return phi`), /* @__PURE__ */ React.createElement(P, null, `Complexity is transparent: the sequential bootstrap is <code>O(n \xB7 I)</code> in time because each of the <code>I</code> draws recomputes uniqueness against all <code>n</code> candidates, and <code>O(n)</code> in space for the indicator matrix and its running tallies. Sample-weight computation is <code>O(n)</code>. The dominant architectural pattern is a strict sequential pipeline \u2014 preprocessing, labelling, uniqueness, weighting, training, evaluation \u2014 with a strategy-pattern hook where different weighting schemes (uniform, uniqueness, return-attributed, decayed) can be swapped without touching the rest of the code path.`), /* @__PURE__ */ React.createElement(P, null, `Edge cases deserve explicit handling. A label whose bars are saturated by concurrent labels can produce near-zero uniqueness; the recommended defence is to floor at a small positive constant rather than exclude the observation outright, which would bias the sample. Missing data in the feature matrix must be imputed or dropped before weights are computed, because downstream indexing presumes alignment with the event index.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Computationally, the chapter's tools are modest by modern standards, but the sequential bootstrap's <code>O(n \xB7 I)</code> cost becomes visible once event counts cross the low tens of thousands. Production implementations typically vectorise the uniqueness recomputation with sparse matrices and cache column sums, and distribute the outer iteration over worker processes when training bagging ensembles with many base learners. Memory is dominated by the indicator matrix, which at dense storage is quadratic in event count \u2014 another reason to adopt sparse representations once the event set is large.`), /* @__PURE__ */ React.createElement(P, null, `Operationally, the most common pitfalls are silent. Forgetting to normalise weights to sum to <code>n</code> produces learners whose effective learning rate is scaled by an arbitrary constant. Applying time decay on a calendar clock rather than on cumulative uniqueness over-weights recent clusters of redundant events. Combining class weights with uniqueness weights without explicit multiplicative composition leads to one of the two being silently overridden by the learner's internal balancing logic. Validation should always be run through a purged or embargoed cross-validation scheme that respects the same overlap structure the weights were designed to model; standard k-fold CV will leak information through overlapping intervals and produce optimistic metrics.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `In algorithmic trading, sample weighting lets a strategy re-estimate its decision boundary under changing market conditions without having to discard history wholesale \u2014 time decay on cumulative uniqueness acts as a soft window that adapts to how much genuinely new information each period contains. In portfolio construction, the same machinery supports building portfolios that remain robust across regimes by training selection and sizing models on a weighted historical record rather than a uniform one. In risk management, upweighting rare but consequential events \u2014 via class weights, return attribution, or both \u2014 produces tail-aware estimators that do not collapse onto the mode of the return distribution.`), /* @__PURE__ */ React.createElement(P, null, `Industry uptake is concentrated where these properties compound: hedge funds use the full pipeline to develop strategies whose backtests respect non-IID structure; asset managers deploy it for portfolio construction and factor research. Integration is typically through a model-fitting wrapper that sits between the firm's feature store and its learner, computing weights and sequential bootstrap indices on demand. Evaluation metrics \u2014 Sharpe ratio, maximum drawdown, turnover-adjusted returns \u2014 are computed on out-of-sample windows that themselves use purged splits, closing the loop between labelling, weighting, training, and validation.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `Research frontiers extend the chapter's programme in several directions. One thread generalises sequential bootstrapping to richer notions of dependence \u2014 not only temporal overlap but also cross-asset, cross-frequency, and path-similarity dependence \u2014 using kernels over event metadata to define softer notions of redundancy. A second thread explores deep learning architectures that absorb the weighting logic directly: attention layers conditioned on concurrency counts, or losses that down-weight redundant tokens in a sequence classifier. A third strand uses robust and Bayesian estimators as alternatives to the frequentist weighting framework, trading computational cost for uncertainty quantification.`), /* @__PURE__ */ React.createElement(P, null, `Open problems remain both theoretical and empirical. On the theory side, the finite-sample behaviour of sequential bootstrap estimators \u2014 their bias, variance, and consistency under dependence structures more general than first-touch overlap \u2014 is not fully characterised. On the empirical side, the interaction between sample weighting and modern gradient-boosting regularisers remains under-studied, and there is scope for more principled ways to combine uniqueness, return attribution, and decay rather than multiplying them together and hoping the combination behaves.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `Chapter 4's argument reduces to a single load-bearing claim: if the IID assumption fails at the level of the sample, no amount of downstream modelling can rescue the inference. The fix is not to abandon the standard ML toolkit but to repair the sample itself \u2014 measure overlap via concurrent labels, quantify each observation's informational contribution via average uniqueness, resample without amplifying redundancy via sequential bootstrapping, and sharpen the loss via return attribution, time decay, and class weights. Each of these moves is cheap, local, and interpretable; together they form the hygiene layer that makes the rest of the book's pipeline defensible.`), /* @__PURE__ */ React.createElement(P, null, `The practical payoff is that standard learners \u2014 random forests, gradient-boosted trees, logistic regression \u2014 become viable on financial data without giving up their performance-critical properties. The sequential bootstrap in particular restores the variance-reduction benefit that uniform bagging loses on overlapping labels, and uniqueness-based weights restore the empirical-risk calibration that uniform weights silently distort. The broader takeaway is cultural as much as technical: in financial machine learning, the sample is the first model, and the care taken to build it sets the ceiling on everything that follows.`)), /* @__PURE__ */ React.createElement(Sec, { n: "5", title: "Fractional Differentiation for Enhanced Time Series Analysis in Finance" }, /* @__PURE__ */ React.createElement(P, null, `Chapter 5 confronts a long-standing compromise in financial econometrics. Analysts are taught early that price series are almost universally non-stationary \u2014 their mean drifts, their variance shifts regime, and their autocorrelation decays far too slowly for the classical inferential machinery to apply. The conventional response is to take first differences or log returns, instantly converting prices into a stationary series at the cost of erasing nearly all memory of the history that produced them. Integer differentiation is a sledgehammer where a scalpel is often required.`), /* @__PURE__ */ React.createElement(P, null, `L\xF3pez de Prado argues that this routine over-differencing is one of the hidden reasons financial machine-learning models underperform: the predictors fed to them are almost entirely memory-less returns, stripped of the long-range dependence that carries the signal. A price series trades at full memory but zero stationarity; a return series trades at zero memory but full stationarity. There is an entire spectrum between these two poles, and integer differentiation jumps straight from one end to the other. The chapter's central claim is that the optimum for predictive modelling lies somewhere in the middle \u2014 a minimally-differenced series that is just stationary enough to be analysed, yet still carries as much memory as mathematics allows.`), /* @__PURE__ */ React.createElement(P, null, `Fractional differentiation is the tool that inhabits that middle ground. By generalising the backshift operator (1-B) to real-valued powers (1-B)^d with d between zero and one, one obtains a continuum of transformations, each a weighted sum of past observations with gradually decaying coefficients. Small d leaves the series close to the raw price with most of its memory intact; large d pushes it toward returns. The Augmented Dickey-Fuller test then identifies the smallest d \u2014 denoted d* \u2014 at which the series crosses the stationarity threshold. This chapter develops the mathematics, compares the expanding-window and fixed-width-window implementations, and demonstrates empirically that for most liquid futures d* lies well below one, often between 0.3 and 0.5, preserving correlations to the raw series above 0.9.`), /* @__PURE__ */ React.createElement(P, null, `The operational recommendation is concrete: never feed a model raw prices, but also never feed it blindly-differenced returns. Instead, search the d-axis for the minimum order that achieves ADF stationarity, apply the fixed-width fractionally differenced (FFD) operator with a tolerance \u03C4 on weight magnitudes, and use the resulting series as the feature.`), /* @__PURE__ */ React.createElement(Ch5Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Binomial-expansion weights \u03C9_k for the fractional differencing operator (1-B)^d at four orders. For integer d = 1 the weights are (1, -1, 0, 0, ...) \u2014 full amnesia after one lag. For fractional d the tail decays hyperbolically, retaining a smoothly weighted memory of the entire history. Lower d retains more memory; higher d approaches the integer-difference limit.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Fractional Differentiation:</strong> Fractional differentiation is a generalization of the ordinary differentiation operator to non-integer orders. This allows for a more nuanced approach to transforming time series data, bridging the gap between preserving memory (as in raw data) and achieving stationarity (as in integer differentiation). Its significance lies in its ability to fine-tune the degree of differencing, finding the minimal transformation required for stationarity while retaining maximal memory. This is crucial for financial time series, which often exhibit long-range dependence, where past values have a persistent influence on future values. Fractional differentiation allows us to capture this long-range dependence while still enabling the application of standard statistical tools that require stationarity. For example, a fractionally differenced series can be used in regression models without violating the assumptions of stationarity, potentially leading to more accurate and robust predictions.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Stationarity:</strong> Stationarity refers to the constancy of statistical properties (mean, variance, autocorrelation) of a time series over time. This is a fundamental assumption for many statistical models. If a time series is non-stationary, its statistical properties change over time, making it difficult to generalize findings from one period to another. For instance, a model trained on a past period of a non-stationary series might not be applicable to a future period. Achieving stationarity is therefore crucial for reliable statistical inference and forecasting. Tests like the Augmented Dickey-Fuller (ADF) test are used to assess the stationarity of a time series.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Memory (Long-Range Dependence):</strong> Memory in a time series signifies the dependence of future values on past observations. This dependence can be short-term or long-term. Long-range dependence, also known as long memory, implies that the influence of past values decays slowly over time. This is common in financial time series, where past price movements can have a lasting impact on future prices. Preserving this memory is crucial for predictive modeling, as it captures the underlying dynamics of the series. Fractional differentiation allows us to retain this crucial information while achieving stationarity.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Backshift Operator (B):</strong> The backshift operator (B) is a mathematical operator that shifts a time series back by one or more periods. It is defined as B^k X_t = X_{t-k}. This operator is fundamental to the definition and implementation of fractional differentiation. It provides a concise way to express differencing operations, both integer and fractional. For example, the first-order difference can be expressed as (1-B) X_t = X_t - X_{t-1}.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Fractional Differencing Operator (1-B)^d:</strong> This operator generalizes the integer differencing operator to non-integer orders <em>d</em>. It is defined using the binomial series expansion: (1-B)^d = \u03A3 (from k=0 to infinity) [\u0393(d+1) / (\u0393(k+1) * \u0393(d-k+1))] * (-B)^k, where \u0393 denotes the gamma function. This expansion provides a way to calculate the fractionally differenced series as a weighted sum of past observations.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Weights (\u03C9_k):</strong> The coefficients of the binomial expansion in the fractional differencing operator act as weights applied to past values of the time series. These weights determine how much influence past observations have on the current value. The decay rate of these weights is controlled by the fractional differentiation parameter <em>d</em>. For integer <em>d</em>, the weights become zero after <em>d</em> + 1 terms, effectively truncating the memory. For fractional <em>d</em>, the weights decay gradually, preserving long-range dependence.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Expanding Window Method:</strong> This implementation of fractional differentiation applies the weights \u03C9_k to an expanding window of past observations. However, this approach can introduce a negative drift due to the increasing number of negative weights as the window expands. Mitigation strategies, such as setting a tolerance level (\u03C4) and discarding initial values, are employed to address this drift.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Fixed-Width Window Fractional Differentiation (FFD):</strong> The FFD method uses a fixed-width window of past observations, determined by a threshold (\u03C4) on the absolute value of the weights. Weights below the threshold are discarded. This avoids the negative drift associated with the expanding window method and ensures a more stable and interpretable transformation.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Minimum Differentiation Coefficient (d*):</strong> This represents the smallest fractional differentiation order <em>d</em> that achieves stationarity for a given time series. It signifies the minimal amount of memory that needs to be removed to achieve stationarity. Finding d* is crucial for optimizing the balance between stationarity and memory preservation.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Augmented Dickey-Fuller (ADF) Test:</strong> The ADF test is a statistical test used to determine whether a time series has a unit root, which implies non-stationarity. It is used to assess the effectiveness of fractional differentiation in achieving stationarity. The test involves regressing the differenced series on its lagged values and testing the significance of the coefficient on the lagged level.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Signal-to-Noise Ratio:</strong> This ratio quantifies the relative strength of the underlying signal compared to the random noise in a time series. Financial time series often have low signal-to-noise ratios due to market efficiency and arbitrage forces. Fractional differentiation can help improve the signal-to-noise ratio by removing noise while preserving the underlying signal embedded in the memory of the series.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The chapter's argument can be stated as a single optimisation problem hiding inside every financial modelling pipeline: given a price series X, find the smallest d \u2208 [0, 1] such that (1-B)^d X passes the ADF test at the desired significance level. The objective function is memory, measured as the correlation between the transformed series and the original. The constraint is stationarity. Integer differentiation fixes d = 1 a priori, solving the constraint but trivially minimising the objective \u2014 it throws away everything that could be kept. L\xF3pez de Prado's reframing simply treats d as a parameter to be tuned, not a convention to be inherited.`), /* @__PURE__ */ React.createElement(P, null, `The mathematics is clean. The fractional-differencing operator (1-B)^d expands via the binomial series into an infinite linear combination of backshift powers, with weights \u03C9_k computed iteratively as \u03C9_k = -\u03C9_{k-1} \xB7 (d - k + 1) / k, starting from \u03C9_0 = 1. These weights alternate in sign and decay hyperbolically for fractional d, so the resulting series is a long-memory weighted average rather than a short-term difference. For d = 1 the weights collapse to (1, -1, 0, 0, ...) and the operator reduces to the familiar first-difference. For d = 0 they reduce to (1, 0, 0, ...) and the operator is the identity. Everything in between is new territory.`), /* @__PURE__ */ React.createElement(P, null, `Two implementations matter in practice. The expanding-window method applies the truncated weight vector to the full available history at each time t; this is straightforward but suffers from a slow drift because the cumulative weight of the retained terms varies as the series gets longer. The fixed-width variant (FFD) sets a tolerance \u03C4 on |\u03C9_k|, discards all weights below that tolerance, and applies the remaining fixed-length weight vector as a convolution. FFD removes the drift, stabilises the distributional properties of the transformed series, and \u2014 crucially \u2014 produces a constant memory footprint across the full length of the history, which is what downstream modelling actually needs.`), /* @__PURE__ */ React.createElement(P, null, `Empirically, the chapter's most striking result is that most liquid futures achieve stationarity well below d = 1. Many reach it in the 0.3\u20130.5 range, and at those orders the correlation between the transformed series and the raw price remains above 0.9. This means a sizeable fraction of the memory that would have been destroyed by first-differencing is still available as input to a machine-learning model. Returns, the industry default, correspond to d = 1 and correlation near zero \u2014 a remarkably lossy feature when an alternative feature at d = 0.4 sits untouched on the same dataset.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Theoretical Foundations"), /* @__PURE__ */ React.createElement(P, null, `The theoretical foundation of fractional differentiation rests on generalising the difference operator (1-B) to non-integer powers (1-B)^d via the binomial series. The identity (1-B)^d = \u03A3 (from k=0 to \u221E) [\u0393(d+1) / (\u0393(k+1) \u0393(d-k+1))] (-B)^k defines a formal power series in the backshift operator, interpreted as a convergent operator on square-summable sequences whenever |B| \u2264 1 and d > -1 \u2014 conditions automatically satisfied when B acts on a finite time series. The weights \u03C9_k = \u0393(d+1) / (\u0393(k+1) \u0393(d-k+1)) \xB7 (-1)^k are computed in practice through the iterative recursion \u03C9_k = -\u03C9_{k-1} \xB7 (d - k + 1) / k with \u03C9_0 = 1, which is numerically stable and avoids any direct evaluation of the gamma function.`), /* @__PURE__ */ React.createElement(P, null, `The rate at which these weights decay is what gives fractional differentiation its character. For integer d the weights become exactly zero after d + 1 terms, producing an operator with finite support and zero long-memory. For fractional d between 0 and 1 the weights decay as k^{-d-1}, producing a hyperbolic tail that sums to a finite number but extends indefinitely \u2014 the formal signature of long-range dependence. Convergence is rapid near d = 0 and slower near d = 1, which dictates how large a truncation threshold \u03C4 must be chosen for a given tolerance on the approximation error.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles and Axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Memory Preservation:"), " Fractional differentiation aims to achieve stationarity while preserving the maximum possible amount of memory in the time series. This principle recognises the importance of long-range dependence in financial data and seeks to retain this information for predictive modelling."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Minimal Differentiation:"), " The goal is to find the smallest fractional differentiation order d that achieves stationarity. This principle ensures that only the necessary amount of memory is removed, avoiding over-differentiation and the associated loss of information.")), /* @__PURE__ */ React.createElement(H4, null, "Key Terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Gamma Function (\u0393):"), " The gamma function is a generalisation of the factorial function to complex numbers, defined by the integral of t raised to (z minus 1) times exp of negative t from zero to infinity. It appears in the binomial-expansion weights of the fractional differencing operator and provides a means to compute factorial-like quantities for non-integer arguments."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Unit Root:"), " A unit root in a time series indicates non-stationarity, implying a stochastic trend and time-varying statistical properties. Its presence invalidates many standard inferential tools; fractional differentiation is used to remove unit roots while retaining as much memory as possible."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Backshift Operator (B):"), " The operator satisfying B raised to k applied to X at time t equals X at time t minus k. It is used to express integer and fractional differencing in compact polynomial form and is the algebraic primitive on which the entire fractional-differencing machinery is built."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Tolerance (\u03C4):"), " The threshold applied to the absolute value of the weights \u03C9 at lag k to determine truncation. It controls the fixed window length in FFD and trades approximation fidelity against computational cost and boundary bias.")), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement(P, null, `Fractional calculus has surprisingly old roots. Leibniz and L'H\xF4pital corresponded in the late seventeenth century about the meaning of a half-derivative, and by the nineteenth century Liouville and Riemann had built a rigorous framework for real-order integration and differentiation. For most of its history the subject stayed inside pure analysis and mathematical physics. Hosking's 1981 paper brought it into time-series econometrics by extending ARIMA models to ARFIMA \u2014 autoregressive fractionally integrated moving average \u2014 opening the door to applied long-memory modelling. Uptake in finance has been slow, partly because the Box-Jenkins methodology and cointegration literature offered institutionally-sanctioned answers to non-stationarity that did not require reaching beyond integer orders. The chapter's polemical point is that the profession adopted one corner of the d-axis by historical accident and then forgot the rest existed.`), /* @__PURE__ */ React.createElement(H4, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(P, null, `Two implementations dominate. The expanding-window method computes the fractionally-differenced value at time t as a weighted sum of every observation up to t, with weights drawn from the truncated binomial expansion. Its conceptual simplicity is offset by a negative drift: as the window grows, the cumulative weight of the tail shifts, and the transformed series picks up a trend that has no counterpart in the underlying dynamics. Mitigation by discarding early observations helps but does not fully eliminate the effect.`), /* @__PURE__ */ React.createElement(P, null, `The fixed-width window variant (FFD) is the preferred tool. One sets a tolerance \u03C4 on |\u03C9_k|, finds the smallest k* at which |\u03C9_{k*}| \u2264 \u03C4, and uses only the first k* weights. The transformation becomes a convolution with a fixed-length kernel, applied uniformly across the series. Drift vanishes, memory is constant from the earliest usable point through to the last observation, and the distributional properties are well-behaved enough for ADF and related tests to deliver meaningful results. The FFD pipeline in practice: prepare the series, compute the weight vector via the iterative recursion, threshold at \u03C4, determine the fixed window, apply the convolution, test stationarity via ADF, and iterate on d until d* is identified.`), /* @__PURE__ */ React.createElement(H4, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `The FFD algorithm has time complexity O(n w), where n is the length of the series and w is the fixed window length determined by \u03C4, and space complexity O(w). For \u03C4 around 1e-4 to 1e-5 and typical d values, w sits in the low hundreds to low thousands of observations \u2014 small enough that the algorithm runs in milliseconds per instrument. The processing pattern is a sliding convolution, which parallelises trivially and vectorises cleanly in NumPy or any array library. The only non-trivial edge case is the leading stretch of the series, where fewer than w observations are available; the standard solution is to skip those points and begin emitting fractionally-differenced values only once the full window is populated.`), /* @__PURE__ */ React.createElement(Code, { language: "python" }, `import numpy as np

def get_weights_ffd(d, tau):
    # Iteratively generate FFD weights until |w_k| drops below tau.
    w = [1.0]
    k = 1
    while True:
        w_k = -w[-1] * (d - k + 1) / k
        if abs(w_k) < tau:
            break
        w.append(w_k)
        k += 1
    return np.array(w[::-1])  # reversed for convolution alignment

def frac_diff_ffd(series, d, tau=1e-4):
    w = get_weights_ffd(d, tau)
    width = len(w)
    out = np.full(len(series), np.nan)
    for i in range(width - 1, len(series)):
        window = series[i - width + 1 : i + 1]
        out[i] = np.dot(w, window)
    return out

def find_min_d(series, d_grid=np.linspace(0, 1, 21), tau=1e-4, adf_thresh=-2.86):
    from statsmodels.tsa.stattools import adfuller
    for d in d_grid:
        y = frac_diff_ffd(series, d, tau)
        y = y[~np.isnan(y)]
        stat = adfuller(y, maxlag=1, regression="c", autolag=None)[0]
        if stat < adf_thresh:
            return d, stat
    return None, None
`), /* @__PURE__ */ React.createElement(Ch5Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `Stylised d-search for a liquid futures series. As d rises the ADF statistic falls past the 5% critical value (dashed line) somewhere around d \u2248 0.35\u20130.4, at which point the correlation with the raw price is still above 0.85. Integer differencing at d = 1 produces a much stronger ADF rejection but collapses the memory correlation close to zero. The minimum-d point is where the two curves are simultaneously usable.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Running FFD in production requires a few disciplined habits. Treat d and \u03C4 as hyperparameters: grid-search over d \u2208 {0, 0.05, 0.1, ..., 1} with a fixed \u03C4, and only refine \u03C4 if the resulting window length w is either too short (losing useful memory) or too long (over-weighting distant history). Expect d* to vary across instruments but cluster in a narrow range \u2014 most equity, FX, and commodity futures land between 0.3 and 0.6. Re-estimate d* periodically; regime changes can shift it, though usually not dramatically. Parallelise across instruments, not within a single FFD pass \u2014 the convolution is already fast enough that Python-level parallelism inside the inner loop adds more overhead than it saves.`), /* @__PURE__ */ React.createElement(P, null, `Common pitfalls: using too coarse a d-grid and missing d*; forgetting to drop the leading NaN region before ADF testing, which corrupts the statistic; applying FFD to log-prices rather than prices (both work, but the d* values differ and the choice must be made explicitly); and comparing FFD outputs across instruments without aligning their tolerance-determined window lengths. The remedy is the same in each case \u2014 make \u03C4, the log-vs-linear decision, and the d-grid resolution explicit in the pipeline configuration rather than burying them in code.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `The applied payoff of FFD is simplest to state in machine-learning terms: it produces a feature set that is both stationary and memoryful, and that property translates directly into predictive lift. In forecasting, replacing return features with FFD features typically improves sample-efficient models because the features carry information about price level and trend that returns cannot express. In risk management, FFD transforms allow volatility and dependence estimates to incorporate long-memory structure without the non-stationarity problems that plague models fit on raw prices.`), /* @__PURE__ */ React.createElement(P, null, `In algorithmic trading, FFD is a natural preprocessing step for any model whose features include price data. It keeps the statistical hygiene that the modelling stack demands while retaining the slow-moving signal that short-horizon return features have already discarded. In portfolio construction, FFD-based correlation and covariance estimates are more robust to regime drift than return-based estimates over the same window, because the long-memory component keeps the estimates anchored to persistent structural relationships. Integration is straightforward: FFD fits cleanly into a scikit-learn-style pipeline as a preprocessor, and the hyperparameters (d, \u03C4) can be cross-validated alongside the downstream model's own parameters.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `Several natural extensions await. Multivariate FFD \u2014 applying fractional differentiation componentwise across a panel of instruments with instrument-specific d* values \u2014 is the immediate generalisation and is straightforward to implement, though it raises questions about whether the transformed series should share a common d or use local minima. Non-linear extensions, where the differencing order varies smoothly over time in response to a regime indicator, are a live research area. High-frequency applications require careful choice of \u03C4 because the window length in observations can become unmanageable at microsecond resolution; some authors propose time-adaptive tolerances that shrink \u03C4 as the sampling frequency rises.`), /* @__PURE__ */ React.createElement(P, null, `Alternative routes to stationarity-with-memory include wavelet transforms, which give a multi-scale decomposition and preserve localised features but do not produce a single stationary series, and empirical mode decomposition, which is data-adaptive but lacks the theoretical grounding of FFD. FFD's combination of mathematical rigour, computational cheapness, and empirical performance makes it the workhorse for most financial ML feature pipelines, with the alternatives reserved for problems where the d-axis itself is not the right axis to search along.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `Chapter 5 closes with a clean operational prescription. Never feed machine-learning models raw prices, because they are non-stationary; never feed them returns, because they are memory-less. Instead, search for d* \u2014 the smallest fractional differentiation order that makes the series stationary under ADF \u2014 using the FFD algorithm with a sensible tolerance \u03C4, and use the resulting series as the feature. The d* typically lies between 0.3 and 0.6 for liquid futures, retains correlation above 0.85 with the raw series, and produces features whose statistical properties are clean enough to support the inferential machinery that machine-learning pipelines rely on.`), /* @__PURE__ */ React.createElement(P, null, `The broader message is methodological. Financial econometrics has spent decades working at the extremes of the differentiation axis \u2014 d = 0 for level analysis, d = 1 for return analysis \u2014 and treating the intermediate region as a mathematical curiosity. The chapter reframes that region as the default operating point for predictive modelling and provides the algorithmic tools (FFD, the iterative weight recursion, the d-grid search with ADF) to make it routine. Adopting fractional differentiation is not a research exercise; it is a re-tooling of the feature-engineering layer that sits under every quantitative strategy and every machine-learning model built on price data.`)), /* @__PURE__ */ React.createElement(Sec, { n: "6", title: "Ensemble Methods in Machine Learning: Bagging, Boosting, and Applications in Finance" }, /* @__PURE__ */ React.createElement(P, null, `Ensemble methods occupy a particular place in the financial machine-learning toolkit: they are the clearest concrete expression of the idea that modelling is less about finding the single best hypothesis than about managing the error budget of a collection of imperfect ones. A single decision tree is a brittle object \u2014 a small perturbation to the training set can flip splits near the root and cascade into a very different model. Treat that fragility as a feature rather than a bug, draw many trees from slightly different views of the data, and the aggregate prediction becomes something much steadier than any individual tree ever was. This is the bet at the heart of bagging, random forests, boosting, and the methods layered on top of them.`), /* @__PURE__ */ React.createElement(P, null, `The chapter sits at an important hinge in the book. Earlier chapters established how to build labels, sample bars, and construct training sets that respect the overlapping, path-dependent nature of financial returns. Ensembles are where those labels finally meet a learning algorithm strong enough to exploit them. But the marriage is not automatic. Financial data is redundant in ways that standard machine-learning datasets are not: autocorrelation, overlapping horizons, and sequentially bootstrapped observations all inflate the apparent out-of-bag accuracy of a random forest and flatter the practitioner into a false sense of generalisation. Boosting, for its part, is acutely sensitive to label noise, and the signal-to-noise ratio in markets is famously low.`), /* @__PURE__ */ React.createElement(P, null, `The material proceeds along two axes at once. Vertically, it works through the bias-variance decomposition, then bagging as a variance-reduction device, then random forests as decorrelated bagging, then boosting as a sequential bias-reduction device, and finally the interactions among them. Horizontally, at each stage, it asks what adjustments financial data demands: how to size bootstrap samples when observations are not independent, how to avoid shuffling when constructing cross-validation folds, when the OOB estimate can be trusted and when it cannot.`), /* @__PURE__ */ React.createElement(P, null, `The practical result is a set of principles rather than a recipe. Prefer bagging when the priority is robustness and parallelism. Prefer boosting when the base learners are genuinely weak and the data is clean. Always suspect an OOB accuracy that looks too good. Always ask whether the diversity among base learners is real or manufactured. The chapter is, in effect, an argument for treating ensembles as a discipline of error accounting in a domain where errors are neither independent nor identically distributed.`), /* @__PURE__ */ React.createElement(Ch6Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Figure 6.1 \u2014 Out-of-sample accuracy as the ensemble size grows. Bagging plateaus cleanly around a few hundred learners; boosting rises steeply, overshoots, and degrades as it begins to fit noise. The gap between the two curves at their respective peaks is the chapter's central empirical question.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { title: "Ensemble Learning" }, `Ensemble learning is a paradigm in machine learning that leverages the combined predictive power of multiple base learners (often referred to as "weak learners") to create a more robust and accurate model, known as an ensemble. The core idea is that by aggregating the predictions of diverse base learners, the ensemble can outperform any individual learner and mitigate the impact of individual weaknesses. This diversity can be achieved through variations in the training data, the learning algorithm, or both. Ensemble methods are particularly effective when the base learners are relatively simple and prone to high variance or bias. The ensemble effectively averages out these individual errors, leading to improved generalization performance on unseen data. Common ensemble methods include bagging, boosting, and stacking.`), /* @__PURE__ */ React.createElement(Callout, { title: "Bias-Variance Trade-off" }, `The bias-variance trade-off is a fundamental concept in machine learning that describes the relationship between a model's complexity and its ability to generalize to unseen data. Bias refers to the error introduced by simplifying assumptions made by the model to make the target function easier to learn. High bias can lead to underfitting, where the model fails to capture the underlying patterns in the data. Variance, on the other hand, refers to the model's sensitivity to fluctuations in the training data. High variance can lead to overfitting, where the model learns the noise in the training data rather than the true underlying signal. The goal is to find the optimal balance between bias and variance that minimizes the total error, which is the sum of the squared bias, variance, and irreducible noise. Ensemble methods are particularly adept at managing this trade-off, often reducing variance without significantly increasing bias.`), /* @__PURE__ */ React.createElement(Callout, { title: "Bagging (Bootstrap Aggregating)" }, `
