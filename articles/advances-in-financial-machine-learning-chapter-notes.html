sential. Memory is rarely the bottleneck, but caching cleaned, aligned, horizon-tagged data is high-leverage because the same data is consumed by every combination.`), /* @__PURE__ */ React.createElement(P, null, `Common pitfalls track the two leakage channels the chapter identifies: insufficient purging (forgetting that labels based on triple-barrier methods look forward to a variable horizon) and insufficient embargoing (missing that earnings, macro releases, or simple volatility clustering propagate information for hours or days after an event). The fix in both cases is to encode the label horizon explicitly as sample metadata and to let the CPCV split-generator consume that metadata when computing the purged training set.`), /* @__PURE__ */ React.createElement(P, null, `Testing and validation of a CPCV implementation is itself a non-trivial exercise. Synthetic datasets with known ground truth \u2014 a generated signal with a known Sharpe \u2014 let one verify that the CPCV-estimated mean Sharpe converges to the true value and that the variance across paths shrinks as N grows. Regression tests against a reference implementation catch silent behavioural changes, and property-based tests verify that every path covers the dataset exactly once with no gaps or overlaps.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `CPCV is used across quantitative finance in exactly the same lifecycle positions that walk-forward occupied before it: to evaluate prospective trading strategies before capital allocation, to estimate the variance of performance metrics for portfolio construction, and to stress-test risk models against diverse historical orderings. A hedge fund running a new equity long-short model can use CPCV to compute the distribution of Sharpe ratios across fifty-odd backtest paths and to report not just a mean Sharpe but a five-and-ninety-five percentile range \u2014 a materially more honest summary of expected performance.`), /* @__PURE__ */ React.createElement(P, null, `Industry-specific adaptations are common. A bank evaluating a loan-portfolio strategy under different economic regimes can use CPCV to partition the data by calendar year or by regime label, so the combinatorial enumeration explicitly spans boom and recession conditions. A market-maker backtesting a quoting strategy can use CPCV at intraday granularity to span varied volatility regimes. In every case, the discipline is the same: partition by groups that preserve the dependencies of the problem, purge and embargo around the label horizon, and enumerate the combinations.`), /* @__PURE__ */ React.createElement(P, null, `Integration with existing trading platforms, risk systems, and data providers is usually straightforward because CPCV is a wrapper around the model-training loop rather than a replacement for it. The data-access layer, the feature pipeline, the model definition, and the performance-evaluation code all remain unchanged; CPCV inserts itself as the orchestration layer that decides which subset of samples the model sees for each of the C(N, k) fits. A study by Lopez de Prado demonstrates concretely how CPCV reduces the probability of false discoveries relative to WF on the same dataset \u2014 the same strategy, evaluated more honestly, produces a less flattering but more reliable conclusion.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `Current research extends CPCV in several directions. Hierarchical data \u2014 portfolios of correlated assets, multi-resolution time series \u2014 demands purging rules that span asset boundaries, since a label on one asset may depend on prices of correlated assets within the purging window. Non-stationary market dynamics motivate regime-aware partitioning, where the N groups are chosen to span distinct regimes rather than being purely temporal. Machine-learning-driven extensions explore whether the combinatorial enumeration can be sampled rather than exhaustively computed, and whether the resulting unbiased estimator can be constructed with fewer model fits.`), /* @__PURE__ */ React.createElement(P, null, `Extensions to more complex scenarios bring their own hazards. Multi-asset portfolios introduce cross-asset label leakage. Options strategies require labels based on implied volatility trajectories, whose purging windows can extend for weeks. High-frequency backtests require purging at a microstructural scale where order-book state from one microsecond leaks into features computed one microsecond later. Each added realism is a new surface for leakage and a new parameter in the CPCV configuration.`), /* @__PURE__ */ React.createElement(P, null, `Open research problems include better algorithms for enumerating combinatorial splits on very large N (where the exhaustive enumeration becomes infeasible), principled ways of handling extreme non-stationarity (where no finite-length training set is representative of the future), and the integration of CPCV with Bayesian and bootstrap approaches that offer complementary perspectives on backtest variance. Alternative techniques \u2014 Monte Carlo simulation, bootstrap resampling, parametric resampling of returns \u2014 remain useful adjuncts rather than replacements; combining CPCV with a Bayesian posterior over strategy parameters, for instance, gives both a distribution across event orderings and a distribution across plausible parameterisations.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `Robust backtesting is not a technique but a disposition: the insistence that a strategy's apparent edge must survive evaluation against many plausible histories rather than one. Walk-forward is the floor \u2014 temporally honest, universally applicable, and a useful first instrument. Purged and embargoed cross-validation raises the bar by stripping away the look-ahead leakage that naive k-fold produces on financial time series. CPCV raises it further by extracting \u03C6[N, k] distinct backtest paths from the same finite dataset, turning a point estimate into a distribution and turning the spread of that distribution into a diagnostic.`), /* @__PURE__ */ React.createElement(P, null, `The practical upshot is that any serious claim of edge should be accompanied by CPCV-based evidence \u2014 a distribution of path-Sharpes, not a single one; an explicit purging and embargo configuration; and a clear statement of how N and k were chosen. The variance of that distribution is itself the honest summary of how much of the apparent edge is signal and how much is the accident of event ordering. A strategy whose mean path-Sharpe is respectable and whose spread is tight is a candidate for capital; a strategy whose mean is high but whose spread is wide is a candidate for further scepticism.`), /* @__PURE__ */ React.createElement(P, null, `The ethical dimension is inseparable from the technical one. Quantitative researchers and practitioners operate under implicit and explicit incentives to report favourable backtests, and the machinery of cross-validated evaluation is only as strong as the honesty with which it is deployed. CPCV cannot prevent a researcher from running many independent strategy families and reporting only the best; it can only estimate the within-family overfitting cleanly. The field's trustworthiness depends on pre-committed search protocols and transparent disclosure of the strategy family from which a reported result was selected \u2014 a discipline CPCV supports but does not itself enforce.`), /* @__PURE__ */ React.createElement(P, null, `As markets continue to evolve and data structures grow richer, the need for robust and adaptable backtesting methodologies will only intensify. CPCV is the current state of the art, but it is a point on a trajectory rather than an endpoint: hierarchical, regime-aware, and sampling-based variants are all active research areas, and the practitioner's task is to stay abreast of the mathematics without losing sight of the first principle from which all of this derives \u2014 that a single historical path is a single draw, and that treating it otherwise is the foundational mistake robust backtesting exists to prevent.`)), /* @__PURE__ */ React.createElement(Sec, { n: "13", title: "Synthetic Paths, Honest Rules: Calibrated O-U Processes for Optimal Exit Corridors" }, /* @__PURE__ */ React.createElement(P, null, `An execution trader inherits a position. The entry is already done \u2014 someone upstairs decided the trade. What remains is the question that most backtests answer badly: when do you get out? Chapter 13 takes that narrow, practical question and refuses the usual historical-simulation answer. Instead of asking <em>what would this rule have done on the one price path the market happened to take</em>, it asks a more honest question: <em>what does this rule do across the distribution of paths the underlying process could have produced?</em> The hinge is a calibrated Ornstein-Uhlenbeck model \u2014 a mean-reverting stochastic differential equation whose parameters are fitted to observed prices, and then re-simulated thousands of times to flood the evaluation with synthetic scenarios that share the statistical fingerprint of the real series without sharing its specific accidents.`), /* @__PURE__ */ React.createElement(P, null, `The move matters because the backtest-overfitting problem is not a tuning issue \u2014 it is structural. A single historical path contains one realisation of the noise, and any profit-take R and stop-loss Omega fitted to it will, with enough search, memorise that noise. Out-of-sample the memorisation collapses. Lopez de Prado's framing is sharper: if the price process is mean-reverting, the optimal exit corridor is a property of the process, not of any particular path. Derive it from the generator, not from one of its outputs. The chapter operationalises this by griding (R, Omega) pairs, simulating many O-U paths under calibrated (phi, sigma), applying each rule to each path, computing Sharpe ratios across the simulation ensemble, and reading the optimum off the surface.`), /* @__PURE__ */ React.createElement(P, null, `What you get is a framework, not a point estimate. The chapter spends deliberate effort on the mechanics \u2014 OLS calibration of the discrete-time O-U, maximum holding period constraints, the handling of paths that never hit either barrier, the computational cost of a dense grid crossed with a large path count \u2014 but the architectural claim is the durable part. Swap the O-U for a jump-diffusion when you model commodity spikes; swap it for a regime-switching model when you model currencies through a central-bank surprise; the evaluation scaffolding stays the same. The discipline is to evaluate rules against a generator whose realism you can defend, not against a single path whose idiosyncrasies you cannot disentangle from genuine signal.`), /* @__PURE__ */ React.createElement(Ch13Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Five synthetic O-U paths (theta = 0.15, mu = 100, sigma = 2.5) starting at the long-run mean. The dashed green/red lines sketch an illustrative profit-take at +4 and stop-loss at -3. Each path hits the barriers at different times; the optimal (R, Omega) is the pair whose Sharpe averages highest across the ensemble, not the pair that looks best on any individual trajectory.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, { title: "Backtest Overfitting" }, `Backtest overfitting is a critical challenge in developing trading strategies. It occurs when a strategy is excessively tailored to historical data, capturing noise and idiosyncrasies that are unlikely to repeat in the future. This leads to stellar in-sample performance but disappointing out-of-sample results. The core issue is that the strategy learns the specific historical path rather than the underlying market dynamics. Mitigating overfitting requires techniques like robust optimization, cross-validation, and the use of synthetic data, as explored in this chapter, to ensure the strategy generalizes well to unseen market conditions. The chapter's approach of using a calibrated stochastic process to generate synthetic data aims to address this challenge directly.`), /* @__PURE__ */ React.createElement(Callout, { title: "Ornstein-Uhlenbeck (O-U) Process" }, `The O-U process is a mean-reverting stochastic process, meaning it tends to revert to a long-term average value. This makes it suitable for modeling financial instruments that exhibit mean reversion, such as interest rates or commodity prices. It's characterized by three key parameters: the long-run mean (mu), the speed of mean reversion (theta), and volatility (sigma). The O-U process is chosen for this chapter due to its analytical tractability and its ability to capture the mean-reverting behavior observed in certain financial markets. However, the methodology presented can be extended to other stochastic processes, allowing for flexibility in modeling different asset classes.`), /* @__PURE__ */ React.createElement(Callout, { title: "Optimal Trading Rules (OTRs)" }, `OTRs are a set of rules that dictate the entry and exit points for a trade, aiming to maximize a specific performance metric, typically the Sharpe ratio. These rules define the profit-taking and stop-loss levels, which determine when to exit a position to lock in profits or limit losses. The chapter focuses on optimizing these exit parameters for an existing position, a common problem faced by execution traders. The key is to find the optimal balance between these two thresholds to achieve the best risk-adjusted return.`), /* @__PURE__ */ React.createElement(Callout, { title: "Sharpe Ratio" }, `The Sharpe ratio is a widely used metric in finance to evaluate the risk-adjusted return of an investment. It's calculated as the excess return (return above the risk-free rate) divided by the standard deviation of the returns. A higher Sharpe ratio indicates a better return for a given level of risk. Maximizing the Sharpe ratio is a central objective in portfolio optimization and is the primary performance metric used in this chapter for evaluating trading rules.`), /* @__PURE__ */ React.createElement(Callout, { title: "Synthetic Data" }, `Synthetic data is artificially generated data that mimics the statistical properties of real-world data. In this chapter, synthetic data is generated from a calibrated O-U process to simulate a wide range of possible market scenarios. This allows for robust testing of trading rules and reduces the risk of overfitting to a specific historical path. The use of synthetic data is crucial for evaluating the performance of trading strategies under various market conditions and for assessing their robustness.`), /* @__PURE__ */ React.createElement(Callout, { title: "Calibration" }, `Calibration is the process of estimating the parameters of a model, in this case, the O-U process, based on observed data. Accurate calibration is essential for generating realistic synthetic data that reflects the underlying market dynamics. The chapter uses Ordinary Least Squares (OLS) regression to estimate the parameters of the O-U process, ensuring that the synthetic data accurately represents the statistical properties of the observed price movements.`), /* @__PURE__ */ React.createElement(Callout, { title: "Trading Rule Parameter Space" }, `The trading rule parameter space encompasses all possible combinations of profit-taking (R) and stop-loss (Omega) levels. The chapter explores this space by creating a grid of R and Omega values and evaluating the performance of each combination using synthetic data. This systematic exploration allows for the identification of the optimal trading rule that maximizes the Sharpe ratio.`), /* @__PURE__ */ React.createElement(Callout, { title: "Maximum Holding Period (maxHP)" }, `The maximum holding period is a constraint imposed on the trading strategy to prevent unrealistically long holding times in the simulations. This reflects practical limitations and ensures that the results are relevant to real-world trading scenarios.`), /* @__PURE__ */ React.createElement(Callout, { title: "Stationarity" }, `Stationarity is a statistical property of a time series where its statistical properties, such as mean and variance, do not change over time. The O-U process exhibits stationarity under certain conditions, which is important for the validity of the analysis. The chapter ensures that the calibrated O-U process satisfies the stationarity conditions.`), /* @__PURE__ */ React.createElement(Callout, { title: "Half-life (tau)" }, `The half-life of a mean-reverting process is the time it takes for the process to revert halfway back to its long-run mean after a deviation. It's a measure of the speed of mean reversion. The chapter uses the half-life as an input parameter for the O-U process, providing an intuitive way to control the speed of mean reversion in the simulations.`), /* @__PURE__ */ React.createElement(Callout, { title: "Probability of Backtest Overfitting (PBO)" }, `PBO is a measure of the likelihood that a trading strategy's performance is due to overfitting to historical data. While mentioned, the chapter focuses on avoiding overfitting altogether through the use of synthetic data, making PBO less central to the analysis.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The chapter's technical spine is disarmingly compact. Take a mean-reverting series \u2014 a spread, a stationary residual, a commodity basis. Calibrate the three O-U parameters from that series. Generate many alternative paths from the calibrated process. For every candidate (R, Omega) pair on a grid, run every path through the rule and record the terminal P&L. Compute the Sharpe ratio of the P&L distribution. The (R, Omega) with the highest expected Sharpe across the ensemble is the optimal trading rule. Nothing in this loop touches the specific historical realisation after calibration is complete \u2014 which is precisely the point.`), /* @__PURE__ */ React.createElement(P, null, `Two design choices deserve emphasis. First, optimisation is over exit parameters only, not entry. The trade has already been initiated; the question is how to liquidate. That narrowing dramatically simplifies the search space and aligns the methodology with the real problem an execution trader faces. Second, Sharpe is computed across paths, not within a path. The risk metric captures dispersion of outcomes under the modelled process, which is the right denominator when the goal is robustness to market variation rather than smoothness of a single realised equity curve.`), /* @__PURE__ */ React.createElement(P, null, `The Sharpe surface over the (R, Omega) grid \u2014 visualised in the second figure as a heatmap of bubble sizes \u2014 is typically single-peaked and well-behaved for calibrated O-U processes, making the optimum easy to locate. Corners of the surface encode intuition: tiny R with large Omega gives too-early profit-taking and unlimited downside; huge R with tiny Omega stops out on every wiggle. The interior maximum is the profile of exit behaviour that best matches the mean-reversion speed and volatility encoded in (theta, sigma).`), /* @__PURE__ */ React.createElement(P, null, `The methodology generalises. Replace the O-U with a CIR for non-negative series, a jump-diffusion for asset classes with gap risk, or a regime-switching model for markets that move between dispersion regimes. The evaluation scaffolding \u2014 grid search over exit parameters, many simulated paths, Sharpe across the ensemble \u2014 is invariant to the choice of generator. The cost of generalisation is calibration complexity; the benefit is that the optimal rule reflects the true process, not the noise of one sample from it.`), /* @__PURE__ */ React.createElement(Ch13Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `Bubble size encodes mean Sharpe across simulated paths for each (R, Omega) pair on a 10x10 grid. The surface is concave around an interior optimum near (R = 2.5 sigma, Omega = 3.0 sigma) for this calibration; corners perform poorly for different reasons (premature exits vs unbounded loss). The whole point of the O-U framework is that this surface is a property of the calibrated process, not of any single historical path.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Theoretical Foundations"), /* @__PURE__ */ React.createElement(P, null, `The theoretical foundation of this chapter rests on the principles of stochastic calculus and financial engineering. The Ornstein-Uhlenbeck (O-U) process, a mean-reverting stochastic process, is central to the analysis. The O-U process is defined by the stochastic differential equation dX_t = theta (mu - X_t) dt + sigma dW_t, where X_t is the price at time t, theta is the speed of mean reversion, mu is the long-run mean, sigma is the volatility, and W_t is a Wiener process (Brownian motion). This equation describes the evolution of the price over time, incorporating both a deterministic mean-reverting term that pulls the price towards mu, and a stochastic term that introduces random fluctuations.`), /* @__PURE__ */ React.createElement(P, null, `For practical implementation the chapter uses the discrete-time recurrence P_{i,t+1} = P_{i,0} + phi (P_{i,t} - P_{i,0}) + sigma epsilon_{i,t}, where P_{i,t} is the price at time t, P_{i,0} is the long-run equilibrium price, phi encodes the speed of mean reversion, sigma is the volatility, and epsilon_{i,t} are IID standard normal innovations. The parameters phi and sigma are estimated from historical data using Ordinary Least Squares, which linearises the recurrence and reads coefficients off a regression of P_{i,t+1} on P_{i,t}. Stationarity requires |phi| < 1; the half-life tau follows as -log(2) / log(phi).`), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement(P, null, `Traditional backtesting methods rely heavily on historical data, often leading to overfitting. Previous approaches have attempted to address overfitting through techniques like walk-forward analysis and cross-validation, but these methods are still limited by the available historical data and may not capture the full range of possible market scenarios. The use of synthetic data generated from a calibrated stochastic process, as proposed in this chapter, represents a significant advancement in backtesting methodology \u2014 a wider range of potential market conditions can be evaluated with the same calibration effort.`), /* @__PURE__ */ React.createElement(P, null, `Earlier attempts to optimise trading rules often involved exhaustive search methods over a predefined parameter space. These are computationally intensive and offer no guarantee of finding the globally optimal solution on a fresh sample. The chapter's framework, by deriving OTRs directly from the underlying stochastic process, provides a more efficient and principled approach: the Sharpe surface is smooth because expectations are smooth, and the optimum is a property of the process rather than an artefact of search over one noisy path.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles and Axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Mean Reversion."), " The core assumption is that certain financial instruments revert to a long-run average over time. Without mean reversion the O-U framework has no edge; with it, the speed theta gives the natural time-scale of the exit corridor."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Risk-Adjusted Return."), " Return alone is not enough; the dispersion of outcomes across paths matters. The Sharpe ratio \u2014 excess return divided by volatility \u2014 is the evaluation metric the chapter optimises, computed across the ensemble of simulated paths rather than within any single realisation.")), /* @__PURE__ */ React.createElement(H4, null, "Key Terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Mark-to-Market (MtM)."), " The current market value of a position \u2014 units held multiplied by current market price. It represents the liquidation value at any given time."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Profit/Loss (pi_", "{i,t}", ")."), " The profit or loss on a position at time t, calculated as the difference between the MtM value at time t and the initial cost of the position."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Profit-Taking Threshold (R)."), " The level of profit at which a position is closed, expressed as a percentage or absolute value (the chapter typically uses sigma-units)."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Stop-Loss Threshold (Omega)."), " The level of loss at which a position is closed to limit further losses, expressed as a percentage or absolute value."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "In-Sample (IS)."), " The data used to develop and calibrate a trading strategy."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Out-of-Sample (OOS)."), " Data not used in development, reserved for evaluating performance on unseen data.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(P, null, `The chapter proposes a concrete six-step methodology. First, parameter estimation: phi and sigma are estimated by OLS on the linearised discrete-time O-U recurrence, fitted to observed prices. Second, trading rule grid: a two-dimensional grid of (R, Omega) values is laid down over the plausible range of exit thresholds (typically expressed in units of sigma so the grid transfers across assets). Third, path generation: many price paths are simulated from the calibrated O-U process, each starting at the current position's entry price and evolving under the estimated dynamics.`), /* @__PURE__ */ React.createElement(P, null, `Fourth, trading rule application: for every simulated path and every (R, Omega) pair in the grid, the rule is executed \u2014 the path is monitored bar by bar and the position is closed the first time the mark-to-market crosses either threshold, or when the maximum holding period (maxHP) is reached, whichever comes first. Fifth, Sharpe ratio calculation: the distribution of P&L outcomes across the ensemble defines the mean and standard deviation, from which Sharpe is computed. Sixth, OTR selection: the (R, Omega) pair with the highest expected Sharpe across the simulation ensemble is chosen as the optimal trading rule.`), /* @__PURE__ */ React.createElement(P, null, `The comparative case is stark. Traditional historical backtests fit rules to the one realised path and inherit its idiosyncrasies; walk-forward analysis mitigates this but remains bounded by the length and variety of the sample. The synthetic-data methodology here trades a modelling commitment (you must defend the O-U as an adequate generator) for the ability to evaluate (R, Omega) against thousands of plausible alternative histories. Strengths: robustness to overfitting, flexibility across stochastic processes, and natural testability under varied market regimes. Limitations: results depend on the fidelity of the chosen generator, and the path-count x grid-size product can be computationally heavy without parallelisation.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `The core algorithm takes as input the estimated O-U parameters (phi, sigma), the initial price P_i, the long-run equilibrium P_{"{i,0}"}, the range of R and Omega values, the maximum holding period maxHP, and the number of simulated paths N. For each (R, Omega) combination, it simulates N price paths, applies the rule to each, records the terminal P&L, and computes the Sharpe ratio. The outputs are the optimal (R*, Omega*) and the full Sharpe surface for diagnostics.`), /* @__PURE__ */ React.createElement(P, null, `Time complexity is O(N * M * T), where M is the number of grid points and T is the average path length. Space complexity is O(N * T) if paths are stored, but this reduces to O(1) per path if P&L is computed on-the-fly and only summary statistics are retained \u2014 the recommended pattern at scale. Parallelisation follows a master-worker structure: the master distributes (path_seed, R, Omega) tuples to workers, each worker simulates and evaluates independently, and results aggregate through a shared Sharpe accumulator. Edge cases \u2014 paths that never hit a barrier within maxHP \u2014 are closed at the end of the holding period using the MtM at that time.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Computational cost dominates. The product of path count and grid size grows quickly \u2014 a 20x20 grid with 10,000 paths and 250-step horizons is 1 billion bar evaluations, manageable but not trivial. Vectorise the barrier-crossing check across paths, parallelise across (R, Omega) pairs, and profile before optimising: the inner loop (barrier detection on a single path) is typically where time lives. Memory pressure is easy to manage if paths are simulated and evaluated in batches rather than materialised up-front.`), /* @__PURE__ */ React.createElement(P, null, `Two pitfalls recur. First, insufficient path count: Sharpe estimates converge slowly under heavy-tailed P&L distributions, so 1,000 paths is often inadequate \u2014 check the standard error of the Sharpe estimate and increase N until the surface is stable. Second, inaccurate calibration: if phi is poorly estimated, the generator has the wrong mean-reversion speed and the OTR is optimised for a process the market is not producing. Robust estimation (trimmed OLS, bootstrap confidence on phi) is worth the extra code. Validate with residual analysis: the empirical innovations epsilon should be approximately IID normal if the O-U specification fits.`), /* @__PURE__ */ React.createElement(Code, { language: "python" }, `import numpy as np
from numpy.random import default_rng

def calibrate_ou_ols(prices):
    """Fit discrete-time O-U: P_{t+1} - P_0 = phi (P_t - P_0) + sigma eps."""
    P = np.asarray(prices, dtype=float)
    P0 = P.mean()
    x, y = P[:-1] - P0, P[1:] - P0
    phi = (x @ y) / (x @ x)
    resid = y - phi * x
    sigma = resid.std(ddof=1)
    return P0, phi, sigma

def simulate_ou(P0, phi, sigma, start, n_paths, n_steps, rng):
    P = np.full((n_paths, n_steps + 1), float(start))
    eps = rng.standard_normal((n_paths, n_steps))
    for t in range(n_steps):
        P[:, t + 1] = P0 + phi * (P[:, t] - P0) + sigma * eps[:, t]
    return P

def apply_rule(paths, entry, R, Omega, maxHP):
    """Return P&L per path. Close on first barrier hit or at maxHP."""
    pnl = np.empty(paths.shape[0])
    for i, path in enumerate(paths):
        horizon = min(maxHP, path.size - 1)
        exit_price = path[horizon]
        for t in range(1, horizon + 1):
            delta = path[t] - entry
            if delta >= R or delta <= -Omega:
                exit_price = path[t]
                break
        pnl[i] = exit_price - entry
    return pnl

def sharpe(pnl):
    s = pnl.std(ddof=1)
    return pnl.mean() / s if s > 0 else 0.0

def find_otr(prices, entry, R_grid, Omega_grid, n_paths=5000, maxHP=100, seed=0):
    P0, phi, sigma = calibrate_ou_ols(prices)
    rng = default_rng(seed)
    paths = simulate_ou(P0, phi, sigma, entry, n_paths, maxHP, rng)
    surface = np.zeros((len(R_grid), len(Omega_grid)))
    for i, R in enumerate(R_grid):
        for j, Om in enumerate(Omega_grid):
            surface[i, j] = sharpe(apply_rule(paths, entry, R, Om, maxHP))
    i_star, j_star = np.unravel_index(surface.argmax(), surface.shape)
    return (R_grid[i_star], Omega_grid[j_star]), surface
`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `Three application domains follow directly. Algorithmic trading: the derived (R*, Omega*) are lifted straight into an execution system that liquidates positions when either barrier is breached \u2014 a clean contract between the research layer and the production stack, with no in-loop optimisation to babysit. Risk management: the Sharpe surface tells you not just where the optimum lives but how sharply it falls off, which maps to regret: a flat surface around the optimum means small mis-estimation costs little, a steep one means precision matters. Portfolio optimisation: per-asset OTRs can be composed into a portfolio-level exit policy, though cross-asset correlations require extending the generator to a multivariate process.`), /* @__PURE__ */ React.createElement(P, null, `Industry adaptations are natural. Futures on commodities, rates, and indices often show mean-reverting spreads and bases that fit the O-U well. Options strategies can graft on top: the O-U models the underlying, while the exit rule operates on an option's mark-to-market. Integration is typically through a research-to-production pipeline that re-runs calibration periodically, re-optimises (R, Omega) against current parameters, and publishes the corridor to the execution system \u2014 a weekly or monthly cadence is usually sufficient given the rate at which theta and sigma drift for liquid mean-reverting series.`), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(P, null, `A modular structure keeps the moving parts legible. Separate modules for calibration, simulation, rule application, and evaluation, each exposing a thin interface. The Python sketch above shows the minimal viable implementation \u2014 calibrate via OLS, simulate vectorised O-U paths, apply the rule path-by-path, compute Sharpe, pick the grid optimum. Production code extends this with parallelisation (joblib or multiprocessing across (R, Omega) pairs), vectorised barrier detection (np.argmax on a boolean mask beats the per-step Python loop), and careful handling of the no-hit case at maxHP.`), /* @__PURE__ */ React.createElement(P, null, `Data structures that help: a PricePath class or structured array carrying (path_id, times, prices) if you need provenance; a TradingRule dataclass holding (R, Omega, maxHP) for serialisation; a SharpeSurface wrapper that records the full grid and summarises confidence intervals around the optimum. Error handling should catch non-stationary calibrations (|phi| >= 1), near-zero sigma (degenerate process), and empty P&L distributions (all paths censored at maxHP with identical MtM). Logging at calibration and surface-peak levels is usually enough for debugging; unit tests should pin the OLS coefficients on known inputs and verify barrier detection on hand-crafted paths.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `Current research extends the methodology to richer generators: jump-diffusion processes to capture gap risk in commodities and credit, regime-switching models for currencies that transition between calm and turbulent volatility regimes, and machine-learned generators (neural SDEs, score-based models) that fit path distributions without committing to a parametric family. Each of these slots into the evaluation scaffolding with minimal change \u2014 the grid search, path simulation, and Sharpe computation are agnostic to the generator choice, provided you can sample from it.`), /* @__PURE__ */ React.createElement(P, null, `Two structural extensions are particularly live. Multi-asset portfolios require a multivariate generator (e.g. correlated O-U or a cointegration-based system) and a joint optimisation over per-asset exit corridors, with portfolio-level Sharpe as the objective \u2014 this is non-trivial because the exit rules couple through portfolio P&L. Dynamic trading rules adjust (R, Omega) in response to market state (realised volatility, regime indicators), which demands either a parameterised policy (R and Omega as functions of state) or reinforcement learning to learn the exit corridor end-to-end. Reinforcement learning is the clearest alternative approach to the whole chapter: it bypasses the generator commitment by learning exit policies directly from data, at the cost of reintroducing sample-efficiency and overfitting problems the chapter was designed to avoid.`), /* @__PURE__ */ React.createElement(P, null, `Open problems remain. Closed-form solutions for optimal (R, Omega) under O-U exist in limiting cases but not in the full finite-horizon problem with maxHP \u2014 numerical methods are still required. Model selection \u2014 which generator best fits a given series, and how to hedge against mis-specification \u2014 is an active area, with information criteria, residual diagnostics, and out-of-sample predictive likelihoods all in use. The chapter's framework, pragmatically, is agnostic to which generator wins: it asks only that you pick one you can defend, calibrate it honestly, and let the simulation ensemble do the evaluation work that historical backtesting does badly.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `The chapter presents a robust methodology for deriving optimal trading rules (OTRs) using synthetic data generated from a calibrated Ornstein-Uhlenbeck process. The central move is to derive exit corridors from the underlying stochastic process rather than from a single historical path, mitigating backtest overfitting in a way that walk-forward and cross-validation cannot. Calibrate the O-U by OLS, simulate many alternative paths, apply the (R, Omega) grid to each, and read the optimum off the Sharpe surface \u2014 a clean, repeatable pipeline whose correctness rests on the fidelity of the generator, not on the luck of the sample.`), /* @__PURE__ */ React.createElement(P, null, `For execution traders the framework answers the exit question directly: given an inherited position, what profit-take and stop-loss maximise risk-adjusted return across plausible future paths? For risk managers it supplies a Sharpe surface whose curvature encodes the cost of mis-calibration. For portfolio managers it scales \u2014 with more care \u2014 to multi-asset settings where OTRs combine into a full liquidation policy. And for anyone downstream of a trading-rule backtest, it raises the bar: the one historical realisation is not enough, and the only defensible alternative is to replace it with an honest generator of the dynamics you believe the market is producing.`)), /* @__PURE__ */ React.createElement(Sec, { n: "14", title: "Backtest Statistics \u2014 A Comprehensive Framework for Evaluating Quantitative Investment Strategies" }, /* @__PURE__ */ React.createElement(P, null, `If Chapter 11 teaches us that most backtests lie, Chapter 14 teaches us how to <em>read them properly when they don't</em>. A backtest is not a single number; it is a distribution of properties \u2014 profitability, risk, concentration, capacity, implementation drag \u2014 and no single metric can summarise that distribution honestly. The purpose of this chapter is to equip the quantitative researcher with a vocabulary rich enough to describe a strategy on its own terms rather than on the flattering terms of a well-chosen Sharpe ratio. The cost of this vocabulary is complexity; the benefit is immunity against a certain class of self-deception.`), /* @__PURE__ */ React.createElement(P, null, `The chapter is organised as a taxonomy. At the top sit <strong>general characteristics</strong> \u2014 the contextual properties that tell you what kind of animal you are looking at: the time range, the average AUM, the capacity, the leverage, the bet frequency, the holding period, the turnover, the long ratio, the correlation to the underlying market. These are not performance numbers; they are the specification sheet. A Sharpe of 2.0 from a strategy with a three-day holding period and 5000% annualised turnover is a very different asset than a Sharpe of 2.0 from a strategy with a three-month holding period and 80% turnover, and no single efficiency metric captures that difference.`), /* @__PURE__ */ React.createElement(P, null, `Below the characteristics sit <strong>performance metrics</strong> \u2014 total PnL, long-side PnL, short-side PnL, annualised return, hit ratio, average hit return, average miss return \u2014 the raw profitability picture. Then <strong>runs and drawdowns</strong>: consecutive winners and losers, maximum drawdown, time under water, and Herfindahl-Hirschman concentration, all of which capture the psychological and solvency-level risks that volatility alone cannot. <strong>Implementation shortfall</strong> then deducts the trading-cost delta between the paper strategy and the realised one. <strong>Efficiency ratios</strong> \u2014 Sharpe, Probabilistic Sharpe, Deflated Sharpe \u2014 layer risk-adjustment on top, with successive refinements to address non-normal returns and multiple-testing bias. <strong>Classification scores</strong> (accuracy, precision, recall, F1, log-loss) apply where the strategy includes a meta-labelling secondary model. Finally, <strong>attribution analysis</strong> decomposes the PnL into factor and asset-class contributions so that unintended risk exposures are visible.`), /* @__PURE__ */ React.createElement(P, null, `The chapter's deeper argument is statistical rather than taxonomical. Backtests are experiments in which the null hypothesis \u2014 that the strategy has no edge \u2014 is usually true, and the alternative \u2014 that it does \u2014 is fragile. Traditional metrics assume Gaussian returns, independent observations, and a single trial. Financial returns satisfy none of these assumptions: they are skewed, fat-tailed, serially correlated, and the strategy being evaluated is typically the survivor of hundreds of implicit trials. The PSR corrects for non-normality; the DSR corrects for multiple testing; walk-forward analysis corrects for temporal leakage; TWRR corrects for cash-flow contamination. Each tool closes one specific loophole by which an unfavourable null hypothesis sneaks through as an apparent discovery.`), /* @__PURE__ */ React.createElement(Ch14Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `A reported Sharpe ratio of 2.0 is invariant by construction \u2014 it is simply a number extracted from the observed returns. The Deflated Sharpe Ratio is not. As the number of trials the researcher implicitly conducted grows, the DSR collapses: at 100 trials, a Sharpe of 2.0 deflates to roughly 0.8; by 5,000 trials it turns negative, meaning the strategy is statistically indistinguishable from the best of many noise processes. This is why the researcher's claim to have tried "only one thing" is load-bearing, and why honesty about the search budget is a non-negotiable part of quantitative methodology.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Backtesting Robustness:</strong> Backtesting, a cornerstone of quantitative finance, involves simulating the performance of trading strategies on historical data.  Its robustness, however, hinges on several factors.  A key element is the representativeness of the historical data used, ensuring it encompasses a variety of market regimes (bull, bear, volatile, stable) and economic cycles.  Furthermore, the backtest must account for realistic trading costs, including commissions, slippage, and market impact, which can significantly erode profitability.  The time horizon of the backtest is also crucial; longer periods provide more statistically significant results and reduce the risk of overfitting to specific market conditions.  Finally, the backtest should be insensitive to small changes in the strategy's parameters or the input data, demonstrating its stability and reliability.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>General Characteristics:</strong> These statistics offer a high-level overview of a strategy's operational profile.  They include the backtesting time range, average Assets Under Management (AUM), strategy capacity, leverage employed, maximum dollar position size, the ratio of long positions, bet frequency, average holding period, annualized turnover, and the correlation of strategy returns to the underlying market.  These characteristics provide crucial context for interpreting performance metrics and understanding the practical implications of implementing the strategy. For instance, a high maximum position size relative to AUM might indicate concentrated risk, while high turnover implies potentially significant transaction costs.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Performance Metrics:</strong> These quantify the raw profitability of a strategy, including total profit and loss (PnL), PnL from long and short positions, annualized rate of return, hit ratio (percentage of winning bets), average return from winning bets (hits), and average return from losing bets (misses).  These metrics provide a basic understanding of the strategy's historical performance but do not account for risk.  Furthermore, they can be sensitive to the specific time period chosen for the backtest and may not be representative of future performance.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Runs and Drawdowns:</strong>  These metrics analyze the consistency of returns and the magnitude of potential losses.  Runs are sequences of consecutive winning or losing bets, while drawdowns measure the peak-to-trough decline in portfolio value.  Understanding runs and drawdowns is crucial for assessing the psychological impact of potential losses and the risk of capital depletion.  Metrics like the maximum drawdown, the time under water (time to recover from a drawdown), and the concentration of returns (measured by the Herfindahl-Hirschman Index - HHI) provide valuable insights into the strategy's risk profile.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Implementation Shortfall:</strong> This quantifies the difference between the theoretical performance of a strategy and its actual realized performance after accounting for real-world trading costs.  These costs include brokerage fees, slippage (the difference between the expected and actual execution price), and market impact (the effect of large trades on market prices).  Implementation shortfall is a critical consideration for high-frequency strategies and strategies with high turnover, where trading costs can significantly impact profitability.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Efficiency Ratios:</strong> These metrics evaluate the risk-adjusted performance of a strategy.  The Sharpe Ratio (SR) is the most widely used, measuring excess return per unit of volatility.  However, the SR assumes normally distributed returns, which is often not the case in financial markets.  The Probabilistic Sharpe Ratio (PSR) and Deflated Sharpe Ratio (DSR) address this limitation by incorporating higher moments of the return distribution (skewness and kurtosis) and accounting for multiple testing bias, respectively.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Classification Scores:</strong> In meta-labeling strategies, where a secondary model decides whether to act on signals from a primary model, classification scores assess the effectiveness of the secondary model.  Common metrics include accuracy, precision, recall, F1-score, and negative log-loss.  These metrics provide insights into the ability of the meta-labeling model to correctly identify profitable trading opportunities and avoid losses.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Attribution Analysis:</strong> This technique decomposes portfolio performance into contributions from different factors or asset classes.  Attribution analysis helps understand the drivers of performance and identify the sources of alpha (excess return beyond the market benchmark).  It can also reveal unintended exposures to specific risks and inform portfolio construction decisions.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Time-Weighted Rate of Return (TWRR):</strong> TWRR is a crucial performance metric that eliminates the distorting effects of external cash flows.  By calculating returns over sub-periods and geometrically linking them, TWRR isolates the manager's skill from the impact of deposits and withdrawals. This provides a more accurate representation of the strategy's performance independent of investor behavior.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Capacity and Leverage:</strong>  Capacity refers to the maximum AUM a strategy can manage while maintaining its target risk-adjusted performance.  Leverage, the use of borrowed capital, can amplify returns but also magnifies losses.  Understanding the interplay between capacity and leverage is essential for determining the optimal deployment size and risk profile of a strategy.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Bet Frequency and Holding Period:</strong> These characteristics provide insights into the trading style of a strategy.  High bet frequency and short holding periods are indicative of a high-frequency or short-term trading approach, while low bet frequency and long holding periods suggest a longer-term investment horizon.  These factors influence transaction costs and the strategy's sensitivity to market volatility.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The guiding intuition of Chapter 14 is that a quantitative strategy is fully specified only by a <em>vector</em> of statistics, not a scalar. The community's addiction to reporting a single Sharpe ratio is an information-compression problem: we have replaced a high-dimensional object \u2014 the strategy's joint distribution of returns, costs, exposures, and behavioural paths \u2014 with a one-dimensional summary, and then we have acted surprised when that summary turns out to be a poor predictor of future performance. The taxonomy developed in this chapter is an attempt to restore the missing dimensions, not by adding one or two more metrics, but by insisting that every legitimate evaluation covers characteristics, raw performance, drawdown geometry, implementation drag, and risk-adjusted efficiency simultaneously.`), /* @__PURE__ */ React.createElement(P, null, `The theoretical backbone is statistical inference applied to time-series returns. The strategy's realised Sharpe ratio is treated as an estimator of a population parameter \u2014 the "true" Sharpe \u2014 and the researcher's job is to construct confidence statements around that estimator under realistic assumptions: non-normal returns, finite samples, dependent observations, and an honest accounting of the number of trials that preceded the reported one. The PSR gives a probability that the true Sharpe exceeds a benchmark, given the observed skewness and kurtosis. The DSR extends the PSR by penalising for the effective number of independent trials, using the variance of Sharpes across the trial population as the correction factor.`), /* @__PURE__ */ React.createElement(P, null, `Where this framework sits in the broader discipline is worth stating plainly. In traditional asset management, the dominant evaluation framework was built on modern portfolio theory and CAPM \u2014 expected return, variance, beta \u2014 and its favoured metric was the Sharpe ratio as a tidy first-moment-over-second-moment scalar. That tradition was appropriate for long-horizon discretionary funds in the 1970s and 1980s. It is inadequate for modern quantitative strategies that trade at high frequency, consume leverage, operate under capacity constraints, and emerge from systematic search over thousands of candidate configurations. Chapter 14's statistics are designed for that modern reality.`), /* @__PURE__ */ React.createElement(P, null, `Practically, the chapter's taxonomy doubles as a checklist for due diligence. A fund that cannot report its capacity, its turnover, its time-under-water, its implementation shortfall, and its DSR alongside its Sharpe is not a fund that can credibly claim to have measured itself. Conversely, a researcher who reports the full vector of statistics opens themselves up to legitimate critique \u2014 and that openness is the precondition for the iterative, honest improvement of strategy research. The chapter's closing claim is epistemic: richer statistics produce better science, and better science produces strategies that survive contact with live markets.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Complete Theoretical Foundations"), /* @__PURE__ */ React.createElement(P, null, `The theoretical underpinnings of backtest statistics are rooted in statistical inference and probability theory. The core concept is to estimate the probability distribution of a strategy's returns from a finite historical sample, then derive functionals of that distribution \u2014 the mean, variance, skewness, kurtosis, and higher-order moments \u2014 that feed the performance metrics of interest. The Sharpe ratio is the estimator of excess return over volatility; the PSR promotes that estimator into a probability statement about the underlying parameter; the DSR further adjusts that probability for selection bias. Financial-economic theory \u2014 the efficient markets hypothesis and the CAPM in particular \u2014 provides the reference point: under EMH, the default prior for any strategy's true Sharpe is zero, and the data must do substantial work to shift that prior.`), /* @__PURE__ */ React.createElement(P, null, `The framework explicitly rejects the Gaussian-returns assumption that animates classical portfolio theory. Empirically, financial returns are skewed and fat-tailed; a strategy with an unremarkable mean and variance can nonetheless have extraordinary tails, and those tails dominate the behaviour of risk-adjusted metrics in the limit. The PSR corrects for this by using the sample skewness <code>\u03B3\u2083</code> and excess kurtosis <code>\u03B3\u2084</code> to deflate the reported Sharpe toward what would be expected under the strategy's actual return distribution. When skew is negative and kurtosis is fat \u2014 the typical pattern for trend-following or short-volatility strategies \u2014 the PSR is meaningfully lower than the raw SR.`), /* @__PURE__ */ React.createElement(P, null, `The framework also confronts the multiple-testing problem directly. If a researcher conducts N backtests and selects the best, the distribution of the maximum Sharpe across N trials has a higher mean than any single Sharpe. The DSR applies an explicit penalty based on N and on the cross-trial variance of Sharpes, deflating the reported best-of-N Sharpe to an estimate of what would have been plausible for a single pre-registered trial. The penalty scales with the logarithm of N, which means that going from 10 to 100 trials is far more damaging than going from 1000 to 10,000.`), /* @__PURE__ */ React.createElement(H4, null, "Historical Development and Precedent Approaches"), /* @__PURE__ */ React.createElement(P, null, `Early approaches to performance evaluation focused on simple metrics \u2014 average return, standard deviation, cumulative PnL \u2014 which failed to capture the trade-off between risk and reward. William Sharpe's 1966 introduction of the ratio that bears his name was the field's first serious attempt to formalise risk-adjusted performance, and it dominated practitioner discourse for four decades. Refinements followed: the Sortino ratio penalises only downside volatility; the Calmar ratio replaces volatility with maximum drawdown; the Information ratio generalises to active-versus-benchmark returns.`), /* @__PURE__ */ React.createElement(P, null, `The introduction of the PSR and DSR \u2014 primarily due to L\xF3pez de Prado and Bailey in the 2010s \u2014 represents the next generation of these tools. They address two specific, long-standing critiques of the Sharpe ratio: its dependence on Gaussian returns and its blindness to the selection process that produced the observed result. Sortino and Calmar offer alternative perspectives on specific aspects of risk, and are typically reported alongside \u2014 not in place of \u2014 the full SR / PSR / DSR stack.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental Principles and Axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Risk and Return:"), " Higher potential returns are generally associated with higher risk. Performance evaluation should consider both the magnitude of returns and the associated risk."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Time Value of Money:"), " Money received today is worth more than the same amount received in the future. Performance metrics should account for the time value of money by discounting future cash flows."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Diversification:"), " Spreading investments across different assets can reduce overall portfolio risk. Performance evaluation should consider the diversification benefits of a strategy.")), /* @__PURE__ */ React.createElement(H4, null, "Key Terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Backtest:"), " A simulation of a trading strategy's performance on historical data."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Sharpe Ratio (SR):"), " A measure of risk-adjusted return, calculated as the excess return divided by the standard deviation of returns."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Probabilistic Sharpe Ratio (PSR):"), " An enhanced version of the Sharpe Ratio that accounts for non-normality of returns."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Deflated Sharpe Ratio (DSR):"), " A further refinement of the PSR that accounts for multiple testing bias."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Drawdown:"), " The peak-to-trough decline in portfolio value."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Time Under Water (TuW):"), " The time it takes for a portfolio to recover from a drawdown."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Implementation Shortfall:"), " The difference between theoretical and realized performance due to trading costs.")), /* @__PURE__ */ React.createElement(Ch14Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `A stylised equity curve (blue) alongside its drawdown envelope (red). Maximum drawdown captures the depth of the worst decline (here roughly -21% around month 12); time under water captures its duration (roughly 21 months from first peak to recovery). Two strategies with identical Sharpe ratios can nonetheless have wildly different drawdown geometries \u2014 and it is the geometry, not the summary, that determines whether a strategy's investors will still be present when it recovers.`), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(P, null, `Three methodological approaches dominate modern backtesting practice. <strong>Monte Carlo simulation</strong> generates thousands of synthetic return paths from a fitted model of market dynamics, letting the researcher estimate the full distribution of strategy outcomes rather than a single historical realisation. It is particularly useful for stress-testing capacity and drawdown assumptions, but its validity is only as strong as the generative model it relies on. <strong>Bootstrap resampling</strong> is the non-parametric alternative: repeatedly drawing with replacement from the historical returns to construct the sampling distribution of any performance metric, without requiring distributional assumptions \u2014 at the cost of computational expense and the assumption that the historical sample is itself representative. <strong>Walk-forward analysis</strong> preserves temporal ordering: the model is fit on an in-sample window, evaluated on the next out-of-sample window, then rolled forward, simulating the operational reality of a deployed strategy.`), /* @__PURE__ */ React.createElement(P, null, `A production backtesting framework is typically organised into four modules: a <strong>data module</strong> handling acquisition, cleaning, point-in-time correctness, and corporate-action adjustments; a <strong>strategy module</strong> encoding the signal logic and position-sizing rules; an <strong>execution module</strong> modelling fills, slippage, commissions, and market impact; and a <strong>performance evaluation module</strong> computing the full statistics vector and generating diagnostic reports. Clean separation of these modules is essential for reproducibility and for isolating the source of any unexpected result.`), /* @__PURE__ */ React.createElement(P, null, `The canonical workflow is: (1) acquire historical market data, ensuring point-in-time integrity; (2) develop strategy logic and parameter ranges; (3) backtest on the in-sample window; (4) evaluate performance using the full vector of statistics; (5) optimise parameters \u2014 cautiously, with a hard budget on the number of trials; and (6) validate on strictly out-of-sample data that was never touched during optimisation. The discipline of step (6) is what separates honest research from data mining.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `The Sharpe ratio algorithm is straightforward: compute the mean and standard deviation of excess returns, divide, annualise. Time complexity is <Code>{<code>O(n)</code>}</Code> in the number of observations; space complexity is <Code>{<code>O(1)</code>}</Code>. The PSR is derived from the observed Sharpe, the sample size, the skewness, and the kurtosis using the non-central t-distribution \u2014 a single <Code>{<code>O(1)</code>}</Code> evaluation once the moments are known. The DSR is <Code>{<code>O(1)</code>}</Code> given the PSR and the number of trials plus the cross-trial Sharpe variance.`), /* @__PURE__ */ React.createElement(Code, null, `def sharpe_ratio(returns, rf=0.0, periods=252):
    excess = returns - rf / periods
    mu = excess.mean()
    sigma = excess.std(ddof=1)
    return (mu / sigma) * (periods ** 0.5)

def probabilistic_sharpe_ratio(sr, n, skew, kurt, sr_benchmark=0.0):
    # Bailey & L\xF3pez de Prado (2012)
    # Returns P(true SR > benchmark) given the observed moments
    from scipy.stats import norm
    num = (sr - sr_benchmark) * ((n - 1) ** 0.5)
    denom = (1 - skew * sr + ((kurt - 1) / 4) * sr ** 2) ** 0.5
    return norm.cdf(num / denom)`), /* @__PURE__ */ React.createElement(P, null, `A production backtesting system is structured as a pipeline: a data storage layer (columnar time-series database, typically), a strategy execution engine that consumes data and emits simulated fills, a performance evaluation layer that aggregates fills into PnL and statistics, and a reporting layer that renders the results. Design patterns that recur: modular decomposition so that each layer is independently testable; data abstraction so that the strategy code cannot accidentally reach into raw storage and introduce look-ahead bias; parallel processing across time windows and parameter configurations for tractable optimisation.`), /* @__PURE__ */ React.createElement(P, null, `Edge cases demand explicit handling. <strong>Missing data</strong> must be imputed conservatively (forward-fill is often wrong for prices) or the affected intervals excluded entirely. <strong>Extreme market events</strong> \u2014 1987, 2008, 2020-03, flash crashes \u2014 must be represented in the sample, not filtered out for "cleanness"; a strategy that fails in these regimes is one you want to discover before capital is committed. <strong>Trading errors</strong> \u2014 order rejections, partial fills, locked markets \u2014 should be modelled explicitly, because their absence flatters the backtest.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Backtesting systems can require significant computational resources \u2014 memory for full-history tick data, storage for multiple asset universes, and CPU for parameter sweeps and cross-validation folds. Scalability techniques include database-level query optimisation and indexing, aggressive caching of frequently accessed windows, and parallel processing across independent time slices or parameter configurations.`), /* @__PURE__ */ React.createElement(P, null, `Three pitfalls recur. <strong>Look-ahead bias</strong> \u2014 using information not available at the simulated decision time \u2014 is the most common silent killer of backtests; walk-forward analysis and strict point-in-time data discipline are the defences. <strong>Overfitting</strong> is the statistical cousin; DSR reporting and true out-of-sample validation are the defences. <strong>Survivorship bias</strong> \u2014 excluding delisted or bankrupt securities \u2014 is a data-provenance problem; comprehensive datasets that include failed instruments are the only cure.`), /* @__PURE__ */ React.createElement(P, null, `Testing and validation operate on three levels: <strong>unit tests</strong> of individual components (the Sharpe calculation, the slippage model, the data loader), <strong>integration tests</strong> that exercise the full pipeline against known fixtures, and <strong>out-of-sample tests</strong> that evaluate the finished strategy on data the optimiser never saw. Technical-debt hygiene \u2014 code quality, documentation, periodic refactoring \u2014 matters more here than in most software domains, because backtest code that becomes unreadable becomes untrustworthy.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `Three principal use cases dominate. <strong>Hedge fund strategy development</strong> relies on backtesting to screen candidate strategies and justify capital allocation before live deployment. <strong>Algorithmic trading</strong> uses backtesting as part of the development loop for execution algorithms and systematic signals. <strong>Portfolio construction</strong> uses backtesting to evaluate weighting schemes and optimise risk-adjusted returns at the portfolio level.`), /* @__PURE__ */ React.createElement(P, null, `Industry adaptations are substantial. Equity strategies must handle corporate actions, dividends, and delistings. Fixed-income strategies must handle coupons, rolls, and duration. Derivatives strategies must handle expirations, early exercise, and path-dependent Greeks. Each domain imposes its own pre-processing and execution-modelling requirements that the generic framework must accommodate.`), /* @__PURE__ */ React.createElement(P, null, `Case studies from industry illustrate the point. A hedge fund developing a pairs-trading strategy used walk-forward analysis across multiple market regimes to confirm that the cointegration relationships it relied on were not regime-specific artefacts. A proprietary trading firm optimising a high-frequency market-making algorithm used Monte Carlo simulations of order-book dynamics to estimate capacity and slippage in a way that pure historical replay could not.`), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(P, null, `Two implementation styles predominate. <strong>Vectorised backtesting</strong> computes returns and signals as array operations on full-history matrices and is computationally fast, making it ideal for parameter sweeps \u2014 at the cost of being unable to model path-dependent behaviour like risk management triggers or position-level P&L tracking. <strong>Event-driven backtesting</strong> simulates individual orders sequentially through a virtual order book, trading off speed for realism.`), /* @__PURE__ */ React.createElement(Code, null, `# Vectorised backtest
def backtest_vectorised(prices, signals):
    returns = prices.pct_change().dropna()
    strategy_returns = returns * signals.shift(1).loc[returns.index]
    return calculate_performance_metrics(strategy_returns)

# Event-driven backtest
def backtest_event_driven(events, market_data):
    portfolio = Portfolio()
    for event in events:
        if event.type == 'SIGNAL':
            order = create_order(event.signal)
            fill = execute_order(order, market_data)
            portfolio.update(fill)
    return calculate_performance_metrics(portfolio.pnl_series())`), /* @__PURE__ */ React.createElement(P, null, `Key functions in a typical framework include <Code>{<code>calculate_performance_metrics(returns)</code>}</Code>, which returns the full statistics vector; <Code>{<code>create_order(signal)</code>}</Code>, which maps a signal to an executable order with size and venue; and <Code>{<code>execute_order(order, market_data)</code>}</Code>, which simulates the fill including slippage and commissions. The core data structures \u2014 <Code>{<code>Portfolio</code>}</Code>, <Code>{<code>Order</code>}</Code>, <Code>{<code>Trade</code>}</Code> \u2014 carry the state through the pipeline.`), /* @__PURE__ */ React.createElement(P, null, `Algorithmic patterns worth naming: the <strong>sliding window</strong> pattern for rolling statistics (rolling volatility, rolling Sharpe, rolling drawdown); <strong>vectorisation</strong> for minimising Python-level loops in hot paths; systematic <strong>profiling</strong> before optimisation, since the bottleneck is rarely where one guesses. Error handling relies on logging and exception propagation so that silent failures \u2014 particularly in long parameter sweeps \u2014 are detectable after the fact.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `Cutting-edge research in this area clusters around two themes. First, the use of <strong>machine learning within backtesting</strong> itself \u2014 using gradient-boosted models to learn the conditional distribution of strategy returns under different market regimes, or using generative models to produce synthetic histories for stress-testing. Second, <strong>high-performance computing for backtesting</strong> \u2014 GPU-accelerated vectorised backtests, distributed frameworks for running thousands of parameter configurations in parallel, and in-memory columnar stores that eliminate I/O as the bottleneck.`), /* @__PURE__ */ React.createElement(P, null, `Extensions of the basic framework include <strong>multi-asset portfolio backtesting</strong>, where the unit of analysis is the portfolio's joint return rather than any single strategy's marginal return, and <strong>dynamic asset allocation</strong> backtests, where the weighting scheme itself is a learned function of macro or market-microstructure inputs. Both expand the state space meaningfully and force the evaluator to grapple with correlation structure, not just marginal volatility.`), /* @__PURE__ */ React.createElement(P, null, `Open problems and research directions include the development of performance metrics that are less sensitive to biases of the kind this chapter catalogues, and the refinement of backtesting methodologies that better reflect real-world trading conditions \u2014 in particular, the reflexive impact of the strategy itself on market prices, which a purely historical replay cannot capture. Alternative approaches include agent-based modelling, which simulates market dynamics from first principles by populating a synthetic market with adaptive agents, and reinforcement learning, which trains trading policies directly against simulated environments rather than evaluating pre-specified rules against historical data.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `Chapter 14 replaces the single-metric habit with a multi-dimensional taxonomy: general characteristics, performance metrics, runs and drawdowns, implementation shortfall, efficiency ratios, classification scores, and attribution analysis. Each layer closes a specific blind spot that a Sharpe ratio alone leaves open. The chapter's PSR and DSR, in particular, give the researcher quantitative machinery to correct for non-normal returns and multiple-testing bias respectively \u2014 two of the most common sources of inflated backtest performance.`), /* @__PURE__ */ React.createElement(P, null, `The practical takeaway is behavioural rather than mathematical. Honest backtest reporting is expensive \u2014 it requires computing and publishing statistics that often make a strategy look worse than its raw Sharpe suggests \u2014 but the cost of dishonest reporting is capital destruction in live deployment. The statistics taught in this chapter are a commitment device: they make it harder to fool oneself and harder to fool one's investors, and in doing so they raise the quality of the research that survives to production.`), /* @__PURE__ */ React.createElement(P, null, `Finally, Chapter 14 is not a destination; it is a snapshot of an evolving field. Research continues on more robust performance metrics, better generative models for synthetic backtests, and more computationally tractable multiple-testing corrections. The backtest-statistics toolkit of 2030 will likely look meaningfully different from the one described here. But the underlying epistemic commitment \u2014 that a strategy's properties must be fully described, not flatteringly summarised \u2014 is the part that does not change.`)), /* @__PURE__ */ React.createElement(Sec, { n: "15", title: "Strategy Risk Assessment Using a Binomial Model" }, /* @__PURE__ */ React.createElement(P, null, `Chapter 15 confronts a category error that pervades investment management: treating <em>strategy risk</em> and <em>portfolio risk</em> as the same animal. They are not. Portfolio risk is a statement about the underlying assets &mdash; their variance, their co-movements, their tail behaviour. Strategy risk is a statement about the engine that trades those assets &mdash; the probability that the decision rule itself, independent of what the market does, will fail to deliver its promised Sharpe ratio. A perfectly diversified portfolio managed by a broken strategy can still lose money with remarkable consistency, and no amount of VaR arithmetic on the holdings will reveal this.`), /* @__PURE__ */ React.createElement(P, null, `L\xF3pez de Prado's proposal is to model the strategy as a sequence of independent Bernoulli trials. Each bet resolves as either a profit of magnitude &pi;&#8314; with probability <strong>p</strong>, or a loss of magnitude &pi;&#8315; with probability <strong>1&minus;p</strong>. Over a year the manager takes <strong>n</strong> such bets. These four parameters &mdash; <em>n, p, &pi;&#8314;, &pi;&#8315;</em> &mdash; are enough to derive a closed-form expression for the annualised Sharpe ratio &theta;, and by inversion, the <em>critical precision</em> p* needed to reach any target &theta;*. The model is intentionally coarse. It ignores path-dependence, autocorrelation of signals, and regime shifts. What it delivers in exchange is a tractable algebra in which the portfolio manager can interrogate the feasibility of a strategy before committing capital.`), /* @__PURE__ */ React.createElement(P, null, `The chapter's deepest move is the shift from deterministic to probabilistic evaluation. Rather than ask <em>"does my backtest exceed &theta;*?"</em>, the analyst bootstraps the historical bet outcomes, fits a kernel density estimator (KDE) to the distribution of resampled precisions, and integrates that density from zero up to the critical p*. The area under the curve below p* is the probability of strategy failure &mdash; P[&theta; &lt; &theta;*]. This is a genuinely different object from a point estimate of Sharpe: it acknowledges that the observed precision is itself a random variable drawn from a distribution we can only approximate, and it rewards strategies whose precision cushion above p* is robust to resampling. Precision, emphatically <em>not</em> accuracy, is the quantity of interest &mdash; because the null action (no bet) incurs neither cost nor benefit, only the positive decisions are scored.`), /* @__PURE__ */ React.createElement(Ch15Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Symmetric-payout Sharpe rises steep
