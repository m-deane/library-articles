ds inside NumPy, but takes minutes in a hand-written Python loop. Multiprocessing, by contrast, exploits the presence of multiple cores on the same machine (or multiple machines in a cluster) by running independent Python interpreters in parallel, each chewing through its own slice of the problem. The two are complementary: a well-engineered financial ML pipeline uses both at once, with vectorised inner kernels executing inside multiprocess workers that have been handed disjoint chunks of the data.`), /* @__PURE__ */ React.createElement(P, null, `Python makes this more subtle than it should be. The Global Interpreter Lock (GIL) prevents multiple native threads within a single interpreter from executing Python bytecode at the same time, so the seemingly obvious answer \u2014 spin up eight threads \u2014 produces concurrency without parallelism. Multiprocessing sidesteps the GIL by launching separate interpreter processes, each with its own memory space, but at the cost of inter-process communication, data serialization through pickling, and a start-up overhead that dominates small workloads. The chapter's practical payload is a reusable engine \u2014 <code>mpPandasObj</code> \u2014 that encapsulates these mechanics so the researcher can stop re-implementing them for every new function that needs to run in parallel.`), /* @__PURE__ */ React.createElement(P, null, `The structural vocabulary the chapter develops \u2014 <em>atoms</em> as indivisible units of work and <em>molecules</em> as the groups of atoms handed to a single worker \u2014 is deceptively important. It reframes parallelization from an ad-hoc exercise in splitting a list into an explicit design decision about granularity: too many tiny atoms per molecule and the coordination overhead swamps the speedup; too few, enormous molecules, and workers sit idle waiting for the slowest straggler. Linear partitioning works when all atoms have equal cost; <em>nested-loop partitioning</em> is required when the inner loop's length depends on the outer index, as in triangular matrix computations, where naive equal-sized slices leave some workers idle for most of the run.`), /* @__PURE__ */ React.createElement(Ch20Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Realistic speedup as a function of worker count. Linear scaling (green, dashed) is the ideal: doubling the workers halves the time. Actual scaling (red) diverges sharply because of Amdahl's Law \u2014 the residual serial fraction of any real workload (job dispatch, pickling, result aggregation, disk I/O) imposes an asymptotic ceiling. Beyond ~16 workers on typical ML pipelines, returns diminish fast; beyond ~64, inter-process communication overhead can make the curve bend downwards.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Asynchronous Multiprocessing:</strong> Asynchronous multiprocessing is a powerful technique for enhancing the performance of computationally intensive tasks, particularly in Machine Learning (ML). It involves dividing a problem into independent subtasks, or "jobs," that can be executed concurrently across multiple processors. Unlike synchronous multiprocessing, where processes must wait for each other to complete, asynchronous processing allows each process to proceed independently, maximizing resource utilization and minimizing idle time. This is particularly beneficial in ML, where algorithms often involve complex calculations on large datasets. The asynchronous nature allows for overlapping computations, significantly reducing the overall processing time. For example, training a large neural network can be accelerated by distributing the training data across multiple processors, each processing a subset of the data independently and asynchronously. The <code>mpPandasObj</code> function, discussed later, provides a practical implementation of this concept in the context of financial data analysis.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Vectorization:</strong> Vectorization, also known as array programming, is a crucial technique for optimizing numerical computations in ML. It leverages the underlying architecture of modern CPUs and specialized libraries (often written in C or C++) to perform operations on entire arrays or matrices of data simultaneously, rather than iterating through individual elements. This approach drastically reduces the overhead associated with loops and allows for highly efficient parallel processing at the hardware level. For instance, calculating the dot product of two large vectors can be significantly faster using vectorized operations compared to a manual loop-based implementation. Python libraries like NumPy provide extensive support for vectorization, making it a cornerstone of efficient ML workflows.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Single-threading, Multithreading, and Multiprocessing:</strong> Understanding the distinctions between these three execution models is fundamental for effective parallelization. Single-threading executes a single sequence of instructions sequentially on a single core, limiting performance for parallelizable tasks. Multithreading allows multiple threads of execution within a single process, sharing the same memory space. However, Python's Global Interpreter Lock (GIL) restricts true parallelism in multithreading, often reducing it to concurrent execution on a single core. Multiprocessing, on the other hand, runs multiple processes, each with its own memory space, across multiple cores, enabling true parallelism and bypassing the GIL limitations. Choosing the right model depends on the specific task and the programming language's capabilities.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Atoms and Molecules (Parallelization Units):</strong> The concepts of "atoms" and "molecules" provide a structured approach to parallelization. Atoms represent the smallest indivisible units of work, while molecules are groups of atoms processed sequentially by a single thread or process. This abstraction simplifies the process of dividing a complex task into manageable chunks for parallel execution. For example, in a Monte Carlo simulation, each individual simulation run could be considered an atom, while a group of simulations assigned to a single processor would form a molecule. This framework allows for flexible partitioning strategies, adapting to the specific characteristics of the problem.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Linear and Nested Loop Partitioning:</strong> Different partitioning strategies are required for different types of computations. Linear partitioning divides the atoms into equally sized molecules, suitable for tasks with uniform workload distribution. However, for nested loops where the inner loop's iterations depend on the outer loop (e.g., matrix operations), linear partitioning can lead to workload imbalances. Nested loop partitioning addresses this by creating molecules with approximately equal workload, even when individual atomic tasks have varying complexities. This ensures efficient resource utilization in scenarios with uneven computational demands.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Multiprocessing Engines (Reusable Parallelization Frameworks):</strong> A multiprocessing engine provides a reusable framework for parallelizing arbitrary functions, eliminating the need to create separate parallelization wrappers for each function. This engine handles the complexities of job creation, distribution, execution, and result aggregation, simplifying the development of parallel applications. The <code>mpPandasObj</code> function serves as an example of such an engine, providing a flexible and efficient way to parallelize various computations.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Asynchronous Calls and Job Management:</strong> Asynchronous calls are essential for achieving true parallelism in multiprocessing. Python's <code>multiprocessing</code> library provides mechanisms like <code>imap_unordered</code> to execute jobs asynchronously, maximizing resource utilization. Efficient job management, including job creation, queuing, scheduling, and progress tracking, is crucial for the smooth operation of a multiprocessing engine.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Pickling and Unpickling for Data Serialization:</strong> Pickling is the process of serializing Python objects into a byte stream, enabling their transfer between processes in a multiprocessing environment. Unpickling is the reverse process, reconstructing the object from the byte stream. This is essential for sharing data between processes, as each process has its own independent memory space. Handling non-pickleable objects, such as bound methods, requires specialized techniques like using <code>copy_reg</code> to register custom pickling functions.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Output Reduction for Memory Efficiency:</strong> When dealing with large datasets and parallel computations, storing all intermediate results can lead to memory issues. Output reduction techniques address this by aggregating results on-the-fly, minimizing memory consumption. Functions like <code>processJobsRedux</code> incorporate output reduction capabilities, allowing for efficient handling of large outputs without exceeding memory capacity.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Principal Component Analysis (PCA) with Multiprocessing:</strong> PCA is a common dimensionality reduction technique in ML, often applied to large datasets. Multiprocessing can be used to manage memory efficiently during PCA by partitioning the data into smaller chunks and processing them in parallel. This allows for PCA on datasets that would otherwise exceed available memory.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Scalability and Performance Optimization:</strong> Scalability refers to the ability of a system to handle increasing workloads efficiently. Performance optimization techniques, such as efficient partitioning strategies, output reduction, and minimizing inter-process communication, are crucial for achieving good scalability in multiprocessing applications. Understanding the performance characteristics of different parallelization approaches is essential for designing scalable ML systems.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The central claim of the chapter is architectural rather than algorithmic: that any serious ML pipeline has two hierarchical layers of parallelism to exploit, and that neither one on its own is sufficient. Vectorization, at the inner layer, is where raw numerical performance lives \u2014 a single call to <code>np.dot</code> on arrays of a million elements is not just faster than a Python loop by a constant factor; it is faster by three to four orders of magnitude, because the loop has been pushed into a BLAS implementation that saturates the CPU's SIMD lanes. Multiprocessing, at the outer layer, lets that already-fast kernel run simultaneously on disjoint chunks of a large problem, recruiting every physical core the machine owns.`), /* @__PURE__ */ React.createElement(P, null, `Choosing between threading and multiprocessing in Python is not a stylistic preference \u2014 it is dictated by what the work actually does. For I/O-bound work (network requests, disk reads) threads release the GIL and parallelise naturally. For CPU-bound numerical work, threads are useless: the GIL serialises them. Multiprocessing breaks the GIL's hold by starting separate interpreters, at the cost of every argument and every result having to survive a pickle round-trip. This is the single largest source of surprise in Python multiprocessing: functions that work beautifully in a unit test fail silently inside a <code>Pool</code> because one of their closed-over objects \u2014 a lambda, a bound method, a database connection \u2014 cannot be pickled.`), /* @__PURE__ */ React.createElement(P, null, `The atoms/molecules abstraction is the chapter's concrete contribution to thinking about granularity. An atom is the smallest unit that still makes sense as an independent computation \u2014 one Monte Carlo path, one date in a backtest, one row of a covariance matrix. A molecule is a batch of atoms shipped to a worker as a single job. Batching matters because the fixed overhead per job (pickle the inputs, dispatch, unpickle, execute, pickle the result, aggregate) is paid once per molecule, not once per atom. For atoms that each take microseconds, a molecule of ten thousand atoms amortises the overhead; for atoms that each take minutes, a molecule of one is right.`), /* @__PURE__ */ React.createElement(P, null, `The <code>mpPandasObj</code> engine ties these ideas together. It accepts a callback, a description of the atoms (typically a pandas index), a worker count, a batching multiplier, a partitioning strategy (<code>linParts</code> or <code>nestedParts</code>), and any keyword arguments. It builds the molecules, wraps each one into a job dictionary, dispatches the jobs asynchronously with <code>imap_unordered</code>, shows a progress monitor, and concatenates the results into a final DataFrame. The abstraction is worth more than it looks: once it exists, every subsequent parallelizable pipeline in the codebase becomes a one-line call, and the patterns for correctness (alignment, avoiding non-pickleable arguments, handling exceptions) are localised in one place.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Complete theoretical foundations"), /* @__PURE__ */ React.createElement(P, null, `The theoretical foundation of multiprocessing rests on the principles of concurrent computing and inter-process communication. Concurrent computing involves the execution of multiple tasks seemingly at the same time, achieved through time-slicing or true parallelism on multiple processors. Inter-process communication (IPC) mechanisms \u2014 pipes, queues, shared memory \u2014 enable data exchange and synchronization between concurrently running processes. These mechanisms are crucial for coordinating the execution of parallel tasks and aggregating results. The efficiency of multiprocessing depends on minimizing communication overhead and maximizing the utilization of available processors.`), /* @__PURE__ */ React.createElement(P, null, `Vectorization, on the other hand, relies on the principles of linear algebra and Single Instruction, Multiple Data (SIMD) architectures. SIMD instructions allow a single operation to be applied to multiple data elements simultaneously, significantly accelerating vector and matrix operations. Optimized libraries \u2014 BLAS and LAPACK \u2014 exploit SIMD capabilities to provide highly efficient implementations of common linear algebra routines. Python libraries like NumPy build upon these optimized libraries, enabling seamless vectorization in Python code.`), /* @__PURE__ */ React.createElement(H4, null, "Historical development and precedent approaches"), /* @__PURE__ */ React.createElement(P, null, `Early approaches to parallelization focused primarily on multithreading, where multiple threads of execution share the same memory space within a single process. The limitations of multithreading \u2014 particularly in Python, due to the GIL \u2014 led to the increasing adoption of multiprocessing as the preferred approach for achieving true parallelism. The development of efficient IPC mechanisms and multiprocessing libraries has further facilitated the widespread use of multiprocessing in ML.`), /* @__PURE__ */ React.createElement(P, null, `Prior to the widespread availability of multi-core processors, parallelization often relied on distributed computing across multiple machines or clusters. Message passing interfaces (MPI) were commonly used for communication between nodes in a distributed system. While distributed computing remains relevant for very large-scale problems, the advent of multi-core processors has made multiprocessing a more accessible and efficient option for many applications.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental principles and axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Independent Tasks:"), " Multiprocessing is most effective when applied to tasks that can be decomposed into independent subtasks. The degree of independence directly determines the potential for parallel speedup \u2014 coupled tasks force synchronisation, which serialises workers."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Minimized Communication:"), " Excessive inter-process communication can negate the benefits of multiprocessing. Efficient parallelization requires minimizing the amount of data exchanged between processes, typically by pre-partitioning data rather than re-sending it."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Data Locality:"), " Performance can be improved by ensuring that data accessed by a process is located in its local memory, minimizing the need for remote memory access and cache misses. This principle extends from single-node NUMA architectures all the way to distributed clusters.")), /* @__PURE__ */ React.createElement(H4, null, "Key terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Process:"), " An independent instance of a running program with its own memory space, scheduled independently by the operating system."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Thread:"), " A lightweight unit of execution within a process, sharing the same memory space \u2014 cheaper to start than a process but subject to the GIL in CPython."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "GIL (Global Interpreter Lock):"), " A mechanism in CPython that allows only one thread to hold control of the Python interpreter at any given time, limiting true parallelism in multithreading of CPU-bound Python code."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Atom:"), " The smallest indivisible unit of work in a parallel computation \u2014 one Monte Carlo path, one row of a matrix, one date in a backtest."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Molecule:"), " A group of atoms processed sequentially by a single thread or process; the unit of job dispatch, chosen to amortise per-job overhead."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Vectorization:"), " Applying an operation to an entire array or matrix of data at once, rather than iterating through individual elements \u2014 lets SIMD hardware do the work the loop would have done."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "SIMD (Single Instruction, Multiple Data):"), " A type of CPU instruction that performs the same operation on multiple data elements simultaneously, typically across 128-, 256-, or 512-bit registers.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(H4, null, "Multiprocessing vs. vectorization"), /* @__PURE__ */ React.createElement(P, null, `Multiprocessing focuses on distributing tasks across multiple processors, while vectorization aims to optimize operations on arrays of data. Multiprocessing is suitable for tasks that can be decomposed into independent subtasks; vectorization is effective for numerical computations involving large arrays or matrices. Often the two approaches are combined to achieve multiple levels of parallelization. For example, a large matrix multiplication can be parallelized by dividing the matrix into blocks and processing each block in parallel using multiple processors, while inside each block vectorized operations further accelerate the computation.`), /* @__PURE__ */ React.createElement(H4, null, "Framework architecture \u2014 Python's multiprocessing library"), /* @__PURE__ */ React.createElement(P, null, `Python's <code>multiprocessing</code> library provides a robust framework for implementing multiprocessing applications. It offers facilities for creating and managing processes, inter-process communication via pipes, queues, and shared memory, and synchronization primitives such as locks and semaphores. The library supports different process pool implementations, letting developers choose the most appropriate trade-off between start-up cost, memory overhead, and dispatch latency. The <code>imap_unordered</code> method, in particular, enables asynchronous execution of tasks \u2014 results come back in the order they complete rather than in the order jobs were submitted, which maximises worker utilisation when task durations are uneven.`), /* @__PURE__ */ React.createElement(H4, null, "Comparative analysis \u2014 multiprocessing vs. multithreading"), /* @__PURE__ */ React.createElement(P, null, `Multiprocessing offers true parallelism by utilizing multiple cores, bypassing the limitations of Python's GIL. Multithreading, while simpler to implement for shared-memory access, is often limited to concurrency on a single core due to the GIL when the work is Python-level CPU-bound. Multiprocessing involves higher overhead for process creation and inter-process communication; multithreading has lower overhead but limited parallelism for CPU-bound work. For computationally intensive tasks that can be easily parallelized, multiprocessing is generally preferred; for I/O-bound tasks, threading is usually sufficient.`), /* @__PURE__ */ React.createElement(H4, null, "Workflow and implementation steps"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Task Decomposition:"), " Divide the problem into independent subtasks (atoms) at the finest granularity that still makes sense as a self-contained computation."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Molecule Formation:"), " Group atoms into molecules for efficient processing, using linear partitioning for uniform workloads and nested-loop partitioning for triangular or otherwise uneven ones."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Job Creation:"), " Package each molecule into a job dictionary containing the callback function reference, the molecule's atoms, and any keyword arguments."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Parallel Execution:"), " Distribute jobs across multiple processors using a multiprocessing engine such as ", /* @__PURE__ */ React.createElement("code", null, "mpPandasObj"), ", preferably asynchronously via ", /* @__PURE__ */ React.createElement("code", null, "imap_unordered"), "."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Result Aggregation:"), " Combine the results from each molecule into a final output \u2014 concatenation for DataFrames, sum for scalar reductions, or on-the-fly reduction for outputs too large to retain.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths, limitations, and boundary conditions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Strengths of Multiprocessing:"), " True parallelism on multi-core hardware, independent memory spaces (no GIL contention), clean failure isolation (a worker crash does not take down the master)."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Limitations of Multiprocessing:"), " Higher start-up overhead than threads, pickling cost for every argument and result, and significant memory duplication (each worker holds its own copy of Python-level data unless shared memory is used explicitly)."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Strengths of Vectorization:"), " Exploits SIMD hardware transparently, delivers two-to-four orders of magnitude speedup over Python loops, requires no architectural changes to the surrounding code."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Limitations of Vectorization:"), " Applies only to operations expressible as array kernels; algorithms with data-dependent control flow or irregular memory access patterns resist vectorisation.")), /* @__PURE__ */ React.createElement(Ch20Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `The two layers of speedup, measured on a representative numerical kernel (log scale). A pure Python loop is the baseline (1000 units). NumPy vectorisation alone collapses it by two orders of magnitude to ~12. Multiprocessing alone across eight cores gives a more modest ~7\xD7 speedup to ~140. Combining both \u2014 vectorised kernels running inside multiprocess workers \u2014 reaches ~2.1, roughly five hundred times faster than the baseline. The two optimisations multiply; they are not alternatives.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `The two core partitioning algorithms are small but carry most of the weight. <code>linParts</code> divides a set of N atoms into K roughly-equal molecules by computing evenly-spaced cut points \u2014 O(1) work and O(1) memory, and correct whenever per-atom cost is constant. <code>nestedParts</code> handles the harder case in which atom cost grows with position, as in triangular covariance computations where the k-th row requires work proportional to k. Its job is to choose cut points such that each molecule's total work is balanced, even though the atoms it contains are not. The arithmetic is a simple closed-form inversion of a quadratic in cumulative work, but the effect on wall-clock time is large: naive equal-sized partitioning on triangular work leaves the last worker doing an O(N) slab of work while the first finishes in O(1).`), /* @__PURE__ */ React.createElement(P, null, `Data flow in the master-worker pattern is one-way from master to workers (the molecules) and one-way back (the results). The master builds jobs, dispatches them to a pool, collects results as they complete, and concatenates them. Workers know nothing about each other \u2014 all coordination happens through the pool. This is both a virtue (clean isolation, no deadlock hazards from worker-to-worker communication) and a constraint (algorithms that require inter-worker coordination, like distributed matrix factorisations, do not fit this pattern and need MPI-style frameworks instead).`), /* @__PURE__ */ React.createElement(P, null, `Edge cases compound in practice. An empty input dataset should return an empty result cleanly, not crash the worker. A single atom should not require the overhead of a pool \u2014 most implementations fall through to a direct call. A worker that raises should not silently discard its molecule; the exception should be re-raised in the master, ideally with traceback information preserved, so the bug can be found rather than papered over. Long-running jobs should show progress so that it is possible to tell whether the pool is working or stuck.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Resource requirements scale with worker count, per-worker memory footprint, and the size of pickled inputs and outputs. A multiprocessing job that loads a 2 GB pandas DataFrame into each of 16 workers has just claimed 32 GB of RAM \u2014 often more than the machine has. Shared memory, <code>mmap</code>, or arranging for each worker to load only its slice from disk, are the usual mitigations. Inter-process communication via pickling is also a cost; rule of thumb, if the data to be shipped per job is larger than the computation the job performs, multiprocessing will slow the program down, not up.`), /* @__PURE__ */ React.createElement(P, null, `Common pitfalls are specific and predictable. Deadlocks arise when two processes wait on each other's output via poorly-designed queues \u2014 avoidable by keeping the master-worker topology strictly star-shaped. Race conditions arise when multiple processes write to the same file or database without locking; the solution is typically to have workers write to unique per-worker files and have the master merge them. Non-pickleable closures (lambdas, local classes, bound methods) are the single most frequent source of baffling multiprocessing errors; the pragmatic fix is to use module-level functions as callbacks, or to register custom picklers via <code>copy_reg</code>.`), /* @__PURE__ */ React.createElement(P, null, `Testing parallel code is its own discipline. Unit tests should cover correctness of partitioning algorithms (empty input, single atom, exactly-divisible input, off-by-one cases). Integration tests should exercise the full dispatch path at small worker counts where debuggers are usable. Performance tests should measure speedup and efficiency against a known-good baseline, because a regression in parallel performance is easy to introduce and almost invisible in unit tests. Technical debt in multiprocessing code tends to compound: a single module-global that a worker depends on can make the pool non-reproducible across Python versions or OS platforms.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `In finance, the canonical use cases are Monte Carlo pricing (each simulated path an atom), scenario-based risk calculation (each scenario an atom), backtest parameter sweeps (each parameter combination an atom), and cross-sectional feature computation (each date an atom). The last is the workhorse: a typical factor-research pipeline computes thousands of features over decades of daily data, and the difference between a serial and parallel implementation is the difference between an overnight batch and a five-minute interactive loop.`), /* @__PURE__ */ React.createElement(P, null, `Other industries apply the same patterns to different problems. Image-processing pipelines parallelise per-tile or per-frame. Genomic sequencing aligners parallelise per-read or per-region. Medical imaging reconstructions parallelise per-slice. High-frequency trading platforms use specialised variants \u2014 pinned threads, NUMA-aware allocation, kernel-bypass networking \u2014 but the fundamental pattern of partitioning work across compute resources is the same.`), /* @__PURE__ */ React.createElement(P, null, `Integration with existing systems typically happens at the data layer. A multiprocess job reads from the same database, Parquet store, or HDFS cluster that a serial job would read from; what changes is that each worker issues its own query for its own slice. Careful query design (predicate pushdown, column pruning) matters more in parallel than in serial, because bad queries are amplified by the worker count. Cloud platforms add another level of parallelism above multiprocessing \u2014 elastic pools of VMs, each running a multiprocess engine \u2014 but the local primitives described here are the unit of each such VM's work.`), /* @__PURE__ */ React.createElement(P, null, `A concrete case study from the chapter: a financial institution reduced the execution time of its risk models by a factor of ten by moving from serial Python to a multiprocessing-based engine similar to <code>mpPandasObj</code>. The speedup metric \u2014 ratio of serial to parallel wall-clock time \u2014 and the efficiency metric \u2014 speedup divided by worker count \u2014 together diagnose whether the remaining headroom is in more workers, in less communication, or in a faster inner kernel.`), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(P, null, `The <code>mpPandasObj</code> function is the reusable multiprocessing engine that ties the chapter's concepts together. It accepts a callback function, a tuple defining the atoms and the column that groups them, a worker count, a batch multiplier, a partitioning scheme (linear or nested), and any keyword arguments to forward to the callback. It divides the atoms into molecules via <code>linParts</code> or <code>nestedParts</code>, packages each molecule into a job dictionary, dispatches the jobs to a pool, and concatenates the returned pandas objects into a final DataFrame.`), /* @__PURE__ */ React.createElement(Code, null, `import multiprocessing as mp
import pandas as pd

def linParts(numAtoms, numThreads):
    """Divide a set of atoms into equally sized molecules.

    numAtoms   : total number of indivisible atomic tasks.
    numThreads : desired number of molecules.

    Returns    : list of cut points [0, ..., numAtoms] such that
                 molecule i consists of atoms[parts[i] : parts[i+1]].
    """
    parts = [int(round(i * numAtoms / numThreads))
             for i in range(numThreads + 1)]
    return parts

def processJobs(jobs, numThreads=8):
    """Dispatch a list of job dicts across a process pool asynchronously.

    Each job is a dict: {'func': callable, 'molecule': atoms, **kwargs}.
    Uses imap_unordered so results come back as soon as they complete.
    """
    pool = mp.Pool(processes=numThreads)
    outputs = []
    for out in pool.imap_unordered(expandCall, jobs):
        outputs.append(out)
    pool.close()
    pool.join()
    return outputs

def expandCall(kargs):
    """Unpack a job dict and invoke its callback with keyword arguments."""
    func = kargs['func']
    del kargs['func']
    return func(**kargs)`), /* @__PURE__ */ React.createElement(P, null, `Jobs are represented as plain dictionaries containing the callback reference, the molecule's atoms, and any additional keyword arguments. This is the simplest object model that survives pickling cleanly \u2014 bound methods and lambdas do not, which is why the callback must be a module-level function. The master-worker pattern is the algorithmic skeleton: the master constructs and dispatches jobs, workers execute them independently, and the master aggregates results. Integration with NumPy for vectorised inner kernels is what turns this from a merely-parallel implementation into a genuinely fast one \u2014 each worker should be spending its time in BLAS, not in Python bytecode.`), /* @__PURE__ */ React.createElement(P, null, `Error handling deserves explicit attention. A worker exception inside <code>imap_unordered</code> is raised in the master when the master iterates to the failing result, not when the failure occurs \u2014 meaning that silent errors can hide for minutes before surfacing. Wrapping the callback in a try/except that logs and returns a sentinel is often safer than letting the exception propagate, particularly in long-running batch pipelines where losing an hour of work to a single bad molecule is unacceptable. Logging from workers needs its own discipline, since each worker has its own stdout; the usual pattern is to configure logging in an initialiser passed to the pool.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `Current research directions include more efficient partitioning algorithms for heterogeneous workloads (where atoms have highly variable and a priori unknown costs), work-stealing schedulers that rebalance molecules dynamically rather than statically, and shared-memory mechanisms that eliminate the pickling round-trip entirely for large arrays (<code>multiprocessing.shared_memory</code>, <code>numpy.memmap</code>, Apache Arrow's Plasma store). Each reduces one of the specific overheads that limit speedup on real workloads.`), /* @__PURE__ */ React.createElement(P, null, `Extensions of the atoms/molecules abstraction include hierarchical partitioning \u2014 molecules that are themselves subdivided across a second layer of workers \u2014 which matches the structure of modern multi-socket, multi-NUMA-node, multi-machine clusters. The question of how to partition work is then itself recursive: choose a coarse partition across machines, a medium partition across sockets, and a fine partition across cores, at each level respecting the latency and bandwidth of the interconnect.`), /* @__PURE__ */ React.createElement(P, null, `Open problems include efficient parallelization of irregular and dynamic workloads (where the work graph is discovered as the computation proceeds, as in tree search or dependency parsing), and effective use of heterogeneous compute resources (mixing CPUs, GPUs, and specialised accelerators in the same pipeline). Alternative approaches \u2014 GPU computing (CUDA, OpenCL) for massively data-parallel numerical work, distributed computing (Dask, Spark, Ray) for multi-machine problems \u2014 extend the same fundamental vocabulary into different execution models.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `This chapter provided a comprehensive treatment of multiprocessing and vectorization as the twin pillars of performance engineering in financial machine learning. The key takeaways are concrete: understand the distinction between single-threading, multithreading, and multiprocessing \u2014 and, in particular, understand why Python's GIL makes multiprocessing (not multithreading) the correct answer for CPU-bound numerical work; invest in a reusable multiprocessing engine such as <code>mpPandasObj</code> so that every subsequent parallel pipeline becomes a one-liner; think explicitly about partitioning granularity, using linear partitioning for uniform workloads and nested-loop partitioning for triangular ones; and use output reduction techniques for pipelines whose aggregated outputs would otherwise exhaust memory.`), /* @__PURE__ */ React.createElement(P, null, `By mastering these concepts and treating the accompanying code patterns as templates rather than curiosities, a researcher can turn workloads that would have required hours or days into interactive experiments measured in minutes. The PCA example embedded in the chapter is a microcosm of the general principle: a computation that nominally exceeds available memory becomes tractable when the data is partitioned into molecules, processed in parallel, and reduced on-the-fly. The same pattern \u2014 partition, process, reduce \u2014 applies to backtests, feature computations, model ensembling, and hyperparameter search.`), /* @__PURE__ */ React.createElement(P, null, `The chapter also situates these practical techniques in a broader arc: parallel computing is a moving target, with GPU acceleration, distributed frameworks, and specialised hardware steadily changing what is possible. A researcher who has internalised the atoms/molecules abstraction, the master-worker pattern, and the reflex to vectorise inner kernels will adapt to those changes faster than one who has only memorised a particular API. The combination of multiprocessing and vectorization is not a pair of tricks; it is a methodology, and it is the methodology that turns the compute budget of a single laptop into something that can credibly support research on modern financial datasets.`)), /* @__PURE__ */ React.createElement(Sec, { n: "21", title: "Brute-Force Search and Quantum Computing for Dynamic Portfolio Optimisation" }, /* @__PURE__ */ React.createElement(P, null, `Dynamic portfolio optimisation sits at an uncomfortable intersection of three mathematical worlds that rarely agree on method. From portfolio theory comes the Sharpe Ratio, a non-convex objective whose denominator \u2014 the standard deviation of returns \u2014 destroys the linearity on which classical convex solvers depend. From real-world trading comes the transaction cost function, which for most serious implementations scales with the square root of trade size and therefore introduces non-smooth, non-convex penalties whenever allocations change. From operational reality comes the integer constraint: a portfolio manager cannot purchase 0.3741 of a futures contract or a bond lot, and once investment levels are discretised the continuous manifold on which Markowitz operated collapses into a combinatorial lattice.`), /* @__PURE__ */ React.createElement(P, null, `This chapter confronts that lattice head-on. Rather than approximating away the awkward features, Lopez de Prado formulates the problem precisely as it presents itself in practice \u2014 as a search over a finite but astronomically large set of trading trajectories, each a matrix whose entry \u03C9_{i,h} specifies the fraction of capital held in asset i at horizon h. The objective is to find the single trajectory that maximises risk-adjusted return net of transaction costs. The theoretical machinery deployed is a curious mix: integer partitions and the pigeonhole principle from combinatorics, multivariate normal return distributions from financial econometrics, NP-hardness proofs from computational complexity theory, and \u2014 remarkably \u2014 superposition and entanglement from quantum mechanics.`), /* @__PURE__ */ React.createElement(P, null, `The pedagogical framing is honest about its limitations. Brute-force search is presented not as a production tool but as a benchmark: it guarantees the globally optimal answer and therefore serves as ground truth against which heuristics and approximations can be measured. Its computational cost grows so rapidly that even modest problems \u2014 ten assets across five time horizons \u2014 push the feasible-trajectory count into the millions. The chapter uses this exponential wall to motivate the final section's pivot to quantum computing, specifically quantum annealers such as those built by D-Wave, which are specialised for precisely this class of combinatorial optimisation problem. Whether quantum hardware will deliver the promised speedups for practical portfolio sizes remains an open empirical question; what is not open is the mathematical formulation, and that formulation is what this chapter establishes rigorously.`), /* @__PURE__ */ React.createElement(Ch21Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Feasible trading trajectories grow super-exponentially with the discretisation granularity N, even for a small universe of assets and horizons. The y-axis is logarithmic: at N=10 the trajectory count exceeds 92,000, and realistic portfolios push this into the trillions.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Combinatorial Optimization:</strong> Combinatorial optimization deals with problems where the goal is to find the best solution from a finite, but often incredibly vast, set of possible solutions. These solutions are generated by combining discrete values of a finite set of variables. The core challenge lies in the explosive growth of the solution space as the number of variables increases, rendering exhaustive search impractical for classical computers, especially for problems involving a large number of assets and time horizons. Classic examples include the traveling salesman problem (finding the shortest route visiting all cities exactly once), the knapsack problem (maximizing the value of items in a knapsack with limited capacity), and resource allocation problems. In finance, portfolio optimization with discrete investment levels, as discussed in this chapter, is a prime example. The difficulty stems from the factorial or exponential growth of the search space with the number of variables, making brute-force search computationally expensive. This necessitates the exploration of alternative approaches, including heuristics, approximation algorithms, and potentially quantum computing.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Brute Force Search:</strong> Brute-force search is a straightforward algorithmic technique that systematically enumerates all possible solutions within a search space and evaluates each one according to a predefined objective function to identify the optimal solution. While this method guarantees finding the globally optimal solution, its computational cost grows exponentially with the problem size, making it impractical for large instances. It serves as a fundamental algorithm design technique and often provides a baseline for comparison with more sophisticated algorithms. Its simplicity makes it easy to implement and understand, but its exponential time complexity, often denoted as O(2^n) or O(n!), limits its applicability to smaller problems. In the context of portfolio optimization, brute-force search can be applied when the investment levels are discretized, creating a finite, albeit large, search space.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Quantum Computing:</strong> Quantum computing leverages the principles of quantum mechanics to perform computations in a fundamentally different way than classical computers. Unlike classical bits, which can represent either 0 or 1, quantum bits (qubits) can exist in a superposition of both states simultaneously. This allows quantum computers to explore multiple possibilities concurrently, potentially offering exponential speedups for certain types of problems, including some combinatorial optimization problems. Key concepts in quantum computing include superposition, entanglement (correlation between qubits), and quantum gates (operations on qubits). Different quantum computing architectures exist, including quantum annealers (specialized for optimization problems) and gate-based quantum computers (more general-purpose). The potential of quantum computing to solve complex optimization problems like dynamic portfolio optimization is a key motivation for the research presented in this chapter.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>NP-hard Problems:</strong> NP-hard problems represent a class of computational problems that are at least as hard as the hardest problems in NP (nondeterministic polynomial time). Informally, this means there's no known algorithm that can solve them in polynomial time. Finding an efficient (polynomial-time) algorithm for one NP-hard problem would imply efficient algorithms for all problems in NP, a major open question in computer science. Many optimization problems, including the traveling salesman problem and, as argued in this chapter, the dynamic portfolio optimization problem with discrete allocations, fall into this category. Due to the lack of efficient algorithms, approximation algorithms and heuristics are often used to find near-optimal solutions for NP-hard problems in practice. The classification of a problem as NP-hard underscores the importance of exploring alternative computational paradigms like quantum computing.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Integer Optimization:</strong> Integer optimization is a specialized branch of mathematical optimization where some or all of the decision variables are restricted to integer values. This constraint reflects the discrete nature of many real-world decisions, such as the number of units to produce, the number of trucks to deploy, or, in the context of this chapter, the number of units of an asset to hold in a portfolio. Integer programming problems are generally NP-hard, requiring specialized algorithms like branch and bound, cutting plane methods, or heuristics. The text frames the dynamic portfolio optimization problem as an integer optimization problem by discretizing the continuous investment variables. This transformation makes the problem amenable to brute-force search and potentially to quantum computing approaches. The integer constraint significantly increases the complexity of the optimization problem compared to continuous optimization.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Discretization:</strong> Discretization is a crucial technique used to transform continuous variables into discrete variables. This is often necessary when dealing with real-world problems where decisions must be made in discrete units or when applying algorithms that require discrete inputs, such as brute-force search or certain quantum computing methods. In the context of portfolio optimization, discretization involves dividing the continuous range of possible investment proportions into a finite number of discrete intervals. The choice of discretization granularity (the size of the intervals) affects both the accuracy of the solution and the computational complexity. Finer granularity leads to a more accurate representation of the continuous problem but increases the size of the search space, making the computation more expensive. The chapter explores the trade-off between accuracy and computational cost associated with different discretization levels.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Pigeonhole Principle and Partitions:</strong> The pigeonhole principle, a fundamental concept in combinatorics, states that if <em>n</em> items are put into <em>m</em> containers, with <em>n &gt; m</em>, then at least one container must contain more than one item. This principle is related to the concept of integer partitions, which deals with the number of ways to write a positive integer as a sum of positive integers. In the context of portfolio optimization, the pigeonhole principle and integer partitions are used to determine the number of ways to allocate capital across assets, where the total capital is represented by an integer and the asset allocations are also represented by integers. The chapter emphasizes the importance of considering the order of the allocations, as different permutations of the same partition can lead to different portfolio returns and risks.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Sharpe Ratio:</strong> The Sharpe Ratio is a widely used metric in finance that quantifies the risk-adjusted return of an investment. It is calculated as the excess return (the difference between the portfolio return and the risk-free rate) divided by the standard deviation of the portfolio return. A higher Sharpe Ratio indicates a better risk-adjusted performance. The chapter uses the Sharpe Ratio as the objective function in the portfolio optimization problem, aiming to find the trading trajectory that maximizes this ratio. It's important to note that the Sharpe Ratio is a non-convex function, which makes traditional convex optimization techniques inapplicable and necessitates the use of alternative methods like brute-force search, especially when combined with non-continuous transaction costs.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Trading Trajectory:</strong> A trading trajectory represents the dynamic allocation of capital to different assets over multiple time horizons. It can be visualized as a matrix where each element \u03C9_(i,h) represents the proportion of capital allocated to asset <em>i</em> at time horizon <em>h</em>. The trajectory defines the complete investment strategy over time, specifying how the portfolio composition changes from one period to the next. Finding the optimal trading trajectory that maximizes the Sharpe Ratio while considering transaction costs is the central problem addressed in this chapter. The complexity of this problem arises from the interdependence of allocations across different time periods and the combinatorial nature of the discrete allocation choices.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Transaction Cost Function:</strong> Transaction costs represent the expenses incurred when buying or selling assets. These costs can significantly impact the overall performance of an investment strategy. The chapter introduces a transaction cost function \u03C4_h(\u03C9) that quantifies the cost associated with changing asset allocations at time horizon <em>h</em>. The specific functional form used in the chapter is based on the square root of the absolute changes in allocations, scaled by asset-specific factors. This non-linear function reflects the real-world behavior of transaction costs, which can depend on factors like trading volume, market liquidity, and the size of the trade. The inclusion of transaction costs makes the portfolio optimization problem more realistic and challenging.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Multivariate Normal Distribution:</strong> The multivariate normal distribution is a probability distribution that describes the joint distribution of multiple normally distributed random variables. It is characterized by a mean vector (representing the average values of the variables) and a covariance matrix (representing the relationships between the variables). In the context of portfolio optimization, the chapter assumes that asset returns follow a multivariate normal distribution with time-varying parameters. This assumption allows for modeling the correlations between different assets and the changing market conditions over time. While simplifying, this assumption provides a tractable framework for analyzing portfolio performance and optimizing trading strategies.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `The chapter's central argument is that honesty about the structure of the portfolio optimisation problem forces a radical change of algorithmic strategy. Once investment variables are discretised \u2014 an operational necessity rather than a mathematical convenience \u2014 the problem ceases to be convex and ceases to be tractable by gradient-based methods. What remains is a pure combinatorial search over the lattice of integer partitions of total capital across assets and horizons. The chapter's contribution is to state this precisely, count the size of the search space using classical combinatorics, and demonstrate that brute-force enumeration, while computationally heroic, is the only method that guarantees global optimality under the realistic objective.`), /* @__PURE__ */ React.createElement(P, null, `Where the treatment departs from textbook optimisation theory is in its unapologetic embrace of exponential complexity. Lopez de Prado does not pretend that a clever reformulation will sidestep the NP-hardness; he accepts it and asks what follows. For small portfolios \u2014 fewer than a dozen assets over a handful of horizons \u2014 brute force is tractable and produces reference solutions against which heuristic approximations can be benchmarked. For larger portfolios, brute force sets a performance ceiling that no heuristic can exceed but against which every heuristic can be measured. This inversion \u2014 using the intractable algorithm as a measurement instrument rather than a production tool \u2014 is characteristic of the book's methodological style.`), /* @__PURE__ */ React.createElement(P, null, `The transition to quantum computing in the chapter's closing sections is not marketing. Quantum annealers like D-Wave's hardware implement precisely the class of problem the chapter has formulated: minimise a cost function over discrete binary variables with quadratic interactions. The mapping from portfolio optimisation to a Quadratic Unconstrained Binary Optimisation (QUBO) problem is direct, and the speedups quantum annealers offer \u2014 though still debated in the academic literature \u2014 are most pronounced on problems with the exact combinatorial structure of discrete portfolio allocation.`), /* @__PURE__ */ React.createElement(P, null, `What the chapter does not solve, and does not claim to solve, is the question of how to handle robust uncertainty in the return and covariance estimates themselves. The multivariate normal assumption is a modelling convenience; in practice, the inputs to the optimisation are themselves random variables with substantial estimation error, and the chapter's brute-force machinery optimises for a single point estimate rather than a distribution over possible futures. The open research directions section gestures at robust optimisation extensions but leaves their development to subsequent chapters and the broader research literature.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Complete theoretical foundations"), /* @__PURE__ */ React.createElement(P, null, `The theoretical foundation rests at the intersection of four disciplines. Optimisation theory provides the mathematical framework for the formulation. Portfolio theory defines the objective function through the Sharpe Ratio SR(\u03C9) = (E[R(\u03C9)] - r_f) / \u03C3[R(\u03C9)]. Computational complexity theory classifies the problem as NP-hard due to its combinatorial nature. Quantum mechanics offers a fundamentally different computational paradigm for overcoming classical limitations. The trading trajectory \u03C9 is a matrix whose element \u03C9_{i,h} denotes the proportion of capital allocated to asset i at horizon h, subject to feasibility constraints on the total capital and the discretised investment levels. The transaction cost function \u03C4_h(\u03C9) quantifies the cost of changing allocations from horizon h-1 to h, using a square-root-of-absolute-change functional form scaled by asset-specific liquidity factors.`), /* @__PURE__ */ React.createElement(H4, null, "Historical development and precedent approaches"), /* @__PURE__ */ React.createElement(P, null, `Markowitz's mean-variance optimisation, which inaugurated modern portfolio theory in 1952, assumed continuous investment variables and relied on convex quadratic programming. That framework survives essentially unchanged in most industrial portfolio construction systems, but it fails the moment realistic constraints are introduced: transaction costs break convexity, integer position sizes break continuity, and the Sharpe Ratio objective breaks the linearity of the variance-only penalty. Previous dynamic portfolio optimisation approaches relied on heuristics and approximations \u2014 dynamic programming with discretised state spaces, policy gradient methods, or convex relaxations \u2014 each of which trades guaranteed optimality for computational tractability. The brute-force formulation here restores the optimality guarantee at the cost of restricted problem size, and quantum annealing is presented as the potential technology that could deliver both.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental principles and axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Optimality:"), " The optimal trading trajectory must consist of optimal sub-trajectories \u2014 any segment of the optimal trajectory must itself be optimal for that specific time interval."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Feasibility:"), " All portfolio allocations within the trading trajectory must satisfy the constraints on the feasible allocations, such as the total capital constraint and the discretisation of investment levels.")), /* @__PURE__ */ React.createElement(H4, null, "Key terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Dynamic Portfolio Optimization:"), " The process of finding the optimal allocation of capital across assets over multiple time horizons, considering time-varying market conditions and transaction costs."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Brute-Force Search:"), " A method that systematically enumerates all possible solutions in a search space to find the optimal solution."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Quantum Computing:"), " A computational paradigm that leverages principles of quantum mechanics to perform computations."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "NP-hard:"), " A class of computational problems that are at least as hard as the hardest problems in NP."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Integer Optimization:"), " A branch of mathematical optimization where some or all variables are restricted to integer values."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Discretization:"), " The process of transforming continuous variables into discrete variables."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Pigeonhole Principle:"), " A combinatorial principle stating that if n items are put into m containers, with n > m, then at least one container must contain more than one item."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Integer Partitions:"), " The number of ways to write a positive integer as a sum of positive integers."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Sharpe Ratio:"), " A measure of risk-adjusted return, calculated as the excess return divided by the standard deviation of the return."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Trading Trajectory:"), " A matrix representing the allocation of capital to different assets over multiple time horizons."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Transaction Cost Function:"), " A function that quantifies the cost associated with changing asset allocations."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Multivariate Normal Distribution:"), " A probability distribution that describes the joint distribution of multiple normally distributed random variables.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(P, null, `The brute-force methodology proceeds in three stages. First, the continuous investment proportions are discretised into a finite number of levels, converting the optimisation into an integer programming problem whose search space is the set of all integer partitions of total capital across assets and horizons. Second, every feasible trading trajectory is constructed by combining the per-horizon partitions; this step exploits combinatorial identities \u2014 specifically those linking the pigeonhole principle to integer partitions \u2014 to enumerate without duplication. Third, each trajectory is scored by computing the portfolio's Sharpe Ratio net of the cumulative transaction cost \u03C4_h(\u03C9) summed across horizons, and the trajectory with the highest score is returned as the globally optimal solution.`), /* @__PURE__ */ React.createElement(P, null, `The discretisation framework governs a sharp trade-off. Finer granularity \u2014 more discrete investment levels per asset \u2014 produces trajectories that more closely approximate the continuous optimum but inflates the search space super-exponentially. The chapter demonstrates that even moving from N=5 to N=10 discretisation levels can expand the trajectory count by three orders of magnitude. Comparative analysis against heuristics (genetic algorithms, simulated annealing, policy gradient) and quantum annealing establishes brute force as the optimality benchmark: other methods may run faster but provide no guarantee of finding the true optimum, whereas brute force guarantees optimality at the cost of exponential runtime.`), /* @__PURE__ */ React.createElement(Ch21Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `Comparative profile of four approaches to dynamic portfolio optimisation. Brute force scores highest on optimality guarantees but collapses on scalability; quantum annealing offers the most balanced profile but depends on hardware availability and problem mapping.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `The brute-force algorithm iterates through all feasible trading trajectories, maintaining a current best trajectory and its Sharpe Ratio. For each new candidate, it computes the Sharpe Ratio net of transaction costs and updates the best if the candidate is superior. Time complexity is exponential in both the number of assets and the number of time horizons; space complexity is similarly exponential if trajectories are materialised, though a streaming implementation can reduce memory to linear in trajectory length. The system decomposes into four modules: a partition generator that enumerates feasible per-horizon allocations, a trajectory constructor that combines partitions across horizons, a scoring function that computes the objective, and a tracker that maintains the best solution. The iterator design pattern organises the enumeration; the observer pattern can be used to broadcast improvements as they are discovered. Edge cases include infeasible parameter combinations that produce no valid trajectories and degenerate scenarios where the Sharpe Ratio denominator vanishes; both require defensive handling.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Resource requirements scale alarmingly. A naive implementation for ten assets across five horizons can exhaust the memory of a workstation; the algorithm is not production-grade beyond roughly fifteen assets and five horizons without careful pruning. Parallelisation helps: the trajectory evaluation step is embarrassingly parallel across trajectories, and modern CPU and GPU architectures can deliver order-of-magnitude speedups without changing the algorithm. Common pitfalls include underestimating the partition count (the number of integer partitions grows faster than most programmers intuit), using Python lists where NumPy arrays would suffice, and failing to cache the covariance matrix computation across evaluations. Testing compares brute-force output against analytical solutions for toy problems \u2014 two assets, two horizons, no transaction costs \u2014 where the optimum can be derived by hand or symbolic computation. Validation on larger problems uses heuristic solvers as sanity checks, reasoning that while heuristics cannot guarantee optimality, systematic deviation between heuristic and brute-force output flags implementation bugs.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `The primary application is dynamic portfolio optimisation proper: finding the optimal trading trajectory for a universe of assets over multiple time horizons with transaction costs and time-varying return distributions. Beyond this direct use, the machinery integrates with Monte Carlo simulation and scenario analysis: the brute-force solver provides the optimal allocation for each simulated scenario, enabling robust comparisons of strategy performance across futures rather than single-point estimates. The algorithm can be integrated with existing portfolio management systems as a batch optimiser, producing daily or weekly rebalance recommendations. A case study with ten assets across five horizons demonstrated successful identification of the optimal trajectory, though the computational cost constrained real-time responsiveness. Evaluation metrics centre on the Sharpe Ratio of the resulting portfolio, with success defined as exceeding benchmark strategies \u2014 equal-weight, market-cap-weighted, or risk-parity allocations \u2014 on out-of-sample data.`), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(Code, null, `function brute_force_portfolio_optimization(assets, time_horizons, capital, transaction_costs, returns, covariance):
  best_trajectory = null
  best_sharpe_ratio = -infinity

  for each trajectory in generate_trajectories(assets, time_horizons, capital):
    sharpe_ratio = calculate_sharpe_ratio(trajectory, transaction_costs, returns, covariance)
    if sharpe_ratio > best_sharpe_ratio:
      best_sharpe_ratio = sharpe_ratio
      best_trajectory = trajectory

  return best_trajectory`), /* @__PURE__ */ React.createElement(P, null, `The key functions are generate_trajectories(), which enumerates all feasible trading trajectories by combining per-horizon integer partitions, and calculate_sharpe_ratio(), which computes the objective function for a given trajectory accounting for expected returns, covariance, and cumulative transaction costs. The central data structure is Trajectory, a matrix representing asset allocations over time. The algorithmic pattern is iterative enumeration of all feasible solutions with exponential time complexity as the dominant performance consideration. Error handling must address cases where no feasible solutions exist or the Sharpe Ratio is undefined due to zero-variance portfolios. Integration points connect the solver to portfolio management systems and market data sources.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `The most natural extension is the migration from classical brute-force search to quantum annealers. The dynamic portfolio optimisation problem, once formulated as a QUBO, maps directly onto the hardware of machines like D-Wave's Advantage system. Whether this delivers meaningful speedups for practical portfolio sizes remains contested in the literature, but the structural fit between the problem and the hardware is undeniable. Robust optimisation extensions \u2014 incorporating estimation uncertainty in the inputs via distributionally robust formulations or chance constraints \u2014 represent the other major research frontier. Open problems include the applicability of gate-based quantum algorithms like QAOA, the development of polynomial-time approximation schemes that provably bound the gap to the brute-force optimum, and hybrid classical-quantum algorithms that use brute force on reduced-dimensional problems seeded by heuristic search over the full space. Alternative approaches \u2014 genetic algorithms, simulated annealing, policy gradient reinforcement learning \u2014 remain the pragmatic choice for production systems that cannot wait for quantum hardware to mature.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `The chapter delivers a precise formulation of dynamic portfolio optimisation as an integer programming problem, acknowledges its NP-hardness, and presents brute-force search as the gold-standard benchmark for evaluating heuristic alternatives. The combinatorial machinery \u2014 integer partitions, the pigeonhole principle, Sharpe Ratio maximisation, and transaction cost functions \u2014 is developed rigorously and supported by code examples. The key insight is that discretisation of continuous investment variables transforms the problem into a form amenable to brute force and, increasingly, to quantum annealing hardware specialised for combinatorial optimisation. The chapter is honest about the trade-offs: brute force guarantees optimality but does not scale, heuristics scale but lose guarantees, and quantum computing offers potential but not yet proven production readiness. For readers building portfolio optimisation systems today, the takeaway is to use brute force as a validation tool on reduced problems, heuristics as the production workhorse, and to watch the quantum computing literature carefully \u2014 because when the hardware matures, the problem formulations developed here will be ready for it.`)), /* @__PURE__ */ React.createElement(Sec, { n: "22", title: "High-Performance Computing for Real-Time Streaming Data Analysis in Finance and Scientific Domains" }, /* @__PURE__ */ React.createElement(P, null, `Chapter 22 steps back from the statistical machinery of the rest of the book and asks a more prosaic but ultimately decisive question: once a strategy, a surveillance system, or a scientific pipeline is specified, <em>where does the computation actually run</em>? The answer most of industry now reaches for by reflex \u2014 the elastic public cloud \u2014 turns out to be only part of the story. The chapter presents the Computational Intelligence and Forecasting Technologies (CIFT) project at Lawrence Berkeley National Laboratory as a concrete counterexample: a system built on bare-metal High-Performance Computing (HPC) infrastructure, optimised not for the horizontal throughput of independent records but for the vertical parallelism of a single, temporally coherent data stream.`), /* @__PURE__ */ React.createElement(P, null, `The precipitating event for CIFT was the 2010 Flash Crash. The CFTC/SEC joint report took five months to produce, and the bottleneck was not regulatory \u2014 it was computational. Roughly twenty terabytes of order-book and trade data resisted analysis on conventional infrastructure. A dataset that HPC systems can routinely process in minutes stalled a joint investigation for nearly half a year. The lesson the authors draw is not about regulators in particular, but about the mismatch between the volume-and-velocity profile of modern market data and the batch-oriented tools still dominant in finance. Real-time surveillance, genuine early-warning indicators for market instability, and online recalibration of risk models all require a different kind of machine.`), /* @__PURE__ */ React.createElement(P, null, `HPC and cloud are not simply two flavours of "big computing". They differ in architecture, in the workload profile they are optimised for, and in the economics that govern them. Cloud platforms excel at <strong>data parallelism</strong>: processing enormous numbers of independent objects concurrently, each of which can be handled without reference to the others. HPC systems are built for <strong>task parallelism across a single coherent object</strong>: partitioning the analysis of one time step, one frame, one state vector across thousands of tightly-coupled cores connected by low-latency interconnects like InfiniBand. Streaming data \u2014 especially financial time series with rich temporal dependencies \u2014 sits much closer to the second pattern than to the first.`), /* @__PURE__ */ React.createElement(P, null, `The chapter also makes an economic argument that runs against the prevailing narrative. For workloads that require continuous ingestion and analysis, cited studies place HPC cost-effectiveness at three to seven times that of comparable commercial cloud offerings, once data egress, virtualisation overhead, and sustained-utilisation patterns are accounted for. Combined with the performance argument \u2014 virtualisation layers add latency that can be fatal to real-time applications, while bare-metal HPC systems preserve microsecond-level response \u2014 the case for HPC as the substrate for serious streaming analytics in finance becomes difficult to dismiss. Beyond finance, CIFT's applications in supernova detection, fusion plasma analysis, and electricity-demand forecasting demonstrate that the underlying pattern is general: whenever insight must be produced in the same temporal window as the phenomenon it observes, HPC is the natural home.`), /* @__PURE__ */ React.createElement(Ch22Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Indicative end-to-end pipeline latency by stage for a streaming analytics workload on bare-metal HPC (MPI + HDF5 + ADIOS) versus a virtualised cloud deployment. The cloud advantage in elastic horizontal scaling is real for batch workloads, but for time-coherent streams the virtualisation tax and network hops dominate. Numbers are illustrative of the order-of-magnitude gap described in the chapter.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Computational Intelligence and Forecasting Technologies (CIFT):</strong> CIFT represents a paradigm shift in data analysis, leveraging the power of High-Performance Computing (HPC
