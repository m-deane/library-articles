22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bet Size (m)."), " The proportion of capital allocated to a specific bet, typically expressed as a value between \u22121 (maximum short position) and 1 (maximum long position)."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Bet Concurrency (c", /* @__PURE__ */ React.createElement("sub", null, "t"), ")."), " The number of simultaneously active bets in a given direction (long or short)."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Meta-Label."), " A label assigned by a secondary model that predicts the probability of misclassification of the primary trading model."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Sharpe Ratio (SR)."), " A measure of risk-adjusted return, calculated as the excess return divided by the standard deviation of returns."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Limit Price (L)."), " The price at which a trade is executed, designed to limit losses or lock in profits.")), /* @__PURE__ */ React.createElement("div", { style: { margin: "24px 0" } }, /* @__PURE__ */ React.createElement(Ch10Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `Bet concurrency through time \u2014 the counts of active longs and shorts, with the net (long minus short) tracking the portfolio's directional exposure. The sign and magnitude of the net series is the input the Gaussian Mixture sizing method fits; extreme values in either direction are the regime where the CDF-derived bet size is most aggressive, on the statistical argument that further extremes are unlikely.`)), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(P, null, `The chapter organises sizing methods along two axes: whether they depend on the predictor's internals, and whether they operate on a single bet or on the aggregate portfolio. Strategy-independent methods \u2014 bet concurrency with GMMs, the budgeting cap, and meta-labelling as a confidence overlay \u2014 treat the predictor as a black box and act on its outputs or on the portfolio state it produces. Strategy-dependent methods, typified by the binary and multi-class Sharpe ratio approaches, consume the predictor's probability estimates directly and translate them via a Gaussian CDF assumption into sized stakes.`), /* @__PURE__ */ React.createElement(P, null, `Comparatively, the strategy-independent family is easier to deploy across heterogeneous predictors and gives the portfolio-level guarantee of bounded exposure; it pays for this with looser coupling between signal strength and stake. The probability-derived family is tighter and more responsive but inherits any miscalibration in the underlying classifier, which is why meta-labelling \u2014 a hybrid that applies a classifier's confidence as a multiplier on a strategy-independent base size \u2014 often emerges as the most robust option in practice. The workflow the chapter recommends threads these together: predict, size, constrain against portfolio caps, rescale by meta-label confidence, execute.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `Algorithmically, the centrepiece is the GMM fit on the time series of net concurrent bets, typically via Expectation-Maximisation, whose complexity scales with the number of history points and mixture components. Sharpe-ratio calculation is linear in the number of predictions. The system architecture is a three-stage pipeline \u2014 prediction, sizing, execution \u2014 connected by clean interfaces, which the chapter flags as a natural application of the Strategy pattern: swap the sizing module without touching the others. Edge cases the text explicitly calls out include zero predicted probability (guard against divide-by-zero) and volatility spikes (dampen or throttle bet size under high realised variance).`), /* @__PURE__ */ React.createElement(Code, null, `# Sketch: concurrency-aware bet size via GMM CDF
import numpy as np
from sklearn.mixture import GaussianMixture

def concurrency_size(net_history, current_net, n_components=2):
    gmm = GaussianMixture(n_components=n_components).fit(
        np.asarray(net_history).reshape(-1, 1)
    )
    # Approximate CDF: draw samples, compare against current_net
    samples = gmm.sample(50_000)[0].ravel()
    if current_net >= 0:
        prob_stronger = (samples > current_net).mean()
        return float(1.0 - prob_stronger)  # long bias \u2192 positive size
    else:
        prob_stronger = (samples < current_net).mean()
        return float(-(1.0 - prob_stronger))  # short bias \u2192 negative size`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Resource profiles vary by method: the budgeting approach is effectively free, while real-time GMM refitting on a rolling window and meta-label inference on every tick can demand meaningful compute. Caching recent fits and parallelising across instruments are the standard responses. The chapter flags two pitfalls that recur in practice: overfitting the sizing rule to historical concurrency patterns that do not generalise, and understating transaction costs when evaluating whether a sizing method is worth its complexity. Testing leans on backtests for historical plausibility and simulation (synthetic or bootstrapped) for robustness under regimes absent from the historical record. Maintenance-wise, the sizing parameters \u2014 GMM component count, budgeting caps, discretisation step \u2014 drift with the market and need periodic retuning; the chapter recommends treating them as first-class model hyperparameters rather than fixed constants.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `Bet sizing is presented as non-optional infrastructure for any algorithmic trading stack and as a useful lens on traditional portfolio management, where the same ideas \u2014 concurrency, confidence-weighted allocation, discretised rebalancing \u2014 show up under different names. Hedge funds and proprietary trading firms are the archetypal users, with Renaissance Technologies cited as the canonical case study of a firm whose durable edge is as much in stake calibration as in signal discovery. Integration is typically through a sizing module that subscribes to the prediction stream and publishes bet-size targets to the execution engine; the clean boundary is what allows sizing to be improved independently of the predictor. Evaluation tracks two headline metrics \u2014 Sharpe ratio (higher is better) and maximum drawdown (lower is better) \u2014 with the understanding that sizing improvements should lift the former without deteriorating the latter.`), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(P, null, `Working implementations compose the sized output from three building blocks: a probability or concurrency statistic computed from the predictor stream, a mapping function (sigmoid, power, or CDF-based) from that statistic to a real number in [\u22121, 1], and a post-processing stage that applies averaging across active bets and discretisation to reach the final stake. Limit-price derivation piggybacks on the mapping function's invertibility: given a target bet size, solve for the price that would produce it. The code skeleton below shows a sigmoid mapping with an explicit inverse, which is the pattern that generalises cleanly to alternative sizing functions.`), /* @__PURE__ */ React.createElement(Code, null, `import math

def sigmoid_bet_size(pred_price, mkt_price, k=10.0):
    """Map price divergence to a bet size in [-1, 1]."""
    divergence = pred_price - mkt_price
    return math.tanh(k * divergence)

def sigmoid_limit_price(target_size, pred_price, k=10.0):
    """Invert the sigmoid to find the price that yields target_size."""
    target_size = max(min(target_size, 0.999), -0.999)
    divergence = math.atanh(target_size) / k
    return pred_price - divergence

def discretise(size, step=0.05):
    """Round to the nearest increment to suppress churn."""
    return round(size / step) * step

def average_active(current_sizes):
    """Smooth exposure across overlapping signals."""
    return sum(current_sizes) / max(len(current_sizes), 1)`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `The research frontier pushes bet sizing from hand-designed rules toward learned policies. Reinforcement-learning agents, trained in simulated markets where the reward is a risk-adjusted P&amp;L signal, can in principle discover sizing behaviours that handle regime changes and transaction friction jointly \u2014 though the chapter is appropriately sceptical about transferring simulator-trained policies to live trading without heavy safety nets. Extensions in the classical direction include multi-asset portfolio optimisation with dynamic covariance estimation and Bayesian frameworks that carry prior beliefs about market behaviour into the sizing calculation. Open problems cluster around model uncertainty (how to size when the predictor itself may be wrong about the market regime it is in) and adaptation speed (how quickly a sizing rule should respond to a detected regime shift without overreacting to noise). Fractional Kelly betting \u2014 scaling the Kelly stake by a safety factor \u2014 remains a pragmatic baseline alongside these richer approaches.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `Chapter 10 makes one argument, thoroughly: that bet sizing is the discipline where probabilistic predictions become capital allocation, and that doing it well requires explicit methods rather than ad-hoc rules. The catalogue moves from simple budgeting caps through GMM-based concurrency sizing, binary and multi-class Sharpe optimisation, meta-labelling, and dynamic sigmoid or power-function sizing tied to live prices \u2014 each targeting a specific aspect of the sizing problem (exposure, confidence, friction) and each reinforcing the others when combined.`), /* @__PURE__ */ React.createElement(P, null, `The operational takeaway is that sizing must align with the strategy it supports, adapt to regime changes, and respect model confidence \u2014 with averaging and discretisation as non-negotiable friction controls. Mastering these techniques offers a concrete route to better risk-adjusted returns; the research directions the chapter points to (machine-learning-driven sizing, more robust uncertainty handling) describe where the frontier is moving. Capital allocation is not a solved problem, but after this chapter it is at least an addressable one.`)), /* @__PURE__ */ React.createElement(Sec, { n: "11", title: "The Dangerous Game of Backtesting \u2014 Why Historical Simulation Almost Always Lies" }, /* @__PURE__ */ React.createElement(P, null, `Backtesting is the defining ritual of quantitative finance \u2014 the moment when a strategy meets the tape, if only in simulation. A seemingly clean set of trading rules is threaded through years of historical prices, orders are filled at notional mid-points, a curve is drawn, a Sharpe is computed, and a decision is made. In practice, that decision is almost always wrong. The problem is not that backtesting is hard \u2014 it is that backtesting is <em>seductive</em>. A beautiful equity curve with a Sharpe of 2.4 feels like a discovery. It is, more often than not, an artefact of the very process that produced it.`), /* @__PURE__ */ React.createElement(P, null, `Chapter 11 reframes backtesting as an instrument of falsification rather than confirmation. In the author's blunt formulation, a backtest should be used primarily to <strong>discard</strong> flawed strategies, never to refine them. The moment a researcher sees a disappointing equity curve and responds by tweaking a parameter, adjusting a lookback window, or adding a regime filter, the researcher has stopped doing research and started doing <em>data mining</em>. What emerges at the end of that loop is not a trading strategy but a compressed memoir of the historical sample \u2014 indistinguishable, from the sample alone, from something real.`), /* @__PURE__ */ React.createElement(P, null, `The chapter draws a sharp line between <strong>research</strong> and <strong>backtesting</strong>. Research asks whether a causal mechanism could plausibly generate excess returns. Backtesting asks whether a particular implementation of that mechanism would have produced a profit on a particular slice of history. The two activities are complementary only if they are kept separate. When backtest results are allowed to drive research decisions, the feedback loop contaminates the evidence: each iteration bakes historical noise more deeply into the strategy's parameters, until the strategy is a near-perfect photograph of a past that will never repeat.`), /* @__PURE__ */ React.createElement(P, null, `The practical stakes are enormous. Most published quantitative strategies fail out of sample, not because markets are adversarial, but because the space of possible backtests is so large that purely random trials will eventually produce apparently significant results. This chapter develops the tools \u2014 walk-forward analysis, Combinatorially Symmetric Cross-Validation, and the Probability of Backtest Overfitting \u2014 that let a researcher quantify exactly how much of an observed Sharpe is likely signal versus selection. It also catalogues the Seven Sins of Quantitative Investing \u2014 survivorship bias, look-ahead bias, storytelling, data mining, inaccurate transaction costs, overreliance on outliers, and the asymmetries of short selling \u2014 each of which can silently inflate backtest performance by an order of magnitude.`), /* @__PURE__ */ React.createElement(Ch11Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Probability that at least one apparently significant result (at the 5% level) appears purely by chance, as a function of the number of independent backtests conducted. By 20 trials the probability of a false discovery exceeds 60%; by 100 it is effectively certain. This is the statistical mechanics of data mining \u2014 and why naive reporting of the single best backtest is almost always misleading.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Backtest Overfitting:</strong> Backtest overfitting is a critical concept in quantitative finance that describes the phenomenon where a trading strategy is optimized to perform exceptionally well on historical data but fails to generalize to future market conditions. This occurs when the strategy inadvertently learns noise or random patterns in the historical data rather than true underlying market dynamics. The more complex a strategy and the more parameters it has, the greater the risk of overfitting. For example, a strategy that is highly tuned to specific market events in the past, like a particular economic recession, is likely to overfit and perform poorly when market conditions change. This highlights the importance of using robust evaluation methods like Combinatorially Symmetric Cross-Validation (CSCV) to assess the likelihood of overfitting.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Selection Bias:</strong> Selection bias, in the context of backtesting, refers to the tendency to favor strategies that have performed well in historical simulations, even if that performance is due to random chance or overfitting. This bias can be unconscious, where researchers unintentionally gravitate towards positive results, or conscious, where researchers deliberately cherry-pick the best-performing strategies. This can lead to the publication of misleading results and the adoption of strategies that are unlikely to be profitable in the future. For instance, if a researcher tests 100 different strategies and only publishes the one with the highest Sharpe ratio, they are introducing selection bias. The published strategy's performance is likely inflated, as the 99 other strategies, which probably performed worse, are not disclosed.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Survivorship Bias:</strong> Survivorship bias arises when a backtest uses a current investment universe, excluding companies or securities that have ceased to exist due to bankruptcy, delisting, or mergers. This creates an overly optimistic view of historical performance, as the failed investments, which would have negatively impacted returns, are not considered. For example, a backtest of a stock market index that only includes currently listed companies will ignore the poor performance of companies that went bankrupt in the past, thus artificially inflating the historical returns of the index. To mitigate survivorship bias, it is crucial to use historical datasets that include delisted and bankrupt companies.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Look-Ahead Bias:</strong> Look-ahead bias occurs when a backtest uses information that would not have been available at the time the simulated trading decisions were made. This can happen due to using revised data, incorrect timestamps, or failing to account for delays in data dissemination. For example, using the end-of-day closing price to simulate a trade executed at the market open introduces look-ahead bias, as the closing price was not known at the time the trade was supposedly executed. Preventing look-ahead bias requires meticulous data management and ensuring that all data points are timestamped accurately and reflect the information available at the time of the simulated trade.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Data Mining/Snooping:</strong> Data mining or snooping refers to the practice of repeatedly testing different variations of a trading strategy on the same historical dataset until a seemingly profitable pattern is found. This leads to overfitting, as the strategy is essentially memorizing the historical data rather than learning generalizable patterns. For example, if a researcher continuously adjusts the parameters of a trading model until it achieves a high Sharpe ratio on the backtest data, they are likely data snooping. The resulting strategy is likely to perform poorly on new, unseen data.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Walk-Forward Analysis:</strong> Walk-forward analysis is a backtesting technique that addresses some of the limitations of traditional cross-validation methods. It involves dividing the historical data into training and testing periods, training the model on the training period, and then testing it on the subsequent testing period. This process is repeated, moving the testing period forward in time, creating a more realistic simulation of how the strategy would have performed in real-time. This helps to mitigate the risk of overfitting and provides a more robust evaluation of the strategy's performance.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Combinatorially Symmetric Cross-Validation (CSCV):</strong> CSCV is a sophisticated method for estimating the probability of backtest overfitting (PBO). It involves partitioning the performance matrix of multiple backtested strategies into submatrices and creating various combinations of these submatrices for training and testing. By evaluating the performance of the selected strategy on these out-of-sample testing sets, CSCV provides a more reliable estimate of the strategy's true potential and the likelihood that its apparent success is due to overfitting. This method is particularly useful for evaluating strategies developed through extensive backtesting and parameter optimization.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Feature Importance:</strong> Feature importance, in the context of machine learning, refers to the relative contribution of different input variables (features) to the model's predictions. Analyzing feature importance <em>before</em> backtesting can provide valuable insights into the underlying relationships captured by the model. This helps researchers understand <em>why</em> a model is making certain predictions, which is crucial for building robust and interpretable trading strategies. Unlike backtesting, which focuses on performance, feature importance analysis helps understand the model's internal workings.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>False Discovery:</strong> A false discovery, in the context of backtesting, refers to a seemingly profitable trading strategy that is identified through extensive backtesting but is actually the result of random chance or overfitting. The more backtests conducted, the higher the probability of encountering a false discovery. This is analogous to flipping a coin many times: eventually, you're likely to get a long streak of heads, even though the coin is fair. Recognizing the possibility of false discoveries is crucial for interpreting backtest results and avoiding overconfidence in seemingly successful strategies.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Bagging (Bootstrap Aggregating):</strong> Bagging is a technique used to improve the robustness and stability of machine learning models. It involves training multiple models on different subsets of the training data and then combining their predictions. In the context of backtesting, bagging can help reduce overfitting and improve the generalizability of trading strategies. By training models on different subsets of the historical data, bagging helps to prevent the model from memorizing specific patterns in the data and encourages it to learn more generalizable relationships.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Model Entire Asset Classes:</strong> This recommendation suggests developing trading models for broad asset classes or investment universes rather than individual securities. This approach helps to avoid overfitting to the specific characteristics of individual securities and encourages the model to learn more generalizable patterns across the broader market. For example, building a model for the entire S&amp;P 500 index is less likely to overfit than building a model for a single stock.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `Backtesting is, at its heart, a statistical act: a researcher proposes a strategy and asks whether its historical performance is consistent with a null hypothesis of zero edge. The ritual feels rigorous because it produces numbers \u2014 Sharpe ratios, drawdowns, hit rates \u2014 but those numbers are only meaningful if the test being conducted is well-specified. In almost all real-world quantitative research, the test is not well-specified, because the researcher has tested many strategies (or many parameterisations of the same strategy) and reported the best. The reported Sharpe is then the maximum of a distribution, not a draw from it, and its interpretation changes entirely.`), /* @__PURE__ */ React.createElement(P, null, `The chapter's central metaphor \u2014 that letting backtests guide research is like drinking and driving \u2014 is deliberately uncomfortable. The point is that backtest results impair judgement in a way analogous to intoxication: they create confidence that is uncorrelated with actual edge, and the researcher typically cannot tell the difference from inside the process. The only safeguard is procedural discipline: complete the research, formulate the hypothesis, then run the backtest once \u2014 and accept the result, whatever it is.`), /* @__PURE__ */ React.createElement(P, null, `Against this backdrop, the Seven Sins of Quantitative Investing enumerate the specific mechanisms by which backtest performance is typically inflated. Survivorship bias excludes the losers. Look-ahead bias smuggles in future information. Storytelling justifies parameter choices with narrative plausibility. Data mining tries thousands of specifications. Inaccurate transaction costs assume frictionless execution. Overreliance on outliers lets one lucky trade carry an entire equity curve. And short-selling difficulties make long-short strategies look cheaper to implement than they are. Each sin is individually subtle; together they can turn a losing strategy into a seemingly brilliant one.`), /* @__PURE__ */ React.createElement(P, null, `The positive programme of the chapter is a set of evaluation tools designed to survive these pathologies. The flawless backtest is the limiting ideal \u2014 a simulation that correctly accounts for every known effect \u2014 but even it cannot guarantee future success, because the future is a different draw. Walk-forward analysis imposes temporal discipline by training on the past and testing on the strict future. CSCV goes further, computing the Probability of Backtest Overfitting (PBO) across combinatorial splits of a performance matrix, and so providing an explicit estimate of how much of a strategy's apparent edge is selection artefact.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Theoretical foundations of backtesting"), /* @__PURE__ */ React.createElement(P, null, `Backtesting rests on a single, fragile premise: that the historical record contains exploitable structure that will persist into the future. This is not a safe assumption. Markets are non-stationary \u2014 their statistical properties change \u2014 and any strategy calibrated to a particular regime is implicitly betting that the regime will continue. Even within a stable regime, finite-sample estimation introduces noise: a Sharpe of 1.5 computed over five years has a standard error that easily admits a true Sharpe of zero.`), /* @__PURE__ */ React.createElement(P, null, `The theoretical machinery draws on statistical modelling and time-series analysis \u2014 regression, state-space models, ARCH/GARCH, cointegration, machine-learning estimators \u2014 but the critical insight is that the <em>test</em> matters more than the model. A well-specified test on a mediocre model is more informative than a poorly-specified test on a sophisticated one.`), /* @__PURE__ */ React.createElement(H4, null, "Historical development and precedent approaches"), /* @__PURE__ */ React.createElement(P, null, `Early backtesting was hand-computation on printed price tables. The arrival of spreadsheets, then of vectorised numerical libraries, then of full research platforms, progressively lowered the cost of running a single backtest \u2014 and in doing so, raised the cost of interpreting the result. Cheap backtests mean many backtests, and many backtests mean false discoveries. The early literature largely ignored transaction costs, slippage, market impact, and survivorship; modern platforms handle these mechanically, but the subtler biases \u2014 selection, look-ahead through subtly leaked information, and data-snooping \u2014 remain largely unpoliced by tooling.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental principles and axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Parsimony:"), " Simpler models are generally preferred over complex models, as they are less prone to overfitting. Fewer parameters means fewer degrees of freedom for the optimiser to fit noise."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Robustness:"), " A robust backtest should be insensitive to small changes in the data or model parameters. If a one-day shift in the sample or a 1% change in a threshold collapses performance, the result is noise, not signal."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Reproducibility:"), " A backtest should be reproducible by other researchers using the same data and methodology. Non-reproducibility usually signals hidden leakage, undocumented parameter choices, or data-version drift.")), /* @__PURE__ */ React.createElement(H4, null, "Key terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Sharpe Ratio:"), " Excess return over the risk-free rate divided by return standard deviation. Higher is better risk-adjusted performance, but it can be manipulated by smoothing returns (e.g. illiquid marks) or ignoring tail risk."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Maximum Drawdown:"), " The largest peak-to-trough decline in equity before a new peak. A measure of realised downside risk and, crucially, of the emotional capital required to hold a strategy."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Alpha:"), " Excess return relative to a benchmark \u2014 a notional measure of skill. Positive in-sample alpha is trivial to produce and largely uninformative; robust out-of-sample alpha is what matters."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Beta:"), " Sensitivity to systematic market risk. A beta of 1 moves with the market, less than 1 is defensive, greater than 1 is levered. Strategies whose alpha collapses when beta is controlled for are typically just expensive index trackers.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(H4, null, "Walk-forward analysis"), /* @__PURE__ */ React.createElement(P, null, `Walk-forward analysis imposes the only discipline that matters in time-series backtesting: the test set is always strictly after the training set. The data is partitioned into an in-sample training window and an immediately-following out-of-sample testing window. Parameters are fitted on the training window, performance is evaluated on the test window, and the windows then slide forward in time. The resulting concatenation of out-of-sample segments is a pseudo-real-time equity curve.`), /* @__PURE__ */ React.createElement(P, null, `The technique's weakness is window length: short test windows are noisy and regime-specific, while long windows leave little data for training and can bury regime changes inside a single segment. Walk-forward is the right first instrument, not the last word.`), /* @__PURE__ */ React.createElement(H4, null, "Combinatorially Symmetric Cross-Validation (CSCV)"), /* @__PURE__ */ React.createElement(P, null, `CSCV attacks a harder problem \u2014 estimating the Probability of Backtest Overfitting (PBO) for a strategy that was itself selected from a family of candidates. The performance matrix M has one row per strategy and one column per time period of P&amp;L. The columns are partitioned into S equal submatrices, and every possible split of those submatrices into in-sample and out-of-sample halves is enumerated. For each split, the best strategy on the in-sample half is ranked on the out-of-sample half; if that rank is systematically high, the selection procedure generalises, and if it is no better than a median draw, the apparent edge is overfitting.`), /* @__PURE__ */ React.createElement(P, null, `PBO is then the fraction of splits in which the selected strategy's out-of-sample rank falls in the bottom half. A PBO near 0.5 means the selection process is statistically indistinguishable from coin-flipping; a PBO near zero means the selection is genuinely informative. CSCV gives a number to what the Seven Sins describe qualitatively.`), /* @__PURE__ */ React.createElement(H4, null, "Comparative analysis of methodologies"), /* @__PURE__ */ React.createElement(P, null, `Walk-forward is simple and cheap; it is suitable for evaluating a single strategy specification and gives a plausible out-of-sample estimate, but it does not quantify selection bias across the family of strategies that were tried before arriving at the one being tested. CSCV is expensive and combinatorial, but it is the right tool when a research process has explored many specifications, because it directly estimates the probability that the best-looking strategy is the best only by luck.`), /* @__PURE__ */ React.createElement(H4, null, "Workflow \u2014 Walk-forward"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Preparation:"), " Gather and clean historical data, verify timestamps, and patch for survivorship bias."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Parameter Optimisation:"), " Fit the strategy's parameters on the in-sample window only."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Out-of-Sample Testing:"), " Apply the fitted strategy to the immediately-subsequent out-of-sample window without further adjustment."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Performance Evaluation:"), " Compute Sharpe, maximum drawdown, turnover, hit-rate, and cost sensitivity on the out-of-sample segment."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Walk-Forward Iteration:"), " Slide both windows forward in time and repeat, concatenating the out-of-sample segments into a single pseudo-real-time track record.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths, limitations, and boundary conditions (Walk-forward)"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Strengths:"), " Simple to implement, computationally efficient, respects temporal ordering, and gives a reasonable estimate of genuine out-of-sample behaviour."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Limitations:"), " Susceptible to overfitting when test windows are short; does not account for selection across the family of strategies that were tried."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Boundary Conditions:"), " Requires enough data for meaningful windowing; window lengths materially affect the result and should be chosen before the data is touched.")), /* @__PURE__ */ React.createElement(H4, null, "Workflow \u2014 CSCV"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Multiple Backtests:"), " Conduct many backtests across the parameter family of interest."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Performance Matrix:"), " Assemble a matrix M whose rows are strategies and whose columns are time-period P&Ls."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Submatrix Formation:"), " Partition the columns of M into S equal-sized submatrices."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Combinatorial Training/Testing:"), " Enumerate every way of splitting the S submatrices into in-sample and out-of-sample halves."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Performance Evaluation and Ranking:"), " For each split, identify the best in-sample strategy and record its out-of-sample rank."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "PBO Estimation:"), " Compute the fraction of splits in which that rank falls in the bottom half \u2014 this is the estimated Probability of Backtest Overfitting.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths, limitations, and boundary conditions (CSCV)"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Strengths:"), " Directly estimates the probability of overfitting induced by selection; robust to the dimensionality of the strategy family."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Limitations:"), " Computationally intensive; requires a population of backtested strategies, not just one."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Boundary Conditions:"), " The number of submatrices S trades off resolution against variance \u2014 too few and the estimate is coarse, too many and the submatrix returns are noisy.")), /* @__PURE__ */ React.createElement(Ch11Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `The backtest signature of overfitting. An overfitted strategy displays a spectacular in-sample Sharpe (2.4) that collapses out of sample (0.1). A robust strategy shows a modest in-sample Sharpe (1.1) that largely survives out of sample (0.9). Out-of-sample degradation is the statistic that matters; the in-sample number is cheap to inflate.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `The CSCV algorithm is mechanical once the performance matrix exists. Construct M with strategies as rows and time slices as columns. Partition the columns into S submatrices. Enumerate the set of all binomial-coefficient-many ways to choose S/2 of those submatrices as in-sample; for each such split, concatenate the in-sample submatrices, identify the row with the highest in-sample performance, and compute that same row's performance on the out-of-sample concatenation. Rank that out-of-sample performance against the other rows' out-of-sample performances in the same split. PBO is the share of splits for which the rank falls in the lower half.`), /* @__PURE__ */ React.createElement(P, null, `The time complexity is dominated by the combinatorial enumeration \u2014 O(C(S, S/2)) splits, each requiring an evaluation over N strategies \u2014 and so is exponential in S. The space complexity is dominated by M itself, at O(N \xD7 T) for N strategies and T time slices. In practice S is kept small (8 to 16) to keep the combinatorial cost tractable.`), /* @__PURE__ */ React.createElement(P, null, `A production backtesting system is built from a small set of orthogonal components: a data source that provides point-in-time-correct market data, a strategy engine that generates signals, a portfolio simulator that translates signals into fills subject to realistic friction (slippage, commission, market impact), a performance analyser that computes risk-adjusted metrics, and a reporting layer that produces the equity curve and diagnostic plots. Modular separation lets the same strategy engine run against historical data in backtest mode and live data in production \u2014 and, crucially, lets the same code path be exercised in both.`), /* @__PURE__ */ React.createElement(P, null, `Edge cases matter disproportionately. Flash crashes, halted securities, corporate actions, and data outages are the events that break naive backtests and the events that produce real-world losses. A backtesting system that silently discards these periods is reporting a fantasy; one that handles them gracefully \u2014 and reports how it handled them \u2014 is a tool a researcher can trust.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Resource requirements scale with strategy complexity, the size and resolution of the historical dataset, and the number of backtests required. A single daily-frequency backtest of an equity strategy is a matter of seconds; a full CSCV run across a thousand parameter combinations on minute bars can require hours on a workstation and is an obvious candidate for parallelisation. The bottleneck is almost always I/O and data-preparation rather than numerical computation, so caching cleaned, aligned, point-in-time-correct data is typically the highest-leverage optimisation.`), /* @__PURE__ */ React.createElement(P, null, `The common pitfalls map to the sins already enumerated. Data errors \u2014 bad ticks, stale prices, corporate-action mishandling \u2014 produce inflated performance and should be caught by validation rather than by inspection of equity curves. Overfitting is mitigated by the CSCV-style evaluation tools described above. Look-ahead bias is prevented by disciplined point-in-time data management: every field must be timestamped by the moment it was actually available, not the moment it is labelled in the data vendor's schema.`), /* @__PURE__ */ React.createElement(P, null, `Testing and validation of the backtesting system itself is non-negotiable. Unit tests verify component-level correctness; integration tests verify that signals, fills, and P&amp;L compose correctly; and regression tests, run against a known reference strategy, catch silent behavioural changes. Unchecked technical debt in a backtesting system is especially dangerous, because its bugs manifest as spurious alpha.`), /* @__PURE__ */ React.createElement(H3, null, "Practical Applications"), /* @__PURE__ */ React.createElement(P, null, `In hedge funds, backtesting is used throughout the lifecycle: to kill strategy ideas cheaply before committing research capital, to size positions within a multi-strategy book, and to stress-test portfolios under historical crisis scenarios. Risk management applications invert the usual question \u2014 rather than asking how profitable a strategy would have been, they ask how badly a portfolio would have drawn down through specific episodes (2008, March 2020, 2022). Algorithmic trading firms use backtests to validate microstructural strategies whose edge depends on execution details that must be modelled to realistic fidelity.`), /* @__PURE__ */ React.createElement(P, null, `Adaptations across industries are instructive. Insurance uses effectively the same mathematical machinery to backtest claims models and reserving rules. Credit risk teams backtest default-probability models against realised default histories. In every case, the same hazards apply: selection bias, look-ahead bias, survivorship in the portfolio universe, and overfitting through iterative refinement on the same dataset.`), /* @__PURE__ */ React.createElement(P, null, `Integration with live systems is both necessary and dangerous. Necessary, because a strategy that cannot be executed in production is useless; dangerous, because code forks between backtest and live paths are a reliable source of silent discrepancies. The discipline is to run the same strategy code in both environments, with the only difference being the data source and the order-routing destination.`), /* @__PURE__ */ React.createElement(P, null, `The classic cautionary case is Leinweber's Super Bowl indicator \u2014 a strategy that bought the market when the NFC team won and sold when the AFC team won, which produced a striking in-sample return purely by coincidence. It is the canonical illustration that large search spaces eventually produce spurious associations, and that the correlational evidence of a backtest is not, by itself, evidence of anything at all.`), /* @__PURE__ */ React.createElement(H3, null, "Programming Implementation"), /* @__PURE__ */ React.createElement(P, null, `A minimal vectorised backtester demonstrates the core computational pattern: it takes a price series and a signal series of the same length, computes returns, multiplies returns element-wise by the signal (shifted appropriately to avoid look-ahead), and takes a cumulative product to produce an equity curve.`), /* @__PURE__ */ React.createElement(Code, null, `def backtest(prices, signals):
    """Simple vectorised backtester.

    prices  : np.ndarray or pd.Series of historical prices (length T).
    signals : np.ndarray or pd.Series of positions in {-1, 0, +1}
              aligned so that signals[t] is the position HELD from t to t+1
              (i.e. decided using information available at time t).

    Returns : np.ndarray of cumulative portfolio value starting at 1.0.
    """
    returns = (prices[1:] - prices[:-1]) / prices[:-1]
    portfolio_returns = returns * signals[:-1]
    cumulative_returns = np.cumprod(1.0 + portfolio_returns)
    return cumulative_returns`), /* @__PURE__ */ React.createElement(P, null, `The alignment of signals and returns is the single most common source of subtle look-ahead bias. If signals[t] is computed using the closing price of day t, then the position it represents can only be taken at or after the close \u2014 its payoff is the return from t to t+1, which is exactly the alignment above. Off-by-one errors in this alignment inflate Sharpe ratios by factors of two or more and are invisible in the equity curve.`), /* @__PURE__ */ React.createElement(P, null, `Production extensions slot onto this core without changing it: transaction costs are subtracted from portfolio_returns proportional to the absolute change in signals (turnover); slippage is modelled as a spread haircut at every transition; market impact is modelled as a function of trade size relative to average daily volume. Integration with data providers (Bloomberg, Quandl, internal tick archives) and execution venues is the glue around this core, not a modification of it. Cython, Numba, or moving to a compiled language becomes worthwhile only once the vectorised implementation itself has become the bottleneck \u2014 which, for most strategies, is never.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Topics and Extensions"), /* @__PURE__ */ React.createElement(P, null, `Current research is pushing in several directions. Fractional differentiation, introduced elsewhere in the book, lets series be made stationary without destroying memory, which matters for feature construction in backtests on long lookbacks. Deflated Sharpe ratios explicitly correct reported Sharpes for the number of trials that produced them, giving a direct counterweight to selection bias. Machine-learning-aware evaluation protocols \u2014 purged k-fold, embargoed splits, combinatorial purged cross-validation \u2014 adapt generic cross-validation to the particular pathologies of financial time series, where sample labels overlap in time and information leaks across splits.`), /* @__PURE__ */ React.createElement(P, null, `Extensions to more complex scenarios bring their own hazards. Multi-asset portfolios introduce covariance estimation error. Options strategies require modelling of implied-volatility surfaces and their dynamics. High-frequency backtests require realistic microstructure simulation \u2014 order-book state, queue position, latency \u2014 without which transaction-cost assumptions collapse. Each added realism is a new surface on which look-ahead and selection bias can operate.`), /* @__PURE__ */ React.createElement(P, null, `Open problems include: better estimators of PBO under realistic dependency structures in returns; principled ways to incorporate nonlinear market impact into backtests of size-sensitive strategies; and genuinely predictive market simulators that move beyond historical replay to generative models of counterfactual market states. Agent-based models and genetic-algorithm-driven strategy discovery offer alternative perspectives but inherit all of the selection problems of conventional backtesting, often in amplified form.`), /* @__PURE__ */ React.createElement(H3, null, "Summary and Key Takeaways"), /* @__PURE__ */ React.createElement(P, null, `Backtesting is an instrument of falsification, not of discovery. Its proper use is to reject flawed strategies quickly; its improper use \u2014 iterative refinement until the equity curve is flattering \u2014 is the single largest source of overfitting in quantitative finance. The Seven Sins of Quantitative Investing enumerate the specific mechanisms by which backtest performance is routinely inflated, and each of them is avoidable with disciplined methodology: point-in-time-correct data, pre-committed test protocols, honest accounting of transaction costs, and full disclosure of the search space that produced a reported result.`), /* @__PURE__ */ React.createElement(P, null, `Walk-forward analysis and CSCV provide the quantitative scaffolding for honest evaluation. Walk-forward respects temporal ordering; CSCV quantifies the probability that a strategy's apparent edge is a selection artefact. Taken together, they allow a researcher to convert the question "does this strategy work?" from an exercise in hope to an exercise in statistics. The chapter's final injunction is unambiguous: do your research first, then backtest once, and accept the result. Adjusting the strategy in response to a disappointing backtest does not recover a lost edge \u2014 it merely produces a more sophisticated illusion of one.`)), /* @__PURE__ */ React.createElement(Sec, { n: "12", title: "Robust Backtesting through Cross-Validation and Combinatorial Purged Cross-Validation" }, /* @__PURE__ */ React.createElement(P, null, `If Chapter 11 is a diagnosis of why backtesting lies, Chapter 12 is the prescription. The diagnosis is unflattering: a single historical path, sliced into in-sample and out-of-sample halves, is an unreliable witness to a strategy's edge. The prescription is to stop treating the past as one story and start treating it as a family of counterfactual stories \u2014 different orderings of the same events, different partitions of the same data, different realisations of the same underlying process. From that reframing emerges <strong>Combinatorial Purged Cross-Validation</strong> (CPCV), the chapter's headline technique and one of the book's signature contributions to robust evaluation.`), /* @__PURE__ */ React.createElement(P, null, `The chapter begins where most practitioners have already been burned: with walk-forward (WF) analysis. WF is the natural default \u2014 train on the past, test on the strictly subsequent future, slide the window forward \u2014 and for many years it was the only temporally-honest option available. But WF has two structural weaknesses that CPCV is designed to cure. First, it produces exactly one backtest path, so every reported statistic is a single draw with no estimate of its own variance. Second, because that one path is the actual historical ordering of events, WF performance is inseparable from <em>sequence bias</em>: a momentum strategy that happens to have trained across a trending regime and tested across a range-bound one will look quite different from the same strategy evaluated on the reverse ordering.`), /* @__PURE__ */ React.createElement(P, null, `Standard k-fold cross-validation (CV) partially addresses the first problem by using each fold as the test set once, but it is treacherous in financial settings. Financial labels typically depend on future prices (a triple-barrier label looks forward to a horizon); training and testing samples therefore overlap in time, and information leaks across folds unless the overlap is explicitly <strong>purged</strong>. Even purged k-fold still produces only one concatenated out-of-sample path, and still cannot disentangle strategy quality from event ordering.`), /* @__PURE__ */ React.createElement(P, null, `CPCV is what you get when you take purged cross-validation seriously enough to ask how many distinct, uncorrelated backtest paths a dataset can produce. Partition the observations into N contiguous groups without shuffling. Choose k of those N groups as the test set and use the remaining N\u2212k as the training set \u2014 then enumerate every combinatorial choice. Each combination yields a trained model and a test-set forecast; by recombining the forecasts across combinations, CPCV reconstructs \u03C6[N, k] different backtest paths, each a legitimate counterfactual history of the same strategy on the same data. The Sharpe ratio reported by CPCV is no longer a single number but a distribution, and the variance of that distribution is itself a test for overfitting.`), /* @__PURE__ */ React.createElement(Ch12Vis1, null), /* @__PURE__ */ React.createElement(Cap, null, `Relative variance of the Sharpe estimate and overfitting risk across four backtesting methodologies, normalised so walk-forward equals 100. Moving from a single WF path to 45 CPCV paths drops estimation variance by roughly an order of magnitude and collapses the risk that a favourable backtest reflects nothing more than lucky event ordering. The paths column shows how many distinct backtest histories each method produces from the same underlying data.`), /* @__PURE__ */ React.createElement(H3, null, "Key Technical Concepts"), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Backtesting:</strong> Backtesting is a critical process for evaluating the potential performance of trading strategies, investment portfolios, or risk models using historical data. It involves simulating the strategy's execution on past data to assess its profitability, risk profile, and overall effectiveness.  Backtesting serves two main purposes: historical performance simulation (walk-forward) and scenario simulation.  Historical simulation aims to replicate past performance, while scenario simulation tests the strategy under hypothetical market conditions.  Understanding the limitations of backtesting, such as overfitting and data snooping, is crucial for its proper application.  For example, a backtest might show impressive results on historical data but fail in live trading due to overfitting to specific past market conditions.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Walk-Forward (WF) Backtesting:</strong>  This method simulates the historical performance of a strategy by using a rolling window approach. The model is trained on a past period and tested on a subsequent period, with the window moving forward through time.  This sequential approach ensures that each trading decision is based only on information available at that time, preventing look-ahead bias.  However, WF is susceptible to overfitting to the single historical path and sequence bias, where the performance is heavily influenced by the specific order of market events.  For instance, a momentum strategy might perform exceptionally well during a trending market but poorly in a range-bound market.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Cross-Validation (CV):</strong>  CV aims to assess a strategy's performance under various market scenarios by dividing the data into multiple folds. Each fold is used as the testing set once, while the remaining folds are used for training.  This allows for testing the strategy under different market conditions and provides a more robust performance evaluation than WF.  However, CV does not simulate historical performance and can be prone to data leakage if not implemented carefully with purging and embargoing techniques.  For example, if data from the testing set leaks into the training set, the backtest results will be overly optimistic and unreliable.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Combinatorial Purged Cross-Validation (CPCV):</strong> CPCV addresses the limitations of WF and CV by generating multiple backtest paths. It combines cross-validation with combinatorial analysis to create a more comprehensive backtesting methodology.  By partitioning the data into groups and generating all possible combinations of these groups as testing sets, CPCV creates multiple uncorrelated backtest paths.  This reduces the variance of performance estimates and mitigates the risk of overfitting.  CPCV is particularly useful for evaluating strategies that are sensitive to specific market conditions or sequences of events.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Purging:</strong>  Purging is a crucial technique used in both WF and CPCV to prevent data leakage between training and testing sets. It involves removing any overlapping data points between the two sets, ensuring that information from the future does not influence past decisions.  For example, if a model is trained on daily data, purging might involve removing data points within a certain window around the testing set to avoid contamination from lagged information.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Embargo:</strong>  Embargo is another technique used to prevent data leakage, particularly in CV and CPCV. It involves excluding a period of data following the training set to prevent leakage from lagged information.  This is especially important when dealing with financial data, where information might propagate with a time delay. For instance, an embargo period of a few days might be necessary to prevent information from earnings announcements in the training set from influencing the testing set.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Overfitting:</strong>  Overfitting occurs when a model learns the training data too well, capturing noise and specific patterns that are not representative of future market behavior. This leads to overly optimistic performance estimates and poor generalization to new data.  Overfitting is a major concern in backtesting and can be mitigated by techniques like cross-validation, regularization, and using out-of-sample data for evaluation.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Sharpe Ratio:</strong> The Sharpe ratio is a widely used metric for evaluating the risk-adjusted return of an investment strategy. It measures the excess return per unit of risk, where risk is typically represented by the standard deviation of returns.  A higher Sharpe ratio indicates better risk-adjusted performance.  However, the Sharpe ratio can be misleading if the returns are not normally distributed or if the strategy involves leverage.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Data Snooping (p-hacking):</strong> Data snooping refers to the practice of repeatedly testing different strategies or parameters on the same dataset until a desirable result is found. This can lead to overfitting and false discoveries, as the strategy is essentially optimized for the specific historical data.  To avoid data snooping, it is important to use robust backtesting methodologies like CPCV and to validate the results on out-of-sample data.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>Sequence Bias:</strong> Sequence bias occurs when the performance of a strategy is heavily influenced by the specific order of events in the historical data.  This can lead to misleading backtest results, as the strategy might perform differently under different sequences of market conditions.  CPCV helps to mitigate sequence bias by generating multiple backtest paths with different event sequences.`), /* @__PURE__ */ React.createElement(Callout, null, `<strong>False Discovery:</strong> A false discovery occurs when a backtest indicates that a strategy is profitable, but it is not truly profitable in reality.  This can happen due to overfitting, data snooping, or other biases in the backtesting process.  CPCV helps to reduce the probability of false discoveries by providing a more robust and reliable estimate of the strategy's true performance.`), /* @__PURE__ */ React.createElement(H3, null, "Technical Overview \u2014 synthesis"), /* @__PURE__ */ React.createElement(P, null, `Backtesting is a cornerstone of quantitative finance \u2014 the bridge between a hypothesis about market behaviour and a capital allocation against that hypothesis. What this chapter insists on is that the bridge is structural only if the evaluation itself is structural. A single equity curve, however carefully produced, is a single draw from a distribution of possible histories; and because the distribution is wide, a flattering single draw tells us almost nothing about the mean. The progression from WF to purged k-fold CV to CPCV is a progression in how many draws we extract from the same finite dataset, and how honestly we account for the dependencies between them.`), /* @__PURE__ */ React.createElement(P, null, `The intellectual weight of the chapter rests on a single insight: in financial time series, sample labels overlap because they reference future prices, so naive cross-validation leaks information from test into train. Purging removes the overlapping samples; embargoing adds a buffer after the training window to prevent residual leakage from lagged information (earnings announcements, slow information propagation, volatility clustering). With these two fixes in place, k-fold CV is temporally honest \u2014 and CPCV is the combinatorial amplification of that same discipline to extract every distinct, uncorrelated backtest path the data admits.`), /* @__PURE__ */ React.createElement(P, null, `The payoff is both quantitative and qualitative. Quantitatively, CPCV reduces the variance of Sharpe estimates because the mean of \u03C6[N, k] path-Sharpes is a better estimator of the underlying Sharpe than a single path-Sharpe. Qualitatively, it decouples strategy quality from event ordering: a strategy that only works on the actual historical sequence will show a high WF Sharpe but a low CPCV mean Sharpe with a wide spread, while a genuinely robust strategy will deliver a stable Sharpe across most paths. The distribution of path-Sharpes is itself the diagnostic.`), /* @__PURE__ */ React.createElement(P, null, `The cost is computational. CPCV requires training a model on each of the C(N, k) combinatorial training sets, and for large N this grows quickly. The chapter is frank about this \u2014 CPCV is not free, and for datasets with strong time-varying distribution shifts it requires care in choosing N, k, and the embargo length. But the trade is almost always worth making: a backtest that cannot afford CPCV is a backtest that cannot afford to be believed.`), /* @__PURE__ */ React.createElement(H3, null, "Detailed Technical Foundations"), /* @__PURE__ */ React.createElement(H4, null, "Theoretical foundations of backtesting"), /* @__PURE__ */ React.createElement(P, null, `Backtesting rests on the premise that historical data contains statistical structure that will persist, at least partially, into the future. This is a working assumption rather than a theorem: financial markets are non-stationary, and the structure that generated past returns is constantly being eroded by competitors who are also backtesting. What backtesting can legitimately provide is a conditional probabilistic statement \u2014 if the data-generating process remains sufficiently similar, then the strategy's expected performance lies within some confidence interval derived from its historical performance.`), /* @__PURE__ */ React.createElement(P, null, `The mathematical machinery is standard: time-series statistics, bootstrap resampling, combinatorial enumeration, and cross-validated performance estimation. What distinguishes robust backtesting from naive backtesting is a relentless focus on the ways in which the assumptions of these techniques fail on financial data \u2014 overlapping labels, non-IID returns, survivorship in the sample, and the researcher's own iterative contamination of the evidence.`), /* @__PURE__ */ React.createElement(H4, null, "Historical development and precedent approaches"), /* @__PURE__ */ React.createElement(P, null, `Early backtesting was manual and low-dimensional: a handful of rules, a handful of years of daily closes, a pocket calculator. As computing capacity grew, so did the sophistication of the methodology: walk-forward formalised the rolling-window approach in the 1980s and 1990s; Monte Carlo methods and bootstrap techniques arrived alongside cheap CPU cycles; and cross-validation, borrowed from statistics and machine learning, was adapted to financial time series through the late 2000s and 2010s. CPCV, as formalised by Lopez de Prado, is the modern synthesis \u2014 a technique that treats the historical record as a combinatorial object rather than a single timeline.`), /* @__PURE__ */ React.createElement(H4, null, "Fundamental principles and axioms"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of No Look-Ahead Bias:"), " Backtests must be conducted in a way that prevents future information from influencing past decisions. This principle ensures that the strategy is evaluated based on information that would have been available at the time the decisions were made."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Data Integrity:"), " The data used in backtests must be accurate, reliable, and representative of the market conditions being simulated. Data errors or biases can significantly impact the results of the backtest and lead to misleading conclusions."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Principle of Robustness:"), " Backtests should be designed to assess the robustness of a strategy under different market scenarios and parameter settings. This principle ensures that the strategy is not overly sensitive to specific market conditions or parameter choices.")), /* @__PURE__ */ React.createElement(H4, null, "Key terminology"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Backtest Path:"), " A single realization of a backtest, representing a specific sequence of trading decisions and market outcomes. CPCV generates multiple backtest paths to provide a more comprehensive evaluation of a strategy's performance."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Fold:"), " In cross-validation, the data is divided into multiple folds. Each fold is used as the testing set once, while the remaining folds are used for training."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Combinatorial Split:"), " In CPCV, the data is partitioned into groups, and all possible combinations of these groups are used as testing sets. This generates multiple backtest paths, each representing a different combination of training and testing data.")), /* @__PURE__ */ React.createElement(H3, null, "Methodologies and Frameworks"), /* @__PURE__ */ React.createElement(H4, null, "Walk-forward methodology"), /* @__PURE__ */ React.createElement(P, null, `Walk-forward slices the historical data into a sequence of training and testing windows, always with the training window preceding the testing window. The model is fitted on the first training window, evaluated on the immediately-subsequent test window, then the window pair is slid forward and the process repeats until the end of the data is reached. Each trading decision is based only on information that would have been available at the corresponding historical time, so WF respects the arrow of time by construction. The price of that discipline is that WF produces exactly one backtest path and offers no hedge against sequence bias \u2014 the specific order of market regimes in the historical sample drives the result as much as strategy quality does.`), /* @__PURE__ */ React.createElement(H4, null, "Cross-validation methodology"), /* @__PURE__ */ React.createElement(P, null, `k-fold cross-validation partitions the data into k roughly equal folds and runs k experiments, each with one fold held out as the test set and the remaining k\u22121 folds used for training. The concatenation of out-of-sample predictions across the k experiments yields a single coverage of the whole dataset. CV is more robust than WF on IID data because it evaluates the model under more varied training conditions; on financial time series, however, naive CV leaks future information into the training set through overlapping labels and lagged dependencies. Purging and embargoing are the fixes that make CV temporally honest.`), /* @__PURE__ */ React.createElement(H4, null, "Combinatorial Purged Cross-Validation (CPCV) methodology"), /* @__PURE__ */ React.createElement(P, null, `CPCV combines combinatorics with purged cross-validation. Partition the T observations into N contiguous groups without shuffling. Choose k of those N groups as the test set and use the remaining N\u2212k as the training set, purging any training samples whose labels overlap the test window and embargoing a configurable number of samples immediately after the training window. Enumerate every C(N, k) way of choosing the test-group subset; each enumeration produces one trained model and one test-set forecast. By systematically recombining these test-set forecasts, CPCV assembles \u03C6[N, k] distinct backtest paths \u2014 each a legitimate, non-redundant traversal of the historical dataset.`), /* @__PURE__ */ React.createElement(H4, null, "Comparative analysis of methodologies"), /* @__PURE__ */ React.createElement(P, null, `Walk-forward is cheap, simple, and temporally honest \u2014 the right first instrument, but a poor final one. Purged k-fold CV with embargoing is robust across varied market conditions and is a defensible default for single-hypothesis evaluation, but it still gives one concatenated out-of-sample path. CPCV is the most expensive and the most informative: it produces a distribution of backtest paths whose variance is itself a diagnostic for overfitting, and its mean is a materially better estimate of a strategy's expected Sharpe than any single-path estimate. The choice is not binary \u2014 WF, purged CV, and CPCV complement each other \u2014 but CPCV is the tool to reach for when a claim of genuine edge must survive adversarial scrutiny.`), /* @__PURE__ */ React.createElement(H4, null, "Workflow \u2014 CPCV implementation"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Data Partitioning:"), " Divide the T observations into N groups without shuffling."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Combinatorial Splits:"), " Generate all possible combinations of k groups for testing and N\u2212k groups for training."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Purging and Embargo:"), " Apply purging and embargoing to prevent data leakage."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Model Training and Forecasting:"), " Train the model on each training set and generate forecasts for the corresponding testing set."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Backtest Path Generation:"), " Combine the forecasts from different testing sets to create \u03C6[N, k] backtest paths."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Performance Evaluation:"), " Calculate performance metrics for each path.")), /* @__PURE__ */ React.createElement(H4, null, "Strengths, limitations, and boundary conditions"), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Walk-Forward:"), " Strengths: simple, historical perspective. Limitations: overfitting to the single path, sequence bias."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Cross-Validation:"), " Strengths: robustness across varied scenarios. Limitations: does not simulate historical performance, vulnerable to data leakage without purging."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "CPCV:"), " Strengths: multiple uncorrelated paths, reduced variance of performance estimates, direct mitigation of overfitting and sequence bias. Limitations: computational complexity, sensitivity to the choice of N and k.")), /* @__PURE__ */ React.createElement(Ch12Vis2, null), /* @__PURE__ */ React.createElement(Cap, null, `Number of distinct backtest paths \u03C6[N, k] generated by CPCV as N grows, holding k = 2. Ten groups already yield 45 paths; sixteen groups yield 120. The curve is the combinatorial engine behind CPCV's variance reduction \u2014 every additional group expands the space of legitimate counterfactual histories available from the same underlying data.`), /* @__PURE__ */ React.createElement(H3, null, "Algorithmic and System Design"), /* @__PURE__ */ React.createElement(P, null, `The CPCV algorithm is mechanical once N, k, and the purging/embargo parameters are fixed. Enumerate the C(N, k) subsets of test groups. For each subset, construct the training set as the complement, applying purging (dropping any training sample whose label horizon overlaps the test window) and embargoing (dropping a configurable number of samples immediately after the training window). Train the model, generate predictions over the test groups, and record them. Finally, walk across the enumeration and assemble the predictions into \u03C6[N, k] backtest paths such that each path traverses every group exactly once and no two paths repeat the same train/test assignment at any group.`), /* @__PURE__ */ React.createElement(P, null, `Time complexity is dominated by model training: with C(N, k) combinations and O(M) cost per training, total training cost is O(C(N, k) \xB7 M). Space complexity is dominated by storing the forecasts, at O(T) per path times \u03C6[N, k] paths. For realistic sizes (N = 10, k = 2) this is modest; for very large N or models with expensive training, parallelisation across combinations is the obvious scaling strategy \u2014 each combination is independent.`), /* @__PURE__ */ React.createElement(P, null, `A production CPCV system separates five orthogonal components: a data-management layer providing point-in-time-correct labels and features with horizon metadata; a combinatorial-split generator that enumerates subsets and applies purging/embargo; a training harness that fans out model fits across combinations; a forecast-assembly module that recombines predictions into backtest paths; and a performance-evaluation layer that computes the distribution of path-level metrics. Modular separation lets each component be tested and swapped independently, and lets the expensive training stage run on a distributed cluster while the cheaper assembly stage runs on a single node.`), /* @__PURE__ */ React.createElement(P, null, `Edge cases demand attention. Small datasets produce too few groups for meaningful combinatorics \u2014 under N = 6 the variance reduction is marginal. Highly-correlated data (long label horizons, slow-moving features) can leave many samples purged, shrinking the effective training set; in extreme cases, the purging and embargo between a given train-test split can erase most of the training data, and the algorithm must detect and report this rather than silently fit a degenerate model.`), /* @__PURE__ */ React.createElement(H3, null, "Implementation Considerations"), /* @__PURE__ */ React.createElement(P, null, `Resource requirements scale with the combinatorial count and the cost of a single model fit. CPCV with N = 10, k = 2 requires forty-five model fits; with N = 16, k = 2 it requires one hundred and twenty. For expensive models (deep networks, gradient-boosted trees with large numbers of estimators) this can dominate a research workflow, and parallelisation across combinations \u2014 each of which is independent \u2014 is es
