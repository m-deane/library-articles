ime to expiry, and with the risk-free rate. The same structure reappears everywhere. Pipelines and tankers hold <strong>location-spread options</strong>, profitable to exercise when the Gulf\u2013Rotterdam or Cushing\u2013LLS differential exceeds the cost of moving a barrel. Storage tanks hold <strong>calendar-spread options</strong>: fill when the forward price less carry exceeds prompt, empty when the curve inverts. A refinery is a bundle of <strong>crack-spread options</strong> \u2014 gasoline and distillate against crude, net of processing costs \u2014 that the operator runs harder or softer depending on which outputs are in the money. Nothing in the physical plant changes; the trader simply relabels each asset by its payoff.`), /* @__PURE__ */ React.createElement(RealOptionsTriptych, null), /* @__PURE__ */ React.createElement(Cap, null, `Three real options that make up the oil chain. Axes and payoff levels are schematic; the point is the functional form, not the magnitudes.`), /* @__PURE__ */ React.createElement(P, null, `For this lens to work, "price" has to mean something precise, and here Bouchouev inverts a textbook assumption. In most derivatives courses the futures contract is a derivative of the spot. In oil, he argues, the relationship <em>runs the other way</em>: because there is no universal, continuously-clearing spot market for a barrel of crude, physical deals are struck at the <strong>prompt futures price plus or minus a basis</strong> for location, grade and timing. The nearest-to-expire contract is the anchor; the "spot" is a derived quantity. That is why an option-on-production is really written on the front of the futures curve, and why the shape of that curve \u2014 contango versus backwardation \u2014 determines whether storage is a live option or a dead one.`), /* @__PURE__ */ React.createElement(P, null, `The last piece is why these options are worth anything at all. The modern oil ecosystem is, as the book puts it, <strong>just-in-time</strong>: inventories, shipping, refining runs and even spare capacity have been optimised to a thin margin. That optimisation is precisely what makes the system unstable. A hurricane, a pipeline outage, an OPEC surprise \u2014 any of them can drive prices through strike levels that looked safely out of the money a week earlier. In option-pricing terms, low systemic slack implies high realised volatility, which is exactly the input that gives real options their premium. Flexibility has value because the underlying refuses to sit still.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Why this framing earns its keep" }, `The real-options lens is useful to a quant trader not as philosophy but as bookkeeping. Once production, transport, storage and refining are all written as payoffs on observable futures prices, the hedging problem collapses into something familiar: <strong>price the option, delta-hedge it in the liquid contract, manage the residual</strong>. Everything that follows in the book \u2014 inventories, the volatility risk premium, spread-option models \u2014 is an attempt to do that pricing carefully.`), /* @__PURE__ */ React.createElement(P, null, `Keynes's <em>own rate of interest</em> \u2014 the yield on lending a commodity in terms of itself \u2014 gets a brief but load-bearing mention. It is the quantity that ties the storage option to the rest of the curve: a high own rate signals scarcity; a negative one pays storage operators to carry oil forward. The point of Chapter 1 is to install the habit of seeing every barrel \u2014 in the ground, in a tank, halfway through a cracker \u2014 as an option waiting to be priced.`)), /* @__PURE__ */ React.createElement(Sec, { n: "2", title: "Inventories, Futures, and the Financialization Turn" }, /* @__PURE__ */ React.createElement(P, null, `Oil has no single "spot" price in the way equities have a last trade. The quoted front-month WTI figure that scrolls across screens is really the prompt futures contract \u2014 a derivative that happens to settle physically at Cushing, Oklahoma. Everything downstream of that number, from the refiner's crack spread to the hedger's swap, is anchored to an instrument whose value is jointly determined by barrels sitting in tanks and by the flows of capital from investors who never intend to take delivery. The book's second chapter is, at heart, an argument that you cannot understand oil prices without holding both lenses at once.`), /* @__PURE__ */ React.createElement(P, null, `The first lens is the <em>theory of storage</em>. A barrel held today is a claim on a barrel tomorrow, minus the cost of tank rental, insurance, and financing, plus a harder-to-measure quantity called the <em>convenience yield</em> \u2014 the non-pecuniary benefit of having the physical molecule on hand to absorb a supply shock or meet an unexpected demand surge. When inventories are comfortable, convenience yield is low and the futures curve slopes upward in <em>contango</em>: the market literally pays you to store, because F &gt; S + c opens a cash-and-carry arbitrage that physical players close until it disappears. When inventories tighten toward the zero-inventory boundary, convenience yield rises <strong>nonlinearly</strong> \u2014 the mere possibility of a stock-out, long before it actually occurs, bids the spot price above deferred futures and flips the curve into <em>backwardation</em>.`), /* @__PURE__ */ React.createElement(CurveShapeChart, null), /* @__PURE__ */ React.createElement(Cap, null, `Schematic WTI forward curves under two inventory regimes. Illustrative prices only; shapes reflect the theory-of-storage logic discussed in Ch. 2, not any specific trading day.`), /* @__PURE__ */ React.createElement(P, null, `This is why Bouchouev treats inventory as the state variable that matters. Its dynamics are trivial as accounting \u2014 <code>dx = (S - D) dt</code> \u2014 but the <em>boundaries</em> are where the nonlinearity lives. A barrel-level model with a minimum operating capacity (pipeline line-fill, refinery working stock) and a maximum (tank-tops) produces a convenience yield that looks nearly flat through the middle of the distribution and hockey-sticks near the walls. The curve shape is a noisy, delayed readout of where inventories sit between those two hard limits. Cushing's role is outsized here: as the delivery point for WTI, it is the one location in the world where a financial futures price is legally tethered to a finite number of tanks.`), /* @__PURE__ */ React.createElement(ContangoBackwardationDiag, null), /* @__PURE__ */ React.createElement(Cap, null, `Conceptual diagram \u2014 theory of storage. Left: abundant inventory creates a carry arbitrage that flattens F into contango. Right: scarcity loads convenience yield onto S, inverting the curve.`), /* @__PURE__ */ React.createElement(P, null, `The second lens is <em>financialization</em>. Starting with Keynes's notion of <em>normal backwardation</em>, the chapter develops the idea that futures prices are not neutral forecasts of future spot \u2014 they embed a <strong>risk premium</strong> paid by hedgers to speculators who agree to warehouse price risk. Producers, with longer planning horizons and concentrated exposure, have a stronger hedging motive than consumers; that asymmetric <em>hedging pressure</em> pushes futures below expected spot and leaves a return on the table for anyone willing to be long the curve. Once that premium was identified, capital arrived: pension funds, endowments, and retail allocators piled into long-only futures exposure as a "fourth asset class", mechanically rolling front-month contracts forward month after month.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "What financial flows do to the curve" }, `Persistent long-only demand for front-month exposure, when rolled mechanically, sells the expiring contract and buys the next one. In a well-supplied market this roll pressure can deepen contango beyond what storage costs alone would justify, handing a negative roll yield to index investors and a positive carry to whoever takes the other side \u2014 physical traders with real tank space. The curve ceases to be a pure storage signal and becomes a joint artifact of physical economics and financial positioning.`), /* @__PURE__ */ React.createElement(P, null, `The chapter's punchline \u2014 developed fully in its treatment of the April 2020 negative-price event \u2014 is that when inventories approach tank-tops <em>and</em> financial flows are pinned to the front month, the two lenses stop being independent. Storage boundaries that were comfortable abstractions become binding constraints on contract holders who cannot physically receive barrels. The risk premium that looked like free money in calm markets inverts violently. For the quant trader, this means a forward curve is never just a curve: it is a mixture distribution over physical states of the world and the positioning of everyone else trading the same contract.`)), /* @__PURE__ */ React.createElement(Sec, { n: "3", title: "Oil in the Macro Tapestry" }, /* @__PURE__ */ React.createElement(P, null, `Oil stopped being only an energy commodity somewhere between the 1973 embargo and the 2000s pension-fund rush into real assets. Bouchouev's third chapter reframes crude as a node in the macro graph \u2014 with edges running into inflation, the dollar, real rates, and the risk budgets of investors who never intend to take delivery of a barrel. The stylized fact is blunt: every time annual WTI has run more than fifty percent above its three-year average, a US recession has tended to follow. The 1970s shocks, 2001, and 2008 all fit the template. COVID-19 broke it, with oil collapsing <em>into</em> the recession rather than causing one \u2014 a reminder that the causal direction is never clean.`), /* @__PURE__ */ React.createElement(H3, null, "Inflation mechanics, direct and indirect"), /* @__PURE__ */ React.createElement(P, null, `The inflation channel runs through two pipes. The <strong>direct</strong> pipe is mechanical: retail gasoline sits inside the CPI basket, so a WTI move shows up in the headline print within weeks. The <strong>indirect</strong> pipe is slower \u2014 oil is an input cost across manufacturing, freight, and petrochemicals, and sustained price pressure filters into goods prices and wage expectations. The surprising relationship Bouchouev highlights is between WTI futures <em>levels</em> and the 5y5y forward breakeven rate derived from TIPS. Linking the level of a commodity to the rate of change of a price index is statistically unusual, but the co-movement is tight and self-reinforcing: cross-asset arbitrageurs who believe the relationship exists trade it, which tightens it further. Perception becomes mechanism.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Oil as an inflation hedge" }, `The book argues oil has historically outperformed gold and real estate as a hedge against <em>unexpected</em> inflation jumps. That attribute \u2014 not expected return \u2014 is what pension funds buy when they add crude to a multi-asset portfolio.`), /* @__PURE__ */ React.createElement(H3, null, "The dollar, real rates, and the DXY connection"), /* @__PURE__ */ React.createElement(P, null, `Oil is priced in dollars, so a stronger DXY mechanically lowers the non-US purchasing power of crude and drags prices lower; a weaker dollar does the opposite. The stylized rolling correlation below oscillates through regimes rather than sitting at a single value \u2014 tightly negative in strong-dollar hiking cycles, turning positive in "risk-on" windows where both oil and the dollar respond to the same growth signal. A parallel, weaker relationship runs against 10-year real rates: rising real yields compress long-duration real assets and often pull crude with them.`), /* @__PURE__ */ React.createElement(OilDXYCorrChart, null), /* @__PURE__ */ React.createElement(Cap, null, `Figure: schematic 24-month rolling correlation between WTI and two macro factors (DXY, 10y real rate). Illustrative only \u2014 shape intended to convey regime-switching behaviour discussed in Chapter 3, not a specific historical window.`), /* @__PURE__ */ React.createElement(H3, null, "Risk parity, CTAs, and the financialization turn"), /* @__PURE__ */ React.createElement(P, null, `The chapter's most consequential claim is that a new class of buyer rewired the futures curve. <strong>Risk parity</strong> funds \u2014 Bridgewater's All Weather is the canonical example \u2014 equalize risk contributions across asset classes rather than weighting by market cap. That approach demands leveraged bond exposure, which in turn demands an inflation hedge to offset the duration risk. Oil, being liquid and inflation-sensitive, absorbed a large share of that flow. Alongside them, <strong>Commodity Trading Advisors</strong> and systematic trend-followers \u2014 Winton is cited as representative \u2014 run momentum, carry, and value signals across futures. These strategies don't forecast fundamentals; they respond to price, and when enough capital trades the same signals the flows themselves become part of price formation.`), /* @__PURE__ */ React.createElement(Callout, { type: "warn", title: "What financialization did to the curve" }, `Structural demand from inflation hedgers tilted oil into <em>normal contango</em> with a negative risk premium. Systematically buying and rolling long futures became a losing trade on average; the counterparty \u2014 the storage owner earning the negative roll yield \u2014 became the structural winner.`), /* @__PURE__ */ React.createElement(P, null, `For the quant on a multi-asset desk, the implication is concrete: oil is no longer a standalone bet on supply-demand balance. Its beta to the dollar, its loading on inflation surprises, and the footprint of systematic flow all enter the risk model alongside inventories and OPEC. The "virtual barrel" of the book's title is, in part, this one \u2014 the barrel that exists only in a risk-parity sleeve or a CTA signal file, and yet still moves the price of the physical one.`)), /* @__PURE__ */ React.createElement(Sec, { n: "4", title: "Spreads and Statistical Arbitrage" }, /* @__PURE__ */ React.createElement(P, null, `Spread trading is the quant's native idiom in oil. Rather than betting on the absolute level of crude, a spread trader takes offsetting positions in two related instruments and earns the <em>difference</em>. The move collapses the dominant risk factor \u2014 flat price \u2014 and isolates a narrower, more structural question: is WTI rich to Brent, is the front month rich to the second, is the refiner's margin too thin to sustain utilisation? Chapter 4 of Bouchouev catalogues four families that recur on every oil desk: <strong>calendar spreads</strong>, <strong>locational spreads</strong>, <strong>quality spreads</strong>, and <strong>crack spreads</strong>.`), /* @__PURE__ */ React.createElement(P, null, `Calendar spreads trade the price difference between two futures contracts on the same commodity but with different expiries \u2014 most often the first- and second-nearest maturity. Their fair value is anchored by the <strong>theory of storage</strong>: in contango, the deferred leg should exceed the prompt by roughly the cost of carry; in backwardation, a positive convenience yield pulls the curve the other way. A trader short the calendar is betting the curve flattens toward backwardation; a long position bets the opposite. Locational spreads \u2014 the canonical <strong>WTI\u2013Brent</strong> example \u2014 capture transportation and regional supply\u2013demand imbalances between Cushing and the North Sea, and respond to pipeline capacity, waterborne arbitrage, and geopolitics.`), /* @__PURE__ */ React.createElement(P, null, `Quality spreads price the discount between heavier/sourer grades and lighter/sweeter benchmarks, compensating for differential refining yields. The <strong>WCS\u2013WTI</strong> spread in Bouchouev's exposition is the textbook case: adequate pipeline takeaway is what enforces mean reversion; when capacity is rationed, the spread jumps and the statistical relationship breaks. Crack spreads \u2014 the <code>3-2-1</code> (three barrels crude \u2192 two gasoline, one heating oil) and the <code>5-3-2</code> \u2014 represent the theoretical refining margin and are the cleanest read on refinery profitability.`), /* @__PURE__ */ React.createElement(CrackSpreadChart, null), /* @__PURE__ */ React.createElement(Cap, null, `Figure 4.1 \u2014 Stylized 3-2-1 crack spread over 24 months, with long-run mean and \xB11\u03C3 bands. Schematic data for illustration only.`), /* @__PURE__ */ React.createElement(P, null, `The statistical backbone of all four spread families is <strong>mean reversion</strong>, formalised through <strong>cointegration</strong>. Two non-stationary price series (WTI and Brent, gasoline and heating oil) are cointegrated when a linear combination of them is stationary \u2014 the spread itself has a stable long-run mean even if each leg wanders. The Engle\u2013Granger two-step is the workhorse diagnostic: regress one leg on the other, run an ADF test on the residuals, and if you reject a unit root you have an equilibrium to trade around. Trading rules follow mechanically \u2014 enter when the spread exceeds <code>\xB1k\u03C3</code> from its conditional mean, exit on reversion.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Static vs dynamic hedge ratios" }, `A fixed OLS beta is a fair first pass, but production assets, pipeline regimes and refining slates all drift. Practitioners therefore prefer a <strong>Kalman filter</strong> to let the hedge ratio evolve as a latent state, updating each period from the prior and the new observation. The filter answers "what is today's cointegrating \u03B2?" rather than "what was the \u03B2 over the last 500 days?" \u2014 and small misweights on the hedge leg are the single biggest source of stat-arb bleed.`), /* @__PURE__ */ React.createElement(P, null, `Why are spreads the quant's preferred vehicle? Because killing the directional factor collapses volatility and lifts Sharpe. A spread trade is, by construction, close to market-neutral: simultaneous long and short legs in related instruments hedge out the shared oil-price driver, leaving a residual whose variance is typically a fraction of either leg's. The trade-off, Bouchouev stresses, is <strong>negative skewness</strong> \u2014 stat-arb tends to earn small, steady P&amp;L while carrying rare but painful tail losses when the cointegrating relationship breaks (pipeline outage, refinery fire, sanctions shock). Short-vol in distribution, it demands hard position limits and an explicit view on when mean reversion is <em>not</em> going to save you.`), /* @__PURE__ */ React.createElement(NB, { title: "01_spread_cointegration.py", n: 1 }, `import numpy as np
import pandas as pd
from statsmodels.tsa.stattools import coint, adfuller

# Synthetic cointegrated pair: WTI and Brent (stylized)
rng = np.random.default_rng(42)
n = 750
common = np.cumsum(rng.normal(0, 1.0, n))         # shared oil factor
wti    = 70 + 1.00 * common + rng.normal(0, 0.5, n)
brent  = 73 + 1.02 * common + rng.normal(0, 0.5, n)  # cointegrated w/ WTI

df = pd.DataFrame({"WTI": wti, "Brent": brent})

# Engle-Granger: p-value on the residual unit-root test
t_stat, p_value, crit = coint(df["WTI"], df["Brent"])

# Static hedge ratio via OLS (beta of Brent on WTI)
beta = np.polyfit(df["WTI"], df["Brent"], 1)[0]
spread = df["Brent"] - beta * df["WTI"]
adf_p  = adfuller(spread)[1]

print(f"Engle-Granger t = {t_stat:.3f}, p = {p_value:.4f}")
print(f"Hedge ratio beta = {beta:.3f}")
print(f"Spread mean = {spread.mean():.3f}, sd = {spread.std():.3f}")
print(f"ADF p-value on spread = {adf_p:.4f}")

# Illustrative output:
# Engle-Granger t = -6.214, p = 0.0000
# Hedge ratio beta = 1.018
# Spread mean = 2.947, sd = 0.702
# ADF p-value on spread = 0.0001
# -> reject unit root: WTI & Brent are cointegrated; spread is stationary.`)), /* @__PURE__ */ React.createElement(Sec, { n: "5", title: "Cross-Asset Arbitrage and Macro Overlays" }, /* @__PURE__ */ React.createElement(P, null, `If chapter 4's spreads were the plumbing, chapter 5 is the wiring diagram that connects oil to the rest of the financial system. The book organises advanced trading around four axes: <strong>locational</strong> (price differentials between physical hubs), <strong>calendar</strong> (differentials across contract months), <strong>quality/substitute</strong> (crude grades, refined products, and cross-fuel switches), and <strong>cross-asset macro</strong> (oil positioning overlaid on rates, FX, equities, and inflation). A quant desk rarely picks one; the craft is stacking them so that the idiosyncratic noise in any single axis is diversified away while the macro thesis remains.`), /* @__PURE__ */ React.createElement(ArbMapDiag, null), /* @__PURE__ */ React.createElement(Cap, null, `The four arbitrage axes synthesised from Chapter 5. Each quadrant lists one canonical pair and the dominant payoff driver. Labels are schematic \u2014 actual spread economics depend on hub-specific logistics, refinery configurations, and prevailing macro regime.`), /* @__PURE__ */ React.createElement(P, null, `The workhorse of the cross-asset quadrant is a <strong>cointegration trade between oil futures and an equity proxy</strong> for producers \u2014 in the book's worked example, the XOP ETF. Oil prices and oil-equity baskets are both non-stationary on their own, yet a linear combination of them often is: shocks deviate, then converge. The Johansen and Augmented Dickey\u2013Fuller tests confirm whether that convergence is real or spurious, and a rolling regression estimates the <em>hedging ratio</em> \u2014 how many units of XOP to short for each barrel of long WTI exposure. When the spread blows through a historical band, you fade it.`), /* @__PURE__ */ React.createElement(P, null, `Two traps make this harder than it looks. First, <strong>overfitting</strong>: the "customised basket" refinement \u2014 swapping the generic ETF for hand-picked producers \u2014 adds degrees of freedom faster than it adds signal, and the book explicitly flags this as where promising in-sample results most often fail out-of-sample. Second, <strong>look-ahead bias</strong>: equity settlement prints land after the oil futures close, so a na\xEFve same-day regression silently peeks at the future. The remedy is to lag the equity factor by one session or use synchronous intraday snapshots \u2014 a small change that typically flattens backtest Sharpe ratios by a visible amount.`), /* @__PURE__ */ React.createElement(Callout, { type: "warn", title: "When the hedging ratio lies" }, `Producers hedge. A company running a heavy forward-sold book has a dampened beta to spot oil, and a static hedging ratio will systematically over-weight it in your basket. The book's most advanced variant scrapes producer-level hedge disclosures from regulatory filings and SDR data to build a <em>hedge-adjusted</em> basket. It is painful to assemble and the data is often stale, but it is the only way to stop hedged and un-hedged names from being mispriced against each other inside the same factor.`), /* @__PURE__ */ React.createElement(P, null, `The macro overlay generalises this. A <strong>three-factor fair-value model</strong> for WTI regresses oil on <code>USDCAD</code> (a crude-sensitive FX cross), <code>XOP</code> (the equity channel), and <code>CPI swaps</code> (inflation expectations), with rolling betas to let the loadings breathe as regimes change. When market price diverges from model fair value beyond a chosen band, the desk tilts. The book dates the modern relevance of this approach to <strong>2016, when the US lifted its crude export ban</strong> and WTI stopped being a landlocked benchmark \u2014 its sensitivity to global FX and equity flows stepped up sharply, and macro-based strategies became tradable in size rather than curiosities.`), /* @__PURE__ */ React.createElement(P, null, `The quality/substitute axis brings one more overlay: <strong>pass-through</strong>. RBOB gasoline futures feed into pump prices with a lag, and pump prices feed into CPI with another lag. Because futures trade electronically in milliseconds while CPI swaps clear OTC in minutes, the same information reaches the two markets at different speeds \u2014 a <em>market-speed discrepancy</em> the book frames as one of the cleanest macro-adjacent trades available. The arbitrage is not risk-free; incomplete pass-through, base effects in year-on-year CPI, and regulatory changes to retail pricing all blunt the signal. But the structural lag is persistent, and stacking it on top of a cointegration book turns two mediocre Sharpes into one respectable one.`)), /* @__PURE__ */ React.createElement(PQ, null, `The modern oil ecosystem has been optimised to a thin margin, and that optimisation is exactly what makes it unstable. Low slack implies high realised volatility \u2014 which is the input that gives every real option, every spread, and every vol surface in this book its premium.`), /* @__PURE__ */ React.createElement(Sec, { n: "6", title: "The Volatility Risk Premium" }, /* @__PURE__ */ React.createElement(P, null, `If the futures curve is where directional views get expressed, the options surface is where fear is priced. The Volatility Risk Premium (VRP) is the single most durable stylised fact that quantitative oil desks build their books around: implied volatility, backed out of traded option prices, systematically exceeds the volatility that the underlying actually realises over the life of the option. That wedge is not a mispricing \u2014 it is a payment. End-users, producers, and asset managers are willing to overpay for protection against large, unpredictable moves, and someone has to warehouse that tail. The option seller is that someone, and the VRP is the coupon they earn for standing between the crowd and the worst case.`), /* @__PURE__ */ React.createElement(P, null, `Mechanically, the strategy is unglamorous. Sell an option \u2014 most simply a short-dated ATM straddle \u2014 and delta-hedge it continuously against the futures. If realised volatility over the life of the trade comes in below the implied level at which the option was sold, the hedged position makes money; if it comes in above, it loses. Aggregated across thousands of trades, oil options have historically paid a positive premium, and for most of the 2000s a naive "sell vol and hedge" programme was a reliable source of return. But the book is emphatic that this free lunch has thinned. As the structural futures risk premium compressed and US shale producers industrialised their hedging \u2014 particularly via three-way collars, which dump short-gamma supply onto the street \u2014 outright VRP harvesting became crowded, noisier, and more prone to ugly drawdowns.`), /* @__PURE__ */ React.createElement(IVRVChart, null), /* @__PURE__ */ React.createElement(Cap, null, `Schematic: 24 months of stylised monthly IV vs RV in a front-month oil option, with the orange area tracing the VRP (IV minus RV). In calm regimes the premium is a steady positive ribbon; around month 10 a stress event inverts the gap \u2014 realised blows through implied and the VRP goes negative. Numbers are illustrative, not historical.`), /* @__PURE__ */ React.createElement(H3, null, "The pure-play vehicle: variance swaps"), /* @__PURE__ */ React.createElement(P, null, `Vanilla options are a noisy way to express a view on volatility because their vega changes with spot and with time. Variance swaps strip that problem out. A variance swap pays the realised variance of log-returns over a defined window against a fixed variance strike, scaled by a variance notional. There are no greeks to manage, no delta to hedge, no moneyness drift \u2014 the payoff is a direct bet on whether realised vol lands above or below the strike. For the VRP harvester, shorting variance is the cleanest expression of the trade: one ticket, one number, one window.`), /* @__PURE__ */ React.createElement(NB, { title: "02_variance_swap_payoff.py", n: 2 }, `import numpy as np
import pandas as pd

# Daily closes for the variance window (e.g. 21 trading days)
prices = pd.Series([
    78.20, 77.85, 78.60, 79.10, 78.40, 77.95, 78.70, 79.30, 79.80, 80.20,
    79.55, 78.90, 78.25, 77.60, 78.10, 78.85, 79.40, 79.15, 78.70, 78.30,
    77.95, 78.50,
])

log_rets = np.log(prices / prices.shift(1)).dropna()
n_days   = len(log_rets)
ann      = 252

realized_var = (log_rets ** 2).sum() * (ann / n_days)   # annualised realised variance
realized_vol = np.sqrt(realized_var) * 100              # in vol points

K_var        = 32.0 ** 2        # strike variance (K_vol = 32 vol pts)
N_vega       = 10_000.0         # $ vega notional
var_notional = N_vega / (2 * np.sqrt(K_var))

pnl = var_notional * (realized_var * 10_000 - K_var)    # vol pts squared
print(f"Realized vol : {realized_vol:5.2f} vol pts")
print(f"Strike vol   : {np.sqrt(K_var):5.2f} vol pts")
print(f"Short-var PnL: {-pnl:,.0f} USD")`), /* @__PURE__ */ React.createElement(H3, null, "Relative value on the surface"), /* @__PURE__ */ React.createElement(P, null, `As outright VRP compressed, desks migrated from harvesting the <em>level</em> of vol to trading its <em>shape</em>. The chapters flag three relative-value axes. <strong>Calendar</strong>: sell short-dated ATM vol, buy longer-dated ATM vol, financing the decay of the front month against the slower bleed of the back. <strong>Skew</strong>: the VRP smile is asymmetric \u2014 OTM puts carry a fatter premium than OTM calls because the demand for downside protection is structurally one-sided; ratio spreads and risk-reversals monetise the asymmetry. <strong>Term structure</strong>: the VRP itself has a term structure, and kinks in it \u2014 often driven by OPEC meetings or EIA release windows \u2014 become tradeable calendars on variance swaps. None of this works without a calibrated vol model; sticky-moneyness and sticky-strike heuristics are crude enough that they routinely mis-price the hedge and leak the premium back to the market.`), /* @__PURE__ */ React.createElement(H3, null, "Why the premium compresses"), /* @__PURE__ */ React.createElement(P, null, `The VRP is not a constant. It compresses, and sometimes inverts, precisely when the seller can least afford it. Chapter 10 is explicit that the premium narrows in stress regimes \u2014 when realised vol accelerates, when liquidity in the options book evaporates, when macro correlations break and producers lean harder on collars. In those windows the short-vol book takes on the character of a put: slow accrual of carry punctuated by sharp, fat-tailed losses. Disciplined VRP harvesting is therefore less about the entry and more about position sizing, gamma budgeting, and honest backtests that penalise path-dependent blow-ups rather than hiding them behind a smooth Sharpe.`), /* @__PURE__ */ React.createElement(Callout, { type: "warn", title: "The left-tail pays the coupon" }, `Selling variance is, structurally, a bet on normal weeks to finance occasional catastrophes. The book is clear: every VRP programme that ignored left-tail convexity \u2014 through under-hedged short gamma, insufficient stop-out discipline, or over-reliance on a lognormal calibration \u2014 eventually gave back multiple years of carry in a single event. Size the trade so that the worst plausible realised-vol spike survives the book, not the other way round.`)), /* @__PURE__ */ React.createElement(Sec, { n: "7", title: "From Black\u2013Scholes to Quadratic-Normal" }, /* @__PURE__ */ React.createElement(P, null, `The canonical option-pricing story starts in 1973 with Black\u2013Scholes: assume the underlying follows geometric Brownian motion with constant drift and volatility, and a European call prices as <code>C = S N(d\u2081) \u2212 K e^(\u2212rT) N(d\u2082)</code> where <code>d\u2081 = [ln(S/K) + (r + \xBD\u03C3\xB2)T] / (\u03C3\u221AT)</code>. It is an extraordinary result \u2014 one formula, five inputs, zero free parameters once you fix <code>\u03C3</code> \u2014 and it became the lingua franca of derivatives. But oil is not a spot equity. You cannot warehouse a barrel the way you can a share of Apple, and the liquid instrument is the futures contract, not the physical. Fischer Black's 1976 update, <strong>Black-76</strong>, is the obvious adaptation: replace the spot <code>S</code> with the forward <code>F</code> and the option on a futures contract prices as <code>C = e^(\u2212rT)[F N(d\u2081) \u2212 K N(d\u2082)]</code>, with <code>d\u2081 = [ln(F/K) + \xBD\u03C3\xB2T] / (\u03C3\u221AT)</code>. This is the benchmark every oil trader learns first.`), /* @__PURE__ */ React.createElement(P, null, `The two assumptions that break are the ones Black-76 inherits: <em>constant volatility</em> and <em>log-normal prices</em>. Markets disagree on both counts. Plot implied vol against moneyness <code>K/F</code> for a single expiry and you do not get a flat line \u2014 you get a <strong>smile</strong> or, more often in crude, a <strong>skew</strong> where out-of-the-money puts trade richer than calls. The wings are fatter than any log-normal distribution predicts, reflecting the genuine possibility of supply-disruption spikes on the upside and macro-driven crashes on the downside. And the ATM implied vol itself is not invariant to the level of <code>F</code>: the chapter documents a parabolic rather than linear relationship between ATM IV and futures price, sharpening during stress. A single <code>\u03C3</code> cannot do all this work.`), /* @__PURE__ */ React.createElement(P, null, `The first patch is <strong>local volatility</strong>. Let <code>\u03C3</code> be a deterministic function <code>\u03C3(F,t)</code> and solve Dupire's equation <code>\u03C3\xB2(K,T) = (\u2202C/\u2202T) / (\xBD K\xB2 \u2202\xB2C/\u2202K\xB2)</code> to back out the surface that reproduces today's smile exactly. It is a beautiful fit \u2014 by construction \u2014 but static: local vol is a snapshot, not a dynamics, and the smile it predicts for tomorrow is usually wrong. Practitioners add stochastic volatility on top. The workhorse is <strong>SABR</strong>, with <code>dF = \u03B1 F^\u03B2 dW</code>, <code>d\u03B1 = \u03BD \u03B1 dZ</code>, correlation <code>\u03C1</code>. Hagan's asymptotic expansion gives a tractable smile formula and the four parameters <code>(\u03B1, \u03B2, \u03C1, \u03BD)</code> map intuitively to ATM level, backbone, skew, and wing convexity. The price: four parameters per expiry, nontrivial calibration, and corner cases where the expansion breaks down at low strikes.`), /* @__PURE__ */ React.createElement(P, null, `Bouchouev's chapter argues that for oil the more practitioner-friendly destination is the <strong>Quadratic-Normal (QN) model</strong>. Start from Bachelier \u2014 arithmetic Brownian motion, <code>dF = \u03C3_A dW</code>, prices normally distributed \u2014 which already fits oil's <em>parabolic</em> smile shape better than the lognormal Black smile and handles negative prices (an obligation, not an abstraction, since April 2020). Then apply a perturbation around the Bachelier solution using a quadratic function <code>\u03B5(F) = a + b(F \u2212 F\u2080) + c(F \u2212 F\u2080)\xB2</code>. The resulting closed-form price is Bachelier plus correction terms whose <code>a, b, c</code> are linked directly to market observables: the ATM straddle, the costless collar, and the OTM strangle. Skewness and kurtosis each get a parameter; the Greeks stay analytical.`), /* @__PURE__ */ React.createElement(P, null, `Calibration is where the trade-offs bite. Black-76 calibrates in seconds but cannot fit the wings. Local vol fits everything today and predicts nothing tomorrow. SABR captures smile <em>dynamics</em> but requires care to avoid arbitrage and to stabilise <code>\u03B2</code>. QN sits in the middle \u2014 three parameters per expiry, a quadratic that hugs the observed normal smile, closed-form pricing and Greeks, and a parameterisation traders can read straight off quoted structures. For an oil desk pricing vanilla options, APOs, and swaptions against noisy market data, that combination is hard to beat.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Why oil favours normal over log-normal" }, `Log-normal models force a floor at zero and impose a specific shape on the tails. Oil violates both assumptions \u2014 WTI printed \u2212$37 on 20 April 2020, and the empirical smile is closer to parabolic than skew-log-normal. The Bachelier/QN branch drops the zero floor, admits a symmetric-then-perturbed smile, and produces deltas that are actually intuitive: ATM call delta \u2248 +0.5, put \u2248 \u22120.5, without the skewed hedges a Black delta quietly builds in.`), /* @__PURE__ */ React.createElement(VolModelTree, null), /* @__PURE__ */ React.createElement(Cap, null, `Each step inherits the previous framework and patches one broken assumption. Oil desks typically live on the right-hand side \u2014 Bachelier-rooted, perturbation-adjusted, analytical.`)), /* @__PURE__ */ React.createElement(Sec, { n: "8", title: "Spread Options: Kirk, Margrabe, and Beyond" }, /* @__PURE__ */ React.createElement(P, null, `If Chapter 4 established the spread as the oil quant's preferred <em>underlying</em>, Chapters 8 and 9 deal with the harder question: how do you price an <em>option</em> on that spread? The payoff <code>max(F1 \u2212 F2 \u2212 K, 0)</code> hides a two-dimensional problem. Black\u2013Scholes is a one-asset log-normal construction; a spread is the difference of two log-normals, which is <strong>not itself log-normal</strong> and whose density has no elementary form. Every practitioner model is an honest attempt to fake it \u2014 by changing numeraire, matching moments, or abandoning log-normality entirely for the Bachelier world where spreads can go negative.`), /* @__PURE__ */ React.createElement(P, null, `The canonical starting point is <strong>Margrabe (1978)</strong>, the "exchange option". Margrabe's insight was that when the strike is zero \u2014 the right to exchange one asset for another \u2014 a judicious change of numeraire (dividing through by <code>F2</code>) converts the two-asset problem into a one-asset Black\u2013Scholes call on the ratio <code>F1/F2</code>, with volatility <code>\u03C3 = \u221A(\u03C31\xB2 \u2212 2\u03C1\u03C31\u03C32 + \u03C32\xB2)</code>. The formula is exact. But oil life rarely hands you <code>K = 0</code>. Crack-spread options, CSOs, and locational options all carry non-zero strikes, and the moment <code>K \u2260 0</code> the numeraire trick stops working cleanly.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Kirk (1995)</strong> is the practitioner workhorse that patches the gap. Kirk's approximation treats the composite quantity <code>F2 + K</code> as if it were a single log-normal asset, then prices the spread as a Margrabe-style exchange of <code>F1</code> against <code>F2 + K</code>. In practice this means computing an effective forward <code>F_eff = F1/(F2 + K)</code>, an effective volatility that blends \u03C31, \u03C32 and their correlation via the weight <code>w = F2/(F2 + K)</code>, and a single Black\u2013Scholes call on that synthetic underlying with a strike pinned to 1.0. Scale the result back by <code>(F2 + K)</code> and you have a closed-form spread-option price that is fast, differentiable, and accurate to within a few tenths of a percent for moderate strikes and correlations in the <code>[0.3, 0.95]</code> band that dominates crude and product markets.`), /* @__PURE__ */ React.createElement(KirkDiag, null), /* @__PURE__ */ React.createElement(Cap, null, `Figure 8.1 \u2014 Kirk's approximation collapses the two-asset spread problem into a single log-normal call via an effective forward F_eff, effective volatility \u03C3_eff, and a strike rescaled to 1. The rescaling by (F2 + K) at the end recovers the original units.`), /* @__PURE__ */ React.createElement(P, null, `The sensitivities that practitioners actually trade are three: <strong>correlation \u03C1</strong>, the two leg volatilities <strong>\u03C31, \u03C32</strong>, and the <strong>effective volatility \u03C3_eff</strong> of the spread. Correlation is the dominant lever: push \u03C1 toward 1 and \u03C3_eff collapses toward <code>|\u03C31 \u2212 \u03C32 \xB7 w|</code>, crushing the option; push \u03C1 lower and \u03C3_eff expands, inflating premium. A stable WTI\u2013Brent \u03C1 of 0.95 supports thin locational-option vega, but a pipeline disruption that drives \u03C1 to 0.7 can double the fair premium overnight. The individual vols matter asymmetrically: \u03C32 enters weighted by <code>w\xB2</code>, so for deep OTM strikes (large K, small w) the back-leg vol is almost irrelevant and the option behaves like a call on F1 alone.`), /* @__PURE__ */ React.createElement(P, null, `When Kirk strains \u2014 at strikes near zero, at correlations above 0.97, or for deeply dislocated calendar spreads where the lognormal assumption on <code>F2 + K</code> is audibly wrong \u2014 Chapter 8 offers two escape routes. <strong>Bjerksund\u2013Stensland</strong> refines Kirk with a sharper expansion of \u03C3_eff and extends cleanly to negative strikes. <strong>Moment matching</strong> fits a single (possibly shifted) log-normal whose first two moments equal those of the actual spread distribution. And for CSOs where correlations cluster near 1 and the spread can go negative, Bouchouev is emphatic: abandon log-normality and use the <strong>Bachelier model</strong> \u2014 arithmetic Brownian motion with dollar-denominated volatility \u2014 with the <strong>Quadratic-Normal</strong> extension of Chapter 9 picking up the sticky smile.`), /* @__PURE__ */ React.createElement(P, null, `Why do spread options dominate commodity option books? Because the physical economics themselves are spread economics. A refiner's P&amp;L <em>is</em> the crack spread; a storage operator's optionality <em>is</em> a calendar spread; a pipeline's throughput value <em>is</em> a locational spread. Most real hedging demand \u2014 and therefore most of the vega on a commodities desk \u2014 is strike-differenced by construction. Kirk's formula is the closed-form engine that lets a trader quote and delta-hedge that demand at the speed markets require.`), /* @__PURE__ */ React.createElement(Callout, { type: "tip", title: "When Kirk breaks down \u2014 use Margrabe or Bachelier" }, `Kirk's approximation degrades as the strike K approaches zero, because the expansion point (F2 + K) becomes dominated by the stochastic F2 alone and the assumed log-normality of the composite is no longer defensible. At <strong>exactly K = 0</strong>, use <strong>Margrabe (1978)</strong> \u2014 it is exact for exchange options. At <strong>deep negative or at-the-money spreads with correlation &gt; 0.97</strong> (typical for front-vs-second-month CSOs in contango), switch to the <strong>Bachelier model</strong>: arithmetic Brownian motion handles negative spreads without the log-normal contortions, and it is what the commodities options desks quote calendar vol in anyway.`), /* @__PURE__ */ React.createElement(NB, { title: "03_kirk_spread_option.py", n: 3 }, `import numpy as np
from scipy.stats import norm

def kirk_spread_call(F1, F2, K, sigma1, sigma2, rho, T, r=0.0):
    """
    Kirk (1995) approximation for a European spread call:
        payoff = max(F1 - F2 - K, 0)
    Treats (F2 + K) as a single log-normal asset, prices the spread
    as a Margrabe-style exchange of F1 vs (F2 + K).
    """
    if T <= 0:
        return max(F1 - F2 - K, 0.0)
    w = F2 / (F2 + K)                                   # weight on back leg
    sigma_eff = np.sqrt(sigma1**2
                        - 2.0 * rho * sigma1 * sigma2 * w
                        + (sigma2 * w)**2)              # effective vol
    F_eff = F1 / (F2 + K)                               # effective forward
    vol_sqrt_T = sigma_eff * np.sqrt(T)
    d1 = (np.log(F_eff) + 0.5 * vol_sqrt_T**2) / vol_sqrt_T
    d2 = d1 - vol_sqrt_T
    bs_call = F_eff * norm.cdf(d1) - 1.0 * norm.cdf(d2) # BS call, strike = 1
    return np.exp(-r * T) * (F2 + K) * bs_call

if __name__ == "__main__":
    # Illustrative: WTI vs Brent locational spread option, K = 2 USD/bbl
    price = kirk_spread_call(F1=80.0, F2=82.0, K=2.0,
                             sigma1=0.30, sigma2=0.28, rho=0.92,
                             T=0.5, r=0.04)
    print(f"Kirk spread call = {price:.4f} USD/bbl")
    # -> Kirk spread call = 1.1511 USD/bbl`)), /* @__PURE__ */ React.createElement(Sec, { n: "9", title: "Calibration, Smile Dynamics, and Practitioner Pitfalls" }, /* @__PURE__ */ React.createElement(P, null, `The elegance of a stochastic-volatility model on paper collides, without fail, with the grubby reality of listed option quotes. Chapter 10 of the book is insistent on this point: a model that cannot be calibrated cleanly to the market is not a model, it is a hypothesis. The practitioner's first job each morning is to take a strip of ATM and wing quotes across tenors, strip out noise, and fit a surface that is arbitrage-free in strike and smooth in time. <strong>SVI</strong> (Stochastic Volatility Inspired) parameterisations handle the strike dimension with five parameters per slice, enforcing no-butterfly-arbitrage constraints analytically. <strong>SABR</strong> calibrations, the workhorse for commodity desks because of their natural handling of beta and skew, give you a closed-form implied-vol approximation that can be fit tenor-by-tenor to ATM vol, skew, and curvature. In either case the targeting procedure \u2014 minimising the distance between model-implied vols and market-implied vols at a chosen set of pillar strikes \u2014 is where the modelling ends and the craft begins.`), /* @__PURE__ */ React.createElement(H3, null, "Sticky-strike vs sticky-delta"), /* @__PURE__ */ React.createElement(P, null, `Before you can re-price anything tomorrow you must decide how the surface <em>moves</em> when the underlying moves. Under a <strong>sticky-strike</strong> regime the implied vol attached to a given strike is invariant to spot: the curve slides with the market and the vol at ATM rises mechanically as spot falls through it. Under <strong>sticky-delta</strong> (or sticky-moneyness), the curve is anchored to moneyness, so the vol at a fixed strike changes as that strike moves out of or into the money. The distinction is not academic \u2014 it determines your vega hedge ratio and the daily P&amp;L attribution of an option book. Commodity markets frequently flip between the two: sticky-strike in quiet trending markets, sticky-delta in fast-moving regimes around news. Traders who assume one while the market is in the other bleed slowly through their gamma and cannot locate the leak in their P&amp;L explain.`), /* @__PURE__ */ React.createElement(SmileDiag, null), /* @__PURE__ */ React.createElement(Cap, null, `Three canonical shapes of the implied-vol curve. The symmetric smile is typical of liquid at-the-money crude options in calm conditions. The left-skewed smirk emerges in crash-fear regimes when puts get bid. The forward (positive) skew is a commodity signature \u2014 it appears in natural gas and in crude at low prices, where the market prices a higher probability of an upside squeeze than a further collapse.`), /* @__PURE__ */ React.createElement(H3, null, "Market-data pitfalls"), /* @__PURE__ */ React.createElement(P, null, `The quotes you calibrate to are not the quotes you think you have. Deep out-of-the-money wings on distant tenors can be stale for hours at a time; a last-traded price at 10:14 does not reflect the market at 15:58. Bid\u2013ask spreads in illiquid wings can easily be 3\u20135 vol points wide \u2014 illustrative, not fabricated \u2014 and a naive least-squares fit to mid-prices will chase ghosts. The book's chapter-9 discussion of spread-option inputs applies by direct analogy here: garbage data produces confidently wrong Greeks, and confidently wrong Greeks size positions for you.`), /* @__PURE__ */ React.createElement(H3, null, "The regime-shift problem"), /* @__PURE__ */ React.createElement(P, null, `The deepest pitfall is not numerical but epistemic. A model calibrated over a calm six-month window learns that volatility mean-reverts gently, that the skew is mildly negative, that correlation between front and back months is near one. When the regime shifts \u2014 a geopolitical shock, an OPEC-quota surprise, a refinery outage \u2014 every one of those calibrated parameters is wrong at once, and the model's confidence intervals widen precisely when you most need them narrow. Chapter 10 stresses that stochastic-volatility models are only as good as the regime they were fit to, and that rolling re-calibration plus regime-aware stress scenarios are non-negotiable. The working answer is a two-speed process: fast daily re-calibration against today's quotes, and slower weekly scenario runs that re-price the book under prior crisis vol surfaces (1990, 2008, 2014, 2020, 2022) to keep the tail honest.`), /* @__PURE__ */ React.createElement(Callout, { type: "warn", title: "Two pitfalls that will quietly ruin a vol book" }, /* @__PURE__ */ React.createElement("ul", { style: { margin: 0, paddingLeft: 22, fontFamily: F.b, fontSize: 14, lineHeight: 1.7, color: C.text } }, /* @__PURE__ */ React.createElement("li", { style: { marginBottom: 8 } }, /* @__PURE__ */ React.createElement("strong", null, "Over-fitting the wings."), " Allowing SVI or SABR parameters the freedom to track every stale deep-OTM quote produces a surface that prices exotics beautifully today and hedges catastrophically tomorrow. Constrain wing behaviour and penalise day-over-day parameter jumps."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Calibrating in one regime, trading in another."), " A model fit through a quiet summer will understate tail risk when winter stress hits. Refresh calibration windows, overlay regime indicators (realised-vol regime, term-structure slope, VRP sign), and stress-test against at least one prior crisis before sizing into a new trade.")))), /* @__PURE__ */ React.createElement(Sec, { n: "10", title: "Putting It Together: A Decision Grid for Oil Quant Desks" }, /* @__PURE__ */ React.createElement(P, null, `Virtual Barrels is less a cookbook than a field map. Read end-to-end, its ten chapters cluster into seven recurring strategy buckets, each attached to a different slice of the oil ecosystem: the real-options lens on production and storage, the inventory-driven futures curve, the cross-market spread complex, and the volatility surface that sits on top of all of it. The grid below condenses what the book says about each bucket into four questions a desk actually has to answer before sizing a position.`), /* @__PURE__ */ React.createElement(DecisionGrid, null), /* @__PURE__ */ React.createElement(Cap, null, `Decision grid synthesising the book's seven recurring strategy buckets. Works/fails conditions and risk drivers are drawn from Bouchouev's chapter-level framing, not from backtested performance statistics.`), /* @__PURE__ */ React.createElement(H3, null, "How to read the grid"), /* @__PURE__ */ React.createElement(P, null, `Directional outrights and systematic trend strategies (Chapter 3) earn their keep when inventories or macro flows tilt the curve in one direction; they fade in the choppy, range-bound regimes that dominate most of the sample. Calendar spreads (Chapter 2) and inventory-curve plays are close cousins \u2014 both pay off when storage approaches a hard boundary and the convenience yield becomes non-linear, and both decay into noise when tanks are comfortably half-full. Locational spreads (Chapters 4\u20135) are essentially traded pipeline options: the edge lives in logistics bottlenecks and disappears when infrastructure normalises. Crack spreads belong to refiners' real-option set, profitable when product-crude margins diverge from refinery economics and vulnerable to turnaround and feedstock shocks.`), /* @__PURE__ */ React.createElement(P, null, `The volatility-side strategies sit on the other half of the book. VRP harvesting (Chapters 6 and 10) monetises the gap between implied and realised volatility \u2014 a gap that is structurally positive most of the time but can invert violently, as the 2020 episode showed. Spread-option market-making (Chapters 8\u20139) is a correlation trade in disguise: it pays when two-way flow is healthy and correlation structures hold, and it breaks when end-users all hedge in the same direction or correlations decouple. Across every row, the recurring lesson is the same \u2014 the edge is conditional, the risk driver is specific, and the vehicle choice (outright, spread, option, or spread option) is what converts a view into a trade the desk can actually carry.`), /* @__PURE__ */ React.createElement(Callout, { type: "tip", title: "Positioning for the next decade" }, `The book's closing chapters read less like a retrospective and more like a brief for the next regime. Bouchouev flags the financialisation of oil, the entry of inflation hedgers, quant funds, and option traders, and the inherent instability of a just-in-time energy system as the structural backdrop. Quant desks that can model inventory boundaries, calibrate stochastic-volatility smiles, and price spread options under shifting correlations inherit an edge as energy-transition flows, changing liquidity, and ESG-driven reallocations reshape who holds the barrels and who wants to hedge them. The virtual-barrel toolkit is, in that sense, exactly the toolkit the next decade seems likely to reward.`)), /* @__PURE__ */ React.createElement(Sec, { n: "11", title: "Source Integrity Note" }, /* @__PURE__ */ React.createElement(P, null, `This article is a synthesis of Ilia Bouchouev's <em>Virtual Barrels: Quantitative Trading in the Oil Market</em>, built from the library's own chapter-level summaries (Chapters 1\u201310) and the consolidated book summary maintained in <code>library/book_summaries/virtual-barrels-quantitative-trading-in-the-oil-market.md</code>. Every named concept, model, named researcher, and historical anchor used above is drawn from those summaries.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Tier 1 \u2014 traceable to book summaries.</strong> Real-options framings (production, storage, pipelines, refining); spot-from-prompt-futures inversion; Keynes's own rate of interest and normal backwardation; theory of storage; convenience yield; April 2020 negative WTI print; inflation-hedge / TIPS / DXY / real-rate relationships; Bridgewater All Weather and Winton as canonical risk-parity / CTA examples; Cushing as WTI delivery hub; 2016 US crude export ban lift; XOP-based cointegration trades; Engle\u2013Granger, ADF, and Johansen diagnostics; Kalman-filtered hedge ratios; 3-2-1 and 5-3-2 crack spreads; WTI\u2013Brent, WCS\u2013WTI spreads; variance-swap mechanics; VRP compression in stress; Black\u2013Scholes, Black-76, Dupire local volatility, SABR, Bachelier, Quadratic-Normal; Margrabe (1978) and Kirk (1995) spread-option formulas; Bjerksund\u2013Stensland and moment-matching refinements; SVI and SABR calibration; sticky-strike vs sticky-delta.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Tier 2 \u2014 composite or schematic.</strong> All numerical charts (forward-curve shapes, IV/RV series, crack-spread path, WTI\u2013DXY rolling correlation) are stylised illustrations, not historical data; they are labelled as such in their captions. The pull quote between Sections 5 and 6 is a paraphrase of the book's recurring thesis that just-in-time optimisation produces the volatility that prices every option discussed \u2014 it is not a direct quotation from Bouchouev.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Tier 3 \u2014 invented.</strong> None. No researcher, paper, statistic, or quotation outside the book summaries has been introduced.`))));
