function VirtualBarrels() {
  return (
    <div style={{ background: C.bg, minHeight: "100vh" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{background:${C.bg}}`}</style>

      <div style={{ background: C.accent, padding: "12px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <span style={{ fontFamily: F.m, fontSize: 11, color: "#FEF3C7", letterSpacing: "0.1em", textTransform: "uppercase" }}>Technical Encyclopaedic Article</span>
        <span style={{ fontFamily: F.m, fontSize: 11, color: "#FEF3C7" }}>Oil · Real Options · Spreads · Volatility · Spread Options</span>
      </div>

      <div style={{ maxWidth: 820, margin: "0 auto", padding: "60px 24px 0" }}>
        <div style={{ fontFamily: F.m, fontSize: 12, color: C.accent, fontWeight: 600, letterSpacing: "0.08em", marginBottom: 12 }}>QUANTITATIVE OIL TRADING</div>
        <h1 style={{ fontFamily: F.h, fontSize: "clamp(28px,4.5vw,44px)", fontWeight: 700, color: C.text, lineHeight: 1.15, marginBottom: 20 }}>Virtual Barrels: A Quant's Tour of the Oil Market</h1>
        <p style={{ fontFamily: F.b, fontSize: 18, color: C.muted, lineHeight: 1.6, maxWidth: 680, marginBottom: 12 }}>Real options, spreads, volatility risk premium, and spread-option pricing — the mental models that turn physical crude into a tradeable portfolio.</p>
        <div style={{ fontFamily: F.b, fontSize: 13, color: C.light, marginBottom: 40 }}>After Bouchouev's <em>Virtual Barrels</em> · Real Options · Theory of Storage · Kirk &amp; Margrabe · Quadratic-Normal · 2026</div>
        <div style={{ height: 1, background: C.border, marginBottom: 20 }} />
      </div>

      <div style={{ maxWidth: 820, margin: "0 auto", padding: "0 24px 80px" }}>

        <DC>{`The central move of Virtual Barrels is deceptively simple: stop treating crude as a commodity and start treating every physical asset in the oil chain as a bundle of options written on futures prices a trader can already see. Once that translation sticks, production, storage, pipelines, refineries and the financial instruments around them stop being a parade of disconnected businesses and start behaving like a single portfolio of payoffs — each one priceable, hedgeable, and eligible for a line in the risk system.`}</DC>

        <Sec n="1" title="The Real-Options Lens on Oil">
          <P>{`Most introductions to crude oil begin with a map: the basins, the chokepoints, the swing producers. Bouchouev starts somewhere else. His opening move in <em>Virtual Barrels</em> is to argue that every physical asset in the oil chain is really a portfolio of options written on prices the trader can already see in the futures market. Once you accept that translation, the rest of the book follows as a sequence of valuation problems rather than a parade of geopolitical anecdotes.`}</P>

          <P>{`The cleanest case is the producing well. A reservoir is not an obligation to pump; it is the right to pump, period by period, if the prevailing price <code>P</code> exceeds the lifting cost <code>K</code>. That is a call option — <code>max(P - K, 0)</code> — repeated along the field's economic life. The book is explicit that this reframing does more than decorate a DCF: the producer's flexibility to defer extraction when prices collapse has <strong>quantifiable value beyond net present value</strong>, and that value rises with volatility, with time to expiry, and with the risk-free rate. The same structure reappears everywhere. Pipelines and tankers hold <strong>location-spread options</strong>, profitable to exercise when the Gulf–Rotterdam or Cushing–LLS differential exceeds the cost of moving a barrel. Storage tanks hold <strong>calendar-spread options</strong>: fill when the forward price less carry exceeds prompt, empty when the curve inverts. A refinery is a bundle of <strong>crack-spread options</strong> — gasoline and distillate against crude, net of processing costs — that the operator runs harder or softer depending on which outputs are in the money. Nothing in the physical plant changes; the trader simply relabels each asset by its payoff.`}</P>

          <RealOptionsTriptych />
          <Cap>{`Three real options that make up the oil chain. Axes and payoff levels are schematic; the point is the functional form, not the magnitudes.`}</Cap>

          <P>{`For this lens to work, "price" has to mean something precise, and here Bouchouev inverts a textbook assumption. In most derivatives courses the futures contract is a derivative of the spot. In oil, he argues, the relationship <em>runs the other way</em>: because there is no universal, continuously-clearing spot market for a barrel of crude, physical deals are struck at the <strong>prompt futures price plus or minus a basis</strong> for location, grade and timing. The nearest-to-expire contract is the anchor; the "spot" is a derived quantity. That is why an option-on-production is really written on the front of the futures curve, and why the shape of that curve — contango versus backwardation — determines whether storage is a live option or a dead one.`}</P>

          <P>{`The last piece is why these options are worth anything at all. The modern oil ecosystem is, as the book puts it, <strong>just-in-time</strong>: inventories, shipping, refining runs and even spare capacity have been optimised to a thin margin. That optimisation is precisely what makes the system unstable. A hurricane, a pipeline outage, an OPEC surprise — any of them can drive prices through strike levels that looked safely out of the money a week earlier. In option-pricing terms, low systemic slack implies high realised volatility, which is exactly the input that gives real options their premium. Flexibility has value because the underlying refuses to sit still.`}</P>

          <Callout type="info" title="Why this framing earns its keep">{`The real-options lens is useful to a quant trader not as philosophy but as bookkeeping. Once production, transport, storage and refining are all written as payoffs on observable futures prices, the hedging problem collapses into something familiar: <strong>price the option, delta-hedge it in the liquid contract, manage the residual</strong>. Everything that follows in the book — inventories, the volatility risk premium, spread-option models — is an attempt to do that pricing carefully.`}</Callout>

          <P>{`Keynes's <em>own rate of interest</em> — the yield on lending a commodity in terms of itself — gets a brief but load-bearing mention. It is the quantity that ties the storage option to the rest of the curve: a high own rate signals scarcity; a negative one pays storage operators to carry oil forward. The point of Chapter 1 is to install the habit of seeing every barrel — in the ground, in a tank, halfway through a cracker — as an option waiting to be priced.`}</P>
        </Sec>

        <Sec n="2" title="Inventories, Futures, and the Financialization Turn">
          <P>{`Oil has no single "spot" price in the way equities have a last trade. The quoted front-month WTI figure that scrolls across screens is really the prompt futures contract — a derivative that happens to settle physically at Cushing, Oklahoma. Everything downstream of that number, from the refiner's crack spread to the hedger's swap, is anchored to an instrument whose value is jointly determined by barrels sitting in tanks and by the flows of capital from investors who never intend to take delivery. The book's second chapter is, at heart, an argument that you cannot understand oil prices without holding both lenses at once.`}</P>

          <P>{`The first lens is the <em>theory of storage</em>. A barrel held today is a claim on a barrel tomorrow, minus the cost of tank rental, insurance, and financing, plus a harder-to-measure quantity called the <em>convenience yield</em> — the non-pecuniary benefit of having the physical molecule on hand to absorb a supply shock or meet an unexpected demand surge. When inventories are comfortable, convenience yield is low and the futures curve slopes upward in <em>contango</em>: the market literally pays you to store, because F &gt; S + c opens a cash-and-carry arbitrage that physical players close until it disappears. When inventories tighten toward the zero-inventory boundary, convenience yield rises <strong>nonlinearly</strong> — the mere possibility of a stock-out, long before it actually occurs, bids the spot price above deferred futures and flips the curve into <em>backwardation</em>.`}</P>

          <CurveShapeChart />
          <Cap>{`Schematic WTI forward curves under two inventory regimes. Illustrative prices only; shapes reflect the theory-of-storage logic discussed in Ch. 2, not any specific trading day.`}</Cap>

          <P>{`This is why Bouchouev treats inventory as the state variable that matters. Its dynamics are trivial as accounting — <code>dx = (S - D) dt</code> — but the <em>boundaries</em> are where the nonlinearity lives. A barrel-level model with a minimum operating capacity (pipeline line-fill, refinery working stock) and a maximum (tank-tops) produces a convenience yield that looks nearly flat through the middle of the distribution and hockey-sticks near the walls. The curve shape is a noisy, delayed readout of where inventories sit between those two hard limits. Cushing's role is outsized here: as the delivery point for WTI, it is the one location in the world where a financial futures price is legally tethered to a finite number of tanks.`}</P>

          <ContangoBackwardationDiag />
          <Cap>{`Conceptual diagram — theory of storage. Left: abundant inventory creates a carry arbitrage that flattens F into contango. Right: scarcity loads convenience yield onto S, inverting the curve.`}</Cap>

          <P>{`The second lens is <em>financialization</em>. Starting with Keynes's notion of <em>normal backwardation</em>, the chapter develops the idea that futures prices are not neutral forecasts of future spot — they embed a <strong>risk premium</strong> paid by hedgers to speculators who agree to warehouse price risk. Producers, with longer planning horizons and concentrated exposure, have a stronger hedging motive than consumers; that asymmetric <em>hedging pressure</em> pushes futures below expected spot and leaves a return on the table for anyone willing to be long the curve. Once that premium was identified, capital arrived: pension funds, endowments, and retail allocators piled into long-only futures exposure as a "fourth asset class", mechanically rolling front-month contracts forward month after month.`}</P>

          <Callout type="info" title="What financial flows do to the curve">{`Persistent long-only demand for front-month exposure, when rolled mechanically, sells the expiring contract and buys the next one. In a well-supplied market this roll pressure can deepen contango beyond what storage costs alone would justify, handing a negative roll yield to index investors and a positive carry to whoever takes the other side — physical traders with real tank space. The curve ceases to be a pure storage signal and becomes a joint artifact of physical economics and financial positioning.`}</Callout>

          <P>{`The chapter's punchline — developed fully in its treatment of the April 2020 negative-price event — is that when inventories approach tank-tops <em>and</em> financial flows are pinned to the front month, the two lenses stop being independent. Storage boundaries that were comfortable abstractions become binding constraints on contract holders who cannot physically receive barrels. The risk premium that looked like free money in calm markets inverts violently. For the quant trader, this means a forward curve is never just a curve: it is a mixture distribution over physical states of the world and the positioning of everyone else trading the same contract.`}</P>
        </Sec>

        <Sec n="3" title="Oil in the Macro Tapestry">
          <P>{`Oil stopped being only an energy commodity somewhere between the 1973 embargo and the 2000s pension-fund rush into real assets. Bouchouev's third chapter reframes crude as a node in the macro graph — with edges running into inflation, the dollar, real rates, and the risk budgets of investors who never intend to take delivery of a barrel. The stylized fact is blunt: every time annual WTI has run more than fifty percent above its three-year average, a US recession has tended to follow. The 1970s shocks, 2001, and 2008 all fit the template. COVID-19 broke it, with oil collapsing <em>into</em> the recession rather than causing one — a reminder that the causal direction is never clean.`}</P>

          <H3>Inflation mechanics, direct and indirect</H3>
          <P>{`The inflation channel runs through two pipes. The <strong>direct</strong> pipe is mechanical: retail gasoline sits inside the CPI basket, so a WTI move shows up in the headline print within weeks. The <strong>indirect</strong> pipe is slower — oil is an input cost across manufacturing, freight, and petrochemicals, and sustained price pressure filters into goods prices and wage expectations. The surprising relationship Bouchouev highlights is between WTI futures <em>levels</em> and the 5y5y forward breakeven rate derived from TIPS. Linking the level of a commodity to the rate of change of a price index is statistically unusual, but the co-movement is tight and self-reinforcing: cross-asset arbitrageurs who believe the relationship exists trade it, which tightens it further. Perception becomes mechanism.`}</P>

          <Callout type="info" title="Oil as an inflation hedge">{`The book argues oil has historically outperformed gold and real estate as a hedge against <em>unexpected</em> inflation jumps. That attribute — not expected return — is what pension funds buy when they add crude to a multi-asset portfolio.`}</Callout>

          <H3>The dollar, real rates, and the DXY connection</H3>
          <P>{`Oil is priced in dollars, so a stronger DXY mechanically lowers the non-US purchasing power of crude and drags prices lower; a weaker dollar does the opposite. The stylized rolling correlation below oscillates through regimes rather than sitting at a single value — tightly negative in strong-dollar hiking cycles, turning positive in "risk-on" windows where both oil and the dollar respond to the same growth signal. A parallel, weaker relationship runs against 10-year real rates: rising real yields compress long-duration real assets and often pull crude with them.`}</P>

          <OilDXYCorrChart />
          <Cap>{`Figure: schematic 24-month rolling correlation between WTI and two macro factors (DXY, 10y real rate). Illustrative only — shape intended to convey regime-switching behaviour discussed in Chapter 3, not a specific historical window.`}</Cap>

          <H3>Risk parity, CTAs, and the financialization turn</H3>
          <P>{`The chapter's most consequential claim is that a new class of buyer rewired the futures curve. <strong>Risk parity</strong> funds — Bridgewater's All Weather is the canonical example — equalize risk contributions across asset classes rather than weighting by market cap. That approach demands leveraged bond exposure, which in turn demands an inflation hedge to offset the duration risk. Oil, being liquid and inflation-sensitive, absorbed a large share of that flow. Alongside them, <strong>Commodity Trading Advisors</strong> and systematic trend-followers — Winton is cited as representative — run momentum, carry, and value signals across futures. These strategies don't forecast fundamentals; they respond to price, and when enough capital trades the same signals the flows themselves become part of price formation.`}</P>

          <Callout type="warn" title="What financialization did to the curve">{`Structural demand from inflation hedgers tilted oil into <em>normal contango</em> with a negative risk premium. Systematically buying and rolling long futures became a losing trade on average; the counterparty — the storage owner earning the negative roll yield — became the structural winner.`}</Callout>

          <P>{`For the quant on a multi-asset desk, the implication is concrete: oil is no longer a standalone bet on supply-demand balance. Its beta to the dollar, its loading on inflation surprises, and the footprint of systematic flow all enter the risk model alongside inventories and OPEC. The "virtual barrel" of the book's title is, in part, this one — the barrel that exists only in a risk-parity sleeve or a CTA signal file, and yet still moves the price of the physical one.`}</P>
        </Sec>

        <Sec n="4" title="Spreads and Statistical Arbitrage">
          <P>{`Spread trading is the quant's native idiom in oil. Rather than betting on the absolute level of crude, a spread trader takes offsetting positions in two related instruments and earns the <em>difference</em>. The move collapses the dominant risk factor — flat price — and isolates a narrower, more structural question: is WTI rich to Brent, is the front month rich to the second, is the refiner's margin too thin to sustain utilisation? Chapter 4 of Bouchouev catalogues four families that recur on every oil desk: <strong>calendar spreads</strong>, <strong>locational spreads</strong>, <strong>quality spreads</strong>, and <strong>crack spreads</strong>.`}</P>

          <P>{`Calendar spreads trade the price difference between two futures contracts on the same commodity but with different expiries — most often the first- and second-nearest maturity. Their fair value is anchored by the <strong>theory of storage</strong>: in contango, the deferred leg should exceed the prompt by roughly the cost of carry; in backwardation, a positive convenience yield pulls the curve the other way. A trader short the calendar is betting the curve flattens toward backwardation; a long position bets the opposite. Locational spreads — the canonical <strong>WTI–Brent</strong> example — capture transportation and regional supply–demand imbalances between Cushing and the North Sea, and respond to pipeline capacity, waterborne arbitrage, and geopolitics.`}</P>

          <P>{`Quality spreads price the discount between heavier/sourer grades and lighter/sweeter benchmarks, compensating for differential refining yields. The <strong>WCS–WTI</strong> spread in Bouchouev's exposition is the textbook case: adequate pipeline takeaway is what enforces mean reversion; when capacity is rationed, the spread jumps and the statistical relationship breaks. Crack spreads — the <code>3-2-1</code> (three barrels crude → two gasoline, one heating oil) and the <code>5-3-2</code> — represent the theoretical refining margin and are the cleanest read on refinery profitability.`}</P>

          <CrackSpreadChart />
          <Cap>{`Figure 4.1 — Stylized 3-2-1 crack spread over 24 months, with long-run mean and ±1σ bands. Schematic data for illustration only.`}</Cap>

          <P>{`The statistical backbone of all four spread families is <strong>mean reversion</strong>, formalised through <strong>cointegration</strong>. Two non-stationary price series (WTI and Brent, gasoline and heating oil) are cointegrated when a linear combination of them is stationary — the spread itself has a stable long-run mean even if each leg wanders. The Engle–Granger two-step is the workhorse diagnostic: regress one leg on the other, run an ADF test on the residuals, and if you reject a unit root you have an equilibrium to trade around. Trading rules follow mechanically — enter when the spread exceeds <code>±kσ</code> from its conditional mean, exit on reversion.`}</P>

          <Callout type="info" title="Static vs dynamic hedge ratios">{`A fixed OLS beta is a fair first pass, but production assets, pipeline regimes and refining slates all drift. Practitioners therefore prefer a <strong>Kalman filter</strong> to let the hedge ratio evolve as a latent state, updating each period from the prior and the new observation. The filter answers "what is today's cointegrating β?" rather than "what was the β over the last 500 days?" — and small misweights on the hedge leg are the single biggest source of stat-arb bleed.`}</Callout>

          <P>{`Why are spreads the quant's preferred vehicle? Because killing the directional factor collapses volatility and lifts Sharpe. A spread trade is, by construction, close to market-neutral: simultaneous long and short legs in related instruments hedge out the shared oil-price driver, leaving a residual whose variance is typically a fraction of either leg's. The trade-off, Bouchouev stresses, is <strong>negative skewness</strong> — stat-arb tends to earn small, steady P&amp;L while carrying rare but painful tail losses when the cointegrating relationship breaks (pipeline outage, refinery fire, sanctions shock). Short-vol in distribution, it demands hard position limits and an explicit view on when mean reversion is <em>not</em> going to save you.`}</P>

          <NB title="01_spread_cointegration.py" n={1}>{`import numpy as np
import pandas as pd
from statsmodels.tsa.stattools import coint, adfuller

# Synthetic cointegrated pair: WTI and Brent (stylized)
rng = np.random.default_rng(42)
n = 750
common = np.cumsum(rng.normal(0, 1.0, n))         # shared oil factor
wti    = 70 + 1.00 * common + rng.normal(0, 0.5, n)
brent  = 73 + 1.02 * common + rng.normal(0, 0.5, n)  # cointegrated w/ WTI

df = pd.DataFrame({"WTI": wti, "Brent": brent})

# Engle-Granger: p-value on the residual unit-root test
t_stat, p_value, crit = coint(df["WTI"], df["Brent"])

# Static hedge ratio via OLS (beta of Brent on WTI)
beta = np.polyfit(df["WTI"], df["Brent"], 1)[0]
spread = df["Brent"] - beta * df["WTI"]
adf_p  = adfuller(spread)[1]

print(f"Engle-Granger t = {t_stat:.3f}, p = {p_value:.4f}")
print(f"Hedge ratio beta = {beta:.3f}")
print(f"Spread mean = {spread.mean():.3f}, sd = {spread.std():.3f}")
print(f"ADF p-value on spread = {adf_p:.4f}")

# Illustrative output:
# Engle-Granger t = -6.214, p = 0.0000
# Hedge ratio beta = 1.018
# Spread mean = 2.947, sd = 0.702
# ADF p-value on spread = 0.0001
# -> reject unit root: WTI & Brent are cointegrated; spread is stationary.`}</NB>
        </Sec>

        <Sec n="5" title="Cross-Asset Arbitrage and Macro Overlays">
          <P>{`If chapter 4's spreads were the plumbing, chapter 5 is the wiring diagram that connects oil to the rest of the financial system. The book organises advanced trading around four axes: <strong>locational</strong> (price differentials between physical hubs), <strong>calendar</strong> (differentials across contract months), <strong>quality/substitute</strong> (crude grades, refined products, and cross-fuel switches), and <strong>cross-asset macro</strong> (oil positioning overlaid on rates, FX, equities, and inflation). A quant desk rarely picks one; the craft is stacking them so that the idiosyncratic noise in any single axis is diversified away while the macro thesis remains.`}</P>

          <ArbMapDiag />
          <Cap>{`The four arbitrage axes synthesised from Chapter 5. Each quadrant lists one canonical pair and the dominant payoff driver. Labels are schematic — actual spread economics depend on hub-specific logistics, refinery configurations, and prevailing macro regime.`}</Cap>

          <P>{`The workhorse of the cross-asset quadrant is a <strong>cointegration trade between oil futures and an equity proxy</strong> for producers — in the book's worked example, the XOP ETF. Oil prices and oil-equity baskets are both non-stationary on their own, yet a linear combination of them often is: shocks deviate, then converge. The Johansen and Augmented Dickey–Fuller tests confirm whether that convergence is real or spurious, and a rolling regression estimates the <em>hedging ratio</em> — how many units of XOP to short for each barrel of long WTI exposure. When the spread blows through a historical band, you fade it.`}</P>

          <P>{`Two traps make this harder than it looks. First, <strong>overfitting</strong>: the "customised basket" refinement — swapping the generic ETF for hand-picked producers — adds degrees of freedom faster than it adds signal, and the book explicitly flags this as where promising in-sample results most often fail out-of-sample. Second, <strong>look-ahead bias</strong>: equity settlement prints land after the oil futures close, so a naïve same-day regression silently peeks at the future. The remedy is to lag the equity factor by one session or use synchronous intraday snapshots — a small change that typically flattens backtest Sharpe ratios by a visible amount.`}</P>

          <Callout type="warn" title="When the hedging ratio lies">{`Producers hedge. A company running a heavy forward-sold book has a dampened beta to spot oil, and a static hedging ratio will systematically over-weight it in your basket. The book's most advanced variant scrapes producer-level hedge disclosures from regulatory filings and SDR data to build a <em>hedge-adjusted</em> basket. It is painful to assemble and the data is often stale, but it is the only way to stop hedged and un-hedged names from being mispriced against each other inside the same factor.`}</Callout>

          <P>{`The macro overlay generalises this. A <strong>three-factor fair-value model</strong> for WTI regresses oil on <code>USDCAD</code> (a crude-sensitive FX cross), <code>XOP</code> (the equity channel), and <code>CPI swaps</code> (inflation expectations), with rolling betas to let the loadings breathe as regimes change. When market price diverges from model fair value beyond a chosen band, the desk tilts. The book dates the modern relevance of this approach to <strong>2016, when the US lifted its crude export ban</strong> and WTI stopped being a landlocked benchmark — its sensitivity to global FX and equity flows stepped up sharply, and macro-based strategies became tradable in size rather than curiosities.`}</P>

          <P>{`The quality/substitute axis brings one more overlay: <strong>pass-through</strong>. RBOB gasoline futures feed into pump prices with a lag, and pump prices feed into CPI with another lag. Because futures trade electronically in milliseconds while CPI swaps clear OTC in minutes, the same information reaches the two markets at different speeds — a <em>market-speed discrepancy</em> the book frames as one of the cleanest macro-adjacent trades available. The arbitrage is not risk-free; incomplete pass-through, base effects in year-on-year CPI, and regulatory changes to retail pricing all blunt the signal. But the structural lag is persistent, and stacking it on top of a cointegration book turns two mediocre Sharpes into one respectable one.`}</P>
        </Sec>

        <PQ>{`The modern oil ecosystem has been optimised to a thin margin, and that optimisation is exactly what makes it unstable. Low slack implies high realised volatility — which is the input that gives every real option, every spread, and every vol surface in this book its premium.`}</PQ>

        <Sec n="6" title="The Volatility Risk Premium">
          <P>{`If the futures curve is where directional views get expressed, the options surface is where fear is priced. The Volatility Risk Premium (VRP) is the single most durable stylised fact that quantitative oil desks build their books around: implied volatility, backed out of traded option prices, systematically exceeds the volatility that the underlying actually realises over the life of the option. That wedge is not a mispricing — it is a payment. End-users, producers, and asset managers are willing to overpay for protection against large, unpredictable moves, and someone has to warehouse that tail. The option seller is that someone, and the VRP is the coupon they earn for standing between the crowd and the worst case.`}</P>

          <P>{`Mechanically, the strategy is unglamorous. Sell an option — most simply a short-dated ATM straddle — and delta-hedge it continuously against the futures. If realised volatility over the life of the trade comes in below the implied level at which the option was sold, the hedged position makes money; if it comes in above, it loses. Aggregated across thousands of trades, oil options have historically paid a positive premium, and for most of the 2000s a naive "sell vol and hedge" programme was a reliable source of return. But the book is emphatic that this free lunch has thinned. As the structural futures risk premium compressed and US shale producers industrialised their hedging — particularly via three-way collars, which dump short-gamma supply onto the street — outright VRP harvesting became crowded, noisier, and more prone to ugly drawdowns.`}</P>

          <IVRVChart />
          <Cap>{`Schematic: 24 months of stylised monthly IV vs RV in a front-month oil option, with the orange area tracing the VRP (IV minus RV). In calm regimes the premium is a steady positive ribbon; around month 10 a stress event inverts the gap — realised blows through implied and the VRP goes negative. Numbers are illustrative, not historical.`}</Cap>

          <H3>The pure-play vehicle: variance swaps</H3>
          <P>{`Vanilla options are a noisy way to express a view on volatility because their vega changes with spot and with time. Variance swaps strip that problem out. A variance swap pays the realised variance of log-returns over a defined window against a fixed variance strike, scaled by a variance notional. There are no greeks to manage, no delta to hedge, no moneyness drift — the payoff is a direct bet on whether realised vol lands above or below the strike. For the VRP harvester, shorting variance is the cleanest expression of the trade: one ticket, one number, one window.`}</P>

          <NB title="02_variance_swap_payoff.py" n={2}>{`import numpy as np
import pandas as pd

# Daily closes for the variance window (e.g. 21 trading days)
prices = pd.Series([
    78.20, 77.85, 78.60, 79.10, 78.40, 77.95, 78.70, 79.30, 79.80, 80.20,
    79.55, 78.90, 78.25, 77.60, 78.10, 78.85, 79.40, 79.15, 78.70, 78.30,
    77.95, 78.50,
])

log_rets = np.log(prices / prices.shift(1)).dropna()
n_days   = len(log_rets)
ann      = 252

realized_var = (log_rets ** 2).sum() * (ann / n_days)   # annualised realised variance
realized_vol = np.sqrt(realized_var) * 100              # in vol points

K_var        = 32.0 ** 2        # strike variance (K_vol = 32 vol pts)
N_vega       = 10_000.0         # $ vega notional
var_notional = N_vega / (2 * np.sqrt(K_var))

pnl = var_notional * (realized_var * 10_000 - K_var)    # vol pts squared
print(f"Realized vol : {realized_vol:5.2f} vol pts")
print(f"Strike vol   : {np.sqrt(K_var):5.2f} vol pts")
print(f"Short-var PnL: {-pnl:,.0f} USD")`}</NB>

          <H3>Relative value on the surface</H3>
          <P>{`As outright VRP compressed, desks migrated from harvesting the <em>level</em> of vol to trading its <em>shape</em>. The chapters flag three relative-value axes. <strong>Calendar</strong>: sell short-dated ATM vol, buy longer-dated ATM vol, financing the decay of the front month against the slower bleed of the back. <strong>Skew</strong>: the VRP smile is asymmetric — OTM puts carry a fatter premium than OTM calls because the demand for downside protection is structurally one-sided; ratio spreads and risk-reversals monetise the asymmetry. <strong>Term structure</strong>: the VRP itself has a term structure, and kinks in it — often driven by OPEC meetings or EIA release windows — become tradeable calendars on variance swaps. None of this works without a calibrated vol model; sticky-moneyness and sticky-strike heuristics are crude enough that they routinely mis-price the hedge and leak the premium back to the market.`}</P>

          <H3>Why the premium compresses</H3>
          <P>{`The VRP is not a constant. It compresses, and sometimes inverts, precisely when the seller can least afford it. Chapter 10 is explicit that the premium narrows in stress regimes — when realised vol accelerates, when liquidity in the options book evaporates, when macro correlations break and producers lean harder on collars. In those windows the short-vol book takes on the character of a put: slow accrual of carry punctuated by sharp, fat-tailed losses. Disciplined VRP harvesting is therefore less about the entry and more about position sizing, gamma budgeting, and honest backtests that penalise path-dependent blow-ups rather than hiding them behind a smooth Sharpe.`}</P>

          <Callout type="warn" title="The left-tail pays the coupon">{`Selling variance is, structurally, a bet on normal weeks to finance occasional catastrophes. The book is clear: every VRP programme that ignored left-tail convexity — through under-hedged short gamma, insufficient stop-out discipline, or over-reliance on a lognormal calibration — eventually gave back multiple years of carry in a single event. Size the trade so that the worst plausible realised-vol spike survives the book, not the other way round.`}</Callout>
        </Sec>

        <Sec n="7" title="From Black–Scholes to Quadratic-Normal">
          <P>{`The canonical option-pricing story starts in 1973 with Black–Scholes: assume the underlying follows geometric Brownian motion with constant drift and volatility, and a European call prices as <code>C = S N(d₁) − K e^(−rT) N(d₂)</code> where <code>d₁ = [ln(S/K) + (r + ½σ²)T] / (σ√T)</code>. It is an extraordinary result — one formula, five inputs, zero free parameters once you fix <code>σ</code> — and it became the lingua franca of derivatives. But oil is not a spot equity. You cannot warehouse a barrel the way you can a share of Apple, and the liquid instrument is the futures contract, not the physical. Fischer Black's 1976 update, <strong>Black-76</strong>, is the obvious adaptation: replace the spot <code>S</code> with the forward <code>F</code> and the option on a futures contract prices as <code>C = e^(−rT)[F N(d₁) − K N(d₂)]</code>, with <code>d₁ = [ln(F/K) + ½σ²T] / (σ√T)</code>. This is the benchmark every oil trader learns first.`}</P>

          <P>{`The two assumptions that break are the ones Black-76 inherits: <em>constant volatility</em> and <em>log-normal prices</em>. Markets disagree on both counts. Plot implied vol against moneyness <code>K/F</code> for a single expiry and you do not get a flat line — you get a <strong>smile</strong> or, more often in crude, a <strong>skew</strong> where out-of-the-money puts trade richer than calls. The wings are fatter than any log-normal distribution predicts, reflecting the genuine possibility of supply-disruption spikes on the upside and macro-driven crashes on the downside. And the ATM implied vol itself is not invariant to the level of <code>F</code>: the chapter documents a parabolic rather than linear relationship between ATM IV and futures price, sharpening during stress. A single <code>σ</code> cannot do all this work.`}</P>

          <P>{`The first patch is <strong>local volatility</strong>. Let <code>σ</code> be a deterministic function <code>σ(F,t)</code> and solve Dupire's equation <code>σ²(K,T) = (∂C/∂T) / (½ K² ∂²C/∂K²)</code> to back out the surface that reproduces today's smile exactly. It is a beautiful fit — by construction — but static: local vol is a snapshot, not a dynamics, and the smile it predicts for tomorrow is usually wrong. Practitioners add stochastic volatility on top. The workhorse is <strong>SABR</strong>, with <code>dF = α F^β dW</code>, <code>dα = ν α dZ</code>, correlation <code>ρ</code>. Hagan's asymptotic expansion gives a tractable smile formula and the four parameters <code>(α, β, ρ, ν)</code> map intuitively to ATM level, backbone, skew, and wing convexity. The price: four parameters per expiry, nontrivial calibration, and corner cases where the expansion breaks down at low strikes.`}</P>

          <P>{`Bouchouev's chapter argues that for oil the more practitioner-friendly destination is the <strong>Quadratic-Normal (QN) model</strong>. Start from Bachelier — arithmetic Brownian motion, <code>dF = σ_A dW</code>, prices normally distributed — which already fits oil's <em>parabolic</em> smile shape better than the lognormal Black smile and handles negative prices (an obligation, not an abstraction, since April 2020). Then apply a perturbation around the Bachelier solution using a quadratic function <code>ε(F) = a + b(F − F₀) + c(F − F₀)²</code>. The resulting closed-form price is Bachelier plus correction terms whose <code>a, b, c</code> are linked directly to market observables: the ATM straddle, the costless collar, and the OTM strangle. Skewness and kurtosis each get a parameter; the Greeks stay analytical.`}</P>

          <P>{`Calibration is where the trade-offs bite. Black-76 calibrates in seconds but cannot fit the wings. Local vol fits everything today and predicts nothing tomorrow. SABR captures smile <em>dynamics</em> but requires care to avoid arbitrage and to stabilise <code>β</code>. QN sits in the middle — three parameters per expiry, a quadratic that hugs the observed normal smile, closed-form pricing and Greeks, and a parameterisation traders can read straight off quoted structures. For an oil desk pricing vanilla options, APOs, and swaptions against noisy market data, that combination is hard to beat.`}</P>

          <Callout type="info" title="Why oil favours normal over log-normal">{`Log-normal models force a floor at zero and impose a specific shape on the tails. Oil violates both assumptions — WTI printed −$37 on 20 April 2020, and the empirical smile is closer to parabolic than skew-log-normal. The Bachelier/QN branch drops the zero floor, admits a symmetric-then-perturbed smile, and produces deltas that are actually intuitive: ATM call delta ≈ +0.5, put ≈ −0.5, without the skewed hedges a Black delta quietly builds in.`}</Callout>

          <VolModelTree />
          <Cap>{`Each step inherits the previous framework and patches one broken assumption. Oil desks typically live on the right-hand side — Bachelier-rooted, perturbation-adjusted, analytical.`}</Cap>
        </Sec>

        <Sec n="8" title="Spread Options: Kirk, Margrabe, and Beyond">
          <P>{`If Chapter 4 established the spread as the oil quant's preferred <em>underlying</em>, Chapters 8 and 9 deal with the harder question: how do you price an <em>option</em> on that spread? The payoff <code>max(F1 − F2 − K, 0)</code> hides a two-dimensional problem. Black–Scholes is a one-asset log-normal construction; a spread is the difference of two log-normals, which is <strong>not itself log-normal</strong> and whose density has no elementary form. Every practitioner model is an honest attempt to fake it — by changing numeraire, matching moments, or abandoning log-normality entirely for the Bachelier world where spreads can go negative.`}</P>

          <P>{`The canonical starting point is <strong>Margrabe (1978)</strong>, the "exchange option". Margrabe's insight was that when the strike is zero — the right to exchange one asset for another — a judicious change of numeraire (dividing through by <code>F2</code>) converts the two-asset problem into a one-asset Black–Scholes call on the ratio <code>F1/F2</code>, with volatility <code>σ = √(σ1² − 2ρσ1σ2 + σ2²)</code>. The formula is exact. But oil life rarely hands you <code>K = 0</code>. Crack-spread options, CSOs, and locational options all carry non-zero strikes, and the moment <code>K ≠ 0</code> the numeraire trick stops working cleanly.`}</P>

          <P>{`<strong>Kirk (1995)</strong> is the practitioner workhorse that patches the gap. Kirk's approximation treats the composite quantity <code>F2 + K</code> as if it were a single log-normal asset, then prices the spread as a Margrabe-style exchange of <code>F1</code> against <code>F2 + K</code>. In practice this means computing an effective forward <code>F_eff = F1/(F2 + K)</code>, an effective volatility that blends σ1, σ2 and their correlation via the weight <code>w = F2/(F2 + K)</code>, and a single Black–Scholes call on that synthetic underlying with a strike pinned to 1.0. Scale the result back by <code>(F2 + K)</code> and you have a closed-form spread-option price that is fast, differentiable, and accurate to within a few tenths of a percent for moderate strikes and correlations in the <code>[0.3, 0.95]</code> band that dominates crude and product markets.`}</P>

          <KirkDiag />
          <Cap>{`Figure 8.1 — Kirk's approximation collapses the two-asset spread problem into a single log-normal call via an effective forward F_eff, effective volatility σ_eff, and a strike rescaled to 1. The rescaling by (F2 + K) at the end recovers the original units.`}</Cap>

          <P>{`The sensitivities that practitioners actually trade are three: <strong>correlation ρ</strong>, the two leg volatilities <strong>σ1, σ2</strong>, and the <strong>effective volatility σ_eff</strong> of the spread. Correlation is the dominant lever: push ρ toward 1 and σ_eff collapses toward <code>|σ1 − σ2 · w|</code>, crushing the option; push ρ lower and σ_eff expands, inflating premium. A stable WTI–Brent ρ of 0.95 supports thin locational-option vega, but a pipeline disruption that drives ρ to 0.7 can double the fair premium overnight. The individual vols matter asymmetrically: σ2 enters weighted by <code>w²</code>, so for deep OTM strikes (large K, small w) the back-leg vol is almost irrelevant and the option behaves like a call on F1 alone.`}</P>

          <P>{`When Kirk strains — at strikes near zero, at correlations above 0.97, or for deeply dislocated calendar spreads where the lognormal assumption on <code>F2 + K</code> is audibly wrong — Chapter 8 offers two escape routes. <strong>Bjerksund–Stensland</strong> refines Kirk with a sharper expansion of σ_eff and extends cleanly to negative strikes. <strong>Moment matching</strong> fits a single (possibly shifted) log-normal whose first two moments equal those of the actual spread distribution. And for CSOs where correlations cluster near 1 and the spread can go negative, Bouchouev is emphatic: abandon log-normality and use the <strong>Bachelier model</strong> — arithmetic Brownian motion with dollar-denominated volatility — with the <strong>Quadratic-Normal</strong> extension of Chapter 9 picking up the sticky smile.`}</P>

          <P>{`Why do spread options dominate commodity option books? Because the physical economics themselves are spread economics. A refiner's P&amp;L <em>is</em> the crack spread; a storage operator's optionality <em>is</em> a calendar spread; a pipeline's throughput value <em>is</em> a locational spread. Most real hedging demand — and therefore most of the vega on a commodities desk — is strike-differenced by construction. Kirk's formula is the closed-form engine that lets a trader quote and delta-hedge that demand at the speed markets require.`}</P>

          <Callout type="tip" title="When Kirk breaks down — use Margrabe or Bachelier">{`Kirk's approximation degrades as the strike K approaches zero, because the expansion point (F2 + K) becomes dominated by the stochastic F2 alone and the assumed log-normality of the composite is no longer defensible. At <strong>exactly K = 0</strong>, use <strong>Margrabe (1978)</strong> — it is exact for exchange options. At <strong>deep negative or at-the-money spreads with correlation &gt; 0.97</strong> (typical for front-vs-second-month CSOs in contango), switch to the <strong>Bachelier model</strong>: arithmetic Brownian motion handles negative spreads without the log-normal contortions, and it is what the commodities options desks quote calendar vol in anyway.`}</Callout>

          <NB title="03_kirk_spread_option.py" n={3}>{`import numpy as np
from scipy.stats import norm

def kirk_spread_call(F1, F2, K, sigma1, sigma2, rho, T, r=0.0):
    """
    Kirk (1995) approximation for a European spread call:
        payoff = max(F1 - F2 - K, 0)
    Treats (F2 + K) as a single log-normal asset, prices the spread
    as a Margrabe-style exchange of F1 vs (F2 + K).
    """
    if T <= 0:
        return max(F1 - F2 - K, 0.0)
    w = F2 / (F2 + K)                                   # weight on back leg
    sigma_eff = np.sqrt(sigma1**2
                        - 2.0 * rho * sigma1 * sigma2 * w
                        + (sigma2 * w)**2)              # effective vol
    F_eff = F1 / (F2 + K)                               # effective forward
    vol_sqrt_T = sigma_eff * np.sqrt(T)
    d1 = (np.log(F_eff) + 0.5 * vol_sqrt_T**2) / vol_sqrt_T
    d2 = d1 - vol_sqrt_T
    bs_call = F_eff * norm.cdf(d1) - 1.0 * norm.cdf(d2) # BS call, strike = 1
    return np.exp(-r * T) * (F2 + K) * bs_call

if __name__ == "__main__":
    # Illustrative: WTI vs Brent locational spread option, K = 2 USD/bbl
    price = kirk_spread_call(F1=80.0, F2=82.0, K=2.0,
                             sigma1=0.30, sigma2=0.28, rho=0.92,
                             T=0.5, r=0.04)
    print(f"Kirk spread call = {price:.4f} USD/bbl")
    # -> Kirk spread call = 1.1511 USD/bbl`}</NB>
        </Sec>

        <Sec n="9" title="Calibration, Smile Dynamics, and Practitioner Pitfalls">
          <P>{`The elegance of a stochastic-volatility model on paper collides, without fail, with the grubby reality of listed option quotes. Chapter 10 of the book is insistent on this point: a model that cannot be calibrated cleanly to the market is not a model, it is a hypothesis. The practitioner's first job each morning is to take a strip of ATM and wing quotes across tenors, strip out noise, and fit a surface that is arbitrage-free in strike and smooth in time. <strong>SVI</strong> (Stochastic Volatility Inspired) parameterisations handle the strike dimension with five parameters per slice, enforcing no-butterfly-arbitrage constraints analytically. <strong>SABR</strong> calibrations, the workhorse for commodity desks because of their natural handling of beta and skew, give you a closed-form implied-vol approximation that can be fit tenor-by-tenor to ATM vol, skew, and curvature. In either case the targeting procedure — minimising the distance between model-implied vols and market-implied vols at a chosen set of pillar strikes — is where the modelling ends and the craft begins.`}</P>

          <H3>Sticky-strike vs sticky-delta</H3>
          <P>{`Before you can re-price anything tomorrow you must decide how the surface <em>moves</em> when the underlying moves. Under a <strong>sticky-strike</strong> regime the implied vol attached to a given strike is invariant to spot: the curve slides with the market and the vol at ATM rises mechanically as spot falls through it. Under <strong>sticky-delta</strong> (or sticky-moneyness), the curve is anchored to moneyness, so the vol at a fixed strike changes as that strike moves out of or into the money. The distinction is not academic — it determines your vega hedge ratio and the daily P&amp;L attribution of an option book. Commodity markets frequently flip between the two: sticky-strike in quiet trending markets, sticky-delta in fast-moving regimes around news. Traders who assume one while the market is in the other bleed slowly through their gamma and cannot locate the leak in their P&amp;L explain.`}</P>

          <SmileDiag />
          <Cap>{`Three canonical shapes of the implied-vol curve. The symmetric smile is typical of liquid at-the-money crude options in calm conditions. The left-skewed smirk emerges in crash-fear regimes when puts get bid. The forward (positive) skew is a commodity signature — it appears in natural gas and in crude at low prices, where the market prices a higher probability of an upside squeeze than a further collapse.`}</Cap>

          <H3>Market-data pitfalls</H3>
          <P>{`The quotes you calibrate to are not the quotes you think you have. Deep out-of-the-money wings on distant tenors can be stale for hours at a time; a last-traded price at 10:14 does not reflect the market at 15:58. Bid–ask spreads in illiquid wings can easily be 3–5 vol points wide — illustrative, not fabricated — and a naive least-squares fit to mid-prices will chase ghosts. The book's chapter-9 discussion of spread-option inputs applies by direct analogy here: garbage data produces confidently wrong Greeks, and confidently wrong Greeks size positions for you.`}</P>

          <H3>The regime-shift problem</H3>
          <P>{`The deepest pitfall is not numerical but epistemic. A model calibrated over a calm six-month window learns that volatility mean-reverts gently, that the skew is mildly negative, that correlation between front and back months is near one. When the regime shifts — a geopolitical shock, an OPEC-quota surprise, a refinery outage — every one of those calibrated parameters is wrong at once, and the model's confidence intervals widen precisely when you most need them narrow. Chapter 10 stresses that stochastic-volatility models are only as good as the regime they were fit to, and that rolling re-calibration plus regime-aware stress scenarios are non-negotiable. The working answer is a two-speed process: fast daily re-calibration against today's quotes, and slower weekly scenario runs that re-price the book under prior crisis vol surfaces (1990, 2008, 2014, 2020, 2022) to keep the tail honest.`}</P>

          <Callout type="warn" title="Two pitfalls that will quietly ruin a vol book">
            <ul style={{ margin: 0, paddingLeft: 22, fontFamily: F.b, fontSize: 14, lineHeight: 1.7, color: C.text }}>
              <li style={{ marginBottom: 8 }}><strong>Over-fitting the wings.</strong> Allowing SVI or SABR parameters the freedom to track every stale deep-OTM quote produces a surface that prices exotics beautifully today and hedges catastrophically tomorrow. Constrain wing behaviour and penalise day-over-day parameter jumps.</li>
              <li><strong>Calibrating in one regime, trading in another.</strong> A model fit through a quiet summer will understate tail risk when winter stress hits. Refresh calibration windows, overlay regime indicators (realised-vol regime, term-structure slope, VRP sign), and stress-test against at least one prior crisis before sizing into a new trade.</li>
            </ul>
          </Callout>
        </Sec>

        <Sec n="10" title="Putting It Together: A Decision Grid for Oil Quant Desks">
          <P>{`Virtual Barrels is less a cookbook than a field map. Read end-to-end, its ten chapters cluster into seven recurring strategy buckets, each attached to a different slice of the oil ecosystem: the real-options lens on production and storage, the inventory-driven futures curve, the cross-market spread complex, and the volatility surface that sits on top of all of it. The grid below condenses what the book says about each bucket into four questions a desk actually has to answer before sizing a position.`}</P>

          <DecisionGrid />
          <Cap>{`Decision grid synthesising the book's seven recurring strategy buckets. Works/fails conditions and risk drivers are drawn from Bouchouev's chapter-level framing, not from backtested performance statistics.`}</Cap>

          <H3>How to read the grid</H3>
          <P>{`Directional outrights and systematic trend strategies (Chapter 3) earn their keep when inventories or macro flows tilt the curve in one direction; they fade in the choppy, range-bound regimes that dominate most of the sample. Calendar spreads (Chapter 2) and inventory-curve plays are close cousins — both pay off when storage approaches a hard boundary and the convenience yield becomes non-linear, and both decay into noise when tanks are comfortably half-full. Locational spreads (Chapters 4–5) are essentially traded pipeline options: the edge lives in logistics bottlenecks and disappears when infrastructure normalises. Crack spreads belong to refiners' real-option set, profitable when product-crude margins diverge from refinery economics and vulnerable to turnaround and feedstock shocks.`}</P>

          <P>{`The volatility-side strategies sit on the other half of the book. VRP harvesting (Chapters 6 and 10) monetises the gap between implied and realised volatility — a gap that is structurally positive most of the time but can invert violently, as the 2020 episode showed. Spread-option market-making (Chapters 8–9) is a correlation trade in disguise: it pays when two-way flow is healthy and correlation structures hold, and it breaks when end-users all hedge in the same direction or correlations decouple. Across every row, the recurring lesson is the same — the edge is conditional, the risk driver is specific, and the vehicle choice (outright, spread, option, or spread option) is what converts a view into a trade the desk can actually carry.`}</P>

          <Callout type="tip" title="Positioning for the next decade">{`The book's closing chapters read less like a retrospective and more like a brief for the next regime. Bouchouev flags the financialisation of oil, the entry of inflation hedgers, quant funds, and option traders, and the inherent instability of a just-in-time energy system as the structural backdrop. Quant desks that can model inventory boundaries, calibrate stochastic-volatility smiles, and price spread options under shifting correlations inherit an edge as energy-transition flows, changing liquidity, and ESG-driven reallocations reshape who holds the barrels and who wants to hedge them. The virtual-barrel toolkit is, in that sense, exactly the toolkit the next decade seems likely to reward.`}</Callout>
        </Sec>
