 tone \u2014 the inverted-U relationship that makes optimal arousal a precision-calibrated state rather than a simple dial. Too little catecholamine tone, and signals become incoherent; too much, as during acute stress, and the PFC's working memory circuits collapse entirely.`), /* @__PURE__ */ React.createElement(Prose, null, "In ADHD, that band is disrupted. Research has consistently found elevated density of dopamine transporter (DAT) proteins in ADHD brains, meaning that dopamine is cleared from the synaptic cleft more rapidly than in neurotypical individuals. The result, as reviewed in a comprehensive 2024 paper in ", /* @__PURE__ */ React.createElement("em", null, "Neuroscience and Biobehavioral Reviews"), ' by Parlatini and colleagues, is reduced tonic dopamine signalling in the mesolimbic and mesocortical pathways \u2014 a lower baseline salience signal for any given task regardless of its objective importance. The practical consequence is the phenomenon clinicians describe as "interest-based motivation": external rewards that reliably activate neurotypical goal-pursuit systems \u2014 a salary, a deadline, social approval \u2014 register with insufficient neurochemical weight to sustain engagement in the ADHD brain. The salience threshold is higher, and crossing it requires either very strong external consequences or the unique neurological signature of intrinsic interest.'), /* @__PURE__ */ React.createElement("div", { style: { margin: "40px 0" } }, /* @__PURE__ */ React.createElement(DopaminePathway, null)), /* @__PURE__ */ React.createElement(Sidebar, { title: "Self-Determination Theory and ADHD: Why Internal Motives Are the Mechanism" }, 'Self-Determination Theory (SDT), developed by Richard Ryan and Edward Deci at the University of Rochester, proposes that human motivation exists on a continuum from controlled to autonomous. At the controlled end, behaviour is driven by external pressure, reward, or punishment \u2014 what SDT terms "external regulation" and "introjected regulation." At the autonomous end, behaviour is driven by intrinsic interest, personally meaningful values, or integrated self-identity.', /* @__PURE__ */ React.createElement("br", null), /* @__PURE__ */ React.createElement("br", null), "In their 2022 review in the ", /* @__PURE__ */ React.createElement("em", null, "Journal of Attention Disorders"), ", Morsink and colleagues at KU Leuven argued that classical ADHD theories \u2014 which focus almost exclusively on dopamine reward circuits and external reinforcement schedules \u2014 neglect internal motives entirely. Their core finding: ADHD individuals are not globally undermotivated; they show a highly specific profile in which controlled motivation styles (external, introjected regulation) are extremely inefficient, while intrinsic motivation \u2014 when accessible \u2014 is not merely intact but potentially amplified. A 2022 paper in ", /* @__PURE__ */ React.createElement("em", null, "Psychological Review"), " by Champ and colleagues extended this to propose that ADHD symptomatology may itself be partly understood as acute autonomy frustration: a nervous system whose fundamental orientation toward self-generated activity is chronically blocked by environments designed for externally regulated motivation. Their framework, grounded in SDT, reframes the ADHD brain not as broken but as a self-determination system operating in conditions of systematic need thwarting.", /* @__PURE__ */ React.createElement("br", null), /* @__PURE__ */ React.createElement("br", null), "The ADAPT (Autonomy, Design, Awareness, Psychoeducation, and Training Integration for Sustainable Change) framework, piloted in a 2025 randomised feasibility study in the NHS by McCormick and colleagues, operationalised these insights into an 11-session intervention for ADHD adults. Compared to a waitlist control, ADAPT participants showed clinically meaningful improvements in health-related quality of life, self-reflection, and identity formation. The study excluded individuals with co-occurring autism \u2014 an exclusion the authors acknowledged as a significant limitation. Given that the mechanism is autonomy support, and that AuDHD individuals show the most pronounced autonomy-orientation in the entire literature, the therapeutic implications for the AuDHD population are arguably stronger, not weaker, than for ADHD alone."), /* @__PURE__ */ React.createElement("div", { style: { margin: "40px 0" } }, /* @__PURE__ */ React.createElement(MotivationChart, null)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Prose, null, "The autism dimension of AuDHD adds a structural layer to this neurochemical picture that the dopamine story alone cannot explain. Since the mid-1990s, Dinah Murray \u2014 first at the Open University and later as an independent autistic researcher \u2014 has developed what she calls the monotropism theory of autism. The core claim is straightforward and counterintuitive: autistic attention is not characterised by too little focus or too much focus, but by a systematically different ", /* @__PURE__ */ React.createElement("em", null, "distribution"), " of attentional resources. Where neurotypical cognition distributes attention across many interests simultaneously at moderate intensity \u2014 what Murray calls polytropism, likening it to a wide-coverage sprinkler system dispersing the same limited water supply over a broad area \u2014 autistic cognition concentrates it deeply in a small number of channels at very high intensity. The garden hose pointed precisely. The laser rather than the floodlight."), /* @__PURE__ */ React.createElement(Prose, null, `The implications of this attentional topology are far-reaching. Within the "attention tunnel" \u2014 Murray's term for the focused channel \u2014 perception is enhanced, working memory is locally elevated, and the conditions for flow states are essentially present by default. Heasman and colleagues, in a 2024 paper in the `, /* @__PURE__ */ React.createElement("em", null, "Journal for the Theory of Social Behaviour"), ` formalising what they call Autistic Flow Theory, found in their qualitative study that autistic adults describe flow as not merely pleasant but "essential for wellbeing, playing a regulatory role across sensory, emotional and cognitive facets." Flow in this framework is not an exceptional peak performance state, as Csikszentmihalyi originally described it, but a homeostatic baseline \u2014 the attentional condition in which the monotropic nervous system does its most natural, least effortful processing. Outside the tunnel, information registers at reduced weight. A teacher's instruction, a phone's vibration, a social cue \u2014 all compete poorly against the tunnel's gravitational pull. Executive dysfunction in autism, from this perspective, is not a global deficit in control but a localised consequence of an attentional topology that makes certain state-switching operations cognitively expensive.`), /* @__PURE__ */ React.createElement(Prose, null, "A 2024 empirical study by Dwyer, Williams, Lawson, and Rivera, published in ", /* @__PURE__ */ React.createElement("em", null, "Autism in Adulthood"), ", investigated the relationship between hyperfocus and inattention across a sample of 492 adults divided into autism-only, ADHD-only, AuDHD, and comparison groups. The finding contradicts the clinical assumption that hyperfocus and inattention are opposite ends of a spectrum: in all neurodivergent groups, hyperfocus and inattention were both elevated, and were positively correlated. The same attentional system that enables total immersion in an interest is the system that produces apparent inattention to everything outside it. They are not competing features of different conditions \u2014 they are the same attentional architecture viewed from different angles. In the AuDHD group, both were most extreme simultaneously."), /* @__PURE__ */ React.createElement(Sidebar, { title: "The Monotropism Questionnaire: Who Scores Highest" }, "In 2023, Garau and colleagues published the development and validation of the Monotropism Questionnaire (MQ) \u2014 the first psychometric instrument designed to measure monotropic attentional style across autistic and non-autistic populations. Covering 47 items spanning attentional tunnelling, interest intensity, transition difficulty, and the phenomenology of flow states, the MQ fills a significant measurement gap in the neurodiversity research landscape.", /* @__PURE__ */ React.createElement("br", null), /* @__PURE__ */ React.createElement("br", null), "The finding most directly relevant to this article: the highest monotropism scores were not found in the autism-only group. They were found in participants who identified as both autistic and ADHD \u2014 the AuDHD group. This is not the result one would predict if AuDHD were simply the additive combination of autism's deep focus and ADHD's distractibility. It suggests instead that monotropic attentional style is intensified rather than diluted by the co-occurrence. One plausible mechanism: ADHD's attentional instability may amplify the urgency with which the monotropic system locks onto a viable interest once it finds one, producing more extreme tunnel states than either condition produces alone.", /* @__PURE__ */ React.createElement("br", null), /* @__PURE__ */ React.createElement("br", null), "Fergus Murray \u2014 autistic researcher and son of monotropism's founder, Dinah Murray \u2014 proposed in a 2023 preprint that monotropism may function as a trans-diagnostic framework capable of explaining attentional variability across both autism and ADHD within a single unified model. If this hypothesis is confirmed, it would dissolve the clinical fiction that AuDHD is two conditions coexisting, replacing it with a single attentional account in which the co-occurrence produces an intensification of the same underlying processing style."), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Prose, null, "What happens when monotropic attention architecture and dopaminergic hyposalience combine in the same brain \u2014 and is the resulting configuration simply the sum of two separate conditions, or something new? Until recently, the research literature had little to say, largely because most neuroimaging studies of autism and ADHD were conducted separately, using male-dominant samples and diagnostic exclusion criteria that made co-occurrence invisible almost by design. A 2025 paper in ", /* @__PURE__ */ React.createElement("em", null, "Biological Psychiatry"), " by Saashi Bedford and colleagues at Cambridge and the Lifespan Brain Chart Consortium directly addressed this gap. Using a population modelling approach and a multisite neuroimaging dataset of 4,255 participants \u2014 benchmarked against a normative sample of more than 75,000 typically developing individuals \u2014 Bedford's team characterised the cortical anatomy of autism and ADHD separately and together."), /* @__PURE__ */ React.createElement(Prose, null, 'The results were unambiguous. Autism-only was associated with greater cortical thickness and volume localised to the superior temporal cortex \u2014 a region implicated in social cognition and language processing. ADHD-only was associated with more global increases in cortical thickness but notably lower cortical volume and surface area across much of the cortex \u2014 a pattern consistent with altered developmental pruning trajectories. The AuDHD group showed neither the autism pattern nor the ADHD pattern nor a simple superposition of the two. They showed a third, emergent configuration: widespread increases in cortical thickness coupled with specific reductions in cortical surface area that had no equivalent in either condition alone. "These results indicate distinct cortical differences in autism and ADHD that are differentially affected by age and sex," Bedford and colleagues wrote, "as well as potentially unique patterns related to their co-occurrence." The AuDHD brain is not a compound of its ingredients. It is a reaction product \u2014 a distinct neuroanatomical entity.'), /* @__PURE__ */ React.createElement("div", { style: { margin: "40px 0" } }, /* @__PURE__ */ React.createElement(CorticalChart, null)), /* @__PURE__ */ React.createElement(Prose, null, "The cortical anatomy story, compelling as it is, remains incomplete without understanding how the AuDHD brain's neuroanatomical differences translate into functional network dynamics \u2014 specifically, how the three large-scale brain networks that govern attention allocation operate differently in this population. The three networks in question are the Default Mode Network (DMN), the Task-Positive Network (TPN, also called the frontoparietal control network), and the Salience Network \u2014 and their interaction, as reviewed in a 2021 paper by Chase Dougherty and colleagues, provides the most mechanistically coherent account yet of the AuDHD autonomy orientation."), /* @__PURE__ */ React.createElement(Prose, null, `The DMN is the brain's "resting state" network, active during internal thought \u2014 self-referential processing, memory retrieval, future simulation, mind-wandering. The TPN is its functional antagonist, active during externally directed tasks that require controlled attention and working memory. In healthy neurotypical cognition, these two networks are anticorrelated: when one is active, the other is suppressed. The Salience Network \u2014 anchored in the anterior insula and anterior cingulate cortex \u2014 is the switching mechanism. As Vinod Menon of Stanford's Wu Tsai Neuroscience Institute described in a comprehensive 2024 review, the anterior insula acts as a "hub that influences both the frontoparietal network and the DMN," using bottom-up detection of salient events to determine which large-scale network should receive attentional resources at any given moment. It is, in Menon's phrasing, the gatekeeper of executive control.`), /* @__PURE__ */ React.createElement(Prose, null, "In autism, the salience network shows hyperconnectivity \u2014 specifically in the ACC and bilateral insular cortices, according to a classification study that used ASD children's salience network connectivity to predict symptom severity with significant accuracy. In ADHD, the DMN shows stronger functional connectivity at rest and characteristically insufficient suppression during external tasks \u2014 meaning that the resting-state internal-thought network tends to stay active when the external task network should be dominant. The practical consequence is the familiar ADHD experience: the mind drifts to an internally generated train of thought precisely when an external task demands sustained engagement. In AuDHD, both disruptions are present simultaneously. The salience network is hyperconnected in the autism dimension and the DMN fails to suppress adequately in the ADHD dimension. The compound effect is a systematic bias toward internal, interest-driven states \u2014 the neurological substrate of what clinicians observe as the AuDHD autonomy drive."), /* @__PURE__ */ React.createElement("div", { style: { margin: "40px 0" } }, /* @__PURE__ */ React.createElement(NetworkSwitchingDiagram, null)), /* @__PURE__ */ React.createElement(Prose, null, "There is a further dimension of this network architecture that has received insufficient clinical attention: interoception. The anterior insula, the salience network's primary hub, is not only the gatekeeper of external attention \u2014 it is the primary cortical region for interoceptive awareness, the perception of the body's internal states. Research by Mantzalas and colleagues, published in ", /* @__PURE__ */ React.createElement("em", null, "Autism Research"), " in 2024, confirmed that co-occurring alexithymia and poor interoception are disproportionately prevalent among autistic individuals, interfering with emotional regulation and the early detection of bodily signals of stress. AuDHD individuals \u2014 with atypical insular connectivity from two separate neurological sources \u2014 may experience both hypo- and hyper-interoceptive states, sometimes missing hunger, fatigue, or stress accumulation until the deficit is acute, while at other times experiencing minor physical sensations as overwhelming. This interoceptive instability has direct consequences for the burnout trajectory that is among the most clinically significant features of AuDHD life."), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Prose, null, "The subject of Emma Craddock's 2024 study in ", /* @__PURE__ */ React.createElement("em", null, "Qualitative Health Research"), " \u2014 among the first peer-reviewed investigations to examine AuDHD specifically through a gendered lens \u2014 was not neurons or neurotransmitters. It was the lived experience of six women, aged 34 to 55, who had all received their combined autism and ADHD diagnoses in adulthood, most within three years of the study. Craddock's analysis, using interpretative phenomenological method on email interviews, found a consistent and devastating pattern: these women had spent decades masking their neurodivergence \u2014 consciously and unconsciously suppressing autistic traits, mirroring neurotypical social performances, maintaining external appearances of functioning \u2014 while their actual cognitive and emotional reserves were depleted far below sustainable levels."), /* @__PURE__ */ React.createElement(Prose, null, `The gendered dimension is not incidental. Historically, both ADHD and autism have been considered male conditions, with diagnosis four times more likely for males than females in published research. Diagnostic criteria were developed from predominantly male samples, systematically missing the presentations that are more common in women and gender-diverse individuals \u2014 internalised rather than externalised symptoms, compensatory social strategies that obscure impairments, and the particular kind of exhaustion that comes from spending years performing competent functioning from an actual position of profound neurological difference. As Craddock's participants put it: being undiagnosed as an AuDHD woman is "a confusing and traumatising experience with profound and enduring repercussions." Perimenopause, with its hormonal effects on dopamine and serotonin regulation, was frequently cited as the crisis that finally made the performance unsustainable \u2014 the catalyst for a diagnosis that arrived, in several cases, after more than four decades of unexplained struggle.`), /* @__PURE__ */ React.createElement("div", { style: { margin: "40px 0" } }, /* @__PURE__ */ React.createElement("img", { src: "https://stockcake.com/i/focused-creative-work_808543_977503", alt: "Person absorbed in writing, focused", style: { width: "100%", borderRadius: 2, display: "block" }, onError: (e) => {
    e.target.style.display = "none";
  } }), /* @__PURE__ */ React.createElement(ImgCaption, { label: "Consequence", text: "For AuDHD women and gender-diverse individuals, the cost of decades of masking is not abstract. It is neurological: sustained suppression of natural attentional and processing tendencies, maintained against the grain of the interest-based nervous system, depletes the very reserves that make recovery from burnout possible. Craddock (2024) found that diagnosis \u2014 when it finally came \u2014 enabled participants to 'overcome epistemic injustice' and access a standpoint from which they could begin to understand and advocate for their own neurological needs." })), /* @__PURE__ */ React.createElement(Prose, null, "The neurological mechanism of masking connects directly to the catecholamine and network architecture described earlier. Performing neurotypicality \u2014 maintaining eye contact, modulating tone, suppressing stimming, following external agendas \u2014 requires sustained top-down prefrontal executive control applied against the grain of the monotropic attentional system's natural tendencies. This is the neurological equivalent of holding a heavy door open for an extended period: the muscular effort involved is real, and the fatigue it produces is real, even when no one watching can see the exertion. What makes AuDHD masking neurobiologically different from ordinary social effort is that it requires simultaneously suppressing the attentional tunnel (keeping the interest-based system offline when it wants to activate) and maintaining a performance of external engagement (keeping the task-positive network online when the DMN keeps asserting its pull). The catecholamine system that would normally sustain this kind of dual effort is already running below optimal baseline. The deficit accumulates invisibly until the system's entire reserve is consumed."), /* @__PURE__ */ React.createElement("div", { style: { margin: "40px 0" } }, /* @__PURE__ */ React.createElement(BurnoutCycleChart, null)), /* @__PURE__ */ React.createElement(Sidebar, { title: "The Burnout-Autonomy Paradox: Why Rest Isn't Enough" }, "Autistic burnout \u2014 distinct from occupational burnout and from major depressive disorder, as Mantzalas and colleagues confirmed in their 2024 validation study in ", /* @__PURE__ */ React.createElement("em", null, "Autism Research"), " \u2014 is characterised by three core features: chronic exhaustion beyond ordinary tiredness, reduced functioning in areas previously manageable, and increased perceptual and sensory sensitivity. In AuDHD, the burnout profile is particularly complex because the ADHD dimension contributes its own version of cognitive exhaustion from sustained demand-compliance, while the autistic dimension contributes the additional burden of masking.", /* @__PURE__ */ React.createElement("br", null), /* @__PURE__ */ React.createElement("br", null), 'What the clinical literature consistently finds \u2014 and what the neuroscience of the autonomy drive predicts \u2014 is that standard recovery advice ("rest more," "reduce commitments") is necessary but insufficient. The specific protective factor that enables genuine recovery in autistic burnout is autonomy-restoration: access to interest-led activity, reduction in masking demands, and predictable, self-paced engagement. Arnold and colleagues (2023) identified special interests as actively re-energising \u2014 not merely pleasant, but neurologically restorative in a way that undirected rest is not. The mechanism is coherent with what we know about the monotropic architecture: the interest-tunnel is not simply a preference; it is the attentional mode in which this nervous system achieves homeostatic regulation. Blocking it depletes; accessing it restores.', /* @__PURE__ */ React.createElement("br", null), /* @__PURE__ */ React.createElement("br", null), "This has direct clinical implications. Interventions designed for AuDHD burnout that do not explicitly restore autonomy and interest-access are, at the neurological level, treating the symptom without addressing the cause. The burnout trajectory's recovery phase is not governed by amount of rest, but by the degree to which the interest-based nervous system is given permission to do what it is built to do."), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Prose, null, 'It is a convention of neurodiversity writing to arrive at a section labelled "strengths" as a kind of moral obligation \u2014 to follow a frank account of challenges with an equally frank account of what this population can do. This section resists that convention. Not because the strengths are not real \u2014 they are, and the research is clear about them \u2014 but because framing them as compensation for deficits perpetuates the same architecture of comparison that the science now argues is the wrong frame entirely.'), /* @__PURE__ */ React.createElement(Prose, null, "What the convergent evidence from self-determination theory, monotropism research, and the neuroimaging literature actually suggests is not that AuDHD individuals have deficits with compensating strengths. It suggests that they have a different cognitive topology \u2014 one that produces extraordinary performance under conditions of interest-alignment and profound underperformance under conditions of external-demand compliance. The pattern recognition abilities that Psychology Today's review of AuDHD strengths (2025) describes \u2014 the perception of systems rather than isolated parts, the connection of ideas across disciplinary boundaries, the integration of detail into holistic synthesis \u2014 are not bonuses layered on top of a deficit profile. They are the other face of the same attentional architecture. The tunnel that makes multi-task switching costly is the tunnel that makes deep expertise possible. They are not separable features but aspects of a single processing style."), /* @__PURE__ */ React.createElement("div", { style: { margin: "40px 0" } }, /* @__PURE__ */ React.createElement(StrengthsRadar, null)), /* @__PURE__ */ React.createElement(Prose, null, "Seen this way, Aristotle's entelechy becomes not merely a useful metaphor but a functionally accurate description of what the neuroscience is showing. The concept, introduced in the fourth century BCE, describes the condition of a thing whose structure contains its own directional becoming \u2014 the acorn's orientation toward oak, the inherent telos that is not added to the organism from outside but intrinsic to its form. In the AuDHD brain, something analogous is encoded in the geometry of dopaminergic thresholds and the topology of attention tunnels. The direction of maximum motivational pull \u2014 the direction in which this particular nervous system does its most characteristic, least effortful, most generative work \u2014 is inward, toward self-generated meaning, toward interest-aligned engagement, toward the conditions under which the salience network is not fighting the task-positive network for control of resources because the interest itself provides all the salience that is needed."), /* @__PURE__ */ React.createElement(Prose, null, "This does not mean that AuDHD individuals cannot function in externally regulated environments. Many do, at significant neurological cost, for extended periods. What the research consistently shows is that they function best \u2014 not merely more comfortably, but measurably better in terms of output, creativity, error rate, and sustained engagement \u2014 in conditions of autonomy-support. The ADAPT clinical data, the Morsink SDT framework, and the monotropism flow research all converge on this functional claim from different methodological directions. Externally regulated, reward-and-punishment motivation architectures do not just fail for this population \u2014 they actively conflict with the neurological conditions under which this particular brain does its best work. Interest-based engagement is not a workaround. It is the substrate."), /* @__PURE__ */ React.createElement("div", { style: { margin: "40px 0" } }, /* @__PURE__ */ React.createElement("img", { src: "https://dreamstime.com/stock-photo-sunlight-entering-room-morning-image56299253", alt: "Morning light entering a room through a window", style: { width: "100%", borderRadius: 2, display: "block" }, onError: (e) => {
    e.target.onerror = null;
    e.target.src = "https://burst.shopifycdn.com/photos/window-sunlight.jpg";
  } }), /* @__PURE__ */ React.createElement(ImgCaption, { label: "Resolution", text: "The moment when conditions align \u2014 when interest meets adequate autonomy, when the attention tunnel is permitted rather than suppressed \u2014 is not a metaphor for AuDHD flourishing. It has a precise neurological signature: optimal catecholamine tone, DMN suppressed, task-positive network engaged by intrinsic salience rather than commanded by external pressure. This is what entelechy looks like in practice: a structure finally given the conditions to become what it is built to be." })), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Prose, null, "Whether research will eventually produce a formal diagnostic category for AuDHD \u2014 distinct from both autism and ADHD separately \u2014 remains genuinely open. The Bedford neuroimaging findings, the Monotropism Questionnaire data showing AuDHD individuals score highest on the instrument regardless of which single-condition group is compared, the genomic work establishing at least seven shared genetic loci between autism and ADHD while preserving distinct neurobiological signatures, and the qualitative literature from Craddock, Heasman, and Murray's extended research community collectively build a case that something real and important is being described by the informal term. The Diagnostic and Statistical Manual, however, like all diagnostic systems, lags behind the neuroscience it attempts to codify. It took fifty years of research into the overlap between autism and ADHD before the DSM-5 finally allowed both to be diagnosed in the same individual in 2013. The wait for a unified AuDHD framework may be shorter, but it has not yet arrived."), /* @__PURE__ */ React.createElement(PullQuote, null, `"The monotropic brain doesn't need to be fixed or redirected. It needs to be understood \u2014 and given the room to find what it is already, structurally, trying to become."`), /* @__PURE__ */ React.createElement(Prose, null, "What the research does support, clearly and with increasing mechanistic specificity, is the necessity of designing environments and interventions around the principle of autonomy-support for this population. Not as a concession to preference, not as a therapeutic accommodation, but as a neurologically indicated design principle. The interest-based nervous system is not a metaphor \u2014 it is a description of a dopaminergic architecture whose salience calibration is set for intrinsic motivation and whose attentional topology routes processing through interest-aligned tunnels. Designing for it is not a matter of lowering expectations. It is a matter of understanding the conditions under which this particular brain's considerable capacity is actually available."), /* @__PURE__ */ React.createElement(Prose, null, "The diagnostic blind spot that allowed millions of AuDHD individuals \u2014 disproportionately women and gender-diverse people, disproportionately those who masked well, disproportionately those whose presentations did not conform to the male-ADHD and male-autism archetypes that research built its criteria around \u2014 to go undiagnosed and unsupported for decades is not merely a scientific failure. It is the accumulated cost of designing clinical systems for a different brain, and then measuring everyone else's functioning against it. The neuroscience now available \u2014 from Bedford's cortical charts to Murray's attention tunnels to the SDT framework's clinical operationalisation \u2014 provides enough of a foundation to begin designing differently. The acorn already knows what it is trying to become. The question is what the environment is willing to do about it."), /* @__PURE__ */ React.createElement(Prose, { italic: true, large: true }, "Aristotle's oak tree does not grow toward the sun because it is trying to be helpful. It grows toward the sun because that is what the acorn contains \u2014 a direction, a becoming, a f
