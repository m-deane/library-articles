h is, as of this writing, still on fire; east to the brick ruins of Merv, one of the largest cities in the medieval world before Tolui Khan flattened it in 1221; west across the desert by overnight train to Turkmenbashi on the Caspian; and from there north into the Yangykala canyons, a Cretaceous escarpment of pink and white limestone that does not appear on any tourist map because, until quite recently, the country did not believe foreigners should be there. The total distance is roughly 2,400 kilometres. Every kilometre of it must be covered with a licensed guide present in the vehicle. This is non-negotiable, and it has been non-negotiable since approximately 2017, when the visa regime was tightened in ways the Foreign Ministry has never quite explained.`), /* @__PURE__ */ React.createElement(P, null, `I had been told, by friends who had been before, to think of Turkmenistan as a country one visits despite the government rather than because of it. I had taken this to be the standard caveat travellers offer about closed countries \u2014 the same line one hears about Bhutan, North Korea, Eritrea, Saudi until recently. After ten days I revised the formula. Turkmenistan is not a country one visits despite the government. It is a country in which the government has been so total a presence in the construction of public space that one cannot, at any point during a visit, tell where the state ends and the landscape begins. The marble is the state. The gardeners are the state. The empty boulevards are the state. The crater is the state, even though the crater has been burning longer than the state has existed. Even the absence of people in the photographs is the state. It is a country in which the question is not <em>what is here</em> but <em>what is allowed to be here</em>, and the answer changes from week to week in ways that only Maksat, watching the news in Russian on a phone propped against the dashboard, seems able to track.`), /* @__PURE__ */ React.createElement(P come back without difficulty. So most of us do not leave. We stay and we make small things. I have a friend in Mary who plays guitar. We send each other recordings on Telegram. The state cannot hear them, we think. We are not certain." He smiles, and it is the smile of someone who has practised not minding. "It is fine," he says, in the voice of someone for whom the word <em>fine</em> is a defensive perimeter. "It is fine."`)), /* @__PURE__ */ React.createElement(Sec, { n: "2", title: "The Door to Hell, or Whatever Is Left of It" }, /* @__PURE__ */ React.createElement(P, null, `The drive north from Ashgabat to the Darvaza gas crater is two hundred and seventy kilometres through the Karakum \u2014 the "Black Sand" desert, which is not in fact black but a granular dun colour that turns lavender at dusk. The road is the M37, formerly part of the Soviet trunk that ran all the way to Khiva and Bukhara. It is paved as far as Erbent, a roadside settlement of perhaps three hundred people where camels graze on saxaul scrub between the houses, and then the asphalt begins to deteriorate in long ribbons of patched tarmac, and the desert begins in earnest. Maksat drives a 2018 Toyota Land Cruiser with sand mats strapped to the roof rack. The fuel light comes on once between Ashgabat and Erbent. Petrol in Turkmenistan is approximately twenty cents a litre at the official rate \u2014 the gas reserves under our wheels are the world's fourth-largest, and the Galkynysh field alone is one of the largest single deposits ever surveyed \u2014 but petrol stations in the Karakum are spaced two hundred kilometres apart and several of them have, on this particular afternoon, no electricity to run the pumps.`), /* @__PURE__ */ React.createElement(P, null, `The crater itself is at 40.252\xB0N, 58.439\xB0E \u2014 a coordinate I have ready in my phone because I have been preparing this stop, in a low-grade way, for fifteen years. The story, repeated in every guidebook and never adequately sourced, is that in 1971 a Soviet drilling rig prospecting for natural gas collapsed into a sinkhole, and the engineers \u2014 fearing the release of methane and hydrogen sulphide \u2014 set the gas alight, expecting it to burn off in a matter of weeks. It has not burnt off. It has burnt for fifty-five years. The Turkmen call it <em>Gazlandyrylan \xC7ukur</em>, which translates roughly as "the gas-filled pit"; foreign tour brochures rebranded it the Door to Hell sometime in the 2000s and the name has stuck even within Turkmenistan, where official discourse now refers to the site as "the Shining of Karakum" in an attempt to soften the eschatology.`), /* @__PURE__ */ React.createElement(

ned flame. What remains is a kind of broken halo of fires around the inner walls of the crater, perhaps three or four hundred separate flames, ranging in size from candle to bonfire. The total light output is still considerable. It is enough to read a book by, at the rim, with the screen of a phone switched off. It is enough that the orange glow is visible from the road twelve kilometres away. But it is no longer the apocalyptic spectacle it once was. It is, instead, something stranger: a dying fire in slow motion, a fire that has begun to forget what it was doing.`), /* @__PURE__ */ React.createElement(

te and pale yellow, banded in horizontal strata, and the largest of the gorges drops three hundred metres in a near-vertical face that Maksat refers to as <em>the crocodile's mouth</em>, on account of the hooked outcrop at its end.`), /* @__PURE__ */ React.createElement(
