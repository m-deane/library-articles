  ), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "Prof. Timmy Gambin has been thinking about this ship for the better part of his professional life. Born and raised on Malta, the Professor of Maritime Archaeology at the University of Malta obtained his doctorate from the University of Bristol and returned to the island that had formed him \u2014 to a seabed that, he has argued repeatedly in public lectures and peer-reviewed papers, is among the most archaeologically dense bodies of water on Earth. The Maltese archipelago sits at the precise intersection of every ancient Mediterranean trade route: between Carthage and Sicily, between the Levantine coast and the western ocean, between the Greek world and the emerging civilisations of North Africa. Almost everything that moved through the central Mediterranean passed through or past these islands."), /* @__PURE__ */ React.createElement(Para, null, "In 2007, a side-scan sonar survey conducted by the University of Malta and the AURORA Trust \u2014 a systematic effort to map Malta's underwater cultural heritage \u2014 detected an anomaly in the sonar data approximately 900 metres off the Xlendi headland of Ras il-Wardija. The anomaly's shape and its position in the data were distinct from the featureless seabed surrounding it. It was the right shape. The right size. The right kind of irregularity. Further investigation confirmed what the shape had implied: a Phoenician trade vessel, lying undisturbed at 110 metres, its upper cargo layer exposed on the seabed, dozens of amphorae visible to the first cameras lowered to the site."), /* @__PURE__ */ React.createElement(Para, null, "The problem was the depth. Most excavatable ancient shipwrecks lie at fifty metres or less \u2014 the Uluburun Bronze Age wreck off the Turkish coast, excavated in eleven seasons between 1984 and 1994, yielded more than 18,000 artefacts from a depth of forty-four to sixty-one metres, accessible to sport-trained divers working in pairs. At 110 metres, the Xlendi site required something fundamentally different: divers operating in the technical range, on rebreathers, with trimix gas, capable of reaching the site and doing useful work in the twelve to fourteen minutes of bottom time the decompression mathematics would allow before the clock ran out. It took seven years of survey, planning, and equipment development before Gambin's team made the first diver-based recovery in 2016."), /* @__PURE__ */ React.createElement(PullQuote, null, '"It took experienced divers eight minutes to reach the site, where they could stay for no longer than fourteen minutes. Surfacing took an additional two and a half hours."'), /* @__PURE__ */ React.createElement(Para, null, "The team Gambin assembled was accordingly extraordinary. Dave Gration, a TDI and IART Instructor Trainer and IANTD Rebreather Instructor who has spent more than thirty years diving everything from the ", /* @__PURE__ */ React.createElement("em", null, "Britannic"), " to the ", /* @__PURE__ */ React.createElement("em", null, "Lusitania"), ", became the Diving Safety Officer for the University of Malta and Underwater Cultural Heritage Malta \u2014 the person whose job it is to ensure that the ambitions of the archaeology do not exceed the safety margins of the diving. He and Gambin became the public face of a project that was achieving something no project had achieved before: scientific excavation of an ancient shipwreck by human divers at depths beyond 100 metres."), /* @__PURE__ */ React.createElement(Para, null, "The methodological innovations were as significant as the archaeological discoveries. A rigid grid system was deployed over the wreck to allow systematic recording; a hydraulic-powered submersible pump was lowered to the seabed to act as a dredge for sediment removal; mirrorless cameras with powerful lights were used to capture thousands of images daily that were processed into three-dimensional photogrammetric models of the excavation's progress \u2014 allowing archaeologists on the surface to study the site in detail between dives. Artefacts were transported to the surface in a custom-made cage attached to powerful lifting bags. The entire system was a kind of prosthesis for human attention: the divers spent fourteen minutes doing what only human hands and human judgement could do, while technology did everything else."), /* @__PURE__ */ React.createElement(Sidebar, { title: "The 110-Metre Dive \u2014 What CCR Trimix Makes Possible" }, /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "1em" } }, "A closed-circuit rebreather (CCR) dive to 110 metres is one of the most physiologically demanding activities a human being can routinely undertake. Understanding why requires understanding what the body does under pressure."), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "1em" } }, 'At 110 metres, the ambient pressure is 11 bar \u2014 eleven times the pressure at the surface. Every gas a diver breathes is at 11 times its normal partial pressure. On ordinary compressed air, this would mean catastrophic nitrogen narcosis (the "rapture of the deep") and lethal oxygen toxicity within minutes. Trimix \u2014 a blend of helium, oxygen, and nitrogen \u2014 solves both problems: helium replaces the narcotic nitrogen in the breathing mix, keeping the equivalent narcotic depth manageable; the oxygen percentage is kept low enough to prevent toxicity at depth.'), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "1em" } }, "The rebreather adds a further layer of control. Unlike open-circuit scuba, which delivers gas at a fixed mixture regardless of depth, a CCR maintains a constant partial pressure of oxygen \u2014 typically 1.3 ATA \u2014 by automatically adjusting the oxygen fraction as depth changes. The diver breathes a gas that is continuously optimised for their current depth. Carbon dioxide is scrubbed from exhaled gas by a chemical absorbent canister; oxygen is replenished from a small cylinder; the rest of the gas is recycled. This is why there are no bubbles, and why a CCR diver can stay underwater for hours \u2014 their gas supply is consumed only by metabolic oxygen use, not by breathing volume."), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "1em" } }, "The decompression obligation is the governing constraint. At 110 metres for fourteen minutes, a diver's body tissues \u2014 bone, fat, nerve, blood \u2014 have absorbed helium and nitrogen at high pressure. Ascending too quickly means those gases can form bubbles in the bloodstream, causing decompression sickness (the bends) \u2014 potentially fatal. The ascent must be staged: deep stops at 80m and 50m to begin off-gassing; gas switches at 21m (to 50/50 nitrox to accelerate nitrogen washout) and 6m (to pure oxygen for maximum off-gassing efficiency); extended stops at 9m and 3m. The total ascent time from 110 metres after fourteen minutes of bottom time: approximately two and a half hours."), /* @__PURE__ */ React.createElement("p", null, "High-Pressure Nervous Syndrome (HPNS) \u2014 a neurological condition characterised by tremors, dizziness, and cognitive impairment caused by helium under high pressure \u2014 becomes clinically significant at depths below 150 metres. At 110 metres, divers may experience sub-threshold precursor effects, particularly if descending rapidly. The Xlendi team managed this by controlling descent rate, typically aiming for no more than 15 to 18 metres per minute. Three to four bailout cylinders containing independent gas supplies are carried in case of rebreather failure at depth \u2014 because at 110 metres, the rebreather is the only thing standing between the diver and the ocean.")), /* @__PURE__ */ React.createElement(WaterColumn, null), /* @__PURE__ */ React.createElement(

  ), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "The petrographic analysis of the Xlendi cargo \u2014 published in 2021 in the journal ", /* @__PURE__ */ React.createElement("em", null, "Libyan Studies"), " by a team from the University of Malta, the University of Aix-Marseille, and the French National Centre for Scientific Research (CNRS) \u2014 concluded that the ship was carrying goods from the Maltese islands, North Tunisia, and possibly Sicily. The ceramic typing was performed by Jean-Christophe Sourisseau of Aix-Marseille University, whose analysis of the amphora forms placed the wreck in the first quarter of the seventh century BC \u2014 approximately 675 to 700 BC. This makes it, as the team's publications state repeatedly, the oldest known shipwreck in the central Mediterranean."), /* @__PURE__ */ React.createElement(Para, null, "That is a claim with significant weight behind it. There are older wrecks elsewhere in the Mediterranean \u2014 the Uluburun cargo vessel dates to around 1300 BC, six centuries earlier \u2014 but none older have been found in the central sea between Sicily and North Africa. And the Xlendi wreck is not merely old: it is the only well-preserved, intact Phoenician cargo so far discovered. Of the seven known Phoenician shipwrecks worldwide, the others are in various states of disruption or partial preservation. The Xlendi site, protected by depth, cold, and silt, has yielded a snapshot of Phoenician commercial practice that is unprecedented in its completeness."), /* @__PURE__ */ React.createElement(Para, null, `The cargo's heterogeneity is itself the data. A ship loading only local Maltese goods would not need amphorae from North Tunisia. A ship loading only Tunisian goods would not have Gozitan hybrid ceramics. The Pantellerian millstones are from neither Malta nor Tunisia but from a volcanic island between them. The vessel was working the central Mediterranean as a mobile market \u2014 stopping, trading, loading, moving \u2014 following a circuit that connected communities across a sea that had no roads and whose distances were measured in sailing days. The Phoenicians called this their world; Fernand Braudel, writing two and a half millennia later, called it an early "world-economy." The Xlendi cargo is one of its nodes.`), /* @__PURE__ */ React.createElement(Para, null, `And then there is the tooth. In 2021, the final season of excavation, a diver's fingers working through the lower sediment of the wreck found a human lower right first molar, buried in the dark at 110 metres. It belonged to a young person \u2014 the minimal wear and the large pulp chamber suggested adolescence or early adulthood. Prof. Gambin described the implications as "huge": carbon dating and DNA analysis might, in principle, reveal something about the people on board this ship \u2014 their geographic origin, their relationship to modern Maltese genetics, their age and health. It is the first human remain recovered from the site. Somewhere in a laboratory, in collaboration with international specialists, this tooth is being read for everything a tooth can say about a life that ended 2,700 years ago in a body of water that has no memory of it.`), /* @__PURE__ */ React.createElement(Sidebar, { title: "The Phoenician Trade Network \u2014 7th Century BC" }, /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "1em" } }, "The Phoenicians of the 7th century BC were the dominant maritime trading civilisation of the Mediterranean world \u2014 the people who first connected the Atlantic coast of Iberia to the coasts of the Levant and North Africa in a single economic network. Based in the city-states of Tyre, Sidon, and Byblos on the coast of modern Lebanon, they founded colonies across the Mediterranean basin: at Carthage in North Africa (traditionally c. 814 BC), at Motya in Sicily, Sulky in Sardinia, Gadir at the mouth of the Atlantic, and on Malta and Gozo, where Ras il-Wardija \u2014 the very headland beneath which the Xlendi wreck lies \u2014 is the site of a known Phoenician-Punic sanctuary dedicated to the goddess Astarte."), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "1em" } }, "Their ships were typically twelve to twenty metres long, with a rounded hull optimised for cargo capacity rather than speed. They were built using the mortise-and-tenon technique: planks fitted together by carefully cut wooden tongues and slots, the hull assembled from the outside in, producing a vessel of remarkable strength without iron fastenings. The Xlendi excavation found evidence of this technique in wooden fragments recovered from the lower sediment in 2020 \u2014 six hull planks in situ, with a mortise-and-tenon joint visible in the cross-section of the timber."), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "1em" } }, "The Phoenician cargo economy was organised around amphorae \u2014 the standardised ceramic containers of the ancient world, shaped for stacking in ships' holds, for sealing with pitch or resin, for the transport of oil, wine, salt fish, grain, and pitch itself. Their shapes and clay fabrics are fingerprints of origin: a trained ceramic typologist like Jean-Christophe Sourisseau can read a broken amphora sherd the way a forensic scientist reads a tissue sample, identifying the clay source and production technique to within a region, sometimes to within a single workshop."), /* @__PURE__ */ React.createElement("p", null, "The Xlendi amphorae told Sourisseau a story of a ship that had been to at least three distinct production zones before it sank. The heterogeneity of the cargo argues against a simple two-port trading voyage; it suggests a ship working a circuit \u2014 loading and trading, picking up and dropping off, accumulating a hold full of goods from multiple suppliers, each one a connection in a network that stretched, in the 7th century BC, from the British Isles to Mesopotamia.")), /* @__PURE__ */ React.createElement(Para, null, "In August 2023, Malta inaugurated the world's first deepwater archaeological park. The protected zone covers 67,000 square metres of seabed around the Xlendi site, encompassing not only the Phoenician wreck but also a second ancient site \u2014 the Tower Wreck, a third-century BC vessel at 105 metres depth, its cargo of Punic amphorae scattered across the sandy seabed near the seventeenth-century coastal watchtower that guards the entrance to Xlendi Bay. Heritage Malta declared the area an Archaeological Zone at Sea in 2020; Malta ratified the UNESCO Convention on the Protection of the Underwater Cultural Heritage in 2021; the park itself opened to technical divers in the summer of 2023."), /* @__PURE__ */ React.createElement(Para, null, "The decision to open the park to licensed technical divers \u2014 rather than restricting access entirely to scientific teams \u2014 reflects a philosophy that Gambin has argued for throughout his career: that underwater cultural heritage is best protected by being seen. A site that only scientists can visit is a site that most people will never have a reason to care about protecting. A site that can be visited by qualified technical divers, under protocols administered by Heritage Malta and licensed dive centres, is a site with a constituency \u2014 people who have been there, who have floated above the amphorae in the dark, who have something personal at stake in the site's continued preservation."), /* @__PURE__ */ React.createElement(Para, null, "For Malta, this is also a calculated economic and reputational bet. The island is already one of the world's premier technical diving destinations \u2014 exceptional visibility in a sea without strong currents, a seabed dense with wrecks from antiquity through the Second World War, a diving infrastructure built by decades of recreational and technical diving tourism. The Xlendi Deepwater Archaeological Park adds something that no other destination can offer: a certified ancient shipwreck at 110 metres, surrounded by intact cargo that has been lying there since before the Roman Empire existed."), /* @__PURE__ */ React.createElement(WreckComparison, null), /* @__PURE__ */ React.createElement(

  ), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Para, null, "Back at depth, the timer on the dive computer shows twelve minutes of bottom time elapsed. The diver lifts the artefact \u2014 a small ceramic urn, perhaps Gozitan in origin \u2014 into the lifting cage. The camera, mounted on a small arm, fires continuously, capturing thousands of images for the photogrammetric model that will let the surface team reconstruct exactly where the urn was, what was beneath it, what the disturbance of its removal reveals about the stratigraphy below. Everything about this dive is designed to extract the maximum information from a timespan that is measured not in hours but in minutes."), /* @__PURE__ */ React.createElement(Para, null, "Two minutes remaining. The diver begins to move away from the wreck, letting the lifting bag carry the cage upward on its controlled ascent. The beam of the dive light sweeps across the debris field one final time: the amphorae, the millstones, the dark silt that has kept this cargo undisturbed for 2,700 years. Somewhere in that silt, the lower sediment layers hold more of the ship \u2014 more wood, perhaps more personal objects, perhaps more human remains. The 2021 excavation covered the lower deposits with geotextile and sandbags, protecting them for future technology, future methodologies, future divers who will come to this place equipped with tools that do not yet exist."), /* @__PURE__ */ React.createElement(Para, null, "The diver begins to ascend. At 110 metres, the mooring line appears in the beam of the dive light, rising toward a surface that is two and a half hours away. The decompression clock starts. The ocean begins its slow, insistent demand for the body to give back what it took."), /* @__PURE__ */ React.createElement(Sidebar, { title: "Who Owns the Past? \u2014 Heritage, Access, and the Law of the Deep" }, /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "1em" } }, "The legal and ethical framework governing underwater cultural heritage has been evolving for decades, driven in part by two contradictory realities: that the sea contains an extraordinary density of the human past, and that human access to that past \u2014 beyond roughly fifty metres \u2014 was essentially impossible until the last twenty years of technical diving development."), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "1em" } }, "The UNESCO Convention on the Protection of the Underwater Cultural Heritage (2001) establishes the core principle: underwater cultural heritage should be preserved in situ wherever possible, with in situ preservation preferred over excavation, and commercial exploitation strictly prohibited. Malta ratified the convention in 2021, having already incorporated its core principles into domestic heritage legislation in 2019. The Xlendi site is now an Archaeological Zone at Sea under Maltese law, with defined buffer zones, regulated access procedures, and mandatory monitoring by Heritage Malta's Underwater Cultural Heritage Unit."), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: "1em" } }, "The tension the convention tries to navigate is between protection and access. A site that is legally protected but effectively invisible \u2014 that no one can visit, that produces no public engagement, that exists only in academic publications \u2014 is a site that lacks the constituency needed to ensure its long-term survival. The Xlendi Deepwater Archaeological Park tries to resolve this tension by creating a managed access regime: technical divers can visit through licensed dive centres, under protocols that include mandatory briefings, prohibited zones around the active archaeological site, and regular monitoring to check for disturbance."), /* @__PURE__ */ React.createElement("p", null, "The deeper question is one that the archaeology itself forces: who has a claim on a ship that sank in Phoenician waters, ailors who read the stars and the currents and the colour of the water. They crossed a sea that had no rescue services and no guarantee of return. The ocean did not care about their commerce or their families or the economic network that depended on their arrival. It took the ship when it chose to, and that was the end of the matter."), /* @__PURE__ */ React.createElement(Para, null, "The divers who go down to meet them are also operating at the limit of their technology. The closed-circuit rebreather is perhaps twenty years old as a routinely deployable diving tool; the ability to do useful scientific work at 110 metres with a rebreather and trimix gas is newer still. The team that descended to the Xlendi wreck between 2016 and 2021 was doing something that had never been done before at that depth \u2014 developing the methodology as they went, learning from each season what the next season needed. They too were crossing a body of water that had no guarantee of safe return. The decompression mathematics are reliable, but they are not infallible; the rebreather is redundant, but redundancy is not immunity. Dave Gration has made his career in the study of what rebreathers do at depth. He knows the instrument's failure modes intimately. Knowing them is part of why he is still here to describe them."), /* @__PURE__ */ React.createElement(Para, { style: { fontStyle: "italic", fontSize: "1.22rem", color: C.deepBlue, lineHeight: 1.82 } }, "At 110 metres, the water does not distinguish between them. The Phoenician sailor whose tooth rests in a laboratory somewhere and the CCR diver who found it are separated by 2,700 years and nothing else \u2014 not geography, not vocation, not the fundamental condition of being a human being who went to sea in a vessel that might not come back. The distance between them is measured not in centuries but in centimetres: the depth of silt that accumulated between the last moment of the ship's voyage and the first moment of the diver's lamp.         box.textContent = '[render error] ' + (err && err.message ? err.message : err);
      }
      console.error(err);
    }
  </script>

  <!-- PWA service worker registration (Wave 4) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function (err) {
          console.warn('SW register failed:', err);
        });
      });
    }
  </script>
</body>
