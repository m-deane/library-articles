Income growth 2019\u21922026: ~+30%   (ONS ASHE London)`), /* @__PURE__ */ React.createElement(C2LadderChart, null), /* @__PURE__ */ React.createElement(Cap, null, `The detached-minus-flat gap (red area) tripled its cash-bridge requirement between 2019 and 2022, and has not come back. The 4.5\xD7 LTI ceiling is flat because it is a flow cap, not a function of rates \u2014 wage growth is the only mechanism that can move it. Semi-detached (amber) sits inside affordability throughout.`), /* @__PURE__ */ React.createElement(H3, null, "The caveat that almost flips the thesis"), /* @__PURE__ */ React.createElement(P, null, `Most London upsizers do not target <em>detached</em>. Detached is ~6% of London stock, concentrated in outer prime. The realistic move for a family upsize is <strong>flat \u2192 semi-detached</strong>. Rerun the arithmetic: the bridge is <strong>negative in every year</strong> \u2014 the flat sale proceeds plus a 4.5\xD7 mortgage comfortably clear a London semi in 2019, 2022, and 2026. The commuter belt \u2014 Sevenoaks, St Albans, Guildford \u2014 is where many real-world London upsizers land, and our all-London averages don't capture that migration at all.`), /* @__PURE__ */ React.createElement(P, null, `The counter-narrative is weak here: Rightmove's own data records the flat-house gap widening from \xA324,010 (Feb 2020) to \xA378,198 (Feb 2026) \u2014 a 52% real increase. The broken-ladder story is rock solid for the detached target and softer-but-still-true for the semi.`), /* @__PURE__ */ React.createElement(Verdict, { label: "Supported (for detached); Rejected (for semi)", color: C.red, text: "The detached-flat cash bridge roughly tripled 2019\u20132026 while borrowing capacity stayed flat. For the realistic semi-detached upsize, the arithmetic still works \u2014 particularly if the household broke out of the 4.5\xD7 LTI crowd into the 15% flow allowance above it." })), /* @__PURE__ */ React.createElement(Sec, { n: "4", title: "Thesis 3 \u2014 The anchoring pensioners" }, /* @__PURE__ */ React.createElement(P, null, `<strong>The claim:</strong> older London owners refuse to sell because they anchor on 2022 prices, and this blocks the whole chain. It is the thesis with the least empirical support, and the most rhetorical appeal.`), /* @__PURE__ */ React.createElement(C3UnderOccChart, null), /* @__PURE__ */ React.createElement(Cap, null, `Under-occupation concentrates in outright owners and the over-65s \u2014 but it is a national phenomenon, not a distinctly London one. London owner-occupiers are actually less under-occupied on average than the national pool, because London housing is smaller and denser. Source: Census 2021 (ONS); EHS Older People 2020-21. The 72.5% figure for "older London owner-occupiers" is derived from Census cross-tabs, not published directly.`), /* @__PURE__ */ React.createElement(H3, null, "What the evidence supports"), /* @__PURE__ */ React.createElement(P, null, `Under-occupation among older owner-occupiers is real and large. <strong>67% of owner-occupier households with an HRP aged 65+ have two or more spare bedrooms</strong> (EHS Older People 2020\u201321). Among outright owners of any age it is 89.7% (Census 2021). In London specifically, older owner-occupiers run at around 72.5% (derived from Census cross-tabs). Transaction volumes are collapsed \u2014 London logged fewer sales in 2024 (~68,000) than in 2008 (~82,000+), a 60% fall from the 2006 peak.`), /* @__PURE__ */ React.createElement(H3, null, "What the evidence doesn't support"), /* @__PURE__ */ React.createElement(P, null, `The specific mechanism \u2014 <em>anchoring to 2022 prices</em> \u2014 is nowhere in the data. The English Housing Survey, Legal & General's <em>Last Time Buyer</em> work, the MHCLG Older People's Housing Taskforce, and Centre for Ageing Better research all enumerate reasons older owners don't move. The top reasons are <strong>emotional attachment</strong> (39% of over-75s), the "nuisance" of moving (40%), community ties, a lack of suitable smaller homes nearby, and <strong>Stamp Duty</strong> on the downsize itself. Price-expectation anchoring appears in none of them. MHCLG 2024 is explicit: "financial reasons are rarely a main reason for moving." And L&G found the number of over-55 households intending to downsize was <strong>200,000 lower in 2021 than in 2018</strong> \u2014 intent was falling <em>before</em> the 2022 peak existed to anchor to.`), /* @__PURE__ */ React.createElement(P, null, `The counter-evidence is stronger. Hamptons' January 2026 analysis shows <strong>14.8% of London sales in 2025 closed at a loss</strong>, up from 9.2% in 2019, with flats accounting for 90% of those losses. Average seller gains fell below \xA3200,000 for the first time since 2015. If 60+ owners were successfully anchoring, losses would be falling \u2014 not rising. Rightmove has roughly a third of London listings showing asking-price cuts averaging 7%. The evidence is consistent with <em>anchoring being unwound</em>, not held.`), /* @__PURE__ */ React.createElement(C5LossGainsChart, null), /* @__PURE__ */ React.createElement(Cap, null, `Hamptons' data on London loss-making sales (bars, left axis) and average seller gains (line, right axis) in 2019 vs 2025. If 60+ owners were holding out for 2022 prices, both series should move in the other direction. Source: Hamptons Winter 2025 Market Insight.`), /* @__PURE__ */ React.createElement(H3, null, "A better formulation"), /* @__PURE__ */ React.createElement(P, null, `The binding constraints on older-owner mobility that <em>do</em> show up in the evidence are: (1) Stamp Duty on the downsize purchase, quantified by Mayhew et al. (2024) as a significant London-specific drag; (2) lack of attractive smaller-home stock \u2014 80% of over-65s already live in three-bed or smaller; (3) emotional attachment, documented across multiple surveys; and (4) equity release as a substitute for selling \u2014 Equity Release Council Q1 2025 lending was \xA3665m and rising. "Anchoring to 2022" is plausible, journalistically convenient, and empirically under-evidenced; an honest reformulation is that <strong>older owners face powerful practical dis-incentives to move, most of which pre-date the 2022 peak</strong>.`), /* @__PURE__ */ React.createElement(Callout, { type: "warn", title: "Data gap worth flagging" }, `No UK source publishes vendor age. HMRC, Land Registry and UK Finance transaction files lack an age cross-tab. Hamptons reports tenure length ("8.9 years" in 2024) but not seller age. Claims about "who is selling" in London are therefore inferential, not directly measured.`), /* @__PURE__ */ React.createElement(Verdict, { label: "Partial \u2014 rejected as framed", color: C.accent, text: "The under-occupation and stuck-volumes halves of the thesis are evidenced. The 'anchoring to 2022' mechanism isn't \u2014 it is a hypothesis, not a finding, and the better-documented blockers (SDLT, emotional attachment, lack of suitable stock) pre-date the 2022 peak." })), /* @__PURE__ */ React.createElement(Sec, { n: "5", title: "Thesis 4 \u2014 Stamp Duty as brake" }, /* @__PURE__ */ React.createElement(P, null, `<strong>The claim:</strong> Stamp Duty Land Tax materially discourages London buying and selling. The counter-narrative sweep flagged this as the thesis with the strongest rebuttal \u2014 because the aggregate transaction story in 2025 is more complicated than "suppression."`), /* @__PURE__ */ React.createElement(SdltCliffDiag, null), /* @__PURE__ */ React.createElement(Cap, null, `SDLT rates jump at notches: \xA3125k, \xA3250k, \xA3925k, \xA31.5m. At the London average purchase of \xA3536,000 the bill is roughly \xA316,800 \u2014 3.17% of price, vs 1.55% for the England mean of ~\xA3290k. The Sep 2022\u2013Mar 2025 relief (green dashed) lifted the nil-rate band to \xA3250k; on 1 April 2025 it reverted. Source: GOV.UK SDLT residential rates; Best &amp; Kleven (2018).`), /* @__PURE__ */ React.createElement(H3, null, "The timing effect is enormous"), /* @__PURE__ */ React.createElement(P, null, `The clearest natural experiment in recent UK tax data is the March\u2013April 2025 cliff. UK seasonally adjusted residential transactions ran at 109,700 in February 2025; spiked to <strong>177,370 in March 2025 (+62% m/m, +89% y/y)</strong> as buyers rushed to beat the threshold reversion; then collapsed to roughly <strong>65,000 in April 2025 (-63% m/m)</strong>. It is one of the largest single-month transaction swings ever recorded in UK property data.`), /* @__PURE__ */ React.createElement(C4SdltChart, null), /* @__PURE__ */ React.createElement(Cap, null, `The seasonally adjusted UK residential transactions series around the April 2025 SDLT cliff. March 2025's 177,370 was the third-largest single-month SA jump on record; the crash in April is almost exactly symmetrical. By June the series was back on trend. Source: HMRC UK Property Transactions (SA).`), /* @__PURE__ */ React.createElement(H3, null, "The level effect is smaller and messier"), /* @__PURE__ */ React.createElement(P, null, `Aggregate residential transactions over <strong>FY 2024\u201325 were up 20% y/y</strong> (1,049,600 vs 872,000). November 2025 ran +8% y/y, December +4.7%, February 2026 -6% vs the Feb-25 forestalling-boosted comparator but +6% m/m. In other words, over the year following the SDLT cliff <em>volumes rose</em>, which sits awkwardly with a "materially suppressing" framing.`), /* @__PURE__ */ React.createElement(P, null, `Best and Kleven's 2018 <em>Review of Economic Studies</em> paper \u2014 the canonical UK result \u2014 uses the 2008\u201309 stamp-duty holiday to show a <strong>~20% short-run transaction response</strong> to a 1-percentage-point cut on the affected band, with less than half that stimulus reversing on expiry. They also document the "notch" effect: visible missing mass of transactions above each band threshold and excess bunching below. The OBR's forecast model carries a residential transaction semi-elasticity of around -5 to -7 in year one with respect to the marginal SDLT rate \u2014 large, but meaningfully smaller than Best and Kleven's 20% estimate.`), /* @__PURE__ */ React.createElement(H3, null, "Why London is different"), /* @__PURE__ */ React.createElement(P, null, `The thesis's geographic claim holds. At London's average mortgaged purchase of \xA3536k (HMLR Feb 2026), the SDLT bill is ~\xA316,800 \u2014 <strong>3.17% of the price</strong>. At the England mean of ~\xA3290k, the bill is ~\xA34,500, or 1.55%. London buyers pay roughly 4\xD7 the \xA3 amount and 2\xD7 the share of price. First-time buyers above the \xA3500k FTB cap (the London median FTB sits just above it at ~\xA3680k) lose all FTB relief and pay <strong>standard rates on the full purchase</strong>. The tax's bite is thus structurally concentrated on London.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "Timing \u2260 suppression" }, `The honest version of Thesis 4 is: <strong>SDLT strongly distorts transaction <em>timing</em>, weakly depresses the transaction <em>trend</em>, and bites London harder than the rest of England in \xA3 and as a share of price</strong>. "Materially suppressing" aggregate volumes today is not supported by the 2025 data \u2014 volumes recovered above 2024 by Nov\u2013Dec 2025.`), /* @__PURE__ */ React.createElement(Verdict, { label: "Supported (strongly on timing, partially on level)", color: C.red, text: "Cleanest natural experiment in UK property tax data produced a \xB160% transaction swing around the cliff. The level effect is real but smaller, and London-specific burden in \xA3 and %-of-price is measurably worse than the rest of England. But aggregate 2025 volumes rose, so 'materially suppressing today' overreaches." })), /* @__PURE__ */ React.createElement(Sec, { n: "6", title: "Which thesis bites which buyer?" }, /* @__PURE__ */ React.createElement(P, null, `The four theses don't apply to everyone the same way. A first-time buyer looking at a one-bed flat cares about T1 (affordability) and T4 (SDLT first-time-buyer relief); a family looking to go from a two-bed flat to a detached pile cares about T2 (ladder) most of all; a 68-year-old in a four-bed Edwardian semi cares about T3 (downsizing) and T4 (SDLT on a smaller purchase). The matrix:`), /* @__PURE__ */ React.createElement(DecisionMatrixDiag, null), /* @__PURE__ */ React.createElement(Cap, null, `Cell colour indicates whether the thesis is supported, rejected, partial, or indirect for that buyer archetype. "Indirect" means the thesis is not about that buyer but the market effects cascade through. Entries are the authors' synthesis of the four verdicts above.`), /* @__PURE__ */ React.createElement(H3, null, "What the synthesis says about the market overall"), /* @__PURE__ */ React.createElement(P, null, `The four theses describe <em>different</em> problems. Theses 1 and 2 are about <strong>price-to-income gaps</strong> at different points on the ladder. Thesis 3 is about <strong>stock allocation</strong> \u2014 who lives in what, and why they don't move. Thesis 4 is about a <strong>transaction tax</strong> that sits on top of all three. Only the first two are directly about affordability; the second two are about friction. The market feels stuck not because any one of these is catastrophic, but because all four are binding at the margin simultaneously: flat-buyers face a price wall, movers face a gap wall, downsizers face a friction wall, and everyone faces a tax wall. Fix any one, and the market doesn't free; fix two, and it might.`)), /* @__PURE__ */ React.createElement(Sec, { n: "7", title: "What the data doesn't say" }, /* @__PURE__ */ React.createElement(P, null, `Several things this article deliberately does not claim, for which the evidence was insufficient in the research pass:`), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 24px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Who is actually selling."), ' No UK source publishes vendor age. Claims about "baby boomers refusing to sell" are inferential, from under-occupation rates cross-referenced with transaction volumes, not direct measurement.'), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "The exact share of London flat listings with price reductions."), ' Rightmove reports "record numbers" of cuts but the April 2026 PDF was not parseable; the specific % was not retrieved.'), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Intra-London variation."), ' Zone 1\u20132 and Zone 4\u20136 are very different markets. A single "London flat" aggregate blurs a 0.7% growth Redbridge with a -12% prime K&C fall.'), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "New-build vs second-hand."), " Post-Grenfell cladding remediation, leasehold service-charge inflation, and EWS1 friction disproportionately drag second-hand flat prices. Index values overstate what a buyer actually pays-plus-inherits."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "London-borough monthly transactions"), " \u2014 HMLR publishes the data but the research pass pulled UK-level series. The borough cut would sharpen the SDLT story."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Causal attribution of the December 2025 volume collapse (-36% y/y)"), " \u2014 it almost certainly includes a pull-forward into the SDLT deadline plus end-year budget uncertainty, not purely affordability resistance."))), /* @__PURE__ */ React.createElement(Sec, { n: "8", title: "Plausible policy levers" }, /* @__PURE__ */ React.createElement(P, null, `If the market's stuckness is a four-ring problem, three of those rings have credible named reform proposals. Not endorsements \u2014 just a note that they exist:`), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 24px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "SDLT"), ": the ", /* @__PURE__ */ React.createElement("em", null, "Mirrlees Review"), " (IFS, 2010) recommended abolishing SDLT and folding it into a reformed property tax. Resolution Foundation's ", /* @__PURE__ */ React.createElement("em", null, "Revenue and Reform"), " (September 2024) urged government to cancel the April 2025 threshold reversion specifically. The 2025 Autumn Budget kept rates but added a High Value Council Tax Surcharge on \xA32m+ homes from 2028. The Conservatives pledged full SDLT abolition on primary residences in October 2025."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Mortgage LTI cap"), `: the PRA raised the de-minimis threshold for the 4.5\xD7 LTI flow limit from \xA3100m to \xA3150m in July 2025, an easing but not a structural change. Halifax's "First Time Buyer Boost" (live 2025) lifts the income multiple to 5.5\xD7 for eligible FTB households on \u2265\xA350k, a lender-level workaround.`), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Downsizing stock"), `: the MHCLG Older People's Housing Taskforce (November 2024) identified specialist retirement-housing undersupply as a binding constraint; Mayhew (2020) called for a step-change in purpose-built stock for over-60s. Without new supply, "get older owners to downsize" is a policy without a product.`)), /* @__PURE__ */ React.createElement(P, null, `What is missing from the debate: a clear, quantified proposal that addresses the <strong>gap</strong> rather than the price level \u2014 i.e. a targeted reduction in the flat\u2192house upsize friction, which our data says is the single binding constraint on the mover ladder.`)), /* @__PURE__ */ React.createElement(Sec, { n: "9", title: "Forecast window \u2014 what to watch next 12\u201318 months" }, /* @__PURE__ */ React.createElement(P, null, `If the four theses hold in roughly the shape described above, the following should be observable over the next 12\u201318 months:`), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 24px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "London flat prices"), " continue flat-to-softening in nominal terms but stabilise in real terms as CPI falls back toward 2%. Watch the Land Registry UK HPI release cadence."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "London flat transactions"), " recover from the Dec 2025 -36% y/y trough as the SDLT timing shock unwinds. A test month is March 2026 \u2014 if it's still depressed despite the year-on-year comparator being the forestalling boom, the suppression story deserves a second look."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Semi-detached / outer-London"), " family homes lead the upside (Savills forecasts 2\u20133% 2026 growth for Wimbledon, Richmond, Hampstead). The detached-flat gap may finally narrow from the flat side \u2014 but only if flat prices start to grow, which would require mortgage rates closer to 3%."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "Equity release volumes"), ' continue to grow \u2014 a direct signal that older owners are choosing not to sell, confirming the "friction not anchoring" reframe of T3.'), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("strong", null, "SDLT receipts"), " stay elevated (\xA313.9bn in 2024\u201325) because London prices keep dragging purchases into the 5% and 10% bands. Any reform announced in the Spring Statement 2027 would be the first real test of revenue-elasticity arguments."))), /* @__PURE__ */ React.createElement(Sec, { n: "10", title: "Source Integrity Note" }, /* @__PURE__ */ React.createElement(P, null, `Every numeric claim in this article traces to a Tier-1 source: HM Land Registry UK HPI, ONS (HPI, CPI, ASHE, Housing Affordability, Census 2021, EHS), HMRC UK Property Transactions, Bank of England (Bank Rate, FPC regulatory data), Rightmove/Zoopla HPIs, Nationwide/Halifax HPIs, Hamptons Winter 2025 Market Insight, UK Finance, Best & Kleven (2018), OBR Nov 2025 forecast, MHCLG Older People's Housing Taskforce (Nov 2024), Legal &amp; General (2021), IFS Mirrlees Review (2010), Resolution Foundation <em>Revenue and Reform</em> (Sep 2024), and the Equity Release Council. Retrieval date for all: 2026-04-23.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Tier-2 (composite/illustrative)</strong> figures \u2014 explicitly flagged:`), /* @__PURE__ */ React.createElement("ul", { style: { fontFamily: F.b, fontSize: 16, lineHeight: 1.8, color: C.text, margin: "0 0 18px 22px" } }, /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("em", null, "Monthly repayment calculations"), " (\xA72): based on assumed 2-year fixed rates for 2019 and 2022 because the Bank of England IUMZICQ series was not directly retrievable; the 2025\u201326 values use Rightmove and Uswitch quoted rates. Directional, not precise."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("em", null, "\xA3110,000 household"), " (\xA73): an illustrative upper-quartile dual-earner proxy. ONS does not publish clean dual-earner upper-quartile tables. Sensitivity: at \xA390k the 2026 bridge is ~\xA3314k; at \xA3130k it is ~\xA3134k."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("em", null, "Real-price series in Chart \xA72"), ": rebased to August 2022 \xA3. The pre-2022 segment is a simplification \u2014 a full real-\xA3 series would use CPI back to 2019 directly."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("em", null, "72.5% older London owner-occupier under-occupation"), " (\xA74): derived from Census 2021 cross-tabs; EHS doesn't publish that cell directly."), /* @__PURE__ */ React.createElement("li", null, /* @__PURE__ */ React.createElement("em", null, "\xA75 transaction series"), " is UK-wide, not London-only. London-borough monthly counts were not retrieved.")), /* @__PURE__ */ React.createElement(P, null, `<strong>Tier-3 (invented)</strong>: none. Every datapoint has a source. Where a specific number could not be retrieved, the text says so.`), /* @__PURE__ */ React.createElement(P, null, `The four verdicts \u2014 partially supported / supported-for-detached / partial-rejected-as-framed / supported-on-timing-partial-on-level \u2014 are the authors' synthesis, not any single source's conclusion. The counter-narrative sweep that ran alongside the four thesis investigations produced the explicit dissent on T3 (mechanism under-evidenced) and T4 (aggregate volumes rose in 2025), and its findings are integrated in \xA7\xA74\u20135 rather than quarantined.`))));
