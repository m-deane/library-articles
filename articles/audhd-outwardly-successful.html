 by Pete Wharmby, names the cluster of costs imposed by a disability the people around the disabled person cannot see. The tax has at least four distinct components."), /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 0.9em" } }, "First, the disclosure-or-not tax: deciding, before each new colleague, friend, GP, or partner, whether to disclose a condition that may then be disbelieved. Second, the proof tax: producing, in the moment of disbelief, evidence that the condition is real \u2014 a process which is itself depleting and which the non-disabled person never has to perform. Third, the accommodation-cost tax: paying out-of-pocket, in time and money, for the supports the disabled person could have received institutionally if their disability had been visible enough to qualify them for it. Fourth, the legitimacy tax: the cumulative cost of being told, by people who mean well, that one is doing better than one is \u2014 a sentence which feels at first like reassurance and which, repeated over years, becomes the very thing that prevents the person from asking for the help they need."), /* @__PURE__ */ React.createElement("p", { style: { margin: "0" } }, "Each of these is small in any single instance. The compound effect, across thirty years of an undiagnosed AuDHD life, is one of the most consistently reported themes in the autistic late-diagnosis literature.")), /* @__PURE__ */ React.createElement(P, null, `There is a sentence the late-diagnosed AuDHD adult learns to mistrust. It is well-meant and almost universally produced: "but you don't seem autistic." The person saying it is, in their own register, paying a compliment \u2014 they are reassuring the disabled person that they pass. Inside the well-masked life, the sentence is the gatekeeping mechanism in its most distilled form: your suffering will not be recognised by me, because the version of your condition my mental model carries is more impaired than the version standing in front of me. It is the reason most people who eventually receive an AuDHD diagnosis describe a long delay between first suspicion and first conversation. They had been told, often in those words, that the suspicion was unwarranted.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "3", title: "The masking budget" }, /* @__PURE__ */ React.createElement(P, null, `Underneath the well-masked life is a daily energy ledger almost no observer ever sees. The literature has settled, in the past decade, on a vocabulary for it. Hull and colleagues' 2017 paper "Putting on My Best Normal" gave the most-cited account of camouflaging in adults \u2014 a three-component construct comprising compensation (cognitive strategies to mimic neurotypical behaviour), masking (suppressing autistic features), and assimilation (managing presentation to fit in). Cage and Troxell-Whitman 2019 ("Understanding the Reasons, Contexts and Costs of Camouflaging for Autistic Adults," J. Autism Dev. Disord. 49:5, 1899\u20131911) extended the construct. Pearson and Rose 2021 ("A Conceptual Analysis of Autistic Masking," Autism in Adulthood 3:1, 52\u201360) gave it its sharpest theoretical statement: masking is not a coping skill the autistic person elects to deploy. It is a stigma-management response to a hostile environment, largely involuntary in adults who have been performing it since childhood.`), /* @__PURE__ */ React.createElement(P, null, `The Pearson and Rose distinction matters more than is often noticed. Effortful masking \u2014 the conscious decision, before a meeting, to maintain eye contact at a particular cadence and suppress a stim \u2014 is the version most observers can imagine, because they have done something analogous. The well-masked adult performs this too. But the version Pearson and Rose name, and which the rest of this section is concerned with, is automatic masking \u2014 performed since age four or five, autonomic by adolescence, and not reliably available to conscious awareness because it is no longer, in the relevant sense, a behaviour at all. It is the default state of the nervous system in social contexts. It runs whether the adult notices or not. It costs whether the adult notices or not.`), /* @__PURE__ */ React.createElement(P, null, `This is what the masking budget diagram in Figure 1 is trying to make legible. The capacity curve and the demand curve are, individually, intuitive. The point of the diagram is the shaded region between them \u2014 the hours during which environmental demand exceeds available capacity, and the gap is paid in suppressed self-regulation. What gets suppressed: stimming, decompression breaks, sensory withdrawal, the natural rest pacing the nervous system would have selected. What gets borrowed against: the recovery hours that would have closed the gap overnight. The borrowing is invisible day to day and visible only when the borrowing is repaid all at once in the burnout collapse \xA75 will document.`), /* @__PURE__ */ React.createElement(MaskingBudget, null), /* @__PURE__ */ React.createElement(P, null, `Two empirical findings from the literature anchor the diagram's claims. First, Cage and Troxell-Whitman 2019 found that the autistic adults reporting the highest rates of camouflaging across contexts \u2014 what the authors term "high context-switching" camouflagers \u2014 also reported the highest rates of anxiety, depression, exhaustion, and (in a finding the authors flag carefully) suicidality. The masking budget is not a metaphor; it is a measured population-level correlation with mental-health outcomes. Second, Hull and colleagues' 2021 work on adult camouflaging predictors found that the strongest predictor of camouflaging behaviour in working-age autistic adults was not cognitive ability but environmental hostility \u2014 the degree to which the adult perceived their workplace, family, or social environment as unsafe for autistic presentation. The masking budget is paid out, on a daily basis, in proportion to the social cost of not paying it.`), /* @__PURE__ */ React.createElement(P, null, `The clinical phenomenon the budget produces is one the autistic adult literature has named the after-work crash. The adult who appeared functional from 09:00 to 18:00 returns home and is, for the next several hours, unable to speak, unable to decide about dinner, unable to engage with partner or children. The crash is not laziness; it is the bill for the day's masking arriving, in concentrated form, at the threshold of the front door. Devon Price's account in Unmasking Autism compiles the first-person reports; Higgins and colleagues' 2021 work in Autism documents the crash as a near-universal feature of the prodromal phase before the full burnout collapse. The well-masked life, in this register, is a life run on overdraft. It is sustainable for as long as the bank lets the overdraft run.`), /* @__PURE__ */ React.createElement(

      alt: "An empty kitchen at midnight, soft lamp on the counter, a single mug",

  )), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "4", title: "The success-as-trap pattern" }, /* @__PURE__ */ React.createElement(P, null, `The career path, for the well-masked AuDHD adult, is a sorting mechanism that selects upward for the very traits the underlying neurology cannot indefinitely sustain. The pattern is recognisable enough that the autistic adult community has produced a near-archetypal narrative around it: the career that began with the AuDHD adult being unusually good at a single technical thing, progressed through promotions which gradually relocated the work away from that thing, landed eventually in a role whose actual demands were almost entirely about the cognitive and social dimensions where the nervous system was least equipped, and ended in a collapse the surrounding system read as inexplicable.`), /* @__PURE__ */ React.createElement(P, null, `The previous article in this series, on corporate workplace navigation, traced the friction surface between AuDHD cognition and corporate norms. This section goes further: the friction is not a static cost but a dynamic one that compounds with seniority. Promotion moves the recipient away from individual contributor work \u2014 where AuDHD monotropic absorption and pattern recognition produce above-headcount output \u2014 and toward managerial, political, and representational work, where the masking budget is spent without compensating return. The director-level meeting where ten per cent of the agenda is technical and ninety per cent is interpersonal is, for the AuDHD director, a worse fit than the senior-IC role they were promoted out of. The salary is higher. The fit is worse. Visible competence in the IC role bought the promotion. The role they have been promoted into is the one that will, in three to five years, break them.`), /* @__PURE__ */ React.createElement(SuccessAsTrap, null), /* @__PURE__ */ React.createElement(P, null, `The diagram in Figure 2 makes the divergence visible. The visible-competence curve is what colleagues see \u2014 and what the promotion mechanism rewards. It tracks the role-demand curve closely, because the well-masked adult has spent a lifetime learning to produce outputs commensurate with whatever input they are handed. The sustainable-masking curve tells the underlying truth. In the early-career years it rises (skill compounds, role fit improves), plateaus through the middle years, and declines \u2014 not because the adult is becoming less capable, but because the cost of producing each unit of visible competence is increasing as the role drifts away from the AuDHD strengths. The shaded region between demand and sustainability is the masking debt \xA73 was concerned with, integrated across years rather than across hours. The burnout point is where the unpaid bill comes due.`), /* @__PURE__ */ React.createElement(P, null, `Several sub-patterns recur in the late-diagnosed AuDHD adult literature. The technical-track refugee: the AuDHD engineer, scientist, or analyst promoted into management because no senior IC track paid comparably, now performing a role their nervous system is poorly equipped for. Pete Wharmby's 2024 essay collection What I Want To Talk About (Jessica Kingsley) contains an extended account of this dynamic in the academic context. The founder-trap: the AuDHD adult who founded a company on the strength of their hyperfocus and pattern recognition, and is, five years in, the CEO of a thirty-person organisation whose operational needs are exactly the dimensions they have least access to. The senior-services-professional: the AuDHD lawyer, doctor, accountant, or consultant whose career advancement has gradually relocated their work from technical practice into client management, internal politics, and revenue generation \u2014 all taxed disproportionately by their underlying neurology.`), /* @__PURE__ */ React.createElement(P, null, `The architecture of the trap is identical in each. The traits that produced the early career's visible competence \u2014 depth, intensity, justice orientation, low political-game overhead \u2014 are the traits that fit the IC role. The traits the promoted role rewards \u2014 broad bandwidth, sustained social cognition, comfort with ambiguity, high political-game throughput \u2014 are the dimensions on which the AuDHD profile most consistently shows higher support need. The promotion is a reassignment from a role they fit to one they do not. Its symbolic value papers over the fit problem for years. The fit problem persists underneath. The masking budget is what pays for it, until the masking budget is exhausted.`), /* @__PURE__ */ React.createElement(Callout, { type: "warn", title: "The cruelty of the well-meant promotion" }, /* @__PURE__ */ React.createElement(P, null, `The corporate manager promoting their best individual contributor into management is not, in the ordinary sense, doing anything wrong. They are following the institutional logic of every hierarchy in the modern professional service economy. The cruelty is structural, not individual. The well-meant promotion is the mechanism by which the system extracts the AuDHD adult's depth and intensity for its own benefit and then, having extracted as much as the masking budget will sustain, discards them when the budget runs out. The promotion is the mechanism. The collapse is the bill. Calling either of them anyone's fault is a category error.`)), /* @__PURE__ */ React.createElement(

  )), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "5", title: "The unique burnout signature" }, /* @__PURE__ */ React.createElement(P, null, `The burnout that arrives at the end of the success-as-trap arc has, in the past five years, acquired a distinct clinical literature. It is not occupational burnout in the Maslach sense \u2014 though it overlaps. It is not depression, though it can be misdiagnosed as such. The autistic adult community calls it autistic burnout, and the foundational empirical statement of the construct is Dora Raymaker, Alan Teo, Nicole Steckler, Brandy Lentz, Mirah Scharer, Austin Delos Santos, Steven Kapp, Morrigan Hunter, Andee Joyce, and Christina Nicolaidis's 2020 paper, "'Having all of your internal resources exhausted beyond measure and being left with no clean-up crew': Defining autistic burnout," in Autism in Adulthood, vol. 2, no. 2, pp. 132\u2013143 (DOI 10.1089/aut.2019.0079). The paper is a community-based participatory research study conducted through the AASPIRE programme; its operational definition emerged from focus groups and interviews with autistic adults and was refined iteratively with the participating community.`), /* @__PURE__ */ React.createElement(P, null, `Raymaker and colleagues defined autistic burnout as a syndrome characterised by three core features: chronic exhaustion, loss of skills (regression in domains the adult had previously held competent), and reduced tolerance to stimulus. The syndrome's onset, in the population they sampled, was preceded by years \u2014 typically a decade or more \u2014 of compensation: masking, camouflaging, performing neurotypical-appropriate behaviour at sustained cost. The trigger, in the qualitative data, was almost always a precipitating overload \u2014 a major project deadline, a child's birth, a family bereavement, a job loss, a global pandemic \u2014 that exhausted the residual capacity the years of compensation had been drawing on. The recovery, where recovery occurred, took months to years; some respondents reported that capacities lost in the burnout never fully returned, and that the post-burnout life had to be rebuilt around a smaller, more sustainable functional envelope.`), /* @__PURE__ */ React.createElement(P, null, `The unique signature, for the well-masked adult, is the suddenness. The burnout does not announce itself; the masking has hidden the precursors from the adult as effectively as from the surrounding observers. Figure 2 is stylised, but the qualitative descriptions in Raymaker et al. and in Higgins and colleagues' 2021 "Defining autistic burnout through experts by lived experience" (Autism 25:8, 2356\u20132369, DOI 10.1177/13623613211019858) consistently report a near-vertical drop. One Friday the adult was holding the senior role, the relationship, the school run, the side project. The following Monday they could not get out of bed; the following month they could not sustain a half-hour conversation; six months later they had not returned to the role and were not certain they ever would. The drop felt, to surrounding observers, inexplicable. It was the cumulative bill arriving in a single instalment.`), /* @__PURE__ */ React.createElement(PQ, { attribution: "RAYMAKER ET AL. 2020 \u2014 RESPONDENT VERBATIM" }, `"It's like having all of your internal resources exhausted beyond measure and being left with no clean-up crew."`), /* @__PURE__ */ React.createElement(P, null, `The Higgins paper extends the Raymaker definition with a different sample (UK-based, recruited through the National Autistic Society) and converges on a closely similar three-feature construct, with a fourth feature added: a destabilisation of identity. The post-burnout autistic adult described, repeatedly, no longer recognising themselves \u2014 not knowing who they had been beneath the masking, before it collapsed. The high-functioning identity had been so thorough a self-presentation that its collapse left a vacancy where the self had been thought to be. Recovery was not a return to a previous self. It was the slow construction of a self that had not had room to exist while the masking was in operation.`), /* @__PURE__ */ React.createElement(P, null, `There are clinical implications the recent literature is still catching up with. Autistic burnout is not depression; antidepressant medication, in the qualitative data, often did not address the core syndrome and sometimes made it worse. The "return-to-work" framing applied by occupational health to standard burnout is frequently the wrong intervention; the role the adult was returning to was a contributor to the original collapse, and phased return often produces a second, deeper burnout within twelve to eighteen months. The recovery arc, handled honestly, frequently includes a downshift \u2014 the subject of \xA78.`), /* @__PURE__ */ React.createElement(SB, { title: "A note on diagnosis sequencing" }, /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 0.9em" } }, "The autistic burnout literature documents a recurring temporal pattern that the well-masked adult should know about in advance. A substantial fraction of late-diagnosed AuDHD adults receive their formal diagnosis in the months immediately following a burnout collapse \u2014 not before it. The collapse, in retrospect, was the event that made the masking impossible to sustain and the underlying neurology newly visible to the assessing clinician."), /* @__PURE__ */ React.createElement("p", { style: { margin: "0" } }, "This is not a coincidence. The pre-burnout adult was, by definition, performing well enough that the diagnostic gatekeeping pattern of \xA72 was operative. The post-burnout adult is presenting in a way the diagnostic pathway can recognise. The personal cost of arriving at diagnosis through this route is large, and the wider system's reliance on collapse as its detection mechanism is one of the things the field will need to reform across the next decade."))), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "6", title: "The imposter pattern that isn't imposter syndrome" }, /* @__PURE__ */ React.createElement(P, null, `There is a particular flavour of self-doubt the well-masked AuDHD adult reports almost universally, and which surrounding observers \u2014 therapists, partners, managers, friends \u2014 almost universally misidentify. The misidentification has a name: imposter syndrome. The original construct was developed in 1978 by Pauline Rose Clance and Suzanne Imes ("The Impostor Phenomenon in High Achieving Women: Dynamics and Therapeutic Intervention," Psychotherapy: Theory, Research and Practice 15:3, 241\u2013247). Clance and Imes described a specific pattern in their high-achieving women patients: the persistent inability to internalise objective evidence of one's own competence, accompanied by a chronic conviction of fraudulence that observers could see was unfounded. The diagnostic move is the clinician's: the patient is misperceiving their own competence, and the work of therapy is to bring the self-assessment into line with reality.`), /* @__PURE__ */ React.createElement(P, null, `The well-masked AuDHD adult's experience of self-doubt is not this. It is its inverse. The AuDHD adult perceives, accurately, a real gap between their visible competence and their internal experience of effort. Their colleagues see the polished output; they themselves know what the output cost \u2014 the four hours of preparation hidden from view, the weekend's recovery sleep that paid for Monday's meeting, the masking budget that ran near zero from Wednesday afternoon. The adult is not misperceiving anything. They are correctly perceiving that the appearance of effortless competence is being produced by a process that is anything but effortless.`), /* @__PURE__ */ React.createElement(P, null, `The phenomenology, on the inside, is similar to imposter syndrome. The phrase "if they knew what this actually costs me" is shared. But the structural logic is opposite. The Clance and Imes patient says, in effect: "they think I'm competent and I'm not." The AuDHD adult says: "they think I'm competent in a way that doesn't cost me, and I'm not." The competence is real; the sustainability of the appearance is not. To treat the second presentation with the standard imposter-syndrome interventions \u2014 CBT reframing, evidence-collection of objective accomplishment, "you really are good enough" reassurance \u2014 is to address a problem the adult does not have. It misses what the adult is saying.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "A diagnostic differentiation" }, /* @__PURE__ */ React.createElement(P, null, `In the Clance and Imes original construct, the test for imposter phenomenon is whether external evidence of competence, when presented, fails to be internalised by the patient. The patient holds the conviction of fraudulence in the face of contradicting data. The intervention is to help the patient update.`), /* @__PURE__ */ React.createElement(P, null, `In the AuDHD masking-cost pattern, external evidence of competence is internalised \u2014 the adult does not deny the competence; the dossier of objective accomplishment is accepted at face value. What the adult holds is a separate proposition: that the cost of producing the competence is invisible to the people producing the evidence, and that the cost is unsustainable. The intervention is not to update the self-assessment. The intervention is to make the cost visible to the systems around the adult, so that the cost can be shared, mitigated, or \u2014 where the role allows \u2014 reduced. The two clinical situations look similar from outside and are structurally different.`)), /* @__PURE__ */ React.createElement(P, null, `The clearest clinical statement of this differentiation comes from Megan Anna Neff, whose Neurodivergent Insights project has since 2021 served as one of the more careful clinical sources on the AuDHD adult population. Neff argues that the standard imposter-syndrome therapeutic posture, applied to the AuDHD client, produces predictable failure: the client agrees with each piece of evidence, leaves the session momentarily reassured, and returns the following week with the same self-doubt \u2014 because the self-doubt was never about the competence. It was about the cost. The cost has not been addressed.`), /* @__PURE__ */ React.createElement(P, null, `There is a second-order consequence the well-masked adult should know about. Therapists, managers, and partners who frame the self-doubt as imposter syndrome and try to address it with reassurance are in good faith \u2014 they are responding to what they believe the problem is. But the reassurance, repeated over years, becomes part of the masking budget the adult is paying. Each "but you're so capable" requires the adult to absorb the well-meant gesture, decline to correct it, and continue producing the appearance the gesture was responding to. The reassurance itself is taxed. The most useful posture, from the autistic-adult literature on this dynamic, is one of believed cost: accepting that the appearance is real and the cost behind it is also real, and working to redistribute the cost rather than dispute that it exists.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "7", title: "Relationships, and the loneliness of the well-masked life" }, /* @__PURE__ */ React.createElement(P, null, `The relationships of the well-masked AuDHD adult \u2014 partners, friends, family, sometimes children \u2014 are the one domain in which the cost of the masking budget is least transferable and most consequential. The colleague at the office sees the meeting. The partner sees the after-meeting. The architecture of the well-masked life concentrates recovery hours into the home, with the result that the people closest to the adult are also the people most exposed to the cost the adult is paying for the appearance the rest of the world is rewarding. The same person who delivered the polished board presentation at 14:00 cannot, at 19:00, summon the regulatory capacity to participate in a routine conversation about the children's bedtime.`), /* @__PURE__ */ React.createElement(P, null, `Two patterns in the relational data recur. The first is perceptual asymmetry: the partner who has seen the recovery state is the one most likely to recognise the cost \u2014 and, paradoxically, the one most often told by the surrounding world that they are exaggerating. "But they're so high-functioning at work" arrives in the close relationship as a contradiction the partner is asked to absorb: their lived experience of the adult's capacity is being denied by the wider community's experience of the same adult's appearance. The literature on partners of autistic adults \u2014 Sarah Hendrickx's 2023 Sex and Relationships for Adults on the Autism Spectrum (Jessica Kingsley), the partner-perspective work collated by Maxine Aston \u2014 documents this asymmetry as one of the most consistent stressors of the close relationship.`), /* @__PURE__ */ React.createElement(P, null, `The second pattern is the difficulty-of-asking. The well-masked adult is, by hypothesis, one whose presentation has elicited no concern throughout adult life. The internal experience that something is wrong is unaccompanied by external evidence the adult could point to. Asking for help \u2014 from a partner, a friend, a GP \u2014 requires producing evidence the adult cannot easily produce. The fact that they have just spent eight hours appearing fine is, structurally, an argument against the help they need. The phrase "but you cope so well" \u2014 meant kindly, in almost every case \u2014 is the sentence that closes the door. It is the same gatekeeping mechanism the diagnostic system runs at the institutional level, now operating in the kitchen between two people who love each other.`), /* @__PURE__ */ React.createElement(

  ), /* @__PURE__ */ React.createElement(P, null, `A specific loneliness attaches to this configuration, and the autistic-adult literature has begun, in the past five years, to describe it. Eric Garcia's 2021 We're Not Broken: Changing the Autism Conversation (Houghton Mifflin Harcourt) frames it as the cost of being read at the wrong resolution \u2014 visible enough to be admired and rewarded, illegible enough that the admiring response does not address what the adult actually needs. Devon Price, in Unmasking Autism, describes it as the loneliness of being seen but not known. The phrase the well-masked adult most often reports thinking, in a meeting where the colleagues who have known them for years are praising the work they have just produced, is some version of: "you are praising the version of me you can see; the person you are praising does not exist; the person who actually produced the work is somewhere else, paying for it." The phrase is not melodrama. It is a description of an asymmetry the adult is required to maintain in order to keep the praise coming.`), /* @__PURE__ */ React.createElement(P, null, `The relational reorganisation that follows from naming the asymmetry is, when it works, one of the most repair-yielding moves available. The autistic-adult community has produced practical formulations \u2014 disclosure scripts in the Autistic Self Advocacy Network's 2024 Welcome to the Autistic Community handbook, partner-conversation frameworks in Megan Anna Neff's clinical-practice notes \u2014 that share an architecture. The adult names, to the close relationship, what the masking budget actually costs. The partner is told the after-work crash is not coldness or withdrawal but the bill for the day's masking arriving at the front door. The family is told the silence at dinner is not anger but recovery. The children are told, in age-appropriate language, that the parent's quiet hour after work is not them; it is the day. The reorganisation does not eliminate the cost. It distributes the cost, accurately, across the people who can help carry it.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "8", title: "The reorganisation \u2014 what changes when the appearance is put down" }, /* @__PURE__ */ React.createElement(P, null, `There is a reorganisation many late-diagnosed AuDHD adults undertake, in the year or two following diagnosis, that the autistic-adult literature has come to call (variously) unmasking, downshifting, or \u2014 in Devon Price's term, taken over from disability-studies usage \u2014 coming home. It is the deliberate dismantling of the high-functioning life-architecture and the construction of something more sustainable in its place. It is neither uniform nor universal; not every late-diagnosed adult attempts it, and not every attempt succeeds. But the pattern is consistent enough across the post-2018 literature to be described in outline.`), /* @__PURE__ */ React.createElement(P, null, `Price's Unmasking Autism (chapter 5 in particular) is the most-cited practical guide. Price's framing is that masking is, in the adult who has done it since childhood, a habit of nervous-system presentation rather than a freely chosen behaviour, and that the work of unmasking is therefore neither rapid nor heroic. It is incremental, somatic, and frequently uncomfortable: the adult learns, slowly and across many small instances, what their actual sensory preferences are, what their actual social bandwidth is, what their actual recovery requirements are \u2014 having spent decades performing a self whose needs were nominally those of a neurotypical person. The unmasking is an act of recognition rather than transformation. The adult is not becoming someone new; they are letting the form they always had become legible.`), /* @__PURE__ */ React.createElement(P, null, `The career consequences are usually substantial. The most consistently reported pattern, in the qualitative data collected by Raymaker et al. and the Higgins follow-up work, is the post-burnout downshift: the adult returns not to the role they left but to a smaller one \u2014 fewer direct reports, less travel, more individual-contributor work, fewer client meetings. Salary often falls; status often falls; the surrounding peer group's reactions range from supportive to incomprehending. The adult, in the year or two after the downshift, frequently reports a quality of life and of work-output they had not experienced in the previous decade. The work, smaller, is sustainable. The career, from outside, is moving sideways or backwards. Inside, it has stopped costing what it had been costing.`), /* @__PURE__ */ React.createElement(P, null, `Megan Anna Neff's clinical-practice notes at Neurodivergent Insights, written for clinicians supporting late-diagnosed AuDHD adults through the post-diagnostic year, are explicit about the framing the supporting clinician should bring. The downshift is not a regression; it is a recalibration to sustainable load. The previous role was producing visible competence at unsustainable cost; the new role is producing visible competence at sustainable cost. Both are competence. Only one is durable. The clinician who frames the downshift accurately is doing more for the patient than the one who, with the best intentions, encourages a return to the previous functional envelope.`), /* @__PURE__ */ React.createElement(P, null, `Joel Schwartz, PsyD, clinical director of Total Spectrum (California) and an autistic clinician himself, has been one of the more forceful voices in the post-diagnostic-care literature for what he calls "right-sizing" \u2014 the deliberate construction of a life whose external commitments fit, rather than exceed, the actual sustainable capacity of the adult's nervous system. The well-masked adult, Schwartz argues across his clinical writing and 2023\u20132025 Divergent Conversations podcast appearances, has typically constructed a life two or three sizes larger than the body of the life can carry. Right-sizing is letting the life shrink to the size that fits, and accepting \u2014 against thirty years of cultural pressure to do otherwise \u2014 that fit, not size, is the metric of a life well-led.`), /* @__PURE__ */ React.createElement(P, null, `Three things change in the well-conducted reorganisation. The first is identity: the high-functioning self-image is no longer the operative self-image, and a different one takes time to grow in its place. The second is relational: partners, friends, and colleagues who knew the previous adult will, in some cases, struggle with the new one \u2014 not from malice but because the previous adult was meeting needs the new one is no longer willing to meet at the previous cost. The third is financial: the salary of the previous role was paying for, among other things, the masking budget, and household economics often have to be recalibrated. Each adjustment is, in the longitudinal data, repaid by the reduction in the recovery deficit that drove the original collapse.`), /* @__PURE__ */ React.createElement(SB, { title: "What \u2018recovery\u2019 looks like, as the literature frames it" }, /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 0.9em" } }, "The autistic-burnout recovery literature, drawing on Raymaker, Higgins, and post-2022 community-research, converges on a multi-stage arc that does not match the standard occupational-burnout recovery picture."), /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 0.9em" } }, "Stage one: acute rest \u2014 six weeks at minimum, frequently three to six months, during which the adult is unable to perform routine tasks. Stage two: diagnostic recognition, when the AuDHD diagnosis is often finally received. Stage three: unmasking and experimentation, when sensory preferences, social-bandwidth limits, and recovery requirements are deliberately tested. Stage four: right-sizing, when the post-burnout life-architecture is rebuilt around actual capacity rather than the previous appearance."), /* @__PURE__ */ React.createElement("p", { style: { margin: "0" } }, "The arc is not linear and not uniform. The adults who successfully complete it report, almost without exception, that they would not return to the pre-burnout life. The previous life had been, in the most economical phrase the literature offers, the wrong shape."))), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "9", title: "A more honest taxonomy" }, /* @__PURE__ */ React.createElement(P, null, `Everything in the previous eight sections becomes intelligible only after the high-functioning / low-functioning binary has been put down and replaced with a more accurate vocabulary. The taxonomy proposed here is not original \u2014 it is the working vocabulary of the post-2020 disability-studies and autistic-self-advocacy literature, distilled into a form a clinician, manager, or partner can use without the disability-studies background. The article makes it explicit because, in current practice, it is rarely deployed.`), /* @__PURE__ */ React.createElement(P, null, `The proposal is that support need is multidimensional rather than scalar. There is no single number that summarises the support an adult requires; there are multiple domains, and the support need varies \u2014 sometimes substantially \u2014 across them for the same person. The DSM-5-TR (2022 text revision) points in this direction: it specifies severity separately for the social-communication domain and the restricted-and-repetitive-behaviour domain, each rated on a three-level scale (Level 1: requiring support; Level 2: substantial; Level 3: very substantial). The two-axis specifier is the most clinically deployed multidimensional framing currently in use, and is rarely used to its full specification \u2014 most clinical reports collapse the two axes back into a single overall level.`), /* @__PURE__ */ React.createElement(P, null, `The taxonomy proposed here extends DSM-5-TR's move from two axes to six, drawing on the broader functional-assessment literature and the disability-studies critique that no single rating can capture the lived shape of a disabled life. The six domains: sensory (cost of processing the sensory environment), social (cost of navigating interpersonal interaction), executive (planning, prioritising, sequencing, switching), communication (expressive and receptive language across contexts), self-regulation (emotional and physiological state-management), and motor (fine and gross coordination, including praxis and proprioception). Each domain admits its own rating; each rating is independent; the overall picture is the joint distribution across all six.`), /* @__PURE__ */ React.createElement(MultidimensionalSupportNeeds, null), /* @__PURE__ */ React.createElement(P, null, `The radar diagram in Figure 3 is the picture this taxonomy produces when applied to a composite individual whom the popular literature would have called high-functioning. Communication and motor read as low support need: the colleagues who interact with this adult through verbal exchange register no obvious deficit, and the surface coordination that observers can see (typing, walking, driving, presenting) is intact. These are the two dimensions on which the workplace assesses the adult \u2014 and on which the high-functioning label is tracking.`), /* @__PURE__ */ React.createElement(P, null, `The other four domains tell a different story. Sensory: high \u2014 the open-plan office is cumulative depletion the masking budget has been quietly paying down throughout the workday. Executive: high \u2014 the planning, prioritising, sequencing, and switching costs of the senior role are substantially higher than for a neurotypical peer. Self-regulation: high \u2014 maintaining emotional and physiological homeostasis across an eight-hour day in an under-fitting environment is costly, with a correspondingly high recovery requirement at evening. Social: moderate-to-high \u2014 the fluent verbal exchange the workplace registers is being produced by sustained masking effort it cannot see. The same person is low-support-need on the two dimensions the popular label tracks, and high-support-need on the four it does not.`), /* @__PURE__ */ React.createElement(P, null, `The taxonomy has two practical consequences. First, it makes the masking budget legible: the cost of the four high-need domains is paid for, day after day, without the institutional supports that would address them \u2014 supports the adult does not receive because the two low-need domains the workplace can see have been read as evidence the supports are not required. The \xA78 reorganisation is, in the language of the taxonomy, the construction of an environment in which the four high-need domains are appropriately supported so that the masking budget no longer has to pay for them privately.`), /* @__PURE__ */ React.createElement(P, null, `Second, the taxonomy disarms the gatekeeping mechanism \xA72 was concerned with. The sentence "but you have a job" is, in the taxonomy, an observation about the communication-and-motor profile only \u2014 not, despite its surface form, a claim about the sensory, executive, self-regulation, or social profile. The institutional system asking it has been confusing one for the other. The phrase "low support needs in some domains, high support needs in others," awkward as it is, is the most economical statement of what the taxonomy says.`), /* @__PURE__ */ React.createElement(Callout, { type: "tip", title: "A practical translation, for clinicians and managers" }, /* @__PURE__ */ React.createElement(P, null, `Where the previous practice would record "high-functioning autism," the taxonomy records: ASD with low support need in communication and motor; substantial support need in sensory, executive, and self-regulation; moderate support need in social. The first formulation closes off institutional response; the second specifies what would actually help. The practical work of reform, across the next decade in NHS adult-autism services and in private clinical practice, is the work of moving routine reporting from the first formulation to the second. The adult is the same person in both reports. Only the second one tells the surrounding system how to support them.`)), /* @__PURE__ */ React.createElement(P, null, `This is the taxonomy the article has been moving toward since \xA71. It does not solve the gatekeeping problem; it does not eliminate the masking budget; it does not prevent the burnout the success-as-trap pattern produces. What it does is name the picture accurately, so that the work the previous sections described becomes possible. The well-masked adult is not a high-functioning person whose suffering is mysterious. They are a person with a specific multidimensional support profile \u2014 high in some domains, low in others \u2014 whose institutional environment has been responding to the visible domains and ignoring the invisible ones. The cost is real. The need is real. The taxonomy is the first step toward making both count.`), /* @__PURE__ */ React.createElement(P, { italic: true, large: true }, `The world will continue, for some time, to use the popular term. The person it describes is not high-functioning. They are well-masked, supported in some domains and unsupported in others, paying privately for what the world has decided not to see. There is a more honest name for this. The name is the picture.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "10", title: "Source Integrity Note" }, /* @__PURE__ */ React.createElement(P, null, `This article is the sixth in a series on AuDHD. The earlier pieces are: audhd-entelechy-v2.jsx (neuroscience, April 2026); the lived-experience second piece; audhd-entelechy-form-and-fulfilment.jsx (philosophy, April 2026); audhd-corporate-workplace-navigation.jsx (workplace navigation, April 2026); and the fifth piece on the long history of clinical mis-recognition. The present article handles the population those pieces only glanced at \u2014 the outwardly-successful, well-masked AuDHD adult \u2014 and tries to do so without endorsing the popular term used to describe them. Workspace files read in preparation: audhd-entelechy-v2.jsx; audhd-entelechy-form-and-fulfilment.jsx; audhd-corporate-workplace-navigation.jsx; library-articles/articles/looksmaxxing.jsx (encyclopaedic-mode scaffold); library-articles/articles/storytelling-in-photography.jsx (encyclopaedic-mode scaffold); library-articles/.claude/skills/shared-article-jsx-reference.md.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Primary clinical and empirical literature cited:")), /* @__PURE__ */ React.createElement(P, null, `Pauline Rose Clance and Suzanne Imes, "The Impostor Phenomenon in High Achieving Women: Dynamics and Therapeutic Intervention," Psychotherapy: Theory, Research and Practice, vol. 15, no. 3 (1978): 241\u2013247. The original definition of imposter phenomenon, used in \xA76 as the contrast against which the AuDHD masking-cost pattern is differentiated. DOI: 10.1037/h0086006.`), /* @__PURE__ */ React.createElement(P, null, `Meng-Chuan Lai and Simon Baron-Cohen, "Identifying the lost generation of adults with autism spectrum conditions," The Lancet Psychiatry, vol. 2, no. 11 (November 2015): 1013\u20131027. The female-phenotype literature foundational to \xA71 and \xA72. DOI: 10.1016/S2215-0366(15)00277-1.`), /* @__PURE__ */ React.createElement(P, null, `Laura Hull, K. V. Petrides, Carrie Allison, Paula Smith, Simon Baron-Cohen, Meng-Chuan Lai, and William Mandy, "&lsquo;Putting on My Best Normal&rsquo;: Social Camouflaging in Adults with Autism Spectrum Conditions," Journal of Autism and Developmental Disorders, vol. 47, no. 8 (August 2017): 2519\u20132534. The foundational masking/camouflaging construct paper used throughout \xA73. DOI: 10.1007/s10803-017-3166-5.`), /* @__PURE__ */ React.createElement(P, null, `Eilidh Cage and Zoe Troxell-Whitman, "Understanding the Reasons, Contexts and Costs of Camouflaging for Autistic Adults," Journal of Autism and Developmental Disorders, vol. 49, no. 5 (May 2019): 1899\u20131911. Used in \xA73 for the contexts-and-costs framework and the high-context-switching findings. DOI: 10.1007/s10803-018-03878-x.`), /* @__PURE__ */ React.createElement(P, null, `Amy Pearson and Kieran Rose, "A Conceptual Analysis of Autistic Masking: Understanding the Narrative of Stigma and the Illusion of Choice," Autism in Adulthood, vol. 3, no. 1 (March 2021): 52\u201360. Used in \xA73 for the effortful-vs-automatic masking distinction and for the stigma-management framing. DOI: 10.1089/aut.2020.0043.`), /* @__PURE__ */ React.createElement(P, null, `Dora M. Raymaker, Alan R. Teo, Nicole A. Steckler, Brandy Lentz, Mirah Scharer, Austin Delos Santos, Steven K. Kapp, Morrigan Hunter, Andee Joyce, and Christina Nicolaidis, "&lsquo;Having all of your internal resources exhausted beyond measure and being left with no clean-up crew&rsquo;: Defining Autistic Burnout," Autism in Adulthood, vol. 2, no. 2 (June 2020): 132\u2013143. The foundational autistic-burnout paper used throughout \xA75 and the basis of the recovery-arc framing in \xA78. DOI: 10.1089/aut.2019.0079.`), /* @__PURE__ */ React.createElement(P, null, `Julianne M. Higgins, Samuel R. C. Arnold, Janelle Weise, Elizabeth Pellicano, and Iliana Magiati, "Defining autistic burnout through experts by lived experience: Grounded Delphi method investigating &lsquo;Autistic Burnout&rsquo;," Autism, vol. 25, no. 8 (November 2021): 2356\u20132369. Used alongside Raymaker in \xA75 for the four-feature construct (chronic exhaustion, skill loss, reduced stimulus tolerance, identity destabilisation). DOI: 10.1177/13623613211019858.`), /* @__PURE__ */ React.createElement(P, null, `William Mandy, "Should we use diagnostic terms which suggest autistic people are &lsquo;high functioning&rsquo;? Some practical, ethical and conceptual issues to consider," Autism (SAGE / National Autistic Society), vol. 26, no. 8 (November 2022): 1882\u20131892. Used in \xA71 and \xA72 as the most rigorous clinical critique of the high-functioning vocabulary in the contemporary literature. DOI: 10.1177/13623613221117288.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Books and longer-form sources cited:")), /* @__PURE__ */ React.createElement(P, null, `Devon Price, Unmasking Autism: Discovering the New Faces of Neurodiversity (Harmony / Penguin Random House, 2022). Used in \xA71 (the contemporary critique of functioning labels), \xA73 (the after-work crash), \xA77 (loneliness of being seen but not known), \xA78 (the unmasking work, especially chapter 5).`), /* @__PURE__ */ React.createElement(P, null, `Eric Garcia, We're Not Broken: Changing the Autism Conversation (Houghton Mifflin Harcourt, 2021). Used in \xA77 for the framing of being read at the wrong resolution.`), /* @__PURE__ */ React.createElement(P, null, `Sarah Hendrickx, Sex and Relationships for Adults on the Autism Spectrum (Jessica Kingsley Publishers, 2023). Used in \xA77 for the partner-relationship literature.`), /* @__PURE__ */ React.createElement(P, null, `Pete Wharmby, What I Want To Talk About: How Autistic Special Interests Shape a Life (Jessica Kingsley Publishers, 2024 essay collection). Used in \xA74 (the technical-track refugee pattern) and as a general source on the lived-experience literature of late-diagnosed autistic adults.`), /* @__PURE__ */ React.createElement(P, null, `Sam Ahern, The Autistic Survival Guide (Jessica Kingsley Publishers, 2024). Used in \xA71 for the community-organising register of the functioning-label critique.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Institutional and policy reports:")), /* @__PURE__ */ React.createElement(P, null, `Sir Robert Buckland KC MP, The Buckland Review of Autism Employment, UK Department for Work and Pensions (February 2024). Used in \xA72 for the disability-employment-gap data and the 77-per-cent-want-to-work finding. https://www.gov.uk/government/publications/the-buckland-review-of-autism-employment-report-and-recommendations.`), /* @__PURE__ */ React.createElement(P, null, `UK Department for Work and Pensions, Employment of Disabled People (annual statistics publication, 2024\u201325 edition). Used in \xA72 for the autism-specific employment-rate figure (31.4 per cent vs 82.0 per cent non-disabled comparator).`), /* @__PURE__ */ React.createElement(P, null, `NHS England Autism Statistics, monthly publication current to April 2026. Used in \xA72 for the 234,876-adult waiting-list figure for autism assessment in England. https://digital.nhs.uk/data-and-information/publications/statistical/autism-statistics.`), /* @__PURE__ */ React.createElement(P, null, `National Autistic Society, Now I Know report on late autism diagnosis (2023), and 2024 report on diagnosis pathways. Used in \xA71 and \xA72 for the qualitative findings on late-diagnosed autistic adult experience and the triage practice in NHS adult autism services.`), /* @__PURE__ */ React.createElement(P, null, `American Psychiatric Association, Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition (DSM-5, 2013) and DSM-5-TR (Text Revision, 2022). Used in \xA71 and \xA79 for the formal severity-level specifiers and the historical collapse of Asperger's syndrome into Autism Spectrum Disorder.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Clinical-practice and community sources:")), /* @__PURE__ */ React.createElement(P, null, `Megan Anna Neff, PsyD, Neurodivergent Insights (neurodivergentinsights.com, 2021\u2013present). Used in \xA76 for the imposter-pattern clinical differentiation, \xA77 for the partner-conversation framework, and \xA78 for the recalibration-not-regression framing.`), /* @__PURE__ */ React.createElement(P, null, `Joel Schwartz, PsyD, clinical director, Total Spectrum (totalspectrum.org), Costa Mesa, California; podcast appearances on Divergent Conversations (Megan Anna Neff and Patrick Casale, 2023\u20132025). Used in \xA78 for the right-sizing framing.`), /* @__PURE__ */ React.createElement(P, null, `Lydia X. Z. Brown, "The Significance of Semantics: Person-First Language: Why It Matters" (autistichoya.com, 2011, with later revisions). Used in \xA71 for the disability-studies critique of functioning labels. The Autistic Self Advocacy Network's broader writing on functioning hierarchy is also drawn on for \xA71.`), /* @__PURE__ */ React.createElement(P, null, `Autistic Self Advocacy Network, Welcome to the Autistic Community handbook, second edition (2024). Used in \xA77 for the disclosure-script frameworks.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Tier-2 composites flagged:")), /* @__PURE__ */ React.createElement(P, null, `The composite individual visualised in Figure 3 (the &ldquo;same person, different needs across domains&rdquo; radar plot) is exactly that \u2014 a composite, not an individual. The values plotted (Sensory 78, Social 62, Executive 70, Communication 28, Self-regulation 74, Motor 22) are illustrative; they are scaled to make the \xA79 argument visually clear and are not measured values from any specific person. The diagram caption flags this. The radar's purpose is taxonomic \u2014 to show what the multidimensional taxonomy looks like when applied to a typical well-masked adult \u2014 not statistical.`), /* @__PURE__ */ React.createElement(P, null, `The masking-budget hourly trace in Figure 1 is a stylised representative weekday rather than empirical hourly data; the literature it draws on (Pearson &amp; Rose 2021; Cage &amp; Troxell-Whitman 2019; Raymaker et al. 2020) supports the directional claims (capacity drains across the day, demand peaks mid-morning and late afternoon, the recovery deficit accumulates at evening) but does not, at the time of writing, supply published hour-by-hour ecological-momentary-assessment data of the kind the diagram's specific shape implies. The figure is editorial, not measured.`), /* @__PURE__ */ React.createElement(P, null, `The career-progression curves in Figure 2 are similarly stylised. The directional claim \u2014 that demand and visible competence track upward through promotions while sustainable masking output diverges and eventually breaks \u2014 is supported by the autistic-burnout literature (Raymaker et al. 2020; Higgins et al. 2021) and by the late-diagnosed-AuDHD lived-experience literature (Price 2022; Wharmby 2024). The specific curves are illustrative, not derived from a longitudinal dataset.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "The contested-vocabulary critique \u2014 credit:")), /* @__PURE__ */ React.createElement(P, null, `The article's \xA71 critique of the term high-functioning is not the agent's. It belongs to the autistic self-advocacy and disability-studies traditions developed over the past decade and a half \u2014 most prominently by Devon Price (2022), Sam Ahern (2024), Lydia X. Z. Brown (2011 and ongoing), the Autistic Self Advocacy Network, William Mandy (2022 review), and the broader autistic-led writing the article cites. The agent has summarised and contextualised the critique; the critique itself is the work of the autistic-led literature and the disability-studies scholars who have argued it for years. Where \xA71 paraphrases or compresses, it is paraphrasing or compressing those sources, not generating an original argument. The taxonomy proposed in \xA79 likewise builds on existing disability-studies and clinical-psychology multidimensional-functioning frameworks; it is a synthesis, not an invention.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Where the agent reasoned beyond cited evidence \u2014 explicit acknowledgement:")), /* @__PURE__ */ React.createElement(P, null, `Several connections drawn in this article are interpretive and are not, to the agent's knowledge, made in this exact form by any single cited source. In particular: (i) the integration of Cage &amp; Troxell-Whitman 2019 with Pearson &amp; Rose 2021's effortful/automatic distinction in \xA73 to produce the masking-budget framing is the agent's synthesis; the underlying constructs are theirs. (ii) The success-as-trap diagrammatic framing in \xA74 \u2014 and specifically the &ldquo;visible competence collapses to floor&rdquo; framing of the burnout point \u2014 is the agent's compression of the qualitative-data findings in Raymaker et al. 2020 and Higgins et al. 2021; the empirical findings are the cited authors'. (iii) The differentiation in \xA76 between Clance &amp; Imes 1978 imposter syndrome and the AuDHD masking-cost pattern draws on Megan Anna Neff's clinical-practice writing, but the precise structural-logic framing (&ldquo;misperception of one's own competence&rdquo; versus &ldquo;correctly perceiving a real cost gap&rdquo;) is the agent's articulation. (iv) The six-domain taxonomy proposed in \xA79 extends the DSM-5-TR two-axis severity specifier in a direction that the manual itself does not formally specify; the extension draws on the broader functional-assessment and disability-studies literature but is, as proposed, the agent's synthesis. These interpretive moves are flagged so that the reader can hold them at appropriate epistemic distance from the directly textually-grounded claims.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "No invented quotations:")), /* @__PURE__ */ React.createElement(P, null, `The single direct verbatim quote in the article (&ldquo;It's like having all of your internal resources exhausted beyond measure and being left with no clean-up crew&rdquo;) is from a respondent in Raymaker et al. 2020 \u2014 it is the phrase that gives the paper its title and is reproduced verbatim from the published abstract and the body of the paper. No quotations have been invented or attributed to any named clinician, researcher, or autistic adult in this article. Where the article ascribes a position to a named person (Price, Mandy, Lai, Hull, Cage, Pearson, Rose, Raymaker, Higgins, Neff, Schwartz, Brown, Garcia, Hendrickx, Wharmby, Ahern), the position is paraphrased from the cited published or freely-available work.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Photographs:")), /* @__PURE__ */ React.createElement(P, null, `Hero and inline photographs sourced from Unsplash with mandatory UTM tagging (?utm_source=dsl&amp;utm_medium=referral) per the Unsplash developer guidelines. Where a satisfactory editorial photograph could not be sourced, an IC placeholder block would have been used; in the present article, all four inline photographs are Unsplash-sourced.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Voice and method:")), /* @__PURE__ */ React.createElement(P, null, `This is the encyclopaedic-mode sixth piece in the AuDHD series. Voice register: HBR / The Atlantic / London Review of Books / Aeon. The piece deliberately uses the contested term &ldquo;high-functioning&rdquo; only where the popular meaning does the work, and replaces it with &ldquo;well-masked&rdquo; or &ldquo;outwardly successful&rdquo; or \u2014 in the \xA79 sense \u2014 &ldquo;multidimensional support profile&rdquo; everywhere else. No cheerleading register; no pathologising register; honest about contested vocabulary throughout.`))), /* @__PURE__ */ React.createElement("div", { style: { borderTop: `40px solid ${C.natgeoYellow}`, padding: "24px 24px 32px", textAlign: "center" } }, /* @__PURE__ */ React.createElement("div", { style: { fontFamily: F.sans, fontSize: 11, color: C.warmGray, letterSpacing: "0.08em", textTransform: "uppercase" } }, "Encyclopaedic Reference \xA0|\xA0 The Cost Behind the Composure \xA0|\xA0 Sixth in the AuDHD Series")));
}
