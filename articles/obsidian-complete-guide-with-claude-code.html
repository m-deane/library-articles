  ), /* @__PURE__ */ React.createElement(Sec, { n: "2", title: "Part 2 \u2014 Community plugins worth the agentic workflow" }, /* @__PURE__ */ React.createElement(P, null, `A plugin is worth the agentic workflow only if it reads or writes Markdown that the agent can also read or write. Plugins that lock content into a custom binary format are dead weight. Below: 15 plugins where I have personally watched a Claude Code workflow get faster because of the integration. Maintenance status was checked on 2026-04-24 against each project's GitHub repository \u2014 where I cite a "last verified" date, take that as the boundary of my evidence.`), /* @__PURE__ */ React.createElement(H3, null, "Dataview (blacksmithgu, community-maintained)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/blacksmithgu/obsidian-dataview</code>. Dataview turns the vault into a queryable database. Two query languages: <strong>DQL</strong>, a declarative SQL-like syntax for tables/lists/tasks, and <strong>DataviewJS</strong>, a JavaScript API with full vault access. Original author Michael Adam Brewer (<em>blacksmithgu</em>) handed off to community maintainers; recent releases continue under the same repo. Last verified 2026-04-24 \u2014 check for current status.`), /* @__PURE__ */ React.createElement(P, null, `Claude Code integration: do not have the agent author Dataview queries inside notes that the same query renders into. The query and its rendered output share a file, and Dataview re-runs the query each open \u2014 so a Claude-written DQL block produces an unreadable diff. Instead, have a hand-stable Dataview block in each dashboard note and let Claude update the <em>data</em> it queries (frontmatter on individual notes).`), /* @__PURE__ */ React.createElement(Code, { title: "DQL block \u2014 table of every dataset note touched this week" }, `\`\`\`dataview
TABLE rows, file.mtime as "last edited"

WHERE file.mtime >= date(today) - dur(7 days)
SORT file.mtime DESC
\`\`\``), /* @__PURE__ */ React.createElement(H3, null, "Templater (SilentVoid13)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/SilentVoid13/Templater</code>. Templater executes JavaScript at note creation time. Built-in <code>tp.*</code> namespace for dates, prompts, system info; user scripts (<code>.js</code> files in a designated folder, loaded as CommonJS) become callable as <code>tp.user.&lt;name&gt;()</code>. Latest release within the last week of April 2026 \u2014 actively maintained.`), /* @__PURE__ */ React.createElement(P, null, `Claude Code integration: the article-note template in this workspace is a Templater file. It auto-fills <code>created</code> from <code>tp.date.now()</code>, prompts for the slug, sets <code>status: draft</code>. When you later flip to <code>status: ready</code>, the daemon picks it up. Don't have Claude author Templater scripts at runtime \u2014 Templater scripts run with full vault permissions and Claude has no way to test the side effects before they hit your real notes.`), /* @__PURE__ */ React.createElement(H3, null, "QuickAdd (chhoumann)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/chhoumann/quickadd</code>. Four primitives: templates, captures, macros, multis. The capture flow lets you bind a hotkey to "append a timestamped line to a specific note" \u2014 the closest thing Obsidian has to a quick-capture inbox. Claude Code integration: capture a one-line article idea via QuickAdd into <code>Inbox.md</code>, then a daily Claude sweep promotes <code>Inbox.md</code> rows to full article notes with the right <code>article-skill</code> frontmatter. The agent reads and writes Markdown either way; QuickAdd just makes the capture fast on the human side.`), /* @__PURE__ */ React.createElement(H3, null, "Obsidian Git (Vinzent03)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/Vinzent03/obsidian-git</code>. Maintained continuously by Vinzent03 since 2021; latest release 2.38.2 within the last week of April 2026. Auto-commit, auto-pull, auto-push at configurable intervals. The natural pairing for any vault that lives on a remote \u2014 and it pairs cleanly with Claude Code, because once the vault is under git, the agent has a perfectly visible audit trail of every edit it makes. <code>git log -- "Daily/2026-04-24.md"</code> tells you exactly which commit your agent introduced and exactly which line it changed. Combine with a pre-commit hook that lints YAML frontmatter and you have a working sanity barrier between hallucination and disk.`), /* @__PURE__ */ React.createElement(H3, null, "Periodic Notes + Calendar (liamcain)"), /* @__PURE__ */ React.createElement(P, null, `Repos: <code>github.com/liamcain/obsidian-periodic-notes</code> and <code>github.com/liamcain/obsidian-calendar-plugin</code>. Periodic Notes generalises core's Daily Notes to weekly, monthly, quarterly, and yearly. Calendar adds a calendar widget in the sidebar. Together they're the canonical scaffold for time-indexed notes. Claude Code integration: a scheduled morning agent writes <code>Daily/2026-04-24.md</code> using the same path Periodic Notes would have created, populated with yesterday's git activity, today's open PRs, and the calendar entries from <code>icalBuddy</code> or a calendar MCP server. The note appears in the Calendar widget with no extra plumbing.`), /* @__PURE__ */ React.createElement(H3, null, "Tasks (obsidian-tasks-group, maintainer Clare Macrae)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/obsidian-tasks-group/obsidian-tasks</code>. Originally Martin Schenck, now maintained by Clare Macrae since May 2022. Tasks parses Markdown task syntax (<code>- [ ] thing \u{1F4C5} 2026-04-30 \u{1F501} every week</code>) into a query layer with due dates, recurrence rules, and tags. Claude Code integration: task harvesting. A <code>Stop</code> hook can run a Tasks query for "all tasks due today across the vault" and write the result into the morning briefing.`), /* @__PURE__ */ React.createElement(H3, null, "Kanban (mgmeyers \u2014 currently seeking maintainers)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/mgmeyers/obsidian-kanban</code>. Markdown-backed kanban boards as <code>.md</code> files with a special frontmatter flag. As of 2026-04-24, Matthew Meyers is publicly seeking new maintainers; the plugin still works but is on the watch list. If you adopt it, do so knowing you may need to fork or migrate. Claude Code integration: each card is a Markdown line; the agent can move cards between columns by editing the source file. Useful for issue triage workflows where the agent reads PR review state and re-files cards.`), /* @__PURE__ */ React.createElement(H3, null, "Excalidraw (zsviczian)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/zsviczian/obsidian-excalidraw-plugin</code>. Latest release 2.22.0 within the last month. Bundles Excalidraw inside Obsidian; drawings save as <code>.excalidraw.md</code> (a Markdown wrapper around the Excalidraw JSON). The Markdown wrapping is the Claude integration story \u2014 the agent can read the JSON portion as a sketch description and re-emit a labelled diagram with new annotations. Less common but a fit for design-doc workflows where the diagram and the prose live next to each other.`), /* @__PURE__ */ React.createElement(H3, null, "Admonitions (Javalent / valentine195) \u2014 and the native callouts story"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/valentine195/obsidian-admonition</code>. Pre-dates Obsidian's native callout syntax. Worth using if you need callout types beyond the twelve built into core, or if you've inherited a vault with the older code-block <code>~~~ad-info</code> syntax. For new vaults, prefer native callouts \u2014 they survive plugin removal and Claude Code's reading layer treats them as ordinary blockquotes regardless of which renderer is active.`), /* @__PURE__ */ React.createElement(H3, null, "Natural Language Dates (argenos)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/argenos/nldates-obsidian</code>. Parses phrases like "next Friday" into ISO dates inline. Templater can call it via <code>tp.user.nldates(...)</code>; QuickAdd can use it in capture flows. Claude Code integration: when authoring a note, the agent writes ISO dates directly \u2014 <code>2026-05-02</code> rather than "next Friday." But when the human later edits the note in Obsidian and types "next Friday," NL Dates rewrites it to ISO. The two coexist cleanly.`), /* @__PURE__ */ React.createElement(H3, null, "Advanced Tables (tgrosinger)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/tgrosinger/advanced-tables-obsidian</code>. Spreadsheet-style table editing \u2014 auto-format, tab-to-next-cell, sortable columns, formulas. The Claude angle is small but real: when the agent writes a table-of-results note, Advanced Tables auto-formats it on save and formula columns recompute. Lets you keep the table in Markdown rather than splitting into a CSV.`), /* @__PURE__ */ React.createElement(H3, null, "Citations (hans)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/hans/obsidian-citation-plugin</code>. Reads a BibTeX or CSL-JSON bibliography and creates literature notes with one citation per note, named by citekey. Pairs with Zotero through Better BibTeX export. Claude Code integration: a literature-review skill that walks <code>Literature/</code>, drafts a survey, and emits in-text citations as <code>[@citekey]</code> \u2014 the exact format the citation plugin's hover preview expects.`), /* @__PURE__ */ React.createElement(H3, null, "Mind Map (lynchjames)"), /* @__PURE__ */ React.createElement(P, null, `Repo via <code>obsidianstats.com/plugins/obsidian-mind-map</code>. The Mind Map plugin renders a markdown note as a Markmap mind map. The latest release was 1.1.0 several years ago, and the plugin overlaps with Obsidian's native Canvas. <strong>Last verified 2026-04-24 \u2014 likely abandoned; consider Canvas instead.</strong> Including here because vaults that pre-date Canvas often still have Mind Map in their plugin list.`), /* @__PURE__ */ React.createElement(H3, null, "Smart Connections (brianpetro)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/brianpetro/obsidian-smart-connections</code>. Builds local embeddings over the vault and surfaces semantically related notes. Models can be local (default) or remote; choose local to keep notes on the machine. Pairs with Claude Code as a "find me notes related to this draft" sidebar \u2014 the agent then reads those notes via its Read tool. The default local model is the privacy-preserving option; if you flip to a remote provider, your notes go to that provider.`), /* @__PURE__ */ React.createElement(H3, null, "Copilot plugin (logancyang)"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/logancyang/obsidian-copilot</code>. In-vault chat against an LLM. Supports remote APIs (OpenAI, Anthropic, Google) and local models. Distinct from <em>Claude Code</em> \u2014 Copilot is a chat panel inside Obsidian; Claude Code is an agent in a terminal. They can coexist on the same vault, but answer different questions: Copilot for "summarise this note while I read it"; Claude Code for "rewrite this folder of notes." If you do not need both, keep one \u2014 the maintenance overhead of two LLM keys is not worth the convenience.`), /* @__PURE__ */ React.createElement(H3, null, "Text Generator (nhaouari)"), /* @__PURE__ */ React.createElement(P, null, `Repo via <code>obsidianstats.com</code>. Versatile text-generation plugin against multiple providers. Older than Copilot and broader in scope (template-driven generation). Useful when you want a single keypress to expand a templated prompt against a configured provider \u2014 but again, if you have Claude Code already, the value-add is incremental.`), /* @__PURE__ */ React.createElement(H3, null, "Obsidian Projects (marcusolsson \u2014 discontinued; Projects Plus continues)"), /* @__PURE__ */ React.createElement(P, null, `Original repo: <code>github.com/marcusolsson/obsidian-projects</code>. Marcus Olsson <strong>discontinued</strong> the project on 2025-05-12; a community fork named Projects Plus continues development. Projects renders folders as table / calendar / board / gallery views over Markdown. If you depend on the original, plan a migration. If you're starting fresh, evaluate Projects Plus or use a Dataview-rendered table instead. Last verified 2026-04-24.</P>`), /* @__PURE__ */ React.createElement(H3, null, "The Local REST API plugin (coddingtonbear) \u2014 the one that turns the vault into an API"), /* @__PURE__ */ React.createElement(P, null, `Repo: <code>github.com/coddingtonbear/obsidian-local-rest-api</code>. Not a productivity plugin \u2014 an infrastructure plugin. It exposes your vault over HTTP (default <code>https://127.0.0.1:27124</code>, fallback <code>http://127.0.0.1:27123</code>) with token authentication. Both major Obsidian MCP servers (covered in \xA73) bridge through it. If you want any external process \u2014 Claude Code, an MCP server, a shell script \u2014 to read or write the vault while Obsidian is running, this is the integration point.`), /* @__PURE__ */ React.createElement(PluginCoverage, null), /* @__PURE__ */ React.createElement(Cap, null, "Subjective scores \u2014 verify for your own vault. The pattern: the higher a plugin scores, the more it acts on plain Markdown the agent can also act on. Plugins that lock content into a proprietary view score low even when they're individually wonderful.")), /* @__PURE__ */ React.createElement(

  ), /* @__PURE__ */ React.createElement(Sec, { n: "3", title: "Part 3 \u2014 The automation layer" }, /* @__PURE__ */ React.createElement(P, null, `This is the part where the integration earns its name. Five surfaces \u2014 hooks, skills, MCP servers, daemons, scheduled runs \u2014 and the Agent SDK that lets you wire all of them together. Every event below is documented at <code>code.claude.com/docs/en/hooks</code> or <code>code.claude.com/docs/en/skills</code>; every JSON shape comes from there.`), /* @__PURE__ */ React.createElement(H3, null, "Hooks \u2014 the lifecycle callback surface"), /* @__PURE__ */ React.createElement(P, null, `Claude Code documents nine lifecycle hook events: <code>PreToolUse</code>, <code>PostToolUse</code>, <code>UserPromptSubmit</code>, <code>SessionStart</code>, <code>SessionEnd</code>, <code>Stop</code>, <code>SubagentStop</code>, <code>PreCompact</code>, and <code>Notification</code>. Hooks are configured in JSON under the <code>hooks</code> key in <code>settings.json</code> (user scope) or <code>.claude/settings.json</code> (project scope). Each hook has a matcher (which tools / which events it fires on) and a list of handlers. A handler is typically a shell command; it receives a JSON event payload on stdin and signals outcome via exit code \u2014 0 success, 2 a blocking error fed back to Claude as stderr text. Async background handlers (<code>"async": true</code>) became available in early 2026.`), /* @__PURE__ */ React.createElement(HookLifecycle, null), /* @__PURE__ */ React.createElement(Cap, null, "The nine events laid out as a timeline. Each annotation is a vault-facing example you can adapt; in practice you'll have at most three or four of these populated at a time."), /* @__PURE__ */ React.createElement(H3, null, "One vault example per event"), /* @__PURE__ */ React.createElement(P, null, `<strong>SessionStart.</strong> When a session opens, read the vault root <code>CLAUDE.md</code> and inject a one-line summary into the conversation context \u2014 useful when the agent is started from a parent directory and the vault context would otherwise be missed.`), /* @__PURE__ */ React.createElement(P, null, `<strong>UserPromptSubmit.</strong> Lint the user's prompt for vault references \u2014 if the prompt mentions <code>[[Note]]</code> by name and the note doesn't exist, warn before the model spends tokens trying to reason about it.`), /* @__PURE__ */ React.createElement(P, null, `<strong>PreToolUse.</strong> Block <code>Write</code> tool calls whose target path is outside the vault and outside an explicit allowlist. Exit code 2 with an explanation in stderr cancels the tool call and surfaces the reason to Claude.`), /* @__PURE__ */ React.createElement(P, null, `<strong>PostToolUse.</strong> After a Write, run a YAML frontmatter linter against the modified file. If the frontmatter is invalid, log the diff and (optionally) revert via <code>git restore</code>.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Notification.</strong> When Claude requests user attention, forward to <code>ntfy.sh</code> or a Slack webhook so a long-running session can finish unattended.`), /* @__PURE__ */ React.createElement(P, null, `<strong>SubagentStop.</strong> Append the subagent's transcript to a vault log note named after the parent session ID. Lets you reread what the subagent did without trawling the parent terminal.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Stop.</strong> Sweep <code>Daily/$(date +%F).md</code> for <code>- [ ]</code> task lines whose body starts with "issue:" and run <code>gh issue create</code> for each, appending the issue number back into the line for idempotency.`), /* @__PURE__ */ React.createElement(P, null, `<strong>PreCompact.</strong> Snapshot the conversation transcript to a vault note before context compaction. Compaction is lossy; the snapshot is your backup.`), /* @__PURE__ */ React.createElement(P, null, `<strong>SessionEnd.</strong> Roll the daily note forward (move uncompleted tasks to tomorrow's note), flush the JSONL log, optionally <code>git commit</code> the vault.`), /* @__PURE__ */ React.createElement(Code, { title: "~/.claude/settings.json \u2014 a Stop-hook for meeting-note \u2192 issue" }, `{

name: synthesise-folder
description: Use when the user asks to synthesise a folder of notes
  into a draft article, write a literature review across linked notes,
  or produce a summary that cites the source notes by [[wikilink]].
---

# Synthesise folder

Read every \`*.md\` under the folder the user names (default: cwd).
Produce a 1,500-word draft. Cite every claim with a [[wikilink]] to
the note it came from. Save to \`_draft.md\` in the same folder.`), /* @__PURE__ */ React.createElement(H3, null, "MCP servers \u2014 the protocol layer"), /* @__PURE__ */ React.createElement(P, null, `The Model Context Protocol is a JSON-RPC 2.0 standard introduced by Anthropic in late 2024 and now governed under the Linux Foundation's Agentic AI Foundation. The current spec at <code>modelcontextprotocol.io/specification/2025-11-25</code> defines two transports: <strong>stdio</strong> (server runs as a subprocess; messages on stdin/stdout, newline-delimited) and <strong>Streamable HTTP</strong> (a single endpoint supporting POST and GET, with optional Server-Sent Events for streaming). Claude Code is an MCP client.`), /* @__PURE__ */ React.createElement(P, null, `Two well-maintained MCP servers bridge to an Obsidian vault, both via the Local REST API plugin. <strong>MarkusPfundstein/mcp-obsidian</strong> exposes <code>list_files_in_vault</code>, <code>list_files_in_dir</code>, <code>get_file_contents</code>, <code>search</code>, <code>patch_content</code>, <code>append_content</code>, <code>delete_file</code>. <strong>cyanheads/obsidian-mcp-server</strong> adds frontmatter and tag management, an in-memory cache that serves as a fallback when the live API drops, and a TypeScript-based architecture. Both connect on the Local REST API's default port 27124 (HTTPS) or 27123 (HTTP) and require an OBSIDIAN_API_KEY from the plugin settings.`), /* @__PURE__ */ React.createElement(Code, { title: "claude code MCP config \u2014 adding the obsidian-mcp-server" }, `# Add the cyanheads server to Claude Code via the CLI
claude mcp add obsidian \\
  --scope user \\
  --command "npx -y @cyanheads/obsidian-mcp-server" \\
  --env OBSIDIAN_API_KEY="$(security find-generic-password -s obsidian_api -w)" \\
  --env OBSIDIAN_HOST=127.0.0.1 \\
  --env OBSIDIAN_PORT=27124`), /* @__PURE__ */ React.createElement(P, null, `Once registered, a Claude Code session can ask the vault natural questions \u2014 "find every note tagged <code>#paper-to-read</code> not yet linked from <code>Reading Log</code>" \u2014 and the model picks the right MCP tool. The anti-pattern is exposing <code>delete_file</code> without a confirmation gate; both maintained servers handle this carefully, but a hand-rolled server probably won't. Read the server source before pointing one at a vault that contains anything private.`), /* @__PURE__ */ React.createElement(H3, null, "File-watcher daemons \u2014 launchd vs cron vs Watchdog vs fswatch"), /* @__PURE__ */ React.createElement(P, null, `<strong>launchd</strong> is the macOS native scheduler (LaunchAgent or LaunchDaemon, plist-driven, run by <code>launchctl</code>). It wakes a sleeping laptop, has built-in stdout/stderr file logging, and handles missed intervals correctly. Prefer launchd over cron on macOS; the only reason to use cron on macOS is shell-portability with a Linux box.`), /* @__PURE__ */ React.createElement(P, null, `<strong>cron</strong> on Linux. Lighter than systemd timers but missing failure recovery. <strong>systemd-timer</strong> is the cron equivalent on modern Linux \u2014 gives you logs in <code>journalctl</code>, restart policies, dependency declarations.`), /* @__PURE__ */ React.createElement(P, null, `<strong>Watchdog</strong> is a Python library; <strong>fswatch</strong> is a cross-platform CLI. Both are useful when you need <em>sub-second latency</em> on a file change \u2014 but for vault workflows, "scan every 30 s" via launchd is almost always fine. The article-daemon in this workspace uses launchd specifically because it survives a closed laptop lid; fswatch would not.`), /* @__PURE__ */ React.createElement(P, null, `The article-daemon is the reference implementation. Its state machine, from <code>tests/test_state_machine.py</code>: a note moves <code>idea \u2192 draft \u2192 ready \u2192 generating \u2192 generated</code>, with <code>failed</code> as a branch off <em>any</em> state if Claude returns non-zero or times out. The <code>ready \u2192 generating</code> hop is the load-bearing one \u2014 atomic via <code>fcntl.flock(LOCK_EX)</code> so two scans in flight cannot double-process the same note. Three test invariants exercise the state machine: a <code>ready</code> note must flip to <code>generated</code> on success; a failing CLI invocation must flip the note to <code>failed</code> with the first 500 characters of stderr captured in <code>error-log</code>; a non-<code>ready</code> note must be left untouched. <code>run_claude</code> is monkeypatched in the tests so no real CLI is spawned.`), /* @__PURE__ */ React.createElement(DataflowDiagram, null), /* @__PURE__ */ React.createElement(Cap, null, "The full dataflow of the live workspace's article-daemon, with state transitions called out. The daemon does one thing \u2014 flip a note from ready to generating, spawn claude -p, and record the outcome. Phase 2's separate watcher handles publishing."), /* @__PURE__ */ React.createElement(H3, null, "Scheduled Claude Code \u2014 cron, launchd, GitHub Actions"), /* @__PURE__ */ React.createElement(P, null, `A scheduled Claude run (a "morning briefing", a weekly README refresh) has three viable triggers, each with different sleep / failure semantics.`), /* @__PURE__ */ React.createElement(P, null, `<strong>cron</strong> on Linux: simple, no sleep handling, no missed-interval recovery. <strong>launchd</strong> on macOS via <code>StartCalendarInterval</code>: handles closed lids; missed runs do execute when the laptop wakes (depending on settings). <strong>GitHub Actions</strong> via <code>schedule</code>: runs on GitHub's runners, survives every machine state including yours being off, but the agent only has access to repo files and whatever secrets you've configured. The workspace's <code>publish-to-hf.yml</code> is the worked example for the third option.`), /* @__PURE__ */ React.createElement(SB, { title: "When a scheduled run fails silently" }, `Always have your scheduled agent write at least a placeholder note \u2014 even if the data fetch failed, write "ERROR: <reason>" to the briefing. A missing note is invisible; a present note with an explicit error message is debuggable.`), /* @__PURE__ */ React.createElement(H3, null, "Claude Agent SDK \u2014 the programmatic layer"), /* @__PURE__ */ React.createElement(P, null, `The Agent SDK (<code>github.com/anthropics/claude-agent-sdk-python</code>, also TypeScript) gives you programmatic access to the same loop the CLI runs. The Python entry point is <code>query()</code>: an async function that runs a prompt, streams events back, and exposes the same tool surface as the CLI. Subagents are invoked via the <code>Agent</code> tool, so <code>"Agent"</code> must be in <code>allowedTools</code> for the orchestrator to spawn them. An <code>AgentDefinition</code> dataclass gives each subagent its own description, system prompt, allowed tools, and (optionally) model.`), /* @__PURE__ */ React.createElement(Code, { title: "Python \u2014 vault-aware orchestrator with two subagents" }, `from claude_agent_sdk import query, AgentOptions, AgentDefinition

VAULT = "/Users/you/Documents/Obsidian Vault"

reader = AgentDefinition(
    description="Reads notes under a vault subfolder; returns key claims.",
    prompt="You read Markdown only. Return claims as a JSON list.",
    tools=["Read"],
)
writer = AgentDefinition(
    description="Writes a draft synthesis to _draft.md in the same folder.",
    prompt="You write a 1,500-word draft citing every claim with a [[wikilink]].",
    tools=["Read", "Write"],
)

async def synthesise(folder: str):
    options = AgentOptions(
        cwd=f"{VAULT}/{folder}",
        agents={"reader": reader, "writer": writer},
        allowedTools=["Agent", "Read", "Write"],
    )
    async for event in query("Synthesise this folder.", options=options):

(P, null, `Open-source, self-hosted, no third-party server. Conflict files appear with a <code>.sync-conflict-YYYYMMDD-HHMMSS-DEVID</code> suffix in the filename. The pattern is unmistakable; a Claude Code chore that scans for <code>*-sync-conflict-*</code> and surfaces them in a maintenance note is two lines of shell. Pairs less cleanly with mobile (iOS Syncthing is third-party and intermittent) but the desktop experience is fast and explicit.`), /* @__PURE__ */ React.createElement(H3, null, "git + Obsidian Git plugin"), /* @__PURE__ */ React.createElement(P, null, `The lowest-magic option. Vault under git, push and pull via the Obsidian Git plugin or via shell. Conflicts surface as merge conflicts in the file itself with <code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;</code> markers \u2014 explicit, debuggable, and resolvable from the agent if you give it the right prompt. The cost is operational overhead (you maintain a remote, you handle pushes) and the gotcha is that <code>.obsidian/workspace.json</code> changes constantly, so gitignore it. This is the model the workspace itself uses for the <code>article-daemon</code>, <code>library</code>, and <code>library-articles</code> repos \u2014 but the <em>vault</em> in this workspace is on Obsidian Sync, not git, because the daemon is the one rewriting the vault and a per-edit commit would dwarf every other commit in the repo.`), /* @__PURE__ */ React.createElement(Callout, { type: "tip", title: "Pick one sync, not two" }, `Layering two sync mechanisms on the same vault is the most reliable way to corrupt it. iCloud + Syncthing on the same folder produces conflict storms that no amount of agent intelligence will untangle. If you need redundancy, snapshot to a separate location with <code>rclone</code> or <code>restic</code> rather than running two live syncs.`), /* @__PURE__ */ React.createElement(H3, null, "Obsidian mobile \u2014 what the agent cannot do"), /* @__PURE__ */ React.createElement(P, null, `Claude Code does not run on iOS or Android. The CLI is a desktop process; the web sandbox at claude.ai/code is browser-accessible from a phone but operates on a remote sandbox, not the local vault. The practical pattern: a Claude Code instance on the desktop holds an MCP connection to the vault (via the Local REST API plugin); the human edits on mobile via Obsidian Sync; any agent action requires the desktop to be on (or a GitHub Actions / Hugging Face Space proxy in front of the agent). The phone is a viewer and a capture device, not an executor.`), /* @__PURE__ */ React.createElement(H3, null, "Obsidian Publish vs static-site alternatives"), /* @__PURE__ */ React.createElement(P, null, `Obsidian Publish is the official $8/month hosted publishing surface \u2014 you mark notes as <code>publish: true</code> in frontmatter (or use the publish UI), the Publish service builds a hosted site at <code>publish.obsidian.md/&lt;site&gt;</code> with backlinks, search, custom CSS, and password protection. Beginner-friendly; no Node.js, no Git, no static-site generator to maintain.`), /* @__PURE__ */ React.createElement(P, null, `The alternative is the path this workspace uses. Quartz, Astro, or a hand-rolled static site generator builds Markdown into HTML; the result is hosted on a free static-site provider \u2014 Netlify, Cloudflare Pages, Hugging Face Spaces, GitHub Pages. The trade is direction: setup cost is higher (30\u201360 minutes for Quartz, longer for hand-rolled) but the result is fully owned, fully customisable, and free at the scales that matter. The workspace's <code>library-articles</code> repo is Quartz-style \u2014 JSX articles built by a Python <code>build.py</code> step and pushed to a Hugging Face static Space, with a Streamlit-based reader at a second Space rendering the markdown mirror.`), /* @__PURE__ */ React.createElement(P, null, `The Claude Code angle on this choice is sharp. Obsidian Publish has no agent surface \u2014 the publish step is manual, triggered from inside Obsidian, and there is no API to script it. A static-site pipeline like the workspace's exposes a clean automation seam: a launchd watcher picks up new <code>.jsx</code> files, runs the build, commits, pushes to Hugging Face. Claude Code never touches the publishing layer; it writes the JSX and the rest is plumbing. If you want the agent to publish, the static-site route is the only one that fits.`)), /* @__PURE__ */ React.createElement(

o the line for idempotency.`), /* @__PURE__ */ React.createElement(Code, { title: "~/.claude/hooks/file_meeting_tasks.py \u2014 full handler" }, `#!/usr/bin/env python3
import datetime, json, re, subprocess, sys
from pathlib import Path

VAULT = Path("/Users/you/Documents/Obsidian Vault")
today = datetime.date.today().isoformat()
note = VAULT / "Daily" / f"{today}.md"
if not note.is_file():
    sys.exit(0)

text = note.read_text(encoding="utf-8")
out = []
for line in text.splitlines():
    m = re.match(r"^- \\[ \\] issue: (.+?)\\s*$", line)
    if m and "(gh#" not in line:
        title = m.group(1)
        result = subprocess.run(
            ["gh", "issue", "create", "--title", title,
             "--body", f"Created from {note.relative_to(VAULT)}"],
            capture_output=True, text=True,
        )
        url = (result.stdout or "").strip()
        if "/issues/" in url:
            num = url.rsplit("/", 1)[-1]
            line = f"- [ ] (gh#{num}) issue: {title}"
    out.append(line)
note.write_text("\\n".join(out), encoding="utf-8")
sys.exit(0)`), /* @__PURE__ */ React.createElement(P, null, `The idempotency guard \u2014 <code>"(gh#" not in line</code> \u2014 is the bit that lets the hook fire safely on every <code>Stop</code>. The first run creates an issue and rewrites the line; subsequent runs skip the line because the guard string is now present.`), /* @__PURE__ */ React.createElement(H3, null, "The reading queue pattern"), /* @__PURE__ */ React.createElement(P, null, `Every paper note has a <code>status</code> property: <code>queued</code>, <code>reading</code>, <code>summarised</code>, <code>cited</code>. A daily Claude Code sweep promotes the oldest <code>queued</code> paper to <code>reading</code>, fetches the abstract from arXiv (via a web tool), and appends a question to the paper note: <em>"What is this paper's central claim?"</em> When the human answers in the body and flips status to <code>summarised</code>, a follow-up sweep adds the paper to the running survey draft. The agent is an opinionated reading partner, not a reader replacement \u2014 it queues, it asks, but the human reads.`), /* @__PURE__ */ React.createElement(H3, null, "The morning-briefing pattern"), /* @__PURE__ */ React.createElement(P, null, `A scheduled launchd job runs <code>claude -p "/morning-briefing"</code> at 07:00. The skill is a single Markdown file under <code>~/.claude/skills/morning-briefing/SKILL.md</code>. It runs <code>git log --since=yesterday</code> across a known list of repos, queries <code>gh pr list --search "review-requested:@me"</code>, reads the latest row of an experiments CSV, and writes the synthesis to <code>00-dashboard.md</code> in the vault. Open Obsidian with your coffee; the dashboard is already there. Two design rules: write a placeholder note even when a data fetch fails (so the missing section is visible), and keep the agent away from any expensive computation in this loop (the briefing is a readout of state, not a computation).`)), /* @__PURE__ */ React.createElement(

failure mode where the agent picks the wrong side of a conflict and silently deletes a paragraph the human wrote is worse than the inconvenience of resolving manually.`), /* @__PURE__ */ React.createElement(H3, null, "Memory drift \u2014 vault truth vs CLAUDE.md truth"), /* @__PURE__ */ React.createElement(P, null, `Claude Code's four-tier memory hierarchy (user-scope <code>~/.claude/CLAUDE.md</code>, project root, subdirectory, gitignored <code>CLAUDE.local.md</code>) and the vault are parallel knowledge stores with different shapes. The rule that holds up: <em>the vault is the source of truth for things the human reads; <code>CLAUDE.md</code> is the source of truth for things the agent reads.</em> When a fact belongs in both, write it once and import. CLAUDE.md supports an <code>@path/to/file</code> import syntax \u2014 use it.`), /* @__PURE__ */ React.createElement(MemoryVsVault, null), /* @__PURE__ */ React.createElement(Cap, null, "Where each kind of memory lives. The boundary that matters most is the horizontal one: ephemeral memory (current session, shell history, workspace.json) gets you nowhere if the agent crashes; durable memory (vault, git, CLAUDE.md) is where long-term truth lives."), /* @__PURE__ */ React.createElement(H3, null, "Token cost and pagination as the vault grows"), /* @__PURE__ */ React.createElement(P, null, `A naive prompt of "read every note" is fine at 100 notes and ruinous at 10,000. Two mitigations. First, prefer Dataview's index over a raw read \u2014 a DQL query returns names + frontmatter without slurping bodies. Second, make MCP tool calls paginated. <code>list_files_in_vault</code> with no pagination on a 10k-note vault returns 10k paths and consumes a chunk of context window; <code>list_files_in_dir</code> scoped to one folder with the actual question in mind is the disciplined pattern. The article-daemon uses neither MCP nor Dataview \u2014 it walks <code>os.walk</code> with a skip-list (<code>.obsidian</code>, <code>.trash</code>, <code>.git</code>, <code>Templates</code>, <code>_archive</code>) and only opens files whose first line is YAML. Cheap by construction.`), /* @__PURE__ */ React.createElement(H3, null, "Privacy \u2014 which plugins phone home"), /* @__PURE__ */ React.createElement(P, null, `Smart Connections defaults to a local embedding model and the data does not leave the device. The Copilot plugin and Text Generator default to remote APIs (OpenAI, Anthropic, Google) \u2014 your notes are sent in API requests, subject to whichever provider's retention policy applies. Claude Code itself, when configured against the Anthropic API, sends prompts to Anthropic's servers; the same applies to MCP servers that wrap external services. The defensive pattern: keep a <code>.private/</code> directory excluded from the vault's plugin enables, gitignored, and skipped by the daemon's walk. Anything in there sees neither plugins nor agents.`), /* @__PURE__ */ React.createElement(H3, null, "Scaling past 10,000 notes"), /* @__PURE__ */ React.createElement(P, null, `Obsidian's open performance benchmark sits well past 10,000 notes \u2014 the Graph view is the first surface to slow, then global text search. Strategies: shard the vault into separate vaults if the topical separation is clean (a Reading vault and a Notes vault, separately backed up); index outside Obsidian (a sidecar SQLite database refreshed nightly by a Claude Code skill, queryable by MCP); or move the brute-force search workload to <code>ripgrep</code> instead of Obsidian's built-in. None of these is a generic answer; the right fix depends on which surface is the actual bottleneck.`), /* @__PURE__ */ React.createElement(H3, null, "Multi-repo coherence \u2014 the mirror problem"), /* @__PURE__ */ React.createElement(P, null, `<code>~/.claude/skills/</code> at user scope is the single source of truth for a skill. Repo-committed mirrors at <code>.claude/skills/</code> let Claude Code for web see the skill. The mirror is one-way and the workspace ships a <code>sync-skills.sh</code> script to enforce that direction. The failure mode is editing the mirror in a hurry, forgetting it's a mirror, and watching the user-scope copy quietly diverge. Discipline: never edit the mirror; always edit user-scope; always sync after editing. CI can guard this \u2014 a workflow check that diffs <code>.claude/skills/</code> against the user-scope copy if the host has access \u2014 but in practice the cleanest discipline is the one-way script and a habit of running it before every commit.`)), /* @__PURE__ */ React.createElement(
