ement(PullQuote, null, '"RO-DBT is the first treatment in the world to prioritise social signalling as the primary mechanism of change." \u2014 Thomas R. Lynch'), /* @__PURE__ */ React.createElement(Para, null, "The treatment that emerged from this recognition \u2014 Radically Open Dialectical Behaviour Therapy, or RO-DBT \u2014 represents a fundamental restructuring of DBT's theoretical architecture, not merely an adaptation of its techniques. Lynch published the treatment manual in 2018 through New Harbinger/Context Press, after more than twenty-five years of translational research. By that point, he had moved to the University of Southampton in the UK, where he held a professorship in clinical psychology until his recent emeritus status, and where the flagship trial of his treatment was running. RO-DBT is now practised across the UK, Europe, and North America, applied to a range of conditions the treatment's proponents believe share an underlying architecture of maladaptive overcontrol."), /* @__PURE__ */ React.createElement("div", { style: { margin: "40px 0 0" } }, /* @__PURE__ */ React.createElement(

m", null, "emotional expression"), " \u2014 specifically, in the social signals by which human beings communicate care, vulnerability, and openness to connection."), /* @__PURE__ */ React.createElement(Para, null, "This is where RO-DBT diverges most sharply from standard DBT and from most of psychotherapy's existing toolkit. Standard DBT, and to a significant degree CBT, ACT, and mindfulness-based approaches, target the internal management of distress \u2014 tolerance, reappraisal, defusion, acceptance. The implicit model of recovery is one in which the patient becomes better at regulating their inner state. RO-DBT's model of recovery targets something different: the communicative behaviour that signals inner state to others. The mechanism of change Lynch proposes is not internal regulation but social signalling \u2014 the micro-expressions, vocal prosody, and behavioural openness through which we signal to other humans that we are safe to approach. The hypothesis, bluntly stated: you cannot think your way out of loneliness. You have to learn to be legible again."), /* @__PURE__ */ React.createElement(OCvsUCRadar, null), /* @__PURE__ */ React.createElement(DiagramCaption, { title: "Overcontrol vs. Undercontrol: Phenotypic Profile" }, "Schematic radar comparison of the trait profiles associated with undercontrol (the primary target of standard DBT) and overcontrol (the primary target of RO-DBT). The two profiles are approximate mirror images across several dimensions. Overcontrolled individuals score high on self-control, detail focus, and risk aversion while scoring low on emotional expression, cognitive flexibility, and social openness. Standard psychiatric assessment tools are designed primarily to detect undercontrol \u2014 a gap that Lynch argues contributes to systematic misdiagnosis and failed treatment of overcontrolled presentations. Source: Adapted from Lynch (2018); Lynch et al. (2015)."), /* @__PURE__ */ React.createElement(SB, { title: "The Neurobiosocial Theory: Three Pathways to Overcontrol" }, /* @__PURE__ */ React.createElement("p", { style: { marginBottom: 10 } }, "Lynch's neurobiosocial model identifies three interlocking factors that produce maladaptive overcontrol:"), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: 10 } }, /* @__PURE__ */ React.createElement("strong", null, "1. Biotemperamental predisposition."), " Heightened threat sensitivity \u2014 mediated by the body's threat-detection systems, including elevated activity in threat-processing neural circuits \u2014 produces a constitutional tendency to perceive ambiguous social cues as dangerous, to scan environments for potential failure, and to inhibit spontaneous behaviour in the presence of uncertainty. Diminished reward sensitivity means positive social feedback registers less intensely, making the reinforcement value of social connection feel weaker than the risk."), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: 10 } }, /* @__PURE__ */ React.createElement("strong", null, "2. Socially learned inhibition."), " Environments that reward performance and punish emotional display \u2014 high-achieving family systems, certain cultural contexts, competitive professional environments \u2014 teach overcontrolled individuals that emotional expression is a liability. The child who cries and is told not to, or whose vulnerability is met with discomfort rather than care, learns to seal the signal. Over years, this becomes automatic \u2014 the facial expression flattens at a pre-attentive level, before conscious awareness can intervene."), /* @__PURE__ */ React.createElement("p", null, /* @__PURE__ */ React.createElement("strong", null, "3. Self-control coping."), " The more overcontrolled individuals apply self-control to social situations \u2014 rehearsing interactions, scripting emotional responses, monitoring facial expressions during conversations \u2014 the more they withdraw from the spontaneity that makes connection m published findings. Source: Lynch et al. (2020). ", /* @__PURE__ */ React.createElement("em", null, "British Journal of Psychiatry"), "; NCBI Bookshelf NBK535123."), /* @__PURE__ */ React.createElement(Para, null, 'The trial authors interpret the attenuating effect with care. "RO-DBT does not label depression as the primary problem," the ', /* @__PURE__ */ React.createElement("em", null, "British Journal of Psychiatry"), ' paper notes. "Instead it targets emotional overcontrol \u2014 a maladaptive personality style known to predict the development of chronic internalising disorders such as refractory depression." Personality change, the argument runs, operates on a longer timescale than the 18-month window of most clinical trials. A treatment that targets characterological rigidity should not be expected to show its full effect within a year of completion. The authors call for longer follow-up periods in future research \u2014 a methodologically sound request that is also, inevitably, an expensive one.'), /* @__PURE__ */ React.createElement(SB, { title: "The Five Behavioural Themes of Overcontrol" }, /* @__PURE__ */ React.createElement("p", { style: { marginBottom: 10 } }, "RO-DBT organises its clinical assessment around five behavioural themes that characterise maladaptive overcontrol. These are not diagnostic criteria but clinical anchors \u2014 patterns the therapist and client collaboratively identify as the mechanisms maintaining the patient's isolation:"), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: 8 } }, /* @__PURE__ */ React.createElement("strong", null, "1. Hyper detail-focused and overly cautious behaviour"), " \u2014 intense attention to potential errors, prolonged preparation before action, difficulty tolerating uncertainty."), /* @__PURE__ */ React.createElement("p", { style: { marginBottom: 8 } }, /* @__PURE__ */ React.createElement("strong", null, "2. Rigid and rule-governed behaviour"), " \u2014 strong adherence to internal s
