aced eastward by some quirk of the continental shelf, brushes Bishop Rock and bends north. The islands sit inside its sleeve. Frost is rare. Snow has fallen here perhaps half a dozen times in living memory. And so the flower farmers, who in another life would be fishermen \u2014 most of them are, or were \u2014 bend over the lines of bulbs in February and turn the islands' impossible mildness into a London bouquet.`), /* @__PURE__ */ React.createElement(P, null, `What I am here for, mostly, is light. The Isles of Scilly sit in the light the way an oyster sits in the half-shell \u2014 held up to it, exposed on every side. There is no inland anywhere on these islands; you are never more than half a mile from the sea. The granite of which the archipelago is made \u2014 the same Cornubian batholith that forms Dartmoor and Land's End and the tin mines of Camborne \u2014 surfaces here as a scatter of pale pink rocks rinsed by salt, weathered to silver, and then catches whatever the sky is doing and gives it straight back. In April the granite is grey. In November it is mauve. At the precise minute before sunset, in any month, it is briefly the colour of a struck match. Photographers come for that minute.`), /* @__PURE__ */ React.createElement(P, null, `They come, too, for what is not in the picture. Five inhabited islands \u2014 St Mary's, Tresco, Bryher, St Martin's, St Agnes (with its tidal-causeway twin, Gugh) \u2014 and a hundred and forty unpeopled ones, depending on how you count rocks. No traffic lights. No motorways. On the off-islands, no cars at all: a tractor for the post, a Land Rover for the doctor, and otherwise feet. Mike Nelhams, who has run the gardens at Tresco Abbey since 1984 and is technically retired but walks the paths every morning regardless, calls it the only place in England where you can hear the weather coming half an hour before it arrives. "You hear the Atlantic change its mind," he says, "and then you have time to tie down the camellias."`), /* @__PURE__ */ React.createElement(P, null, `The crossing from the mainland is the first reminder that this is not a place you simply drive to. The <em>Scillonian III</em>, a 1977-built passenger ferry of forty-four metres and famous bad temper in any sea-state above Force 6, leaves Penzance at 09:15 on most weekdays from late March to early November and takes two hours and forty-five minutes to reach Hugh Town quay on St Mary's. There is no car deck. You arrive on foot, with whatever you can carry, and the cab driver \u2014 there is one cab driver, currently \u2014 already knows your name from the booking sheet. Skybus, the Twin Otter operator, can fly you across in twenty minutes from Land's End in tolerable weather; in summer it adds Newquay and Exeter. And since 2020, when Penzance Heliport reopened after a forty-eight-year hiatus, a Sikorsky S-92 has been thumping back and forth across Mount's Bay to St Mary's and Tresco in around fifteen minutes, weather permitting. None of these is bookable on a same-day basis in high season. The islands enforce their distance even now.`), /* @__PURE__ */ React.createElement(PQ, null, `"You hear the Atlantic change its mind, and then you have time to tie down the camellias." \u2014 Mike Nelhams, Curator, Tresco Abbey Garden`), /* @__PURE__ */ React.createElement(P, null, `The literary tradition for writing about Scilly is overwhelmingly elegiac. Geoffrey Grigson called them "fragments of a lost continent." Robert Macfarlane has written about them in the register he reserves for thresholds \u2014 the places where the British Isles begin to dissolve into ocean. There is something to this; the islands are, geologically, the highest peaks of a drowned plateau, and the legend of Lyonesse \u2014 the lost city said to lie beneath the waters between Scilly and Penwith \u2014 is taken seriously enough that local historians still publish on it. But the islands themselves resist elegy. They are working places. The flowers are picked. t.createElement(P, null, `<strong>Winter \u2014 21 December (solstice).</strong> Civil twilight begins 07:53 GMT. Sunrise 08:27 GMT on <em>130\xB0</em> (SE). Golden hour 08:27&#8211;09:10 \u2014 but sun only reaches 14\xB0 elevation at noon. Sunset 16:18 GMT on <em>235\xB0</em> (SW). The whole day is, in effect, shoulder light; no harsh midday sun. The challenge is weather (Atlantic storms track through every 3&#8211;5 days) and access (limited Skybus, no Scillonian).`), /* @__PURE__ */ React.createElement(Callout, { type: "tip", title: "BST vs GMT \u2014 a Scilly-specific trap" }, `British Summer Time runs from the last Sunday in March to the last Sunday in October. Equinox-week sunsets shift across the GMT\u2013BST boundary in March; in late October the sunset suddenly arrives an hour earlier. The Scillonian III departs Penzance and St Mary's on local clock time (BST in season). PhotoPills will handle the conversion if you set the location and let it auto-detect. Do not assume "golden hour at 19:00" without verifying which side of the boundary you are on.`)), /* @__PURE__ */ React.createElement(Sec, { n: "6", title: "Close \u2014 what the islands return" }, /* @__PURE__ */ React.createElement(P, null, `Andrew Julian, who has been picking narcissi on St Martin's for forty years and is approximately as romantic about it as a London cab driver is about the A40, has one piece of advice for visiting photographers who ask him about light: "Don't wait for it." He means it as a practical injunction \u2014 the weather here turns inside an hour, and the photographer who waits for the perfect alignment of cloud and tide and equinox sun will leave the islands with an empty card. But it carries a wider sense too. The Isles of Scilly are not a place you photograph by holding still. They are a place where the tide moves, the boats are cancelled, the swell flattens or builds, the heliport runs or it doesn't, the bar dries or it doesn't, the gardener has time for you or he doesn't, and the light is on the granite for the eleven minutes between the depressions.`), /* @__PURE__ */ React.createElement(P, null, `What the islands return, when they decide to, is something the rest of England no longer offers. Five inhabited islands with a combined population of around 2,200, two of which still have working flower farms; an archipelago in which there are no cars on four of the five inhabited islands; a Bortle 3 sky on a clear winter night; granite that holds the colour of evening for longer than any cliff on the mainland; and a working harbour where the boatmen still chalk the day's sailings on a board at half-past eight in the morning. None of which is for sale. None of which is in the brochures. All of which is, every weather window, on offer.`), /* @__PURE__ */ React.createElement(P, null, `Andrew finishes his row at six-fifteen. The first easterly horizon-crack of light has reached the field; the narcissi in the cut box are luminous against the dark soil. He counts the bunches \u2014 eighty-seven \u2014 and walks them down the track to the post boat. The boat is already waiting at the quay. By Wednesday afternoon they will be on a marble counter in Marylebone. By Thursday they will be in someone's kitchen in N16, scenting a hallway, two-day-old proof that the islands at the edge of the British map were warm enough, in the second week of February, to grow flowers.`)), /* @__PURE__ */ React.createElement(
