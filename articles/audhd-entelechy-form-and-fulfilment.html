  ), /* @__PURE__ */ React.createElement("div", { style: { maxWidth: 780, margin: "0 auto", padding: "56px 24px 80px" } }, /* @__PURE__ */ React.createElement(DC, null, `The first time Catriona Hallam read the word entelechy she was thirty-seven, in a borrowed flat in Bristol whose previous tenant had left behind a shelf of Penguin Classics. She had taken down a battered 1998 paperback of Aristotle's Metaphysics, opened it at random, and found, in the introduction, a sentence she would carry \u2014 for the rest of her life \u2014 like a small bright stone in a pocket. The sentence said that for Aristotle some things have their end within them, and the Greek word for that condition is \u1F10\u03BD\u03C4\u03B5\u03BB\u03AD\u03C7\u03B5\u03B9\u03B1. She read it twice. Then she put the book down on the kitchen table and went to the window and stood there for a long time.`), /* @__PURE__ */ React.createElement(P, null, `The diagnosis would not arrive until six months later. The two events became, in her telling, the same event. What the clinical team would name in a small consulting room in Southmead \u2014 autism and ADHD, co-occurring, the configuration the neurodiversity literature has come to call AuDHD \u2014 was the same thing the old paperback had named. The diagnosis explained the engine; the word explained why the engine had always seemed to be heading somewhere of its own.`), /* @__PURE__ */ React.createElement(P, null, `This essay is about that word. Not about the engine \u2014 that was the subject of the first piece in this series, on catecholamines and locus coeruleus and monotropic attention. Not about the room around the engine \u2014 the rituals, refusals, partnerships, and houses that AuDHD adults build to live well, which was the subject of the second. This is the third piece, and its subject is the word at the centre: entelechy itself, in its own setting and in its long afterlife. Why has it surfaced, in the writings of late-diagnosed AuDHD adults over the past half decade, with such suspicious regularity? What did Aristotle actually mean by it? What did Spinoza, the Stoics, Maslow, Rogers, Heidegger, D\u0105browski, and the self-determination theorists Ryan and Deci take from it, and what did each of them add? And \u2014 the question that haunts every modern use of an Aristotelian word \u2014 does the concept survive the essentialism objection, or does it founder on it?`), /* @__PURE__ */ React.createElement(PQ, null, `The acorn does not become an oak because something outside it commands the oak. It becomes an oak because the oak is what the acorn already, in some specific and structural sense, is.`), /* @__PURE__ */ React.createElement(P, null, `Catriona Hallam is a composite, drawn from three women whose accounts of finding the word converged so neatly that any single naming would have foreclosed the others' privacy. But the act she performs is real. It is performed, repeatedly, by people who have arrived at a four-syllable Greek word almost no one outside a philosophy seminar has heard pronounced, and who recognise, in it, the shape of their own becoming. That recognition is the phenomenon this essay tries to take seriously \u2014 first as scholarship, then as a question about flourishing.`), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "1", title: "What Aristotle meant" }, /* @__PURE__ */ React.createElement(P, null, `The word entelechy (\u1F10\u03BD\u03C4\u03B5\u03BB\u03AD\u03C7\u03B5\u03B9\u03B1, entelecheia) is a coinage of Aristotle's, almost certainly his own. It does not appear in Plato or in the surviving Pre-Socratics. The likeliest etymology, as Joe Sachs notes in his 1999 translation of the Metaphysics for Green Lion Press, parses it as en-telos-echein \u2014 "having one's end within." The word names a condition, not a process: the state in which a thing has, finally, become what it had it in itself to be.`), /* @__PURE__ */ React.createElement(P, null, `Aristotle introduces the term most explicitly in Book Theta of the Metaphysics, the book given over to the analysis of potentiality and actuality. At Theta 6 (1048a25\u2013b9 in Bekker's pagination), he distinguishes two ways a thing can be: in potentiality (dynamis) and in actuality (energeia or entelecheia). In Sachs's translation: "the actuality is the being-at-work of the thing\u2026 as that which is building, in relation to that which is capable of building, and the waking in relation to the sleeping, and that which is seeing in relation to that which has its eyes shut but has sight" (Metaphysics \u0398.6, 1048a35\u2013b6, Sachs trans., p. 169). The walking man and the man capable of walking are not two different men but one man under two descriptions. Energeia is the doing; entelechy is the doing-arrived.`), /* @__PURE__ */ React.createElement(P, null, `In the De Anima Aristotle deploys the same vocabulary to define what the soul is. At II.1, 412a27 (Apostle trans., 1981, p. 23): "the soul is the first actuality of a natural body which has life potentially." "First actuality" is Apostle's rendering of pr\u014Dt\u0113 entelecheia. The soul is not a separable substance riding in the body like a pilot in a ship. It is the body's having-arrived-at-its-own-form, considered as a settled state. A living dog is not a dog plus a soul; a living dog is what dog-form looks like when it is fully at work in canine matter.`), /* @__PURE__ */ React.createElement(P, null, `This is harder than it first sounds. The natural English ear hears "having one's end within" as something psychological \u2014 a goal, an ambition. Aristotle's usage is broader and stranger. The acorn's end is not a project the acorn is undertaking. It is the structural orientation that makes the acorn the kind of thing it is in the first place. The telos is not appended from outside, the way a job description is appended to a candidate; it is the form of the acorn, considered as its own destination.`), /* @__PURE__ */ React.createElement(PotentiaToActus, null), /* @__PURE__ */ React.createElement(P, null, `A second clarification. Aristotle nowhere claims that every acorn becomes an oak. Acorns are eaten, rot, are buried and forgotten, fall on stone. The acorn's entelechy is the kind of fulfilment it would attain under conditions friendly to its becoming. The form alone is not a guarantee \u2014 it is a description of what flourishing, for this thing, would look like. The slippage between "this is the form's fulfilment" (a statement about flourishing) and "this is what the acorn will become" (a prediction about behaviour) is the slippage the essentialism objection, when it arrives, will exploit.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "2", title: "The grammar of the concept" }, /* @__PURE__ */ React.createElement(P, null, `Entelechy belongs to a small family of overlapping Aristotelian terms that English has tended to flatten into a single notion of "purpose." Distinguishing them is the first task of any responsible borrowing.`), /* @__PURE__ */ React.createElement(P, null, `Telos is the end \u2014 the for-the-sake-of-which. An axe's telos is cutting; a heart's telos is to pump blood. Energeia is being-at-work \u2014 the activity that fulfils a capacity, the doing of a thing rather than the mere capability of doing it: the seeing eye, the walking walker, the building builder. It is, almost literally, en-ergon, "in work." Potentia (Greek dynamis) is the specific capacity of a particular thing to do or become a particular other thing \u2014 not pure possibility but determinate possibility. The seed has the potential to become a flower; a stone does not. Eudaimonia, finally, is the term Aristotle uses for human flourishing \u2014 the kind of life in which a human being is most fully at the work of being human. The conventional translation "happiness" is misleading; "flourishing" comes closer.`), /* @__PURE__ */ React.createElement(P, null, `Entelechy sits across all four and is reducible to none. It is not a goal (telos), but the having-arrived at one. It is not the activity (energeia), but the activity-completed considered as a stable state. It is not a capacity (dynamis), but the having-actualised of a capacity. And it is not eudaimonia, though eudaimonia is one species of it \u2014 the human species. Entelechy is the more general structural concept; eudaimonia is what entelechy looks like in the case of a creature whose form is reason-using-animal.`), /* @__PURE__ */ React.createElement(SB, { title: "A note on translation" }, /* @__PURE__ */ React.createElement("p", { style: { margin: "0 0 0.9em" } }, 'The standard English-language translations of Aristotle disagree about how to render entelechy. W. D. Ross, in his classic Oxford translation (Metaphysics, 1924), tends to use "actuality" interchangeably with both energeia and entelecheia. Hippocrates Apostle (Peripatetic Press, 1966 and 1981) preserves "actuality" but distinguishes "first actuality" (entelechy) from "second actuality" (energeia at work). Joe Sachs (Green Lion Press, 1999, 2002) refuses both standard renderings and coins the more literal "being-at-work-staying-itself" \u2014 wordy, but it captures the active stillness Aristotle wanted.'), /* @__PURE__ */ React.createElement("p", { style: { margin: "0" } }, 'The Loeb Classical Library (Hugh Tredennick, 1933, revised 1989) uses "actuality" without much fuss. Each translation makes the term slightly different. Anyone using "entelechy" in a modern essay should specify which translator they are leaning on. This essay leans, when in doubt, on Sachs.')), /* @__PURE__ */ React.createElement(P, null, `Why does English keep reaching for "self-actualisation" when it tries to gloss entelechy? Because it is the closest available approximation: it carries the right reflexive structure (the actualising is of and by the self) and the right directional shape (from latency toward completion). What it loses is the form-having nuance. To self-actualise, in Maslow's twentieth-century vocabulary, sounds like discovering and expressing a personality. To attain entelechy, in Aristotle's, is to fulfil a form that one already, structurally, has. The difference is the difference between a project and a structure. Modern uses of entelechy almost always slide back toward "self-actualisation" because the modern reader is more comfortable there. The drift is intelligible but it must be resisted. Entelechy is not a synonym for becoming yourself in some loose expressive sense. It is the fulfilment of what your form, on examination, turns out to require.`), /* @__PURE__ */ React.createElement(

  )), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "3", title: "Why AuDHD recognises itself in this word" }, /* @__PURE__ */ React.createElement(P, null, `Take the picture sketched in the first two parts of this series \u2014 the catecholamine architecture, the monotropic attention tunnel, the rooms and refusals and partnerships built around the engine \u2014 and ask: what is the most economical way to describe what such a life is, at its best, doing? The clinical literature has produced phrases like "interest-based nervous system" and "autonomy-oriented self-regulation." Each is true; none is quite enough. Each names a part; none names the shape.`), /* @__PURE__ */ React.createElement(P, null, `The shape, named in twenty-four-century-old Greek, is a thing whose form contains its own direction of fulfilment. The AuDHD adult who, after thirty years of trying to be a different brain, finally builds a life around the brain they actually have is not, in the self-help phrase, "discovering their authentic self." That language is too elective. They are letting the form they have always had finally arrive at its own work. The acorn, having been told for decades to become a sycamore, is at last permitted to become an oak. Aristotle has the right word for this; the modern vocabulary, on the whole, does not.`), /* @__PURE__ */ React.createElement(P, null, `Four features of AuDHD experience map onto entelechy with unusual precision. The first is the autonomy drive, traced in the first article to the salience-network and dopaminergic literature. AuDHD adults consistently describe an inability to sustain effort under external compulsion that has nothing to do with capacity; the capacity is intact, but the neurological consent that would allow it to be applied to a borrowed task is missing. This is the entelechy-hypothesis observed in negative: a form whose actualisation requires its own initiative, refusing to be redirected.`), /* @__PURE__ */ React.createElement(P, null, `The second is monotropic absorption. Dinah Murray's 1992 paper, and the research community that has built on it, describes autistic and AuDHD attention as concentrated rather than distributed \u2014 the laser rather than the floodlight, in Murray's own image. From the inside, the attention tunnel is a surplus of attention to the chosen, not a deficit of attention to the unchosen. It is precisely the mechanism by which a form does the actualisation-work of its own becoming. Special interests are not a quirk; they are the engine of entelechy.`), /* @__PURE__ */ React.createElement(P, null, `The third is demand avoidance. The clinical category Pathological Demand Avoidance (PDA), now more often called Demand Avoidance Profile in UK practice, names the refusal of imposed tasks and the buckling of capacity under requests that ought to be trivial. From an entelechy-eyed perspective, this is the actualising drive defending itself. To accept a demand is, for this nervous system, to consent to having one's actualising direction redirected. The system refuses; it is not refusing the task but the relocation of agency.`), /* @__PURE__ */ React.createElement(P, null, `The fourth is autistic burnout, whose arc was traced in the second article. Burnout, in the entelechy frame, is the signature of blocked actualisation \u2014 what happens to a form prevented, year after year, from its fulfilment-work. Recovery is not a return to a previous capacity. It is the slow discovery that the previous capacity was always running on borrowed fuel.`), /* @__PURE__ */ React.createElement(Callout, { type: "info", title: "A clarification \u2014 entelechy is not the brain" }, /* @__PURE__ */ React.createElement(P, null, `Nothing in the four mappings above commits us to the claim that the AuDHD brain is, neurologically, an Aristotelian entelechy. Aristotle was not doing neuroscience. The mappings are conceptual, not mechanistic. The structural shape Aristotle named in the fourth century BCE \u2014 a form whose fulfilment is intrinsic to itself \u2014 turns out to be, by historical accident, the most accurate available description of what the AuDHD nervous system, when it flourishes, is doing. That a twenty-four-century-old word fits is a fact about the depth of the concept, not about Aristotle's hidden access to ADHD literature.`))), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "4", title: "Inheritors I \u2014 Spinoza's conatus" }, /* @__PURE__ */ React.createElement(P, null, `The first major reformulation of the entelechy-shape after Aristotle is Baruch Spinoza's, in the Ethics (Ethica, ordine geometrico demonstrata, published posthumously in 1677). At the centre of Part III, in propositions 6 through 9, Spinoza offers what he calls the conatus doctrine \u2014 from the Latin conari, "to strive." Proposition 6, in Edwin Curley's translation for the Princeton Collected Works of Spinoza (1985, vol. I, p. 498): "Each thing, as far as it can by its own power, strives to persevere in its being." Proposition 7 makes the identification stronger: "The striving by which each thing strives to persevere in its being is nothing but the actual essence of the thing."`), /* @__PURE__ */ React.createElement(P, null, `For Spinoza, the conatus is not a faculty the thing has alongside other faculties \u2014 not an appetite, not a will, not a desire. It is the thing's actual essence considered under the aspect of striving. To be a thing at all, in the Spinozist universe, is to be a particular configuration of striving-to-persist. The conatus is what entelechy looks like once it has been thoroughly de-theologised: no external goal-giver issuing the striving. The striving is the being.`), /* @__PURE__ */ React.createElement(P, null, `Two features of Spinoza's reformulation are particularly useful for AuDHD self-understanding. First, the conatus is not will. This is not a story about choosing or willing; it is a story about the structural directionality of being itself. The directionality is prior to deliberation, not the product of it. For an AuDHD adult who has spent decades being told that more willpower would solve the problem, the Spinozist proposition that the actualising drive is structural, not volitional, is an enormous relief. It is also a clinical accuracy: no amount of trying-harder rebuilds a depleted prefrontal cortex.`), /* @__PURE__ */ React.createElement(P, null, `Second, the conatus is, in the Ethics, the basis of value. What is good for a thing, Spinoza argues in Part IV, is what supports its conatus; what is bad is what diminishes it (Curley trans., IV, prop. 8 and 31; pp. 550, 561). Value is not imposed from outside the thing; it is the thing's own perseverance, taken as a normative measure. This collapses the modern split between "what I want" and "what is good for me" in a way that maps onto AuDHD reports of flourishing. What is good for an AuDHD adult turns out to be precisely what supports the actualising drive \u2014 which is, in the Spinozist frame, what supports their being.`), /* @__PURE__ */ React.createElement(P, null, `What Spinoza does not give us, that Aristotle does, is the form-having nuance. Conatus is striving-to-persist; entelechy is fulfilment-of-form. They are related but not identical. The acorn's entelechy is to become an oak; the acorn's conatus is to keep being an acorn for as long as it can. Spinoza is more conservative; Aristotle is more developmental. A complete picture of AuDHD becoming probably needs both. The conatus tells us why the actualising drive cannot be argued out of itself. The entelechy tells us where it is heading.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "5", title: "Inheritors II \u2014 the Stoics on living kata physin" }, /* @__PURE__ */ React.createElement(P, null, `Where Aristotle gives us entelechy and Spinoza gives us conatus, the Stoics give us a phrase rather than a doctrine: kata physin (\u03BA\u03B1\u03C4\u1F70 \u03C6\u03CD\u03C3\u03B9\u03BD), "according to nature." It runs through the surviving Stoic literature from Zeno to Marcus Aurelius as a moral imperative. Epictetus, in the Discourses (Loeb Classical Library, W. A. Oldfather trans., 1925, vol. I, I.6.15\u201322, pp. 39\u201341), is the most quotable: the rational animal's task is to live in accordance with the nature it has been given, not in flight from it.`), /* @__PURE__ */ React.createElement(P, null, `Marcus Aurelius restates it in the Meditations V.1 (Penguin Classics, Hammond trans., 2006, p. 36): "At break of day, when you are reluctant to get up, have this thought ready to mind: 'I am getting up for a man's work.'" The work in question is the activity proper to the kind of being one is. To shirk it is to live para physin \u2014 against nature, against one's own form.`), /* @__PURE__ */ React.createElement(P, null, `The Stoic reformulation is helpful for two reasons. It makes the entelechy-shape ethically practical: where Aristotle is largely descriptive, the Stoics are prescriptive in a deeply unmoralising way \u2014 live according to the nature you have, not the nature you wish you had. And the Stoics distinguish between common nature (the kind of being you are, qua human) and individual nature (the particular configuration of dispositions you happen to be). Both are objects of kata physin practice; the honest life matches both.`), /* @__PURE__ */ React.createElement(P, null, `The relevance to AuDHD self-understanding is direct, and it is mostly about the second nature. Late-diagnosed AuDHD adults often describe their pre-diagnosis years as a sustained attempt to live para physin \u2014 against their own nature \u2014 in fidelity to a borrowed model of common nature they could never quite occupy. Diagnosis, in this register, is the discovery that one has been transgressing one's own kata physin for decades without knowing why the transgressions were so costly. Recovery is, in some serious sense, a Stoic exercise: the slow learning to act according to the nature one actually has. The Stoics did not believe individual nature was infinitely various \u2014 their universe was a single rational ordering \u2014 but a modern reader can take the practical injunction without inheriting the metaphysics.`), /* @__PURE__ */ React.createElement(

  )), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "6", title: "Inheritors III \u2014 Maslow, Rogers, Deci and Ryan" }, /* @__PURE__ */ React.createElement(P, null, `The twentieth-century humanist psychologists are the inheritors of entelechy who are most often quoted in popular AuDHD writing, and the ones whose debt to Aristotle is least often noticed. Three figures matter: Abraham Maslow, Carl Rogers, and the contemporary Self-Determination Theory researchers Edward Deci and Richard Ryan.`), /* @__PURE__ */ React.createElement(P, null, `Abraham Maslow's 1943 paper "A Theory of Human Motivation," published in Psychological Review (vol. 50, no. 4, pp. 370\u2013396), introduced the now-famous hierarchy of needs and, at its apex, the term "self-actualization." Maslow's framing is unmistakably Aristotelian, though the citation is implicit: "What a man can be, he must be. He must be true to his own nature. This need we may call self-actualization" (Maslow 1943, p. 382). The key word is the modal must. This is not a preference; it is a structural requirement, the apex need that, when blocked, produces a particular kind of suffering Maslow elsewhere calls "metapathologies." For all the criticism the hierarchy has accumulated, the apex claim has held up. People blocked from doing the work that their form, on examination, turns out to require, suffer. The suffering is not consoled by meeting the lower-tier needs.`), /* @__PURE__ */ React.createElement(P, null, `Carl Rogers refined the Maslow apex into something more clinically useful. In On Becoming a Person (Houghton Mifflin, 1961), Rogers proposes what he calls the "actualizing tendency" \u2014 a single, organism-wide directional movement that he takes to be the basic motivational fact of biological life. Rogers, p. 35: "The organism has one basic tendency and striving \u2014 to actualize, maintain, and enhance the experiencing organism." His clinical posture followed: the therapist's job is not to direct this tendency but to supply the conditions \u2014 unconditional positive regard, empathic understanding, congruence \u2014 in which it can do its own work.`), /* @__PURE__ */ React.createElement(P, null, `This is, recognisably, Aristotelian psychology. The tendency is intrinsic to the organism; the therapist provides nutrients, not direction. Rogers' contribution to the AuDHD literature is more practical than conceptual: he translates the Aristotelian shape into a posture that turns out to be exactly the one that works for AuDHD clients. Therapy that tries to direct an AuDHD adult toward a borrowed form fails; therapy that supplies the conditions and gets out of the way succeeds. The autism-affirming clinical literature now documents this; it was already there, in outline, in Rogers sixty-five years ago.`), /* @__PURE__ */ React.createElement(P, null, `The most recent and most empirically robust of the three is Self-Determination Theory, developed by Edward Deci and Richard Ryan at the University of Rochester from the 1970s onward. SDT proposes three basic psychological needs \u2014 competence, relatedness, and autonomy \u2014 that, like nutrients, must be met for any human organism to flourish. The 2000 paper by Ryan and Deci in American Psychologist (vol. 55, no. 1, pp. 68\u201378) formalised the framework. Autonomy in SDT is not the libertarian "leave me alone" of popular usage; it is the more technical sense of self-endorsement \u2014 acting from one's own integrated values rather than from external pressure or internal compulsion (Ryan & Deci 2000, p. 74).`), /* @__PURE__ */ React.createElement(P, null, `What SDT adds to the entelechy lineage is empirical traction. Aristotle was doing first philosophy; Spinoza, geometric metaphysics; Maslow and Rogers, humanist psychology in a largely unmeasured register. Deci and Ryan have done forty years of measurement, across cultures and domains. The structural claim \u2014 that human flourishing requires self-endorsed action toward intrinsically motivated ends, and that thwarting this requirement produces specific and predictable harms \u2014 is now one of the better-evidenced propositions in psychology. The 2022 ADHD-and-SDT reframing by Morsink and colleagues, the Champ et al. (2022) account of ADHD symptomatology as autonomy frustration, and the 2025 NHS pilot of the ADAPT framework (McCormick et al., PMC12612647) collectively make the AuDHD significance direct: the acorn flourishes when given the conditions in which it can do its own oak-work, and not otherwise.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "7", title: "Inheritors IV \u2014 Heidegger's Eigentlichkeit" }, /* @__PURE__ */ React.createElement(P, null, `Martin Heidegger is the most uncomfortable inheritor of the entelechy lineage, for two reasons. The first is that he denied being one. The second is that he was, by the late 1930s, a card-carrying member of the National Socialist German Workers' Party, and the question of whether his philosophy can be cleanly separated from his politics has not been settled. Both reasons matter. Neither, this essay will argue, is grounds for skipping him.`), /* @__PURE__ */ React.createElement(P, null, `Sein und Zeit (Being and Time, 1927) is, in part, an extended analysis of human existence \u2014 Dasein, Heidegger's term \u2014 in its everyday and its authentic modes. Sections 25 through 27, in the Macquarrie and Robinson translation (Blackwell, 1962, pp. 149\u2013168), introduce the figure of das Man \u2014 "the They" or "the One." Das Man is the anonymous public into which Dasein is initially absorbed: the They says, the They does, the They believes. Most of one's life, Heidegger argues, is lived in this mode of inauthenticity (Uneigentlichkeit), in which one's choices, opinions, and self-understanding are the impersonal property of the public. The fish does not see the water.`), /* @__PURE__ */ React.createElement(P, null, `The corresponding positive concept is Eigentlichkeit \u2014 usually translated as authenticity, more literally as "ownness" or "own-being." (The German eigen means "own"; the abstract noun is constructed by analogy with words like Wirklichkeit, "actuality.") To live authentically, in Heidegger's account, is to live from one's own being-in-the-world rather than from the borrowed being-in-the-world of the They. Sections 54 through 60 (Macquarrie and Robinson, pp. 312\u2013348) develop the analysis through the concepts of conscience, guilt, and being-toward-death. The argument is dense, the prose forbidding, but the core is simple: authenticity is not a personality trait; it is a relation to one's own existence in which one owns it as one's own.`), /* @__PURE__ */ React.createElement(P, null, `The structural similarity to entelechy is unmistakable, even though Heidegger went to considerable lengths to dissociate his thinking from Aristotelian metaphysics. Eigentlichkeit is a being-condition in which the entity is at-its-own-end rather than at-the-end-of-someone-else. The vocabulary is different; the shape is recognisable. Hubert Dreyfus's commentary Being-in-the-World (MIT Press, 1991) makes the point with admirable directness: Heidegger's authentic Dasein is the one that has, in some specific phenomenological sense, taken up its own being. The taking-up is the Eigentlichkeit. It is not unlike entelechy, with the metaphysics swapped out for phenomenology.`), /* @__PURE__ */ React.createElement(P, null, `What Heidegger adds is the analysis of Das Man \u2014 the social-anonymity from which authenticity must be taken back. AuDHD adults will recognise this with painful precision. Most pre-diagnosis life is a sustained absorption in the They: the They says you should socialise on Friday nights, answer emails within four hours, not need a north-facing window. Diagnosis is the moment at which the They's grip loosens enough that the question what would my own life look like becomes intelligible. Eigentlichkeit names the work that follows.`), /* @__PURE__ */ React.createElement(P, null, `The political problem cannot be evaded. Heidegger joined the NSDAP in May 1933 and made no clear public renunciation. The Black Notebooks, published from 2014 onward, contain anti-Semitic passages the most defensive readers have struggled to explain away (the most rigorous account is Peter Trawny's Heidegger and the Myth of a Jewish World Conspiracy, Chicago, 2015). The most defensible answer, set out by Charles Bambach (Heidegger's Roots, Cornell, 2003), is that the concept survives the philosopher, but only on the condition that one explicitly refuses the political extrapolations Heidegger drew from it. Authenticity as ownness-of-being is portable; authenticity as the being-of-a-Volk fulfilling its historical destiny is not. On those terms, Eigentlichkeit takes its place in the entelechy lineage \u2014 the most phenomenologically precise statement of what taking up one's own becoming feels like from the inside. The borrowing is legitimate, but it is also, every time, an obligation to remember whose word one is borrowing.`), /* @__PURE__ */ React.createElement(

      src: "https://images.unsplash.com/photo-1502920917128-1aa500764cbd?w=1600&q=80&auto=format&fit=crop&utm_source=dsl&utm_medium=referral",
      alt: "A figure walking a long path through evening grass",
      caption: "Authenticity, in Heidegger's reading, is less a destination than a relation: the moment in which one's own life ceases to be conducted on behalf of an absent stranger called the They.",
      credit: "Hannah Reding / Unsplash",

  )), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "8", title: "Inheritors V \u2014 Dabrowski's positive disintegration" }, /* @__PURE__ */ React.createElement(P, null, `The Polish psychiatrist Kazimierz D\u0105browski (1902\u20131980) is the least well-known and, for the AuDHD adult arc, perhaps the most useful of the twentieth-century inheritors. His Theory of Positive Disintegration, set out in Positive Disintegration (Little, Brown, 1964) and elaborated across several later books, proposes that human personality development proceeds through a series of disintegrative crises in which a lower, more conventional integration of the self breaks down and is replaced, after a period of disorganisation, by a higher and more authentic one.`), /* @__PURE__ */ React.createElement(P, null, `D\u0105browski distinguished five levels. Level I, Primary Integration, is unreflective conformity to the surrounding social order \u2014 the unbroken inhabitation of the They. Level II, Unilevel Disintegration, is a temporary breakdown in which competing values cancel each other out without resolution \u2014 a depressive flatness. Level III is the first emergence of a felt hierarchy of values, in which "what I have been doing" is recognised as worse than "what I might do." Level IV is the deliberate work of building a higher integration around the values now seen. Level V, Secondary Integration, is the rare condition in which the higher values are fully embodied. (D\u0105browski 1964, pp. 4\u201324.)`), /* @__PURE__ */ React.createElement(
    Photograph,
    {
      src: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1600&q=80&auto=format&fit=crop&utm_source=dsl&utm_medium=referral",
      alt: "A long path leading up a quiet hill at first light",
      caption: "The developmental arc D\u0105browski named is rarely linear. It goes through breakdown \u2014 through the clearing \u2014 before the higher integration becomes visible at all.",
      credit: "Sven Scheuermeier / Unsplash",
      href: "https://unsplash.com/@sscheuermeier?utm_source=dsl&utm_medium=referral"
    }
  ), /* @__PURE__ */ React.createElement(P, null, `Two features matter especially for AuDHD adulthood. The first is D\u0105browski's insistence that the disintegrative crisis is positive \u2014 the breakdown is the gateway to a higher organisation, not a regression from a working one. The autistic burnout that often precedes diagnosis is, in this reading, the unilevel-disintegration phase of an unfinished growth; the depressive flatness that follows is the clearing in which a higher hierarchy of values becomes visible.`), /* @__PURE__ */ React.createElement(P, null, `The second is D\u0105browski's concept of overexcitabilities (nadpobudliwo\u015B\u0107) \u2014 psychomotor, sensual, intellectual, imaginational, and emotional. He thought these were the psychological raw material from which higher development became possible. The conceptual proximity to monotropic intensity and sensory sensitivity has not gone unnoticed in the gifted-and-twice-exceptional literature (Daniels and Piechowski, eds., Living with Intensity, Great Potential Press, 2009). D\u0105browski did not have AuDHD as a category, but the developmental arc he described is, in many AuDHD lives, the arc that diagnosis-and-recovery follows. What he adds to the entelechy lineage is a developmental framework \u2014 a theory of how the form gets to its own fulfilment, given that the path is rarely smooth. The work goes through breakdown, and the breakdown, properly understood, is part of the work.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "9", title: "A map of the lineage" }, /* @__PURE__ */ React.createElement(P, null, `Eight inheritors, eight additions. The chart at the centre of this essay is the simplest summary of where each stands relative to the original Aristotelian shape. None is identical to entelechy; none quite replaces it. Each takes one feature of the older idea and develops it in a direction the others did not.`), /* @__PURE__ */ React.createElement(EntelechyMap, null), /* @__PURE__ */ React.createElement(P, null, `Reading the chart is also reading a rough history of the modern self. Spinoza (1677) gives us the actualising drive without theology \u2014 the conatus is the thing's essence, full stop. The Stoics give us the practical injunction to live in accordance with one's nature. Maslow (1943) gives us the apex claim that thwarting the actualising drive produces specific and irreducible suffering. Rogers (1961) gives us the clinical posture \u2014 provide the conditions, get out of the way. Deci and Ryan, from the 1970s onward, give us the empirical apparatus and the three-need model in which autonomy is one nutrient among three. Heidegger (1927) gives us the phenomenology of taking up one's own being, and the diagnosis of the They against which the taking-up is done. D\u0105browski (1964) gives us the developmental arc through breakdown. Murray (1992) gives us the attentional mechanism by which the AuDHD form does the actualising-work of its own becoming.`), /* @__PURE__ */ React.createElement(P, null, `Together they constitute a single conceptual lineage with eight surviving elements. The centre \u2014 the part that does not change across the line \u2014 is the structural claim that some kinds of being have their direction of fulfilment within them, and that flourishing, for these kinds, consists in being given the conditions to do that fulfilling work themselves. AuDHD is one such kind of being.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "10", title: "The essentialism objection, properly answered" }, /* @__PURE__ */ React.createElement(P, null, `Any modern use of an Aristotelian word eventually meets the same objection, and entelechy is an unusually exposed target. The objection, in its strongest form: by speaking of a thing's "form" and its "fulfilment," you are smuggling essentialism back into a discourse that has spent the last two centuries painstakingly extricating itself from it. You are claiming that a thing has, in advance, a determinate nature that constrains what it should become. You are turning a description of behavioural variability into a normative prediction \u2014 doing, in nicer language, what the worst nineteenth-century race science did, what the worst contemporary "neurotypes" discourse risks doing: taking statistical regularities about a population and ontologising them into fixed essences.`), /* @__PURE__ */ React.createElement(P, null, `The objection has a long pedigree. Bernard Williams, in Ethics and the Limits of Philosophy (Harvard, 1985, pp. 43\u201353), argued that any modern attempt to rebuild moral philosophy on Aristotelian teleology would have to answer for the loss of Aristotle's metaphysical biology. Without that underwriting, the teleological vocabulary could become a sophisticated form of question-begging: telling people what to do by claiming, on no independent grounds, that this is what their nature requires. The post-structuralist critique has been more pointed: any claim about a population's "essential nature" is, on examination, a claim made by some observer with interests that are not neutral (see Ian Hacking's "Making Up People," London Review of Books, 17 August 2006).`), /* @__PURE__ */ React.createElement(P, null, `Both objections must be taken seriously. What can be said in response is this: entelechy, in its most defensible modern form, is normative not predictive. It does not claim that every member of a kind will achieve its fulfilment, or that members of a kind are interchangeable. It claims that, given a particular configuration of form and matter \u2014 this acorn, this AuDHD adult \u2014 there are conditions under which that configuration tends to flourish and conditions under which it tends not to, and that the former are normatively privileged when one is asking how this thing, in its own terms, is doing.`), /* @__PURE__ */ React.createElement(P, null, `The acorn that becomes a stunted bonsai is still an acorn. The AuDHD adult who never finds the conditions to do the work their nervous system is built for is still an AuDHD adult; nothing about their nature has been violated by the failure of conditions. What has been violated is their flourishing \u2014 a different and more local claim. The form does not predict; it provides a measure of fit. The claim that AuDHD adults flourish under conditions of autonomy-support is not a claim about an essence that issues commands; it is a claim about goodness-of-fit between a nervous system and an environment, now empirically well-supported by forty years of self-determination-theory research.`), /* @__PURE__ */ React.createElement(P, null, `Three further distinctions are necessary. Entelechy is not genetic determinism: Aristotle did not have a genome. It is not neurological reductionism: the AuDHD form is not reducible to dopaminergic thresholds, even if those mechanisms are part of how the form does its work. And it is not identity-as-essence: it does not say that being AuDHD is what one is in the deepest sense, prior to all other identifications. The form sets a measure; it does not foreclose a life. Chastened in this way, the entelechy frame survives the essentialism objection. The objection, properly answered, is a useful corrective: it prevents the slide from "this is what flourishing looks like for this kind of being" into "this is what every member of this kind must do." The borrowing is legitimate, but only on the condition that the corrective is honoured each time the word is used.`), /* @__PURE__ */ React.createElement(Callout, { type: "warn", title: "The essentialism objection \u2014 strongest form, briefly restated" }, /* @__PURE__ */ React.createElement(P, null, `If "the AuDHD form has its end within itself" can be made to mean "every AuDHD person ought to live in such-and-such a way," the concept has been weaponised. The defence offered here \u2014 that entelechy is normative not predictive, a measure of fit rather than a script of behaviour \u2014 is the only defence the concept has. It must be repeated, every time, or the concept is unsafe.`))), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "11", title: "Practical implications" }, /* @__PURE__ */ React.createElement(P, null, `What changes, when entelechy is taken seriously as a description of the AuDHD form? Less than the self-help genre would have one believe; more than the older clinical literature could accommodate. The implications are quiet rather than revolutionary, and they fall differently on different addressees.`), /* @__PURE__ */ React.createElement(P, null, `For the individual, the most important change is the dissolution of a particular kind of self-blame. The decades of failure to be a different brain were not failures of will; they were the predictable consequences of a form being asked to actualise as something it was not. Self-knowledge here is not the discovery of an inner essence but the slow recognition that flourishing has a shape, and that one's own shape is more discernible than one had been led to believe.`), /* @__PURE__ */ React.createElement(P, null, `For the parent of an AuDHD child, nurture is no longer a programme; it is the provision of conditions. The acorn does not need to be told to become an oak; it needs soil, water, light, and the absence of predators large enough to eat it. The AuDHD child does not need to be redirected into a sycamore; they need a household whose textures and rhythms their nervous system can metabolise, and a parent who has stopped measuring their development against a borrowed form.`), /* @__PURE__ */ React.createElement(P, null, `For the teacher, the implication is curricular and architectural. The classroom that flourishes an AuDHD pupil is not the classroom that has been quietly tolerating them; it is the classroom that has redesigned its assumptions about attention, demand, and pace. Interest-led learning is not a concession; it is, for this nervous system, the substrate.`), /* @__PURE__ */ React.createElement(P, null, `For the employer, the productive output of an AuDHD adult is not approximately predictable from their hours-at-desk; it is approximately predictable from the conditions under which they are working. Open-plan offices, all-day meeting calendars, and visible-presence cultures are, for this population, a productivity tax. The work that AuDHD adults do best \u2014 the deep, long-interval, niche-specialist work the second piece described \u2014 requires environments the modern office has spent thirty years dismantling.`), /* @__PURE__ */ React.createElement(P, null, `For the therapist, the implication is the Rogerian one, sharpened. The therapeutic posture that helps is not direction but the provision of conditions. Therapy that tries to help an AuDHD client become better-adapted to a borrowed form is, in entelechy terms, a category mistake. Therapy that helps them recognise their own form and build a life around it is the work the existing AuDHD-affirming literature now supports. The thread running through all five portraits is the same: the form is real, the conditions matter, and the change in posture \u2014 from directing to nurturing the conditions \u2014 is the change that the entelechy frame, if it is to be useful at all, recommends.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "12", title: "The kicker" }, /* @__PURE__ */ React.createElement(P, null, `Aristotle's oak does not become an oak by trying. The acorn does not deliberate. The form is in the seed; the conditions are in the world; the becoming is what happens when the two of them meet honestly. To say that the AuDHD adult has, at the centre of their nervous system, something analogous to that structural orientation is not to mystify the brain. It is to name, as accurately as twenty-four-century-old Greek allows, what the brain is doing when it is finally doing what it is built for.`), /* @__PURE__ */ React.createElement(P, { italic: true, large: true }, `The word arrived too late for most of the people in this essay. It has arrived now. What remains is the older, slower work \u2014 the work that was always going to need doing, with or without the word \u2014 of building lives around the form one already has, on the right fuel at last.`)), /* @__PURE__ */ React.createElement(SceneBreak, null), /* @__PURE__ */ React.createElement(Sec, { n: "13", title: "Source Integrity Note" }, /* @__PURE__ */ React.createElement(P, null, `This essay is the third in a three-part series on AuDHD and entelechy. The first piece (audhd-entelechy-v2.jsx, 19 April 2026) carried the neuroscience; the second (audhd-life-around-the-engine.jsx, 25 April 2026) carried the lived-experience reportage; this piece carries the conceptual deep-dive. Workspace files read in preparation: both v1 and v2.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Primary texts cited (with edition, translator, and page where given):")), /* @__PURE__ */ React.createElement(P, null, `Aristotle, Metaphysics, Book Theta (\u0398), 1048a25\u2013b9. Translations consulted: Joe Sachs, Aristotle's Metaphysics (Green Lion Press, 1999/2002), p. 169 (specifically the \u0398.6 passage on actuality and potentiality); Hippocrates G. Apostle, Aristotle's Metaphysics (Peripatetic Press, 1966; rev. 1981); W. D. Ross, Metaphysics (Oxford, 1924, repr. in Barnes ed., Princeton 1984); Hugh Tredennick, Aristotle: Metaphysics (Loeb Classical Library 271, 1933; revised 1989). Bekker pagination follows the standard convention.`), /* @__PURE__ */ React.createElement(P, null, `Aristotle, De Anima, II.1, 412a27. Translation cited: Hippocrates G. Apostle, Aristotle's On the Soul (Peripatetic Press, 1981), p. 23, for the formula "first actuality of a natural body which has life potentially" (pr\u014Dt\u0113 entelecheia).`), /* @__PURE__ */ React.createElement(P, null, `Baruch Spinoza, Ethics, Part III, propositions 6\u20139; Part IV, propositions 8 and 31. Translation cited: Edwin Curley, The Collected Works of Spinoza, vol. I (Princeton University Press, 1985), pp. 498 (III.6\u20137), 550 (IV.8), 561 (IV.31).`), /* @__PURE__ */ React.createElement(P, null, `Epictetus, Discourses, I.6.15\u201322. Translation cited: W. A. Oldfather, Epictetus: The Discourses, Loeb Classical Library 131 (Harvard, 1925), vol. I, pp. 39\u201341.`), /* @__PURE__ */ React.createElement(P, null, `Marcus Aurelius, Meditations, Book V.1. Translation cited: Martin Hammond, Meditations (Penguin Classics, 2006), p. 36.`), /* @__PURE__ */ React.createElement(P, null, `Abraham H. Maslow, "A Theory of Human Motivation," Psychological Review 50, no. 4 (July 1943): 370\u2013396. Direct quotation drawn from p. 382 ("What a man can be, he must be").`), /* @__PURE__ */ React.createElement(P, null, `Carl R. Rogers, On Becoming a Person: A Therapist's View of Psychotherapy (Houghton Mifflin, 1961). Specific reference at p. 35 for the actualising tendency formulation.`), /* @__PURE__ */ React.createElement(P, null, `Richard M. Ryan and Edward L. Deci, "Self-Determination Theory and the Facilitation of Intrinsic Motivation, Social Development, and Well-Being," American Psychologist 55, no. 1 (January 2000): 68\u201378. Specific reference at p. 74 for the autonomy-as-self-endorsement formulation.`), /* @__PURE__ */ React.createElement(P, null, `Martin Heidegger, Being and Time (Sein und Zeit, 1927). Translation cited: John Macquarrie and Edward Robinson, Being and Time (Blackwell, 1962). Sections 25\u201327, pp. 149\u2013168 (das Man and inauthenticity); sections 54\u201360, pp. 312\u2013348 (conscience, guilt, authentic being-toward-death).`), /* @__PURE__ */ React.createElement(P, null, `Kazimierz D\u0105browski, Positive Disintegration (Little, Brown, 1964), pp. 4\u201324 for the five-level schema; restated in Personality-Shaping Through Positive Disintegration (Little, Brown, 1967), pp. 17\u201336.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Secondary scholarship cited:")), /* @__PURE__ */ React.createElement(P, null, `Hubert L. Dreyfus, Being-in-the-World: A Commentary on Heidegger's Being and Time, Division I (MIT Press, 1991) \u2014 on Eigentlichkeit and the structural similarity to entelechy.`), /* @__PURE__ */ React.createElement(P, null, `Peter Trawny, Heidegger and the Myth of a Jewish World Conspiracy (University of Chicago Press, 2015) \u2014 on the Black Notebooks and the political problem.`), /* @__PURE__ */ React.createElement(P, null, `Charles Bambach, Heidegger's Roots: Nietzsche, National Socialism, and the Greeks (Cornell University Press, 2003) \u2014 on separating the concept of Eigentlichkeit from its political extrapolations.`), /* @__PURE__ */ React.createElement(P, null, `Bernard Williams, Ethics and the Limits of Philosophy (Harvard University Press, 1985), pp. 43\u201353 \u2014 for the strongest analytic statement of the essentialism objection to Aristotelian teleology.`), /* @__PURE__ */ React.createElement(P, null, `Ian Hacking, "Making Up People," London Review of Books, 17 August 2006 \u2014 for the postmodern critique of essence as observer-positioned construction.`), /* @__PURE__ */ React.createElement(P, null, `Susan Daniels and Michael M. Piechowski, eds., Living with Intensity: Understanding the Sensitivity, Excitability, and the Emotional Development of Gifted Children, Adolescents, and Adults (Great Potential Press, 2009) \u2014 on Dabrowskian overexcitabilities and twice-exceptional populations.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Empirical literature drawn on (without direct quotation in this essay; cited at length in v1):")), /* @__PURE__ */ React.createElement(P, null, `Dinah Murray, Mike Lesser, and Wendy Lawson, "Attention, Monotropism and the Diagnostic Criteria for Autism," Autism 9, no. 2 (2005): 139\u2013156 \u2014 the canonical statement of monotropism theory.`), /* @__PURE__ */ React.createElement(P, null, `Sebastiaan Morsink et al., review on Self-Determination Theory and ADHD, Journal of Attention Disorders (2022). doi:10.1177/10870547211050948.`), /* @__PURE__ */ React.createElement(P, null, `Champ et al., Psychological Review (2022) \u2014 SDT-based reframing of ADHD as autonomy frustration. doi:10.1037/rev0000398.`), /* @__PURE__ */ React.createElement(P, null, `McCormick et al., NHS South West Yorkshire feasibility study of the ADAPT framework (2025), PMC12612647.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Tier-2 composites flagged:")), /* @__PURE__ */ React.createElement(P, null, `The character "Catriona Hallam" (Bristol, age thirty-seven, finds the word entelechy in a borrowed Penguin paperback) is a composite drawn from three accounts of late-diagnosed AuDHD adults whose moments of first encountering the word converged closely enough that any single naming would have foreclosed the others' privacy. The opening scene is composited; no individual is identified. No invented quotation is attributed to her; her actions are paraphrase, not quotation.`), /* @__PURE__ */ React.createElement(P, null, /* @__PURE__ */ React.createElement("strong", null, "Where the agent reasoned beyond cited material \u2014 explicit acknowledgement:")), /* @__PURE__ */ React.createElement(P, null, `Several connections drawn in this essay are interpretive and are not made explicitly by any of the cited scholars. In particular: (i) the four-feature mapping of AuDHD experience onto entelechy in \xA73 (autonomy drive, monotropic absorption, demand avoidance, burnout) draws on the AuDHD literature for each feature individually but the four-fold synthesis is the agent's own
