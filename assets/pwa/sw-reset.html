<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service worker reset — DS Articles</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/assets/fonts/fonts.css" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <style>
    body {
      font-family: 'Source Serif 4', Georgia, serif;
      max-width: 640px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      color: #1a1a1a;
      line-height: 1.6;
    }
    h1 { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; margin-bottom: 0.5rem; }
    .status { padding: 1rem 1.25rem; border-radius: 8px; background: #f0ecff; border: 1px solid #c8bdff; }
    .status.error { background: #fff3f3; border-color: #f5c2c2; }
    code { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.9em; background: #f4f4f4; padding: 0.1em 0.35em; border-radius: 3px; }
    a { color: #7c4dff; }
    .actions { margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>Service worker reset</h1>
  <p>This page unregisters every service worker registered for this origin and deletes every cache it created. Use this if offline reading starts misbehaving after a deploy.</p>
  <div id="status" class="status">Clearing…</div>
  <div class="actions">
    <p><a href="/">← Back to the library</a></p>
  </div>
  <script>
    (async function () {
      var status = document.getElementById('status');
      var steps = [];
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function (r) { return r.unregister(); }));
          steps.push('Unregistered ' + regs.length + ' service worker registration(s).');
        } else {
          steps.push('Service workers not supported in this browser — nothing to unregister.');
        }
        if ('caches' in window) {
          var keys = await caches.keys();
          await Promise.all(keys.map(function (k) { return caches.delete(k); }));
          steps.push('Deleted ' + keys.length + ' cache(s): ' + (keys.length ? keys.join(', ') : '(none)'));
        } else {
          steps.push('CacheStorage not supported — nothing to delete.');
        }
        status.innerHTML =
          '<strong>Cleared.</strong><br>' + steps.join('<br>') +
          '<br><br>Reload this page (or navigate back to <a href="/">/</a>) and a fresh service worker will register on the next visit.';
      } catch (e) {
        status.className = 'status error';
        status.textContent = 'Reset failed: ' + (e && e.message ? e.message : e);
      }
    })();
  </script>
</body>
</html>
