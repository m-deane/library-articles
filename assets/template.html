<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <meta name="description" content="{{SUBTITLE}}" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Source+Serif+4:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=DM+Serif+Display&family=Instrument+Sans:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Shared styles -->
  <link rel="stylesheet" href="../assets/styles.css" />

  <!-- React / Recharts / Babel (UMD from unpkg) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
  <!-- Compact header bar -->
  <header class="article-header-bar">
    <div class="header-inner">
      <a class="back-link" href="https://huggingface.co/spaces/helwyr55/library" target="_blank" rel="noopener">
        &larr; Library
      </a>
      <div class="header-meta">
        <span class="header-title">{{TITLE}}</span>
        <span class="header-sep">&middot;</span>
        <span class="header-date">{{DATE}}</span>
        <span class="header-sep">&middot;</span>
        <span class="header-read">{{READ_TIME}}</span>
        {{STYLE_BADGE}}
      </div>
      <a class="index-link" href="../index.html">All articles</a>
    </div>
  </header>

  <!-- Render target -->
  <main class="article-container">
    <div id="root"></div>
    <noscript>
      <p style="padding:2rem; font-family:serif;">
        This article requires JavaScript to render the embedded React/Recharts components.
      </p>
    </noscript>
    <div id="error-boundary" style="display:none; padding:2rem; background:#fff3f3; border:1px solid #f5c2c2; border-radius:8px; font-family:ui-monospace,monospace;"></div>
  </main>

  <footer class="article-footer">
    <div class="footer-inner">
      <span>slug: <code>{{SLUG}}</code> &middot; category: <code>{{CATEGORY}}</code></span>
      <a href="https://huggingface.co/spaces/helwyr55/library" target="_blank" rel="noopener">Return to Library &rarr;</a>
    </div>
  </footer>

  <!-- Expose React hooks + Recharts components into global scope for the JSX block -->
  <script>
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useMemo = React.useMemo;
    window.useRef = React.useRef;
    window.useCallback = React.useCallback;
    window.useReducer = React.useReducer;
    window.useLayoutEffect = React.useLayoutEffect;
    window.useContext = React.useContext;
    window.Fragment = React.Fragment;

    // Expose Recharts components into global scope
    const _R = window.Recharts || {};
    [
      'LineChart','BarChart','AreaChart','ScatterChart','RadarChart','PieChart',
      'XAxis','YAxis','CartesianGrid','Tooltip','Legend','Line','Bar','Area',
      'Scatter','Pie','Cell','ResponsiveContainer','ReferenceLine','ReferenceArea',
      'ComposedChart','Treemap','Radar','PolarGrid','PolarAngleAxis','PolarRadiusAxis',
      'RadialBar','RadialBarChart','FunnelChart','Funnel','LabelList','Label','Brush',
      'Sankey','Sector'
    ].forEach(function (k) { if (_R[k]) window[k] = _R[k]; });

    // Simple error surface for Babel / runtime failures
    window.addEventListener('error', function (e) {
      var box = document.getElementById('error-boundary');
      if (!box) return;
      box.style.display = 'block';
      box.textContent = '[render error] ' + (e.message || e.error || 'unknown');
    });
  </script>

  <!-- Global <Photograph> helper — available to every article -->
  <script type="text/babel" data-presets="react">
    // Global Photograph helper — available to every article
    window.Photograph = ({ src, alt, caption, credit, href }) => (
      <figure className="photo">
        <img src={src} alt={alt || caption || ""} loading="lazy" />
        {(caption || credit) && (
          <figcaption>
            {caption && <span className="photo-caption">{caption}</span>}
            {credit && (
              <span className="photo-credit">
                {" "}— <a href={href} target="_blank" rel="noopener noreferrer">{credit}</a>
              </span>
            )}
          </figcaption>
        )}
      </figure>
    );
  </script>

  <!-- JSX payload compiled in-browser by Babel Standalone -->
  <script type="text/babel" data-presets="react">
    {{PROCESSED_JSX}}

    try {
      ReactDOM.createRoot(document.getElementById('root')).render(
        React.createElement({{COMPONENT_NAME}})
      );
    } catch (err) {
      var box = document.getElementById('error-boundary');
      if (box) {
        box.style.display = 'block';
        box.textContent = '[render error] ' + (err && err.message ? err.message : err);
      }
      console.error(err);
    }
  </script>
</body>
</html>
