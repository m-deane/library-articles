<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <meta name="description" content="{{SUBTITLE}}" />

  <!-- Local vendored fonts (no Google Fonts fetch at runtime) -->
  <link rel="stylesheet" href="../assets/fonts/fonts.css" />

  <!-- Shared styles -->
  <link rel="stylesheet" href="../assets/styles.css" />

  <!-- React / Recharts (UMD, vendored locally — no CDN fetch) -->
  <script src="../assets/vendor/react.production.min.js"></script>
  <script src="../assets/vendor/react-dom.production.min.js"></script>
  <script src="../assets/vendor/prop-types.min.js"></script>
  <script src="../assets/vendor/recharts.js"></script>
</head>
<body>
  <!-- Compact header bar -->
  <header class="article-header-bar">
    <div class="header-inner">
      <a class="back-link" href="https://huggingface.co/spaces/helwyr55/library" target="_blank" rel="noopener">
        &larr; Library
      </a>
      <div class="header-meta">
        <span class="header-title">{{TITLE}}</span>
        <span class="header-sep">&middot;</span>
        <span class="header-date">{{DATE}}</span>
        <span class="header-sep">&middot;</span>
        <span class="header-read">{{READ_TIME}}</span>
        {{STYLE_BADGE}}
      </div>
      <a class="index-link" href="../index.html">All articles</a>
    </div>
  </header>

  <!-- Render target -->
  <main class="article-container">
    <div id="root"></div>
    <noscript>
      <p style="padding:2rem; font-family:serif;">
        This article requires JavaScript to render the embedded React/Recharts components.
      </p>
    </noscript>
    <div id="error-boundary" style="display:none; padding:2rem; background:#fff3f3; border:1px solid #f5c2c2; border-radius:8px; font-family:ui-monospace,monospace;"></div>
  </main>

  <footer class="article-footer">
    <div class="footer-inner">
      <span>slug: <code>{{SLUG}}</code> &middot; category: <code>{{CATEGORY}}</code></span>
      <a href="https://huggingface.co/spaces/helwyr55/library" target="_blank" rel="noopener">Return to Library &rarr;</a>
    </div>
  </footer>

  <!-- Expose React hooks + Recharts components into global scope for the JSX block -->
  <script>
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useMemo = React.useMemo;
    window.useRef = React.useRef;
    window.useCallback = React.useCallback;
    window.useReducer = React.useReducer;
    window.useLayoutEffect = React.useLayoutEffect;
    window.useContext = React.useContext;
    window.Fragment = React.Fragment;

    // Expose Recharts components into global scope
    const _R = window.Recharts || {};
    [
      'LineChart','BarChart','AreaChart','ScatterChart','RadarChart','PieChart',
      'XAxis','YAxis','ZAxis','CartesianGrid','Tooltip','Legend','Line','Bar','Area',
      'Scatter','Pie','Cell','ResponsiveContainer','ReferenceLine','ReferenceArea','ReferenceDot',
      'ComposedChart','Treemap','Radar','PolarGrid','PolarAngleAxis','PolarRadiusAxis',
      'RadialBar','RadialBarChart','FunnelChart','Funnel','LabelList','Label','Brush',
      'Sankey','Sector','Customized','CartesianAxis','ErrorBar','Rectangle','Curve','Cross','Dot','Polygon','Symbols','Text'
    ].forEach(function (k) { if (_R[k]) window[k] = _R[k]; });

    // Simple error surface for runtime failures
    window.addEventListener('error', function (e) {
      var box = document.getElementById('error-boundary');
      if (!box) return;
      box.style.display = 'block';
      box.textContent = '[render error] ' + (e.message || e.error || 'unknown');
    });

    // Global <Photograph> helper (pre-transpiled React.createElement form)
    window.Photograph = function (props) {
      var src = props.src, alt = props.alt, caption = props.caption, credit = props.credit, href = props.href;
      var children = [
        React.createElement('img', { src: src, alt: alt || caption || '', loading: 'lazy', key: 'img' })
      ];
      if (caption || credit) {
        var figCapChildren = [];
        if (caption) figCapChildren.push(
          React.createElement('span', { className: 'photo-caption', key: 'cap' }, caption)
        );
        if (credit) figCapChildren.push(
          React.createElement('span', { className: 'photo-credit', key: 'cr' },
            ' — ',
            React.createElement('a', { href: href, target: '_blank', rel: 'noopener noreferrer' }, credit)
          )
        );
        children.push(React.createElement('figcaption', { key: 'cap-root' }, figCapChildren));
      }
      return React.createElement('figure', { className: 'photo' }, children);
    };
  </script>

  <!-- Pre-transpiled JSX payload (esbuild --loader=jsx --jsx=transform, classic mode).
       React.createElement(...) calls resolve against the UMD React global above. -->
  <script>
    try {
      {{TRANSPILED_JS}}
      ReactDOM.createRoot(document.getElementById('root')).render(
        React.createElement({{COMPONENT_NAME}})
      );
    } catch (err) {
      var box = document.getElementById('error-boundary');
      if (box) {
        box.style.display = 'block';
        box.textContent = '[render error] ' + (err && err.message ? err.message : err);
      }
      console.error(err);
    }
  </script>
</body>
</html>
