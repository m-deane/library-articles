name: publish-to-hf
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-hf-library-articles
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install PyYAML
        run: pip install PyYAML
      - name: Build
        run: python3 build.py
      - name: Convert JSX to markdown mirror
        run: python3 jsx_to_markdown.py
      - id: meta
        run: echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  push-to-hf:
    needs: validate-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER:  ${{ secrets.HF_USER }}
        run: |
          git config user.email "actions@github.com"
          git config user.name  "gh-actions"
          git remote add hf "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/helwyr55/library-articles"
          git push hf main
      - name: Poll HF rebuild status
        run: |
          for i in {1..60}; do
            stage=$(curl -s "https://huggingface.co/api/spaces/helwyr55/library-articles" | python3 -c "import json,sys; print(json.load(sys.stdin).get('runtime',{}).get('stage',''))")
            echo "stage=$stage"
            [ "$stage" = "RUNNING" ] && exit 0
            [ "$stage" = "RUNTIME_ERROR" ] && exit 1
            sleep 10
          done
          echo "Timeout waiting for HF rebuild"
          exit 1
      - name: Notify library repo via repository_dispatch
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            gh api repos/m-deane/library/dispatches -f event_type=articles-updated -F client_payload='{"source":"library-articles","sha":"${{ github.sha }}"}'
          fi

  rollback-on-failure:
    needs: [validate-and-build, push-to-hf]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Revert offending commit on main
        run: |
          git config user.email "actions@github.com"
          git config user.name  "gh-actions"
          git revert --no-edit ${{ needs.validate-and-build.outputs.sha }} || true
          git push origin main
      - name: Open issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `HF publish failed for ${context.sha.slice(0,7)}`,
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
